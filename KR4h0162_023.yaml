body:
  text: 甬上耆舊詩卷二十三監察御史胡文學編呂中父山人時初名時臣自稱甬東野人世居木阜峯下山川名勝山人少喜為詩不治經生業及壯負氣不能隨俗俯仰嘗於坐隅書青天白日名山大川八字以避仇遠歷齊梁燕趙間十年客食諸王門下旅寓章丘與太常李伯華論詩得其指授在章歷三時詩大變一日過伯華江上草堂值夜雪伯華為出妓彈琵琶佐酒山人即坐上作長歌伯華絶驚賞謂非復初見阿蒙也去之青州客衡藩衡莊王嘗起高樓東敞矚遠樓初成王於望後四日置酒遍召一時名士時日景既盡疏星尚微王命且未造座與客東望憑欄笑語良久已而月光漸上遍照四座王甚歡因命曰待月樓使客各賦詩以進王未善也時山人最年少下座徐進一絶句其詞曰川原夕氣交暝色自相向月猶藏海底人已坐樓上王大喜謂能得待字義因手觴延山人上座遍示諸客山人遂一日名重晚客瀋瀋宣王禮之亞於謝榛年七十卒於河南涉縣客舍中魯王孫中立序其詩曰山人鶴骨癯癯若出衣表為人貞介廉潔不妄交不茍取故為諸王公所重人以為實録山人年六十起生藏於句章之夕陽里自撰墓志後竟葬之有二子長曰輅使學醫次輦使讀山人與嘉則先生同甲其稱詩稍先之及年各四十五兩人始得遇定交嘗一見山隂徐文長輒作靈物篇相贈歎為絶奇生平所與逰論詩幾遍天下唯稱同里盧澐吳中文徵明黃姬水東郡謝榛濬人盧柟新河宋登春十餘人自謂砥礪名行期無愧諸老庶幾不朽以是山人風格至今稱之所著甬東山人集折楊柳歌漢人馬上來秦人馬上去長條不折時遮遍長安路襄陽曲襄陽衆女兒齊唱大隄曲假令歡不歡屈使漢江緑襄陽踏銅蹄青蒲沒漢水白馬度襄陽男兒但得意何處非故鄉春江引青竹坐巴郎素手引巴女江漢中流分不得遞私語江陵女歌阿歡問儂家儂家江陵住儂心逐水流儂影流不去車馬行車行黃塵北馬行黃塵南遙遙千萬里憂思我獨含車行祝其輪馬行祝其蹄馭者苟不慎一失無完期銅雀臺魏祖兆黃星神器若天假銅雀何麗哉峻天失大厦燕趙刮鉛華齊梁疲陶冶延袤亘無地層冥煙霧灑八極圍寸眸雄觀絶天下漳河不斷流千秋一平野日落鬼狐啼焉知誰氏者但見耕田夫爭賣土中瓦燕市俠兒篇跳丸極揮雐誰家金虎郎片言作喜怒一劍誓存亡縱酒罵燕市鬭雞賭趙娼無勞語姓氏誰敢學行藏直使心為鐵寧辭血濺裳幾時一擊築殺性報剛腸讀史老憊力不加悶且檢故䇿中天星者黃大澤蛇者白人定未敢窺天定詎容易肌髮不自理獲寸反失尺妄知海淺深徒衒探珠客尤物揮不去奇貨豈再得鬱鬱牆之東邈焉天地隔山中吟曳衣投洞壑余來詢至道至道即人間人間復誰討大地何茫茫長江亦渺渺天地豈長生日月尚枯稿忽興浮海歎傷哉此尼老桃源渺何許武陵萬仞山緬想秦時人生死桃花間邇來幾天地曾無幾人間桃樹摧為薪桃源平作田雞犬入租稅焉可住神仙西澗有靈草曄曄芬金光春隂龍晝出秋寒鶴夜翔去人不千尺煙氣灑衣裳精誠不能陟望之徒感傷恐非長生物詎敢獻君王貧士短衣不蔽脛蓬髮自吹面無力營生産甘心委筆硯桑間屋兩間枯茆覆不遍愛讀古人書析理極歡忭縱令萬黃金焉能奪吾賤留别沈大參同沈嘉則張平叔廣田曠平野伏檻窺寥廓一雨自東來大風時作惡霆霓走簷楹隂陽競磅礴頃以毛髮平天車回巨壑淅淅繁燠銷天地轉霋霩主人命酒來逶迤出林薄饋我雕玉盤持我鸕鷀杓唱以青鳳詞舞以黃金索東池潮正平西浦日半落不問客量何促席罄斟酌十年兵革間此日藉茲樂張衡將去吳沈約欲騎鶴豫亦濠梁行同來詎可約勝地豈易逢多君復脫略人命亦可畏流光迅火爍若然不痛飲徒爾受踖蹙多謝主人賢憐才任樂託不意數百年大雅喜復作長嘯别君去爽氣布江郭阻雨七峪昨過鄧州里合宿內鄉堧雨積馬蹄爛水嚙石齒穿多癭防水土常潦患山川雨乘風氣作一雨爭流泉大河高於屋凌昏樹杪眠渡者愼無渡田父何以田我亦山中人與爾相憂煎留乾二兄宿寄寄山房時陳張華三客别去吾宗老兄弟秋隂過我屋屋中亦有客相聚極款曲客子俱高尚主人且不俗山家貰濁酒山妻剝新穀飯罷強出門泥淖沒雙足客散遠人留就我小窗宿對牀寫沈抱風雨不秉燭明朝君復去落日委空谷曉起曉窗背林麓芙容未全豁披髮一夫間傷秋萬蛩聒小人時正繁君子道不達共居離索間草木候霜殺交州古劍歌古交州天隂日落鬼啾啾終宵白氣衝牛斗過客往往驚回頭主人知此有靈物呼兒掘得雙吳鉤螭蟫半蝕銅花緑凄凄霜鍔寒光流古來異物不易取令人得之反生憂放之惟恐蛟龍怒卷之猶畏神鬼愁亟命冶人復解鑄神器恐遭真宰怒不然仍貯空匣中何似含光在泥土贈鵝池道士鵝池道士何所事摩頂向天手垂地家在趙州人不知箕子之胄古姓氏籜冠不正綦履穿風雪一蓑行乞市兒童遮道作戲嬉大人白眼但瞋視我獨羡渠嘯吒人只愁無酒不愁貧終夕對人突無語詩畫一發能通神咆勃氣來便使酒白日當筵罵太守綿山汨水義可投不惜千金喪匕首早知駿骨成蹉跎悔不臨池學泛鵝無端我向秦中去勸君隱臥湘山阿靈物篇贈徐文長越王去後幾千載擊豹吞蛇鬼物悔疑是東南地不平秦皇帝來塞滄海海既不可塞山亦不可改山川靈氣屬真宰一朝六甲排天雲白日風雷下三界蛟魚螺蟲不敢語千巖萬壑發光采發光采光陸離孕四角吐三眉天地失色神鬼失奇黃金萬斛將何為昔年曾同天馬馳神明天子知不知於乎靈物知為誰江上醉吟懷諸子甬東歸客情無已江門醉舞秋風起桃花渡東包十亡新安道上盧九死死者既死殊可悲生者徒生烏足喜平叔多能無所用文父甘貧了不恥惟有嘉則賣賦歸閣上長吟對妻子嗟余寥落還荆州白日到家雙淚流眼底故人復如此此生促刺真蜉蝣且以微名埋麯糵何須玉匣葬寒湫黃金空鑄青牛老金谷銅駝沒秋草醉來萬事付青天千古空江月皓皓對梅啜粥歌東家宴客較鼉鼓裊裊香風細腰舞滿堂絳蠟明徹天一擲黃金賤如土誰憐門外號寒兒無袴無襦氷雪時不及豪門衆黃犬白日嚙人當路危我家西溪麓雖然貧不足梅花三百株滿盂黃菜粥李太常伯華江上草堂雪夜出妓彈琵琶北風吹雪晝易昏樹深竹密江上村紅燈照席不知夜忽有遠客驚叩門繫馬登堂不問姓不顧旁人即坐定座中舉目皆英豪主人呼出鄭櫻桃紅竺裊地毾㲪暖簾額紛香落鳳毛大小忽雷手中出須臾翻作鬱輪袍媚臉斜凝新病眼一曲低回黃金槽衆客聞之各掩淚潯陽此夜我先醉天涯海角同此心古人意氣輕黃金瞥然上馬出門去酒酣寒極天將曙壽陽道上寄李中丞足迹半天地長歌行路難樹昏雞語澀沙響馬蹄酸急水層氷裂空山片月寒好將遲暮色寫向故人看南窗對天泉菴作虛窗對巖穴早晚片霞生初日送山影中宵足磬聲風腥龍曬甲松暖鶴添丁自覺諸天近時隨星斗行山中苦雨閉門隂晦朔兒女竟顚連蜃氣雲翻屋蛙聲水失田淫淫偏雨夜黯黯或秋天無賴山間客春風獨愴然秋田為李生得衣字明農兼課子田舍有書幃罷亞霜初下雞豚秋正肥西風菰米飯落日豆花扉已得遺安計無嫌老布衣和楊中丞韻海內紛紛者嗟余亦漫行還山修藥品薄業赴園丁江漢橫秋碧黿鼉避水清西風漸搖落黃葉旅人情贈唐刺史賢哉唐刺史休沐已多時直道為時忌初心祗自知衛生惟蒔藥謝客不論詩偶值竹林下相忘酒一巵把酒向舊宅芙容歸去空山裏無人知姓名竟忘雙齒落猶戀一尊傾屋破心何漏秋高夢亦清拒霜如有約的的滿叢生曉望示城中調化姪閉門掃蘿薜曙色報村雞海口吞城盡江干與屋齊林烏號日出山鬼嘯煙迷處處新炊起年來罷鼓鼙手録夢山詩選夫子出東方為言自漢唐長空走明月流水聽滄浪紙貴惟書葉官貧不食羊腹中何所有三萬斛玄霜元夕集張大司馬月湖精舍同沈嘉則吳汝震汪長文李賓父得清字春明緑野地花罨赤霞城天為上元好月于今夜清香塵吹不斷星漢醉將傾卻有應劉輩摛詞頌太平天封塔忽上梯仙國真堪叩帝閽中心穿斗柄絶頂亞天門市井人煙雜魚龍海氣昏虛空開七級下界越王孫宿京口示賢六姪孫時客揚州雨歇帆初斂昏黃倚水闌亂潮衝浦口新月立城干山迥三吳盡江空獨夜寒好春迤邐過明日廣陵灘憶東湖余相公舒園遙憶東湖上拏舟泛若邪荷翻人摘藕枝動鳥銜花石磴隨峯轉煙樓隔岸斜雖云丞相墅儼似野人家淨因寺有大佛高四丈六尺諺云土中塌出一名土塌寺雲破蒼茫處相期入淨因枯槎僧結臘黃土佛生身絶壁疑無路聞雞覺有鄰一呼羣籟寂片月下玄津瀋世君問寧波風土應教五首越絶饒山水古今文物稠三冬無積雪十月尚餘秋風雨無歸處家鄉在盡頭出門車馬少到處泛蘭舟石頭古城子城下繞滄波大屋空如谷小船尖若梭山深罝麂鹿潮滿制黿鼉距海五十里生涯海錯多淹淹梅雨後卑溼用樓居有地俱成稼無人不讀書香多吸老酒鮮極破黃魚頓頓新粳飯先將賦稅除兒童養鵝鴨蔬果足山家赤午農耘稻清宵婦緝麻蒸嘗先敬愼婚嫁稍奢華長吏民皆畏無煩刑法加四明八百里物色甲東南玉版春肥筍瓷瓶雪醉蚶堇山足靈氣慈水供餘甘窈窕千峯處幽蹤日可探木峯舊業寄諸族兄歲莫寒山下溪田久廢耕亂烏驚日出猛虎傍人行蜃島殊方雜鮫潭竟歲鳴林窗讀書處清夜鬼談兵寄俞八介甫讀書處夢寐殊方外相思澤國邊山沈於毒霧天落在平川橘柚連書舍鸕鷀滿釣船五年常憶爾多病似今年崛􅡆山寺羣公愛黃髮攜我入空明拂座星流影聞鐘鳥禁聲僧從虎穴出天與石梯平一浩荒千劫吾將放此生卜居有感寄三七弟舊業盡凋沒深冬欲卜居砌崩蛇嚙筍架脫鼠翻書親友幾人在干戈草載餘未知何日定投老總樵漁八月十六夜邀兆和民服民孝元叔乘潦泛月雨歇秋方靜扶攜上塌船共憐今夕好不減昨宵圓絶潦渾無地除山盡是天清光溢心眥傾賞愈丁年夜懷起來喧不減䇿䇿動涼風月暗蟲聲裏人孤樹影中南埏寒尚早北地候難同想到鄞江上秋花滿舊叢夜行小僕兼疲馬荒荒獨夜行滄江愁我處流水斷腸聲雁語知臨浦煙光似近城不知何處宿無月又三更留别少府子魯木落見中州遙連白帝愁黃河臨斷岸明月上孤舟作客已多歲還家又暮秋思君西下日寒葉滿江流次李大參韻留别河北中秋盡江南九月歸草深藏虎穴潮滿上漁磯田舍舂新稻山妻補舊衣到家貧自得莫怪與君違伏枕舟中作楚魂招不得哀怨此中多纖月回頭失疏星伏枕過榜人吹宿燎曙犬吠驚波毒霧瀰江海留公無渡河到家苦雨寄城中諸友歲晏兼貧病歸心詎可論寒潮氷下咽飢雀雨中翻野徑蒼苔合山窗白晝昏還家已十日愁絶舊柴門送西僧渡海一謝西來路重登東土船舟中如舊國海外更何天呪食魚龍出然燈島嶼懸當年杯渡者許爾有同緣巖棲巖棲拒人迹日夕得奇搜虎嘯山精聚兒啼石母憂魚龍歸大壑天地入窮秋好釀深冬酒新年甲子周病臥聽雨今春病易得結客亦無歡樹老吐花澀山高落木寒半空懸雨腳萬馬戰河干臥起無人問何妨不帶冠金山寺萬古一卷石東南何壯哉半江截吳楚兩岸瞰樓臺僧飯蕪城乞人煙鐵甕來春深龍聽法風雨帶潮回九江懷江都諸友取次泊漁梁緑蕪細雨香傳詩與廬嶽沽酒慰潯陽岸上覺吳語舟中猶楚鄉琵琶人不見飛夢到淮揚開門零雨橫江過分苗稚子還樹乾雙鵲喜風定寡鳧間野馬穿林日青螺隔岸山坐窮塵世事只合閉柴關自吳越望金陵寄余太史丙仲出門已三月煙雨暗錢塘薄素餘雙屐浮名寄一航潮聲吞落日花氣濕行裝白下春將遍王孫草正芳步出江岸間吟寄上沈少宰肩吾著地麻衣逐步飄前村社長不時招漁竿風靜蜻蜓立草徑人行蚱蜢跳遠磧孤樓高出樹方舟獨楫鬭來潮澄江一片明如練到此都教俗慮消諸公邀登甘露寺留别天風飄忽苧袍輕兩度登臨慰客情疏磬雨催山寺曉亂帆春放海門晴江回鐵甕三吳盡潮過金陵七澤平明日别離何處問斷腸煙樹漫蕪城齋居寄海豐楊侍郎蓬島飛來拄杖前何勞䇿石遠求仙一簾雨過空青處五色霞明大赤天江水自清漁者話松濤不響鶴丁眠閉關正好焚香坐年老何心續草玄海門雨過同伯川賦藻煙布地不須芟雲鳥依人著隱銜雨歇江干留一笛風平樹杪沒孤帆冬深蜃島天長黑潮入漁汀水不鹹祗好釣車聊日計海門到處鬭巉巖積雨閏二月作竹裏柴門枕水濱野雲能就主人貧雨聲不絶過三月節氣無端閏仲春山閣坐來時得鳥溪橋行盡不逢人村居莫道無知已屋外青山足四鄰江上懷峨眉道者兼寄空塵山人長生無術煉黃金書劍俱忘不廢琴入夜幾回天馬走臨流一曲水龍吟秋生鶴骨年年病月到峨眉夜夜心未得從師度黃石萬家霜葉越江深句章里寄城中諸社長白日江鄉家益貧聖朝漁父不稱臣門前江水通三島谷口人煙雜四民手種參苓羲世藥心知雞犬漢時鄰却憐叔景浮雲薄留得風流一季真京口望揚州懷吳原柏沈肩吾隋宫梁苑暮雲遮淮水淮山煙樹斜隔岸雨晴飛燕子渡江風暖散楊花心懷季札常為客病念休文未到家我亦萍蓬無所寄祗將觴咏報年華林窗卧雪遲明元夕林茂之招飲天衢精舍春來客夢渺無徵老去耽詩苦不勝伏枕那知全夜雪深林疑見萬家燈地偏僧舍塵俱息山近人煙氣若蒸應喜青蓮舊相識還攜尊酒過南能金陵雨霽登吳子充山人長吟閣次韻五嶽窮搜老未間長吟此日共躋扳相逢到處俱為客大隱明時不在山絳闕春深煙樹碧石城雨過草花斑六朝事業漁歌裏江上浮雲自往還還山間咏年年海外困風塵兩度還山值莫春齧筍林鼪常伺夜啄櫻山鳥慣防人清江小閣更無事麥飯蝦羮差合貧幾夕清魂飛海嶠只疑天馬是前身藐姑射龍子祠同呂中翰裴黃強陳四散人思弄煙霞藐姑射特攜笙鶴訪仙靈龍人夜出山雲溼鹿女時過草樹腥碑臥石根春寂寂海通巖骨水泠泠我將抱甕同真隱家在江南小洞庭遣輅兒業醫還家地有桑麻屋有茅百年舊業莫全拋海頭春暖魚生子天目氷消虎出巢審雨下田乘早蒔卜晴采藥及時炮漁樵到日如相問阿父吟長憶故交山中間適示一二同志木石乃吾性胡為物欲奴候潮鉤洞蟹卜日藥江鱸兒索霜前果妻芟雨後蔬衛生甘淡泊謝病免招呼三尺原無用一丘聊自娛駕言清夜好海月向人孤山溪行飯寄城中二三友人兼柬民服老夫炊爨熟不解問庖丁門僻留雙栝溪虛益一亭僧傳伏虎訣兒學相牛經貞愛仙人石明慙處士星灘欹橫鷺影秋冷閉龍靈野外山資薄城中海貨腥倘過高尚者正值晚菘青再經鍾吾懷許兵馬去日黃河邊水深不可渡故人不復回今作行人路間行即事竹屋炊煙四五家門前潮水繞寒沙道人日晚乞食去鵝鴨滿田蠶豆花錢塘江送周水二君入閩江上秋高雨氣清却憐二子七閩行蠻天無雪迷煙瘴多嚼檳榔莫計程黃河舟中寄姚水部汝建淲淲南風㶁㶁流天吳吹雨冷驚秋愁來不信頭能白煙草江南六六洲江岸江南秋色正疏疏江岸人家盡是漁中有故人漁一户雁來不寄半魚書酒債多病平生酒有緣堇溪蕪沒不生鉛新年買得田三角紫糯多栽當酒錢松門小隱秋老江南歸去時松雲鶴塢小棲遲五侯赤牘千金重不換滄浪一首詩李賓父先生生寅號暘谷於嗣為曾大父行為人風儀修整性和雍不立崖岸意思蕭散精名理善於微言每對客衆論沸起先生徐發一語四座盡傾生平都無好惟好為詩不肯作世人雕飾天動神來自然高妙俱謂詩如其人諸兄弟並遊太學為郎先生獨不仕懷古慕道居常愛王孝伯飲酒讀騷因名其齋居去甬江十餘里為蕭臯在山水佳處家世有田一頃别業一區先生更起高臥樓讀書其中歲收粳秫釀酒旁闢自鉏園半畝遍植嘉草名藥間種蔬韭取供賓客同時名薦紳高士至蕭皋輒作數日留方去酬唱甚多蓋吾家草堂在貿東一曰楝塘一曰蕭皋俱為海內詞家所咏賞嘉則先生復作蕭皋竹枝詞十餘首被諸樂府使童子習唱之流傳一時郡中當事聞其名希得致先生俱謝不往年五十欲製遠遊冠裹糧自四明台宕盡訪天下名山以親老不果行未幾終於家遺集行世先生嘗自署暘谷山人屠長卿先生曰近世山人甚多然未嘗居山觀其僕僕負囊挾名紙候門望長者顔色翹目利舌善為譸張其賤已甚若賓父先生不出户著書論道畢其身其自言若得從禽子夏遍遊五嶽當不入一城不干一人斯可謂山人矣因贊之曰讀騷取適灌園寄散介絶溪刻簡不任誕江霞朗映崖松孤偃何以品君鳴瀨清淺惜哉早謝遠遊未踐張大司馬亦心重先生每有所品目輒言吾與沈嘉則李賓父二先生同之時謂先生布衣風格當在孟浩然秦系之間獨樹齋自惜先人業初成獨樹齋院風吹白幘徑草濕青鞋梅福還藏市龎公不出街新􅀈竹葉好落日見吾儕懷楊三聞九獨苦傷時切誰應絶俗高晚天青似玉秋雨白如毛院柳風頻舞簷蟬日更號二湖新水緑莫使負漁舠蕭皋即事浦溆潮偏到林居水自嘉風禽爭楝子霜雁挈蘆花把酒唯樓靜聽鐘與郭賒村村初種麥翠色滿晴沙到范司馬溪隱屢得尋仙隱還同到石門山牆低壘石水屋亂成村刈稻深溪熟樵薪遠徑喧共憐山簡在霜日醉昏昏蕭皋客不至野臥樓風急晨看徑雨稀朋從何寂歷鳥雀故翻飛晚圃尚留菊寒潮不上磯小厨何所供筍蕨借春肥東湖平湖八十里東望去城偏波濶山為岸春深雨似天數村沙上柳一縷嶺頭煙何物鴟夷子相呼引釣船立秋刈稻苦深雨立秋期稍晴黃雲低在野白水遠浮城魚鱉新登市江田舊失耕兩年仍雨旱一飯愧香粳喜中都司理兄參軍兄解官同歸古貿山長在濠梁客始歸楝花雙樹合楊柳五株微兄弟爭投笏乾坤共拂衣承家元有祿宗族幸無飢答薛孝初始至自鉏園作淹留如宿好淡美信初交開閣臨秋色高陽在柳梢刈蔬深賴圃割肉小充庖不畏林中暑山尊藉白茆同蔡四訊聞九病聞九堂前客頻來只二人禮疏情極樂老至醉尤真地溼深憎雨湖秋遠勝春病身應自傲隱几不迎賓訪汪參軍父子早色初分嶺人煙稍出林刺杉千澗立毛竹一溪深遠雁霜華去高峯日氣森到來詢父子令子隔山陰送包長史葬身豈長沙謫名猶賈傅尊墓田都立碣隴樹會成村臨穴無兄弟憑棺有子孫千秋誰作伴翁仲與朝昏小溪古道前朝墓空山此日樵溪邊水作碓屋外竹為橋疏雨秋生熱輕風晚弄潮雲霞正明滅片月下青霄列菊手種東園菊吾非陶令貧避人長解醉責子不能嗔只是愁難減方知藥未真晴秋暫時雨一院太無塵嫁女後之蕭皋滄洲宛轉復潺湲秋水之亭白石關落日倒看江口塔回雲遙屬海門山不知何物風塵外亦有吾生天地間過盡漁樵深此徑緑楊青桂向人間同嚴邦直蔡子行漸甫弟飲子禮姪甬東草堂小莊去郭惟三里古塔臨江僅一層亂水絶憐人並過高樓還與客初憑秋雲近海時時變晝雨如塺日日蒸素業先生留十載亭臺花木喜新增包明臣高子登家大兄過蕭皋荒祠雙女門何向委路三橋棹欲迷地隔湖山四五里園分菜麥短長畦春深古木村村暗雨後新苗日日齊農事物情俱自得弟兄朋舊會相攜盧山人澐字宗潤行九號曰月漁為人于䰄體長不事修束性坦率與人語合輒出肺腑相示諸所覩物奇不奇俱口奇之性又絶靈悟讀古人書輒能解獨不好刺經為儒生嘗取四唐人詩作品目如衡石然不少失高下喜為詩然喜次人韻不自作所次每過倡者詩成旋棄其草然亦不忘人以此翕然稱盧山人詩既不試有司乃齎槖中數十金去為吏事烏傷縣官以所齎金置一土穴中取日給已為人睨得盜其金山人窘無所得食即棄歸性嗜奕嗜摴蒱每出錢以奕摴蒱與人博博晝夜寒暑食飲歲時俱廢博者朋計倒其槖不悔每日中提壺出酒家貰酒飲博者率博至夜半時角勝爭道鬨其鄰鄰人俱苦之亦能醫嘗治人病得奇中然病家造門值其博輒堅謝曰余方有急事不暇去有石橋黃生者病甚殆強載往治已就寢見人壁上詩即和之繞榻行嘔聲至旦主人以為怪不服其藥嘗過張大司馬司馬客包參軍與論詩不合鬨其坐坐客俱左袒包山人不為下獨與所交東籬朱近臣最善近臣豪兩人並行市中輒駭市中人兩人若無人焉者然兩人論詩爭短長亦大鬨退即交相服不容口未幾近臣以醉溺死山人哭之慟山人自罷烏傷裹足不出門三十餘年出行數里外輒迷東西有故人沈問之為黟令山人獨從一門人王生訪之六月走馬萬山中中暑去黟百里而病夜夢與王生俱溺挽其髮盡脫為黃絲寤而語王生曰色絲為絶吾死矣已果死休寧令知其名為斂沈嘉則先生録其遺詩百六十一首行于世山人初以醫得金置袖中常為人探去不知即知亦不問一日舟行袖金二十四銖裹以越楮偶取金失水中即墜意不信試取餘金纍墜之至盡嘗訪嘉則寺中出門雨新過下階級石亷劌嚙屐齒蹶痛甚亦不信復起三試之復三蹶見者盡掩口久喪妻獨居有子格亦不為娶婦常曰他日得遊終南少室乘雲御風即父子相從無絆也亦精祿命嘗自刻死期在龍集戊辰歲得年六十三至入黟歲果戊辰垂死謂門人曰古人旅葬裸葬無不可何必故鄉沈問之聞其言為買山休寧東門外東嶽廟之東南葬山人客過無不拜詩人盧九墓者宫詞鏡裏容顔只自知承恩猶記昔年期曉鶯啼上宫門柳又是長安二月時明妃曲自憐薄命淚如麻不是當年貌若花怪殺西風非漢使斷腸聲不送琵琶楝塘李先生隱居好山青近屋曲水上橋低沙白羣鷗集庭陰雙楝齊枕書忘歲月閉户謝輪蹄載鶴攜孤棹尋僧到别溪冬日過祖關林風醒醉客朝日靜鳴雅松老猶餘子梅寒未著花青苔荒古道深竹自僧家共憶山堂雪相違幾歲華上天竺次韻一徑通行處山花與石苔僧分吳越語碑自晉唐開盜栗林鼯集巢松海鶴來俄驚人世遠雲水淨浮埃韓唐曉發馬出韓唐曉蕭蕭落葉風霜華漁艇白日色鳥巢紅亂水人家隔危峯驛路通明山無認處南北轉飄蓬夏日即事次豐吏部二首晝寂雙扉掩無人共酒杯睡嫌雛燕語吟惜藕花開郊雨不能作池風時復來還期問字去載月夜遲回日高門未啓僻懶自癡豫跣足長忘屨科頭不置梳畏炎思徑竹留客乞鄰蔬已拙謀生計牀頭不問餘田家吟最是農家樂收成十月天春耕餘榖種秋稅了官錢兒女團朝日雞豚散野田鄰翁相見處凶稔説明年七月朔偕梁廣文買舟過訪張司馬别墅蕩槳遙相訪茅堂曲繞溪雞聲聞午報鶴立與人齊白石平宜坐青林漫有題一尊常醉客已遂鹿門棲新秋漫興仗劍非吾事愁吟自蓽門徵求窮海郡風雨遍江村岸塌風欹樹牆危竹露根君平今已遠消息復誰論秋風動林杪秋思坐來清移榻還依樹臨流欲濯纓天光雲外出雨氣日邊明抱病長頭白何如漢長卿春日漫興和張大司馬居貧嫌地僻習靜喜無喧屋窄還餘竹園荒不治樊庭花飄滿席梁燕語窺尊自較春來事逢人未易言烏傷道中歲晚烏傷路凄其一孟郊寒煙迷去鳥落木露危巢古渡無舟楫荒山只草茅題詩江口月誰寄故園交顯忠祠建文時死節御史戴德彝祠也昨乘羸馬過祠東猶見行人説太宗徑草有情熏夕照野花無主任春風臣心此日惟知死天意當年未愍忠千載憑誰論往事石壇松柏已叢叢江上送别潮生月亦上月白見潮青不知潮月落君去幾長亭西亭同朱近臣送沈嘉則口號送君江上雨未及梅根渚雨急天欲昏不盡别時語漁人二首十罾九見空無酒臂無力朝來雨過溪應有魚滿尺江頭春草生江上春水長十日不出門魚苗大如掌述懶科頭不出門歲月已忘記燕含花片來知是春歸去訪友訪友入南山扣門不聞語欲數青琅玕錯錯知幾許春日睡起次嘉則深巷無人靜掩扉桃花香暖午風微小窗睡起支頤坐間看營巢燕子飛吳處士鐄字汝震與嘉則先生同起有詩名時東沙張公里居既起宅日湖之上復營别墅在東西郊每乘興泛舟兼載絲管一時名士多從之遊園亭觴咏之盛浙河以東風流未有然惟處士與嘉則中父先賓父三先生最為詞家宿老倪鮑十一賢不能及也舟宿雲間南城孤舟夜泊松江水東風捲濤雪花起浦口潮水遠趂人城頭月色寒無主濁醪可飲何處沽笑絶高陽舊酒徒巨飲還將攀北極高吟直欲起東吳借問誰家酒可得一斗十千亦不惜對此風光無限情吹落梅花短長笛曉發金壇出黃堰雨中竹樹森密有懷箕仲田叔山縣侵晨發舟行何處村宛然新水竹疑是舊柴門急雨來江口飛泉出樹根無由尋二仲幽思共誰論奉和少司馬溪隱莊好鳥知山意晴光想岸容捨舟人兀兀入谷路重重筆底騰高壑尊前墮遠峯狂歌從白眼隨處倚長松丙子春夜集小齋賦得風雨歸舟送箕仲田叔盡道春光好翻嫌夜雨鳴江空蒸水氣風颯打船聲燈火愁卑溼魚龍莫夜驚阮公情未已還作載詩行奉和范少司馬夏日湖上夏雲低水閣春草漫汀洲小樹芳堪擷平巒翠欲流雷聲喧别溆龍氣入靈湫不去忘機鳥翩翩為客留曉霽渡曹娥江箕仲田叔分平字渡頭帆落與雲平江上花開相映明兩岸人家通海嶼一川風色送潮聲斷碑已沒中郎篆古廟終存孝女名自歎經過繁客鬢却將書劍負平生答酬雷半窗斗文歲歲占南極詩興朝朝臥北窗身著鹿裘常自得匣藏龍劎本無雙萬山雲氣穿閩徼五夜潮聲到浙江諫草欲題遲未達几前空有筆如扛十二月初三日歸草堂日日磯頭把釣竿蘆花如雪舞漫漫新炊雞黍堪賒月舊著羊裘可蔽寒山色四圍低野渡泉聲一帶落飛湍從今茅屋歸遲得莫道風波行路難漫興户外澄溪漲緑波暖風約水動新荷竹根稚子千頭出昨夜前山雷雨過金處士鎰字用衡號前湖與弟銘鏇俱有詩名所居曰桂莊時謂桂莊兄弟用衡最高贈同谷山人太白之陽有同谷同谷之中白雲宿美人結廬谷口居朝朝暮暮雲相逐我來問君君不言雲裡長鑱種黃獨夜投資福寺近徑捨舟從昏煙罨古松山開忽見寺林靜不聞鐘宿鳥翻高樹明星動遠空入門僧未起禪室一燈紅遊東湖湖上放船好秋高眼獨明水光浮地白山影露雲青把酒臨鷗渚掀篷認鶴汀笙歌謾繚繞詩思正縱橫題楝塘李先生隱居密葉陰陰碧蔣繁一家風物自江原樹根船響客登岸枝上鵲喧人啓門傍水墮樵驚濯足掃花當路翠呼孫百年天與幽棲境裋褐逍遊未可論贈沈方川扁舟曾記泊方川楊柳蒹葭入暝煙漁火靜依沙際出野鷗多傍露陰眠風當午夜潮生岸人啓孤篷月在天不道休文真地主袖中漫刺故依然登補陀寶閣久懷登覽興偶作化城遊覺海通金剎慈雲護寶樓曇花非色相祇樹不知秋繡栱懸霄漢雕闌控斗牛徘徊雙眥決汗漫一身浮遐觀三千界雄圖四百州夕陽興廢迹逝水古今愁回首滄江上高歌起白鷗畫紫煙銷盡見岧嶤天外諸峯積翠遙何處八公雲臥隱一支山色入中條題山水圖午雞拍碎霜顚羽石屋高人睡初起長松吹風生夏寒白日空山響秋雨白木長鑱杜少陵飢來無處覔黃精何人正得尋詩便來傍氷崖雪樹行山水圖為陳雨江題地近青春人迹稀白雲芳草靜巖扉主人何處劚靈藥不向蒼崖喚鹿歸蔡子行先生學用初字用拙號青山父梧官中書舍人先生生於官舍兒時輒對語驚人父罷官卒於家兄某盡廢所遺槖中金走客京師不知其死所先生奉母至孝撫兄孤踰於已出衣食相有無里中俱稱先生義至高既絶意仕進唯與故人先賓父楊伯翼聞隱鱗諸先生論詩過從不間風雨諸先生俱兄事之時余文敏公以祭酒在里門重先生風格與定交將為先生起隱居湖上如奉戴安道適公入相薨於官未果後余長公將以門資補官因重父交請得奉先生同遊京師先生竊念謂可因覔兄喪即與同往至京師閉門掃席絶不通輦下人惟所交屠田叔先生長公子生超三人相與賦詩都下競傳寫即所謂薊門倡和詩是也先生獨間行遍求兄遺骨所在竟得諸寺廡中題識宛然先生哭之慟即日載其􅦮歸長公為治裝先生既垂老家屢空意怡然也與先賓父先生交更深賓父垂沒屬其子豐曰吾死後必歲奉蔡先生穀十石終其身是歲豐以遺命致穀先生堅卻不受曰吾無以報亡友地下且君家設有不繼是重負先人之命也不若自今日辭之以善故人始終聞者絶歎服時屠田叔亦罷二千石歸因招先生使移家其鄰幽居里名曰乾溪里中人盡稱為乾溪孔子適比鄰失火望者俱驚曰是不近蔡夫子居耶火及門風反先生所居宴然年七十偶得微疾即自尅死期聞隱鱗先生過與訣曰若先生今日此中可無愧怍先生笑曰故人知我者至期盡召家人起坐曰伯翼待我久可以行矣遂瞑此外無他語其與朋友為死生若此子起白亦能詩録先生遺集十卷藏於家初屠田叔嘗過先忠毅公客四坐或問蔡子行近詩何句最佳田叔曰蔡詩若草緑鵝兒喜天清鸛侣高真不亞杜陵也先忠毅公亦時時誦之人日歲旱始秋冬淹延及正月七日乃占人甲子而雨雪茅軒爇松火爐冷久難熱嚴風砭皴肌凄凄凛衰骨催婦理濁醪瓦盆連數啜須臾中氣溫稍覺肢體活起步沿荒除露肘牽敝褐所賦足我安所遭寧彼汨亨蹇運故殊陰陽理非譎醉來托長吟乾坤眼俱豁隱鱗山樓作城市苦堀堁山樓夙相期結構已經歲登眺始於兹東引極綿曠西臨疊歧嶷恰與翠屏晤賞兼丹霞私月耿婉夕檻嵐凝界晨楣棲遲更纍日應接非一時淙壑轉靡息森林杳頻迷雲區見崖鹿陽岫聞山雞物意愜所適吾蹤合相追心惟幽討會興及清秋宜頗怪籧篨客顧覺神翻飛君其日強飯永言隨杖藜春雨歎去年暑旱無片雲千畝百畝如火焚今年水潦漬行骭小麥大麥皆泥爛君不見一年兩稅相輪回大男應丁小男催於戲春雨胡不作秋霖天令如此悲人心命酒篇天生丈夫不輕有丈夫立身不當苟不建鳴鐘飱太倉焉能乞食向黃口伸腰醉卧三十春飲裡著穿頭上巾城中小兒走相笑笑我流浪何太貧噫乎平原翩翩不應死巫陽大叫魏公子大風不揚北海浪蒼天會竭崑崙水淮陰原是跨下兒千金報飯羞遇時且向空同倚雙劒高天矯首白日馳長嘯一聲拂衣去三山之顚或可住麻姑仙醖海作罌直吸滄溟快長喙吸乾海水咽不流倒翻天漢天上遊下瞰世上羣兒走鹿鹿何不幡然行藥來生洲贈屠少石先生屠公煙霞人貌古心亦古自從見面心即親恨不經時聚眉宇世上相逢不易知與公相逢公不疑籬落形骸竟何意紛紛難與同襟期公年六十髮如漆日月酣歌尚豪逸白雪黃牙了不知無憂便是長生術如澠之酒美且馨但願同醉不願醒為公短歌歌未停山風颯颯吹松苓金陵道上大雪歌送李子同海天臘月消寒霧暮雪飛入金陵路朔雲黯黯結長皋滿地風如吹玉樹掩盡秦淮一片清大江高浪凍還驚江中巨艦夾雙櫓不憚寒深萬里程萬里深寒亦不惡挂帆直向金陵落酒家爐頭暖釀春客子百錢呼大嚼吳姬擁裘窣地長千金狐白鬭雪光年少俠兒鄴下郎醉倚吳姬拂劒霜鍾山氣色古如此吾今空臥東海涘雪裏送君意大驕惆悵寒風馬蹄起早夏小閣陰常臥間門霽復扃柳齊嬌鳥翼藤屈古虬形雲勢奔林黑天容瞰圃青北窗知有待消暑恣沈冥秋分夜作竹舍清如水深依鳥鵲羣月兼天更朗秋與夜俱分斗酒關飛動繩床屬倦勤老身貪自逸莫遣世人聞中秋獨坐次田叔韻萬里中秋月披衣強自看即教人意滿難放客愁寬朔氣侵榆柳清輝動羽翰遙思故園夕亦此悵闌干坐覺當簷白巡看滿徑清兔圓猶寂歷蟲急更分明晚歲憑誰得哀吟只自成乾坤意何極搔首暮寒生月色秋偏霽中宵鑒客孤無心酣白墮不為惜青蚨樹冷烏難定風悲雁易徂空將百年計漂泊愧潛夫衰柳九秋芳盡歇衰柳萬家同亂葉隨沙草長條斷竹風烏棲寒日落雀語暮煙空更覺霜威重徒勞憶漢宫憂旱陸海知頻困三農望轉空雲根長斷雨月暈每多風灑血羣方泪依人一病翁憂來忽如搗漆室意何窮元福宫古松秋色入林古蒼松並十圍含風通碧殿戴日護朱扉慘逼蛟螭鬭深防虎豹歸回看玉臺淨差近五煙飛同田叔過摩訶菴出谷塵容暗投林爽氣滋雲迷人未到路熟馬先知為訪三支窟因看四照枝金繩歷可辨隨喜任吾期臘月草二日聞雁有感臘色如春色孤鴻已入燕南飛原不後北鄉一何先過眼風雲極經心氣候偏怪看千里翼却取衆人憐柴荆野漲屬鷗明林梢拂雨清夕煙生萬井春色過孤城笛犯梅花遠舟逾木葉輕間心會斯景吾自惜柴荆歸棹同李賓父不厭平湖棹秋天萬里青人家藏曲渚燈火亂繁星稍稍煙沒樹疏疏水照螢正逢漁唱起歸路且徐聽仲連邀同賓父伯翼遊南郊歸途遇伯佑復留飲其宅十丈藤花白千層樹葉青夏涼侵雨薄晚霽出雲醒水亂生文藻山移學畫屏還過大隱宅醉酒共沈冥病雀頓委雙飛翼空垂一命殘爭枝寧用巧擇木只須安世已輕顚沛人今後急難紛紛看故侣飲啄自江干悼賓父永失平生好江春慘獨吟其如新草意不似故人心雲只悲晴樹風兼悵夕禽徘徊昔遊處腸斷想遺音扶病海曙開林屋春風百倍光魚鱗翻鴨緑蝶翅挾鵝黃暖愛沙真軟恬欣草故香杖移慳病趾就近儻差強春郊江郊春始出新水坐輕舠草緑鵝兒喜天清鸛侣高柴扉村豎引笻杖野人操日夕西林下松風醉濁醪登樓照雨日未沒依風樓自陰江聲總到郭天影不分林鵠舉憐高翼雞栖惜遠心姓名吾足恥人或問遺金憩飲白茅荒村有茅店暫爾憩征塵荻火供寒具荆牀付倦人路遙鞍馬迫日短僕夫嗔此處難留醉勞勞苦悵神雪中同李五楊三聞九再訪豐二城南風雪泛舟頻五里江村不見人草屋閉門天欲晚竹籬夾樹岸將春青氊老去狂彌劇皂帽間來興頗新濁酒淋漓情爛漫白頭相對幾回親嘗新李十六丈宅熟杵香粳粒粒紅嘗新早得及秋風儘令蝦菜兼庖續不覺雞豚下筯空壟陌三時農父力甕餐一飽世人同年來旱潦淹多眚薄斂仍看比屋窮宫人斜玉顔蒙葬籞垣中封土纍纍個個同花發莫疑呈翠靨愁時元只閉深宫香車紅粉鬭芳塵黃帽曽蒙中選人倘得君恩如雨露試從青草認前身和楊伯翼泛爽亭傲殺城中萬户花小舟偏出泛晴沙晚天只繫南湖岸楊柳亭邊自一家豐正元先生越人先生自號天放野人考功之孫也少有家難年三十方娶與弟吉甫相友善分衣讓産即自處於匱不顧也性嗜學工詩寄情蕭散每杜門散髮翛然於修桐疏竹之下興到輒有詩索筆直書破窗頽垣俱滿客時過從至無從覔巾襪所深知惟沈嘉則楊伯翼先賓父數先生性不喜交輦上人以詩應酬常見一時山人行卷所録詩率為某公壽賀某公赴官輒唾之曰詩以道性情豈為汝輩行乞耶及見少年人作詩多雜調謔更正色相戒無為風雅罪人故時謂先生詩有林泉無朝市有懷弔無譽頌有流連無褻慢足盡洗詩家之陋其高懷似陶公而復少間情一賦所著天放野人集四卷感興白日麗西麓回光照幽林清
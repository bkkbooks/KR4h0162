冥力性愛佳山水以父在所出未嘗踰百里唯遊四明山曾過旬日當事甚重其名每羔幣及門輒謝不見屠長卿先生有言鑑水隱鱗作天際真人想其風格可見也年八十有一終於家所著詩曰幽貞廬草行藥吟登南城遙望四明山遙天晴景豁凱風來座隅披襟集良朋頗愜清燕娛落日照碧林餘暉散晴湖飛甍連繡闥燦若丹青圖撰策臨高城遊目窮九區石窗切層霄邈與羣峯殊黛色可攬擷丹梯時有無雲南富青櫺雲北繁白榆至今過雲客恆駕蒼麛車我欲稱東鄰築室雲中居惜哉無羽翼矯首以躊蹰載吟皮陸篇鬱鬱增煩吁兩聞武林之變寄吳興諸故人羇旅論相識諸君誼最真一為苕水别三見柳條新老去乘桴急時危斬木頻何因一掬淚霑灑赤墀塵訪豐吉甫兄弟爭高卧風煙各杜門緑尊忘歲月白眼睨乾坤壁挂魚腸劍竿挑犢鼻裩時人未之許捫蝨與誰論謝曹重甫惠布多君將白素逺寄小柴扉出自吳姬手裁為野客衣穿雲難辨色雜鳥不驚飛嘗怪桐江叟羊裘入禁闈賦得新柳送張孺宗江南二月柳裊裊出河邊未得為推轂聊持作贈鞭飛花常似雪帶雨正如煙感此經時别相看忽泫然潺湲洞四明山屈曲寒泉駛谽谺古洞幽消來石窗雪添作剡溪流嚴瀨難方潔桃源不用求何時真避世於此寄冥搜時事棘門霸上同兒戲青瑣黃扉但委蛇向使巖廊愼推轂豈令疆場屢輿尸長城莫倚連雲峻石畫須防纍卵危不是妄談天下事深憂牧馬踐園葵贈雲川先生一丘一壑道何尊老去行吟不出村煙水輕鷗隨釣艇晚風橫笛臥衡門花前釀黍邀鄰曲林下分甘及子孫間者濶焉如絶域不妨時與阿戎言送盧子明狼山迢遞隔滄瀛雪裏孤帆幾日程海味不能留客住江流只解送人行口無臧否追前輩老贍才情壓後生他日中原儻相遇卻君三舍避前旌李高崙處士德學字子敏先櫟軒先生曾孫也少讀曾大父遺書通尚書易二經初應童子試望見督學副使夜擁火上座諸試者俱散髮解衣帶一手提襪隸人簇摉之喊曰無弊始許執卷入即喟然曰此豈國家待士禮耶吾不可辱遂棄經生業不治專學為詩與蔡子行聞隱鱗汪長文諸先生倡酬以風格交相重為人寡欲性篤孝友長兄以太學生為郎喜客盛車騎供張所負錢至數百萬處士傾其業為償無少間言時聞隱鱗先生最以孝友稱然心重處士嘗曰子敏誠古人也使其子弟來執經於門郡太守丞思一見不可得里中名薦紳時置酒虛席迎處士為一往率葛巾大布浣衣直造上座或諷使稍更衣處士笑曰此吾家舊物也身布衣斯布衣耳終不易所著詩曰松扉集先忠毅公重之及開府貴陽攜其稿刻諸幕下適安酋反被圍版燬於火後曹能始先生復刻之閩中感詠立馬躊蹰東西環視懸崖百重江河千里悲風怒號白日傾只水有蛟龍山有虎兕停鞭永歎冒險匪是足有徽纆塗有戎戟身有毒螫心有苦蘗律我律度繩我繩尺善不足矜過乃衆射哀此菌人浮生逼窄士貴達觀澄懷探賾絶利一源恩害並宅生死互根晦明齊魄野鶴莎雞以時振翮造物有情運豈終厄籜冠花下山冠小林間野興長卑枝都不礙高枕亦何妨削木因為杖披蘿併作裳不隨風帽落深耐飲中狂向夕枋榆亦自適巾櫛每相忘多暇書長把無營病不妨疏峯餘日氣喬木半煙光向夕能明眼呼兒徙竹牀初入邳邸甚苦得金使君假寓始安含館何倉卒愁懷不可陳煮茶收敗葉炊飯用勞薪屋破風能厲牀欹月可嗔一枝因汝借稍穩客中身柴荆海宇秋初見庭花晚漸明風歸松徑爽涼到葛衣輕生死甘林類汙泥共屈平逢人偏自怯且閉小柴荆天王寺山雨藤花滿疏疏點寺門溼香通短屐空翠坐清尊屋破孤僧在碑殘幾字存惟餘石壇竹歲歲長兒孫瘦殘照穿虛幌寒風逗夕扉瓦欹簷蔓拆沙冷石苔稀涉世悲機事論交憶布衣敢因吾太瘦重問郭生肥病中寄聞隱鱗垂垂蘿薜滿牆頭寂絶藜牀雨乍收謀事每防山鬼笑採薪翻劇野人憂黃花翠竹生幽思日淡煙輕作好秋郭外寒江流細細憶君新水共鳬舟秋晚寄士晐松雲長戀芰荷衣轉見秋光到竹扉滿屋香風粳稻熟半天涼雨豆花肥能無俗物妨舒卷獨有巖阿少是非最憶蘇門山上客翛然高嘯古今稀尊勝齋紀事種成嘉樹遍柴門露葉煙條日可捫松果一庭簷瓦緑教人錯認是山村豐山人應元字吉甫正元先生弟也少於兄十歲因師事之時從受詩法遂與正元齊名稱為二豐曹能始刻其兄弟詩並傳於世吉甫所著曰鳴皋集與仲連憩松下清晨盥櫛罷偃坐松林杲其上巢白鶴其下生芝草葉清雲欲留影碧天如掃羣峯環湖水光霽搖蓬島手中把詩卷終朝共論討散髮一杯酒企彼商山老俯仰亦超曠平生好懷抱莫復言歸去移家苦不早苦寒行野色蒼蒼向冬末朔風如箭肌如割紇干凍雀何處飛貧子凛栗無毛褐層氷嵳峩川不流長河屢日停行舟蘆葦蕭然蔽白屋誰其居者心懷愁曲突無煙飢欲死晝伏藜牀冷難起但聞男啼并女號南鄰北舍皆相似向晚紛紛雲復揚嘹嘹嚦嚦羣雁翔白草未歸滄海上黃雲誰獵陰山傍古來烈士多耿介飢寒不若刀死快目今天子正思才􅮰中留得吳鉤在冬日間居冬日西郊外蕭條無四鄰林深巢病鶻霜白見行人採菊非輕世臨流莫悵神亦知回也意茅屋不辭貧寂寞寂寞逢秋半搴衣坐水濱可憐間盡日翻是病宜人葉落疑疏雨花開見小春為生更無計終是畏風塵雨中客至蕭颯黃梅雨荒村薄暮天槳聲來浦客帆影帶江煙蠶屋桑林裏雞塒麥積邊剪蔬須得酒簡取澀囊錢湖山晚酌巖棲真我願獨酌對斜曛湖色兼秋霽泉聲到夜聞人行谷口斷葉落嶺頭分浮俗無知已空山下鹿羣懷子行一間茅屋曉霜清嗟我懷君白髮生自擬空郊如絶域每依孤月到深更簷連野竹停雲影風度喬林獨鶴鳴聞向新知多欵曲故交零落豈無情桓村溪山窈窕入桓村兩度危橋到蓽門亂石為牆修竹圃垂蘿挂壁古梅軒常收野芋供賓客新著農書授子孫霜徑曉行紅葉滿誤將雞犬認桃源訪汪長文入大雷山迢迢疑入武陵溪不見桃花路亦迷屋裏青山成獨隱雨中深竹對幽棲縱談今古頻揮麈歷覽園亭每杖藜一宿仙都人世遠更於何地覔丹梯湖上竹枝詞小舠輕刺過灘沙九月丹楓賽錦霞七十二溪流欲遍只須隨路宿山家李􅘨菴先生德豐字子年賓父先生子也性高邁少負才氣常睥睨一世與賓父先生風格微不同既傳家學年十二即工詩喜讀李供奉集年十九為諸生屠長卿先生一見大竒之贈以神鉤篇年二十更嗜杜陵常坐一小閣中手焚香拂席然後開卷讀罷必肅容長揖而起自言吾二十以後大都毛竅經絡俱為少陵所漸漬能得其意中之神象外之景若如近家徒竊古人靣目則又生平所深恥而不肯為者也復慕潼關青坂書法不隱每有所感發一寓於詩嘗以事忤某薦紳適先生作登東津城樓詩語有所刺某公因録其詩示當事者遂坐危法中先生削籍乃杜門益自放命老蒼頭月釀清酤三石齋前碧梧一樹幹可五十尺下置苔石數片晨起掃石洗􅊦輒飲款扉者非車馬客即延入與共飲飲取開顔不及傾壺亦不問庖治意至輒索紙為詩詩成對客放歌時拔劍起舞客俱為逡巡避席先生不顧也初屠長卿常語人曰子年意高忤物恐終以筆舌取禍至是長卿自客歸為扼腕適沈尚寶雲將亦乘傳歸里兩人因共作竭楮書力請於有司白其寃竟得復諸生是歲試於鄉主者復謂其文太奇抑置乙榜愈拂鬱縱酒卒於家先生為豐考功甥生時考功殁已數年家所藏遺迹甚多遂造其妙購六朝宋元名筆十餘卷模本殘帖數十卷寶愛過於頭目與李觀察公論書法一篇為世所傳畫山水筆意疏挺亦有石田遺意先生風儀似葉鄭朗慷慨談天下事有古烈士風自年十二稱詩撰古文詞三十年遺草散佚後人無為收録者其所存詩文一卷起庚子訖甲辰五年所作曰庚甲草先生自為序然則先生終其身厪五年得為詞人耳先生於先大父稱少弟執禮甚恭往來尺牘尚存數十讀書太白樓醉後大書陶公飲酒詩贈先公筆力奇放俱藏於家燭下書懷呈郡中諸公大易垂聖訓括囊愼災愆豐也傷弓翮三復玩斯編眷言念明德忍無片語宣伸紙展微吟羞澀愧巴箋憶髮覆額時綴名弟子員把櫝當玄冬下筆驚潺湲使者撫頂歎先達倒屣延自顧頗頴特咫尺會騰鶱蹉跎二十載惜景悲逝川懶與叔夜并疢類休文纒時散松間帙稍慰竹下眠飛揚看同列勳名夢昔賢囊錐痛久處匣劎號重淵尚想十年字乘馬甘迍邅詎意無妄災蒼蠅點素氊投杼怯三至慈母寧免焉牒下如風霆玉碎不復全父老泣吞聲兒童走呼天所司欲加罪誰敢稱不然但孤聖代恩悵望朴棫篇斯民三代餘王路本平平微軀焉足論舉錯難倒懸悠悠歲月移忽忽天運旋蠖屈無終極大鈞常好還崔嵬有屠公高義凌層玄奇文拯涸鱗雲錦光新鮮抗顔出霞表吐詞落飛湍羣公實同聲感激亦聯翩頓令寒爐灰裊裊生微煙顧慚七尺軀却受世人憐緬懷翳桑餓報德知何年悽惻流哀音一致達者前病起見雪舟行犯凝寒纍日嬰壯熱通宵體如炙隂邪壅關節呻吟非一種展轉髮千結抄方煮松桂解汗強流􅀢稍稍胸膈疏陽明氣仍烈眼枯雙耳鳴壞都轉騷屑僵卧非故性呼兒炙破褐下牀尚恍惚舉止正蹩躠推窗坐始定捲幔見春雪陡覺毛骨聳心膽盡澄徹鱗鱗覆瓦重皚皚映空潔飢烏啄封條凍雀踴煙突古畫久蒙昧對此見毫髮焚香理繡句洗研分停泄纖毫思頗怪稜層氣自别支離把凍手點畫隨斷缺長吟識浩蕩憂時苦迂拙烽煙照屬國海外正流血蟣蝨生組甲鞍馬凍欲折哀哉黃竹詞感歎歌且闋苦寒行皇天不測威彌月窮陰結凍深日馭短氷堅坤厚裂敝裘雖被體濁酒新告竭兀兀室中榻寂寂户外轍尚留胸腹溫實恐指爪折野屋晝斷煙濕突坐鶗鴂白靣誰家子光采正鮮潔下牀日將午香厨供炮鱉氣蒸聞帳暖坐久呼耳熱不識江南寒那知薊北雪薊北今年十尺雪長安九衢鞍馬絶况復斗米三百錢餓尸填道翻烏鳶此中米價頻年賤如土販夫拋棄玉粒同流泉汝曹豈知造化損益理長安往歲白粱狼藉遺路邊題楊大臨墨鷹圖楊生寫生如寫草數枝霜幹何潦倒愁胡一靣坐側目殺氣稜稜向晴昊眼中乳雀分西東草間狐兔無行蹤楊生楊生掣化工貌出肝膽真英雄披圖一嘯空堂冷乘風下取愁天公送杜守白北上武陵溪漲如雷嗔武陵花開繡錦茵我欲攜家傍松竹君翻束帶趨風塵風塵澒洞蔽赤日鬼蜮魍魎爭趁人小吏善獲上官意美曹佳職須金銀眼中虎冠擁旌節流毒溟漲過暴秦但得輦輪奉山嶽遷擢迅邁通鬼神咄嗟世塗盡若爾君行欲往將誰因方今宰相嗤平津夜光按劍安抱珍渭川千畝等萬户彭澤五斗輕秋旻况植君家百年德諸甥玉立高嶙峋有兒如此蚤富貴何必京洛追華輪茶鐺風雨沸新緑糟床滴瀝傾餘春願君小試便拂衣碧溪短棹釣纖鱗不寐不寐空樓夜無端百慮生風隨哀雁至天逼野雞鳴舊業青藜火新寒白馬盟憂心何太苦欲覔紫芝莖庚子四月二十三日登東津城樓即事二首濤白驅新漲峯青湧夕陰悠悠滯鄉國宛宛及登臨並海增陴急緣江下柵深金湯更設險蕭瑟起長吟鈴鐸重城上斜陽已閉門艱難逢使節騷屑動煩寃潮洶通津沒風傳暮柝繁飽看今日事滄海幸無喧雪後窺園窺園並短牆掃徑自提筐霤雪垂巾重畦荽度屐香細腰眠藥杵折足仆藜牀懶主癡偏甚從渠菜甲黃借子懷兄西齋盆蘭綺石黃磁斗栽培小圃前霜簷齊趁日露井蚤分泉歲歲花開雪枝枝葉亂煙蒸忡三伏苦移我伴宵眠雪後焚香遲潘二春雪夜還積晨寒且閉關焚香清似水坐席靜於山小落梅花白初攢杏蕊殷安仁詩最好今日擬開顔旅食旰食翻難飽飢腸轉覺微路危身易賤家遠夢偏歸河北塵沙異江南水木稀倚刀宵醉舞此日意全違同宣遠過伯起夜酌歲晏微生事間情共竹窗山容窺遠閣風色動虛江憑几因香柚燒燈近寶幢芙蓉看滿篋相對續銀缸上南大司冦趙公一代清朝貴知公獨邁倫崢嶸真在望氣志不無神指髮匡時疏批鱗報主身幾年嗟賦鵩特詔起懸鶉皂蓋旋通楚朱幡再下閩玉壺心可瑩霜幹氣俱伸肝膽時相假英雄或有真無媒恩最渥不次擢仍頻畫省貂冠美仙臺絳服新南天開政府北斗耀楓宸闒茸看流輩精靈仗老臣職司崇管轄喉舌想經綸天步憂方棘民生會始屯關山悲送角原野慘飛磷長戟羅江界高鋒彗海濱逗留仍失利消息每增嚬封號終難假開邊詎易論誅鉏看執斧逮繫痛埋輪慘淡張皇日蒼茫涕泗辰無才滯江海有泪灑風塵舞劎終宵起書空滿徑巡青冥推羽翮門巷掩松筠欲盡荒村臘將回海國春蹉跎仍促迫流落更酸辛長物惟書卷生涯豈釣緡鸊鵜堪自照鸚鵡向誰陳膽志違微力頭顱呀大鈞調停看此日斟酌仰前民立意終須遠全軀未足珍看公多氣象努力畫麒麟入大雷山訪汪長文先生隱居絶谷鍾靈久高山仰止初煙霞迎毳衲篠簜掖籃輿壑響咆哮轉巖花躑躅舒委蛇松謖謖高下麥與與徑窄維通鳥藤長欲挂狙僕夫爭喘息跋履正次且忽度崔巍盡徐開縹眇居頻年懷勝地此日識高閭峻閣經營始崇墉震蕩餘升堂聞杖屨披閣見圖書硯石殘髹匣泉香溜石渠墨翻金鸑鷟水滴玉蟾蜍竒字紛誰扣芳名籍不如像形窺日月搆體及蟲魚只益形骸古兼容禮法疏迎雲絇履上對酒幅巾除劚笋披蒼蘚芟蒲出翠菹吾生欣共代避地想嵒廬霧角城籌急風濤堠火噓南鄰如可卜還擬共揮鉏舟次毗陵朱定國明府遣使邀至沙馱淹留僧舍存款甚殷瀕行以手製拙集序兼官俸十千錢見遺賦謝明海辭家日毗陵駐舸時郎星百里映驛使一緘馳捧匣渾疑夢開筒轉覺悲先邀十日醉為拭兩行洟别遠那忘會交真詎獲辭舟輕逗急水夜冷憶朝曦淅淅風生岸滔滔浪拍涯入舟神屢喪脫險氣全疲稍籍僧簷日微溫病客肌六年知已靣咫尺故人期一見歡難盡頻過興未移銀魚春巳得沙蛤土偏滋看畫雲浮壁傳觴玉射巵墀陰斜臥柳庭草碧分蘺政簡勞民息官間隱吏宜從來飽經術不獨在文詞痛我肱三折遭時數屢奇高文增氣象孤憤寄嗟咨倒篋傾官俸封題慰旅羇不才甘衆棄何幸受公知拜賜驚隨寵懷緘涕染頤感深惟有泪情至豈無詩馬首行將北鵬圖奮敢遲終同酣帝里庶足報恩私長安感事厰衛人傳六月涼太陽那得照飛霜皂衣短帽隨畨手出入天街亦有光武林遇五三姪歸自曹南去日芙蓉兩岸長歸來楊柳遍河梁春江一葉吳山外才到中流是故鄉甬上耆舊詩卷二十三

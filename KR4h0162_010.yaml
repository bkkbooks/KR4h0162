body:
  text: 甬上耆舊詩卷十監察御史胡文學編行太僕卿陳石亭先生沂字魯南先世徵入太醫院遂居南京先生體短疎眉目風神朗秀五歳能屬對八歳能摹古人畫十歳能詩十二歳作孔墨解赤寳山賦傳誦人口名曄然起時野亭劉公白巖喬公柴墟儲公俱海内碩望相繼來官留都並引先生為忘年交及中進士改庶吉士年已四十有八為夙名士矣授編修進侍講所撰進講章善寓諷諫上心識其名以見忤永嘉出為江西㕘議多惠政遷山東㕘政值歳灾後先生身行部發官帑市牛給民墾藝且寛其租歳既熟又為捐除種馬薪木運部諸猺民得甦息入賀遇永嘉長安道上勞之曰先生久外行召矣先生曰齊民困甚能行吾疏殊勝吾受徳也永嘉意拂然遂改為山西行太僕卿力請老歸里先生性篤孝友事二親死生情文備極人所難及素亷于財營弟妹婚嫁貸以備禮聞鄉閭有緩急匍匐救之惟恐後至甬上人客留都先生盡與款接情若比隣不稍分疎近晚年築遂初齋于家園杜門撰述絶意世事所著詩文拘虛集總修金陵志南畿總志山東通志自撰翰林志金陵世紀蓄徳録誨似録花巖志游名山録晤言詩談諸書南巡舊京歌横戈八駿戰功收夾舸雙龍水面游紫盖風雲過沛上錦㠶煙月下揚州迎鑾驛下萬艘齊白浪排空赤岸低總謂北來天塹隔豫章城只在江西六龍神運起江淮五馬歌聲再渡來千古金陵王氣盛彤雲曾繞鳯凰臺山櫻江藕薦時鮮况有嘉魚出錦淵聖體從誰問行在朝廷北極是幽燕宫詞瓊島春泉下玉溝年年歳歳御泉流無端夜雨生新漲流出宫墻是外頭後庭仙樹是誰栽春盡重門鎖緑苔聞説翠華籠燭過上陽宫裏㸔花來少年行君不見昔日髙陽之酒徒解貂市上親行酤自笑奮力非耕鉏盡日博塞為摴蒲袒跣上踞聲豪麄得意應手皆成盧劉毅家儲甔石無擲取百萬時須臾千金散盡輕泥塗五侯七貴猶雞雛唾視不足當昆吾婦女見辱國邑屠僭據上位身稱孤前途一敗面縛俘還如六博勢向輸采雋不來徒爾呼吁嗟乎翻轅覆轍非險塗安得恃勝為長驅江上二首江水日東逝飄風自東來水性惟欲下揚波復牽回人事有順逆欲發還徘徊飄風曾㡬時息櫂且銜杯息櫂復息櫂櫂息歌亦稀歌中有何益但訴志多違流水宜東去從風合西歸出門豈無定中道復誰依除歳書懐車前斷深壑舟際陷重氷駕驂不容止迴舵猶未能清漏此年盡初旭明歳升無歡厭栢醑顧影怨蘭燈閨中卜云近燈花指為徵顧氏園佳麗樓西羅市前王臺謝館地相連朱雀門通朱雀艦鳯凰山帶鳯凰泉建業豪華古稱絶十二宫城開綺陌棨㦸高門卿相家山池曲榭神仙宅六朝家世舊風流猶説當年顧虎頭竹密花深如樂苑窗盈池繞似滄洲東晉香爐金籀字南唐畫障澄心紙米家圗畫鄴侯書平泉樹石烏皮几逍遥日渉自成趣樾館煙庭非一處古來不數辟疆園肯使王猷肆然去阿戎來候小肩輿歩屧花間入隠居坐久不知山色瞑仰㸔松月夜窗虛對月贈劉按察元瑞入滇南憶昨㸔月與君同月在蕭臺煙樹東桐花香吐石壇冷松枝影落溪堂空可憐今夜高城隔况復蟾光漸生魄照我思君欲斷腸照君向我天涯别天涯雲霧何茫茫千山萬山途路長從知馬上㸔圎缺相逐君行漸異鄉重别行送李川甫帝城門外揚車塵盡日勞勞行路人人生離别重繾綣况復送君當暮春昨日花開復欲落黒髪幾時不為樂我今向衰君少年我少年時亦如昨燕臺黄金照日邊古人已往今誰賢世事多悲更難語繫馬躊躇尊酒前宫柳嫋嫋春聲裏隂隂曉色中縷垂金屋暗花散玉樓空凝露啼秦苑因風鬭楚宫不知行輦處幾樹近簾櫳華葢殿入候侍從趨中禁天閽夜暫開星辰宿飛棟風露下層䑓設炬人初動傳香駕欲來聨行肅裳佩未敢更徘徊内苑涵碧亭苑入黄金塢橋迴碧樹灣龍池觀九島鼇禁覓三山溜轉雲車急花深月殿閒從來人罕至御榻在中間還宫寳騎出長楊輿人入建章池烟香合暝宫燭月籠光鼓角春城閉樓䑓夜曲揚從兹罷巡幸四海奉時康聞討宸濠有作吳濞窺覦久南方竟失寧帝心宣四國天討慰諸靈多難何煩見流言不忍聽可憐親睦禮哀痛出彤庭觀音山江閣與顧英玉中秋㸔月鷲嶺宿龍宫凭䦨一望中天遥滄海盡月小大江空亂石穿寒溜虚廊度晚風只疑雲漢渚偶爾客槎通與華玉登金山江心擁鷲峯金界出芙容僧向空中定人從水上逢縣燈動星月傳梵起魚龍浪説蓬瀛路鯨波更幾重再經岱嶽下岱嶽横中野危梯歴太勞望時初不異登處始知髙天地形何大風雲意自豪雖云容土壌安得補秋毫上城北望關鑰雄三險王畿實在燕黄塵回躍馬青海絶飛鳶劍閣何曽恃金城不可捐輪䑓如有詔此意答皇天漫興獻璞當年出今懐白玉歸尚餘松檜楫未老芰荷衣林靜鳥無語山閒雲不飛此中空寂久那復問禪機山中喜雪飛雪仍殘臘風光改嵗華入丘迷鸛垤向水淨鷗沙凍栁先飄絮枯梨早著花地爐煨濁酒應譲野人家過吉水永泰寺亂峯迴絶澗荒殿掩空扉當路草盈尺遶坦松數圍定僧離世久驚犬見人稀午坐同齋供山厨煮蕨薇山寺漫興出郭少人事更居林壑間僕因隨主懶僧反愛吾閒碧草生滿地白雲常在山城中㑹相問未卜幾時還正旦即事帝輦時巡久未回天門遥拜重徘徊封箋自向慈宫進方貢還同異國來春轉青旗開羽仗日臨金榜上樓䑓帷城尚在燕山外誰獻正元萬壽杯憶昔清宵藜火帶星光天禄曽為著作郎門下候朝深坐館殿前迴院曲通廊羣公次第多含笑滿袖氤氲尚有香黄屋朱扉照初日中官兩兩玉䦨傍紫宸朝退下青扉侍從花間過錦衣金吐鳳皇香不散玉傾鸚鵡醉方歸楹髙甲帳雲霞色官冷腰牌氷雪輝一自夢回天萬里長安空見塞鴻歸兩朝稽古備詞臣上逼仙班壓縉紳避路火城傳衛士具餐晨館候庖人春深玉署翻紅藥日晚金河出素鱗莫為涼飈惜團扇向來共奉受恩頻江上呈華玉龍江東下水疑空飛鳥流雲落鏡中千里晴光遥漾日滿船秋色澹無風青山舊國知何處芳草離情去未窮晚折蘋花思對酒燈前還有故人同夏日雜興下俯江流百丈深上臨山殿樹隂隂中原正朔回天地聖祖髙文照古今過雨輕雲虹未斷浴波餘彩日初沈樽前散髪疎狂甚轉席移觴風滿襟野寺清凉舊有名空廊還傍石頭城侵堦竹䕃差差轉入座荷香細細生西府山前車輦路南唐宫裏轆轤聲氷漿玉椀傳𤓰處想像君臣萬古情楊栁微風岸口生青溪泛舸月中行空驚宿鷺迎橈起却放流螢入幔明大計劉琨惟坐嘯偏安王導亦垂名當年燕樂陳魚藻豐鍋由來是帝京水邉樓榭晚風和香送陂塘十里荷隔浦船回紅艷淨滿山蟬響緑隂多居人不省前朝事溪女猶為子夜歌飛鷺浴鳬俱自適老翁相對意如何宸濠廢宫章水故宫何處是幾株衰栁亦從遮金書葬地無劉濞玉樹歌聲有麗華秋日放鷹芳草陌春風飛燕野人家諸公䑓省多休暇每憶當時一嘆嗟匡廬瀑布泉瀑水來天上犇流入大荒氤氲元氣合澎湃海波長暝落明河影晴交白日光星源窮有穴崙嶺倐移方潤谷千林濕空音九夏涼五峯喧潄石三峽動飛梁入澗懸猿絶穿雲度鳥妨玉垂風不㫁珠散雨俱揚逖引禪心吸甘分客味甞無因修淨社終日坐相忘春草夜雨江南夢春風陌上情東皇如有意移向玉堦生青溪橋二首遥山亂雲樹流水淨溪沙日暮行人絶危橋一徑斜浮雲亂出山落日鳥飛盡獨立向溪橋寒流照容鬢大駕西狩還京百官出候于徳勝門遥聞振旅入居庸八駿歸來御六龍莫道榆關消息近沙河一水更千重直望氤氲紫氣遥萬重飛控馬蕭蕭鴛班虎隊皆戎服兩度迎鑾徳勝橋天皇自納簡書回神武將軍可汗才仙仗不煩陳輦路籠街喝道數聲來錦標金胄照戎衣挾羽横戈自將歸萬騎羣中天馬出一時傳到疾如飛放内苑諸禽多年調養在雕籠放出初飛失舊叢祗為恩深未能去朝來還繞上陽宫宜人馬氏附名閒卿字芷居金陵人先生之繼室也先生喪耦知其賢而有文遂委禽焉年八十尚不廢咏吟書法蘇長公得其筆意頗與先生相類善山水白描畫畢手裂之不以示人扁其室曰芷居詩名芷居集苦雨終日雨翻盆愁人欲㫁魂嶺雲生屋角埜水没籬根楊栁深藏徑梨花靜掩門聲聲偏入耳寂莫自黄昏暮秋野色滿園中閒情立晚風菊花含雨艷楓葉醉霜紅有感春風冷落後秋圃恨開遲總是宜男草傍人也未知暮春紗牕睡起靄朝暉滿院鶯聲花正飛閒裏不知因甚事春來容易送春歸七夕靈鵠成橋事有無人間今夜憶黄姑倚窓坐久秋聲動一葉西風到碧梧按察副使陳后岡先生束字約之為兒時已竒慧絶倫日誦數千言試之對輒應聲就數又竒中諸公大竒之稍長出從里中師所講授經義先生率臥勿聽乃益汜濫百家上下屈宋班馬之間所為古文詞頗自引重視同輩俱娖娖不足伍既中進士入翰林與唐應德王道思諸人益刻厲為古學性亢潔不喜逢世張桂受上殊寵朝士盡奔走顧獨慕先生名欲相款引終不一折節歳時上夀遣吏投刺馳馬過其門諸老恨之入骨呼為輕薄小黄毛同輩亦多姗螫者乃出為湖廣按察僉事置蠻劇之地以重困之彼意先生徒能負氣持虛言彈射必不肯自抑精㑹計聽斷修舉吏事逮其敗當即擯之而先生獨能勵志益舉其職終無詞罷免稍遷視學河南既歴劬瘁常鬱悶無聊再疏求去不得竟縱酒屬疾嘔血數升而死年纔三十有三道思適同藩入枕其股而哭之與吾鄉周大卿共經紀其䘮應德不逺千里哭之越中為刻遺集行世銅雀妓銅羽遡秋風金樓夜帳空舞鸞君詎見調鳯妾猶工淚竹愁難滅采菱歌已窮翻憐秦帝寵驪下許相同高陽行二首髙陽年少事横行重俠由來不重生奪得寳刀摇雪色騎将飛馬蹴風聲北風吹隴簸黄沙縱博千場日未斜白劍殺人丹劍舞笑歌踏入酒姬家夕霽對月有懐唐一編修終日滯飛濛三徑絶來往檐溜一以捐族雪漸迴蕩長飈纈河出月華依波上微微辨林柯稍稍晰塵鞅槿委猶餘泫萱開更映愰草螢掠明流土蟲疑晝響命酒陶清虚解襟納新爽懐人邈不御樂來何由賞沈思永終夕景同神宜徃過徐李二子再游東林寺入林禮名禪山深變炎夏清飈激層檐流水注户下孤磬逺烟微長廊飯僧罷暫結塵外踪稍懐逺公駕虎去識餘溪蓮開見遺社四禪邈難依百齡竟安假㝠心合委和曠覽齊物化疎達任吾生塵縁兩相謝望湖亭遲唐子䇿䇿下危磴風前立小亭獨游坐超越屬思臨深冥野色向人盡一湖含暉明雲開知日處其上峯遥輕目送鳥漸逺嘹然遺我聲相感適無謂于焉觀物情坐念所期子影影塵中行二三同志夜酌碧雲寺分韻曠途疎俗寰靜域臨飛㟽形苞隠淪勝勢抗清虚表鷲嶺互盤旋龍泉吐涓𣺌雪竇迴暑清雲構翳空小分池牣法鱗作埒抽金草覺花明冬春香蘿掛昏曉微尚在幽寂乗休恣探討筏海滯塵縁游山訪真了指景晤已深延賞悰非少適感伯倫情兼希魯陽妙流觴酌駛湍揮手招頺顥任達本所經燕樂苦不早直躭真聖理勿為俗賢道嵢峽舟中遇江于順提學考績北上贈别因成長句故人相逢清溪口斷岸維舟一尊酒醉愁折栁背河關笑㸔垂楊生左肘青山沈沈秋日光颯然海氣飄微涼忽憶曽為東觀史此時君作尚書郎昨日蛇年走賢士别來意氣期如此三載不見鬚眉存還是豫章一男子落水一去時不還我今蹬蹭來山藩寸心指著向知已片時㑹對成分翻近日徵賢徧都邑東巡西祀羣賢集宰相閣東禮通儒将軍門下容長揖世塗參錯詎可料英雄况復非常調喘息余憐軛下駒文蔚爾為將變豹握蘭在身身自知投璧向人人不譽别去相思一調笑知爾甘泉不上書過武溪楊隠君草堂清溪幽隠處白首性情閒鶴起開松徑風歸閉竹關道書堆几上耕耒挂牀間坐悟忘言理令人不解還石灘石劣不受鑿水歸時礙行却令無競性翻作不平鳴逆折聲猶壯崩騰色自明我行殊昧險于此獨嬰情過吴維隠居委巷疎塵宇空齋問隠淪應門兩童子拄杖一閒身下馬見深意焚魚知久貧相㸔祗有笑握手更何陳漳水别唐一太史之洛漳河流不極離思渺難裁可堪今夜月復照别時杯路向銅駝去人傳金馬來南征能作賦遲爾二班才春江夜泛日昏貪利涉繫榜自相鳴水動春星亂山潛野火明幽虚機盡息澹泊道初成豈有形容在猶然問姓名與田提學行清化道中授服驚窮節離居感客情霜清沙鴈至露白草蟲鳴到谷㸔天籟隨山採地精幽尋祗得性游宦不期名公安得唐應徳村居詩酬贈應是歸休日安貧得所如鹿裘新著便貝帶舊遊疎返舍因爭席還山羨卜廬閉關無逺意不著絶交書偃息荆溪上明時挂一瓢帶經收雨麥抱甕汲春苗石室寧期道茅齋已混樵時聞田社客伏臘每相邀春日渡漢陽春風淡微雨了了見前川背水千家閉連山百雉縣鶯啼江上樹人散渡頭烟此日乗流者羈思殊未捐春晚郊行遲日出郊圻悠然塵事稀野隂堪結葢溝水欲流衣俠客探丸返佳人抱瑟歸喧喧四隣夕徙倚向斜暉禁中對雪禁裏霏霏朔氣饒縈風飄度薊門遥初翻金馬疑飛絮漸集銅龍似薄綃百子銀題全合色萬年花發半封條縣聞睿詔賡黄竹佇待東曺染赤毫臨淄舟次柬唐一太史客中相見倍情親日日追歡意未申近水割鱗時供酒逺山啼鳥盡關人疎慵且喜隨中散鄙薄那堪作外臣愁計别程能幾日未須岐路已沾巾病後還朝毘陵唐編修兄弟攜舟相送醉中話舊因懐任二考功次韻作時唐方應命起廢舟迎浦樹緑參參笑傲逢君僻性耽陸氏弟兄原莫逆龎家主客自來諳病中握手愁能奈廢後還朝志豈堪惟有同袍應問訊定言幾日發山南贈汪御史山居小山卜築背孤城大隠青春早謝名門長緑蘿時挂麈溪分流水幾投纓霜前鳥去收遺果雨後鴟肥拾野羮寂歴小亭無一事時從羽客話長生秋日分祀孔子廟屬聖重儒宗當秋秩祀隆文明涓上日祈翼攝𤣥工松柏開新廟笙琴似舊宫居非一畆儉奠即兩楹中玉簋馨明徳金聲辨素功從公百辟戾陟配四科同有侐神如在無言教已通升堂獨何幸俎豆挹前風送唐子朝長陵周王東定日虞后北巡年虎旅隂山轉龍舟夜壑還珠丘開白壌琳殿閟𤣥泉示儉裁流水崇威迥跨邉雲中分地脉斗極應星躔弓墮天難陟冠遊月尚還光靈六聖扈警蹕八神傳南至恭明祀東曺簡上賢瞻依徒欲贈悽惻未能宣咏神樂觀梅花素質舒元圃清芬裊碧紗自將幽獨意不逐艷陽華避暖遲開葉淩寒早著花瓣輕飄易墜枝曲影從斜襍雪明春砌隨風入暮笳何須飛寳靨長此奉仙家入閩海國深秋别山關入望窮人家青壁裏鳥道緑蘿中地暖收蒟葉天寒折桂樷嵐蒸晴亦雨瀑落靜還風靈藥繙經識訛言待譯通問耕留野老賦食與山童直是忘機甚非將大隠同上已五都皆禊渭百戯盡臨渠自憐妨太㓗不事更修除夜泊羊原萬曲寒流滙碧灣千家烟雨閉柴關來愁烏帽生人悶到喜青山對客閒恭人董氏附山隂人侍郎董中峯先生女也生甚慧待年于家中峯嘗曰吾女非得奇男子勿字徧視里中兒無可者偶與吾郷張文定公同游禹穴間從容具言尚壻事張公曰吾里有陳生家雖微其人才足壻也中峯乃與其夫人特來甬上試召陳生垂髫敝衣膚神玉映叩之無不響答試以詩文揮筆如雲烟中峯大喜即命日為婚相伉儷甚篤然中峯固知其夫婦良不永年及后岡没未幾恭人亦卒泊淮代外答唐太史十年生事半同君萬里傷心逐楚雲逺浦維舟潮欲上平林對酒月初分逢人牛馬時堪應到處鳬鷗漸作羣共是機情忘已盡欲將通塞任斯文甬上耆舊詩卷十

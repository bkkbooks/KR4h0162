  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0162_WYG_001-1a, image: WYG1474/WYG1474-0002c.png}
body:
  text: 甬上耆舊詩卷一監察御史胡文學編吳越春秋稱越地東至於鄞即所謂甬上也自後遷置不常一時人物與句章餘姚各相引重今録其定為鄞人者四家以冠此集之首文大夫種字㑹鄞人見吕覽髙氏注越滅吳其謀居多見越絶諸書既以伏劍死越人哀之葬于重山一年其神去與子胥共出沒江海間晝夜兩至今浙水之潮前揚波者伍子胥後重水者大夫種里中王深寧先生論之曰世多謂大夫不能從五湖游謂不知幾不知保身義也致身亦義也使種蠡俱逝國誰與守且蠡楚人可以去越大夫即越人婓婓遲遲不忍去父母之邦忠臣之志也斯可謂善論古人矣越王句踐五年入臣于吳羣臣送至浙水之上臨水祖道大夫種前為祝其辭曰皇天祐助前沉後揚禍為德根憂為福堂威人者滅服從者昌王離牽致其後無殃君臣生離感動上皇衆夫悲哀莫不感傷臣請薄脯酒行二觴大王德夀無疆無極乾坤受靈神祇輔翼我王厚之祉祜在側德銷百殃利受其福去彼吳庭來歸越國越王既滅吳伯諸侯置酒文臺羣臣為樂大夫種進祝酒其詞曰皇天助祐我王受福良臣集謀我王之德宗廟輔政鬼神承翼君不忘臣臣盡其力上天蒼蒼不可掩塞觴酒二升萬福無極我皇仁賢懷道抱德滅讐破吳不忘返國賞無所吝羣邪杜塞君臣同和福夀千億觴酒二升萬嵗難極大里黃先生鄞人見㑹稽典録秦博士遭時坑廢儒術因與諸博士東園公綺里季夏甪里先生避世隱於商山漢髙帝時遣人聘之四公不甘仰天歎而作歌謂之采芝歌髙帝欲廢太子留侯為畫策禮請此四人共輔太子入見上四公年俱八十餘鬚眉皓白故謂之四皓太子卒得不廢事詳留侯世家後黃公歸老于鄞卒葬大隱山亦稱黃墓樂府載琴集曰採芝操四皓所作也其詞曰皓天嗟嗟深谷逶迤樹木莫莫髙山崔嵬巖居穴處以為幄茵曄曄紫芝可以療飢唐虞往矣吾當安歸其詞與崔鴻所載不同今並存之采芝歌漠漠髙山深谷威迤曄曄紫芝可以療飢皇農邈逺余將安歸駟馬髙蓋其憂甚大富貴而畏人不如貧賤而輕世禮部尚書賀先生知章字季真行九生小溪之響巖證聖初中進士超羣拔類科初授國子四門博士歷遷禮部侍郎兼集賢院學士一日併謝時稱兩命之榮又充皇太子侍讀正授祕書監開元中從封東嶽奏定儀注先生性放曠善談笑自號四明狂客又稱祕書外監每醉輒屬詞筆不加㸃俱斐然可觀為學士時每與人燕語好事者輒隨筆鈔記俱堪參詠天寶三載因病疏請度為道士放還鄉里上許之仍拜其子典設郎曽為㑹稽郡司馬使得侍養御製詩以寵行皇太子以下咸就執别先生歸後築室四明之鹿亭樊榭時往來稽山卒年八十六葬于㑹稽肅宗以侍讀之舊贈禮部尚書初神龍中先生與越中賀朝萬齊融楊州張若虛邢巨湖州包融俱以吳越之士名揚上京人間往往傳其文獨先生最貴晚年李杜二公益相推重奉先生為宿老此所以名冠一代詞人之首也自後稱四明輒曰賀監舊山川蓋詩人名重本朝未有過先生者史家稱唐中葉將相有功帝室惟鄴侯郭汾陽先生之識鄴侯李翰林之識郭汾陽此豈當時詩人所能及耶開元十三年禪社首山祭地祇樂章迎神用順和至哉合柔德萬物資以生常順稱厚載流謙通變盈聖心事能察增廣陳厥誠黃祇僾如在泰折俟咸亨皇帝行用太和肅我成命於昭黃祇裘冕而祀陟降在斯五音克備八變聿施緝熙肆靖厥心匪離登歌奠玉帛用肅和黃祇是祗我其夙夜寅畏誠潔匪皇寧舍禮以琮玉薦厥茅藉念茲降康胡寧克暇迎爼用雍和夙夜宥密不敢寧晏五齊既陳八音在縣粢盛以潔房爼斯薦明德惟馨尚茲克遍皇帝初獻用夀和惟以明發有懷載殷樂盈而返禮順其禋立清以獻薦欲是親於穆不巳裒對斯臻皇帝飲福用福和穆穆天子告成岱宗大裘如濡執珽有顒樂以平志禮以和容上帝臨我云胡肅雍皇帝還宫用太和昭昭有唐天畀萬國列祖應命四宗順則申錫無疆宗我同德曽孫繼緒享神配極送神用靈具醉代順和神具醉杳熙熙靈將往眇禗禗顧明德吐正辭爛遺光流禎祺奉和御製春臺望青陽布王道𤣥覽陶真性欣若天下春髙逾域中聖神臯類觀賞帝里如縣鏡繚繞八川浮岧嶤雙闕映曉色遍昭陽晴雲卷建章華枝的皪丹青樹皓氣氤氲金玉堂尚有靈蛇下鄜畤還徴瑞寶入陳倉自昔秦奢漢窮武後庭萬餘宫百數旗回五丈殿千門連綿南隥出西垣廣畫螓蛾誇窈窕羅生玳瑁象昆崙乃眷天情興隱恤古來土木良非一荆臨章觀趙叢臺何如堯階將禹室層欄䆗窱下龍輿清管逶迤半綺疏一聽南風引鸞舞長謡北極仰鶉居望人家桃李花山原夜雨度仙家朝發東園桃李花桃花紅兮李花白照灼城隅復南陌南陌青樓十二重春風桃李為誰容棄置千金輕不顧踟蹰五馬謝相逢徒言南國容華晚遂歎西家飄落逺的皪長奉明光殿氤氲半入披香苑苑中珍木元自竒黃金作葉白銀枝千年萬嵗不凋落還將桃李更相宜桃李從來露井傍成蹊結影矜艷陽莫道春花不可樹㑹持仙實獻君王曉發江臯聞曙鐘輕栧理還􅞤海潮夜約約川露晨溶溶始見沙上鳥猶埋雲外峯故鄉杳無際明發懷朋從送人之軍中常經絶脈塞復見斷腸流送子成今别令人起昔愁隴雲晴半雨邉草夏先秋萬里長城寄無貽故國憂奉和聖製送張說巡邊荒境盡懷忠梯航巳自通九攻雖不戰五月尚持戎遣戍徴周牒恢邉重漢功選車命元宰授律取文雄胄出天弧上謀成帝幄中詔旗分夏物専討錫唐弓帳宿伊川右鉦傳晉苑東饔人藉蕡實樂正理絲桐岐陌涵餘雨離川照晚虹恭聞詠方叔千載舞皇風奉和聖製集賢書院成送張說上集賢學士賜燕得謨字西學垂𤣥覽東堂發聖謨天光燭武殿時宰集鴻都枯朽霑皇澤翾飛舞帝梧跡同游汗漫榮是出泥塗三歎承湯鼎千歡接舜壺微軀不可答空欲詠依蒲題袁氏别業主人不相識偶坐為林泉莫漫愁沽酒囊中自有錢回鄉偶書少小離鄉老大回鄉音無改鬢毛衰兒童相見不相識笑問客從何處來離别家鄉嵗月多近來人事半銷磨惟有門前鏡湖水春風不改舊時波采蓮曲稽山罷霧鬱嵯峩鏡水無風也自波莫言春度芳菲盡别有中流采芰荷答朝士鈒鏤銀盤盛蛤蜊鏡湖蓴菜亂如絲鄉曲近來佳此味遮渠不道是吳兒咏栁碧玉妝來一樹髙萬條垂下緑絲縧不知細葉誰裁出二月春風似剪刀吳商浩耆舊詩前三十卷刻成巳在校讐萬生允誠趨白余曰頃録四唐人詩及吳商浩僅載其名氏餘不詳至所録詩塞上篇末曰分明更想殘宵夢故國依然在甬東然則商浩定為甬上人也當附録賀監後余因念宋史藝文志集部有鄞人詩九卷應是宋全盛時所輯豈專録其本朝人耶抑及唐以前耶但其詩得藏諸內府應自足傳而今絶不可得正未知當時所列何人所録何等詩以吾里中先賢而茫茫千年前不見作者每念及此輒為廢寢食後録方外耆舊詩至噩夢堂尊者遍覓諸方僅得三首適吾友明介禪師自吳中來云曽于梵舍值一僧出其槖中詩二冊一為吳門釋法杲雪山草一為甬上噩夢堂集且曰此法門二寶也可識之介公間為余言余聞之驚喜遂屬介公他日若更相值當專鈔夢堂詩而介公云亡併為一慟悲矣夫世間有竒文字每苦不得留即幸得留天地間而徒一二人愛護亦復何益使論衡未傳彼中郎誠非俊物也余故為具述於此倘海內學士家有藏宋人選鄞詩九卷及方外諸公收得夢堂尊者集遙憫求者苦心不惜郵寄以全一方文獻當十倍償之他涉甬上詩文有在此集之外者俱同前例嗟乎浦江之人物可徴赤城之遺詩不墜故國人風愾然夢寐唯藏書家留意焉塞上即事身似星流跡似蓬玉關孤望杳濛濛寒沙萬里平鋪月曉角一聲髙捲風戰士沒邊魂尚哭名王獵處火猶紅分明更想殘宵夢故國依然在甬東長安春贈友人繁華堪憶帝城春粉堞青樓勢礙雲花對玉鈎簾外發歌飄塵土陌邉聞幾多逺客魂空斷何處王孫酒自醺各有歸程千萬里東風時節恨離羣宿山驛文戰何堪功未圖又驅羸馬指天衢露華凝夜渚蓮盡月彩滿輪山驛孤岐路辛勤終日有鄉關音信隔年無好同范蠡扁舟興髙挂一帆歸五湖北邙山北邙山草又青青今日銷魂事可明緑酒醉來春未歇白楊風起栁初晴岡原旋葬松新長年代無人闕半平堪取金爐九還藥不能隨夢駐浮生秋塘曉望鐘盡疏桐散曙鴉故山烟樹隔天涯西風一夜秋塘晚零落幾多紅藕花泊月身逐烟波魂自驚木蘭舟上一帆輕雲中有寺在何處山底宿時聞磬聲水樓感事髙栁螿啼雨後秋年光空感淚如流滿湖菱荇東歸晚閒倚南軒盡日愁甬上耆舊詩卷一

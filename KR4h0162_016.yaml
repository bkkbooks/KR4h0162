body:
  text: 甬上耆舊詩卷十六監察御史胡文學編先肅齋先生諱鼎字玉鉉鄴嗣四世祖也本宋太尉忠襄公顯忠後宋末徙家于鄞隠居三世至先生博學有詩名亦工書法閉門寡營自稱大隠里中稱為肅齋先生雨歎一春苦積澍萬井坐奔流湖海應同溢甌寠可望收始知天大漏不信地全浮終日垂髙望能無杞國憂楊處士起汶字浩卿别字熙正其先世再十一君生徳祐之末隠居不仕作詠史詩自見浩卿生元末亦不仕以貲甲于鄉洪武中治豪右方嚴浩卿自以族之豪也懼及乃散其家千金避居葑里因作移居詩至今傳之子範即栖芸先生弟起哲字彦卿亦能詩移居葑里擾擾征徭八九年千金散盡一身全移居近向三家市負郭惟餘半頃田滿圃松葵含暮雨繞門桑柘靄春烟日髙柴户無人到醉向花隂自在眠嘉興花繞樓臺水繞城舟人說是古嘉興小筐采藥烟中出短笠分秧雨裏行隠隠河魚吹晩浪飛飛烟鳥入春陵收帆一醉河橋酒鼓枻清歌對月明章處士審言失其字郡志隠逸傳稱此君與陳觀孟顒王毓用賢並洪武中髙士相與游從賦咏自餘不以世事屑意為一時所重客揚州送所知歸鄞與君沙上别把酒惜分襟楚國山河舊吳門驛路深斷雲開曙色繁木䕶春隂羣從如相問衰顔動越吟聵菴先生周禮字吾學性剛介絶俗嗜學窮研經史每感歎時事輒于詩文發之援筆即成不煩意匠晚年授徒日湖之上惟以講學論文為事他無所聞因號聵菴五磊雨歇雲收山氣濃曉來遮徧翠芙蓉小童門外忽驚報失却前村五磊峯白雲先生金華字宗實洪武中從戍燕山衞弟忠以卜事干成祖于燕邸靖難後遂拜兵部尚書先生心薄之成祖嘗欲推恩授先生官力辭得賜歸歲居東湖韓嶺宅足不入城府日坐一小室中泛覽經史手所㸃定書餘萬卷終老不懈每值風日佳時泛單舟湖上竟日而返尚書常迎先生至金臺官舍甫數日先生謂曰汝祿雖萬鍾其如我湖山樂何即日買舟還尚書卒復召見賜白金文綺先生伏闕謝曰臣野人布衣無所用此帝稱為迂叟年八十七一日讀宋史至王倫附相檜事撫掌發嘆遂頤脫而逝嘗自號白雲野叟時因稱白雲先生平生吟咏甚多俱失傳湖上湖頭蜂蝶共尋春只有啼鵑最惱人便與黄鶯一様打無人識得是君臣李處士衢字文亨過阮十二家吾愛秋山好頻過處士家風驚當戸犬葉趁過溪鴉坐右欹叢菊杯前落片霞茅茨堪結伴薇蕨徧生涯詹處士復禮逸其字賦得鬱鬱園中栁送行人鬱鬱園中栁芳姿靄晴曦春風動微和零落多華滋皎皎揚素花濯濯垂繁枝同袍戒嚴裝奄忽與我違焉知逺行邁欲好不終期扳條聊以贈悠悠起遐思李文學鍔字仲威號松崖有竹窗集輓長清李處士薤露悲歌不忍聞難招地下老脩文絃中白雪人何處句裏長清稿未焚屐印落花微徑没尊空明月半窗分夕陽流水東山下松柏森森對古墳王處士節字孟禮號墨莊深寧先生後人也武陵桃源圖仙境悠然隔世塵此中俱是避秦人衣冠不識君臣禮風俗惟知父子親兩岸落花飛片片半溪新水漲粼粼重來劉驥無消息更有何人解問津洪處士性字復之號菊泉擬古青青巖畔松菀菀山上柏矯矯含貞姿交情固金石盈盈苑中花灼灼誇顔色翩翩遊俠兒看花滿街陌紛紛豔綺羅輪蹄密如織髙宴動歌鐘歡娛每終夕好花忽零落寂莫稀人迹願崇歲寒節矢心終不易李處士澤逸其字千里思長安一去五千里思心日夜如流水寂寂鱗鴻滄海涯依依桑梓斜陽裏隔葉啼鸎不可聽閉門芳草空復情人生出處古來有南北相思同月明鄭徵君惟廣字汝誠號蘭谷其詩與張東臯梁友蘭齊名谷亭閘登眺客愁長在兩眉邊惟有看山一莞然却怪故山看不見愁眉還上閘河船周處士普字徳施號守拙司訓周先生序之子也為詩有父風秋思露下蘭無香風髙葉初墮空庭不見人落月照孤座王通判潤誤入字崇徳號友石中成化中鄉薦官通判小艇故人尋舊約小艇逺相過天影波千頃蘋香雨一蓑霞明紅葉豔山近白雲多落日滄江曲離愁奈爾何洞雲張先生時敏字日新東臯先生子也少承家學通經史百家言弱冠補諸生一試不第輒棄去其詩風格溫厚有韋栁遺意為時所傳身敦至行見人善輒稱之聞有揚人之過者即愀然不樂與人相貿物察其色至厭足乃巳雖為所紿弗較人稍失利則句月不能忘嘗曰丈夫不能自建立亦當行善于鄉為世模楷因書其壁曰人生無欲始髙天下為善最樂里中頌之課其子邦竒成大儒歴贈翰林學士吏部左侍郎所著有洞雲稿行世病中强和東沙春官夏日詩江鄉暑氣溽心靜自清虚草色門前徑榆隂屋外渠養生無異術娛老有閒書羨彼沙頭鳥浮游日自如欲覓廣寒路緣無萬仞梯就涼憑竹牖扶病涉花溪庭雀依人噪桑鳩逐婦啼不冠兼不襪長畏報輪蹄曉發紹興城外起踏船頭覽物華塵蹤一夜伴蘆花雞聲催淡山頭月鴉陣啼紅海面霞到岸喧聲皆旅舶隔橋烟火是漁家片雲忽散蕭蕭雨更掩蓬窗聽煮茶乙亥九月望日蕭山舟中寄弟舊遊二十年前路頭白重來仗轆轤兩岸好山篷外栁五更疎雨枕邊蘆夢遙池館詩誰續興拍江郵酒自沽惆悵忍看南去雁海雲明日又三吳夏日乆雨積雨綿綿苦未收頓令平陸是洪流好山何日能當户明月多時不上樓牟麥將登成半損晩秧新挿待重抽樗材自分甘空食猶抱農夫終歲憂睡漁圖扁舟隨處即為家雙鬢無愁也自華抱楫西風眠正穏不知新月上蘆花梁處士衡字士平號友蘭與東臯相倡和時謂其絶句不媿唐人蘆雁圖平沙淺水帶斜陽呌破南雲憶斷行莫怪蘆汀栖未穏瀟湘雖好是他鄉題雲山小影雲谷衡茅自結隣山光樹色四時春舟行不出前溪口知是秦人是晉人見燕翠竹幽窗傍水開東風吹㬉讀書臺不知門外春多少又見雙雙燕子來先楝塘先生諱正華字本素鄴嗣七世祖也少傳大父父家學工于詩性不樂仕進慕義專赴人之急諸弟與貢使互市負其錢十餘萬罪死先生為破産償得免族中女將嫁有期而父母死無所辦適先生亦遣女乃迎族女歸為并治裝同日嫁與鈞且先生隠徳多嘗夜聞别室有聲起伺之乃其隣人子方盜裂布蒲伏曰適舉一子天寒恐兒僵倉卒盜先生布死罪先生慮其媿曰夜生子此真急時奚暇問奚不疾舉去鄰人子曰裹兒布數尺足念先生長者物故裂取足耳先生乃并與之謂曰可去矣此惟吾知之家人巳爝火至先生曰無有䑕鬨耳後隣人子竟折節為善及垂死乃與人述其事曰李先生真長者雖先生長者終不言然吾豈敢自蔽其醜以蔽先生先生又嘗被酒夜行前觸盜誤創其頰先生闇中識為某氏子亦竟不言人亦不知先生是何等創也先生以故家亦稍稍落乃盡以砌街大宅讓諸弟使分治而身自居東皋草堂耕牧初先生常客白下造書林縱觀乃悉以槖中金買書還日課其諸子且耕且讀數年次子循義遂以進士起家為名御史先生乃稍葺所栖草堂導泉帀舎手植雙楝于門塘上徧種四時嘉果極望先生籜冠鳩杖澹蕩其間客至命童子采所植樹果就水擊鮮作供笑謂客曰吾塘上仰有取俯有拾先生風格既髙草堂復當山水交㑹處以故四方名薦紳詞客俱題詩咏楝塘先生隠居傳于逺近嘗有太守秦君造謁先生款客語止宿已見十餘人從田間輟耕歸俱笠而荷鉏犂中有二丈夫須眉甚偉與諸田奴别秦君心異之使遣問則先生第三四輩子也秦君大驚曰是俱御史介弟奚至使執苦若此先生笑謝曰若兄雖貴何與弟且人生豈可使失業因啟篋取所自咏詩示客指其中二語曰人薄利名何患老子分耕讀不妨多秦君絶歎服而去草堂遣興答見贈諸公悠然扶杖自行歌春到茅堂風日和人薄利名何患老子分耕讀不妨多坐憑片石堪為几臥覆叢花亦當蓑却命預陳斗酒待昨來溪友許相過貿東之舎足幽栖中有先生日杖藜水到門前三𣲖合山來簷下六峯齊此間合放吾儕老何事遥煩公輩題自咏數篇渾漫興草堂莫比浣花溪此詩三四一聫文衡山太史為大書鐫于吾家門石至今樵叟牧豎過先生故居俱能誦之魏文學敖逸其字雲松先生子也所著有東溟集次韻車廐驛中旱途跋涉始逢涼一濯塵襟秋水光幾樹清隂生驛道千山秀色入江鄉居民多就館人役歲月無如官棹忙迎送往來多少客不知功業有誰長林文學昺字文絅所著歸正集次趙竹心推篷圖韻曉汎湘江上推篷望楚天低烟拖密篠小雨濕垂蓮隔壤難沽酒逢堤欲繫船往來情不厭歸興獨茫然題山水圖一湖新水浸青山逺遡舟程杳靄間碧槿垂烟秋色澹白沙沾雨晩波閒萍開魚似知人樂葉動禽先避客還獨有逋翁吟正苦倚篷髙眺指烟鬟史處士自守字端仁號雪窩以詩鳴于世古意新郎卜逺行風雨阻去騎安得再風雨來朝猶未去雲錦靚秋風白露沁芙蓉芙蓉香未減内有心重重白頭吟白頭吟與君結髮為同心越羅新裁鸚鵡綠寶釵斜軃鳳凰金蛾眉灣灣豔曉月春風環珮飄颻音合歡攜手步庭下月明笑語花隂隂此時恩愛期白首豈意君心輒相負出門馬足疾如飛揮金長醉青樓酒專房割愛妾身孤妾孤遥羨鴛鴦偶羅襦未暗玉珥明妾心戀君君無情泥沙紛紛團不就蟲絲縷縷織不成郎君此去重還家夢中笑看菖蒲花題畫門前有溪溪最小坐對小溪興不少溪口天濛雨亦竒溪面日浮晴更好芙蕖開遍柳葉長鸕鷀乳下雙鴛鴦鸕鷀背拂柳葉影鴛鴦口唼芙蕖香畫槳輕搖放舟去鯉魚吹浪浪花細石灣遞出櫂歌聲老樹斜臨波淺處溪源活活來未巳魚箔鷗巢對溪渚須知溪小受天多倒浸明河幾千里贈肅齋李先生詩括誤刻不出非無故曾將世態論布衣如可賤風節孰為尊有托吟梁父無求隠鹿門白雲飛滿目消息任乾坤秋日泬寥天氣靜獨坐啟郊扉月淡桂花發風清荳葉稀秋樊憐鶴瘦晩釣憶魚肥乆混紅塵迹登髙欲振衣季春書懷東郊初日霽四曠絶囂塵老至猶為客花殘已過春青衫沾淚濕白髮夾愁新未了平生業乾坤耐此身彭墓山居生平性癖樂幽居彭墓山中自結廬春屋頻篘留客酒夜窗逺作寄僧書松隂織戸寒猶重嵐氣侵衣午未除誰笑陸沉歸舊隠王門應懶曳長裾過石碑村居晴原蔓草路横斜寂莫依稀隠士家山檻雨霏歸燕子籬門風軟落桐花牀邊珠滴春篘酒燈下塵飛夜碾茶白叟不知京洛事瓦盆竹几樂年華倪畏菴先生復字汝新為人風格嚴整力學無間寒暑兼勤劄記性不喜摛摘章句尋源探本務得指歸善說易旁及諸經研精聖賢之學考正古禮尤深于鐘律潛思黙解能通其妙亦喜錄古今見聞留心經濟授經數十年師道甚尊善奬成後學若通政余先生本其髙弟也平生篤于孝友執親喪遂成目疾弟子所上束脩不入私室盡以資諸弟束身有禮市肆優塲不一履其足里中俱嚴事之每相聚談謔聞倪先生來輒斂聲起嘗與郡中士大夫名士雅集先生最為宿老一日客畢來待先生乆或曰吾輩且虚上席先飲若何及奏樂有客曰倪先生至門聞樂聲自必返矣偵之果然乃傾一座客造門謝先生徐曰是亦何罪但異時有長者客尚須待之其持正若此所著書甚多大者有易繫詞解中庸解正䝉發微皇極經世通解鐘律通考閒居漫讀記東巢襍著壺齋問答救灾集議禘祫議濬湖議見聞欄楯觀古錄畏齋稿存于家讀史木馬不駕乘石田不堪耕剡蒿代更梁削菌以居楹匠石驚且走工倕還撫膺仰首看白日登髙望滄瀛水東日亦西紛紛各有營陽和變殺氣雪浪奔長鯨赤精既迷漢中原復廢興禍亂不可弭感嘆何時平飄風起末路日色無光輝猛虎厭獸肉騶虞恒苦飢羣狐處中堂麒麟受羈縻陳竇竟火滅衣冠落塗泥上天杳且㝠是非何所咨古來共嘆息千古成蓍龜感寓風髙殘暑清露白秋夜長蔓草不復滋蟪蛄弔流光繁思縻中襟戚戚何能忘鸞刀未發硎割剝摧鋒鋩寶鏡匣中埋垢汙何由明元運自淪忽白日去茫茫瑶華恐不實泯滅沉風霜安得松柏姿歲寒色蒼蒼時光更代謝蟪蛄笑蜉蝣嘉禾不成實稊稗矜有秋芝蘭種不榮荆棘滿崇丘𤣥隂結嚴冬芳意坐自遒鴻鵠將安之懸圃阻且修慙我綿薄姿引領增内憂端居觀物化悠悠念羣生青春始萌達朱火忽巳盈牀有一素琴玉軫映朱繩彈為陽春曲琳瑯滿宫庭白日悵興懷悲來復填膺子期今逝矣千載誰復聽古意南國有佳人素質凌朝華麗服粲雲錦襍佩紛文羅含情理瑶瑟皓齒發清歌音響激流風徘徊慘難和流光遞更駛歲月如頽波歌罷感遲暮曲竟長咨嗟願逢同心人采菱發陽阿登孤山日脚穿雲蘸碧流紅光晴射水西樓沙明白鳥雙雙下山好蒼烟面面收誰遣殘粧照華髪仍遺匹練照清秋六橋風景依然在冷落孤山草樹丘登雪竇巖倚天蒼翠出崢嶸中有飛泉瀉碧鳴絶壑風髙巖虎嘯千林月上野猿驚寺當絶頂丹題見徑轉迴溪素練縈阧覺塵區異寥廓欲臨寒碧洗煩纓江行野水田田綠江村曲曲斜一笻尋不厭坐占白鷗沙落日江城落日與林平翻入滄波照眼明坐對草堂渾不語誰將玉管調黄鶯薛處士魁逸其字雪夜舟居載雪更宜夕光輝激水涯看疑汀上月飛作栁邊花清入騷人骨寒思貧士家冷然身可到莫道玉京賒秋日登甘露寺樓縹緲名山枕碧流更登山上一層樓不知客眼真如豁始見人生果是浮地近金陵邀王氣天開鐵甕抱神州御風不盡凭欄想香散天花萬樹秋沈處士汴字本梁冬暮寫懷寒竹寒松相對形更無知已到幽庭看來只有閒塘栁春未來時眼便青沈處士嵩字髙之號蕪菴西陵夜暮色滿前汀江村半掩扄潮頭西去白山色北來青雙宿花間鳥孤飛水上螢愁懷空脈脈闇自誦黄庭陳處士鵬霄字伯玉號翼齋漁笛洞簫吹曲下南灣子夜涼風月滿山自是漁家太平調莫教聽作玉門關樓臺髙樹離離晩葉黄采菱有曲度横塘樓臺自恨臨江水日日風前易斷腸陳處士文璧字國寶號愛松栁枝詞綠栁條長拂玉欄華清宫露幾曾乾輦聲只向花邊去月白紛紛樹影寒張太學嘉慶字開祖號東閒白齋先生子也少有才自負既長入太學益肆志于詩大司馬張公目為豪士余嘗讀白齋絶句有示慶子一首曰吾兒才髙須櫽括官様文章不在竒人道筍髙能過母丁寧養䕶鳳凰枝即其父亦奇之矣秋夜泛月清秋駕單舟舉觴吸明月單舟去復還明月圓巳缺天漢縱横流爽籟參差發痛飲傾長缾此懷向誰說送印子仁歸蘇州君來白酒熟君去紫菱香越鳥杯前落吳鐘夢裏長木蘭江月路芒屩海雲卿楊栁秋條脆相思贈短章山閣偶成原上髙低樹天邊起伏山鳥來秋影亂人去白雲閒戲贈太白山人黄鶴樓頭枕書卧老鶴長鳴驚夢破青天忽墮白雲來捲簾一陣楊花過髙志齋先生士字克學少孤好學事伯兄以禮兄弗愛也後伯兄為吏坐贓盡以已産償家遂落嘗終日貰米未得怡然也里中髙其人延修郡乘謂鄭清之余天錫附權臣陷濟王竑得罪名教程徐為元大臣失節三人俱不宜立傳其持議若此晩年益嗜學亦精于醫言醫家之有靈樞猶五經之有易遂注其書行世同俞正之遊豹巖别墅幸窮林壑勝此日共君遊循徑相攜手看山欲盡頭鳥啼松徑午雞啄麥田秋他日還相憶溪雲度隴浮陳璋逸其字暮春到天童行到天童廿里沙白雲深鎖梵王家滿山笋老多成竹一路花香半是茶琪樹每巢天上鶴法幢曾辟路頭蛇數聲清磬相迎處坐對爐薰泛紫霞甬上耆舊詩卷十六

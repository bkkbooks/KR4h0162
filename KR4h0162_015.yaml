  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0162_WYG_015-1a, image: WYG1474/WYG1474-0310c.png}
body:
  text: 甬上耆舊詩卷十五監察御史胡文學編沈同知汝璋字君重號蓮橋舉于鄉歷辰州武昌二郡推官遷同知鄖陽歸里值倭寇薄城當事議毁沿江廬舍公力沮其議鄉人誦之卒年九十三次再至武陵莊韻為覔林泉勝無辭杖屨行逢人訊仙迹對客數花名慣狎籠中鶴常餐松下苓興來發清嘯旋覺腋風生青山足肥遁列嶂見芙容花鳥欣為侣神仙尚可逢髙吟驚睡鶴靜息伏潛龍遊覽遍形勝因之扣石鐘次十一至武陵莊作仙巘層層秀蘭舟故故來登臨逢鳥語倚徙看峯回衣濕飛花雨鞋粘匝徑苔杖藜隨所適吟罷漫傳杯海國逢春早嬉遊足暢懷質柔憐弱栁香動惜殘梅雲淨千峯出波澄一鑑開同行無俗客詩草付公裁次初至東莊作雲滿山屏水滿汀堂開緑野聚簪纓花繁不用金為谷樹密常將雲作城歸隱蚤開黃菊徑尋幽初結白鷗盟市廛逺隔喧囂寂松竹隂隂聽鳥鳴包參軍大中字庸之以太學生官運司知事有參軍集同張司馬至武陵莊作探幽直入武陵溪樹密煙深白鳥啼拂棹野花人不識穿林亂水路還迷雲山半繞芳亭外茅屋偏多曲岸西風物尚餘秦代古家家猶自飯蒸藜李太僕生時字孝甫號遇齋以太學主官太僕主簿同張大司馬至茂嶼作結屋雲間寄此身圖書四壁靜為鄰扶笻誰作看山侣鼓枻偏過載酒人黃菊紫萸堪共把苔青石白不生塵尊前漫有吟秋興况值湖天月色新髙知縣瀛字子登舉于鄉官三水知縣同張大司馬至茂嶼莊作空江渺何許微茫半村雨何當披玄雲風月來相主白雲亦自好白雨一江秋長年陪謝傅著屐過西州包典儀大炣字明臣以明經官益府典儀正同張大司馬至茂嶼莊次諸公作三月春光暮飛花半落溪山深雲自住日午鳥頻啼問字余將笈尋芳誰杖藜逺從司馬御此地足幽栖十四至茂嶼莊作沿洄遵曲渚弭棹碧山中龍卧雲長護溪回路轉通千林銜落日一雁下晴空謾喜同仙侣追陪得謝公李鴻臚生容字常甫以太學生官鴻臚序班同張大司馬至武陵莊舟中作入舟武陵曲為訪平泉莊緑樹臨流暗青莎繞路長一花迎客棹諸翠擁山房咫尺名園在應同泛碧觴楊判官持載后江先生子也以太學生為州判官至武陵莊作無日無花不辨春頳霞依舊慣迎人醉來更取桃花水旋煮胡麻旋煮芹李萬安生源字漸甫以太學生官萬安丞至武陵莊作雲拂山光一片秋武陵莊上繫扁舟涼風吹落芙容瓣直向深溪九曲流張少卿子瑫字仲玉以進士官光祿少卿所著石里稿至茂嶼莊作幾年懷勝賞此日共徜徉幸侍東山屐欣開緑野堂回溪晴散碧曲徑夜生香一自離城市塵囂已頓忘張知府子中字伯元文定公子也以任子官知思州府所著有醯雞鳴瓿集至茂嶼莊作連峯起天末積水下煙橈時菊擅殊色羣芳空復凋相歡一尊酒共味白雲謡繾綣臨兹夕流光去莫邀倪明經珣字公白以嵗貢于鄉司馬修郡志公白與盧叔麟洪謨薛晨並與焉晨號霞川亦諸生咏歸軒在茂嶼莊魯國有狂士曠然沂水濵樂景會單夾好風生暮春童冠有佳敘邁往迷隱淪翺翔萬仞上孤鳳鮮可倫逹人解尚友千載揖芳芬撰履陟山椒返棹即河滣朝邀煙霞友暮引猿鶴賔玄黃曷隘寬日月偕走奔雲英契巳逺洙泗調彌真世纍遣末俗獲心在古人咏武陵莊尋幽秉微尚結勝得桃源桃花散紅綺流水出通泉山中有好懷三時熟新田薄取所性足匪必避世賢停雲白鶴嶺啓户望春山衆卉羅珍琦好鳥雜鳬鷳天風簫管引水氣篝蓑連采菊愛陶籬餐松候商顏佳景會不盡畢趣同輞川楊髙士明字誠之有白川集奉和張大司馬莫春遊茂嶼山莊山郭騁遐望郊原總是春帶煙芳草緑收雨碧山新鶴引登皋杖風吹漉酒巾蓬丘移茂嶼塵世有仙人連日淹春醉朝隂又夕曛靜聽鳴澗瀑間看度山雲舊夢花前説新題竹下分風塵都莫問只與鶴為羣盧文學叔麟字周伯和張大司馬武陵莊雜咏束髮懷竒覽褰裳躡髙蹤薜荔可裁衣竹實飢足充山中自有家總是煙霞宫撫景慮巳滌賞心眷彌重長嘯希阮籍塵視王侯封瑤沚縈文瀾隂雲斷山麓中有幽人居一一占巖谷琪樹屢生花石髓紛可掬入壑恣幽尋登岡展遐矚容與淡忘歸明月照古屋李太學生太字尚甫初夏赴武陵莊舟中作不識桃源路今從司馬莊漁郎春已暮燕子日初長萬樹臨流見雙鳬拍水翔就中詩意足好去拾流觴戴良才逸其字雨發疃畝拏舟違别墅載雨入漣漪後浦隨行失前山逐望疑渚香間緑芷林溼隱黃鸝向晚停橈處湖頭有釣絲别茂嶼得松字家故空山裏看山意正濃若為辭爾去又與世人逢行處無芳草帆前失數峯定知今夜夢獨自倚孤松同張大司馬十二至武陵莊作西風瑟瑟水潺潺一徑煙霞盡日間遊子踏歌慙下里上公髙興只東山亭圍細竹青流座門翳長松翠扞關沈醉不知何處宿武陵原是隔塵寰洪文學謨字禹臣張大司馬修定海志禹臣與周伯復與焉四至茂嶼莊作梅雨晚初歇人稀山更幽撫松看鶴下撥藻見魚遊水漫無舠繫亭開有客留仙蹤應不逺于此足忘憂十四至茂嶼莊作每有登臨興停舟湖嶼東雲根穿曲竇木葉墮秋空鶴啄苔餘緑霞飛日映紅清幽人迹罕宛似輞川中鮑文學道亨字叔夏三至茂嶼莊作豈有煙霞癖尋春入翠微溪雲流樹溼山雨帶花飛引水聲喧座巡簷香襲衣清狂何太甚竟夕欲忘歸次韻再至茂嶼山莊窮病虞卿學著書偶從司馬問田廬青春自混漁樵侣何處還尋隱士居十里湖山惟有屐一丘煙月不須鉏野猿林鶴休相訝聊以東山暫息輿張處士􅣌字平叔三至茂嶼莊作神仙湖上窟春日逺躋扳酌酒看明月題詩品衆山松雲當户落溪水到門間洛社遺風在追陪有白綸錢文學公逹字子兼秋杪同張司馬至茂嶼莊何處神仙宅湖山啓畫圖喬松蟠古洞鳴鶴伴幽隅白社盟初結黃花興不孤栖遲人境寂真擬學濳夫包至逸其字次十五至茂嶼莊作賸有憐春興尋芳到碧山巖花沾雨潤野鹿卧雲間絶壁溪為帶虛臺斗可攀十年勞夢想容與不知還甬上耆舊詩卷十五

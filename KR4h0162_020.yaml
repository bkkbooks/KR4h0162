body:
  text: 甬上耆舊詩卷二十監察御史胡文學編石盂山人汪仲安先生坦先生號識環中丞雷峰先生子也少擅異才於書無所不讀初為諸生應省試筮得蠱之上九慨然有遺世意因作髙尚賦以見志婦翁太宰聞莊簡公先生以太學生至京師聞公方在天曹先生深自匿恥借太宰為重足跡不輕踐其庭聞公貽之尺牘報書率言國家生靈休戚大計無一語及兒女寒暄其志操乃爾既稍以門資歷官藩幕雖在簿牒間未嘗一日廢書所至輒登覽搜古凡作吏十餘年非其所樂也遂解組歸先生家在大雷山下距四明在桯几間構屋山椒為層階漸躡漸髙嘗臨階下俯與樓上人語髙雲宿棟飛泉夾坐有至者如入仙都洞府先生日吟嘯其中盡以詩法教其子禮約復使逰于沈嘉則先生之門嘉則逰四明從大雷入先宿汪氏山房先生父子出黃雞白韭作供共討論四明故實三日夜燒燭傳瓷主客歡甚至今稱為盛集先生遺詩楊伯翼所選定屠長卿序之日東出日東出駕六龍卿雲從翔天中日東出開八埏龍之飛羣蜿蜒日東出玉燭明屢豐年樂和平獨漉篇獨漉獨漉上山入谷山有猛虎谷有短蜮上山采紫芝下山采黃獨茹芝可延年青崖騎白鹿四海覽逰遨人命如轉燭雕獸當九關月星晦漫漫當關關不守金印繫左肘肘後不須㬰鬼火燒白榆君子有所思行君子有所思所思邈不期入室各自媚出門寧復知吐心尚告誰噂㳫欲何為野田飛黃雀髙不過蓬茨赤鳯摶紫霄文采光陸離鯨鯢困泥滓螻蟻尚制之螻蟻細小蟲從橫亦惟時董逃行倬彼雲漢昭回天門醮祭夜開金旌寶幢徐來玉女三千裴徊中直層臺仙掌崔嵬侍臣跪進瑶杯一解鶴馭膴膴中宵來下但俾吹笙擊鼓姹女翩翩起舞神水金波如組二解黃扉夜啓霏霏元老踧踖裳衣香龍蜿蜒金泥青詞繡楮揚輝天顔一展申眉三解城南尺五絪緼歌臺暖響繽紛車如流水盈門苞苴山海輸珍千秋萬歲長春四解紛紛疇犯教言履客日稱萬年白日胡薄重淵但願勿令華顛子子孫孫駢妍我生有命在天五解短歌行甘言為疾苦言藥促膝就耳姿綽約言才逆耳心不樂胡不甘言恣歡謔頃刻垂楊生左肘盼睞何人為奔走平生不識夷門叟白髮人前向人剖短歌行莫垂手行不得哥哥興隆道中聞鷓鴣作行不得哥哥魚潛毒淵鳥栖惡柯此無奈何嗟爾行人􅂒􅂒䧢陀不避罻羅天無三日晴地無三里平六龍之山十年為兵君將安行嗟嗟君將安行别泰山擬唐李白録三首自我來泰山于今忽五年每登日觀峯並坐肩吾軒方瞳被兩鬢宛若垂雲烟佩服龍門衣霞彩光曄然謂我畏壘山曾共桑庚眠重來五千載一笑俱忘言而乃天仙姿疇能識毫顛既來不須㬰又復歸滄田攬衣不能下淚下如流泉青霞四千丈誰能陟其顛倒騎白鹿行去若飛龍翩道逢五丈人峩冠向余前所論俱上古蒼顔不知年自云秦皇帝登封汚遺編至今地天通無能伏其愆顧子傴僂軀不揖霞宫仙自非生平力安能獨超然行行重相期贈子華胥軒明滅不可覩黛色參中天崩湍落兩崖風雷日喧豗飛梁十萬丈健倒青莓苔洞門開石扇照耀金銀臺蘭楣桂為楹白玉三重階貝瓦碧參差珠箔光皚皚琪花雜瑶樹鸞鳯舞毰毸坐我紫霞床酌我青金罍瓊漿一潄齒神靈通百骸逍遙游象罔蕞爾遺塵埃滄溟連渤海歸去何時來𢎞濟寺觀音閣髙閣闞危湍結搆歷機巧昨聞靈谷勝還兹足幽討倒影射虗牖照我顔色好逺翠凝不流江光白如掃清梵飄天風奇巖寄瑶草遐憶羲皇人悠然此懷抱夜上嚴州灘上灘似牽羊下灘如走馬灘髙月未出石立灘流寫參商欲低擲風雨聲在下夜半入天津應識支機者燕山行燕山八月風吹雪北酒壚頭㸃猩血美人髙坐碧氍毺手撥琵琶唱頻闋銀鐺燒出紫駝峰華燈夜剪青蓮月蓮花旋舞金蓮蒂鴛鴦繡幕流蘇墜頃刻能開上苑花逡巡笑綰章華臂年光逝水人間擲昨日纒頭今不識絲鞚寶匣出長楊皓齒蛾眉復東陌東陌西樓秋月明十二䦨干曲曲憑緱山玉女烟霞上悔不當年學鳯笙王主簿邀過海神廟海風一夜吹茅屋海客披襟坐幽獨主人邀客過南澳兩馬蕭蕭携兩僕滄溟紺色浮坤軸晴空峭影含蒼玉頽垣破瓦纎茅束短衲容枯如鬼髑靈旗不閃祠無木毒龍上天原有犢鯨含鼉作波神逐潮平日落山魈哭泰山俯仰亭海右名亭在無如此獨髙八鴻來蕩蕩千古去滔滔斜日明巖雪長風吹布袍有懷渾莫語搔首誦離騷夜登泰山豈有王猷興衝寒夜上顛白雲俱墮地明月自行天萬里風何限千尋嶂獨前最憐肌若雪皎皎藐姑仙春日新晴山行細雨彌旬久東風喜乍晴鵑啼松葉紫雉雊麥苗青日墮雲間影泉流石上聲生憎蕉葉醉不挂一錢行髙郵湖西風吹五兩短棹未須牽逺樹猶懸日平湖但有天蒹葭隨意落鴻鴈識期先俯仰曾何慮長歌秋水篇宣風館用陽明先生韻雨沃新苗翠已痕石溪曲曲正流渾千山淑氣開南楚十里鶯聲自一村未有涓埃霑白屋漫留燈火照黃昏羅施升斗還叨竊慙問湘纍萬古魂壬戌九日岱祠城樓久矣蓬元坐碧霞登臨猶喜思無涯千年樓閣初成賦萬里風雲一放查天上三漿俱緑髮人間九日有黃花飄颻已結王喬侣不向龍門數孟嘉六月十三夜月空山無暑坐清宵牛女星河入望遙此際獨憐初月淨移時未必片雲消凉颸颯動來天閣愁緒分明到野橋四十年前傳盛事白頭箕踞說漁樵新泉濬澗澗水深新泉出崖底日夕山童歸傾筐洗石耳螺羮榆葉如錢栁葉齊菠稜生菜滿青畦小鐺正煮螺羮熟檐外游絲拂靣低豳叟屠田叔先生本畯先生號漢陂自為兒即異父少司馬竹墟公甚愛之以任子授刑部檢校稍遷太常典簿因撰太常典録記國家郊祀大典時比諸唐王涇郊祀録宋文彥博大饗明堂記歷遷南繕部郎中出為兩淮運同復移之閩先生在官以亷白自持政暇起祠烏石山祀諸先賢立社學水口以教子弟受經者三年拜辰州太守辰居西南徼雜蠻風先生以寬仁治之辰人大悅適播州皮林俱用兵使先生主餉轉輸不之事平敘功第一而先生顧以喜客門外車騎交錯後堂日置酒當事聞之不喜乃移書先生父執謂田叔家有園亭絲竹足樂賔客此吏事不足苦田叔竟罷先生歸初先生在郡禁殺牛有唐生具牒言家貧蓄一牛不幸猝死請鬻其肉以糊口先生知其紿也判以俸買牛葬之比牛至果生因命小吏戴養之及先生解官衣深衣騎馬出門辰父老泣相送牽牛隨其後先生屬吏善養牛終其年時人為作辰陽留犢圖一時傳之先生踈眉目廣顙而哆口人望之若神仙生平惟喜讀書至老尚手一卷人或曰先生老矣奚自苦先生曰吾于書飢以當食渴以當飲缺伸以當枕席愁寂以當鼓吹未嘗苦也晚年其喜客益甚客至必出魚韭無列席飲不過數勺然每觴客必盡歡所言未嘗及世事間作諧語一座為傾先生既老起生壙于甬上撰狀及表自稱曰憨先生一時詞家俱奉為祭酒先忠毅公常過先生客數輩時山隂王季重少年在坐曰先生昨酒中許填南北詞相贈已成否先生笑言曲已半方疊下愛王郎句即唱之時先生已八十餘發音髙亮客俱絶倒其風流可見也三婦豔大婦年二九採蓮南湖口不愛蓮成花但愛蓮成藕一解中婦二八齡濯錦豔江清鴛鴦七十二羅列短長汀二解少婦十五餘顔色正敷腴提籠採桑葉掩映紫羅襦三解雜珮何鏘鏘三婦婉清揚丈人勿遽起調絃夜未央四解中婦織流黃中婦織流黃少婦理瑶瑟君心别有私何知麗與則麗則各自芳蘭膏各自澤君尚為我憐銀屏以永夕織黃莫亂撏理瑟莫亂音河魚治三刀歷歷傷中心愛妾換劍何許槖中物來矜掌上嬌遑遑辭畫帳習習攬征袍蓮鍔元精彩星裯易寂寥魚文隨赤電鮫泪落紅綃利器歸任俠閒房坐鬱陶已知傳劍術詎敢恃花妖色古霜同肅愁多骨並銷雄心胡糾糾幽意轉遙遙姓字慿誰借肝腸為爾勞井邊曽繾綣壁上屢周遭棄妾情何似聞雞舞更豪寵移鴛夢絶秋湛月輪髙豈是輕顔色由來重寶刀君如佩鵲印妾命等鴻毛雜唱君不見杯水覆堂難再收天上之路終悠悠君不見中心相憐馬首圓世間萬事皆徒然朗吟長嘯暮復旦對酒牢騷旦及旰擊筑而歌起為亂君不見南山有薹薹可脯北山有萊萊可斧君不見東海有田田不耰西陂有魚魚不收東西南北事殊異何用東西南北而遨遊我今長嘆終悠悠燕歌行二首勸君有鏹莫自藏千金博得徹侯章勸君有術莫自掩拳曲之夫登薦剡勸君有鈎愼莫直河魚豈受直鈎食勸君有家早歸去主爵何曽苦留住世情反復不可知且飲美酒臨華池奉常先生愛名飲但願三百六十之日毋西馳其二登君罘罳藻井之髙堂坐君龍鬚琥珀之瑶牀贈君五明七寶之團扇酌君紫霞碧玉之瓊漿烹鮮擊肥亦常事秦筝趙瑟空自傷世上浮名亦徒爾安有五侯七貴能文章腹中貯書一萬卷一字不得用勞我肝與腸勸君無言舌且藏誰能以此錦繡段燒之愼勿當風輕自揚不必行騎不必紫驊騮交不必豪俠遊驊騮世上空有聲豪俠世上空有名不如我自為我卿自卿世上方能稱太平我亦千金曾結客如今客反向我射我亦四座客長滿如今客反誚而管我今無言客且歸勸客弗嗔我所為歌且謡行我吟梁甫聲獨楚梁甫不知我心苦我歌黃鵠心悠哉日暮黃鵠期不來長嘯六博呼五白會須千金輕一擲雞三足兮馬生角物論何曽久歸著乃知天地之間無弗有不在巵談與杯酒詩書禮樂徒空言其人與骨皆已朽我乃因之亦俯首前有尊酒行前有尊酒起為君夀君夀髙如陵我酒多如澠如澠之酒清且㫖君心不保能終始君心終始那得知如澠之酒空自治上有明月不照汝心前有尊酒徒勞我斟君不見一言不合干戈起只在殷勤一杯裏魏其武安今已死千古相爭竟誰是我今不言君且止潮生曲潮生君未來潮落君又去來去總無常勞勞西江渚江渚月明潮又回郎行那得好懷開來朝試看天邊月不待潮生蕩槳來火樹篇瑶城火樹鬪春妍瓊蘂參差簇綘天謾詫燭龍隨法仗始知火宅種紅蓮流烏飛去難藏日么鳯翔來不避烟恍若流蘇開甲帳乍疑瀑布瀉溫泉五絲宛轉同心結七寶妝嚴太乙船灼爍大槐枝不爇紛披熠耀草如然木難火齊垂髙下金彈銀丸去後先縱是落花空㸃水任教拾翠不為鈿朱䘲翠眊迎中婦靈鵲金鳬引上仙絶勝庭栽多寶樹來供客醉綺羅筵光分萬戶星初落彩散中宵月並懸君王不愛魚龍戲詔罷今年少府錢無題當時月戶易流連今日雲忩更可憐慣弄參差回鳯管愛歌婉轉動鵾絃鏡屏斜倚星為海藻井新成錦似烟並蒂觴間開笑靨合歡樹上鬪嬋娟情波頻送將留夕恨葉難飛欲曙天條脫藍絲仙子贈珮環極浦漢妃捐額黃鈿翠生憎染桂火蘭膏自喜然燦燦已曾遺角枕飄飄且莫上蓮船來從曲曲千林下去隔盈盈一水邊何處瓊瑶何日報手中芍藥夢中傳病宫人詞一入君門誤守宫低徊那敢怨東風儘教買賦黃金在留與他人贈畫工述遇由來抱影士沈默葆精光當其發幽吟列坐遜髙唱芳草有宛蒻采采日以香白雲無去留披壑成文章奚必待靜好在御始琴張何事自結束期君以曛黃曛黃難久期泪下不可揮寫懷獻嵗始發春吾將遵歸轍嫋嫋白藏至猶然昧初服髭髮不護人􅗄其來向白疏麻居然改遺逺將誰適豔歌何可嘗坐令嵗華迫善御非良工善鞭非良策不如紉幽蘭芳馨以自懌吳娃吳娃如白雪粧成薄膏澤若使吳王見不愛西施色西施入吳宫吳俗遂成風至今閶門女效顰安可窮魚戲蓮葉北儂住蓮葉西閶門三五夕流月到耶溪寄白門二十餘年别舊京山容水灔轉含情春從燕子磯頭媚月到烏衣巷口明慿風寄信藏烏處楊栁如今幾樹生同杜蒼舒入大雷山訪汪長文重來尋谷口萬壑轉分明楓葉兼山赤嵐光接澗平香生橡栗飯霜老芋魁羮避世他年事誅茅共此生同余丙仲泛城南陂二首泛賞下南陂舟行日自移千林懸紫籜十里卧青鷖進渚將吳舫行歌命楚兒誰能鼓桂楫頃刻到天池宛轉度江城平田見水耕逺從青鏡轉輕載白雲行浦樹平于席林禽囀似鶯滄浪隨處好于此濯吾纓鴝鵒鴝鵒南方鳥如拳語未開入燕吾始見踰濟衆相猜碧眼愁鷹隼清秋憶草萊最能關氣候占望獨徘徊白鷳栖栖白鷳鳥容與鷺鷗羣金距曽凌漢朱冠亦切雲文章殊自喜黑白總能分一被青絲繫終年憶水濵會稽道中少憩鳥道紆回入千巖緑樹低轉留空翠處少憩石橋西别澗潺湲瀉叢林桑扈啼坐看鳬與鹿引子過前溪感事十載憂時淚今年灑更多前星宵漸逺邊檄日頻過無計舒蜣臂空懸扣角歌素餐吾却愧為日已蹉跎況值龍蛇嵗躬逢離亂愁世平清議重時至杞人憂上策收豪俊天心叶聖謀不過嚴賞罰尅日偃戈矛憶罷朝參禮優游已四年我皇非自逸借箸每難前卒悍竿旗揭民貧室磬懸恨無經濟術矯首問髙天天子資清穆羣凶起緑林支離天下事激切小臣心箕服尋常艷交梨不可尋三年占象緯脈脈到如今入會稽會稽稱大郡風壤舊京華緑水瀠南鎮髙城繞若耶都中輸竹箭山上起官衙但恐芳蓀歇扁舟問浣紗次檇李暮雨飛仍急飄颻檇李船重雲不歸海積水自浮天捩柁鳷鶄濕聞香菡蓞偏濁醪吾已醉隨分過澄川賦得的的帆向浦大艑乘風駛孤帆向浦經浮雲慿浪白映日借鳬青空濶開沙嶼追遙接水亭采芳湖上去倘可遇湘靈雷塘揚州城北寺草里到雷塘輦路銷金粉春風散緑楊山精古墓集官柏鬼車藏落日逰人歇蕭條古帝鄉甲午元旦風霾異常私成口號矚目當天正終風日又西四郊烽未靜朔日霧全迷勢欲三山動聲兼萬馬嘶老魂驚易散長恐謝青溪作客身驚老無家鬢益踈獨將元日事來卜五行書天上翻星鷁雲間殷日車有詩聊自託不敢達宸居題畫峭壁披天棘通林壓海榴亭中人獨坐門外水長流鹿小羣分疃翁衰自飯牛亂雲堆几席㸃綴與沙鷗任城太白樓懷沈嘉則髙樓一上白衣寒戶外朝霞正可餐明月關河無濁酒故人天地有黃冠謫仙去後誰能似彩筆年來老自看若是五湖堪避世為余天際報飛翰夢中得亡友楊伯翼書覺而悵然記之吾友楊伯翼謝世二載矣乃辛卯孟冬十二日夜夢寄三十字于余曰承鯤無恙近居甌洛山中見黑黃二鸂鶒弟設罝弋已得其一黑矣黃未獲也題封宛然字字凄楚覺而惆悵不勝人琴之感賦此夢裏開緘淚欲澘驚回梁月似君顔三年書札悲今昔一夕精靈託往還却恨帝京為下吏不知甌洛在何山鳬鷖鸂鶒終難辨蝴蝶飛來栩栩間丙戌秋上陵君王寢殿鎖山椒肅肅瑶城枕玉橋草里松楸微漏日九天雲霧盡飛濤燕山御氣時時度幽府神祇夜夜朝穆穆千官搘笏處若聞靈佩下清宵雨不絶三月中林烟霧饒青鳬白鷺未堪招雨聲不絶淋漓夜花事終違十五橋濕重角巾頻欲折江寒石燕故相驕邇來别有牢騷感回首交逰總寂寥甬東江北歌春樹重重春日和春江九曲抱城過龍頭直接桃花渡燕尾斜穿上字河迢遙沙阜是梅墟面面澄江盡可廬不盡石帆奔海月春風㬠網稻花魚百十魚鮮下海門布帆五色若雲屯甬東北岸鄞江上習習腥風五月繁犂鋤荷鍤種春苗蠶豆花開春正饒十里清溪鴨寨堰萬株蒼檜麥楊橋桑柘林中緑漸敷村村花暝喚提壺江風日冷忘歸去猶有斜陽滿鴈湖夫差破後已亡吳曾說清江駐舳艫惟有輅林猶似昔千門落日自啼烏題畫鷗鷺何緣下急湍颶風零雨不勝寒如今好向澄江上月白沙明十二灘入山醉弄潺湲日未斜更從看竹過山家坐來春色深如許開盡峰前躑躅花月下獨往四首以下老言先生自言其詩凡三變早年尚正聲故多嘽緩中嵗更尚氣節似饒逺韻老來漸知律細益愛清真因題其七十以後詩曰老言别一卷余更為選録十首不雜于集中使學者知詩人氣候未有不善變而能工者也獨往親眀月微吟過小蹊偶然思老伴還與話幽栖雲影渾無恙星光燦欲垂無人同領略歎息此前溪投老逾耽僻從人笑裋衣松花新著飯月色白臨扉萬籟欣皆寂吾生興不微尋常三五夕幽獨易忘歸丙夜未成眠天衢步悄然影非緣我獨光自使人憐圓缺看今夕升沉感昔年弄簫者誰子吹過水樓前西閣與東林徘徊意自深腥嗔烏鬼呌涼待白榆沉竹長新增媚匏存久不斟情來還蕩槳豈為訪山隂月下後獨往時病起選二肺病晚涼踈清光半綺疏苦吟忘禮倦緩步覺眉舒有月窺虛牖將誰問起居人家已深睡夜色不關渠經旬巾廢櫛永夜戶長開僻喜孤能往幽知老未頽月痕臨水淨鶴夢待更回無怪比鄰老停眠竟夕猜九日李實甫别駕惠名酒偶似淵明隱歸從栗里開囊茰青嶂返送酒白衣來斟酌吟詩伴招邀待月杯使君有佳餉那可獨醒回生意四月黃魚市風腥海客場艅艎凌出沒喧雜起帆檣天逺銜山小江深激浪長草年投老計生意問漁郎病齒少瘥值嵗除日强事巾櫛便往城東看迎春約管無棘家凌元姪除嵗多時憂採薪婆娑今得裹烏巾却因齲齒殊難笑翻對蛾眉也不伸檢厯盡銷支藥帖烹葵獨向灌園人相期興自迎春發東陌行看綵仗新偶然作效唐白傅體裋褐芒鞋紫籜冠江臯步屧未蹣跚少為掾吏稱三語老愛蹲鴟飽一柈草閣獨慿無厲屐蕭齊寄傲有猗蘭桃花酒舍今稀過不遣傍人為索瘢甬上耆舊詩卷二十

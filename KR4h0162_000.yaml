body:
  text: 甬上耆舊詩總集類提要臣等謹案甬上耆舊詩三十卷國朝胡文學輯而其友人李鄴嗣為之敘傳者也文學字道南鄴嗣號杲堂俱鄞縣人輯明州詩文者宋有鄞江集已失傳王應麟四明文獻集亦多漏略至明宋士𢎞之四明雅集二十家戴鯨之續集六十家張時徹之四明風雅一百二十家于作者採綴稍廣而源流未備鄴嗣嘗撰甬上耆舊傳紀其鄉先哲行事頗詳文學因即其傳中之人搜録遺詩論定編次而各以原傳系之始自周文種漢大黃公終於明季諸家凡四百三十人得詩三千餘首本四十卷甫授梓而文學即世其子德邁因以前三十卷先刋行之每卷之首俱有小序略依其才品名位髙下為次使各以類從而不盡以時代為斷于支派極為詳晰中如宋袁燮之潔齊集袁甫之䝉齊集亡佚已久今始得于永樂大典中裒集成編文學等固宜目所未睹至樓鑰攻愧全集尚有遺本流傳而僅據其選集鈔存亦為搜羅未至然其體例精審于部居州次之中寓論世知人之義徵文考獻條理秩然固非世之弔名悅俗瓦礫雜陳者所得而相比矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4a8707245c0fa6242af53047cb942e73f1d53d8ca2202031febcc09ee01fd123

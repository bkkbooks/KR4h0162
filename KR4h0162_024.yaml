body:
  text: 甬上耆舊詩卷二十四監察御史胡文學編應山人臬字仲鵠性簡默所至必閉門掃席意翛然人外初為名諸生數試有司罷歸因薄遊三楚間常一弔赤壁望觀音巖瀑布再泛大江載酒上晴川閣俯仰間發為楚聲一時詞人誦之巳北上薊門游長安諸公卿間無所遇而歸年未五十遂絶意進取世居鹿沙草堂種花澆藥與三橋李叟周農半諸人相倡酬論詩先輩謂自濟南婁江諸公以詩名世十餘家若置吾仲鵠在座不知誰當居左又曰仲鵠風格髙可逺追白沙近當少石詞家以為知言仲鵠詩余僅見何山人所選及楚游烏溪諸草為文亦有法惜未盡得其集讀之一日余與客論里中詩或云應仲鵠所作亦無佳句余不答徐出所録村居詩數首中有句曰春田雨足騎秧馬秋隴禽多縛草人又曰十畝桑閒賢者地三家草市酒人天客大欣賞以為得如此絶佳余笑曰此正應仲鵠句也雪至草堂既僻荒值雪更清閟三日東南風怒號撲人至早起霑霂霢餉午恣飄墜庭草色方新施白若加翠發生丁此時或恐轉憔悴依微拂檐栁凝凍不勝稚鱗鱗鴛鴦瓦漫漫狐兔隧豈少饑寒家知愁不知瑞呼童煨濁酒聊取雪窗醉雨霽擬登匡廬翠屏湖上開寸心巳生翼艤櫂江州城百里空濛色吳天攬新霽稅駕事登陟一徑入東林數峯看成側精舍香靄間髙僧或可即瀑水貫若虹爐香細如織誅茅有夙尚而況此名域無妨遂隱淪山南與山北自鍾祥舟行至江夏日來五百里書生偃乘傳攬物襟宇開盤餐纍州縣兹返只一舠東流水如箭晨興蘆渚炊昏泊柁樓膳往見鼉衣曝亦驚魚鬛扇柴門都水際槐栁開茅院荆楚重歲時大堤耀叉釧回首郢中雪巳成巖際電薄言就夙好舊壘志歸燕無喟行役勞空江數雲片都昌南山清隱菴古剎百盤上山僧一個迎題詩有縣尉檀越是書生棲鴿留禪侣枯松落梵聲尋常樵汲罷爛煮芋頭羹閉戶閉戶松鱗老臨渠竹粉香偶然來野衲小語及空王日永修茶具年衰訂睡方窮山渾自了焉敢傲羲皇泊湖口彭蠡流偏駛潯陽勢欲吞九峯爭向背一水辨清渾估客蒲帆下江村荻霧屯上方僧磬發岸火巳黃昏鄱陽湖水路將三百中流一葦孤稍嫌微㸃綴反覺礙虛無跋浪移舟偃蒸霞落日扶南康多土著强半上魚租庶矣江南國能容此大川來吞贛江水浮動豫章天直欲乘槎去相將鼓枻還因之思浩劫彌望總茫然小窗新啓小窗涼修篁個個香山禽窺藥碗水霧薄藜牀詩格枯能老年光淡可常近猶嫌有髮何必減空桑秋懷物色經今改離愁一倍新偏宜寒雨夜夢著故鄉人徑側黃花老山椒白屋貧時時計歸路無那欲沾巾江行兩岸看山去經春計水程飛花如解恨歸雁亦關情近郭雲為户遙村栁作城子長雖浪跡寥廓見平生嶽陽樓二首夕陽收近郭水氣忽淋漓空岸巨鼇負髙天大翼垂只堪明月照不盡快風吹栁毅傳書處應惟枯木知巴江奔峽口巨浸自天開日湧濕烟斂春殘雪水來何人吞八九有記刻樓臺嘆息先憂者無慙名世才酬吳興吳白雪使君此行還得借名賢坐領湖光碧浪偏瞻舊每思留犢處行春又及浴蠶天絲麻野集都成市魚米家充不論錢太守風流堪臥理郡齊長日掃雲烟姚少師影堂有自題偈語冀北江南事巳非禪機未了說戎機止聞智者師黃石曾見功臣著衲衣杉翠濕空春欲老砌塵凝席客來稀一參偈語低徊久颯颯靈風動素幃烏溪寄我江湖流浪身烏溪山水故清真春田雨足騎秧馬秋隴禽多縛草人睡起竹窗書一卷坐來莎石酒三巡願如在巷顏夫子到處簞瓢不厭貧窗咏雨後林巒色色鮮遙看白屋散青烟新秧得水針能刺肥蕨籠沙甲尚拳十畝桑間賢者地三家草市酒人天何門不可長裾曳其奈塵途馬腳穿夜渡漢川感事蕭蕭匹馬入孤村聚落無多擁縣門風遞爨烟迷白屋雨驅行色滯黃昏戍空導火存婺婦夜靜驚人走弱孫難後凄涼不堪說尚愁荒政隔重閽賦得雪浪石山骨居然巧分明雪作濤潤含波縠細白湧浪花髙翟峽如奔逸胥江或怒號一拳翔振鷺百疊負神鼇洞壑還吾輩崢嶸定爾曹月中光熌熌風際韻騷騷貯水瓷盆古栽蒲土鉢牢是曾經煮鍊應為肅冠袍不必需攻玉相親巳自豪刻竹悲歡坐臥役吟神只合三唐晚輩鄰後五百年青玉上也知流寓有詩人周文學應辰字斗文號緑莊性疏散不事修飾初為諸生工詩家在西村去郡中十里時入城輒館雙湖上與諸詞客唱酬壯歲游京師再客白下有兩京集行世慕豫章山川過吉水游于鄒南臯先生之門先生嘗問曰使周生為仲尼弟子當自居何等緑莊謝不敢先生笑曰試言之緑莊曰某小人所學在樊須鄒門俱羡其對晚年合删其詩六百首名曰緑莊詩采閩人林茂之敘之謂詩家色不古則近媚骨不堅則近柔徒事一時不足千古惟緑莊詩可謂色古而骨堅初緑莊謁鄒先生先生曰四明故才藪往屠長卿與余同門謂余曰爾他日頭裹一藍布嚼數片冷肉有何意趣余笑曰然則爇博山爐㸃虎丘茶君謂與冷肉是合是異相笑而别今周生風格瀟灑意從長卿游乎緑莊曰不然某于里中師余君房先生耳君房所著詩文名農丈人集緑莊自謂生平苦學僅得農丈人之半因更號農半塘上行青蒲葉已敷遲我塘上過所託者止水未甚有風波一解渺渺江湖水萍流不得住涼颸自西來行子亦返顧二解言有一束詩可以喻屮深欲傳流水去氷至在凌隂三解自今掩扉坐寒塘相見少有何一山人持贈金光草四解怨歌行有腕在手有舌在口豈無一長莫與我播揚豈無一得莫與我扼惜吁嗟乎人之寡情畛域太明我不如歸耕古詩行行重行行夕陽在崦嵫暮鳥有倦翼冬木無榮枝少壯不逢年垂老其誰知拄杖亦奚悲揮戈亦奚喜立馬當國門素髮令人指不如攬餘輝卷懷還故里矯志詩晨光發虛牖出往有所求當其日昃時猶勝秉燭游以兹惜寸隂盱眙經九丘禹跡不易遍禹穴仍淹留昻藏一書生將與千載謀𤣥穹一以默大化無留停七襄雖云粲猶傳捲舌星林風起飄忽欲辨巳無形靈均何其愚陸離紛騷經無寧恕醉言而謂我獨醒精衛填海水世人笑其癡十載變桑田成功良在斯愚公欲移山意氣亦如之但恐人力短不及鳥銜時當時幸自堅後人以為期苦熱行驕陽行自北遺熱何南方山雲火所吹陌塵烟為揚沸至井底枯尉至石膚黃星俱麗于象龍亦鑠其光念此草木軀暑酷安能當受炙爐之側揮汗甑中央一袒不及爽千扇不肯涼就風如受薰飲冷如飲湯隱几若晝昏帖席欲夜狂焦迫俯仰間無徑可逃亡虛想玉女逢借以六月霜不寐上天有息機無寧念勞人是人而成寐何間賤與貧嘗與少者隨倍與愚者親我亦人中宿終夜開雙輪良由血海枯重以思路頻思深如調飢思苦如臥薪輾側不自持祇嗟天不仁憶昔强盛時苦受文字因策以揣摩久書因痛哭新搏心真化繭變髮豈生銀而猶晚興偏病亦愛吟呻語驚疑擲命律細欲吟塵牀頭守詩祟户外明鬼燐持往問希夷言下巳成陳為示滅字方永充無懷民題淵明醉歸圖羲鞭在日馭魯戈詎能回爾祖惜甓隂先生耽酒杯運命既不偶功名等草灰諒豫無雜心東林可徘徊巳焉哉歸去來一杯門栁緑三杯蘿花開壺中有酒且盡醉莫待歲杪𤣥隂催喜雨禾頭猶有望一雨答鳴鳩蓑出霑霑壠鉏看決決流蘇于連次旱穫亦幾分秋約可官租給饔飱且漫憂陸公明住近湖堤沿植花木得薛岡為記斯亦郡中榮觀也因賦二首亦是城堤舊饒君為益觀移花來錦里借樹與長干士族爭相豔詩家並不寒一舟看到晚轉覺上湖寬居然當地勝栽者自人為蹊在不言處花如有韻時片霞流夕櫂萬緑上春巵記取名篇後彌深一曲思人日觀春知是值衰人欣然不隔春適當登菜甲兼得識芒神長命三杯舉晴天一耒親西風吟底極東望可憐辰彰聖寺宋樓太師鑰墓道度嶺轉通幽山扉舊額留羣峯原裹穴半寺獨支樓隧草凄翁仲厨烟冷比丘原田今巳薄國課莫旁搜東天王寺前林正鬱蒼行野覺雲香曠處天為佛深來寺即莊晝如依竹靜春亦逐秧忙所願開平糴流慈此一方下第後送薛完璞忽忽不得意秋風又送君路知雙目近情作一年分人影留殘照山光隔片雲歸期如可俟此去莫論文朝天宫帝座臨仙嶠雲衢自逶迤羽人迷節序朝士指威儀藥竈依然設桑田窅自移冶城非舊日别有躍龍池濟上李于鴻生日濟上悠悠路相忘十月春冬溫猶奈逺旅健不妨貧魯酒淡于水張梨爽似人為君輸一醉更喜在生辰咏月前除方惜暮忽有皎兮臨一寫秋來意如居雲外心致河全滅影與樹獨分隂試作氷輪聽清輝入朗吟禪巖新寺不隔鬼工穿仍來插一椽䦨當獅口入覆與鳥窠聨乳滴長疑雨嵐蒙亦象烟只看撑定力可以喻初禪訪贈李玩其翁自來稱舊學竟此百年隨仙李原留種衡茅轉玩奇內篇為近狀長者有前期投句松風後何如親見之黃河有感元氣涌于水河身萬里賖地中都禹績天上一仙槎憑力分回溜依神下淺沙俟清應有作顓此望京華十八灘刺刺不得上層層可若何驚看來勢險怪聽立名多今雨兼程阻長年盡日拖竟須經此去蓬鬢老風波沈懋功暢園作只以家園暢因之位置精為山䦨徑入流水引橋行屋小俱屯緑檐虛一漏晴坐來風韻徹聽鶴亦雙鳴游大名寺四望隋堤俱舊址獨留蕭寺㸃空村淨將明水初開鑑閒却迷樓不閉門垂栁飛絲零白鷺行厨引火出黃昏總當天末多惆悵可是盈虛酒一尊寄贈李偉卿隱居隱君年九十餘屋外有雙松為宋時物其詩自題曰桑麻集早知不及大夫招隱向田間取適遙春鳥一鳴為我屋風松雙聽巳前朝老于甲子年將百閒在桑麻句總超昨日有來傳刻本道君元氣未曾消東湖一自山回滙作湖稻苗東望水天扶因之利藪供漁罟兼亦仙家列畫圖浪打墓門秋與濶雲藏溪寺月同孤葑田多是蓮田壅有個蓴思擬棹無登蕪城蕪後城中歲巳深敞看烟景試登臨山當平處渾無骨水到灣時若有心瓊館花飛春漠漠文樓人去暮沈沈古來物力饒何極剩與啼鴉攪北林題陸侍御涵虛閣多向湖干得景偏取于虛借石橋邊仍分島嶼東西岸總領禽魚上下天簾樹欲圖烟不隔棹波如引月長牽平看却有吟臺想漫自標名比浩然九日家居憐我廢餘臨此節知他髙㑹落何方雁將秋影分明滅菊與人肩較短長祭酒于先如拜懶授衣在側只披忙亦猶稱健堪榰度一理荒吟到夕陽舍館感事北來消息竟如何老却青衫且自歌草草世間生落索魚魚江上入奔波寒裝坐雨春游減小管窺天星應多欲採占書作南史可能强飯慰蹉跎逢張爾諲向聞衆妙有張諲恰又移名贈此人露浥桐花秋在眼風翻蘋葉水為神新詩吟就全驚謝古篆鐫來不讓秦逢在塵途知不隔倘然孤劍躍龍津異人李處士埈字公起父尚默為名御史見本傳公起生即聾然性靈悟至孝御史出按遼左卒于官公起甫十餘歲在京邸聞訃號慟凡五日夜水漿不入口咽枯而嘶乃更啞及長盡發先世遺書縱讀之手自較讐不間寒暑既于天下事漠然無聞復不能從問質凡有疑義唯坐對古人默相辨折務在得其所安性好客郵筒走天下四方學士大夫亦樂趨之具賓主以案相通以筆有問奇者則載紙以往上自國家典故旗常邊場户口名臣嘉言行無不得其始末以至考一器一物輒為作史作譜輯里中所記載名甬東軼事撰述甚多俱身自尋繹幽奇畢呈無少遺失晚年尤好種植奇花名藥常滿階庭舍傍有斐園竹波軒青蘿閣諸勝俱與客游涉處自好學之外淡然他無所嗜翻若口耳為煩也所行世有盟鷗諸集其未刻者尚十餘種俱藏于家曹能始先生嘗合華亭唐仲言為二異人傳仲言瞽而工詩通古今公起以目誦仲言以耳讀兩君誠千載異人也夏日咏懷清夏日巳長幽人無一事晨起苦炎熱東南氣候異街市雜喧聲研席從此避瀟灑午窗下嘗有槐隂至記得手植時許我依寤寐何必著𤣥經枕中落奇字晚涼濯體罷臨沼看荷芰海潮行海中七月颶風起淫雨經旬下不止萬丈洪濤勢接天蛟龍狂吼怒秋水潮衝盡破浦頭船漲入汪汪浸浦田捲禾堆草爛欲盡飛沙走石山之顛頑雲合沓城俱黑苦霧蒼茫淡無色幾處流離幾屋空呼天動地無消息間有賣兒完橫征半生半死不成行幽客無能援手臂風前悵立難為情吁嗟嗟難為情閉門若有波濤驚山隂晚泊落日山隂道孤舟帶逺汀秋林紅葉重夕浦黑風腥客夢砧前斷漁歌鏡裏聽來朝餘興在何處訪蘭亭宿鷺黑夜沙汀上依栖白日明裀留莎草軟幕借水雲輕浪蝶翻無夢浮鷗伴有情由他舟共白燈影不曾驚幽居幽居門巷僻滿榻落花深頗怪無童掃翻諧謝客心游絲黏雀墮飛絮攪蟬吟竹裏風爐淨茶烟冷不禁斸笋春霽一林青江雷忽有聲土驚苔面破候促竹胎生帶月呼童斸燒燈與客烹齒齦新味得和句嚼來清掃徑掃徑停松帚閒居敞竹扉寒深留雪滯風定恨花飛仔細防苔損從容度葉稀罋頭新酒熟春色報芳菲歸棹薄暮垂孤棹天寒帶雪歸清溪魚不上深樹鳥還飛山徑氷霜合江村燈火稀鐘聲候夜半回首扣柴扉讀米仲詔水部迎石文却寄拜石還迎石今人式古人船乘千載癖文就一家新似得寰中巧應同席上珍靈心抒品藻中嶽是前身寄曹能始少參聞道浮山勝水松十二株華堂背北郭曲榭瞰西湖閒蒔三山藥髙懸五嶽圖金屏花外擁小小侍呼盧董小雙李小蘇俱閩中名妓秋莊九月江城下早霜紛紛紅葉滿秋莊雁鴻逺度衝寒色鳥雀爭鳴亂夕陽飯以山田粳粒白盤兼沙礫蟹螯黃暫時消受憐風景便欲行歌學楚狂讀南華經樓居幽借水之隈濛雨含烟只不開塔影似從空際落雁聲知向冷邊來疏留一徑先生栁白擁深山髙士梅展讀南華聊自適香爐茗碗足徘徊汪山人樞字伯機大父鏜官禮部尚書伯機家多賜書復嗜讀為人性蕭散工詩不樂仕進治别業曰泡園作園居六十首三山徐興公至甬上一見稱之題其卷曰疏作風清逸同雲上古惟彭澤今有伯機晚年合其前後詩為存俟篇行世伯機于里中先輩作五君咏曰大司馬東沙張公布衣沈嘉則楊伯翼二先生儀部屠長卿先生太守田叔先生自謂前三君俱不及北面至二屠先生猶得侍杯酒從容咳吐故其風流所被尚有存者懊憹曲三首相思重相思歡定思儂否儂意若江湖迢遙逐歡走天涯尚有窮别恨終無極日照黃檗藩可憐苦離色千金買妾身一旦逺行邁大艑如屋寬底事不相載早秋刈穫述懷杲杲朝日升垂垂水田熟喌喌呼白雞決決飲黃犢稍稍溽暑收瀼瀼露華沃庭户絶追呼春秋足魚菽卒歲計所餘修我牆與屋男悅女欣欣杯炙勞僮僕躬耕一丘田飽食詎非福日夕巧窺窬川塗疲仕宦放利來怨憎居髙邇謗訕所得不俟失雖榮何足羡未若村中農腰鎌安孤賤緑芋雨中羹黃粱花下飯相過平生歡握手聚親串疇識心計勞永辭不材患桔橰懸梁梠婆娑甘景宴雜詩千詩滿人口未若腰中纒上藥可延命未若身少年青陽不自好理鏡見華顛五十仍牧豕負薪南澗邊生慙洛陽少命乏陽羡田縕袍者誰子豈必狐貉賢巳矣弗復歎天道默以𤣥白紵詞㪺瓊漿飛玉斚香風習習裊蘭麝投籖浮箭促芳夜昨日春來今日謝太息韶光不相借銅盆燒蠟翠帳和美人起舞色微酡輕身躡節影婆娑百年朝暮奈樂何聽我新翻白紵歌狂歌行吾聞咢口不可張唯唯之頷食萬羊又聞毅面不可示脅肩而笑富千駟始信有躬忌太直始嘆有心不蚤匿世平不數夷門生諸侯今賤小臣稷讀書豈願終巖阿骨體其如不媚何安國灰中心漫在陵陽石裏淚應多平原不起鍾期謝知已未逢車孰下縱心且復事歡游蹙額誰能念婚嫁西爽朝來無日無碧雲邀我泛春湖知非五十今年是蚤晚裁書謝畏途苦雨不禁連日雨為問幾時晴春向聲中減昏從看處生溼烟留幕轉飢鳥下階行空有盈尊酒餘寒只自傾人日匡坐對瓶供新年七日逢風聲喧鳥語晴色照溪容投老無他事看山有短笻數椽遺構在長得寄疏慵嘉禾道中水木清如許行舟風正和戰場過檇李平野有嘉禾花露瓶中酒竹枝塘下歌旅游殊不惡閒殺駐烟蘿早春貧家無歲事贏得看梅花舊句研朱改新醅寫券賒閏年春意早亥日市聲譁又見南園栁枝青欲吐芽園居此地絶髙軒翛然半畝園門前山入畫屋上鳥傳言仙藥隨時采丹經盡日攀投閒人外久轉覺市廛喧塊然何所羣似鶴復如雲身老唯饒卧家貧不茹葷先秋涼意動隔水逺鐘聞聊此安吾拙寧緣避世氛久絶風塵鞅丘園寄嘯偏貧應遭鬼笑老未受人憐歲月消雙屐乾坤傲一氊不須嗟濩落無事得髙眠徘徊谷口望落日鳥頻呼土産饒鱗族山資倚木奴西江羞借潤東海擬乘桴却笑髯如㦸雕蟲作壯夫青墊幽絶憐青墊泉香片雨餘港枯移棹澀樹老著花疏謝豹深村笋鸕鷀小市魚西山遙在眼春興劇紛如一丘頭白合身閒行隨倦鳥還春生栽木地水漫釣魚灣刳竹通遙澗刪松露小山一丘髙卧穩無夢落人間羣盜二首此日逢多難乾坤半戰場一夫時嘯聚羣盜正猖狂螳怒空勞逞狙謀祇益亡萬全須善策制勝在岩廊春色何無賴登樓賸惱人江湖紛說劍風景幾霑巾餘喘仍墐户殘魂數震鄰親知遙萬里消息未能真麥飯一飽他何願隨緣託此生歲時新麥飯籬落短蔬羮紫燕巢梁穩青蒲長葉平四方多難日谷口好躬耕歲晚一灣鴨緑水粼粼小盎梅枝暗入春身少拜趨聊當貴家無逋負未言貧行歌晚興還依舊轉盼年光又斬新但使歲如今歲過不妨長作海壖民壽何無咎先生八袠大業何人許執鞭陽秋獨秉布衣權服來鍾乳三千兩看足霞峯十八天古籙閒披飛脈望神丹初結舞胎仙知君自是容成侣夜夜調笙坐紫烟泡園疊石編茅作隱淪一丘何處不容身躬耕聊給妻孥飽莫笑樊須是野人薛山人岡補録字千仞少以事避地客于長安為新進士代作考館文字得與選因有盛名一時共稱薛千仞先生所著天爵堂集亦稱天爵翁千仞年八十集其生平元旦除夕詩為一卷起萬厯庚辰至崇禎庚辰福建林茂之敘之身為太平詞客六十年名重天下亦盛事也晚年歸卒于里中千仞有盛名于世仲鵠諸人俱出其下然于鄉論頗跡其人余初擬從山公之例今得附列五君亦足矣然後知鄉論之甚重也春日獨酌一雨垂十日庭草紛如絲柴門人跡鮮水曲羣鸕兹宴坐啓山閣好鳥啼芳枝興來聊自酌髙頌古人詩適量不在醉適意不在詞窗前有白雪若與飲者期月下聽琴歌送琴師趙君禪房夜半客不眠攜琴在月月在天為余愛琴復愛月指下微風響七絃七絃悠悠凡幾弄月過星移天不動滿院春烟散泣麟無數飛花撲鳴鳯曲終客去月亦沈泠然一清世上心山髙水流君不見耳畔空存月下音庚申元旦釋劉御史出獄日掛鳯樓端年新事改觀可矜臣罪薄不測主恩寬望赦心徒費回天責巳完諸公有笑口踴躍試辛盤華清宫繡嶺出烟村宸游跡尚存離宫何處是流水至今溫輦路年深廢峯巒幸後尊空餘一片月猶似照朱門庚辰除夕時萬厯八年余方二十為贅壻於陸簫鼓聽比鄰魚龍視此身年庚方少壯頭角欲嶙峋有苦同新婦無甘進老親送窮兼歲去明日是陽春庚辰元旦余年正八十在金陵前度歲庚辰寒風贅壻身得偕鶴鬢婦同作鹿門人車馬都城曉雲霞故國春衰微往往見憂病不憂貧閉門水邊楊栁雲邊閣粉壁紗窗掩映開不用閉門防俗客幾人知到此間來甬上耆舊詩卷二十四

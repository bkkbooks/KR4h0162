body:
  text: 甬上耆舊詩卷三十監察御史胡文學編金處士鏇失其字與用衡齊名題楝塘李先生隱居佳樹森森生緑隂索居人傍小江潯煖風涼景眠畦犢明月髙枝憩水禽青子肥時春草碧紫花落盡夕流深籜冠藜杖門前路閒引逍遙物外心金處士銘字用信以絶句名山水圗幽藤細蔓落深青虹影霞光石壁明月出山空人語静芭蕉葉上動秋聲悠悠客夢破寒烟明月江洲思渺然鶴背忽聞横夜笛不知何處是君山題畫小茆亭子竹風涼一卷黄庭晝漏長童子不言雙鶴夢細推甲子到陶唐昨夜秋聲到井桐畬田香散稻花濃空山落日秋雲薄人在秋雲第幾重豐處士鎣逸其字中夜感憤思浮海顛連正泣岐客衾孤擁夜山舍久霖時蛩響方依壁雞聲未出塒十年薪膽意無處問要離全處士淳逸其字江口浮空閣乘興登臨意爽然巖阿懸構一壺天隔邨雞犬芒鞵底繞屋雲山竹榻前更想髙飛還跨鶴若能住久即成仙柴門分付深深閉祗恐行雲攪客眠秋日天王寺訪楊伯翼不遇寒林十里聽秋聲踏入寒莎路幾層雲墮松梢邀過客霜酣楓葉卧髙僧溪舟興盡憐空返隣酒呼來醉未能落日滿山歸去急何時揮麈共禪燈朱處士應龍字舜夔亦字近臣號東籬其時沈嘉則先生與葉鄭朗論詩盧九山人與東籬論詩俱甚懽人稱為明州四傑東籬醉飲海上乘月溺死其詩遂失傳諸家所選東籬詩俱非其意得者余從朱氏覓得樂府一卷為録數首短歌行人生幾何樂少憂多彼逝者日如江如河一解歌當以謠莫如心勞何以忘憂惟有松喬二解我思故人在河之瀕欲往從之度涯涉津三解皎皎月明駕言宵征唯君之故不遑自寧四解桂檝蘭舟汎彼中流今夕何夕載酒遨遊五解臨風鼓瑟中心弗鬱弗鬱者何所懷非一六解黄鵠髙翔日逺故鄉徘徊中道風雲激揚七解山忘其髙海忘其深智哉古人實獲我心八解悲歌得書如見故人寄書如見故鄉心念久客感結自傷欲留無親好欲歸無舟車忼愾不能黙泣下沾羅𥜗懊憹歌白航張青帆載儂歡子去風生栁樹間飄揚落何處桃葉歌桃葉復桃葉下覆根與柯渡河今巳慣不復畏風波子夜歌相約采芙蓉來往湘江邉湘江雨方重無晴不見蓮柴處士應聰字仲初屠田叔先生壻也有詩名屠長卿集首載譲柴仲初不至書即其人也所著自怡集同王太史季孺登呉山飲大觀亭大觀何處好絶壑俯東溟林密纔通徑天空獨有亭潮來江氣紫雲共海峰青四顧心雄甚狂歌酒半醒聞仲連招飲董母墓上得江字春色正茫茫相攜上釣艭桃花迷逺渡天碧影空江古墓苔侵碣荒祠樹作幢一時酬此恨千載重吾邦過客都如阮山翁獨似龎古今真易改意氣最難降饌入銀絲鱠香浮淥酒缸看松雲片片步壑水淙淙飛去花無數啼來鳥一雙歸舟愁日暮亱雨急蓬忩呉處士浩字惟直吕中甫山人所稱同里論詩首舉惟直而其集失傳俟覓補之候潮之定海江樓歌罷酒方醒畫艦如飛帶曉星萬浦晴暉蛟浪赤兩關秋色虎巖青沈浮白日漂長劍汗漫神州憩小亭白髪何人猶下釣寂無車馬到滄溟余明經經訓字生超文敏公之孫也少有異才年十四以明經貢于鄉至京師與屠田叔蔡子行二先生同賦詩唱酬屠蔡俱詞家宿老生超年少一日而與齊名今所傳薊門游草是也未幾歸里門生超旣負才誕放娶妻如許允婦婦死為其家所辱因客死吳下蘭摧玉折識者哀之感事同田叔用拙作嵗月寒仍小牛羊草不黄嚴凝看氣象明盛在隄防播榖憂恒豫維桑計總長平生蘿薜事投足恐踉蹌去年西土役宵旰急羣才雨雪三邉盡英靈九廟開成功無曲突議論有登臺誰決河隍水崩城竟可哀宫人斜絶有蛾眉恨都從此陸沈春羅芳草合秋扇夕陽深棄置空懷舊凄涼總屬今猶疑待恩澤存殁見天心洪光寺曉色㝷山勝幽怡只此偏巖懸垂樹迥磴斷雜雲還信美非塵世虚疑隔化天羣峰行欲墮曠邈識孤騫清涼寺鳥道盤干折松門到一區曇雲幾朝夕豐碣竟模糊殘燒依霜葉空厨失午餔天寒増蠟淺深殿肆蒼鼯陳文學瑛字宣逺有詩名一時詞客以詩律相往來盡見集中唯宣逺與仲初所傳詩絶少當更覓之蔡子行先生見過出示新詩復對庭梅有咏奉酬一首冬日南忩好翻書頗自憐忽來髙士駕喜誦白雲篇心與寒花合情隨幽草偏開襟取一豁吟對夕陽前李處士時魯字得之沈嘉則先生與論詩延在家塾遂得交一時名士晚年更與胡百藥孫象可唱酬其人誠可與言詩者也訪胡百藥任君文不遇雙鴻度寥廓悵望白雲層脩竹迎人近髙樓接樹平鬢疎風易響衣冷酒初醒相送惟聞霰蕭蕭江上聲無壁茂陵徒四壁無壁更何如竹影通羣雀藤隂走螙魚日窺空室徧風卷一床虚剩有烟霞色朝朝落卷書沈處士公孫字稺僑與李得之唱和久雨五月經旬雨愁懷何日舒螢流郊外草螙蝕篋中書緑暗雲生樹溪平岸出魚終朝無客到把酒自踟蹰陳山人大魯字穎叔初余君房沈肩吾箕仲長孺諸公有甬上七子之目穎叔其一也穎叔精于史學嘗上取羲皇迄于元論斷其事盡為有韻之文名曰詩史聞其卷帙甚多吾友陳子遜所藏僅首卷為録二篇于此亦足徴其史學矣黄帝軒皇初授禪弓矢事横征五十有二載遷徙衞師兵迎日以推莢葢天乃象形調厯六術總翼徳七輔并設臺圗入夢記言史載青染采辨章服躬祀親蠶耕桴浮制舟楫蓬旋始服乘巢鳳徵文始游麟感木精蘂茹戒丹書靈簡涵内經化理樂華胥端拱履昇平空同訪至道一再如廣成採銅神鼎就騎龍云上昇屈軼尚無㨿烏號未可憑愚生千載後惟聞歌徳聲巢父許由吾道有隱見達者蹈其幽儻悉起巖廊何人卧林丘堯舜相為貴重貽箕潁羞放情山水間四岳等雲浮一瓢猶自多滌耳惡來求欲飲懼汙犢鞭之趨上流胡為今昔人往往重斯儔不難官稷契未易屈巢繇李山人先嘉字之文家在城北偏先賓父在東偏二人並有詩名楊伯翼詩所謂城東有李生城北有李生是也後以子遵貴封御史東莊即事髙天不礙四山青埜色蒼茫草木平新水秧田斜下鷺夕陽花嶼亂啼鶯橋邉貰酒堪行樂隴上遺書日課耕車馬不來塵市逺儘教白晝掩山楹許處士震亨字子長有旅游集春日山中即事春來長晏起林静日初晴鳥雜難慿語花多不辨名峰巒窺戸牖臺榭枕江城忽抱鄉關念含毫賦未成呉山人柱字石父少工于詩嗜酒亦喜鼔琴有名于時李景洪小山築成隨贈滿目借雲山林泉競瀟洒主人無長物隨地栽梧檟羣峰晩作隂萬木秋成赭適意慕漁樵放浪追風雅幽獨本吾師榮辱何為者荒城雉堞雲落月魚鱗瓦聊作遂初游豈尚耆英社張處士子魚字長鱗少工詩亦精篆書有感骯􅗣非吾事浮沈天地間道能存白日貧不妒青山嵗月容瀟散風塵任往還未能逃世外空自惜衰顔杜文學受泰字蒼舒少有詩名早殁余嘗見其佳事園遺草一卷今不可覓矣寄仲連自愛衡門著皂冠談𤣥風落鏡湖干清齋對客無長物挿徧梧桐與合歡董文學大晟字揚明有歗廬集曉炊緑烟微竹裏紅葉到忩前隣舍晨炊動鳴禽喬樹巔誤疑身共棄是否偓耶錢還問山妻道胡麻熟好便孤山月寒天碧浸西湖鶴影歸來半有無人在一樷香氣裏空亭占得小山孤楊太學徳遵字公路步至郊園隣人有以新茗餽遺者步轉水田鬱人來竹徑涼當池蒲正緑隔岸栁偏長鬭雀趨藂薄啼鶯近小堂比隣何雅意新茗送余嘗自鏡水蕩舟至小溪窈窕澄溪路蒼涼九月天岸迴頻下葉沙擁急奔泉野館青帘出漁家赤網懸到來山盡暝孤寺起寒烟李處士徳進字退思號枳楊為人風儀秀朗喜言詩不拘聲律先輩甚稱之雨中與隱父叔獨對雨竹淡無色庭梅癯有神鳥聲趨耳換鵠髪上頭新幽意惟春草髙懷亦古人蕭蕭相對處言笑任天真江上落日滄江上芙容未肯開小船乘水去孤篴趂風來作勢當秋急移聲入夜哀相看多寂莫搔首重裴回庭梅昨夜東風吹動初庭梅早見一枝舒但從雪後看逾老纔到花時影復疎地静常容窺客座嵗寒終稱䕶吾廬他年杖䇿攜雙鶴深向羅浮最上居黄文學嘉謨字英言溪曉山深日未出舟小一溪孤麥浪隨風偃松濤隔岸呼沙明驚宿雁星没散飢烏霜鬢清潭照鬆鬆白映顱董文學世登字善如性至孝為諸生有名少工詩喜為竒句世居甬江干園廬花竹家有藏書客至剪韭擊鮮欣然也以其學世授子守諭官戸部主事是為次公先生孫道權即吾友㢲子也遺詩數卷藏于家被火失傳僅從詩括中録得一首為惋惜久之千丈巖峭壁渺難攀仰睇殊可咤仙人撫玉掌指顧移崧華女媧立太清日月走跨下雷雨閉烟光氷玉響空夜直堪起乘風翛然隨羽化董處士儁字仲籲有亦愛廬詩城眺睥睨千山逺旋迴萬壑通城髙不礙日樹小亦迎風極望人烟密孤吟海月空鳥啼猶夕照踏破翠雲中李文學徳孚字子尹善詩畫有白華軒集除夕客館逢除夕鄉愁覺更頻囊錢看漸少緼被力逾陳嵗換慿春酒時消併臘薪人情與客意明日一番新有感憶昔曽從燕市遊酒人聚飲日無愁羽林健士都虚籍車騎材官任白頭輸輓東南真竭力經營西北豈虛謀只今烽火頻年急便是鄉關也繫憂虞處士伯龍字公普有擔簦集舟中寥落明州客孤懷寄短篷江豚偏謔浪舟子但呼風歸夢隨流水鄉書問去鴻不知今夜月千里可相同陳文學來章字士服有歗月樓集其人豪士也醉言客饋麯君殊太虐清明大醉鸕鷀杓舉杯問花花不言酒正使人人可憐春隂細雨苔徑滑倉庚欲喚枯桐發夜讀忩前萬卷書朝看室内釜遊魚李杜聲名燭天表當時際遇何草草制科只重宋儒疏子虚長楊向誰賦髙才名徳惟王公一言落筆蛇為龍亦知肉食非長慮紛紛都向此中去青衿才士狂且貧白眼少年目攝人春風花栁年年路埋没英雄不知數平津閣廢空落霞誰能干謁王孫家縣官督税如哮虎蓬鬢蕭蕭坐環堵籬脚疎篁無力種床頭雄劍強起舞不如典衣沽酒酣青天目送碧桃花下釣魚船憶事萬户秋聲到草堂去年馬首是他鄉五更霜雪欺人白十月風塵刺眼黄貧比監門猶慕義醉從燕市不禁狂歸來七尺渾如昨蓬鬢雄心一夜長買小罾小罾買出老漁家髙傍長堤淺傍沙不為貪魚逐江岸一天春送白楊花李文學徳星字子五有栩栩集客舍一天潮擁海門東月照殘更樹影空啼鳥盡情催夢起不知人在故鄉中范文學鴻儒字非鳧所著茗柯集此公詩殊有老氣惜未得其全集録之苦雨暝合天全黑雲垂壓短牆漏㾗成古篆雨脚立新篁黴色侵衣桁嵐光溼印香莓苔隨地緑天氣近梅黄夜雨憶莊天目長歗燈花落蕭蕭獨掩門流螢依菌閣鳴雨戰山邨得句誰酬我支頥自憶君最憐生計拙浪跡共浮雲旅思落日上髙樹涼風吹葛巾月于今夜滿僕在異鄉親客泪看花淡愁懷縱酒頻蕉聲與蟲語偏逐苦吟人中秋後一日訪棲真寺秋色徧江津菰蒲露氣新亂山迎拄杖落葉趁行人白業吾知己青松佛作隣雲心與水性彷彿悟前身屠文學惟忠字文將田家即事小圃聮茅屋疎籬䕶水門寒風催落木埜色散朝暾刈稻腰䥥出祈神社鼓喧坐看放犢去溪步入前邨袁文學時起字當世秋夜拔劍雄心在驚看去日長碧梧秋欲老虚閣夜生涼有淚蟲吟砌無眠月到床今宵千種慮都作鏡前霜董太學應禎字茂先有白璧齋集虎丘晩眺愛此丘中勝慿欄又夕曛水深魚競集徑密篠難分枯樹巢新鵲空臺宿老雲千人惟我坐瞻顧歎離羣送伯齡叔就試南雍八月仙槎向夕城西風吹捲暮潮生雲連別浦蘼蕪暗夜泊官河絡緯鳴臺上雨花飄客思渡前桃葉送秋聲下帷應念堂垂白蚤為江都繼令名張文學應芝字皇符灘逝此東歸急深隨春漲行不時驅雨勢無候到潮聲破浪誰相得奔波只自驚那知雲碓裏安坐𢷬香粳章訓導載道誤入字長輿沈文恭之甥也有詩名亦工于書法所著竹圃集之姚江西津夜泊夕陽辭古渡潮落且停艭雨氣紅奔電風威怒捲幢一葦航越水百里辨姚江不寐看殘月清光逗短忩李文學坤元字公簡其先宋名臣禮部尚書育本青州人後徙家于鄞凡八葉進士以孝友世其家至𢎞正間有曰南塘翁益擅至行始卜宅社南人稱社南李氏公簡即其孫也少能傳家學為名諸生性至孝事父母疾不緩帶居喪哀毁盡禮有兄弟六人友愛備至後分居推田譲宅惟諸兄弟所得始受其餘凡六試于鄉罷歸乃益専心學問嘗言為學在躬行但能不愧俯仰始足稱儒者里中俱宗之年七十三終于家後人世多賢者自述兄弟嘗難得吾家有六人後先惟一母吾汝不分身花月酬良夜琴尊答令辰扶藜偕出入此外復誰親宿埜寺松林日暮寺偶借一龕眠檐雨難成夢燈花亦結禪空香分四座清磬肅諸天此夕閒相對勞生暫息肩題扇春山寂寂水徐迴隔岸桃花似扇開曳杖定尋紅處去却無人過石橋來題畫冊山深一路樹冥冥僻處兼無鹿跡經不信有人閒布置臨溪結得小茅亭髙文學葵字伯陽三水令瀛之子少有才夭殁屠長卿先生叙其遺草山寺此日遂幽尋空山落歗吟白雲樵徑僻黄葉寺門深十月有春氣一僧多道心相看無別語不辨是西林李記室徳述字子述少為名諸生能詩有經世意喜抵掌談天下事壯嵗入閩與曺能始先生徐山人􅎾稱詩相唱酬因有名晩年復遊塞下為開府左公記室時與論兵畫竒䇿所向有功當事方論薦于朝㑹以疾卒曺能始為刻其詩閩中莫春赴曺能始觀察酌浮山堂限韵為踐浮山約穿林及曙晴岫雲吞更吐川路暗猶明稍憩支笻力旋逢倒屣迎堤紆環澗曲巖迥搆臺横飛棧通無際奔湍聽有情蟻行臨木杪雀躍見潮平漠漠隂霾重飄飄江鳥輕摳衣參古佛瀹茗品泉清洞壑形殊幻岡巒勢若并暫從雲磴下陡覺雨㾗生登閣將觀荔拏舟始漾萍老檉淪浩渺平楚出峥嶸舞見松間鶴啼聞谷口鶯栁綿看盡脱荷葢喜新擎總羨籓籬徹時令樵採行有容瞻廣大無競識貞誠自是天為設誰云力可成輞川何足貴梓澤亦虚營坐密觴頻把談髙語欲驚莫烟交水榭積靉散忩楹勝集良非偶佳篇敢後賡自兹還海上不用訪蓬瀛寒食十載逢寒食家家火盡然却愁窮巷裏先有斷炊烟汪山人彦字穆如所著曰雌溪草堂集山人晩年嘗與先公賦詩相往來尚識其名氏觀海一篇最為詞家所傳移家稍于城市逺漸覺物情新溪鳥垂頭立山猿接臂親秦宫空有樹漁父本無隣或恐桃花誤還當一問津南越舟中懷杜言開士把手東林別塵蹤遂逺遊千山猶落木一嵗半行舟短燭飄殘雨疎鐘應碧流知君魂夢靜尋不到羅浮與沈源美杜言登候濤山觀海六十韻浩淼乾坤裏縁蘿陟寶坊披軒汎容與適意縱徜徉粉堞潮聲撼青峰練影涼九州分控帯萬里盡微茫直是奔元氣寧容遡濫觴偶時能震地何谷不遵王受露疑無底浮天似有傍乘衰輸巨壑避礙度迴塘險阻蛟門設咽喉鼇柱當及秋風作浪未曉日登光形勝猶同昔蕭森此一方數丸占漲汐跳沫走平岡白晝驚鳬夢寒霾失雁行收鮮歸近浦濯網掛危檣積濕衝衣潤淪隂合岸黄懸洲歌伐木鬻渡競鳴榔島濶潮雞應流深贔屭強濤翻如峭壁瀾靜即康莊浪指尾閭洩虚傳鰌穴張無繇窮地脈總道接天潢海味居民熟風波過客嘗大魚吞雀舫姹女舞霓裳蜃結孤樓迥鼇擎別嶼長援琴情易寫銜木恨難忘入水禽形化凝鞭石血藏揚塵説清淺滿屋記滄桑方士憐徐福飛仙笑始皇當空餘鳥道寥廓斷黿梁梵刹遺金鉢蓬瀛敞玉堂濳靈時出没隂火暮輝煌牛啖紅蓮鐵人餐白石糧本非塵世界只在水雲鄉肉骨少輕舉真如莫闡揚畏途正洶洶東海自泱泱決注頻觀彗炊烟遍煮霜珍竒資奥府捆載集行商盤淚鮫人泣冰蠶泉室將𣙜征多踞虎朝貢久無狼遙望鯨鯢窟還憂魚鱉殃徵兵聞羽檄移汛戒艅艎不犯斗牛象誰殱金虎􅉭鴻冥青漢冷龍蟄紫雲荒一嘯陽侯遁三山神瀵香翼從沈髪北愁巳散眉眶魯氏偏逃爵任公肯釣璜呼開關九豹吹落管雙凰所見銀宫闕應銷土胃腸烟霞因世癖傲睨覺身妨色界冥濛老年華搏激忙蓬飄隨泡聚機息共鷗翔薄俗渾皆濁吾生且獨狂珠遺聊復隱蠡測那能量河伯趨堪歎波臣語漫傷掀髯照塵幘回首問慈航桂樹搖明鏡芙容吐碧鋩懷材方百六選勝豈尋常歴覽真都幻登臨殊未央眼前襟曠蕩杯底興淋浪襌月頻揮麈佺期屢據床醉來攜手去箕踞看扶桑屠文學金樞字西昇長卿先生子也悼内南國名花映夜舒亭亭猶憶碧忩虚可憐陌上遺鈿路不得重經油壁車沈氏天孫附字七襄宛陵人沈君典太史第三女也太史與長卿先生交甚懽遂通昏姻以七襄為西昇婦七㐮旣歸屠氏日與長卿女湘靈論詩每徵事紬書分題授簡紙墨横陳朱藍狼藉長卿夫人亦知文值有諷詠輒就商訂焉長卿詩曰封胡與遏末婦總愛篇章但有圗書篋都無針線箱又曰姑婦歡相得西園結伴行分題花共笑奪錦句先成信一時之盛事也不數年兩人相繼夭殁長卿為合刻其詩行世同時李氏大純字貞君士人袁雍簡之婦朱氏徳璉士人呉岳生之婦也俱能詩大純病中懷夫壻有曰煖風却怪掀簾箔涼月何心到芰荷徳璉寄弟有曰天邉雁陳都成字壁上蝸涎宛作書並佳句足傳也自君之出矣自君之出矣孤月鑒虚牖思君如飛花隨風不回首子夜歌亂雨飛翔雪凍雨催春暝不念郎身寒所畏郎心冷游仙曲青溪白石出胡麻香煖瑤池九影花見説元都無甲子春光常住阿環家宫人入道曽住花前七寶臺守宫玉臂映蒼苔香消粉㡠晨匳廢涼入鐙幢夜雨哀鵲鏡化為春月白鳳裙留作野花開辟寒金在啼㾗盡却伴東華采藥來屠文學一衡初名玉衡字仲椒長卿先生次子也為近體詩秀色欲掩其父落日旅泊真無賴羇愁任閴寥長天没歸鳥古樹自前朝谷暝雲歸壑風清水注瓢漁梁争渡口牽挽過溪橋涼思瀲灧波光細空明藻荇牽清颷生几席涼思起樓船避世疑無地尋源別有天滄浪問漁父把釣意陶然暮烟暝色収殘照牛羊下逺汀半籠濃淡樹微見短長亭燈火千家社蒿萊田父扄蕭條邨巷裏牧篴不堪聽沈文學當路字齊卿嘉則先生子而葉鄭朗之壻也冬日留諸友酌豐對樓共倚髙樓望渺茫一杯欵欵話斜陽簷前病葉同吾老隴上疎梅為客香笋味初腴供瓦銚布袍半軟襯繩床登臨此㑹人猶健秀句分拈得雁行沈文學雲沖字龍侯箕仲先生子葉鄭朗為叙其詩桑社歡呼桑柘裏鼉鼓弄新晴葉底清尊滿花前白髪明傲然社祭酒何事漢公卿巳不勝杯杓鶯啼更有情送孫象可客丹陽天地堪為旅行踪逐去萍亂雲迷北固斜日到孤城命以安時達身因善飯輕射潮須努力聊慰故人情沈文學泰漳字士清長孺先生子也少為諸生晩年棄去屏居一室中即家人罕接其面有詩曰玉槎集舟進小溪錯記邨南路循涯到北溝水扶溪石走魚冠荇花浮鳥語争傳夕松聲乍報秋道迷何處問漁艇隔前洲愁雨原田垂可穫夾日雨緜緜稻是眼中飯人看頭上天囷中虚鬨鼠爨下待生烟共向邨祠祝能晴尚有年蔣文學之驎字龍友余君房先生外孫也有紀游集鹿田寺崒嵂倚層霄山空木葉凋石僵田卧鹿寺古徑通樵折茗甆中供前峰座上朝慿髙弔玉女桂隱若為招三河夜泊白馬嶙峋俯睦城三河古戍舊時名夜來風雨溪聲發似為將軍洗甲兵戴處士興世字日觀登棚墟嶺峻嶺不可極窄步難為前數里盤松蘿百折愁攀援蹈險力巳疲獲竒心自偏雙鞵亂雲脚滿眼生髙烟蒼崖挂殘雨紅壁飛鳴泉石墮不到地峰攢盡劃天明河曏下轉帝語從空傳鬽白日出山䕫當道眠杳杳聞吹笙兾得逢遊仙下嶺發長歗兩腋風翩翩拂衣坐白石松䬞起晝寒周文學朝俊字夷玉少有才為詩慕李長吉亦工填詞所撰有李丹香玉人紅梅花十餘種惟紅梅花最傳先伯父玉海府君為蜀中營山令縣在萬山中地最僻初至縣中士大夫具酒延令君奏樂伶人呈劇目所列三本復前白云唯紅梅花可登場後先公官嶺外每宴客諸伶人無不唱紅梅花者其為世盛傳若此野田行落日西山頭野田秋草没羣烏噪夕暉荒畦弔古穴樹老白楊根草漬青狸血凄澁寒塘風蒼涼孤冢月當時泉下人曽此痛死別雪中候屠田叔先生門白雪下葳蕤飢烏隔樹窺先生眠未起小子立多時駿骨傷寒素春姿老凍棃癡奴不解事呵手弄氷絲馮文學元翀字羽上通判應奎之後也亦能詩有讀書樓草懷舊南郭懷陳子癡狂亦可憐儘將詩度日不問橐無錢落日寒城古荒墳宿草纒傳家猶有業應待子孫賢袁文學慶裕字章卿博學有詩名所著葟荂溘然二草餉午石門館中次壁間某工部韻怪石截虯屯誰開霄畔門帆檣渺若駛鳶鶚儻為閽老我乘危履迷魂失故邨清風一披拂穆爾破幽昏楊文學徳遴號苧翁連雲棧艱難雲棧馬辛苦野邨餐墮膽跨三坌驚心渡七盤午過麥飯冷更盡草牀寒逺愧王陽轍迴將膝下懽甬上耆舊詩卷三十

body:
  text: 甬上耆舊詩卷六監察御史胡文學編訓導魏先生偁先生字達卿别號雲松父安以世勲為寧波衞指揮先生少負異才讀書日記數千言上自六經下至諸子史俱肆力而闡索之遂以文章名世為諸生次貢廷試第一授石城訓導一時奉為人師㑹有贑㓂當事知先生才使將兵禦險賊不敢犯𢎞治初以秩滿告歸初里中諸名公卿若屠襄惠公滽楊康簡公守隨俱深相推重每稱雲松先生至是乃共奉為耆㑹祭酒以詩文相和答前後二十年同里重之先生性篤孝友動以聖賢為法生平事本于義而以其學濟之與人交温然易接未嘗有疾詞遽色至以利誘勢怵則屹然山立不可動既博極羣書常精考古今得失而騐之于身持論未嘗無本文章務法唐宗大家不喜為詰屈年至垂慕尚以立言自許學者宗焉先生初與堇山李公交最善既疾革李公候之先生强起正容與相對既退謂子敖曰吾得無昏憒失言取愆于君子耶其始終不亂有如此初李公嘗與黃南厓先生溥共約先生為四明詩文選未幾而先生病矣以致前輩文章散軼實在此時益知纂述之不可後時也先生前在石城時諸生日誦其詩因刻以行世所謂松雲詩畧是也他所著若讀史編經書僅悟閒見類纂小史諸書藏于家余讀諸家所選雲松詩意謂先生名重其妙當不止此後從范氏天一閣得雲松詩畧始嘆一時名公卿共推重先生為不誣也但歐陽鵬所選于三千餘首中止録三百四首其所遺必多佳者至先生歸田二十餘年與耆舊諸公所相倡和俱在詩畧以後竟不復得傳然則即先生詩其存者亦以僅矣君馬黃君馬黃臣馬斑導君馬躋太山君馬輕趫臣馬臨險艱艱哉巖棘路石磴夷可陟力未豗頺奈何致行惻虎狼羣躍鼯猩競咷正途不復臣馬其凋雖君馬良不可以久勞白苧詞新裁白苧衣白苧白于雪佳人舞香風白鳬緑水驕秋月佳人顔色如桃花系出楚邑東隣家清歌妙舞無與偕誰錫紫玉九雛釵不錫釵情較可馮姬遭妬誰将妥檀口自激揚桞軀徒婀娜寧若舜牀之側二女果燕銜泥燕燕不木栖何事飛銜泥飛銜泥欲生子人家梁上營巢壘往來傍主飛不止百鳥俱避人唯燕與人親秋社領雛去春還尋舊主主家縱是貧屋在仍相處君不見富貴歸心貧即變吁嗟不若銜泥燕夢仙歌紅雲何處盤五城洞房夜半連蓬瀛石楠瑶草徑曲折斜飛露脚天風輕顔若苕榮金骨老駐鸞借問遊深島寶殿千官粲作行朱硃煉得無為道十二樓開珠翠藂玉妃驕笑迎黃龍俯見齊州塵九㸃何如秋著酣芙蓉王生喚日吹鵞管紫河車子歸心㫁欲發靈臺一粒丹人間萬象空春暖王昭君王嬙有豔色天下花不如飭身不自衒寂歴閒宫居此時漢皇方召幸丹青託人謂如鏡誰知宫女輕黃金圖像増妍偏稱心妾名一朝去妾身留不住琵琶馬上㫁愁腸漢日迴看淚如注妾命薄冒黃塵慎勿勞吾皇神畫工誤妾何足算世有妨賢病國人寒夜行寒月蒼蒼度青㝠寒光徹地寒如氷氷山雪嶺競崚嶒美人何處留雲軿獨掩蘭房滅孤燈朔風故紙悲窻櫺擁衾愁思無所憑無所憑情轉悲月中雙鴈鳴相隨此身中路當暌離少年行櫜弓挿羽氣如虹白馬翩翩過市中解射飛鵰向沙磧姓名近報建章宫十八灘上歌選三萬古青山青不休白雲常是戀山頭人生莫似灘中水日夜滔滔只下流水中亂石立森森急溜盤迴一派深山鳥任呼行不得舟行自古到如今鸕鷀百數暴沙洲飽食溪魚得自由若被老漁收拾去千拘萬束日生愁竹枝詞綠竹繞江江水流朝朝暮暮只如秋不知世上炎凉異有鳥幽栖在上頭幾處行船幾處商瞿塘如馬險難當船行可避瞿塘險自是人心不可防鵁鶄對對戀蒲茸郎去家門不記儂野李野桃飄落盡上灘莫遇石尤風好花到處引商船月子三迴缺又圖郎逐水流常不返儂如百丈為郎牽宫詞著霜宫樹錦離離强捲珠簾泪暗垂欲寫愁懷秋葉上風飄恐被外人知答栗軒周立德先生見寄園林對芳菊慊慊増别懐遊人在逺路歡燕不得偕俯聽螻蛄鳴仰視鴻鴈飛氣候忽復易斂袵起裵徊寓形一世間離合固難齊清尊沈綠醑采芳欲遺誰叩門有逺客言從海上來贈以瑶華音諭以長相思相思兩意然杳杳各天涯嘉㑹良有日崇德以為期襍詩達人有大觀僻處胡局促遥登太行山欲騁千里目緩筞遵正途岐徑咸紆曲褰裾執我斧去穢生嘉木鴟鴂呌藂薄虎豹嘷深谷矢心良弗諼歳暮期歸宿寶劍篇贈章給事元益雄劍須鐵英良工鍛鍊成銛鐔淬碧水瑩鍔發堅硎差差動陰縵耿耿開陽精奇名劣紫電碩價羞青萍龍光逺繚繞虎氣髙峥嶸手持慨無敵腰佩誇有靈君子願自衞萬鎰勤相徵豈容韜玉匣蚤見歸彤庭飾以黃金鞘絡以赤絨纓剸彼邃山犀㫁彼滄海鯨鬼母悲斂跡神奸慄藏形昕夕置左右天下歌雍平匪徒異三尺巨闕奚足稱憲副黃公自立四友亭友道日湮落桃李情紛如息駕遂常分養晦田園居脩竹八九本勁松一二株山梅亦其伍幽樹縱橫舒茅亭何小小翼然臨清渠古色照窻几髙香散座隅遂㫁塵煩紲偃仰甘與俱物性契我情澹然非相疎天真自不易莫景恒猶初洞察齊物理斯類俱吾徒常山縣至玉山縣山行七十里軋軋舁肩輿沙徑平如案紆迴萬山下景色佳可玩石隙泉琴悲苔文岩綺粲澗花炫日吐谷鳥逐人喚山開衍平畬麥秀青霞散峽隘樹陰曖嵐深愕黎旦絡繹旅人行纍纍狀珠貫我非名利徒曷足興遐歎寄永豐范敎諭冕先生炎首雨生凉莎雞作秋語荒寂亂山中氣候殊吾土子宦同一方去路幾何許相望不得親晨夕縈愁緒溪月如我期谷雲為我侣綴文豈徒然青𠖇棄遐羽知音諒此懷落莫將誰處盤谷圖亂峯疉嶂髙接天蒼樹白雲㫁復連岩磴盤迴到深谷茂林噴沫飛寒泉泉甘土肥乃佳處自昔何人此中住愿也獨忘名利情巾車裋褐隨烟霧列壑可樵溪可漁石田種樹兼著書陸海風波險不及夜窻夢與巢由居鴻飛𠖇冥弋何慕世人少有知其故桃源遐躅豈為仙盤谷只今誰問路董孝子墓古栢為暴風雨盡壞枝柯嘆孝子祠傍老松樹蒼然獨守漢時墓連蜷勢作蛟龍騰蓊鬱隂蒙鬼神護勝日每出城南遊愛看故物偏遲留半天凉意散原野五月六月疑深秋歳時世道幾囘改㧞地摩空鎮常在能敵連年風雨狂可堪昨夜枝柯毁夜來颶惡山為傾蔽牛怪木皆縱橫望中巨幹直不仆太息乾坤無盡情題雲山晩景圖南山夜雨芙蓉碧半壑浮雲弄晴色宛在匡廬欲曙時溪流漠漠無行客小村社樹八九家蓽門静掩山月斜逺寺僧鐘響初歇烟消藂薄啼春雅石城寄故鄉親友黃貳憲諸公豫章一水到贑州正在十八灘盡頭溪迴逆溯石城去激灘險瀧百餘處亂山起伏千萬層石城天上攅雲樹翠峭丹巒四面圍野花逓發山鳥飛縣道荒荒土城小人家落落晨星稀素王宫殿城北山講堂門徑榛莽間恭視僕夫效芟埽談經不許諸生閒少師楊公此發跡文皇召相姚宋匹風雲變化良有時一曲長歌楚天碧得興聊為山水遊瘴嵐滅盡嘉雲幽天馬岩南石笋拔仙姑嶺背温泉流騁望直凌烏石嶂陸海接天山疉浪四明咫尺欲奮飛故人不見空惆悵即將裂素傳信音勁風吹落鄞江潯也知官冷著書暇無奈懷鄉千里心百舌吟晨星睒睒殘月低衆禽尚睡雅未啼樹頭春鳥復何事多舌能令聞者迷間關反覆來相嬲學盡諸音猶弄巧不須㫁舌勝寒臯任爾能言異吉了飛來庭角向人鳴我厭如簧不忍聽由來佞舌易入耳讒人在側家國傾我欲訴天除此禽此禽有時終革音夜聞善哉晨賀世堯庭舜陛鸞鳳吟為陳秀才悼内詞鳳冠疉翠懸明珠織金羅服紅繡襦簟茀歸家禮相接小桃春暖蓁蓁葉藁砧未作青雲人蘭炬照書夜向晨機上香絲合歡錦願製公衣朝主君南塘鸂鶒關關鳥白頭擬藉蘼蕪草暮雨凝寒帶雪飛凋紅墜綠孤棲早刺繡遺囊蘇合香觸鼻翻敎酸入腸謾道流光如走電一日含啼三二遍婉娩幽情永不遐洞房月照相思花贑城次韻再答梁邑宰孔昭壓帳棃雲詩境幽腥涎濡殻慚蝸牛心交小李不惜寶雷電駭騰蒼海虬朗吟行軒洒蘭雪懐得半規天上月渭樹江雲遥入顰一絲情繫萬程春秋蘆翡翠圖葦花散紫秋塘坳魚虎窺魚坐葦梢水清魚見容易捕饞心未足愁日暮魚恣食身不肥虚負娟娟好毛衣寜不為鸞鳳悲至定海作江水逼城流城當大海頭浦雲長入市風物早成秋日出山如染潮來地欲浮扁舟一相過浩興不徒遊山居即事傍壑敞茅堂寥寥引興長石崖蜂釀蜜雲碓水舂糧烟鳥窺人語潭花伺午香柴門客稀到岩徑薜蘿荒灤州太守薛有年城南别墅春遊用唐人春晩山莊韻選一竹樹漫成隣名家荘上春客今移畫舫主近脱青綸絡户亂藤密巢堂飛燕頻琴尊當此地棲息百年人舟中遣興與隨行黃吉温繼輩篷底看書莫登艫散寂寥沙頭催縴僕山下問歸樵朽木粲如火啼禽聲若貓古人觀物趣多向靜中邀秋日飲石城黃義官濬清樓上乃子嶽彈琴醉後因索詩走筆凉雨過城隈樓頭對酒杯溪連琴操響山作畫屏開白髪情何繫黃花景自來題詩乗醉興寧待主翁催漫成閒來臨白水獨立向青蕪貰酒留髙客題詩避俗夫野花皆有趣山鹿可相呼萬事由人作吾貧守一愚薄暮散步學寮寂寂倚林坰半隠先生養性靈好客未來同瀹茗殘經已了自開扃紫萍㫁處水偏碧白鷺飛邊山更青逺契羲皇千載上為迎新月步中庭輓長清李處士芒鞵竹杖謝風烟江郭南頭卧一廛别館花開人醉酒小窻月照客成篇誰圖栗里髙風散唯有龍門盛㑹傳惆悵故人思舊處數聲隣笛夕陽天江東楊氏半村居小隠東村第幾家依依負郭置生涯官橋側對柴門静驛路微通草徑斜近野月臨飛市鶴疎林日出見城雅著書有暇田園裏笑課兒童學種瓜追和梅讀楊先生除夕之作翰林維新公索次韻年華又向一宵過大地春迴氣漸和佳景得歡宜盡醉盛時無疫不須儺送窮尚憶唐韓愈髙壽空聞蜀李何最是賢郎觀手澤青衫幾度淚痕多曹娥廟樹色參差山下村漢時孝女廟猶存雲寒故塜留雅語雨濕殘碑剔蘚痕大義自垂千載重遺名長擅一江尊悲歌未㫁西風起正有潮聲已打門六月十二日即景投示金舉人唯深輩雨添濕熱火雲騰客舍無從逃鬱蒸空憶仙家五鬛樹欲求番國千年氷葛巾挂壁敢科頂筠簟鋪軒聊曲肱想應對景亦如此更惡撲人多亂蠅晴十韻書示鄧麒楊貢諸生山野照初暾天晴勝事繁浮光揺逺樹淑氣散多門絶島雲猶濕髙灘水自喧農蓑收谷畈漁網晒江村懊惱春將盡芳菲景尚存冶花迎客笑奇鳥像人言落絮隨風轉遊絲映日翻欲尋元亮宅奚慕辟疆園得句題蕉葉娛情飲竹根生成皆有分何必問乾坤冬暖冬半如春暖疎花滿路開敝裘須補綴容易有寒來雨後山園偶成久雨閉園扉未識春深淺啼鳥破微晴茸茸草如剪山農圖山村雲樹幾人家暑雨新晴亂沸蛙農子田頭笑相語冬青開到第三花謝贑郡章貳守恵炭北風吹雨晝模糊笑撥烏薪擁地爐萬戸千門春乍轉又分餘暖及寒儒題枝上白頭鳥圖贈石城耆士鄭良頊雲卧髙人鬢欲秋世情都付水東流閒中㝡愛岩枝鳥不受樊籠到白頭初秋早起作缺月當空夜未央荷風細細襲衣香半牀卧聽南溪雨醸得山居一夜凉太保屠襄惠公滽字朝宗號丹山少才氣鋭發為文下筆千餘言折其同輩中進士試監察御史王襄敏公鉞重公才使總諸道章奏且薦公可大用即擢僉都御史歴右都御史時占城國為安南所侵其王子來奔公受勅處分定其國難使人䕶王子歸國因以金寶器異香為報公不受其國人至以疏請上命公受之再辭乃止㑹吏部尚書闕上手書公名付内閣公黜陟至愼值考察見以憂去官者非大過不黜註選至瘴逺地多濡筆不下務以土俗稍宜者補之奏著為令復請起王端毅公恕與之共事以班在馬忠肅公文升上奏請後之時多内降官公疏言天下士竭其心力有積數十年不得官而白身之人緣借䝉幸如拾芥不可以為訓因得稍減有請開納馬例者公疏言内藏與太僕見積尚多忽開此例是使人疑國用大耗也恐不可以示逺議遂格戸禮刑工諸部尚書俱為言官所論去位公面陳諸大臣不宜輕遂其去執對甚力遂併致仕歸里正德改元勅召公以吏部尚書掌院時逆瑾盜政將大起羅織之獄公執不可瑾必欲置劉忠宣公大夏死公曲為保䕶得减論當軸二年度勢終不可囘堅請致仕公達治體論事俱得機要生平耑以愛䕶人才為重處心遜厚自謂手持此筆論獄生死惟恐誤殺一人掌銓衡進退惟恐誤黜一人嘗坐部堂令辦事官奉硯公初衣白綾甚澤其人誤傾墨汁衣上匍伏請罪公笑揮曰去去吾方惡其太白亦何罪人以方韓魏公有鄉人冐稱屠公子于道請謁郡縣其怨家發之公呼至但相戒曰汝甘為吾子置而翁何地耶國法可畏後慎勿為此諸居鄉盛德事甚多不能具載題葡萄歌有客乗槎到西域携將佳種歸中國遥從天上落人間無間江南與江北挿枝容易分根難引蔓何妨多接竹初看葉吐金忽訝叢堆粟蛇虺縱復橫蛟龍往仍復薫風自南來雨腳收三伏水晶倒垂驪珠奪目馬乳千堆鴛漿百斛味兼醍醐價重􅌬醁久渇既枯髙卧方足請進一柈目饞于腹憶昔陳叔達嘗親感主哭復有李元臣持獻表芹曝千載忠孝名後世誰能續鄙哉孟扶風一斗換州牧張讓亦何人姓氏汚簡牘横涇陳公名太守賢孫磊落人如玉傳家既巳飫詩書更有餘閒工戲墨殷勤寫贈友梅翁屬我題詩詩滿幅咀毫不覺口流涎忽報翁家酒新熟至永定衞逺見太行聳翠鬟馬蹄穿過萬重山幾家樓閣寒雲裏十里城垣夕照間村市烟微商客少桞營人静甲兵閒夜來驚起還家夢猶記猿啼百丈關題涵碧亭一池新水碧于苔搆得幽亭傍水開六月不知天有暑四時長喜地無埃倚欄下看星芒轉捲幔先迎山翠來何用别求仙藥去此中風景即蓬萊壽沈石田先生八十昔年曽擅筆中花載酒詩成句句佳到處奚囊堆綺繡有時出語帶烟霞曺劉墻短通三昧李杜壇髙共一家瑟縮寒童過橋日㡬多詞客盡驚誇公自註曰先生題景有瑟縮寒童懶過橋之句為詞家所誦讀此詩知公與沈先生詩韻往還其相企重久矣初𢎞治中公為太宰上以從岷王所奏命逮知州劉遜科道龎泮等交章諫阻上怒盡繫之獄時碧川楊公為宫詹移公書謂科道一時被繫公大臣即當論救不宜遽使官攝其事後六日上竟從公言釋泮等于獄而楊劄則巳傳于世矣至正德中公再掌院從都下見沈石田集有咏楊宫詹與屠太宰論事劄子語多相刺公一笑為具述其事次韻答之末曰我欲到虎丘携酒追吟蹤願言保遐壽待我談始終葢公和石田詩在十年後時石田年八十二至次年九月公解組過吴門而石田已于八月捐館矣余因嘆石田以一布衣能直論當軸元老無所諱然公與石田雅舊既見所刺雖答詩解嘲而復願石田遐壽欲面陳始終得生白于長者前輩風流俱足重也其詩今不備載太子少保工部尚書楊康簡公守隨公字維貞號貞菴性强樸師大父栖芸先生事兄文懿公友弟碧川先生問學出一門以進士授監察御史他御史有在權貴人門為相招延公謝不往數上陳時事劾奏姦僧繼曉妖術㒺上之罪直聲大震出按江西有大猾李孜省者能變幻為暴于鄉里公按其罪當戍遣孜省脫身走京師結中貴以左道惑上遂得幸公服闋赴京孜省已為太常寺丞公復劾奏孜省罪人不宜典郊廟百神之祀改上林苑監然孜省益貴得用小簡奏百官賢否竟以事誣公斥守南寧𢎞治初遷應天府尹以治守偹太監蔣琮罪反為所噬謫廣西叅政七年不調巳而歴遷至大理寺卿進工部尚書掌寺事與劉公大夏馬公文升韓公文並朝野之望各勵風節正德初年巨璫劉瑾等在上左右日擅政㑹中㫖取戸部餘鹽四十萬充内用韓公率九卿廷諍傳㫖此何大事遽爾伏闕公退謂諸大臣曰果然天下事甚有大于此者今八虎相扇為惡恣行不軌勢危社稷奈何舎此不言韓公乃更具疏㑹衆伏闕下請治瑾等罪得㫖處分命瑾掌司禮監諸璫出筦機要公曰禍益大矣乃專疏曰臣等力陳諸璫之罪謂必立正國法今反授以政事根本之樞兵財機務之地陽為逺放而隂近之名為疎斥而實親之政柄一入其手將來事勢必有不可言之事伏願陛下乾綱獨㫁立誅此數人逺鑒延熹既往之愆無使臣蹈蕃武已覆之轍不報瑾積銜入骨遂傳㫖勒公致仕即日乘小車就道瑾怒不已矯詔罸公出米千石輸邊削奪官秩追繳出身以來誥勑再罸米二百石公家無餘財至粥先人遺田請貸兄弟一簪一衣不得留尚輸不給瑾伏誅復公原官臺省交章論薦公竟不復出惟與里中諸髙年結為耆㑹幅巾縧履日徜徉山水間身敦禮義為士族法得年八十有五卒之日士大夫走哭父老聲鐘相弔詔贈太子少保諡康簡將赴應天府丞家兄維新出餞深溝寺和韻送别招提境紛紛車馬闐酌先論去客醉後愛逃禪池草方成句天花亂入筵他年來報政依舊雁行聨按察副使張公昺公字仲明號楝莊又曰寓菴生有奇質性剛自為諸生時已能自樹立中進士出知鉛山為治勵心勤力時縣中有加稅田數百畆歳輸至數石公以為不平乃身出視田疏請均諸縣中方公出見界上有大樹下蔽二十餘畆不得耕公謂蕪田可惜當伐之從吏父老俱諫謂此樹神叢不可犯公怒擇日具鼓吹甲而往手揮巨斧砍之血隨斧出三日樹始㫁其巔有巨巢墮三婦人絶而蘇自言為風吹至樓上與三少年俱不知身在樹巢也驅之還家縣俗尚巫有巫厲人能隠形吏莫敢捕公遣伺馳至其家以縣印加背上衆箠之立死公乃盡毁諸淫祠逐巫移文道路使享祀以禮有節婦子為虎噬具牒控虎公即移檄于神與約五日繫虎至及期有二虎伏門外公挾弓矢出遥咒虎曰誰殺吾民當受死無罪者免其一虎即歛尾去一虎仍伏公抽矢三發俱貫虎首遣人舁虎尸歸節婦家一縣稱為神君諸異政甚多不可盡録秩再滿徵為南京監察御史益勵風裁時威寧伯王鉞挾其武力與保國公朱永太監汪直將挑釁北邊公曰是為國家害不小即抗章論之復劾守僃太監蔣琮鬻放軍伍罪琮等遂誣公擅作威福謫通政司經歴尋以魏國公薦遷四川按察僉事進副使同事馬太監信姦人周慧為能治黃白將進之朝公驚曰是唐之桞泌也即捕慧論罪徙之極邊公自度終不為世容乃和歸去來辭力請老定家于鄞之楝莊舍壁蕭然出入惟徒步即糠籺時不給而杜門著書雍容自得都御史王公璟以賑至奉公百金公再辭不得乃受下戸飢民例一分以答其意郡守周公坤過訪見堂設敝牀嘆曰國有顔子公之謂矣鄞令丁君鉛山人至即以父禮事公晨夕候興居為具蔬食公謝曰吾誠不給芋栗奈何以此煩令君堅不受久之炊烟屢絶家人至不能忍餓其夫人乃出一金珥易米公問所從來夫人曰此令君奉我無預公事公紿取視之投于河卒年七十有八至含殮不具郡守令共經紀其喪所著有歸田集楝莊集寓鳴集經史訓戒一百二十巻余嘗覽古為政若西門豹投巫童恢治虎罪得一異輒傳之史册今讀張公異政録至不勝書斯所謂神明之宰矣公生平胷懐如氷雪不可小汚利害禍福無待解遣而自不能滯其中喜奬勵後軰常以道義相期通政余南湖先生本親炙侍敎有年及公疾革余先生尚侍側更張目眎曰善自愛方今人才肯自勵者少若能扶持一日是培國家士氣一日也其立身報國之誠至死不倦豈不誠卓犖大丈夫哉即百世而下得聞斯言猶當感激强自立者也徒傳公異政抑末矣答家大人公為令時父錦衣公以一詩戒之公和答即用其起末句知公所承家訓矣阿昺為官出宰鉛蕭然消息祗虚傳敢圖魯令傳三異應效劉公取一錢故國桑榆留晩歳浮雲名位聽髙天種𤓰未必東陵好賴有遺安數畆田寫懷溪邊岸幘醉酴酥此後殘年有亦無中夜静聞風雨過只將燭影照身孤山色層層雲起上峰顚花樹叢開鳥路鮮我欲問春何處去不知春色在山前按察副使黃公隆先生字自立以進士授南刑部主事初提牢夜坐庭中有從垣外投一青囊入先生不發次日持白尚書楊公寧發視俱白金乃湖州糧長求釋繫者由是知名遷廣東按察僉事甫浹旬流賊入境公盡力禦之賊遯去撫軍葉公盛甚稱其材畧改福建再以治行受璽書旌異時中貴黄賜勢焰侵人公卿俱為其母上壽先生獨不往遷四川按察副使到官謂治蜀當以趙清獻為法即立祠本司門左日得仰止松潘與土番接壤轉輸内地率費十致一先生議開屯田以内糧易銀軍民稱便遭父喪歸里遂不出先生性剛直生平持操若一未嘗緇一塵家居二十餘年手種竹栽梅花十餘本間以蒼松與已而四乃築四友亭日觴咏其中年七十三卒所著曰南谷集吾鄉前後耆舊㑹俱一時詞家而所傳詩未嘗有及㑹事者近得南谷先生一詩有曰耆英㑹數常忘約始知當時諸老㑹期甚數而詩俱失傳此李司空所以太息也和屠中丞朝宗見贈即事年華轉眼似飛蓬投老無心戀萬鐘數畆青山看不厭半窻紅日卧猶濃耆英㑹數常忘約故舊書閒未啓封幾信楝花風又到莫辭携酒更相從甬上耆舊詩卷六

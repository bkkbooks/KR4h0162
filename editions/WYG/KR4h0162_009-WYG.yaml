body:
  text: 甬上耆舊詩卷九監察御史胡文學編布政陸石溪先生銓先生字選之按察副使偁之第二子也美風儀質性英鋭過人讀經史百家言一覽輒解解輒能不忘操筆為文即竒氣横發率出自胸中所造直追古人時論目為栁栁州蘇文忠一流以進士為刑部主事值大禮議起先生哭諫廷杖幾絶而蘇尋以才推典十三司章疏數斷大獄若繩瀋藩不法處分哈密情罪舉朝不能决先生直以片詞折之改武庫員外郎是歳朝廷初命内臣司外文柄先生出主福建考稱得人轉禮部儀制郎中上方稽古禮文更新制作創四郊親籍親蠶諸議内降旁午先生討論陳奏須臾凡數四宗伯大臣盡倚以為辦上特頒白金采幣旌其才竟以永嘉所忌出為福建按察副使攝海道漳故利窟先生嚴立法禁諸射利奸人無不斂跡遷河南㕘政值歳旱蝗民多流徙先生勞心招恤所復業數百萬人㝷遷廣西按察使時弩灘猺賊侯公丁雜處胡藍二姓間共為冦當事議大舉兵殱之先生曰是堅賊黨而分我兵力也且順逆難盡明不若討渠首而釋其餘弩灘果定尚書毛公秉鉞至安南知先生才密與謀先生為畫征撫之策安南遂平隨遷廣東布政使以内艱歸卒於家先生少負才雄視當世豪傑每誦陳同甫人中之龍文中之虎意以自許居官判棼解劇應之常有餘時方以豐功巨績期之竟齎志而殁識者憾焉所著詩文集藏於家余嘗手録先生詩七十一首序之曰書曰詩曰志謂詩在能宣其志所欲言也由是諧之成聲束之中律此論詩之本也三百篇言孝子之志莫如蓼莪七章言忠臣之志莫如北山六章彼亦盡其志所欲言而止初不知有自我先有自我後也以至司馬長卿所夜誦蘇屬國所贈枚生所唱歎銅雀三祖所歌尚仍各言其志也自鍾嶸作詩品于一人下必系曰其源出於某家形似彷彿可發一笑後人祖其說遂謂確有所本然初未嘗顯然剽竊也至西涯之後北地勃興一時詞人盡宗之轉相擬議刻畫字句以能作楚相衣冠抵掌足欺新豐犬鴨便謂得附正宗于是天下之詩俱言人所言不復自言其志矣吾鄉諸先生恥之自白齋文懿文定十餘家並能卓犖自持不同于流俗而吾石溪陸先生更以竒氣激亢横絶其間先生少負異才意歴落自許睨視一世慕古人仗節死義事所過竒山水必登望既以廷諍大禮受杖每言及永嘉長鬛豎儒輒欲横唾其面試讀其挽羅峯與李中溪叙别諸詩執義忼慨聲詈並發浩然沛然直冩其志所欲言而莫能禦正使懦夫讀之亦有起色盖先生論詩專以性情為主嘗曰宋不能唐唐不能漢魏其似者宋之唐唐之漢魏耳斯其持論獨立若此以俯視世人閉氣噎聲句䜈字割畢身作詩未得吐心吐意自作一語真􅐅􅐅可憐蟲也仲長統曰百家雜碎請用從火唐荆川先生曰若付祖龍當使南山竹木減價差快人意矣先生詩惟家乗冩本一卷故詞家無知先生者其後人陸鉁俟出此卷相示余謂家藏神劍長閉室中使龍身虎氣不得騰出人間亦奚貴世有風胡子邪因為手録其詩一卷序而傳之萬生允誠曰先生方選白齋二集今復録石溪詩其伯仲若何余曰白齋高士石溪竒男子風格㣲不同但白齋力去陳言確以作者自命石溪則無意求工而蕪言宿氣亦能擺落要諸兩先生真詩家之烏獲也晉史載龍山之㑹風吹孟嘉落帽桓温使孫盛為文嘲之嘉作解嘲詞致超逸四座驚歎蘇子瞻惜其文不傳為四言補亡余讀之竊謂嘲者以禮解者以道庶乎兩得蘓詞且非晉語也更為補二首聚瞻飭儀式崇侈度履薄臨深細矜返顧龍山嘉集羣賢昭姱金石在堂儐相在阼胡愆于儀巾脱頂露僕𨽻含嗤將軍薄怒璧輕于瑕楠斥于蠧桑簡避時禰狂矯故彼非昌期乖此繩步耳目外慚周章内寤請歌相鼠以終韶濩右孫盛獻嘲至敬弗儀大道易飭在朝維臣在野維客臣道足恭客情樂託岸帽為賢爭席為適明明我侯厭彼局束駕言出郊以坦心腹勿弛于儀曷彰休徳郭巾偶折慕之成俗事異並傳孟可比郭亦有畏威免冠昭責免既為恭落亦何失哂此細人從羈受勒右孟嘉解嘲述懐遇事不適意蕭然思故廬故廬久荒寂人生安所居坐卧得率意側步心常舒寧如日束帶三騶為前驅徒爾眩人目宛然受羈拘寄聲示僮僕洒掃吾庭除偶感無事久宴坐悠然生遐思白日不可留營營將何之開卷理達言黙對相嗟咨徃日已莫及來塗尚可資有誰苦相㚄何為自次且飲酒不能樂入山無舒期人生棄所適以戚為怡怡乾明寺與蘇齋同遊七聖遊兹山忽迷不知路相傳幾嵗年兹山尚如故在聖迷亦奇古今問遺步我來得與君萍逢偶相聚華尊傾山房疇昔紓衷素百意難盡宣欲言色相顧對此古奇踪悵然發遥慕朗晰豈不賢皦皦世所惡大道尚渾淪退藏戒輕露乃知匪所迷冥理此中寓莞然向古人千載藉微晤撥悶修途繁春雨新水馳驚湍灘聲起林杪浦色迷逺天溯游違水性力挽苦不前歸情逐飛鳥度日長如年靜坐快鬱思起立當帷搴前村靄雲樹汀曲只尺間候久望益渺日暮生夕烟來船翼雙櫓中流歌鼔填一息去千里疾若矢發弦勞逸迥倍屣遲速殊相懸事以乗機易力因失勢難引觸思至理何獨舟行然因之停遐矚返卧舒中煎舍陸登舟情意甚適馳輿罕靜思理棹沿清流眇聲聆石瀬野色䀽春柔鷗浴潔皓羽燕語紛元游身逸佳景集道悟羣騖收昨非悔囂境今是恬滄洲嗟予本越産水國無塵憂汲湖代鑿井命駕惟攜舟植涯列繁翠開閣延清飂丱角狎幼性束帶滋離愁豪心恥牛馬微息悲蜉蝣行行惬淵尚適意將焉求下灘逺望灘將至俄驚水漸鳴船奔如逸馬楫擊起游鯨暗石寒傍閃前山眩逺迎濺濤常至頰逐鳥自怡情去急風加勁翻隂日半明傍觀俱失色獨坐只聞聲勢自難中息舟誰可並行眼輕千里近心𣺌五溯平定力惟孤舵旁扶藉衆撐樂從險處得驚向順中生灘盡重回首長嗟事倖成到萬安盡日鬭風行計程百餘里水下舟自速浪峻不能弭戒險屢停橈循岸聊倚徙日斜氣欲曛來船勢未已歸心易動揺野泊慮不韙奮橈復同行汀曲何迤邐須臾天際昏逺燈照村涘遥望不得前寒夜風益駛咫尺窅莫辨暗石利如齒灘浮兩覆舟檣折帆已毁心惻不能援冒險鑒前趾那見萬安城彷彿聞人語喧呼兩相應擲䌫遥得艤泊岸一長吁履危不知止度嶺後漸寒初春戒羊城氣暖親絺葛度嶺春已杪怯風襲冬毼相去千里間寒燠判如劃物性亦從人宜土乃易茁橘柚常去燕梨棗不居粤植根一失所生意已先閼奚為冠裳驅風土奪所悦六氣為人讎變息苦伺隙行行歸吾鄉安栖養嵗月少年行金鞍白馬長安道日日醉眼嗔春風胡姬滿前不稱意梟盧一擲千金空赤手入市索美酒抵掌拔劒矜豪雄傾盆倒甕不論價一醉上馬飛雲龍借問少年住何處錦衣出入長楸宫月湖行我家住在湖之西中有島嶼湖之湄東風三月桃花水清隂百丈楊栁堤寳塔浮雲聳髙漢石橋流水飛雙鳬髙漢雙霓西復東徃來人影緑光中狂客祠前朝酹酒夢公堂裏夜聞鐘風起沙驚鳬􅈑亂雨來聲滿荻蒲叢何家公子好遊俠木蘭為船桂為楫輕篷細槳蕩中流翠鈿寳髻嬌雙頰清歌一曲白雲飛朱顔百媚紅蕖落湖前湖後何繽紛橋上人㸔湖上人行人但識湖船樂遊人更羨湖光新夾岸人家門第改惟餘明月湖心在露華曉候漁舟出星光暮入水亭待亭上主人久不歸湖光月影徒輝輝湘湖在蕭山縣北二里山絶頂有荒城杞檟滿道故壘隠隠山脚名排馬人言吴勝越拘句踐于此是日與陳見吾同遊陳侯慷慨還風流攜我湘湖登綵舟湘湖去縣十二里琉璃萬頃蒼波浮來商去賈不復識清風白日閒飛鷗主人桂楫相為開萍牽芰澁何徘徊須臾山曠湖風發船頭噴浪聲如雷酒酣日落鳬鷖亂振衣倚棹登荒䑓荒䑓絶頂臨平野血崖骨壘森杞檟人言夫差敗越王孤軍困此如飄瓦吴軍滿地喧貔貅至今山脚名排馬聞言慘淡不欲留天風颯颯吹梧楸古來英雄競閒氣片言不合成深讐轉盻千年僅昨日敗軍勝將同荒丘陳侯陳侯歸去來登舟長嘯且銜杯古人弔古還成古今人不哀後復哀眼前功名亦吴越吴越于我何有哉陳侯陳侯歸去來游紫雲洞歌石竺山髙髙入雲芙容削立迷荆榛折茅鑿石誰為此相傳九鯉藏其真奇岩爭出似相搏凭虚萬丈縣髙閣倒垂突出如蜂房上牽石背下垂壑我行喘不可登十步五坐驚崢嶸攀藤藤斷身欲仆步苔苔滑足欲傾逡巡險度觀音巖巖欹只尺心膽寒宛轉忽入紫雲洞洞古隂黒生烟嵐小樓斜轉深洞旁青天壁翠開明窻諸峯萬状拱且伏溪流北遶還西横凭欄下瞰來時路蛇行鵬翦忘其故但聞松聲謖謖響下方鳥飛貼地隨雲霧老僧住山數十年自稱絕與人世無牽緣山收谷採足自給童子不知有肥鮮樵夫肩疲亦不至豈有冠葢來山巔我聞大笑命之坐古來奇跡俱告我壁縣怪石色如鐵擊之金石聲欲裂轉背北上有石塔石梁三寸去路狹老僧徃來健若飛凌虚直度神不懾更有丹竈不可尋山夔密䕶何深深徃徃丹砂雨漂出仙人窅渺傳清音嗟我興狂欲長徃新著芒鞵桃竹杖太陽垂脚不可留長嘯歸來色戃恍嘉靖丙申閏十二月同蘇齋游南召子陵洞蘇齋畏險不敢上余乗興獨徃入洞眺視踰時而還南召山有子陵洞巉巖縣結山之顛怪巖倒石如熊虎左跑右踞森相攢中有一徑導飛鳥紆迴側上還傍牽登者膽墮中道阻洞中之景空相傳我性好山不畏險仰頭視洞遥垂涎束衣換履奮獨上喘汗聳膝定復前盤迴近洞幾二里突崖倒出鳴飛泉兩脚苔滑不得力下臨無際旁無邊攀藤倚崖側身度斯須洞出開青蓮洞中石髓成萬象宛如人立如鳥翩更有融結同床几髙可箕坐平可眠然炬直入深無底旁環古井流潺湲下視民廬没蓬莽千村百雉同杯棬我思子陵古狂客笑睨萬乗如浮烟解衣深卧須此洞髙風千仞猶泠然我思久留苦不得翮墜雙鳥臂脱猿蘓君愛山尤自愛笑我蹈險情何偏蘓君蘓君吾語汝世間設險俱如天長安更有仕宦穽薦紳失脚多傾顛擠排且欲下以石絲牽髮引相夤縁君知其險有如此何不驚此驚山川悲金斗金斗山出銀礦馬山青山勝朶五朶俱山名噫嘻金斗何㠝岏根脈直與終南太白相牽聨蜿蜒近若虯形走騰踊迥如鵬翅騫馬山萬疊塞門戸青山千仞齊胷肩勝朶挿天翼其右五朶蔽日屏其前白晝虎出怒當路晴空霧起昏濛巔土民頭白未敢上樵夫斧爛何曾攀何人浪識金銀氣一朝奉命開蒼烟斫崖鑿石萬聲吼裹糧篝火千人懸使者催書日絡繹空山呵衞聲喧闐斯須鑿空如覆屋紆迴水滲成流泉轆轤旋轉斷筋力隂寒慘慄侵肌骿將崩恐崩石難測枯骸簇簇真可憐壮丁採辦窮日夜烈火燒煉唯流鉛得無鬼神忌多取天藏地嗇理固然我願廟堂尚樸儉太平所守在四邉鞭笞角腦歸南畆盜礦賊號角腦驅收哪噠耕春田通番賊號哪噠山珍水寳坐待出㪷米不須二十錢自然之利亦無害何為舍易圗其難嗚呼堂堂大臣正當軸草茅閉口受役夫何言民謡毁我十家廬構爾一郵亭奪我十家産築爾一佳城官長尚為役我曲何時直湖有藪山有谷本是太平民豈願作逋客男兒無罪被人縛走向深山方敢哭誰謂邑有賢貴将奪我田誰謂邑有賊功成授我秩移家莫近大宅居但願土風淳且熈貧賤相憐貴不欺病中漫述叢竹映髙堂經旬卧竹牀色驚談虎變身怖觸龍傷弱質秋先覺愁懐夜獨長病源人不識名利在膏肓一室靜無塵徐回造化春罅風讐病骨簾日伴愁人藥換醫心惑呼頻僕背嗔小愉聊自慰他日更沾巾不死君王賜時和天地恩窻明舒宿寤軒近息驚魂拳足寒塘鷺低頭暮雨鴛完軀歸故土追悔可重論十一日出灣時張少傅同行豈不戀明主那能黨貴臣一官瀕海國萬里寄閒身旅思隨飛鳥漁歌起白蘋傳聞張少傅同日問江津文衡山致仕特召金閨籍頻章碧海私乞歸寧待老晦迹巳嫌遲越竹成遊轎吴蠶吐釣絲百年行樂地千里故人思嵢峽道中﨑嶇嵢峽道度嶺復縁溪新草迷殘徑奔泉嚙故堤叢林千壑暗絶頂萬山低䇿馬無停息倉皇日已西偶出偶出城東道天寒急莫潮亂帆爭入浦羸馬數驚橋地鹵晴還濕江空風自饒秋髙林日淡落木正蕭蕭常山道中驛路梅花發晴曛野色濃地經郷國盡春送客愁重鳥出雲中樹山青雨後峯徘徊停葢久絶壁倚孤松堯廟堯山開古廟登眺及新晴分草窮泉出攀藤靜鳥驚松風吹鬢亂岩日照衣明興劇歸來晚村烟入望横吕梁㑹張玉湖次韻數年不相見相見忽如新今古多長嘯江湖幾故人清詩能自適濁酒且相親莫惜尊前醉斜陽映别津登分宜縣鈐山鈐山聞絶勝萬木碧峯髙寺入千迴徑城周百轉濠聞鐘如入定見市不驚囂極眺生遐思登臨未覺勞袁州道中萬山忽平地十里見髙城雲黒農占雨山青客候晴樓䑓烟外景雞犬市中聲日午方酣暑霜䑓駐斾旌宣風早發出門天未曉霧氣滿山川露濕涼侵體風微暑避軒日從雲罅閃泉到石稜濺促騎吾知倦前村爨未烟過鄱陽湖時旱久湖淺漁人結茅沙上雨水春來少湖中露淺沙張帆非舊渡牽䌫有迂涯宿草魚龍窟新茅雞犬家夜行殊不險蕭鼓月中譁灕江二首灕水誰云險逢春景亦妍㸔山朝倚櫂待月夜開船灘急長郵近橋懸斷壑連捲簾一尊酒獨酌思悠然連山勢不絶萬木挿天青兩岸深猺窟孤墩舊哨亭巖髙午見日林密夜迷星人靜來猿嘯悽悽不可聴自適二首年來尋自適不覺任情偏生意栽花活忘機乳燕翩眼寛巖上立心放醉餘眠何必離塵俗時平即葛天曉事翻多事人心本自虚驚衰因對鏡泥古為知書不盡盈無忌多忘悶自除從前殊費力吾愛舊迂疎議禮下獄事主勿欺曽學古保身明哲昧于今雲環九闕青天近路入重圜白日隂宗廟難忘先帝徳簡書不負小臣心鋃鐺在繫終何怨城上烏啼幾正襟獄中次季舉之韻官非司諫終難嘿事係倫常敢顧身聖怒不妨為孝子狂言豈敢託忠臣古槐䕃滿常霾日鵩鳥晴飛不畏人咫尺忽傳雷雨至餘威還攝怒龍鱗謁卧龍岡武侯廟古柏森森落日蒼祠堂髙枕卧龍岡大名早定山川重正議終垂伏臘長三顧義同莘出處兩朝身係漢興亡我來再拜瞻遺像麟閣雲䑓盡渺茫見邸報有感鳳樓玉帶掛金魚意氣飛揚稷契如煗閣密宣常獨對氷銜超拜盡親除豈無同黨傾安石未有宣言奪范雎此日放歸真不測都門送客幾迴車同御史李中溪遊仙巖寺寺在鬼谷岩絶頂遥向清溪問碧空縣崖髙閣白雲中共愁仙壑何能到偶逐僧藜有路通漸覺鬚眉沾霧氣忽驚人語落天風塵襟此日消幾盡况有髙談達者同柯山在衢州府城南三十餘里即仙人奕棋樵夫爛柯之地曉披晴霧上層巒百丈危梯一岸冠影暗藤蘿雲出洞字封苔蘚石生瘢山田雨足秋仍熟石室風髙夏亦寒棋罷仙童復何處冷烟殘靄鎖㠝岏安慶兄入覲次少石韻出郭晨迎五馬旌公朝先得慰私情寒牀薊北頻宵夢春草江南隔嵗程尚有塵埃沾鬢髮且将肥瘦問燈檠天倫樂事人間少故國相期接轡行挽羅峯抵掌朝堂百不如銜恩日日拜新除明綸在握身難繫狡窟徒營事總虚客散不聞籬犬吠骨寒猶有史狐書只憐舊頌青苗軰便附人言有歎歔長鬛東甌一豎儒片言誤主擅黄樞氣凌七貴猶餘鷙頤使千官盡若駑此後正人方貼席從前同黨幾張弧笑君十載為公相不得徐生一束芻東湖湖日初晴爛曉霞竹輿披露度芳華短苗斜引溪前水小荻新穿雨後沙馬踏落花過藥圃鶯啼脩竹到僧家閒來不覺塵心淨坐聴鳴橈弄水涯丁酉元日滿城鐘鼓雜雞聲星斗䦨珊天欲明萬事初新從此日百年将半覺多情雪消春水河流急樹暖朝暄蕚蕊生處處土風欣改嵗各将羅綺炫昇平賦得家居之樂曉晴湖日上層樓睡起梳頭對野鷗詩社筒來催夙約山家酒熟喚春遊輕便度嶺雙肩轎小巧穿橋獨櫓舟日暮恐迷歸去路短松脩竹認芳洲天童寺溪轉峯迴翠靄新諸天樓閣傍星辰深山笋熟人如市梵戸茶香客自頻龕燭能留長夜月天花不斷四時春共來物外舒塵縛莫厭披襟與岸巾北固待午坡不至栁色春深映驛樓好風江畔促行舟沙頭水急潮初落山腹烟多雨未收髙閣斷鴻欹枕倦逺村孤笛捲簾愁相期一醉金山寺斜日中流亂白鷗悼石樓兄朔風吹雨雁驚鳴寂莫胡牀舊感并老去瞻依兄似父夢回形影死猶生菊迷芳徑秋方慘鶴度千山月自明惟有勲名垂不朽簡書含泪續郷評翠微花蕚且相依轉眼鴒原怨落暉千里風塵常逺别百年鴻鴈幾同飛仙家嵗月清宵短郷國衣冠白髮稀誰向河東問三鳳鵷行思舊濕朝衣獨坐獨坐公庭盡日幽晚風殘日對林丘乾坤多事誰能靜草樹無情我共休黄鳥聲稀春事去青山道在幾人游閒來不盡蓴鱸興賴有琴書慰客愁舟中述懐經年持節又趨朝楚雨閩嵐萬里遥畫虎自慙為拙宦聞雞獨起在清宵近河山好簾常捲午夜詩成燭半消風景蒼茫春事去柴門花落草齊腰途中漫述曉晴紅日照樓䑓睡起臨風望眼開野樹巢空驚鶴去淺灘船動覺潮來幾年湖海王程倦萬里雲霄客夢迴風景滿前誰共語碧山紅葉自銜杯舒憤與中溪敘别宦游何處濯冠纓九曲溪頭溪水清開口好談天下事反躬常愧古人情讀書直為乾坤計按劒須令虎豹驚今日與君相别後再添鷗鳥結新盟不隨兒女共悲呻直是胷中見道真萬馬奔時先駐足亂鋒攅處獨當身敢云骯髒能成事使識江湖尚有人此意胷藏幾十載逢君不覺倍精神龜峯有寺甚佳寺僧多逃景象落莫遊之悵然亂峯叢起暗僧堂朶朶芙容競曉粧絶壁有松人不到深林無主鳥相忘老僧避客嫌山好髙士題詩任草荒獨自徃來㸔不厭好懐元不為人忙偕李月山趙南厓游羅浮山春日晴峯插海濤躋攀千里共忘勞水源将盡桃花落雲氣常隨鶴影髙白髪避秦何處覓赤松辭漢幾人豪塵懐且盡今宵樂草坐流連醉濁醪讀陳白沙集人世紛華百計辭白沙門徑有誰知乾坤不可無髙眼風月從來屬盛時獨許巢由能見道自矜李杜不同詩平生遺草無多字三百篇來僅有斯自祝融峯歸至南䑓寺少憩南䑓禪閣傍山隈萬木隂森石徑迴十里已從雲外上千山初向望中開松房鐘靜無人到石鼎茶香有鶴來我欲留詩詩不就彌明原是此中才再和宣明館陽明先生韻五色晴江雨後㾗亂峯雲氣月華渾邉陲萬里還通驛盛世深山亦有村興至欲穿雙屐去愁來只對一燈昏夜郎詩思知多少恐有當年遷客魂贈南溪方伯致仕旋里投老恩霑下建章黄冠已改舊時装塵埃無復侵蓬鬢嵗月從今屬草堂遂見雲中歸白鶴便從烟末聴滄浪故園莫放梅花發留待先生進一觴歸田再疏拂征衣白首何人解息機烟草盡知催客去松鳬已解傍船飛嚢歸閩海添書卷家近桐江有釣磯故里諸公翹首待扳轅猶恐滯東歸羅源分司次壁間雙江險韻宦轍相拘困網羅驅馳疲骨欲成瘥邑迎人吏喧鄉駃野供行廚薦海螺狂咏正逢情放處㸔山其奈興䦨何敢言揚激消公事滿眼侵人荆棘多送李明府還鎮南長江浪急野鷗閒世事惟應賦考槃萬里碧雞雲外路三秋青雀月中灘身輕最喜還家早道在何愁去國難回首故人遥共憶碧梧岡上拂塵冠惜别渡頭微靄闇斜陽江上離愁夜未央一别動經千里濶百年消得幾回忙相思華髪俱同軰何處青山似故鄉此夜只聞蘆荻滿蕭蕭風雨助更長裕州道中避雨大成寺野寺停驂晚更幽小堂清坐對林丘好山借雨方能到萬念逢僧覺暫休亂石甃垣青草細蒼藤纒洞白雲流客情日日黄埃裏剰得今宵人外遊武當山髙天絳節徃來通海上三山未許同地軸半空縣北斗山根千里接中嵩峯頭蠟照黄金屋爐内香浮白玉宫神道自來堪設教萬年此地祝年豐浙川道羣峯繚繞忽平原江上孤城百雉懸嶺積重重斜取路溪流曲曲暗通泉楚秦勢角三分地雨雪寒爭二月天最喜山民生計活旋添茅屋不須錢清明清明日薄晝隂隂籬外新秧短似針縛草象人田畔立借他風力逐飛禽甬上耆舊詩卷九

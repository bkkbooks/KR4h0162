body:
  text: 甬上耆舊詩卷二十六監察御史胡文學編光祿寺卿吳公禮嘉字㑹之萬厯中以進士歴監察御史時國本論起臺省俱具合疏諫公方岀按宣府臺中知公同志并列其名遂俱賜罷家居與周文穆全學士諸公為雅集賦詩形于圖畫一時傳之泰昌改元錄建言得罪諸臣公已前卒贈光祿寺卿所著太白樓稿行世即事晝長初卧起侵幌篆烟微烏府閒中靜青山雨後肥庭花擎日午檐鳥曳雲飛無那東西警愁城忽四圍途中遇雨霢霢春膏細桃源路欲迷山巾籠翠樹石髪亂香泥岐麥欣苗秀鳴泉雜鳥啼悠然恣吟賞霞采忽明西周文穆公應賓字嘉甫號寅所初中進士廷試已擬第一人内閣余文敏公以同里引嫌置二甲選庶吉士授翰林院編修神宗將立太子復改傳三王子並封公率同官疏諫請先正東宫後封二王不報歴遷吏部右侍郎在講筵多所諷諫以憂歸里居十六年光宗立召為南禮部尚書五疏乞休加太子太保歸里公少嗜學目數行並下老而彌篤所著有舊京詞林志九經考異識小内外編月湖草諸書詩人葉鄭朗先生負才氣亢世不合公獨與申布衣之好吾黨賢之去婦詞故人昨日新新人明日故同是機中人何必問縑素閨詞蓮葉出田田何人不采蓮偶然逢並蔕雙涙寄君前入山緣山曲水洄入谷盤山繞前邨雞犬鳴漸入人家道處處藝桑麻家家懸桔橰婦子舂黄粱丈夫刈紅稻忽驚客子來几榻皆傾倒應對操土音衣冠尚純縞與之較隂晴五行頗能曉乃知山谷中淳風猶未掃種圃種樹青門裏東陵跡巳湮虚堂空乳燕僻巷少行人風雨愁將夕鶯花憶舊春長鑱聽苦調歎息百年身林居梅雨初晴䆉稏天偶行樹下聽新蟬鬚眉雪白誰家叟扶杖邨西看水田按察副使周公應治字君衡文穆公族弟也以進士出知分宜條上十六事治縣有名擢南吏部主事歴遷湖廣兵備副使㑹楚中華越之變公被傷遂引疾歸家居事大母母能盡色養年六十餘卒于家所著玉几山房集行世夏日游牛首山寺凌飈討幽巒憩石停孤策直路引松杉蒼厓渺難測梯雲躡層岑横亘象緯逼芙蓉秀中天面面若可摘隂泉印虎蹤古洞藏龍跡崔嵬天闕聳蜿蜒長江射紀勝有今古覽景無旦夕意以神理超情因曠視適湛然冥真心雲卧景俱寂過盤山盤紆躋磴曲迢遞入雲烟絶壁疑無路危崖更有天人家蒼翠外鳥道蔚藍間性僻躭幽險寧辭屐齒艱副都御史丁公繼嗣字國雲以進士授刑部郎歴遷湖廣參議薦布衣瞿九思孝亷鄧元錫于朝晉副都御史撫閩中日本詐為琉球貢使突入㑹城瞰虚實公疑之使核其貢物果皆日本所產乃獨留其使柏壽候旨而盡遣所從歸國如是積三歳日本計卒不行公為人坦厚善善意長人言其開府有薦無劾終不失長者所著蒼虬館集行世寒食後行役春事行將暮羇愁且未宣蘭餚過冷食槐火試新烟吏立松花下馬嘶藤葉前鬭雞人滿道轉憶帝城邊參議林公祖述字道卿進士選庶吉士改授監察御史在臺嘗劾巨璫張鯨救廷杖給事中李沂為時所重歴官貴州參議以子貴贈刑部右侍郎天迪見贈和答解組辭農署誅茅搆水亭手支調鶴杖案置種魚經愛客時浮白看山晚送青巖栖君覺是吾亦願沈冥禮部右侍郎全公天敘字伯典號鐵菴少司空元立孫也進士改庶吉士授編脩萬厯中皇長子出閣充日講官公詞旨髙暢睿聽曉然嘗小疾屬同官代直輒顧問全先生何在歴官侍讀學士以母楊在京邸不習苦寒力請使得奉母歸里門公自以兩世載筆為侍從之臣務持大體嚴重人望而畏之竟坐此得謗改官留都卒于家天啓改元贈禮部右侍郎所著鐵菴集寧國與史郡公登北樓自昔宣城守青山獨有緣捲簾通晚翠把酒滴吳烟婚嫁含情切功名治郡先閒庭雙鶴好愛客舞蹁躚曉望巖壑開新霽清容倍可憐雲中聞水碓竹裏出炊烟捷鼠穿松徑飢烏啄芋田閔農知感激瘠土幸豐年天門山腰石裂翠微開不放紅塵下界來老樹托根何歳月羣仙駐足盡樓臺金攴倒射晴溪晩珠箔輕聞雨洞雷鶴馭鸞笙渺何許凌風好進紫霞杯杜郡丞辭官書來有放鷳語吟以口號日共兒童盼使君清淮水接海東雲好從物外閒司馬來訊山中舊廣文放却白鷳真早計養成蒼鹿故同羣題書結想千餘里只對烟霞與夕曛都督僉事萬公邦孚字汝永號瑞巖鹿園先生之孫也少為諸生不耑守一經已襲爵指揮凡三領漕最有名遷山東都司僉書入衞值三殿灾公率三千人夜從大司馬救火上命毁五鳯樓以保承運庫公曰樓為國家象魏不可撤臣請併力衞庫乃令軍士各持溼絮被覆屋運水灌之樓得並存㑹援朝鮮公出督龍江水師守鴨綠江通饋運晉參將守溫處閩盜詐稱商入浙地殺掠揚帆而去莫可詰公命分閩浙海界商舶不得越境閩商入浙則乗浙舟浙商入閩亦如之遂著為令再遷以都督僉事總福建兵脩戚武莊遺法壁壘一新有外島舟失風被獲當事欲駢誅報首功公持不可曰借風濤之力以膏吾刃吾不忍為也所獲三十五人盡釋之去未幾聞有營求其地者遂引疾歸里居十有九年築數椽櫔食日與諸公觴咏為娛卒年七十五所著一枝軒稿行世括蒼道中山繞疑無路溪迴别有天四圍開峻壁百道涌飛泉鼓楫臨青翰乗檣破白烟更看回首處雀室幾相連春日過西皋别業卜築依阡陌柴扉傍水城幽兼山翡翠色借樹從横日出僧初飯林開燕出楹呼童尋筍蕨佐酒看春耕東省率班軍入衞賜宴百萬貔貅衞帝京御㕑分饌曉星明春深内苑黄鶯囀疑是雲中簫管聲大理寺卿徐公時進字見可號九瀛少發憤力學自為童子輒不屑章句家貧晨夕不給晏如也自舉于鄉十七年始中進士益杜門讀經史志操逾勵初授南工部主事稍遷職方郎中時援髙麗兵奉虎符横索糗大譁公獨與面示利害衆遂懾出守岳州時采𣙜使四出楚璫暴尤甚郡縣畏之如虎公獨遣吏前通刺璫謂他郡無敢均禮可速更刺來公如不聞命騶訶直抵舫次亢顏相對璫亦憚其嚴整即解舟去調守荆州免沙市稅舟清宗祿詭籍者罷單民門稅築長堤甓龍陂荆民徳之再擢廣東副使以水陸兵攻海盜破其舟商艘得通入賀萬壽遂乞歸公居里門名益重天啓初起公南光祿少卿改太僕少卿晉大理卿致仕三遷俱未嘗赴官卒年八十四所著鳩兹集啜墨亭草逸我堂餘藁諸書行于世徐鏐歌為隠士徐翁賦剡溪東下舊坑邨千古髙人舊宅門詫見徐鏐雲卧裏山中太古今猶存閒占晴雨羲文易遞長兒孫老瓦盆一年穜稑幾番收一片松篁逺蔽樓葛衫芒履黄皮褶長生木瓢髙頂笠我行我意自逍遥垂垂石磴蒼莓襲前川月漾釣竿罷荷鉏迂叟迎人話老妻烹蕨待晚餐欲歸猶息長林下一生不上里正廳倩人輸稅不敢停有馬不騎閒在野有鳩不杖任天行名喚徐鏐字亦鏐并欲逃名訪白鷗人生何必躭朝市杜郎賣藥早時休送叔氏之廣陵天畔蕪城樹影横一帆送客暮潮平多年鬚鬢疑交契逐日沙洲似世情栁眼巳占賓駕至鱘簔正美主人羹故園花事猶相待莫戀王孫十日晴壽都督萬瑞巖七十舊是朱門宅家承竹素書禁方龍藏出丹井海雲儲夢穏風塵外身閒老病餘時平埋劍氣釀美薦江魚煮石過新火栽萸半故廬興來看齒髮報國幾躊躇右中允陳公之龍字士燮號渤海以進士歴官右中允公為人簡易有東晉風味前是吾鄉袁文榮公全𤣥洲學士在翰林過自引重待門生多不以禮公心非之及分考出就邸即戒門者本房新進士造謁立為通無使候門下豫為大被與諸門生飲極驩即聨被同寢其簡脫若此一時稱之觀石照度嶺入雲林滿目生奇峭靈壁起層巒鳴泉瀉幽竅行行上髙亭巖頭標石照清瑩似玉壺空中矚窈窕衆睨從旁窺顧影各相肖試問劫火因世邈詎可料大道尚含章造物忌光耀用晦存貞明感兹悟要妙除夕立春薪火傳無盡春從臘底生合分知歳序㫁續似交情柏葉隨儺鼓椒花帶爆聲客中渾得醉此夕有餘情送友人使金陵皇華遥指鳯臺遊選勝無如問十洲花草不惟春爛熳衣冠兼似晉風流竹枝遥落秦淮月楊栁凄其燕子秋傳道吾宗新釀好何時把握上牛頭同知松江朱公勲字定國少為諸生有名吳中王弇洲先生嘗為二子擇師張肖甫司馬因與言甬上有朱定國者其人國士也及公造謁弇洲一見曰朱先生人如玉潤文則金聲誠吾輩人也因留館中使逸季房仲並師事之王文肅公亦言江南文人無踰朱定國者由是公名重呉中未㡬舉于郷謁授靖江令數斷疑獄䟽河渠罷無名之征靖田多瀕江坍漲不常公履畆度之賦其漲以代坍者民俱悦服遷同知松江善治盗除郡中大猾治行赫然為同官所忌罷歸公性嗜古善鑑所居五岳軒購先代彞噐名蹟充其中博古家所載某物在四明朱氏即五岳軒也公家居日與里中名薦紳相倡和布衣葉鄭郎李子年二先生俱負髙才横睨一世公獨與定交相接意甚歡即其人可知矣醉葉鄭郎宅擕酒意何如深村久獨居臨流數浴面看竹當吾廬天入三秋爽雲来四壁虚敢言知爾者詩自逼黄初趙郎中體仁字存劬尚書端簡公子也以父任歴官刑部郎中持身潔素居官俸入不私常鬻産自資惟懼玷先人清白鄉論賢之後人世有顯者送陳用吉分教夏津才名早嵗擅登壇此日官仍苜蓿寒暫借傳經開絳帳終期射䇿動金鑾夏雲直接河汾近津樹應齊岱嶽看君去我留堪寂莫一尊聊自酌更殘甬上耆舊詩卷二十六

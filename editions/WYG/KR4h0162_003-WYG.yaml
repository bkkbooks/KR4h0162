body:
  text: 甬上耆舊詩卷三監察御史胡文學編大徳至大間以袁文清公為制作手馬易之產自回鶻以從學來居甬上遂稱江南一絶此亦一竒也今合所録十二家為一卷訓導鄭先生芳叔字徳伸家貧嗜學嘗從人假讀輒自繕冩積數十百卷元初徧遊遺老之門捜輯故事日識見聞所從游門下甚多經其指授俱有師法再任郡學訓導卒所遺詩文四十餘篇菜詩粱肉人間夢寐空坐間猶得誦涪翁一簞樂意虀鹽足五畝生涯菽粟同剪韭未能忘夜雨思蓴豈必待秋風但知不厭其中味日有春生老圃中學士袁文清公桷字伯長袁氏最為世族公少負異才讀先世遺書至窮日夜初事戴剡原稍長在王深寜先生之門復從舒岳祥㳺盡傳諸公之學既家有賜書又親見中原文獻得接風流故其學最為有本以辟茂異授麗澤書院長用薦入國史院歴翰林院直學士侍講早引年歸里公在翰林三十年上郊祀定制十議纂脩三朝大典酌定憲令疏請購宋遼金三代遺書一時制詞碑版髙文典冊多出公手家居以後脩闢南園故址結小亭讀書其中翰墨所傳極于海内卒年六十二贈行叅知政事陳留郡公自宋南渡而後吾鄉學者以多識相尚文清得王氏之傳其于近世禮樂之因革官閥之選次朝士大夫之族系九流諸家之畧録俱能溯源執本得其㫖歸淛河以東于斯為盛公嘗言余少讀書有五失泛觀而無擇其失博而寡要好古人言行意常退縮不敢望其失懦而無立纂録故實一未終而屢更端其失勞而無功聞人之長將疾趨而從之輒出其後其失欲速而好髙喜學為文未能蓄其本其失又甚焉者也公所自責俱深中學者之弊故具述之至公歿二十餘年㑹脩宋遼金三史遣使者求郡國遺文故事唯公家上藏書數千卷足備典實至今袁氏尚盛余初選此集其後人即手鈔世傳遺草見示數百年文獻未墜于地斯可謂故家矣飲酒雜詩夜黒雪初白髙卧益自怡起看庭前栁冉冉青春姿長松在西山鬚髪流銀澌豈不念嵗苦老壯當固持事至無獨戚時來詎人為得酒且深醉淵明果吾師京中二十載酒中有深歡大雨即閉户朔風嘗解鞍客至輒笑之是豈宜居官振容筮神蓍鴻飛漸于磐百嵗苦世短萬鍾非我干所以東方生吏隠神益完陽鳥乘南雲飄飄振竒翮迫此稻粱謀居移遂成客愧我食京塵誓墓志未得雙峯十丈松下有千嵗魄當年侍蓬瀛香芸森寳冊髙齋集遺編朱墨猶手澤戰兢愧匪承永念在行役少欲觀滄海下取珊瑚枝穹龜負竒文靈鰌揚朱鬐盪舟不能往寳氣時紛披有客方壺來授簡雲差差一以參太極九以師包犧振衣海神泣舉觴山鬼移少觀五岳形五性各有殊神州養深知百靈受馳驅申申安樂翁定洛為中居契孫乃九遷舜詎平陽都神京屹金臺五雲玉芙渠始知天經旋積氣為堪輿家隣天台山云有二子巖巍峩太古石纎脩矗雲尖上棲西竺僧雪色垂須髯二子與之游作詩清且嚴乳花散素甆瀑布飛銀簾醉醒夢見之謂我何留淹南檐孤竹生嵗暮何青蒼豈不念道里因之摧雪霜夷齊盧龍居胡為乃名揚入水蛤有文踰淮枳彌芳受性諒匪移臨風浮吾觴弱冠不飲酒篝燈横玉繩或云酒中趣湛湛浮雲蒸棄書試其言果若烏輪升天根轉暗雷堅城為之崩妙言粲瓊屑逸興追飛鷹醉鄉倘可居無功乃真朋醉中發莊語爛如錦中花急急抱蘆雁肅肅投林鴉欲别意深省瞑目不復譁愧彼獨醒人揣摩生咄嗟下馬暮入門雙目含飛沙醉者忽復悟振衣正烏紗江梅生空林嵗晏美無度挈身踰朔陽愧獨此室處氊房望朝陽耿耿不得語雕籠粲珍禽悵望秦鄉樹爰居東門止盛饗非素茹臨風嗅其英雅志懐故土嵯峩白雲阡種松在山腰散之不盈掬離離如麥苗迎陽潄靈津參差拂雲霄露重碧天净𤣥鶴時來巢俛仰三十年鬢齒日以彫寄聲謝𤣥鶴相期躡岧嶤次韻虞伯生夜坐二首炎晶爍草露木末望西顥静躁誰為尸翕忽紛寸抱志士法天運炳燭不在老羣經固其郛積神以為寳陋彼多言生希名太𤣥草山林詎心違嵗月付幽討擾擾徒為名努力在此道地氣環中州槖籥均宇内中宵炎溽頻露坐猶憒憒逺窮太古雪欲往終有徠馳神極寥廓我筆不可載栖形竹素園萬化等歴塊相期江湖深慎弗寒暑礙秋風起天末紉蘭結幽佩渡淮寄養浩竹清寒房静殘月在西壁悄悄燈影㣲尸坐棄枕席井華飲蟾蜍𤣥雲成五色明知非世謀精詣在六籍我行長淮浪凍樹挾春碧夢子白紵寛雙眸炯空激書來屢在手此意何的的數回不成歡逺别乃復惻歸雁臨風翔先之寄深憶送友教授閩中蔚蔚太古樹藂生散琅玕盛時炳陽徳寥落欻嵗寒天風西北來東海繁層瀾芳朽各有性盛衰詎無端貿貿氷上屨黯黯塵中冠宿志不得酧奮飛輯其翰伊南蹇一士羈鴻河之干手持大雅篇八音佐王官墻隂卧朝日薄飯不滿盤邂逅喜我同金石生肺肝出處非故意低佪耿相看閩山渺雲海東望通三韓居夷聖有在取琴為君彈懐伯生春雨消露塵春風散林纈蕩蕩長門中客子千萬轍城隂有一士淡食羮不啜采彼松上露煮石化晴雪沉㝠䕶真性觴至那復説向來舌本談今作耳根熱維南有樛枝巖溜滋百結在徳良自昉居屯詎為折念此長夜深寒光吐殘月育王珙禪師示寂二紀嶼上人回山中因寄塔主石塔累荒土月落氷稜稜永懐跏趺叟松風吹不譍山房舊净供素壁一枝藤語寂絶禪觀機深超祖乗擊石并新火諸天化為燈上有白玉峯丹梯杳難登黄流鉅野漲虎嘯懸厓崩斯道倘未泯㣲言足搜徴董生噩上人以叔載韻見貽再次韻闗河一轍迹耿耿明大江五方各異俗中州誠駿厖吾欲上帝閽帝閽不敢撞終然返初服養佚歸海邦鞾㡌成戚施逆耳風其喈昂然望南山愛彼日夕佳朝來何所見萬馬盈天街所以巢居子終然養澄懐噩師禪林秀宛在諸天閣當其調䕶時危石繫朽索作賦極剪裁衆物各有託氤氲荆山玉洋洋咸池樂𤣥圃有琪樹不使枝葉繁譬彼績學人芟蕪養天根嵗暮雪霜至銅柯生晏温一為梁棟才落落縣金門吾師深寜翁屹屹太華髙佳時一遊不使凡羽翺方壺貯神藥變為五色膏服之生羽翰陋彼東方桃少壯忽自摧振容上詞場鵜膏淬寒鋒談笑摩堅疆藉以襍纎羅貯以白玉堂辱贈莫知報因之結中腸芳思亭大父尚書公治圃南郊有堂亭凡十五方池脩廊屈折便宜雨甚亦無礙遊事逮今荒廢踰四十年故基陳迹不可復考近築一亭襍植花木廣不踰畝髣其萬一名之曰芳思玩其英華將以紬繹志興翰墨有紹是則先公之志作詩示瓘瑾并求親友同賦侃侃尚書公投紱理泉石五堂適寒暑十亭送昕夕瓊英𤣥圃秀美䕃佳樹碧脩廊不受雨來往随履舄紅雲漲方塘丹霞耀翠席嘉魚黄金掌瞥見渺莫測辛勤三十年深逝晦朝迹遺訓示子孫樹藝比其徳浮雲變須臾百幻倐消蝕空餘鄭公莊耕稼給衣食緬彼行樂時衆植各有職以兹一畝園髣像見疇昔幽葩與羣卉生意日不息朝陽漱靈根三咽妙紬繹曠懐事幽賞誓矣躬六籍送邵元道四首仲連匡世姿揮手却秦軍掩袂停白日登車抗浮雲射書誠草草孤城死生分辭榮敦厚俗矯抗離其羣虞卿日轉丸揣事精㣲茫士危見交態窮愁名益光黄金散逝水白璧凝飛霜丈夫有定志得失非豫防梅生一尉㣲喋喋正天紀道心洞𤣥化削跡無妻子龍變孰為馴蟬蜕乃真止松迴風謖謖水落石齒齒襄陽孟浩然拂衣歸故山逍遥巖壑深流咏遺人閒舉袖林花發擊楫江鷗還鹿門看碧流入夢日潺潺越船行越船十丈青如螺小船一丈如飛梭平生不識飄泊苦旬日此地還經過三江潮來日初晩九堰雨慳河未滿當時却解傍朱門醉眼看天話長短年來官府催發綱經月辛苦鬢巳霜布裘漫作解貂具入門意氣猶猖狂自古魚鮭厭明越明日今朝莫論説買魚沽酒不計錢被髮江湖傲明月勸君莫作越船婦一去家中有門户沙上攤錢輸不歸却向隣船盪雙艣挽王尚書四首秋水雙蓮孕英英吐異芬詞章納雲夢禮樂訂河汾丹詔三軍泣清名四海聞西峯傾落日乘鶴叩蒼雲晩嵗艱難意衡門老病身蜀山迷望帝楚澤痛靈均皮弁終辭召深衣晚任真蓋棺今巳定千載有遺民燕説經生濫齊諧學究輕㣲言空有意獨拍巳無聲墨澤雞林貴青氊虎觀榮新銘前進士幽抱付誰明再世登龍舊淵源許管窺西山遺正緒東澗結㝠知腹笥名空在眉棃夀竟違重歌妾薄命含淚滴塵瓻送蘇子寜赴嶺北行省郎中貂㡌䕶寒沙氷天閲嵗華㫁溪駝聽水密雪犬行車雲盡難尋雁春深未識花昔人竒絶處八月解乘槎往嵗經遊地寒蕪碧燐深雲開山後陣水咽隴頭吟雪白氊房重天清羽檄沉重華新雨露悲喜候車音書懐寄從子瑛二首越公舊築鄞江宅風捲飛花劫火新子竟尋真餐白石我方作史玩青春金張螭綬元欺世王謝烏衣亦可人誓墓政湏堅晚嵗雙峯擁髻碧嶙峋當年羣從玉參差炙轂談天不數竒剪葉舞空山鬼泣唱籌量日厯人疑深春栁下争飛騎小雨花前鬭奕棋我最少年惟閉户篝燈煮藥學題詩送王繼學馬伯庸玉京髙處雪流脂連轡雞翹緑鬢垂蹀有泥歌獨漉琵琶無夢説相思黒河巨樂催填譜白海名花擬進詞羽獵上林俱罷賦卿雲何以報熈時淺波平疊磧漫漫拂嶺青帘罨畫看氊屋起營羊胛熟土房催頓馬乾桐官走驛傳金椀水正分奩貯玉盤莫上鄉臺望南北白雲㣲處是槍竿送華山隠者黑髪祠官佩水蒼萬松深處響琳瑯黄柑有法能為酒紫术無飢可代糧喚鶴舞空山月冷檄龍吹雨海風凉瑶池欲問長生訣碧澗研珠冩緑章㳺䕶聖襌寺獨秀峯前倚檻看翬飛樓閣出巑岏荒墳虎塟唐僧骨古井龍窺漢尉丹荷沼秋枯霜鏡净松林風撼夜濤寒年年四月黄梅熟猶憶調羮齒頰酸葛仙翁移居圖翁媪相攜入翠㣲轉頭猶有可憐兒丹砂不是神仙藥句漏歸來鬢已絲龍挂詩黒雲壓江江水躍乖龍時挂青旗脚須臾捲水上青天蛺蝶蜻蜓雨中落春俠口號松林縱獵金毛鷹花街行春銀面馬夜宿娼樓酒未醒飄風吹落鴛鴦瓦袁處士裒字徳平文潔公爕之後善書法常撰書學集要亦工詩隠居沙家山不出與文清公為族兄弟常因游東湖作聫句千餘言而其餘詩失傳亦足歎也東湖聫句舊學蕪三史新居隘一㕓煎熬魚煦轍奔竄鳥驚弦擬整登山屣桷須乘破浪船出闗塵巳逺裒過埭意争先歸舶攢桅聚桷浮梁㫁鎖懸潮渾江葑沒裒塍破岸藤纒戍柵依樟密桷官隄砌石平機閒蛬喚織裒砧響雁傳箋乍静喧煩耳桷猶欣輾轉眠鶻橋華屋廢裒鵞滙曲河連稇實閒農具桷鹺嚴絶竈烟急裝紅蔽膝裒辮髪黒垂肩估客編文具桷村家緯木棉生涯疲割剥裒世路窘迍邅龕室休行客桷郵亭歎逝川韝鷹圍獵罷裒聫騎縱遊旋路轉分支港桷川明幻别天鄮城花巳闇裒甬水恨空傳數堠搜唐刻桷題詩紀宋編㑹堂夫子像裒汲井隠居泉海眼藏龍窟桷山心射鹿田水鳴知棹急裒岸走訝途遷隠見岡巒近桷低昂橘柚鮮青山猶五里裒緑樹巳千年歸犢如雲擁桷閒花似火然苧裳游女浄裒蘆管野伶妍繫纜披團氅桷循溪捨竹箯徑香幽菊傲裒土薄假山偏燈火精廬古桷衣冠故物全登門論子姓裒對坐敘姻聫金魄篩窻影桷丹砂養井淵螢光飛熠熠裒鶴唳翼娟娟斗室横烏几桷方牀藉素氊魂清時入夢裒意得竟忘筌過墓成扄户桷遵湖復扣舷滄洲逺秀麥裒真隠拱朱椽碧洞諸天杳桷蒼珉帝畫鐫梯危頻縮武裒像寂且擎拳紫府商林歇桷丹書漢澤宣銅鋪苔暗蝕裒徑庋燕新穿倦鳥辭枯栁桷游龜戴旱蓮古奩開㶑灔裒斜縠縐漪漣淤塞茭排劍桷洲乾蓼糝鈿官徴都尉粟裒漁納水衡錢玉絶山靈泣桷祠荒野老憐紙旗靈社閙裒草广曲河填此去真聊爾桷斯言信偶然柏幽藏魍魎
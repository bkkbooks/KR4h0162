body:
  text: 甬上耆舊詩卷二十七監察御史胡文學編御史李公尚黙字子靜生有異才以進士出知確山縣調桐城治行並第一徵入御史臺出行部遼東卒于官公在臺持風裁權貴側目及卒槖無遺金吏民共資送其喪歸除夕羽檄無虚日驚心是歳除徒懐千古恨未上一封書稚子非鄉語京華是我廬天涯悲獨客不覺賦歸與元日去歳今朝侍紫宸今年攬轡涅邊塵雞聲不報天門曙馬力惟矜塞草春報國未陳安塞䇿思親徒慕舞衣人遥瞻佳氣浮丹闕便有條風拂海濱鴻臚范公大徹字子宣性孝友喜讀書從里中名士游不間風雨少司馬東明公欽其從父也子宣年二十餘從司馬至長安題詩雙塔寺壁同郡袁相公煒見而奇之延至西席因有名其後華亭徐相公階更引為記室子宣以是得交四方奇士行卷相往來名日益盛以太學生再試不第補鴻臚寺序班其時國家方盛使節所臨極海内外子宣年三十七使琉球四十二使遼東四十七使朝鮮五十三使車里木邦緬甸大甸諸國五十七使九邊六十一再使遼東六十五使安南凡七奉璽書進秩二品所過名山大川流覽題詠傳于一時性酷嗜鈔書每見人有寫本未傳必苦借之在長安邸中所養書傭日鈔多至二三十人接几而食尤愛法書名畫自唐宋以來名蹟及異國人所作性雅畢集家藏搨本甚多凡初本肥本原搨贗搨硬黄紙棗木板銀錠紋過眼即辨秋毫又以行天下逺所至得秦漢以來圖書至四五千有奇擇善紙造硃自為印譜常循玩不釋手既家居築室西皋復與里中賢士大夫品書第畫垂二十年卒年八十七初司馬公歸里于宅中起天一閣藏書極浙東之盛子宣數從借觀司馬不時應子宣拂然益遍摉海内異書袐本不惜重購之充其家凡得一種知為天一閣所未有輒具酒茗佳設迎司馬至其家以所得書置几上司馬取閲之黙然而去其嗜奇相尚若此余家與鴻臚世有姻余少時曽見其印譜一二册及選耆舊集往從其家借書雖殘失過甚尚有存者近更得吾友鄭梁所作鴻臚傳敘其七使外國因愾然想見一時車書之盛而士大夫家唯以藏書相尚四部煥然無奇不出今日追慕其風流不可復見矣訪謝茂秦山人不值忽憶同懐侣遥遥下鄴臺偃扉人不值貰馬我空來復作何門客誰憐吾輩才白楊十字口竚望幾遲迴陸同知澩字夏父以舉人官至同知彰徳府隠學寺谷口秋雲薄芙蓉一水香荒臺凝露白殘碣䕶苔蒼事去留陳跡人來對夕陽百年回首意欲别更淒涼邵武張長公邦仁字孺穀大司馬東沙公長子人稱為張長公少負異才省試三中乙榜由明經授知邵武縣以不能事上官罷歸長公少豪每出游賓客車騎過于司馬公自白下至西陵江南千餘里無不知張長公名字者余君房先生嘗為作贊示吳人曰長公客吳中左挾姝右擁姝前奏趨後呼歈若無吳門也者及其訪要離弔専諸顧瞻霸氣太息闔廬雲涌風駛潏蕩具區差可觀吾長公乎其豪可知矣送王幼學遊楚此别更何名辛勤作逺行貧來無壯士老去惜平生郢樹暮烟碧湘江秋水清孤帆風力好早過岳陽城上方寺一到上方寺中天寳刹開蒼茫太湖水寂寞吳王臺鳥背夕陽下人從深樹來振衣不能去清磬更徘徊金陵舊内鑾輿北狩駐燕闗一片鍾陵盡日閒合殿春迴芳草色千門花落暝禽還風清輦道曾聞蹕日上觚稜幾散班白髪中官供洒掃夢中猶自見龍顏知縣陳清橋先生言字伯實年十六輒通五經以明經授遵化訓導遷大城教諭自先生至學舎凡諸生初進謁歳時所上脩脯盡不受其入俸既少不能自給然見學徒有貧不得葬其親者不能娶者更分俸入助之日召諸生集館身為說經以遷知石城縣去其後大城諸生請祀先生于學宫石城地故瘠豪大家猾吏相通為姦民益弊先生至盡捕治之縣中以寧方先生下車先與父老誓曰吾若横取石城一錢即不得生還自後凡所應入耗贖槩卻之惟興利除害一意與民休養在官四年縣大治適有直指按部索先生金先生笑謝不應即日解官歸石城父老號泣追送為先生生立祠既家居以行誼之重見推里中每行鄉飲禮先生九在賓筵卒年七十七復祀于鄉賢祠江右解綬歸憇西陵戴氏愛菊辭彭澤看山返㑹稽一琴披月潤雙袖御風齊潮迅人聲沸舟平樹色低主人安道裔訪卧却相攜朱莒州瑩字仲明以舉人官知莒州西湖曲鄂王廟前湖草生綠隂深處有啼鶯鶯聲草色春長在何日官家議北征鄂王廟前湖雨肥掠波燕子故雙飛空梁有壘香泥落南渡無家何處歸按察使楊公徳政字叔向號楚亭文懿公之後也少有文名中進士官翰林院編修以見忤于時補外歴官福建按察使所著夢鹿軒稿得書字猶是端陽節因過春水居隔花新雨至把醆故情舒卜夜同人樂先秋大有書更欣幽事足新水上河魚雨宿大安驛黯黯經旬雨霏霏入座雲寒深憑酒敵春半與愁分野鶴盤松立啼鵑隔竹聞依栖何所事羞向武夷君河西阻風戲示同行者失路依依獨問津楊花飄蕩撲征輪東風正似郵亭吏只解迎人不送人戴教授士完字子成以明經官金華教授滕縣小國名猶古西風井邑寒霧吞殘雉白楓染數枝丹鳥倦飛還急人勞夢未安賢君重民事桑土喜長乾陸參政懋龍字啓原進士知合肥縣徵為給事中補外歴官湖廣參政初入諫院寄慰肥城父老劇縣息勞人新班立紫宸種花收薄效焚草企先臣漏欲天同補膏憐土漸春淮西蠶麥候緩稅乞皇仁小院小院幽隂似井間風枝墮地㸃苔斑何時鏟却重檐去露出西南一角山侍御林公可成字𢎞志中進士授知太康縣起學舎修濬河渠鉏去縣中豪猾吏解散盜賊屢決諸疑獄治行畢舉歳有蝗公為文遣之忽大風起蝗遮天飛出境一縣以為神歳復祲賑老弱收其壯者給錢使繕城民不知飢持操甚亷有饋以新茗者剖其封始笑受之治縣數年召為南臺御史值南北洊飢公再疏請發臨徳二倉及三闗歳課兩院存贖以賑俱報可時兵多譁主帥不能治公奏請重其罪復請禁宗室不得越闗姦民多匿揭陷人或誑奏其長吏乞論如法一時傳為名疏辛夘監應天試方操筆㸃名暴卒後御史彭應參行部命立祠以祀公題曰忠勤祠送友人之廣陵歳晏慵為客他鄉喜見君雙帆蔽日下岐路一朝分羨爾鶴乗去嗟余鷗失羣望空南浦樹黄葉日紛紛張少卿邦伊字孺覺司馬公子以父任歴官苑馬少卿司馬公家居每三日必召客諸子率侍酒公詩成諸子與客同步韻次第呈草唯孺覺從遊更多司馬公嘗笑謂客曰孺子即由我故得官亦可不為俗吏矣一時以其兄弟比于呉中四張焉候濤山李邦臣攜尊閣上孤峯髙不極登眺意如何城郭山嵐重樓臺蜃氣多逺天行日月大壑積江河縱飲吾狂甚鯨吞卷白波山行次沈嘉則韻千澗流寒水雙松控石門葛巾沾雨片蠟屐損苔痕隔浦山疑逼臨崖樹可捫居然成異境幽意向誰論張光祿邦侗字孺愿東沙子以太學生官光祿署丞江曉江氣逺濛濛晨光一櫂通雞鳴青嶂外人語白雲中暗樹緣崖密明霞夾日紅扶桑可晞髪吾欲溯流東青草湖秋霜洞庭澁秋草太湖青茅屋成三户溪烟散一燈鴈飛風益厲魚薄水還腥宿莽搴汀渚蒼蒼最上層春日園居問我年來事荒園但自鉏侵晨營井渫計日長春蔬天暖鶯啼早林深客到疎手攜枯竹杖身世總蘧廬長安元夕詞湘簾不散水沈烟屏後金釵擁綘蓮寒入琵琶雙手澁强邀明月在燈前李光祿徳繼字子同太僕生時之子也少工詩喜從郡中名士游能傳其家學以太學官光祿監事所著有借樹齋集尚書定說樹藝考諸書農父生計在春田何須識市廛曉霑溪上雨夕蹋壟頭烟稻結疎籬外桑遮古屋邊催租無吏擾社酒樂豐年寒食令節偏逢雨東風又釀寒榆烟今日㫁杏雨幾家餐堤草青猶短山花溼未乾折殘河畔栁徧挿里門看西陵懐古西陵望處即吳闗懐古情深復一攀湖上笙簫何日始渡頭車馬幾時閒青山廟廢基空在白鶴橋傾水自潺却問宋家蘭上里白烟如雨隔江還懐包參軍極目西來山色秋但聞長笛不勝愁故人家在清江上潮滿門前月滿樓陳通判邦訓字彝父初居長安中順天鄉試以冒籍被黜凡二十餘年得辯復授海鹽教諭歴官漳州通判彝父初善詩古文詞有名及被放歸益肆力于古諸史百家多所淹貫所著有元感軒集閣上雲集沙頭樹人歸浦口烟空山喧宿鳥小閣挂長川衣短宜輕暑歌長入逺天南風吹几席不飲亦陶然參政范公鈁字宣卿為諸生博通經傳有文名浙中士大夫子弟多在其門中進士授刑部主事上疏規時政闕失請躬郊社御講筵早定儲位補曠官罷礦稅所陳俱國家大計語極悃切不報旋改工部積資出為四川參政致仕歸卒年七十二再赴榮經即事昨向金雞馳驛路又循鐵水問瀘津􅢱音介葛應猶昩魋結文翁尚未馴瓦屋四時雲似幕天全三伏雪如銀荒塵到處増新悵獨有圓輝是故人袁主事時選字無擇以進士官刑部主事無擇少有才工于詩屠長卿先生一見賞之嘗曰吾身後文章之事當屬無擇及長卿殁無擇為詩哭之極哀電白即事經行神電路客劍正蕭蕭海氣晴飛雨沙田低受潮種榕成野蓋編竹補殘橋向晚還多阻悲風起泬寥新興道中偪側新興路逶迤傍水隈萬山迎馬合片雨逐人來邨犢騎堪穏江鷗下不猜頻年牽物役延眺亦悠哉行李行李蕭蕭幾問津風塵博得鬢華新離枝圖好將貽客椰子瓢輕不累人馬力漸疲羞款段車輪入爨識勞薪白雲蹔喜瞻親舎又擁貂裘北向秦哭屠長卿先生風流曾遣俗人猜幾擲千金散草萊幸舎無魚人欲去翟門有雀客空來雨昏黄犢穿荒塚月冷青娥罷舞臺玉樹柘枝今譜盡到頭薤露為誰哀知事莊天目先生學曾字仲肩生平以道學自任家居與兄弟講學于堂設講鼔兩楹間節以金石進止揖讓俱從古禮歌雅詩江右李見羅慕其賢稱之曰程朱後身也因題其講處曰任仁堂以舉人授東光訓導出其俸薪課士修葺學宫家人僅給饘粥遷知樂安縣以徵稅不取羨耗忤上官意謫順天知事時經畧尚書袁崇煥襲殺島帥毛文龍先生上疏劾之所司匿其疏不為上忌者方側目一夕暴卒先生初為令嘗言吾死後當表于墓道曰天下亷吏莊天目斯可矣及卒于官槖無遺財至不能具棺同鄉有任治中者為醵賻始得含殮所著遵時堂集行世閨怨桃花紅未了又見海棠開早知花有信不遣喚郎回舟行即事宿雨初移岸春山欲上船度花風力小出樹鳥聲便櫂發烟雲亂吟催日月遷應輸箕潁客龍卧老江邊寒蟬何限悲秋意恓恓古樹林夕陽曛正急朝露溼難禁𤣥鬢愁霜入危冠抱葉深其如孤客恨迢遞歳華隂佛日齋讀書習靜來初地端居百慮清霧香一縷定霜瓦萬鱗明說法從支老談𤣥過許生縑緗欣寓目勞者自為名哭屠緯真先生岐路交情濶浮生此痛深西園舊山沼今日罷登臨妝閣連秋葉歌臺莽夕隂但聞鐘磬發悽絶為霑襟評事葛公文炳字星垣少留心學問舉于鄉授知江西南城縣宗藩率攫民取利公至每謁益王輒從容陳其弊王感悟由是犯者得先啓其罪即面決之民藉少安縣南有烟火山七十二障民樵牧其中豪猾家詭言王府造塋遂踞之公復白王立石分其界得歸民間縣俗尚鬭狠多食山砒草自毒誣人凡所告殺人罪半出此公欲識其草乃召縣中父老謂曰衙圃適種菜聞此中有山砒草能殺圃蟲可各多取來既至公識其狀即命取火焚之曰此物以殺蟲尚不忍況可殺人復命凡緣堤有此本盡除之時民謡有言滿岸山砒盡拔根訟風為衰止公使民四季輪稅冀得緩其力凡投匱上設一銅鼓吏重其入即鳴鼓以聞常乗一小輿行阡陌間以時主水啓閉立義館使貧士為鄉校師他治行俱第一在縣六年遷南京大理寺評事一年多所平反以疾歸卒于里所著曰甓園集游信州仙巖莫道生洲路更賒微風自引夕陽斜聲傳空谷飛黄鶴火爇丹爐茁綠芽溪水半分一夜雨洞雲常護兩山花逡巡昨日尋真櫂何似當年貫月査兵部右侍郎董公光宏字君謨少嗜學九歳能操觚從其父棻宦游南安父卒于倅署奉喪還槖中罄盡其嫂以庶凌之至不相容乃奉母王僦居單外益自激厲常愉色以慰母心為文日益工中進士以刑部郎使恤刑閩中所平反多遷河南參政時福藩初建公正身率屬彈壓不少假諸璫咸奉約束再擢順天府尹執法不阿有大璫乞免其莊田役不許從中擠之遂以兵部侍郎致仕家居適寢疾沐浴具衣冠而卒年七十二所著有歴官記錄疏草秋水閣墨副諸書冬日海昌邸中𤣥冥謝羣妍廣漠布凝威水落石齒齒山靜行人稀逺征亦何事歳隂長未歸遥望山川積仰見鴻鴈飛南郭自隠几東方常苦飢人生不得意容貌無光輝明月隙中下偏照負薪衣旅懐司夜猶傳警羇人早拂鞍梵鐘霜後度野火霧中看髪巳心俱短名應歳共寒翻思邨社裏臘蜡正相歡彭城弔古曠望寒雲故壘平亂山迢遞入荒城前朝蹟認魚龍國霸畧雄分草木兵飛雨似留歌楚淚濁河猶帶戰秦聲古今不盡興亡恨落日啼鳶總是情夜飲李𤣥白所即席奉呈兩年五度梅溪水此日登臨正夕霞秦駐尚留三殿草吳宫不㫁六朝花路傍只拜要離墓地主重尋季子家杯酒對君頭欲白不堪歴亂聽啼鴉王蓀仲書來有同舟之約至幞滄先半日而發寄詩遲之雙旌迢遞指滄洲海色蒼茫入素秋太守相逢要秣馬故人先去獨隨鷗空來片羽霜前字竟作千山雪裏舟寄語長年徐放櫂青齊好共豁雙眸趙副使世祿字文叔中進士授刑部主事議楚藩之獄詞連大帥執法不阿出知蘇州再擢江西按察副使備兵吉安與鄒南皋郭青螺諸先生交執禮甚恭江右士翕然宗之未幾引年歸卒于家初夏同丁長孺吳𤣥谷姚公逺兄弟泛畫溪蘭舟簫鼓動童稚解相迎物外窮山水尊前屬弟兄谿浮人影出風送鳥飛輕醉裏藏名久江東老步兵葛副使仁美字無懐以舉人初授同知撫州署府事却𣙜稅例金有政聲歴遷廣西按察副使所治潯寧太思諸郡土司梗服不常公防馭周密俱奉約束恪修貢如期吏民安之以年老致政壽終于家所著有四書悟言周易要言徵信辯異二錄無懐集諸書髙尚澤舊居句章一曲水雲遮狂客于今問落花獅鳯叠青留古蹟鸕鷀滴翠瑩丹砂空江人去潮仍到逺渡舟横日自斜髙尚不須推賀監葛天從古食烟霞余經歴詠字永言少有文名以太學生官都司經歴燕來何物天邊燕隨時到海濱喃喃如敘舊涏涏欲迎人花雨沾衣黒芹香入唾新不關愁見汝為憶故園春陸訓導徳漸字鴻志以明經官乳源教諭登樓示張五應韶擁膝髙樓上凭臨興故遐㫁畦纔過犢灌木可藏鴉歳計淹文史塵容老菽麻東風吹不定還發舊時花柴知縣瑛字華玉以舉人知長寧縣遊智門逓入層巒曲禪扉映夕陽盤松鬱古道雜蘚繡隂廊磬靜僧延語燈開佛吐光佇㸔凡想盡一夢已清涼知府范公汝梓字君材博學有文名以進士授工部主事劾太監陳永壽冒破金錢疏請東宫講學降四川酉陽經歴稍遷同知襄陽府流賊圍南漳五日公時攝郡事固守拒賊遷知府卒于郡公性嗜學所積四部與司馬鴻臚畧等里中士大夫藏書家必推范氏焉采蓮曲風吹荷葉枝枝香采蓮女兒矜豔妝棹聲驚起雙鴛鴦雙鴛鴦何處宿白蘋灣紅蓼谷寳劍歌贈李子年春風駘蕩春花明李生挾策遊燕京腰間寳劍光耀日酒酣起舞風雷生自言少年去學劍刜鐘切玉如飛電曾罵荆軻術太疎常尋郭解讐相見昨夜仰看欃槍髙龍鳴鞘裏風蕭蕭提攜結束出門去世間知我惟豪曹我聞此語長太息歐冶巳死誰能識請君寳愛莫輕擲華隂赤土還堪拭待得黄金築將壇提兵直掃鞮汗山功成一劍報知已封侯生入玉門闗工部侍郎黄公景章字唐叔進士知平原縣以治行聞入為工部主事歴郎中再遷湖廣按察使入覲舉卓異賜宴再擢應天府尹引年歸卒贈工部侍郎所著有平原縣志問水贅言甲辰下第出都門留别家仲幾年蕭瑟敝裘歸又見陽春藹帝畿雙劍龍蟠精久射一鵬水激怒先飛相逢爭羨翔雲路此去誰憐逐釣磯輦出上林承宴對願言玉樹借相依張鴻臚邦岱字孺宗司馬公子以太學生官鴻臚序班山莊翠竹蒼松白板扉日融沙暖蕨芽肥有時樹杪啼山鴂無數楊花㸃客衣荒徑草深人不到空林松響鶴初歸酒醒拂石溪邊坐搔首長吟對夕暉施通判承芳號賓宇本勲門後以博學善說經教授里中一時名士多出其門由明經授石門訓導遷西川教諭擢知貴州永從縣有治行遷貴陽府通判卒于官弟翰以武進士官神機營都督亦有文名里中稱為文武世家泊新淦阻風片帆南指泊西涯淦水縈迴照落霞江叟得魚沽白酒埜烏覔食亂黄沙參差見影遥村樹三兩張燈近驛家此去廬陵知不逺石尤為妬且維艖沈尚寳泰鴻字雲將相國一貫之子也少有麗才能詩工書法翩翩自喜思以科名見相國抑之不使應諸生試始强就尚寳司丞非其志也家居益與屠長卿田叔汪長文諸先生及湖南詩僧相唱酬彷徉山水間先子年先生以才髙忤時被黜雲將與長卿先生力辯諸當事因得白人以此益稱之雲將卒相國尚在所著有閒止樓集村家茅檐亦不寒糲飯亦得飽田婦無裝束何必城中好日斜抱犢歸喜爾無牙爪女貞行霜前女貞八十尺蒼皮盤礴驚虯擘我來摩挲五月寒翠色刺天天欲滴白頭老人泣且語此柯曾結黄金子自余垂髪驅牛來睥睨腰䥥幾回死近從若木漱扶桑逺入桃都吸玉漿只教夜月號孤鶴誰許啼鵑泣㫁腸寒英恥為豔陽伍勁節干霄氣如虎南山松柏空亭亭野火枯藤絆桑扈吁嗟神物不論年荒山古道流水前髙秋獨攬風林色空續䝉莊第七篇逺宫人幾年花貌伴殘更只有監宫問姓名鴛被未經難入夢鳯簫遥聽不成聲當熊空抱馮媛節題葉羞傳韓女情誰道君恩似明月不分流照向苕榮長安雨後京塵行處是風烟春曉長疑欲暮天惟有濯枝新雨後江南無夢也泠然知縣沈公鳯超字可凡布政九疇之子也家門貴盛而持操自髙所好不在紈綺少治詩古文詞能傳其父學以進士授知海陽縣縣故饒往者多以墨公獨介然自守不肯入一錢飲茹麤澹人所不堪或有規其太甚者公處之怡然上計京師歸至濟南而卒里中王莊簡公時治河發其槖蕭然無有泫然曰是誠亷吏也為具含殮給歸資始得返匶于里自君之出矣自君之出矣妝奩日掩塵君心如明鏡獨照眼前人子夜四時歌願郎勿似雪隨風舞零亂强將玉手團團成消巳半織錦曲淡蕩春風夕照涼鏡前月色妬殘妝美人機上織流黄金梭一擲懸明光千絲萬緒牽人腸愁心不盡雙鴛鴦彩雲欲㫁俄沾裳燭花漸短玉漏長欲睡未睡羞空牀誰攜錦字遥相將覺來中夜還傍偟侍御李公遵字于鴻以進士歴監察御史出為陜西按察僉事罷歸公性髙爽脫俗風味似晉人解綬後益放情觴咏間嘗于城北起園亭為别業地既閒曠位置泉石有若自然時鄞令王公章慈谿令汪公偉俱與公交甚驩每汪公造郡王公即與相期過公園閉門酣飲時徹旦次早王公暫乗輿入縣放晨衙即復來天暑時共浴池中傾倒輒數日至今傳為佳事公嘗出登臨歸入城乗遊山小轎數童子提杖榼隨後余猶及見其風流也初公所闢園本楊氏舊址有作絶句曰楊花落盡李花開李花開後復誰來公聞之欣然即名曰來誰園其達懐若此及公殁十餘年王汪二公俱殉國難為忠臣公園亦盡廢衰草彌望至今尚無來者俯仰盛衰為太息久之苕溪雪夜作客經冬盡扁舟雪夜孤賦成飄似絮飲罷苦如荼飢口憐喧雀拳毛對宿鳬苕隂迴棹處春草訂西湖蔡用拙值包憲副約以首春遊西湖卻别但息城隅搔首頻倐驚路草巳如茵君探勝蹟包山洞我對新烟鑑水濱醉似無功陳酒徳名從有道合人倫年來細數梅花伴作意詩篇正早春同石父長文遊天台道中萬壑接雲來山花澗路開迎風涼欲坐啼鳥著人猜包徳州士瞻字五衢號巖叟少有文名以太學生官同知徳州江干包氏世有詞人徳州最為後來之秀攝山與盧山人話别故人事行役選勝命杯斚篔簹夾道周琪花覆亭榭握手展清眺景物若相借長風萬里來𤣥波溔皛乍森矗靈巖峯匡伏若陵跨清泉㶁㶁流白鳥悠悠下懐歸人自急物態本閒暇汩没朱塵中吾徒足悲詫裊裊炊烟生平林澹如畫坐江閣獨向空波坐髙林自夕陽風檐翻鳥毳水檻逓荷香吳楚雙眸盡乾坤一水涼翩翩鴻鵠志不厭芰荷香湖上檻霽鮮雲度穿花堤上行田田新葉翠款款白鷗輕解帶涼風至開尊古木平湖光倐紺紫落日在山荆同楊無宰李見瀾閣眺山閣水為屏牕虚涼自生風來花有態春入鳥移聲芳樹時垂屋洪波欲上城髙談寄寥廓華燭坐深更嬾園瘦竹藤斜挂叢花草亂生林髙風有態苔滑水無聲豐知府建字基仲考功坊之曾孫也中進士歴官知建昌府嚴州石樓寺空山石樓寺萬壑到松門殿塌丹青改碑殘姓字尊循林新燕語破壁野蜂屯清淨空王法由來不耐煩復故園脩梅颯颯舊祠邊鐵榦凌霜歳月遷獨向空林驕晚節肯隨衆卉競新妍鶯啼杏樹寒初卸魚唼蘆根水正鮮似此春光難再復一編相對正翛然全舍人大訓字懋欽少宗伯天敘之子也以門資官中書舍人其詩華綺有宗伯遺風雨中山行巖花飄路溼溪燕引雛雙密樹常留雨飛泉半入江人家烏石嶺鳥道碧油幢欲譜淋鈴曲愁城未肯降僧舍對榴花有感桃李開時泛别艖禪林又見石榴花十年九客天中節一夜千迴夢裏家驢背陸沈詩世界蠏蟄寥落酒生涯鄉心欲碎渾難訴寄語方塘兩部蛙春莫江行望留都作荼䕷花滿大江邊冉冉香風送客船京口潮翻三島雪石頭春鎖六橋烟蘆汀棹轉黿猶曝栁岸罾開鱗正鮮㑹向金陵瞻王氣蒼茫宫樹老啼鵑涪州王右仲先生嗣奭號于越以舉人歴官知涪州㑹與監司忤罷歸先生少有異才擅文名為前輩余君房先生所賞及長博通文史尤嗜杜少陵詩嘗夢與執手共賦詩後以涪事至錦官城過草堂拜少陵祠下仰瞻遺像仿彿夢中及里居遂詮次其詩名曰杜臆先生喜辯晰先儒異同有左右鏡山中天管天諸筆記于聖學深為有得神廟末年士大夫稱博學未有過先生者鑑湖松島歌賀監祠前晚風發千頃湖光一輪月湖月從來缺復圓湖風只管傕華髪松島空存舊日名蒼龍化去秋冥冥兎絲已㫁不可續何人斵得千年苓髙朋滿座酒滿瓶狂歌對酒君請聽乾坤莽蕩定誰主向來無我亦無汝與君寛作百年期此後相逢不敢許勸君擊筑我吹竽有酒不飲復何須一時浮名幾氷炭九原朽骨無賢愚飄然願逐赤松去不識赤松今有無只有松間古時月曾照幽人據髙梧普和寺苦竹牛羊徑江干到竹扉一松留晚照萬雀訴朝飢香蝕爐中篆苔乾石上衣僧言貧亦好過客近來稀晚過錢清陽光歸島映爨火破烟明烟靄蒼茫裏兒童笑語聲昔賢嚴晚節野水帶餘榮每棹錢清路依依千載情偪陽道中去歳傷秋潦洪波尚淼然翳桑栖水蛤廢里過江船澤國人烟外飢民驛路邊明霞餐不得淚眼向髙天莊教諭喬新字無垢以明經授東陽訓導遷天台教諭歸所著有樗寮草台雁賡草夏鎮夜泊金氣蕭蕭夜扁舟繫草亭鷄鳴千頃月人語五更星衣薄寒初覺舟移夢未醒前邨風色動急為一揚舲葉訓導逢元字㑹一以明經官政和訓導十四夜酌月莫厭空庭坐移觴更竹前今年花盡發此夜月將圓嘗與終古士同推陶令賢良辰忽欲過一㪷且頺然周光祿元孚字孚尹以太學生官光祿寺署丞有詩名家在鑑湖之上與陸舎人寳楊髙唐徳周諸公相唱和卒年八十餘里中推為祭酒湖上湖干卜築幾人家竹裏疎烟竹半斜曝背老翁閒捫虱挾丸童子慣驅鴉牆東摘得黄柑熟隣北能供白酒賖乗興不妨歌險韻待將雪意問汀花知縣朱公應樞字國中號荆石以貢授沙縣丞閩中向傳銀浦金沙公獨持清操不横得民一錢縣有大洟灘屢覆民舟公為文祭水神遂成安瀾又嘗請為民興利民因饋公餌潛致白金其中却不受民感公徳以金建亭灘滸顏曰却金亭公聞立撤扁額曰吾寧以博名髙耶遂以異政擢為永安令有聲未幾卒于官槖中罄然郡守賻以木方得具殮民為巷哭方公卒之夕永安城隍祠守者夜聞騶從傳呼聲曰朱公新赴官相與樹碑廟門曰愍徳哀思之碑至今傳如羅池廟碑云太史溪懐古溪在沙陽城外宋李忠定公謫閩寓此至今溪名太史瀨流宛轉抱山城父老猶傳太史名莫道楚江曾被放只看閩水尚増榮吳堤桃栁多揺落艮嶽鶯花幾代更惟有髙賢憩足地潺潺不盡古今情秋日登天封塔頂寳塔凌雲接落霞登臨秋色望中賒髙疑鷲嶺三千界俯指蛟城十萬家海割山青天外盡帆連樹杪日邊斜凭欄更欲飛昇去直北祥輝擁翠華陳光祿士繡字伯綸吾鄉西皋陳氏凡三十六族最稱多才伯綸從祖山人大魯字穎叔即撰詩史與君房三沈稱七才子者也伯綸少時穎叔絶愛之嘗曰是兒吾家鳳雛也及長傳其家學益有名與曹能始先生論詩其集見石倉選中官光祿寺署丞秋夜鑑湖即景放櫂恩波裏追隨秘監年白浮心寺月青落鑑湖天興到龜將酒形忘馬似船不辭狂欲死誰是謫中仙同知張丹霞先生鳯墀字宸宣方伯纓泉公曽孫也先生性篤孝友勵亷節家世尚清白蓆門蕭然常教授里中悉以脩脯給昆季陶然也婦王賢如萊婦殁後遂終身不娶未幾舉于鄉凡三上公車罷歸適先生長子錫丁中鄉舉次子錫麟錫寀為諸生並有名先生乃曰家學兒曹足承之吾奚僕僕從計偕也始授官出知涪州有異政踰年即遷同知興化府初先生曾大父纓泉公嘗為此郡理郡人徳之為生立祠及公至拜祠下益新棟宇立遺碑每朔望必身造祠以佐郡所行焚香上告郡中大治公復以經學授莆遊二學諸生盡稱名士郡人俱謂先生治行足繼纓泉公雖大鄭君小鄭君未能過也已而改調知四川大足縣甫及朞即投劾去時里人同官蜀中者王右仲先生嗣奭知涪州先伯玉海府君榯知營山俱以直道見忤一時解組論者惜之先生既歸里門益身敦族誼與宗黨同有無教子孫循循守亷讓不愧古人先生初為諸生出時無衣及舉孝亷方製一紫花布袍服之數十年每飯常盛一甆器僕夫偶損一角請易之先生笑曰三瓦不全此世間豈有完物吾不與易也其風格若此余家與張氏世有通家之好先生曾孫起宗年少稱名孝亷與余交最善先方伯公祠下作先公祠廟此方存今日重來得掃門墮涙百年傳故老遺容三世見曾孫奉嘗敢較桐鄉厚伏臘終思召父恩澆罷蘭椒徵舊事手摩碑蘚盡堪論解官歸里門奉酬諸公見過不與人間軒蓋通悠然真意在籬東長蒿徑口來求仲老棘門中覓蔣翁交友一倫今日事傳家六籍古人風閩山蜀水頻年夢難得杯盤此夕同甬上耆舊詩卷二十七

body:
  text: 甬上耆舊詩總集類提要臣等謹案甬上耆舊詩三十巻國朝胡文學輯而其友人李鄴嗣為之敘傳者也文學字道南鄴嗣號杲堂俱鄞縣人輯明州詩文者宋有鄞江集已失傳王應麟四明文獻集亦多漏畧至明宋士𢎞之四明雅集二十家戴鯨之續集六十家張時徹之四明風雅一百二十家于作者採綴稍廣而源流未備鄴嗣嘗撰甬上耆舊傳紀其鄉先哲行事頗詳文學因即其傳中之人捜錄遺詩論定編次而各以原傳系之始自周文種漢大黄公終於明季諸家凡四百三十人得詩三千餘首本四十卷甫授梓而文學即世其子徳邁因以前三十巻先刋行之每巻之首俱有小序畧依其才品名位髙下為次使各以類從而不盡以時代為斷于支派極為詳晰中如宋袁爕之絜齋集袁甫之䝉齋集亡佚已久今始得于永樂大典中裒集成編文學等固宜目所未睹至樓鑰攻媿全集尚有遺本流傳而僅據其選集鈔存亦為捜羅未至然其體例精審于部居州次之中寓論世知人之義徵文考獻條理秩然固非世之弔名悦俗瓦礫雜陳者所得而相比矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b7cbaef0bad368c207c258f494dfdebeca1db18e62fcda89840354b40bdbb5ac

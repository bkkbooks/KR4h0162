好事者候得每争取之稍傳布人間余家亦得四五紙先生自序言吾每草書成懸置壁間卧觀之真若神龍蜿蜒健鶻翥􅖬欲出斯實一竒也先生所居當四明徑口初嘉則游四明從大雷入先宿汪氏山房搜討故事先生與同行每至一竒處輒相酬唱有詩嘉則記其首合為四明遊籍一卷一時詞人競相傳寫屠長卿余君房諸先生俱為作序余謂自謝遺塵栖神此山髙風軼世然徒假皮陸口中遙相擬似未得其真宋以後詩人過相刻畫復失自然未有善寫雲窗大闡嵐瀑若兩先生文章之麗者也先生他著作甚多俱未行世自先生歿後數十年大雷山房亦燬遺文散失余僅從故選家覓得遺詩一卷四明游籍一卷因為論定以存百一每誦先子年先生入大雷山訪汪長文隠居二百言為愾慕久之讀史白日不恒處寒暑無停輪百年本斯須忽忽如流塵鬒髮異誰昔衰顔無再春咄嗟山木夀鞅掌麋鹿羣段干光魏國言笑偃荆榛原憲安繩樞歌聲聞四鄰萬鍾豈不貴守道固所珍神龍蔵深淵尺蠖有時信生平困荒蕪流藻垂千春荆卿挾匕首身死膏秦庭子房奮狙擊千載揚髙名功成績乃著身敗名俱傾伉俠豈殊調惜哉誰諒情易水風蕭蕭至今流不平詠懐昔余好冲舉長生懐逺遊逺遊與誰期羨門復浮丘揮手謝世人一舉凌九州驅馳未終晏白日忽西流孤雁雲中鳴萬里去悠悠不惜瑶華改但恐朱光秋獨往畢此志咄咄復何求婆娑宛丘下日夕懐佳人佳人𣺌難期路阻限河津明星夜煌煌夭桃日蓁蓁末路有傾仄繁詞誰見陳𤣥鶴東西飛寄言謝所親人情棄衰暮市道貴朝新奈何金石交一别如流塵雜詩西山何鬱鬱迢遞臨重冥髙松不知年下有千嵗苓瑶草正紛披華采如繁星就中白日秘安知寒暑更何者三老翁游戲來層城綽約皆異姿矯若烟鴻驚琳館撫方諸躡躡恣天行蒼龍翼蘭樞白鵠游珠庭青童啟雙扉􅈌􅈌飛電生中有龍嶠經芝簡秘丹楹長跪問要言含意了不經竦身向青霄一舉凌大清踴躍往從之雲霧忽杳冥寤來翳山茨庶幾通精靈静處以須之嘆息空屛營一朝復一暮𤣥冬復陽春殘魄不再滿陽鳥忽已盈悠悠天壤間誰為不死人盛年不須臾忽若風吹塵良時不為歡遲暮嘆何因徘徊故閭里念我平生隣斗酒相娛樂歡喜日以新華鐙永今夕上堂展殷勤何必傾庶羞雞黍為下陳永焉保霣暮持此俟來晨中林秋興秋華開滿國秋思日復劇生平睠秋人自呼芙蕖客松下涼風生竹外蕉烟白荷鉏斵朝菌鼓刀膾霜􅠧獨引籬下杯醉卧溪上石寧鴂聲何悲曜靈光已夕以兹千載情言追鹿門跡曲轅居為沈嘉則先生賦澤國何蒼蒼雲水共㕘錯縈迴綠雨澗掩映芙蓉薄蓬嶠故相聞滄洲宛栖泊彼美林中人依隠得所託開軒泝廣川考室遵平陸空庭列髙林閒窗羅逺壑無慙南郭隱庶展郊居樂緬彼風塵游憮然愧龍蠖奉送邑侯翁兆隆先生述職北上來日恨苦短去日恨苦長昔别燕市中今送西河梁俯仰未須臾超忽三秋霜世途日多岐謦欬安能常騈筵非宿昔正爵不盡觴落日江湛湛北風吹衣裳笳吹發清聲旌斾逺飛揚負弩誓先驅弱植非所將安得黄鶴羽天路同翺翔古楓行清溪路遶南山坳上有古楓千尺髙絶壁侵雲入杳冥盛夏六月長風䬞種之何年不知數鐵幹隂森老烟霧山翁梵客坐不歸碧蕊香脂滿山路憶昔山頭十萬松根株硉兀顔色同官家艨艟斬伐盡深山大澤千年空即今樸簌雜茅葦疁火爇之衰草風嗚呼眼前世事日堪惜重思老榦髙冥濛采藥行贈族子銘孺朝出劚苓暮採薇白日忽落蒼烟飛荷鍤歸來倚深竹落花清露香人衣我家阿咸頗解事提籠逺自江城至肘後三千禁架方囊中數卷軒轅記眼前孺子總紛紛少年提領争如君何當共爾尋仙去采藥天台卧白雲獨酌歌雖有西山樂不能還少年雖有平原飲不如獨酌便東臯多收十斛秫西谷麤營一畝廛牀頭壓酒聲涓涓一酌一歌私自憐清風白雲長作客南山北山華滿筵無須絲與竹陶寫自泠然獨立漸少區中累蹉跎嵗暮天烟霞常引疾犬馬欲忘年山課松楸稅園收芋栗錢寥寥一生事獨立意翛然東城逺眺髙城臨巨浸東望一登樓埜樹俱秋色江雲似水流三山無日到五嶽幾時遊便欲揚帆去空波命小舟園中雜詩峽隠風驚急山髙屋更重奔雲逐去鳥飛電落長松響裂溪東壁人傳海上龍向來聲稍定一笑倚髙舂松下宿昔探幽事夷猶過草塘薜衣秋去紉華佩雨來香石菌從兒供溪蓴問客將閒雲與沙鳥一酌忘斜陽齋夜南山有敝廬蔓壑俯階除落葉喧筠徑明燈散竹書野狐寒拜月溪獺夜陳魚閴寂荒村事幽竒念索居偶作嘿嘿竟何意栖栖常避人乾坤存一壑風雨過三春錦帶慙居士青山作外臣衡門有尊酒長日傍松筠夏日茅山晩眺東山數茅屋一半是斜陽門掩垣衣老溪流石髮香歸雲隂磴濕𤣥鳥暮天長莫怪忘三伏千峰夕氣涼歸望山茨有作秋隂自寥廓況復逺林歸一水孤舟入髙天亂葉飛江雲晴稍薄山日晚猶暉何事東溪上行吟老竹扉秋日曉坐書懐洞壑曉空濛清溪一望中桃源行處逺桂樹幾家同酒熟三秋露粳香五里風吾衰任潦倒倚杖憶年豐蓬門蓬門臨積水小竹趂長堤經月無人事將書聽鳥啼空林荒野北殘雪亂峯西向晚華原路寒烟古术齊寄聞隠鱗嵒壑年華早田家嵗事成風前紫燕去露下綠葵生種漆因樊仲為園本邵平翻思婚嫁畢五嶽幾時行風蘤亭薄暮山園流水故泠泠盡日無人到野亭醉看滄浪蘋葉紫舊題風雨竹花青攜來北海仙人杖老去東方處士星三徑蘭臯堪卒嵗喜㸔松月夜㝠㝠送吳用卿歸新安葵葉榴花滿座看芳尊綠蟻任交歡莫言歸興依蘭槳且引薫風醉籜冠城外青山疑故國江南秋水憶新安那堪惜别金臺下愁聴離鴻不忍彈參差亭水竹小華源逍游白雲府不聞人語聲飛籜如寒雨又已失東山雲獨有東山月涼風何處來吹作千峯雪寄懐朝雲不散暮雲流溪上茆堂水竹幽忽見斜陽滿髙樹亂蟬風葉似深秋東塘芙蓉開徧野塘殷掩映孤亭亂竹間獨往獨來還自笑不知何意老空山過板障嶺以下四明游籍詩余本山中人與世亦殊調跡希河上隠事仿任公釣每託雲水歡頗愜賞心要開春氣已和杖䇿凌危嶠威夷一谿駛崩奔兩崖陗竹栢媚幽户春泉灑丹竈畟畟曉風起寂寂千花照山驚翠濤湧雲殘海波躍攀蘿嵌絶壁據石發孤歗髙天若可捫洞壑杳難眺躭游爽經竒搴裳竟烟奥從此駕輕鴻永謝世人誚度錯愕嶺萬峯青青春縹緲危巒騰鶱兩崖老石上人凌樹杪霞六丁蹴死烟飛草大谷沉沉入南極蛛絲鳥路風吹直杜鵑花老不歸春鬼母號天魍魎泣怪蛟窺人作人立逬水泠泠洗雙屐隂風剪雨雲片磔峽天漏日氷花白巨石開闗起仙宅欲傾不傾走魂魄征西將軍眼花碧蠶藂魚鳬空跼蹐大闌山眺望懐劉伯常劉名綱晉上虞令于此脩真后仙去冥鴻有竒羽清廟無遺音事往跡易閟感來念已深伊人秉髙尚脱屣謝朝簪巖扉入幽亢丹壑窮􅏟嶔霧斂溟海白嵐蔵山澗隂徘徊一溪阻莽互千里岑白日任推薄嵗事空蕭森古木嘯猿猱野火生秋燐四顧獨寥廓不辨陌與畛延賞興已極凄其難處心顧已慙獨往悵矣千載人從苦竹嶺山行絶頂望四明山四首紫翠莽縱横行人不記名天遙平見日雪盡乍聞鶯絶壁憑雲度長風吹雨晴千秋嵐氣白直擬海波生天迥路孱顔危巒絶可攀隂風迴大壑紫氣滿千山月彩標孤白春聲起暮闗幽竒探不盡烟樹水潺湲明山髙鬱律一上一崔嵬雲捲千峯雪風傳萬壑雷扶桑天外見初日夜中迴目斷塵凡路飄飄鸞鶴來石棧渺烟霞春臨萬谷花人將身倒影山亦漢通槎翠濕驚嵐落風深畏日斜扶揺今始信莽莽竟天涯入仗錫寺古寺髙懸碧嶂餘清溪直走梵王居鐘聲曉落千林月石色寒窺萬古書小閣峯隂晴雪擁亂山天外白雲疎人傳飛錫何年事風送空花㸃客裾游三峽三峽名何勝人疑到蜀中千峯懸鳥道萬谷走松風響濺青天雨寒飛紫澗虹都忘歸路晩霽色滿遙空坐潺湲洞霏烟織翠沙雨風珠璣逬作千年虹鳥聲不到春山空儵忽七日開洪濛蒼水使者乗龍死玉簡金繩秘不啟為㸔今日逍遙事水蕭蕭兮石齒齒登石窗逺眺探石訪仙都凌旦趨石壁崩崖互重阻髙標起靈宅藹藹雲霧扃奕奕瓊瑶坼乗山罕禹功逸駟無滿蹠寶笈秘神工蒼茫落南極邈矣帶地川髙哉負天石月竟三島寛日晃五湖偪酣霞帶澗紅出雲繞空白依依寡人徒恍恍慄心魄栖巖企昔賢入谷想今客異物狀珍怪靈蹤隠仙籍問道無貞心百年鮮良覿何當解世羈躡屩從所適徐鳬巖觀瀑布泉傾崖東峽雷霆鬭懸水魚龍起清晝驚風乍捲飛雨來青山石上無停埃窈窕靈源深不測一望明河萬山白輕如飛絲散如霧寒沫濛濛濕江樹人烟住比武陵溪片水桃花自來去發四明山中經雪竇寺登妙髙臺觀瀑布杖䇿下溪口買舟順流朗誦盧柟賦抵櫟社宿句章先生明月榭旦發還南雷作蒼山何崔嵬天籟風㕘差扶揺八千丈莽莽瓊瑶披下窺滄海小逺鏡天台卑仙人依龍虎翩翩逺追隨送我遲日曉下趨剡溪道迴合西南山春深尚衰草百里閴無人髙步尋仙真空谷不見鳥獨有烟霞親迢迢窮日昃路轉開石壁寺古落松筠僧來訪形跡醉披水田衣笑著登山屐亂谷浴秋聲落英封斷石水薄衣欲流山空月初白獨鳥歸林烟藂桃眩行客客行莫早迴青春時易頽且浮琥珀盌載上中天臺目迥萬里盡意豁千峯開足底溪聲激泠泠清吹哀石轉驚飛流槎來銀漢秋又疑廣陵雪噴薄錢塘丘風中等列禦濠上誇䝉周俯仰意已適興劇歸心逸數里走石闗十步想兠率逶迤盡坡陁目勢含滄波浦近漁唱起樹宻村烟和似聞戴顆隠彷彿子猷過髙踪邈千載勝事苦蹉跎夙昔永懐情春風吹女蘿女蘿風乍起行舟信流水空翠撲人肌芙容開萬蕊矗矗波底寒水曲山萬盤路轉幾迴覆出谷復入谷石淺只容舠儵忽及江皋天欹曉鏡落野濶孤村髙為把珊瑚枝欲釣任公鼇兀立四明山倒影隨秋濤一誦盧君詩興逐流雲翺片語驚世人咄嗟揚馬曹論文夜分坐寂莫丘園情摧頹一尊酒笑落千秋名興極一登臺風浄髙天碧疎星向客流霽月水中夕經竒絶可憐地逺心悠然家徒四壁立何異揚雄𤣥余也老侯巴生事南山田山花遲行客五栁春風顛手持綠玉杖歸弄潺湲泉一當南雷君謂我何方旋探取虎盤囊投贈逍遙篇異時畢婚嫁五岳終流年江上讀盧次楩賦嘆其因才賈禍垂死無妄懐璧狂夫罪含沙楚客傷猶傳賦白日只合死瀟湘星劍從誰覓春江為爾長乾坤虚莽蕩無計返山陽死去不堪呼乾坤失爾徒秦城元自隕梁獄竟誰辜才少三千世文無十五都適來餘落魄顦顇酒家胡一些豈招魂無章痛木門流離遼海恨蕭瑟夜郎寃絶代空名起千秋副本存悲風吹落日無地薦芳蓀清涼寺鳥道盤千折松門到一區曇雲幾朝夕豐碣竟模糊殘燒依霜葉空厨失午餔天寒僧臘淺深殿試蒼鼯同田叔子行過摩訶菴寶刹依林浄慈雲覆路遙客吟隨馬去僧榻許人邀鳥下翻堦葉龍回動海潮不須持半偈塵慮已全消甬上耆舊詩卷二十一

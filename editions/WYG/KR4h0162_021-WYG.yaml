川也即今論才莫可同居然屈宋鞭箠下鯫生得士竊自奇不敢私之老鄉社大國觀風季也聰東海泱泱推大雅不能清廟薦圭璋獨獻飛黄向司馬醉卧偶作鼓刀屠狗起豐沛相將王侯多此輩販繒吹簫不解卑射獵種􅆶忘却貴丈夫提劍出國門兩眼已自空乾坤乘時遇主取大物山河入手茅土尊風雲變化如反掌昨日賤貧安足論嗟嗟古人乃如此刺刺秋風吹兩耳即今四海正清平縱有經綸向誰使不如醉卧青山中玉棺下來便堪死孫禹鍚溪上雙藤歌溪上古藤如許大不但一株且兩箇蒼皮萬尺病蛟纒白骨千尋老龍蛻正值新春未作花斜盤亂結蔓如􅆶牽黄裊緑蚓不解走隙穿虛蛇入窠圏環紐玦無不有徽索纒綿分左右低從九地飲黄泉髙入五雲吸天酒根强五石甕盤泥枝連千手佛攀梯霧蓊碧油幢蓋宻風開翠幌洞門低仙人宛矣乗風御公子遥張青錦駐花繁葉簇鱗鬛獰風雨初來欲飛去奇柯忽引上青天綵繩牢綰堪秋千夕陽静照百戱舞紫絲步障流春烟丹霜夜染楓林下赤虬巧向秋空挂我欲據此彈箜篌人不敢窺山鬼怕最愛水邊連理樹夜深曾有仙姬遇桃花不見武陵津昔日相逢竟何處上灘行新安新定江水連三百六十灘在天新都縹緲髙若縣上灘三老分青錢僱值百丈牽紫烟狼牙虎鋸刀劍全鉅者利齒小亦拳雪浪濺人雷迸船篙師著篙篙欲千一尺一步寸莫前白日欲黒眼欲穿啼猿㫁壁聞哀絃誰家獨住青嶂邊十月花開紅可憐一聲雞叫層雲顚雁門太守宅行雁門太守食雁美第宅峥嶸甲閭里罘罳春罥遊絲長簾幙晝影秋波香堂下笙歌堂上舞客起持翿主擊鼓銀河沒盡明月無已見城頭三足烏主人沉飲呼不醒轆轤閒挂梧桐井十年之後客重來但見井枯池涸生莓苔大屋沉沉如夢裏姓名已易他人主銀河明月依舊臨空聞鳥雀黄昏深眼底滄桑如反掌石田茅屋兒孫長大樹邨劉氏少婦打虎行潤州城南山簇簇四月麥黄桑柘緑大樹邨頭劉氏居短墻幽院差參屋曉炊未罷日始髙卒地猛虎來咆哮老小出門盡驚走犬亦吠虎聲嗥嗥虎聞犬聲急轉步一口斃之如搏兎欲從虎口奪狗還老嫗抱孫逢虎怒劉家少婦奪老姑氣猛視虎如匹雛手提鋼义刺虎目虎血濺靣紅模糊昨從大樹邨前走少婦滌場猶髽首弱體孱然花不如徐家女子劉松婦沽酒行江上放船如放馬波聲不歇㠶不下才發金陵又晉陵勢傾千里龍驤者世間快事能幾何對君沽酒君唱歌君不見昨日行人說往事惡風三月坐黄河再題子昻畫馬歌君不見趙王孫畫人畫馬骨力存毫端微茫不可測神鬼歘吸愁相吞矯矯疑龍踏天截轉首忽撥春雲屯躊躇似欲射飛鳥弦不及控非空捫想當一隼落西北又忽一鶻東南奔青天濶逺風勢𦂳萬里只作秋毫論泊下雉瀆分烏字野泊當婁水蒼茫接太湖呉王曾射雉越客但聞烏此夜惟明月千年空霸圖誰將一巵酒相與酹江蕪望亭聼雪薄暮孤㠶住春波㸃雪輕深溪風有竹寒月夜無更枕畔依秋葉燈前隔水聲細聼唯冥坐愁㫁逺鐘鳴夜歸故園風物好似待野人歸白屋聞鄉語青山識敝衣水深星影大野曠月㾗微昨日憐羣雁江天與共飛送張丞纁赴睦下邑君向嚴陵去雲移畫舫低驛程踈雨外山縣大江西訟簡知花落官閒聽鳥蹄却忘身是吏隨意坐清溪何處何處放船好水深雲欲低流澌莎草上落日布㠶西雨脚只在樹鷗飛不過溪買魚炊白飯醉聽嶺猿啼山行九月猶殘暑山行怯路長日斜微送雨雲濕不生涼烟際林深黒虹邊天半黄客衣沾白苧暮色豈髙唐除夕旅懐人生幾除夜常作異鄉人世事復明日流年空舊春妻孥燈下影風雪海邊身嵗嵗皋魚涙今宵獨滿巾寄方三十國華栖栖布衣者誰拂帝京塵獻賦干明主微言諷大臣雖云不得意已作有名人何不攜妻子歸耕海上春渡峽江雨後趨官渡春隂野望迷江渾諸水聚雲雜亂山低樹濕鶯猶困風酸馬自嘶王孫行處草無奈故萋萋偶晴半月不出戸青苔沒齒㾗乍暄蟲出樹斜照馬嘶村刈穫空寒水樵蘇帶夕垣故鄉知此候山色滿江門刈稻爲農嵗已晚却喜遂初衣刈稻霜天下飯魚秋水扉江明紅葉浄潮退白鷗稀不負公私願行歌樵徑歸夜熱入夜猶煩暑中宵想玉潭稍辭花以北深就竹之南星聚天殊窄江蒸水欲酣憑誰問河朔翻以醉爲堪荒邨送客出荒邨蕭條不可論水㾗殘半壁秋色閉雙門樹死藤猶挂橋危石僅存蠲租雖屢詔白屋幾家恩過雲下五詩俱題四明山作縹緲路常封時時春氣濃㸔衣疑帶雨到寺只聞鐘不見髙秋月難捫白日峯探虛吾欲老來往藉孤笻雲南山陽邨戸好家枕萬峯雲共飲梅花水耦耕麋鹿羣土風周處記日月帝堯君世路紛豺虎區中那得聞雲北只在白雲北重山别有家人烟散流水墟井帀桃花賣藥通秦市分蜂識漢衙自矜吾道拙不敢獨餐霞樊榭夫人仙去逺樊榭尚知名月落迷妝鏡花深㫁寳纓山川今喜託天地故難憑倘是吹簫處應聞有鳯鳴潺湲洞潺湲吹古雪倒捲入銀河月色兼秋動山聲入夜多雲來濕不去雷疾響難過枕石驚還起天風摧大波行藥行藥湖南樹清隂爲颯然微風荷葉上乳燕杖藜前草合幽人路花深病客天所知良可待獨往信孤烟送吳章叔逰吳以我常遊地送君今復行晚山湖上好春水樹中生故舊幾人在江流七郡平殷勤謝楊栁秋滿闔閭城七月晦夕集范司馬十洲閣分吾字盡日坐氷壺風流宛自都主尊開鑿落客劍佩昆吾秋樹侵孤驛斜陽截半湖憑髙雙醉眼一鳥去來無尋僧乆卧交知絶尋僧出野行岸花紛委露溪竹半侵萍力倦逢人歇林昏到寺明小橋斜處立波與夕陽平雲間雨泊谷口此何年孤篷聽雨眠岸風驚死燭黒月唶無天老尚甘行旅貧猶哂執鞭稍寛身健在湖海正茫然别母老母三年病兒仍千里行秋風吹地冷山月照霜明未别先下涙問歸難應聲厨頭有新
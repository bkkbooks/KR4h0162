body:
  text: 甬上耆舊詩巻二十一監察御史胡文學編沈嘉則先生明臣先生起田間少負異才喜讀書尚廓落大節慕謝太傳王猛之爲人雲間沈公愷來爲郡守先生始束髪上書萬言沈公詫爲竒士已補諸生數試於鄉不利專以詩自豪文章疎宕可喜會東方用兵少保胡公宗憲開督府聞浙東有名士二人辟致幕下其一先生一山隂徐渭也少保豁達好士微有酒失善嫚罵先生嶽嶽不少阿唯少保亦雅憚先生遥望見爲離席少保行部七閩燕將士爛柯山上酒酣樂作請先生作鐃歌十章坐上詩立成釃酒髙唱至狹巷短兵相接處殺人如草不聞聲少保起捋其須曰何物沈郎雄快乃爾即命刻石山上嘗從少保登大王峰置酒上客四座有云某所歌姬絶麗者少保已被酒趨命健兒爲取來須㬰報姬至先生即起曰吾輩興闌明公可以行矣少保爲强登車去其持正率如此及少保死請室中先生走哭墓下持所爲誄徧告士大夫頌其寃狀由是淪落湖海間益跌宕自放過太倉一通謁弇州髙坐論詩直氣凌其上弇州雖陽許爲布衣之傑然實心憚之先生性喜衣緋常客呉中緋衣行道上傾呉市人聚觀余太常謂先生戴罽冠被朱衣㳺行呉閶嘯呼若狂當是之時實驚呉兒亦善言先生豪矣既乆倦遊歸里門時張大司馬方主文盟最推重先生歲時伏臘非先生至不懽而先生家諸從子姪一相國二方伯俱從先生受詩初起有盛名及司馬既歿先生更爲耆夙每持刺報客自稱老友一時山林失職之士單門髙才俱輻輳其門遂盡傾司馬客先生初岀其詩七千有奇使從子九疇刪定録四千餘首行世晚年詩益多每杖策歴佳山水過先輩隠居宿精舍小飲草市酒家輙索素紙題詩老言愈髙妙率棄去不復具草人多匿爲已有者遺文四百餘篇藏于家先生既垂老尚思出門諸公共相慰留先生曰使吾有薄田百畆足自老奚好㳺耶諸公俱曰諾請爲先生圖之因共出錢爲置善田百畆給朝夕先生遂得髙卧豐對樓不出年近八十卒于家先生家在南邨櫟社人稱爲櫟社長諸從尊爲句章公學者稱嘉則先生先生以文行髙東海裒然居首龔芝麓謂萬厯中布衣以詩豪者天下有三人其一爲先生也曺能始石倉詩選録豐對樓集最多爲詞苑第一先生詩已見于世矣然余間讀先生所為序傳記數篇其文原本班馬敘事有法不作同時詰曲語可謂卓然大家屠長卿亦曰先生文益踈宕有竒氣生平魁瑋大節不媿其爲文世人徒知先生以其詩且不盡也又曰近世作者或乏長材乃詭而跳諸偏枯以爲險絶而務掩其短每撰一篇杜門首䝉被搆思累月頴爲秃而出號于人曰吾能鈎𤣥尚竒然按覆其㫖猶夫人爾則胡不遵大路趨而﨑嶇走間道爲必若先生斯所謂遵大路而趨者也長卿言專抑里中一古文家而獨推先生其言最有功學者即先生之文可知矣余嘗數求豐對樓遺文四百篇在其族人某家余友曾盡見之即往從借鈔而某已持此本獻一當事竟失于兵火中惜哉惜哉先生在當時喜以文寵同輩及所傳叙先賢行事最詳今隆萬之際闕焉無徴俱先生遺文散佚所致也至先生歿後百年中名賢髙逸僅能購其詩存其名氏而其生平大節絶無可攷徧詢諸故老所聞畧記一二蓋斯文之事壇墠乆虛遂使世逾近而文獻逾失徴殊足嘆也梨洲黄先生謂余曰及今不爲采録則後此益不可問矣是皆吾輩之罪也黄先生遂歸選姚江逸詩余亦有甬上耆舊詩之選故特于豐對樓遺文有三嘆息焉君馬黄君馬黄臣馬白君馬肥臣馬瘠君馬如龍臣馬躃敢忘天王賜顔色一解君馬黄臣馬赤君馬良臣馬劣君馬飛騰臣馬蹶敢望天閑一時逸二解君馬黄臣馬黑君馬徳臣馬力君馬天行臣馬䇿敢避馳驅死疆埸三解采蓮曲妾采蓮蓮謌聲楚楚衆愛蓮花嬌誰解蓮心苦應有苦心人憐根直到土豔曲鄂君貴弟浮青雀翠被擕来覆榜人墻外木蘭宮裏樹一枝花發兩邊春讀曲謌路傍栁長絲不綰心短絲不及肘思君池上荷花落結蓮子藕深蟠在泥爛斷千絲抱香死軍門怨一身漂泊如楊花年年作客天之涯將軍無功寳刀賣自將漢語翻胡笳夜光照甲月墮地萬里黄沙磧邊戍里門不出誰家郎未寒先著狐裘長歸夢還家語妻子莫作將軍門下士空幕燕翟公好客客不至門外雀羅亦何事春風吹花花不香蜂蝶紛紛飛過墻東隣明朝花亦落燕子銜泥向空幕畫堂寂寞無客來玉階朱戸閒蒼苔世間那得人如燕只識主人無貴賤勸君杯玳瑁釵頭金鳯低淺黄衫子剪銀泥麗玉寒香方二八倚市招郎兩相匽逢花采之須及新莫待花殘空怨春人生有酒不肯醉醒者何曾獨千嵗勸君堂上且銜杯春去一年才得囘黄犢行蹙金飛鳯西川來五色織成羅背子君王新賜美人衣滿眼春風雲氣紫流蘓寳幄七香車黄犢逍遥過都市不因衛霍漢家親車下行人似流水少年行寳馬驕嘶引少年青絲窣地鐵連錢錦街十二春風起吹得楊花滿繡韉凱歌銜枚夜度五千兵宻領軍符號令明狹巷短兵相接處殺人如草不聞聲蘓州歌闔廬城外木蘭舟朝泛天池暮虎丘三萬六千容易過人生只合住蘓州禽言七首布穀布穀飽牛飯犢芒種及時秧青麥熟髙田罷亞低田穜稑官府不饒催租責禄汝農汝田布穀布穀姑惡姑惡姑終不惡姑惡失慈婦言則錯婦能百事向前作堂上看姑惡不惡泥滑滑山深路險脚力乏急風迅雨打頭來鳥道如天欲愁殺千里萬里行半途耳豈不聞泥滑滑行不得也哥哥只得行也哥哥可行不行那哥哥不可行不行那哥哥可行行那哥哥不可行行那哥哥脫布褲無褲得脫向誰告訴舊年種桑蠶未熟還糧先借東隣布今年有布還東隣無還請開富人庫有布不做褲做褲那得布無布褲得脫空教脱布褲提胡蘆提胡蘆無錢無得賒有錢有得沽沽了㡬壺賒了幾壺花前幾壺月下幾壺壺虗月落壺滿花無無時不得賒有時不肯沽試問提胡蘆提還賒與沽婆餅焦婆着惱婆餅不焦婆得飽婆得飽新婦好燒火及時婆餅不焦㸑下薪乾鍋上油膏婆餅不焦新婦好新婦不好婆餅焦蕭皋别業竹枝詞十首越江春水緑如羅雙女祠前發棹歌大宅北郊横鮑守野橋南渡接陳婆青黄梅氣㬉凉天紅白花開正種田燕子巢邊泥帶水鵓鳩聲裡雨如烟田小三郎唱得工七姊妹花開欲紅林静三更鷓鴣月溪腥一陣鸕鷀風門前竹大笋成笆江上潮來草沒沙村童探鷇緑楊樹野艇撈魚紫楝花東村西村姑惡啼家家麥熟黄雲齊春蠶作繭桑園緑睡起日斜聞竹雞雨過髙田水落溝瓦橋魚上栁稍頭梅子青酸鹽似雪櫻桃紅熟酒如油呼雛逐婦總堪憐時雨時晴各一天厨割小鮮來海市菜添新饌出江田烏桕紅紅生稺葉紫蘭茁茁吐新苖龍須緑折風前笋鳯尾青添雨後蕉園中髙樹鳥分窠門外小池錢貼荷曉散烏鴉千㸃細晚歸白鷺一行多麥葉蟶肥客可餐楝花鱭熟子盈盤家家銀磨聲初發四月江邨有薄寒報恩人二首泥書纔報白頭新又向黄沙作逐臣身未拜官先上疏如君真是報恩人臨風一讀涙千行底事封書大慨慷海草茫茫邊月白不知何地賜投荒宫怨緑滿南園桑葉肥風光欲盡栁花飛妾生不及呉蠶死留得春絲上衮衣問金雀釵詞有序故人有妾某色甚都善歌舞寡居獨守有盼盼之誼錦帶居士聞而異焉作問金雀釵詞以美之小樓日日燕飛來問妾當年金雀釵一自舞衣零落後緑綈那敢又重開緑綈箱也出漢書賦得白日照呉戈白日照呉戈青天濺丹血寃語不可聞寃魂向誰雪入地成野燐千年永難滅趙坑平地起秦屠當時發不知皇天意何用此酷烈肇亂者爲何司命罔昭詧牧者饑牛羊牛羊觸而咥御人箠騏驥騏驥亦踶􅐅江湖雖浩蕩無風豈掀揭巖巒固傾敧雷震乃崩壓吾欲叩帝閽狰獰守雙闕吾欲訴蒼昊何由上虹霓兀坐淚淫淫搦管氣塡咽南越行行南越中好景玩不足原野頗夷曠山川復繆縟波澄天鏡平柔風蕩醽醁雲日逓晴隂山光互青緑谿腥過鸕鷀天浄飛屬玉㠶底坐題詩髙吟應空谷發巖鎮蔣生客次赴黄山三首侵晨理行箧褰裳事籃輿行行歴墟井寒翠生衣裾髙舂過潛口邨巷多踟蹰西北指前路一徑當山隅峭壁攢紫霧蒼莽浮雲舒淙淙深澗水逺近聲與俱十月霜未降林葉青黄踈午作酒家餉炊烟薄茅居盤桓青溪曲鑒影驚逰魚飯罷復去去漸上青雲梯修嶺頗登頓層岡轉﨑嶇千盤入無路倐忽逢坦途人烟小成市樵牧皆自如投暝山市烟託宿㝷蔣詡弄影向前溪霜清月如水命駕入黄山旦日須早起爲余製短策童冠皆儔侣出門即重岡遥岑眼前哆迴溪紫雲端陡嶺青霞崥掲厲屢停輿攀躋每勞揮紫翠復遐征目力窮峛崺日夕向孤村主人肅賔禮醉眠山館中湍聲枕前止明晨入西岡山勢反舒緩顧見黄山塞蕭條立荒阪野廟祀浮丘空壇草花滿列壁怒㟏岈羣峰挿天㫁迤􅆔湯泉口天都緬相眄鐵光射寒暾五色頗流眩齗齶破混茫􅋂巇蝕苔蘚崩崖續㫁岡迴巒綰重巘髙下互糾纒峯紋細難辨攢攢紫翠叢紛紛蒼壁剪仰睇窮九霄登陟盤百轉俯首歴磴滑躡雲躬自躽言念容成子胎息煉𤣥纂致勤萬乗尊一旦捐玉饌吾生亦何爲跼蹐徒中喘濯腸沙水溫豁目丹峯瑑奈何隔塵凢永謝軒轅輦怪松篇與伯玉同詠怪松矯飛騰詭異獻百伎遺落此空山閱世㡬興替下有陳人墳嵗月不可記髙標拉蒼旻卑枝挿黄地横梁駕春霓或洞豁雙柱宛闢仙人扉摶鬬潛虬戲龍骨蛻岈霜剥蛇鱗碎盤拏攫風雲屈曲孰陶鑄朗月墮天風明珠頷中據緬懐古昔人樹此歴千禩既捐孤生悲永謝秦封事淵藏琥珀深隂連女蘿翳顧余丘壑姿偃蹇慙肖似願言結綢繆重申後彫志張大司馬茂嶼莊襍詠撰轡頓谷口爲園控湖滣空亭宅夷曠諸山四週陳紛紜各有獻迴合成比隣瑶華布芳席青雲錯重茵岡隴㫁以續巖岫披若紛日嶠炳明晰風林蕩氛昏天地往已古日月來則新品隲有餘論疇能拾遺珍謝傅從泛海拾遺空賦秦何如宗生曠卧遊任其真武陵莊雜咏華館敝緑野修篁壓崇垣翳然蒙水木青雲永爲樊感時願偃息古道終龍蟠調膳餌玉屑酌醴㪺乳源被服豈不佳結束唯蘅荃冲襟遡往古黙黙誰爲宣通川繞清渠淺流激幽石乳麋漸生茸豢鶴已成翮新術無垢氛故宇忻掃滌永懐丘壑心躬將課農織晨策凌丹丘夕歸厭紫陌忽枉巖中篇貞心唯黍稷望南雷懐謝居士遺塵遺塵唐人隠于南雷皮日休陸龜蒙俱有四明山詩九首居士青雲人𤣥風邈難嗣白日空山髙令人起遐思春花吹野桃開落知何自流泉日夜流石壁挂不住深樾有啼猿斯人邈何處髙吟皮陸詩風吹響天際遥望樊榭樊夫人名雲翹劉綱妻也同夫仙去故有樊榭雲翹有遺榭言寄五霞中五霞絢天地照燿金銀宫日月飄珮纕步揺鳴天風虹蜺作髙梁白榆樹前墉粲粲啟玉齒言笑陪仙翁豈邀蕚緑華相往遨空峒或引董雙成騎鳯凌八鴻願言蛻凢骨下汝以相從颯然囘風至眄睞空鴻濛度錯愕嶺錯愕復錯愕度之若升天居然蜀道險落在吾眼前三上五迴顧十行九步顚捫雲手不定躋險脚在肩峯欲壓靣墮石疑撑背穿景奇心頗快路廹愁仍煎前得平者笑後遭危者憐汗落不可掬息隂坐茫然觀徐鳬巖瀑布清晨理遥策白晝臨穹崖嶔巖怖鬼膽鬰律相喧豗無風急飄雨潛壑犇晴雷詫目銀漢瀉心驚摧素麾凉雪朱明濺截氷墮寒威忘疲强臨瞰劇恐神理違戰欽慄股墜臨深誡堂垂幽貞神明持庶與同心偕登妙髙臺逺矚西陟何崔嵬崇基夙曽構白雲蕩空階紅壁射髙溜萬嶺盤鬬蛟中區顯孤秀五色紛以披春陽逗雲岫隂霾開昨寒逈澗迴今晝田霞耕阪疊溪霜響林潄西教肅瞿曇獰猛馴山獸藤結秋幹龕鍚鳴秋氷甃乃兹荒穢場蒼莽穴鼯鼬坐以息紛拏内
題李賔父蕭皋别業林皋自有徴君業古碶何年别姓蕭路入青溪雙女廟天低緑樹鮑郎橋三家隣舍能供酒十里江田不用潮時世清平吾與汝不妨長此作漁樵逰横山同𤣥白西指横山路不遥澄波十里泛蘭橈浮雲漏日隂移樹逺水穿林緑過橋石壁垂蓮青靄㫁野田分局紫烟銷不知顧况臺何處遥想書聲度碧霄過夏蓋湖一日孤㠶風正長萬山晴色滿湖蒼天青鷗鷺都如雪秋盡蒹葭未及霜漁戸半依船作舍人家多借水爲鄉故園物候應相似蠏稻田田橘柚黄雙塔泊長年門口移日不因沽酒繫柴門知汝飄零戀故園水闊天髙三泖路青林白屋五家邨啼鶯出樹偏求友老竹穿籬故引孫翹首鄉山歸未得黯然唯有一銷魂瑶臺萬里瑶臺接絳河九霄明月傍人多借吹天上蒼龍管願著江東白鷺簔羅袖薄沾花氣濕玉釵輕度水風和莫言今夕此何夕自有相思托女蘿浮州寺作浮州小寺水之涯橋㫁隄傾路復斜積瓦霜封殘栁葉壊墻寒覆古藤花青林送客分三島白鳥窺僧住一沙萬室湖南烟水暮不知誰是叔倫家江上遇友人過蘭溪因託附書抵方翁怙桃花春過熟鰣魚買酒因君一寄書江漸依山分濲水潮將帶雨上桐廬人須野鶴雞羣問家在寒溪埠口居舊說方干無别島白雲隨地可躊躇大涵山悠然大涵山山下雲如海不因濯足來尋得漁磯在梁王臺日落梁王臺臺空映江水江水流不流只在鐘聲裏潛陵潛陵蔓草中知是誰家墓白日無迴光青山有行路鳬池蒲稗雨前死芙容霜後活青天卧鳬鷖秋來水空闊送人之南都金陵曾向酒家眠十五當壚不數錢紅版橋頭明月色娟娟猶在玉釵前海棠一曲春風醉後歌白頭其奈海棠何半生自數㸔花伴唯有秦淮市上多燕子磯燕子江邊客又來東風空憶鳳凰臺十年舊事三春夢一日寒潮兩度迴包十少府製苧袍贈余遊武夷君裁白苧作山衣送我新穿入翠微坐倚青天吹鐵笛紫雲黄鶴近人飛青溪窈窕清溪盡日尋雨收風歇翠沉沉一雙燕子翻花出始覺人家住隔林過文長故業作水連巷口夕陽斜細雨東風濕杏花酬字堂前雙燕子不知今日屬誰家廢宅桃花昔年池館似髙唐猶有桃花滿壊牆夢裏春風渾不覺一枝無語弔殘陽武陵庄青精作飯紫蓴羮飽後微吟水上行不道空山曽有寺隔溪風送午鐘聲葉鄭朗先生太叔先生字鄭朗者蓋嘉則先生字之其後更名亭立字介子先生生而白晳身長六尺餘眉目如畫少即靈悟在塾中對語驚人甫十六七輒能詩詩出閭巷宿儒縮舌而誦之年二十詩已成人或以示嘉則先生嘉則大竒之謂諸生中何得有此人即延先生至與定交執手甚懽且曰葉生今日李王孫也吾幸從年少中得一伯翼復得一葉生吾足老矣時張大司馬里居方主文柄嘉則因自為長歌以先生行卷呈諸司馬司馬亦大驚先生遂一日名起然先生性廉潔自持下筆為古文意岸卓犖眎一時詞家不肯􅐅􅐅從其後故在諸生間亦不為有司甄異嘗自咏曰道以閒能長名因傲不傳蓋實錄也先生不能飲然謂人生豈可一日無酒意每晨起童子為置觴坐上不注酒先生欣然舉觴若引滿者三始飯有故人為吳中某縣令先生訪之適縣中修誌先生愛其山川人物因與輯論書成自署卷首曰四明葉太叔著令為先生置酒以百金夀從容曰某忝令此縣修誌事應在令雖重煩先生手筆乞得假名氏先生拂然曰著書千載事豈容買賣即束其藁別去初與屠長卿先生同學每篝燈夜讀首相觸長卿心服先生嘆為異才及長卿既貴名重衣冠輻輳先生謂其門有雜賓遂絶不與通若未嘗識面者至長卿殁後先生乃為詩哭其墓追述舊言其介性率如此先生年三十餘自言居常十四善病十三事事十二治經生業得抽其賸力于詩纔十一耳然已積逾千首會意有所傷悉取其文草火之至盡嘉則聞之為驚惋不已惜不見其焚時光燄作何狀已而先生頗意悔更追錄其所記十之一行于世嘉則為作序即所傳思烟集者也先生初見嘉則執禮北面然嘉則絶重先生呼為小友使其子娶先生女其交懽若陶公之于張萊民也先生晚年有蔵山稿二卷詩筆益老成俱在思烟集後者嘉則先生論先生詩曰鄭朗詩初成是時尚竒詭獵異逞才心所嗜好不得若長吉語不出已而于五言古及近體稍更之一主以雄渾深湛其格力氣骨色味神采醖釀初盛唐諸家而歸宿杜陵至樂府七言古則夏商彛鼎不足古玉觥金盌不足貴未央銅雀瓦不足異神劍霹靂斧不足詭龍甲鳳毛麟角不足竒而理不必其果有事不必其盡無語不必其可解物不必其不生所謂劌心盋肝揉骨滌髓者彌聴滿視嘉則所推重先生至矣余近徧詢先生晚年詩老友周自一先生為從沈氏櫟社居得其遺詩二卷惟五律甚多氣格髙澹轉造自然遂得五言神境當置諸右丞工部伯仲之間非復若年少李王孫也先生初藉嘉則名起復因其後人得見晩年手筆先生可謂得沈氏力矣先生嘗論詩曰今日稱詩者髙自隠逸貴自君公陋自稗販賤自駔儈嗚乎稱詩而逮于駔儈是為厄詩之際吾哀鵂鶹之盈耳也又曰今日夫人而能詩猶夫人而能為書也即孺兒搦管從㸃㸃從畫畫其形成斯為字矣若論所為筆法則惟張王鍾索輩擅之今若以其㸃畫而槩謂能書可乎至乃祖構之士毋事臨摹凖于心想于目迹自我脫精自我留斯勝之勝者也意能竊之形能盜之正如埏土象物雖顔面若生吾以為非善學者也又曰取自于我則機轉而神融取自于人則根枯而蔕脱吾不知大唐之歌南風之詩更誰斆耶凡先生所言俱詞家藥石當與桓溪先生說詩並傳故幷錄之雜謡三首婦嬾上機婆催織布不聴婆言兒寒無袴不剪萊路莫開我剪萊子行來門有嘉賓室無賢婦盤有肥羊尊無美酒城上烏城上烏號相呼三更四更號不盡風髙況又夜吹蘆再號不忍聴城邊白草枯城上烏天曙不飛魂欲無鴟夷子鞭屍何補抉眼何苦入江不腐怒氣如虎我穿爾肚爾受我弩南門謡父為虎踞南門每日食人人呌苦子尚為狼孫變䑕竊食殘餘能幾許慎莫逢人人殺汝上畱田行孤兒苦有兄難與居我欲往東方居東方長人索人魂不可居我欲往南方居南方巨虺㗖人髓不可居西方旱海渴人腸北方層氷裂人膚寧與兄居兄實難與居令我朝汲水莫舂粱兄食粟我食糠一言不合起刀槍有兄如此不如死他鄉行路難行路莫登髙山中多猛虎行路莫乗舟水邊多伏弩我是行路人誰知行路苦望夫石二首妾心如石堅望朝復望夕夫歸儻不信全身化為石夫歸來夫若不歸來苦死懐不開雖然化為一片石其中亦自有靈臺何當行鳳為鴟兮麟為狗仲尼不聖兮顔淵富有吁來者誰兮吾復踰垣而走箜篌行東家女性柔單栖不下樓容華映朝日玉指彈箜篌一彈聲斷絶再彈聲轉咽二十五弦聲聲聲愬離别十五嫁夫郎盈盈入畫堂觀者増嘆息齊稱雙鳳凰感郎情懐好淡把雙眉掃不愁兩處行只憐一處老詎道中腸變愛新故失婘傳說下江湘終朝盼不見一盼一回愁不由人白頭西家有老女相見亦含羞人苦不知足行雞三號門外蕭蕭馬足髙前涂若向北邙過乃知奔走總徒勞請君還家對妻子右手持杯左蠏螯架上有衣盎有粟人生何苦不知足端坐端坐臨髙樓愁思安可極我友輕别離棄我往上國今我失其羣長鳴振雙翼振翼將何為流景忽以匿思欲求列仙三山杳莫測夀命既難持鬱鬱何所逼立言雖可申榮名在令徳陳宣逺攜酒至竹所邀沈嘉則先生薛千仞同到得舉字幽居屛人徒抱痾積寒暑行藥憩髙林題詩對孤嶼善謔感在昔久敬想所與扣門報蘭朋攜尊就竹所我師心皓皓吾徒情楚楚清響振天雲飛湍簸沙渚嘹嘹紫雁來采采頳霞舉斜日媚西山素月挂東墅欲使念嘉會無慙酌芳醑大雅庶同敦緒論良足咀憤嘆白日忽西沉明霞亦漸沒浮雲彌四野隂風轉蕭瑟魑魅出幽叢執我夜行客感物憤嘆生晝逢多髣髴惜哉命運屯無以脫斯戹人鬼同所歸人禍殊慘烈我今在塵網恨恨何時歇有所傷貧賤迫驅人出門踐嚴霜惡風吹廣陌遊子不歸鄉寒鳥鳴北林饑烏立東牆彼亦寒無衣彼亦饑無糧一身不自保寡婦泣空房銀屋開綺筵玉壺盛酒漿列席難具陳盤中薦河魴嘉賓燕髙會長歌激清商不知死者苦但言生者康死者竟何人嗟嗟良可傷誶小儒鵷鶵育毛羽五彩耀太陽乗猋騰雙翰翻翔窮八荒清晨吞沆瀣日夕飲𤣥霜千里垂玉音匹羣唯鳳凰瞻彼升雲翼未敢與頡頏何況鸒斯鳥啾啾蒿下翔一髙復一下形響詎相當如何不量力延頸徒仿偟雪日朗公見過乃有此贈薄言客天都雪花一夜厚髙卧衆峯巔夢飲酌北斗忽報朗公來使我夢却走披衣與之坐蓮花出其口靈光寒照人空色消萬有送之出門去殘雪在枯栁人臾予干謁為之答人生無賢愚得勢自飛揚貴賤既以分求親反其常須用就顔色仰視苦不遑世路有危機自愛免禍殃昔在孔子門原憲得升堂毋謂狷者隘干求恥莫當在家貧亦好斯語有酌量守而能勿失吾道有輝光送王太學入京酒煗西陵白日下平荒晚飲驕嘶馬愁雲濕栁别長河一水茫茫風倒瀉綠蘿隠隠牽行色腸依古樹春絲直好向天門卸短衣贈君寶劍光斜逼夢縣馬首青烟小莎雞號寒秋乍老霜髙金馬映銅龍提出宫中漏聲早時命嘆良玉璞為宫雙睛啼玉工世人寶石不寶玉空使光燭銀河中君不見鉏商怪一角魯郊麒麟折左脚野田行河光摩天白湑湑媸蝄騎鱛作人語召怪呼精起碧㷠或化青貍或化鼠我胡遭此鬼膽張細濺秋血坐邊霜夜䦨淚竭海天長幽州不出心茫茫生身恙世誰能唁𤣥風瑟瑟饑空戰壯夫怒腹寖彭亨爛吐雄腸赤如電赤電飛空墮作刀野田之鬼聲嗸嗸我豈腸枯神血盡海波不動青天髙送趙給事適江西批鱗幸不碎龍堂嚴譴朝承暮一方九江雨逗波空綠瘦盡春芳夜度霜霜蹏馺􅤥平原上玉星㸃鐵光無恙妖蟇子夜蝕金精伐鼓江神鋪赤浪雁聲雝雝滿秋水秋風冷射蘭英褫大壑枯蛟縛凍氷空有肥聲壓不起匡廬峯髙君且留子巂嗁烟生旅愁寒深山鬼弔幽廌白日昏凄石鏡流誰訊天荒坐寥寂淋漓醉入櫻花色月生涼影起清歌平看流雲眼中碧王郎歌送季夏京試馬蕭蕭雲蒼蒼明月珠獻君王我獨胡為送王郎古鏡歌蟾蠩奔天天夜驚降作一片青銅精金烟細衮雙龍浴土血千年浸冰玉滿庭突走白電光摩拂何須尋負局赤砂點背綠花攢𤣥精半射毛孔寒自從妖犬破林慮山魈野鬽聲無驩扣如哀口龍鱗癢雲氣淋漓凝在掌㫚怳東西神物來跳入秋潭透清響誰教擎出咸陽宫闚肝眂膽過重瞳我欲握之爥寥霩難將黍室遁奸雄哀内子黑雨墮瓦舞神靈倐忽星爛雲英英秋燈冷照中閨壁壁挂輕塵抱玉笙當時玉笙音正好少女如花嬌不老如花一日不豔人夫子烏烏魂欲倒悲聲隠隠夢中聞夢起芒芒不見君土入涼風冢花碧紙錢直到夜深焚天帶平荒月孤發柏下香魂弔殘月不從隣鬼唱幽歌只向寒冰咽青月寄豐野人正元今我不樂愁欲死思君磊落之竒士半生抱恨何所為兩脚不曽入城市君家夜夜風雨鳴無乃牀頭劍作精我亦有屋四壁静忽然霹靂令人驚拔劍斫地心愈苦心欲言之口難吐空作東西南北人那得颺聲健于虎羡君不出愛吟詩一片頳霞映酒巵自笑常遭俗眼白徒將短髮報君知楊伯翼席上送汪仲淹象先叔姪得宻字東風走紅曲水厔静綠拖寒迎白日濃光飛入生頳顔壯夫凝恨青春溢楊子亭中無俗儒願寫清壺更促膝是時各提一片心口吟舌語冰喉宻客稱叔也賢豪人温如玉立此其姪絳花照夜新承懽待旦魂消馬頭出送人之白下東方遊子軀七尺馬首流雲光欲碧越山過盡聴新鶯春鎖吳花宫霧平子夜歌髙白門月
body:
  text: 甬上耆舊詩巻二監察御史胡文學編甬上文獻至宋而始盛凡中進士者六百九人位至執政者十八人今所録僅二十四家唯樓宣獻公得其選集薛氏有世編故録之為詳餘俱從諸舊乘陳言腐什中節取一二而巳其全集俱苦覔未見至如鄞江王先生致桃源王先生説城南樓先生郁正獻袁先生爕此所謂郡中九先生其四出於鄞者也他文學名臣若學士豐清敏公稷正言陳文介公禾侍御林公保司業髙憲敏公閌學士陳公顯御史黄公龜年僕射魏文節公杞學士汪莊靖公大猷侍制趙公粹中學士陳文懿公居仁越公袁公韶太常臧先生格直閣樓先生昉太常陳文定公㮣少傅趙清敏公與懽司業陳公塤直閣史公彌鞏學士張公即之直閣王公撝侍講趙公逢龍博士陳先生著教授史果齋先生䝉卿諸公則併單章一律亦不可得見矣此吾黨今日所以彷徨太息唯恐采録之後時也兹特列其名氏附于二十四家後倘有藏書故家能收其遺集當更力購之録遺補亡尚有待焉中大夫周公鍔字㢘秀銀青光禄大夫師厚長子也生有異禀十嵗如成人十四入太學力學勤苦登元豐二年進士初調桐城尉愾然曰古人學優乃仕吾昔所治科舉耳遂辭不赴官益精研六籍及諸子百氏書盡著論其本㫖為文踔厲競爽追古作者不以雕飾字句為工務期于有用旁至占緯相地家言靡不該博嘗遊潁昌訪其舅氏范忠宣公時文潞公司馬温公富韓公俱在數得造請問益其學逾進至京師上書言事同里國子祭酒豐稷給事中范祖禹交薦之出知南雄復以言邊事忤時相名入黨籍因退居西湖作四休堂與弟承奉銖籃輿野榜徜徉山水間風格宛如晉人間為詩以自娱客至具肴簌随其所有終日談論古今未嘗及官事紹興元年轉中大夫朝廷方用之而公老矣卒年七十五所著文集二十卷承宣集一卷明天集六甲竒書各一卷尚書右丞胡公宗愈翰林學士王公覿並重其才識相繼以女妻之蔡京作黨人碑舅甥翁壻俱在籍中後人以為盛事焉佛跡巖靈山名大蓬香水靄薝蔔龍祗久覆䕶雲物翳深谷拂衣向刦中神斧㫁蒼玉至今天人尊靈跡印金粟頗聞開士䜟飛錫隠巖麓坐令湖海間香貢走川陸巍巍虔報地色相儼金屋緬想舊巾瓶猶能慰心目籃輿訪蓮社一笑欣自足撫事動幽尋疇能念榮辱松爐裊如見餘力付棋局更覺夣中身翛然百無欲題金氏萬金樓㡬年江上夢黄鶴意悠悠百尺獨臨水萬金難買秋杵聲喧藥市欄影浸漁舟應有湖中客分身向此游澄輝閣雄建俯空濶下瞻霄漢浮眼將雲漠漠心寄水悠悠日暖鳥飛鏡月涼魚弄鈎行期分此景家在甬西頭和郡守彭吏部西湖使君脩禊與民游千里笙歌水面浮動地風從雲外起截天霓向雨中収登臺巳有難并樂擊壤能無寡和憂却憶内家新賜火海棠無數出墻頭牛鞭初動囀新鶯夢覺池塘選勝行水鑑光中千騎合山屏影裏萬艘横雲從布穀原頭過雨向催詩筆下生藻繪昇平知有待閣梅先巳入調羮薛處士唐失其字隠居不出所著田間集一卷後贈朝議大夫田舎作世業存五畝家風守二南適情無過睡幽事不妨貪母老厨増肉朋來樹選柑每慙躬稼穡未及野農諳秋眠涼色正堪弄新碪絶可憐况兼梧葉響槭槭到牀邉羣雁呌逺渚孤雲停莫天郊居迎送寡秋日足髙眠書壁自甘藜藿不求魚大笑馮生出想車才子座中悲鄴下髙篇社裏厭黄初不臣未遂忠君志生子猶能讀父書酒後放言揮秃管元龍豪氣本難除直閣王公廷秀字頴彦由慈徙居鄞初入太學與龜山楊先生游其學上述旁搜不屑趨時好復學詩于黄太史庭堅文詞卓犖登政和上舎歴官州縣以侍御史李光薦改御史臺檢法官宣和靖康朝進言忠懇張邦昌僭號獨公執節不屈後御史中丞上其事拜監察御史奏乞威㫁出于人主所遣宣諭官當令兼舉㢘吏又言刑名有疑慮者州郡法官應具申憲司閲實取裁遷殿中侍御史臺綱益肅論黄潛善為相時恃寵賣官潛善責授秘書少監明受之變與鄭瑴力争不宜去帝號事遂止復論吕頥浩奏擬不當出知筠州右正言吕祉奏上以論大臣罷一言官即明日大臣有失誰敢復言者遂召入為吏部郎改左司言朝廷比來深疾貪吏然州縣中豈無介操自將久屈下僚者宜命五使所至以亷潔清修可表率吏士者具上其名更㕘諸公議不次遷擢以勵士風從之進檢正中書門下省諸房公事與宰相議多不合力引疾求去詔直秘閣主管崇道觀歸所著有航海記磨衲集同舎弟泛舟西湖登晝錦堂步至紫翠亭望懶堂景物懐故龍圖舒先生城中十頃湖雲水相演漾春風破氷谷拍岸新流漲平鋪鴨頭緑澹沲蒲萄釀朱甍媚孤嶼梵宇麗相向萬瓦生新暉千花聫錦帳晨曦照炯烱芳氣浮泱泱日暮姿態妍烟霞渺空曠誰將水仙鏡聊借詩人仗卧䕶五羊城追懐老詩將㣲吟示清野鏖戰得閒放變化無端倪虚無落名狀坐令湖上景勝絶神宇王當時經行地藻麗随屨杖斯人今則亡物色亦摧喪他年牛馬走曽拜丈人行塵埃久飄泊嵗月成漫浪問訊懶堂居松竹欣無恙尚意壁間聲時賡朱絲唱撫事重興嗟陳迹徒悵望哦公十洲詩風月為悽悵少卿汪公思温字汝直大父元吉以縣從事為范文正公所知王荆公來鄞亦稱為亷平吏父洙以春秋教授里中人稱曰汪先生公登莫儔榜進士授雄州教授調餘姚令築堤浚湖吏民愛信之欽宗以諸王就傅擇除贊讀公與弟思齊並命除吏部員外郎出守三衢有自稱祁王過郡府吏請避正堂以舎公㣲察其偽不許巳而其人果敗御史中丞徐俯入朝道由郡公以部使者禮見不為設厨傳俯憾之劾以他罪中丞辛炳為疏辯得白遷司農大府少卿知臨安府淛河以漁舟濟人每中流故弭楫索客多出錢或風暴至舟輒覆善汩者競取其錢物登岸公悉捕繫以殺人罪論更作大艦載客餘盡禁之相秦檜以故人屬薦公謝曰使其可薦誠不待相公諭如不才即相公言無益也有㫖營政府檜欲以相府儀制稍異執政府公益持不可檜積怒罷直顯謨閣食祠禄凡十八年卒年八十有一三江亭和郡守韻危亭聳觀與雲侵勝槩何勞杖履尋回合江山真有意去來鷗鷺本無心歡聲洋溢均千里好句清新抵萬金四海正需經濟手豈容長對白頭吟知衡州軍薛公朋龜字彦益政和八年進士授仙居縣尉值嵗飢道殣相望剽掠者四起公請于郡發廪粟賑民解散盜賊境内悉平改楚州司録適靖康之變楚師勤王者歸道州境郡守薄其供一軍盡譁公馳往諭以國法立發帑犒之軍始定巳擢為奉議郎去官民遮道泣曰我輩巳為爼上肉藉使君活我至馬首不得行監司上其狀再擢監行在登聞檢院兼權工部郎中守直不阿所彈劾使權貴斂手以左朝奉大夫出知衡州致仕在里門與汪汝直諸公結社林下後輩多從杖屨相造請時稱為四明五老焉所著彦益先生集二十卷子孫世有賢者自南宋以來氏族之盛莫過於吾郡而鄞又甲于他縣一時推史鄭樓豐四大家而薛氏以義門瑞室共推顔栁遂得相頡頏讀世風一編列詩家二十六人亦可見其盛矣岱嶽篇雪中送華山人東遊七十二君巳綿邈乾坤只今留岱嶽烟書雲篆弔秦碑萬聖千靈朝漢朔白日雕旛路相望夜深仙樂張天上日觀天門踴躍登芒作雙鞵藜作杖匹練呉門見㡬人向來寂寞空山春溪花谷樹忽生色一朝若為山人新君行正直年華謝山雪紛紛向君下去看九州玉削成孤髙始信岱嶽名若趁長風竟飛舉鵞毛栁絮同身輕江船夜色千山白扁舟獨進遲鄉心共帆急世路與波随性野禽魚習官寒故舊知江梅如愛客早放嵗寒枝露乘興訪村家㣲㣲見露華暗滋三徑草晴濺一庭花夢入闗河濕涼生更漏賖清江千萬里何處㸃蒹葭見雁寒衣九月授他鄉遂見征鴻序一行秋色未深先避雪邊聲忽到又随霜曽愁天路罹繒繳只想中原食稻粱漢使不歸書不繫至今塞有客沾裳剡中别呉客百道飛流向剡飛髙田不歉下田肥呉人只道呉山好黄獨如拳也救飢安撫王公伯庠失其字登紹興二年進士試教官第一歴遷殿中侍御史出為䕫路安撫使公性博記過人䕫地絶逺為手圖其險要所部俱不能欺巴俗多掠子女出境公特嚴其禁遂莫敢犯所著有歴山集雲安集宏詞集要䕫路圖經諸書三江亭和郡守韻使君不受二毛侵杖屨逍遥得勝尋撥遣簿書聊永日登臨山水一何心殘梅墜雪垂垂白弱栁揺風淡淡金倚矚大江供一笑㡬多襦袴在謳吟直閣薛公居實字去華知衡州朋龜之子也歴官守莆陽更起學宫遷提舉福建路常平茶鹽值嵗飢救荒有績所在俱以治行稱自祠宫召對除倉部員外郎陞郎中再擢淮東安撫使直秘閣卒于揚州所著有薛安撫集十五卷故舊相送出城門策馬國門南行役感時節唧唧寒螿亂皎皎層巒潔脩途遵廣川衰林夕陽滅含情不忍語眷舊詎忍别抱疴謝紱冕寄情戀巖穴樹臨越海潮山背呉門雪各勉疇昔心音書戒遼絶倘訊幽栖子杜闗理丹訣皇太后輓歌夾日光先業寒星聚夜臺慈名千古重哀詔九天來地底鷄人少雲中鶴使催宫門芳草遍從此不須開秋日看雲曉雨沾山路秋雲看野亭薄從川上起低向屋邊停合處山林白消來天地青人生無定迹不止是浮萍老妓自稱汴京宫人泣而贈之薄粧自叙老深宫一曲悲歌聽不終黒髮尚霑梁苑雪素衣還帶上林風殘春栁葉蕭條緑破國桃花冷落紅收拾琵琶蹙眉黛教人同在淚痕中薛知縣靖失其字紹興二年進士官某縣令所著有南枝集十卷南枝續集八卷嵗久旱喜雨東南苦亢陽呉越重罹厄流徙罄村墟入夏地尚赤詎無溝中人矧乃急往役賴兹天心慈弗終閟膏澤凱風將雨至蓬蓬亘昕夕水勢千澗呼雲隂四郊積祁祁沾洒均歡聲遍南陌秋秧布有種萬一償春麥相率理長鑱幸可謀擔石我亦歌豳風憂心庶㡬釋望金山用唐人韻一柱支空立濤聲春寺聞消來巴地雪飛到潤州雲寂寞江山色縱横盜賊羣不堪形勝裏北望涕紛紜薛郎中揚祖字元祖歴官知漳州以治行召為大理丞漳舊有土城髙僅五尺公至京師以脩築請于朝遂詔守臣趙汝讜經畫如其言漳人賴之遷刑部郎中以疾請外得池州所著有閩志編三卷與張樞密話舊作羸軀苦善病日與藥裹親藉彼參苓功扶此憂患身思君若飢渇相憐同病人余身本蒲栁寜竢秋風晨君誠松栢姿何患不長春容面一若丹鬢髮一若銀來日安可期往事曷足陳不能罄君罍奚以浣我塵吹笙將鼔瑟慚余非嘉賓郊居寫志過庭聞曲禮在野習王風世亂思休否兒愚藉發䝉雲霞海色裏烟火雨聲中所喜田間事比隣自昔同送表弟朱拙夫以縣尉赴新安散金結客不求償落落生平此熱腸七尺許君何慷慨一朝用世果循良滿城山色侵官舎徧地溪聲度女墻邑長若逢潘岳輩肯教名獨起河陽薛循祖失其字官掌機宜文字所著有吷音一卷秋園詠物詩怪爾知時節逢時輒自鳴空堦一夜響短榻㡬人驚唧唧催寒色蕭蕭助葉聲無人悲物意徒語不堪情蟋蟀風急翅紛紛遥空自作羣到來秋塞月鳴入暮江雲亂起千行字俱飛一片文髙樓有思婦嘹嚦豈堪聞雁題采藥圖江上竒峯雨後多千層飛瀑灑青蘿扶笻亦覺溪橋滑尚有幽人採藥過少師資政殿大學士樓宣獻公鑰字大防大理評事郁之五世孫也隆興初進士中教官科調温州教授㑹刪定淳熈法議者欲降太學釋奠為中祀公曰乘輿臨幸于先聖則拜武成則肅揖其禮異矣豈得鈞體乎適用薦遷太常博士時閩蜀士大夫各植黨公入對歴言東漢黨錮唐朋黨元祐黨籍之弊孝宗曰唐人主謂去朝廷朋黨難朕嘗笑之此特主聴不聰耳再遷宗正丞出知温州光宗嗣位召對奏曰人主初政當先立其大者至大莫如恢復然當先强主志進君徳今日網密甚矣望陛下軫念元元以設禁為不得巳凡創意増益者寢而勿行以保養元氣除考功郎兼禮部時吏銓並縁為姦多所壅底公盡革去之擢起居郎兼中書舎人公立螭頭登左掖繳奏無所回避禁中或有私請上曰樓舎人朕亦憚之不如且巳㑹慶節上夀扈從班集乘輿未出巳而玉牒聖政㑹要書成將進重華又屢更日公言臣屢嵗随班見陛下上夀重華宫歡動宸極嘉王日趨朝謁恪勤不懈竊料夀皇望陛下之來亦猶此也又言聖政之書載夀皇一朝之事玉牒㑹要足成淳熈末年之書幸速定其日無復再展以全聖孝于是上感悟進書成禮試中書舎人兼直學士院光宗病不能持䘮傳位皇太子公草詔有曰雖喪紀自行於宫中然禮文難示於天下人服其婉寜宗既受禪遷給事中公兼掌内外制論正太祖東向之位朱熹為侍講以言事除職與郡公言熹始除宫祠深駭視聽今復除職是聖意不在熹也熹大儒碩學難進易退陛下閔其耆老當此隆寒立講不便且俾内祠脩史少俟春和復還經筵庶君臣之義備不報時韓侂胄用事日貴臺臣希㫖論趙汝愚言定鼎乘龍之夢語涉不道公曰嘗聞汝愚言夢先帝賜以金湯壺即謂之定鼎可乎又嘗夢朝㑹見白龍升天未㡬上衰服嗣位即謂之乘龍可乎吏部侍郎彭龜年入内殿力言侂胄擅權漸不可制上大怒黜龜年外除侂胄與祠公與林大中疏言嘉邸舊臣惟龜年尚在不宜使出乞留侍講筵與侂胃一外祠龜年竟去公遂出外尋復奪職告老家居凡十三年杜門著書侂胄嘗與客言樓大防善士何無一札入都門且使諭意客至公家述其語公黙然子弟相顧輒索具紙筆公從庋中取顔氏家訓言士大夫晚嵗名節事置紙上即起入内客疑公援某事取視之俱大愧撤去紙墨公湏臾就坐客不敢言公亦不復問舉酒言笑如平時其從容持正若此侂胄誅起公翰林學士遷吏部尚書兼侍講適趙汝愚子崇憲奏雪父寃公乞正趙師召之罪重蔡璉之誅毁龔頥正續稽古録以白誣謗公年過七十精敏絶人每詞頭下立進草院吏驚詫歴遷同知樞密院㕘知政事力以年乞身進資政殿大學士歸卒於家贈少師謚宣獻公學問精博中原師友源本悉窮其淵奥經訓小學並精据可傳信初罷官里居聚書東樓踰萬卷皆手讎校稱善本性尤樂易客有願鈔其書輒欣然啓帙以授初定注春秋未脱藁及在永嘉見陳傳良書巳成即焚巳草特為叙其書嘗薦真徳秀掌内制徳秀每言得與樓公清言竟日或極論徹旦退而書紳不為塗人之歸皆公教也公扁所居曰攻媿齋自稱攻媿主人有文集一百二十卷行世求仲抑招遊山歸途遇雨竹輿遶湖濵宿霧尚厭浥徑到玉岑下坐久客始集起穿靈石山萬松介而立梅天氣清潤空翠行可挹古籐㡬百年枝蔓兩山及見説暮春時花紫紅熠熠直疑老潛虬初起夜來蟄俯玩嵗寒泉齒冷不敢吸相將上龍泓塵鞅謝羈􅎗洞有靈獸居臨深心岌岌魚遊明鏡中巨浪無三級寒苔載水去萬頃潤原隰濛濛山雨來歸僕飛鳥急野興殊未巳日昃不暇給衝泥上湖船雨陣遽奔襲飄風將急㸃回旋驚四入中流盖蕩兀短篷不當笠停篙亦久之怒勢不少戢我徒方嘯歌弗為改豪習但恥缾罍罄莫問衣裳濕題孟東野聽琴圖因次其韻誰與住前溪夜深幽琴鳴天髙衆氣肅月斜映疎星橡林助蕭瑟泉聲激琮琤彈者人定佳能使東野聽束帶不立朝遥夜甘空庭龍眠發妙思神交窮杳𡨕不見彈琴人畫出琴外聲郊寒凛如對作詩太瘦生恨不從之游撫卷空含情王成之給事囿山堂烟雨望麗陽前山羅紫翠照水挹南明不與巾子對朅來登囿山一覽萬山㑹蓮城山固多此地要稱最主人意軒豁物景供曠快山椒湧華屋迥出風埃外一物無遁形所在見纎芥清霜肅天壤佳樹隔闤闠俯仰随取舎左右從盼睞門墻尋故步杖屨許從邁怳然至絶頂更覺宇宙大樽酒屢勸酬棋枰更勝敗秋髙月色皎浮雲了無礙不俟攀仙掌徒手吸溪瀨兹堂極崇敞意若欠深邃先植易生木徐待松栢兑望逺仍可喜意滿聊自晦無使山下人或得窺外内但恐趣賜環樹藝或不逮先生味斯言一笑相領解吾將飭園丁随處添翳薈他時遶扶疎吾廬益可愛題范寛秋山小景山髙最難圖意足不在大尺楮渺千里長江浸横翠人家雜烟樹惝怳徒意㑹茍或森三尺便若俗子對此畫格律嚴興寄獨超邁洗眼映牕明妙處乃不昧流泉見原委著屋分向背推車度危橋指路向闗隘輕舟最渺茫浦嶼如有待山稜瘦露骨汀洲横若帯木葉黄欲脱秋容儼然在霜餘無片雲歴歴數沙界搜尋目力疲欲賦無可奈近山才四寸萬象紛納芥欲識無窮意聳秀更天外送從弟叔韶尉東陽阿連少也爽孤立生氣燄壯年淬詞鋒傾心事鈆槧膠庠困虀鹽世科終稳占再興聫桂堂爾祖真不忝況將尉東白士友尚歆豔惟我愛子深老矣猶不厭固知為子喜頗亦動吾念贈子當以言苦口當鍼砭此邑子舊逰歴歴數行店棠隂見郎君遺老喜窺覘其民最服義情偽靡容揜莫恃采棒威要使慕巾墊子文多立就詞采更華贍吾聞恃俊者塞門差反坫前賢最加謹臨用更重檢他時可待取天庭得錦吾家有素風耳目久濡染母庸慕豪舉助㢘先以儉湎酒更宜戒平地有深塹酣暢當以時勿習盃㶑灎將論毋過髙斯言却防玷立節母務竒躐等恐成僭外物思過分檢身但多欠勿嫌一尉卑封清尚為傔仕途固嶮巇大要進以漸不須苦求知真知奏應剡向來湖海豪四十可收斂寧為處囊錐莫作露刅劍匆匆摻袪别魚鮮酒方釅刮目待子歸罔俾吾言驗送元衛弟赴長亭鹽塲阿連生向秀二親所甚愛仲兄勤撫養遇事輒加誨幹蠱静而辦胷次無卑隘今焉職牢盆官宇臨渤澥毋謂官為小要使所居大毋言才可了檢身到纎芥門户重衣冠家風緜數代當以誠心求子親勿自懈亭民亦良民孰謂居無賴官吏既擾之兼并責逋債熬波亦良苦樂嵗色猶菜輸鹽不得錢何以禁私賣所在積蠧久良法浸多壊吾閒不無術更當審利害熟視不為謀空餐愧難蓋不應行一切遽使絶稱貸富者能寡取倍息久仍在貧者庶少寛公私可緩帶母年登九十家居幸康泰其家不從政禮經有明戒幸子去不逺時時可歸拜小别不足惜輕裘送前邁次韻翁處度同遊北山兩夫持鎌行我先巧尋徑路其智専我扶枯藤衣短後意氣巳出層峯顛何郎鮑叔飽經歴勝處一一手自編我擕舊記訪陳迹正恐急景不得延何當共登青雲梯今日邀我共擊鮮始觀神龜闖青泚上有石壁來飛泉隠青遺基不可坐下顧亂石如磨鋋懸崖雙瀑灑空雪來自一握孤雲天却從下流泝深險﨑嶇直到清潭邊朝陽射光破幽閟㫁虹上下遮潺湲傳聞髙山更髙處雅有行路從西偏同行無乃深好事盃酒自犒脚力全誅鉏荆棘從鳥道欲進不得意愈堅旋呼童僕累危石笑採野菊聊盤旋捫蘿騰身上苔磴往往歡呼争著鞭側行危步汗浹背石角或使衣裳褰少焉身在雙瀑上又見髙派衝泓淵自笑泉石成膏肓愛賞不減蟻慕羶巉巖數峯巧遮䕶妙處二老初無傳脱迹塵埃到此地便覺神思飄飄然回首江南塵一聚城郭歴歴眼欲穿相期更看流水處步履未倦夸輕翩一上千尺窮山椒碧澗靡迤流蒼烟尋源不能且望返石猊巍距驚神鐫退求歸逕惘難問藤蘿所在相縈纒我方踟蹰風煙表披披衣袂身欲仙晩歸招提各痛飲讀盡屋壁長短篇截筒環山覽清駛竅出珠穗心亦憐碁枰相與論𤓰葛横琴不妨揮五絃人生易老費扶掖勝具大率須少年伊余歴騁佳山水愛竒竊慕太史遷明年炎暑襲故步與君共枕清流眠題髙麗行看子髙麗賈人有以韓幹馬十二匹質于鄉人者題曰行看子接處黄綾上書韓幹馬表飾以綾尾以精紙皆麗物也聞其懐金來取因命工臨冩而歸之再用東坡韻書臨本之後竹披雙耳風入蹄霜鬛剪作三花齊相随西去皆良種撼首勢竄迎風嘶丹青不減陸與顧麗人傳來驛通語裝為横軸看且行云是韓幹非虚聲圉人乘馬如乘鶴人馬相諳同呼啄中有二匹真游龍爬梳逈立緑楊風賈胡攜金贖此馬亟呼工人臨舊畫我詩無意到三韓寫向新圖時自看再題行看子先引䕶欄毬子驄九馬近逺俱相從黒駒騧黄騅素騮亦有當面仍銀騣夏國一種青于藍五明錯靴皆如龍或驂或引恣馳驟坐覺隠耳聲瓏瓏人間安得有此輩一一必自天閑中不惟骨相異凡馬圉人貴介多雍容三花剪鬛自官様空鞍更以香羅幪中間二者蓋天馬齒雖巳老氣尚雄不知㡬出横門道雙立栁下青隂濃擡韁捽頷刷背膂旋梳騣尾揺清風人人生意馬欲動態度曲盡各不同韓生去我㡬百年藻色尚濕青與紅不知何時堕雞林萬里逺在東海東賈人攜來得寓目一見絶歎丹青工千金可買真不惜忽復攜去何匆匆急令臨冩得形似如此神駿那得逢開元内外馬盈億色别為羣從登封韓生所見定傑出七尺為騋八尺駥向來鶯邉繫金絨歸乘欵段頭巳童伏櫪寜能志千里却笑區區據鞍矍鑠翁次韻趙子野石城釣月圖石城江頭可憐月曽照六朝清夜獵古往今來知㡬何長江滚滚蕭蕭葉謫仙去後詩盟寒三孫詩瘦清欒欒詩情浩蕩坐無奈扁舟笑把磻溪竿江平風輕波瑟瑟宿靄卷空天一色東風吹句入長安一卷風流座中得初讀神意清再讀胷次平囘頭明月祇如故世上廢興徒紛更想君一葉方掀舞夜静水寒誰與語船頭有酒且孤斟莫向金陵重懐古它山堰它山堰頭足竒觀百萬雷霆聲不㫁誰把并州快剪刀平剪波濤成兩段四明山深水源逺衆壑㑹溪長漫汗滔天狂潦不少留瀉入長江勢奔竄賢哉唐家王長官欲圖永利輸長算想得慘淡經營時下上山川應飽看西偏千嶺相屬聫惟有兹山擁東岸遂于此地築横埭截取衆流心自㫁斟酌利害不全取髙下參差僅强半水大十分七入江徐挹三分供溉灌支流瀰瀰穿郡城脈絡貫通平且緩旱時反此水亦足坐使千年忘旱暵無窮廟祀報元功像設森嚴人敢玩梅梁夭矯有㝠助大患於今尚能捍前輩所作多神靈日月真成赤心貫後人小智枉更易仰望先賢重興歎老木號風波湛碧畫屏俯仰丹書煥更湏積雨看驚湍濡足褰裳何足憚去家不逺時一遊短艇垂綸流可亂八月倘有仙槎來便欲乘之泝天漢湖亭觀競渡涵虚歌舞擁酆君兩兩龍舟來往頻閏月風光三月景二分烟水八分人錦標贏得千人笑畫鼔敲殘一半春薄暮遊船分散去尚餘簫管遶湖濵海潮圖錢塘佳月照青霄壯觀仍看半夜潮每恨形容無健筆誰知收拾在生綃蕩揺直恐三山沒咫尺真成萬里遥金闕岧嶤天尺五海王自合日來朝行香聞杜鵑墻西緑栁杜鵑聲老我何堪側耳聽我自賦歸歸不得不湏苦語更丁寜小谿道中二絶簇簇蒼山隐夕暉途看野雁著行歸久之不動方知是一搭碎雲寒不飛後衕環村儘溯游鳳山寺下換輕舟舟人努力雙篙急引得清溪逆岸流過從子澤家楚楚初篁脱緑苞城居約畧似荒郊土膏更得春風力直引薔薇上竹梢監庫張先生良臣字武子一字漢卿家洪州父避地來鄞遂家焉先生少善為詩髙潔清厲能擺落凡俗音節磊落讀者悲壯尤長於唐人絶句語盡而意益逺論者謂詩至盛唐極矣杜牧之李商隠晚出以絶句為専門至宋王安石力倣之然終不能似黄庭堅以造句為工律吕乖忤而詩益變陳與義多援古語不牽引事物似黄而益竒詩之變無餘藴矣風雅道衰獨先生徹幽内明復唐聲律一時江南詩家共推為過江詩祖以至方外諸禪人吟誦其體競相宗尚而詩稍復其變焉先生于舉子業非所長隆興元年試南省同里魏文節杞時為參詳攜三策以見知舉張燾曰此文拙古必故人張武子所作公欲得士願以進燾許之撤卷果先生也先生官止監左藏庫輒罷歸魏文節晚居小溪山中先生時從倡酬其詩或終嵗不出一語有集十卷至咸淳間甥徐直諒始裒刻於廣信郡先生詩時謂其一變宋音復還唐雅至推為過江詩祖正不僅甬上眉目巳也而其詩刻於江右吾鄉傳者絶少嘗與黄梨洲先生共相嗟歎黄先生云西湖志中刻有絶句一首即秉燭徧繙得之始服其絶句之妙嗟夫先輩遺文使後人不能盡讀誠一恨事也過清脩嶺膽失巖上人心怖巖下人履道自坦坦何在不問津人生貴得意毋容矯吾真淵明兀餘年漉酒乃一巾南渡曉行七㸃五㸃星斗落一聲兩聲鐘磬清路入小橋和夢過埜花深處草蟲鳴西湖帖帖平湖印晚天蹋歌遊賞錦相牽都城半掩人争路猶有胡琴落後船髙萬竹先生元之字端叔武烈王瓊之七世孫也建炎間衣冠南渡因定家於鄞家貧無書得易編口誦不輟數月忘盥櫛隣生有書深憐之稍借以觀後受易春秋學于沙随程逈時傅伯成為郡教授少所許可獨折節與先生交由是鄉學者數百人俱師事先生嘗作變離騷九篇曰愍畸志曰臣薄才曰惜來日曰感囘波曰力敶曰危衷曰悲蟬蜎曰古誦曰繹思行于世宋人擬騷俱莫能及也集春秋説三百餘家號義宗悉本經㫖凡百五十七卷易詩論語後漢厯志解各一卷詩三千襍著五百號茶甘甲乙集先生事親孝貧能輕財復喜言兵事凡隂陽方技九流諸書盡能究其指歸五上禮部卒不第而及門多至顯官將死手屬書樓宣獻公以歐陽公南省白襴求志文貧不能塟門人㑹莖于桃源鄉蔣山買田立祠于寳巖院嵗時祀之稱曰萬竹先生大小晦山大晦出小晦過盡山峯翠寒雲抱幽石枯卉老壖瀨沿流逕偪側當道屋破碎却立重囘首瀑布㵼雲背飛雪亭危亭上拂烟霞光蒼崖深倒蛟螭穴天河飛來破山翠寒入疎林風自發翻珠錯玉無時歇岩前散作千秋雪寒聲蕭蕭凛毛髪白雲片片翔空滅飛流濺珠入毫端天然一詩為題絶長汀即事楊花剩得晴方好榆莢其如世上貧花向喜中看更好分明春色解欺人薛進士澄乾道二年進士所著有家塾自藏六卷效朱公叔絶交詩東山有梟不祥其名惡木是息惡聲是鳴食不棄腐飲不擇清宜飛求伏以晦為明㓙殘滿志嗜欲惟攖伸頸招鳳使鳳自驚豈有鳳口而和梟聲奈何伊人弗審物情請從此别各自謀生賦得一年將盡夜可惜惟兹夕須臾即舊年人間嵗窮處客館夜分邊應逐銀缸謝聊憑玉漏延曉風雖未至殘臘㡬時天立夏漸覺風光燠徐看樹色稠蠶新教織綺貂敝豈辭裘酷有烟波好將圖荷芰遊田間讀書處新笋萬竿抽髙處州似孫翰林學士文虎之子也為禮部郎守處州所著有緯畧騷畧等書石橋一石上負昆侖柱一水西奔牛女渚玉榦獰鱗萬松古夜夜神光干帝宇石滑苔危水一縷四海長依開闢雨月落未落半規吐雨足敲泉龍擺舞蔡山渡江上人家破竹門潮來水長浸籬根鮆魚一尺枇杷小放溜船來酒滿尊薛縣尉師㸃嘉定元年進士官某縣尉所著有從政工餘二卷酧畣張安撫伯玉先生寡交率天性積疴攻妙藥干禄念烝嘗著書恣談謔永矢離畏途何况縻好爵感子故人意屏吏延鈴閣時剖千秋心兼訂三山約風流張平子文采謝康樂潜魚媚幽潭髙鳥昵林薄物類既參差天地亦寥廓但愁霜霰多石出兼水落少傅通奉大夫袁正肅公甫字廣㣲正獻公爕之三子也嘉定七年進士第一授秘書省正字上殿劄子言賢才用舎可懼民生安危可懼衆情閉塞可懼羣情逸豫可懼乾㫁不行可懼辭甚愷切遷校書郎轉對言邉事之病不在外而在内偷安之根不去規模終不立壅蔽之根不去血脈終不通忌嫉之根不去將帥終不可擇欺誕之根不去兵財終不可治祖宗之御天下政事雖委中書然必擇風采著聞者為臺諌敢於論駁者為給舎所以戢官邪肅朝綱也今日誠體是意以行之可無偷安壅閉者矣出通判湖州増積貯核隠産増附嬰兒局再遷著作佐郎知徽州治先教化崇學校訪便民事上之蓄常平義倉備荒興脩陂塘剏築百梁遭父憂服除知衢州立旬講嵗撥助養士千緡郡有義莊買良田二百畝益之提舉江東常平適嵗旱給發庫庾遣官分行賑濟醫療又告于朝給度牒百道助費提㸃本路刑獄兼提舉移司番陽時霜殺桑諸郡被水連請于朝給度牒二百道賑恤之都城大火上封事言上下不交以言為諱天意人心實同一機願下哀痛之詔以囘天意詔求直言復上疏言災起都邑天意盖欲陛下因其所可見察其所不可見大行黜陟與天下更始行部問民疾苦薦循良劾去墨吏決滯獄所至詣學宫講説復取孝經衍其義告于屬邑立書院於貴溪之南祠陸象山身講授學者嵗大旱請于朝得度牒緡錢綾紙以助賑恤疫癘大作剏藥院療之前後持節江東五年所活無算諸郡徳之俱為生立祠轉將作監領事如故彗星見詔求直言上疏言皇天震怒由貪冐成風致愁苦之民衆願一變上下交征之習帝親政以直徽猷閣知建寜府明年轉福建轉運判官閩鹽𨽻漕司綱運供費増益無紀又丁米錢久為漳泉興化民患公皆奏捐之遷秘書少監入見帝曰卿久勞於外篤意愛民每覽所陳備見懇惻公奏陳無逸之義且請力守更化以來求賢如不及之初意遷起居舎人兼崇政殿説書于經筵奏剛之一言最切於陛下陛下徒有慕漢宣吏治之名乃更堕元帝文宗柔弱不振之失總由不識剛徳之真所謂真剛者當為必行不當為則㫁在勿行又乞専意經訓養育精神務令充實上與天一下合人心今上意欲全功臣之世詔自今中外臣僚奏事母得攟摭以奏是消天下讜言之氣其謂陛下何兼中書舎人時相鄭清之以國用不足履畝使輸券公奏避貴虐賤有力者頑未應令而追呼迫促家業破盪者率皆中下之户乞加哀恤嘗講罷帝問近事公奏惟履畝事人心最不悦適講漢髙入闗辭秦民牛酒民俱大悦今日横科若此民心喜乎怒乎本朝立國以仁陛下為此舉仁乎否乎帝為惻然時朝廷以變事為憂史嵩之帥江西力主和議公奏曰臣與嵩之居同里未嘗相知而嵩之父彌忠則與臣有故嵩之易于主和彌忠每戒其輕易今甘用父子異心之人即朝廷亦未免易於用人也疏入不報遂乞歸不允授起居郎兼中書舎人未㡬擢嵩之刑部尚書公復奏曰臣于嵩之本無仇怨但國事所係誼難緘黙嵩之誥命終不與書行乃出甫知江州尋改知婺州不拜嘉熈元年遷中書舎人入見帝問邊事甫奏當以上流為急和議恐誤事又奏備邊四事嵩之移京湖沿江制置使知鄂州甫奏曰嵩之輕脱難信去年在淮西王檝由淮西而來北軍踵之今又併湖南付之臣恐其復以悞淮西者誤湖南疏留中不行翼日權吏部侍郎引疾至八疏賜告一月遂歸從臣復合奏留之屢命俱辭不拜遷兵部侍郎入見奏江潮暴湧旱魃為虐楮幣蝕其心腹大敵剥其四支危亡之禍近在旦夕乞秉一徳塞邪徑遷吏部待郎兼國子祭酒日召諸生課其問學時邊檄日至甫條十事至為詳明權兵部尚書暫兼吏部尚書致仕卒于家贈少傅謚正肅公少服父訓知為學當師聖人以立志為先後問道於楊文元公告之曰學貴自得此尊公之訓也心明則本立矣由是慨然以斯道自任居官切于愛民所至有惠政立朝正色無所阿附王深寜先生謂近日科名有益世道者惟公一人而巳所著有孝説孟子解後省封駁信安志江東荒政録防拓録樂事録及䝉齋文集行于世題陳和仲觀聚堂詩習菴築室扁曰觀聚堂前何有萬象可睹山如郛郭烟雲吞吐草木沃若春光媚嫵脩篁漫山不知隆暑何况秋空呼日入户朔風吹雪松聲如怒上天下地四方曰宇物生其間何可勝數我于是觀樂哉斯土随意作室不華不窳買山旋添稍葺園圃得趣幽閒不入城府良朋偶來傾倒肺腑不及時事惟談鄒魯朋去何為周易一部消息盈虚窮今亘古觀乃自觀寂無一語題陳和仲尊明亭非徳不尊非道不明爰取斯義以名吾亭亭在山巔氣象巍然山從何來蜿蜿蜒蜒我坐亭上極目一望羣峯畢朝尊無與抗我撫亭下萬狀難寫一一分明入我醆斝有時攜笻偕二三朋莫知我心獨撫孤松丞相魏郡鄭忠定王清之字徳源嘉定十年進士初官國子録丞相史彌逺引為魏惠憲王府教授理宗立以定策功不十年位至宰輔歴進太傅左丞相封魏國公卒贈尚書令魏郡王諡忠定凡四登相位端平間召用真徳秀魏了翁崔與之袁甫諸賢數十人時稱小元祐及暮年再相充位而巳宋南渡後吾鄉位至執政者十八人其詩存者絶少固有惜其不傳者亦有幸其得不傳者今得列此卷僅二人樓宣獻詩以未見其全集所録十七首鄭忠定詩為舊乘所載所録五首嗟夫詩文在世其傳與不傳亦天也可齋陳大卿政成之暇蒐討河渠為鄉國長久慮開萬世利非君侯其孰屬因效一徳以廣盛心焉四明瀛海壖大田沃多稼三江納行潦九穀偏畏夏治水宜講行時哉及閒暇方當暑如惔孰謂晴可乍十雨非所憂一暴良巳怕東有錢湖浸寒玉渺無價西有它山源盈科通晝夜唯此兩支邑厥田俱下下問之何因爾水道無所舎河伯空望洋旱魃巧乘罅緬思井田規畎澮分漵􅆜培浚倘髙深怒潮敢雄跨官但督賦輿誰肯趨田駕六輔能即功百泉豈難壩願言均此施利澤侔造化盡復淮南坡端可儕杜亞再用韻孔明本躬耕樊遲請學稼力田乃有秋暑雨敢咨夏聖賢本憂民孔墨不遑暇因思比嵗饑可謂越俗乍豈惟農夫驚亦使達官怕倉無矯制發米湧在東價若然望豐年譬彼求時夜畫壤來福星上熟壓中下二麥騰割雲五彩紛遶舎苗根舒薤本黍莟拆榴罅龍麟原鏤塍燕尾水分􅆜毨獸將西成秧馬豈虚跨劭農收竒勲省歛不更駕預為鄞鄉謀復廣它山壩功比昔賢倍政随時雨化願刻可齋詩端與雅頌亞湖上口占賣葑千艘底處藏媧天濯熱卧湖光山雲既雨猶相逐水草無花亦自香埜徑偏穿人借問僧茶旋㸃客先嘗反思舉世趨炎者誰識蘋風五月涼咏六和塔經行塔下㡬春秋每恨無因到上頭今日始知髙處險不如歸卧舊林丘題東山寺謝公雅志在東山一入黄扉不復還公去我來山屬我為公償却半生閒薛縣尉師傳紹定五年進士官某縣尉所著有雪蓑集六橋閒步二首出郭青岑近臨流白鳥飛笙歌春雨歇草樹夕陽㣲山色邀藜杖湖風颭葛衣虚舟林處士不見鶴來歸向晩西湖路烟霞淡水汀垂楊拂波緑芳草幔堤青地僻漁樵聚山深殿閣扄平生卜投老夢寐有南屏薛郡判師魯不詳苦雪六出夫何甚經旬散野堂喜心翻作厭瑞物恐為殃嵗晚思新火天寒望太陽荒村風雪裏賴有隔年糧過王處士竹莊臨流結屋植琅玕中有髙人詠考槃一曲秋烟青欲滴滿林春雨翠堪看山僧過乞歸雲杖漁父來分釣月竿千古王猷惟此癖但知此外别無歡禮部尚書王深寜先生應麟字伯厚與弟應鳳同日生九嵗通六經父撝性嚴急每授題設髙座命先生兄弟坐堂下畫燭為期少緩輒怒呵之由是先生為文益敏疾年十九舉進士由衢州西安簿再調揚州教授先生嘗愾然謂今日業舉子者耑以沽名既得便一切委棄制度典章漫不知省非國家所望於通儒也遂閉門發憤假館閣書盡讀之手輯玉海二百四卷遂與弟應鳳相繼舉博學宏詞科添差浙西安撫司幹辦開慶元年策進士召入為覆考檢㸃試卷官先生得一卷曰是卷古誼若龜鑑忠肝如鐵石臣敢為得人賀遂定第一及唱名乃文天祥也稍遷太常寺主簿面對上愀然曰邊事甚可憂公言無事深憂臨事不懼願汲汲預防毋為壅蔽所欺時丞相丁大全方以㑹計得幸先生復極言邉信若此重斂必失軍民心遂出判台州初大全欲引先生為御史不應及大全敗一時附和者俱禁錮而先生迄召為太常博士擢秘書郎彗星見應詔極論執政侍從臺諌之罪積私財行公田之害遷著作佐郎湯文清公漢為少卿與先生居隣墻晨夕講道先生論闗雒濓閩江西之同異永嘉制度沙随古易蔡氏圖書經緯西蜀史學通貫精㣲剖析幽渺湯公歎曰吾閲士甚多惟伯厚甫為真儒使真文忠在願同在弟子列㑹湯公耄年力引去遂薦先生于丞相賈似道理宗崩度宗嗣位攝禮部郎掌丞相箋表故事聴政御正殿丞相上四表即允一夕百官㑹臨宫中丞相命省吏致命於臨次曰嗣君入纂大綂讓禮宜加多願郎中賸多三表先生即臨次操筆吏拱立以竢須臾具進丞相大驚兼攝學士院侍經筵時丞相耑拜平章左右相葉夢鼎江萬里俱避去闕相數月似道遂亦數求去邀上上惴恐不知所以先生奏言孝宗時亦嘗闕相逾年上如先生所言慰諭之似道大疑上安得此語後知從經筵所授深忌之㑹冬雷先生疏言十月之雷惟東漢數見命令不耑奸邪並進卑踰尊外凌内之象當清天君謹天命休天徳回天心守成必法祖宗御治必總威福巳又直前奏事謂用人當先察君子小人似道積怒使臺臣駁之出知徽州先生父撝嘗知是郡其父老俱曰此吾清白太守子也先生治郡摧豪右省租賦一年大治㑹掌制乏人衆論合推先生似道亦曰固非伯厚不可召為秘書監仍兼中書舎人又極言邊事似道更謀逐之㑹以憂去似道敗復起兼直學士屢疏國家大計日食言荅天戒五事陳備禦十策俱不及用時國事日壊史院無人凡封拜將相偏行諸房詞命皆出先生手從容應當忠義之心溢于言表轉禮部尚書給事中階鄞縣開國伯丞相留夢炎用徐裳為御史黄萬石除江西朱禩孫禩江陵夢炎猶除拜二帥不止先生徼奏論裳為夢炎同鄉有私人之嫌萬石等誤國罪大夢炎舛令愎諌今日賣除者多其任用之人疏入不報即引歸家居凡二十年自號深寜老人及宋亡益杜門不出所著述只書甲子晩嵗自為誌銘有曰其仕其止如偓如圖卒年七十四所著深寜集一百卷玉堂類藁十三卷掖垣類藁二十二卷詩考五卷詩地理考五卷漢藝文誌考證十卷通鑑地理考一百卷通鑑地理通釋十六卷通鑑答問四卷困學紀聞二十卷䝉訓七十卷集解踐祚篇補注急就篇六卷補註王㑹篇小學紺珠十卷玉海二百四卷詞學指南四卷詞學題苑四十卷筆海四十卷姓氏篇六卷漢制考四卷六經天文篇六卷小學諷詠四卷先輩言古今撰述之盛前無如葛稚川所著書六百餘卷其次即先生所著六百八十九卷亦極盛矣先生歿後其書刋布者玉海困學紀聞詩考詩地理考漢藝文志考通鑑地理通釋諸書共十五種惟玉海盛行于世先生少從鄉先輩王埜受學得真西山先生之傳源緒精密故其玉海䟦語曰余幼好竒耕獵詞圃麗澤西山詒我萬撫北山之鈔西齋之目披華啓秀歴歴載腹竊吹六經叨榮兩制汗顔前脩皓首曲藝斵輪不傳屠龍無用緘之青箱以詔洛誦觀先生所自述可見矣挽袁進士鏞詩天柱不可折柱折勢莫撑九鼎不可覆鼎覆人莫扛袁公烈丈夫獨立東南方欲以一巳力代國相頡頏適遭宋阼移恥為不義戕奮然抱志起誓欲掃欃搶㧞劍突前麾手回日月光賊勢愈猖獗山摧失忠良嗚呼絶倫志不得騁才長妻孥悉從溺枯骨誰為襄忠烈動天地游魂為國殤山水倍堪悲抱恨徹穹蒼穹蒼幸一息庶㡬紀星霜西風白楊路哀猿號崇岡解劍挂墓柏泣下沾衣裳惜哉時不利抽毫述悲傷薛知縣琦所著有自笑編題荆浩畫青山白雲卷渺渺山上山隠隠樹邉樹鷄犬不聞聲居人在何處扁舟載酒來相尋古木蒼苔一徑深白雲不飛青山舞誰悟荆生㸃筆心舟泊五聖祠前葉落古祠前村安許宿船人聲齊到客月色獨歸禪野火明秋渚山鐘出寺烟推篷不成寐霜氣覽江天史唐卿與兄䝉卿同中咸淳元年進士鳳鳴洞何年雷斧鑿山裂六月蒼崖㵼飛雪孤鳳一聲去不聞海水桑田㡬興滅我知仙去仙當存時見真形坐岩穴青天半夜玉簫寒喚醒幽人弄明月楊再十一君失其名氏吾鄞名族前有史鄭樓豐後有楊陸張屠君即楊氏之始祖也少有詩名至徳祐以後自以世為宋臣遂髙隠不出作咏史詩以自見子孫守其訓俱以傳經世其家所稱鏡川之楊執義不仕者也後七世而為文懿公兄弟始大顯于世書感楓江渡口草萋萋桃浦橋邊夕照低惟有舊家雙燕子年年飛繞緑楊隄潦倒江南一布衣家貧嵗晚寸心違不堪倚杖楓江路手種青松大十圍甬上耆舊詩卷二

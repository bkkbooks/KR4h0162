body:
  text: 甬上耆舊詩卷八監察御史胡文學編序曰嶽有五天下之望也而于其所鎮之地瞻仰益親詩曰泰山巖巖魯邦所瞻是則先為其國之望而後為天下之望也然尤藉維嶽降神篤生聖賢名士大夫以表其國始足重于天下泰山得長羣嶽共推為宗以有吾夫子在也觀夫子作歌直以身繫泰山存亡蓋夫子道在萬世不亡即泰山為萬世所瞻仰也其餘名山數千百分列天下各與所生人物相為引重吾四明高一萬八千丈丹山赤水名列第九與蓬丘大谷相接其上兩曜星辰通光四穴故號曰四明張衡孫綽諸人稍往來其間名跡未顯自天寳皇帝送太子賓客賀知章歸四明先生歸作四明山註釋客經吾鄉俱曰賀監舊山川而後四明始名重于天下雖前有孔祐後有謝遺塵俱以高士風格栖跡此山而其文章無所見不足為兹山之重也及鄞江桃源五先生起慶厯中舒袁四君子起淳熙中其德行道學裒然人師時稱為四明九先生合薦于一堂以啓來者至成𢎞之間楊文懿屠簡肅張文定諸公俱上卿宿老身擅斯文余亦稱為四明九先生合鈔其詩為一卷以鳴再盛于是吾鄉道德文章蔚然俱起遂若四明㠑嵬亦因而孟高斯豈維浙東所瞻固天下之所共翹企者也況當文懿文定時東里西涯並以國家大臣遞主文柄諸公繼起參錯公卿間相與應鐘呂協宮商以鏗鏘節奏使磬筦在宗廟鼔鐘在朝廷金石在朋友琴瑟在夫婦此誠盛朝之音也余嘗謂大家之文亦如名山嶽然其嵯峨獨立未嘗相競為高而吐翕雲霧自藴靈奇此山之所以大也即其小者雖一丘一巘亦各具體故曰泰山之于培塿亦類也若後來詞家惟知竊冒形狀剝裂膚體便欲自附于正宗此猶思叠石以為嶽聚土以象二崤者也求其布雲歛雨豈可得乎然則世之為偽者即培塿亦笑之況一萬八千丈者哉詩曰髙山仰止惟讀九先生之詩有焉禮部尚書楊文懿公守陳公字維新母張太夫人夢大星入懐乃姙及公生天庭有黒子七如北斗五嵗讀書五行下舉於鄉第一以進士入翰林五品十六年不調當軸有欲相援者公謝不往私曰吾猶􅄔婦也今老矣豈至白頭改節孝宗出閣充日講時太子以奉制立聽閣臣請殿下坐講官宜跪講公執不從文華大訓成進講凡事涉中官俱削去公曰此不足訓為跡其善惡具録以進諸因事開陳兾感上意在侍俱竦然退語曰楊學士真講官也孝宗即位閣臣忌公擬遷南京吏部侍郎上手除南京二字下之次年改元二月公上勸學聽政疏畧曰陛下御極以來聽納忠諫躬覽題奏人謂可幾堯舜臣愚過慮若内養未深外資未博豈能始終如一伏願遵祖宗遺制開大小經筵以講學御早午二朝以聽政慎擇講官與之徴詰疑義曲賜清問左右惟置經書及祖宗典訓輪閣大臣嘗值殿右廂備顧問必使居文華之時多居乾清宫之時少則所得於内者深矣午朝章奏俱親為裁決有大政則召諸大臣面諭得失使各盡謨議諸臣俱得進言常用天下之耳目為一人之聰明則所資於外者博矣内外交養日深以宏即堯舜何逺之有若日講午朝徒應故事章奏並付司禮積弊未革臣竊憂其所終上温㫖報聞次月即御經筵午朝後數年上時召輔臣論政人謂孝宗十八年聖治俱公一疏發之公在部與三原王公恕左右共持正論為閣臣所忌公因屢疏請老且言吏部進退百官衆怨所集尚書恕老成公忠然且不免於臣何有蓋為閣臣發也詔以本官兼詹事專職史館乃太息言國家史事有三大闕未舉靖難後不記建文帝事使當時朝政與方黄死事諸臣皆闕落無傳及今蒐采尚可輯補景帝已復位號英宗實錄猶書郕戾王附宜改正凡疏留中者即有可傳例不登實録宜宣付史館擇而書之疏巳具病不果上適金星犯進賢占者謂賢臣當厄公竟卒上聞訃驚悼贈禮部尚書謚文懿公生平孝友方直喜論著為五經四書私抄常以所見立説務求其是不盡從先儒傳註文章力追大家所著有晉菴藁桂坊藁鏡川藁東觀藁金坡藁銓部藁行世維風編載公為洗馬乞假歸里次一驛其丞與公抗坐卒然問曰公職洗馬日洗幾何公漫曰勤則多洗懶則少洗忽有一御史乘傳至則公門人也跪而起居此丞乃匍伏請死罪公笑使去其雅量復如此公自為兒時作詩輒能吐竒語在史館遂以文章名世李文正公稱其博採深詣典則沉厚自成一家言而愛君憂國感事寫物則得諸三百篇者深蓋公詩裒然大家為宗匠所推重固如此矣送何廷秀赴閩臬鷺車駕言邁南望路逶迤原田厭狐䑕側佇秋鴈飛軒裳速追餞供張臨路岐握手獨何贈良無金玉辭高爵豈傒卜盛名顧難居誓言厲姱節皓首不能虧藥園幽趣卜屋逺囂俗僻在燕城隅開園藝仙藥數畝躬自鉏靈根入膏土抱罋臨清渠逶迤古墻曲依微春雨餘牙甲日以長芊芊華葉敷采蘭露濡履斵苓雲滿裾香徑歩華月歸誦黄虞書此外安所營身心常宴如黄鶴寄周先生黄鶴在人世恥與雞鶩羣翩然出埃􅅽歸巢故山雲琅珢九臯韻玉署時一聞羽儀不可見南望勞我神願采瓊田草寄之大茅君悠悠歲華晚𣺌𣺌江海春夏日内館燕坐感事述寄同官王惟臣丹禁逈幽邃内館肅沉沉疎簾捲清晝隱几獨長吟洪鐘委半野時雨度荒岑徙倚歩庭曲綠樹放繁隂歌吹起長樂間之鐘梵音浮雲翳初旭俯仰惻中襟念彼時棲鳥鎩羽依故林黄鶴伺同舉闗河阻以深莪蒿有永悵松栢多苦心因風寄遥訊慎保雙南金贈魏孔淵皎皎越溪女奉帚君子堂珠翠為首飾玉顔炫朝陽寸帛繡河嶽指間織流黄攘袖主中饋五味薦鼎烹有亡一黽勉淺泳深乃方十年采葑菲一旦為參商掩鼻竟逢怒束緼誰照亡蛾眉本招嫉況乃兼衆長羡彼厲而騃端居以專房葆爾金玉體秉心冽氷霜鉛紅畀嫫母疏布以為裳謙謙待諸娣婉婉奉尊章無言藁砧逺愁嘆損容光白璧汚蠅矢積久自昭彰喪茀有勿逐鳯鳴終鏘鏘題畫雲壁隱峩峩滄浪漫修渚竹樹鬱蕭森山風洒疎雨新鴈下湘雲幽人𣺌何許史館感懷三首在古左右史言動悉分書由漢至國初有官注起居不知自何嵗史職曠成虗有故始闢館編纂亦紛如新人叙陳事何啻濶且疎善慝有難審執筆空躊躇國史明是非將以垂萬世匪果具三長曷由通五志為冠必待工錦使人學製惡羊能敗羣薫猶可同器誰謂天閑中不擇駑與驥崔杼弑其主直筆遭刑誅二弟相繼死南史猶欲書古人守一職往往思捐軀可憐今世士利害論錙銖書事公孫歌虞殯莊生稱紼謳挽歌續遺響百代良悠悠濫觴一以溢遂作滔天流有死必有挽庶人達王侯三良與田横古罕今何稠惜哉操觚士半為諛墓謀狥俗苦難免拒物恒招尤毫端有造化萬物自春秋純冕與獵較孔聖亦何求銀豆謡景泰朝宫中頗事奢侈嘗以銀豆金錢等物撒地使近侍爭拾為笑公因作此謡諷之四方金銀入天府堆積如山賤如土尚方承詔役良工冶銀作豆凡幾顆顆顆勻圓兩銖重朱圅進入蓬萊宫御手親將十餘把琅琅亂灑金堦下萬顆珠璣走玉盤一天雨雹敲鴛瓦中官跽俯魚鱗集兩手如耘競前拾拾多拾少曾盈袖金璫半墮羅裳縐嬴得天顔一笑懽拜賜歸來坐清晝聞知昨日六宫中翠娥拾得黄金豆别有銀壺薄如葉并刀剪碎盈丹匣也隨銀豆灑金堦滿地春風飛玉蝶每月中官拾幾回豆將盈斗葉成堆日用奢華不曾惜滿函猶似雪皚皚誰知此是民膏血一黍半銖非易得内中寳藏固如山懸溜能穿太山石君不見民餐木皮和草根夢想豆食如八珍官倉有米無銀糴操瓢盡作溝中瘠明主由來愛一嚬安邦只在恤窮民願將銀豆三千斛活取枯骸百萬人送人赴臨洮秋日皜皜霜露稀秋江水落鳬鴈飛遠客孤舟下南浦臨風解纜情依依問君西流向何處云向臨洮戍城去洗馬初翻浙海波鳴鞭漸拂秦山樹秦山西連隴山道滿地黄雲和白草鳥鼠三春雨雪深魚龍十月凝氷早氷雪連營嵗巳殘將軍猶欲歴重闗彎弓邏逤城頭路挂劍條支海上山君時談笑青油幕夜枕交戈曉横槊功成凱奏拜侯封衣冠畵在麒麟閣題秋江别意蛟門九月天雨霜潦盡潭清水痕改鴻雁來時月滿洲蛟龍蟄處雲連海君在蛟門客舍中卧聼落葉鳴悲風萬里愁心雙闕下十年歸夢五湖東今朝拂樹臨江涘病馬蕭蕭挂行李斷霞猶照竹山坡新煙正隱梅墟市古渡烟深水滿堤敗荷枯葦共凄凄縁江客棹將揺櫓隔岸人家尚掩閨總戎出郭來相送驛路鳴珂擁賔從楊栁風高鼓吹喧蒹葭露濕旌旗重官亭置酒敞雲扉酒釅蓴香鱸蠏肥黄花晚對瓊筵落白鳥寒衝玉帳飛驪歌乍逐菱歌斷更促繁絃隨急管舟人時報晚潮生坐客翻嫌晴漏短酒罷臨岐對夕陽可憐一别成參商虎蹲山南海蕩蕩馬阻匯北天茫茫蒲帆片幅隨風去知向前江泊何處路指東湖雨後山天横冀北烟中樹舊日三鱣下講堂明朝駟馬謁明光春風被酒看花處莫忘秋江别意長題李御史琨山水圖有山突起何崢嶸下帶疉巘紛縱横泰岳千峰表日觀天台萬仞開霞城平林窈窕連長麓遠近人家幾茅屋幽亭不見客經過芝草琅玕春自緑石梁横去水涓涓一出前山勢渺然彭蠡晴波九江入吳松春漲五湖連孤舟一葉中流渡散盡沙頭羣白鷺舟中疑是繡衣人四靣青山隨指顧繡衣今去遠觀風大江南北廣西東何處江山如此畵歸來説與鏡川翁題畵馬房星委地光如虹渥洼水與銀河通漫説千金大宛種爭看八尺滎河龍乗風一躍臨空谷鳳臆龍􅁂耳批竹紫豔煌煌迥射人紅光赫赫長歕玉霜蹄蹴踏薊門秋誓與八駿驅仙輈不知伯樂竟何在盡謂駑駘翻見收幾年伏櫪柴門裏空向西風時掉尾饑腸誰飼玉山禾渴喉謾想瑶池水由是低頭逐蹇驢不堪憔悴走泥塗壯心尚自輕千里逸氣由來凌九區天閑十二知何處明日長鳴籋雲去一顧當空萬馬羣金鞍玉勒隨龍馭過開河客途一路長淮北萬里平湖曠無極風埃稍静一推篷忽見湖光與山色平湖萬頃際遥天露葦風荷共𣺌然紅鱗亂躍多逃網白鳥羣飛不避船遠山無多纔數㸃雨餘秀色濃于染幾升螺黛暖初勻半額蛾眉嬌不歛對此停舟笑且談兩堤青䕃栁毿毿更聽漁歌引杯酒不須回首羡江南題翠鳥敗葦蕭蕭秋幾月花吐黃雲未成雪小鳥飛從何處來踏著寒枝帶霜折黄腹充盈丹喙長青綃為衣白玉裳美人嬌愛不可見雲水萬里天茫茫山水圖青山萬仞髙挿天晴嵐暖翠浮雲連何人結屋在平麓藥欄蘚徑柴門偏潺湲一曲清蘋水石矼隱若脩虹起竹杖芒鞵白髪翁長裾歩屐松隂裏遥岑一帶逺蒼蒼上有樓臺是寳坊赤髭白足知何在門掩緑蘿眷晝長題畵一區勝景知何許山色濃如初過雨酒旗茅屋稻花田漁網竹篙蘆葉渚水邊髙屋客來過坐對楸枰逸興多捻子連年不曾下旁人爛盡幾樵柯朝陵往還即景出郊時極目禾黍徧村畦雁入層雲小天圍曠野低風沙連塞北烟樹接遼西去去前村近槐隂聞午雞原隰杳無際遥岑倚半霄淡烟新野店斜日古河橋北望三闗近南看萬里遥行行到城郭笳鼔襍鳴鑣早發西溪往萬竹村即景深谷人家住松風散午烟雲封數間屋石甃幾層田牽犬登山上尋魚到水邊共言生事足樂此太平年遊虎丘出城纔數里已到白雲間但見門臨水那知寺有山鐘鳴僧出定林動鶴飛還石磴行行遍花宫盡啟闗書齋即事性懶過從少朝回日掩闗道情雲外鶴詩興雨中山把盞新花發鈎簾乳燕還紛紛市朝裏能見幾人閒寧波襍咏山顛帶海涯竹樹映禾麻雪挹猫兒笋雷驚雀觜茶瑞香金作葉茉莉玉為葩六月楊梅熟城西爛紫霞下邳早發客夜耿無寐雞聲促去舟日從平地出天入大河流宇宙雙雄劍風霜一敝裘老人能復出孺子願從游安港阻風一泊幾晨暮風濤未可涯荒汀如邑里聨舫是隣家野廟鴉啼竹村莊犬䕶花鄮山猶不遠臨眺獨含嗟西園襍咏雨歇水平堤園香翠色齊唼蘋鳬母健拂栁燕雛低馬武伊吾北張騫大夏西吾衰無復夢宅畔且鉏犂夏日東禁道中碧空朱夏日流暉清禁無塵暑氣微香藻滿渠新鯉躍髙槐夾道乳烏飛金鞍御馬追涼出繡服中官走解歸忽聽蹕聲花外起黃旗紫葢入彤闈冬日西禁道中霜風萬户夕嚴凝禁籞寒光拂曙增琪樹有花山已雪玉田無稼海初氷虎城欲啟晨調馬兎穴將空晚放鷹回首凍雲應散盡鳯凰樓上日髙升贈周廷參張邵齡二知己客牕情思渺無涯麥隴蔬畦浥露華白屋三間連野寺青苔一徑入隣家晴烟亂繞庭中樹夜雨微沾户外花此地幽徧可乘興馬蹄來去豈嫌賖送張𢎞正孤舟明發片帆斜路入松江便是家細雨原田𤓰巳蔓淡烟籬落荳初花好携蠧簡宵隨月怕引螺杯曉泛霞莫道弓裘容易學幾人名譽動京華碧川碧溪流下廟灣東一片藍光遠近同黃枳涯間深映月紅蘭港外濶涵空五橋冠履行天上萬户樓臺入鏡中直到星洲垂盡處數行花栁散春風癸巳清明謁陵往還之作一路看花過梵宫從人皆挿數枝紅惹添歸思緣春草消盡餘酣愛晚風啼鳥喚人耕壟上好山隨我入城中候門童稚歡相語留得榆餈待獻翁到錢塘繁華自古說錢塘罨畵樓臺錦繡坊過客盡諳吳俗語閨人猶學宋宫妝雨連江海波濤壯春入湖山草木香于此正堪窮勝賞笙歌隨處醉壺觴躬耕桑樹陰陰布糓啼緑萍新水漲芳畦大卿橋畔雲千頃孝子墳前雨一犂春草竹筐頻飲犢午烟茅屋逺鳴雞卧龍別却南陽後禾黍年年屬老奚客居書事雨餘流潦漫橫塘庭樹垂蘿覆短牆新闢荒畦雲半濕舊開花窖土猶香酒酣與客聽黃鳥書罷呼童樹綠楊一徑蒼苔眠白鹿誰知城市有山莊平坡寺梵王宫殿倚青冥野色山光滿户庭樵採松花來供佛僧披槲葉坐談經綵雲不雨東西畆金谷空蟠大小青酒罷吟鞍入城去數聲鐘磬逺泠泠到江南一到江南域蕭然萬象清雨餘青巘秀雲外碧流明竹色朱門徧荷香畫舫盈舂鉏藏葉下鸜鵒傍花鳴稚子青荷傘厨人紫芋羮山機成細葛野碓熟香秔酒幔連珠箔菱歌雜鳯笙風沙千里客疑此即蓬瀛北河道中寄唯立馬上雨初晴隂涼慰我行纔經潞河驛稍望直沽城萬户人無病千村糓有成水風消暑氣林木動秋聲作客身逾健臨流思倍清裁書報賢弟兼慰細君情疊石巖别山猶愛山疊石事如戯注水學泉聲焚香作雲氣春江曲春山雨過春江滿菱葉長長蒲葉短柳絲一把繫郎船好語東風莫吹斷感懐韶光欲半栁初芽雪盡青山萬里賖遥憶小湖春水濶東風開徧十洲花湖郊即景桃梅初熟芰荷齊緑樹隂隂鳥亂啼北渡幾潮楊葉鮆南村一雨稻花雞春城遊宴詩蝤蛑石首和椒橙新笋香甘帶肉烹非是老饕偏愛此十年不飲故鄉羮太子少保吏部尚書碧川楊先生守阯公字維立學者稱碧川先生六嵗受經傳即通大義以兄文懿公為師於書無所不讀然必以六經四書為宗篤行力脩不專事文藝中進士廷試一甲第二授國史編修在館九年適從兄康簡公為姦人所中謫外遂併出公南京公怡然就道曰此吾家盛事何懟耶孝宗即位召充日講官每進言進君子退小人為治亂之機言甚激切上改容聽之冄出為南京吏部侍郎以星變陳五事上嘉納焉復召脩㑹典記載精詳史氏莫不推之年七十力請老進吏部尚書致仕公孝友天至終其身少事文懿公比歿為位哭奠者三年目視為不良兄弟三人長文懿次公少弟與婦俱早世所遺二孤養之逾於已出同爨者三世巳而食指益衆請分食公乃以上田十餘畆奉父祀文懿公諸子受田九十餘畆弟遺孤受田六十八畆公自受十九畆人俱謂不均公曰吾兄早宦今薄田多其所置少弟不禄早世二子孤貧稍以此資之吾尚有一官可望也公初歸田有積俸𨽻四百金將分授二子適康簡公為逆瑾罰輸米千二百石苦無措公盡出與之夫人少有靳色公怒曰兄弟急難豈暇顧其子耶公性重黙與人語温温易接若義有不可輒怫然終莫能奪家居有貢使造謁公上座置之席隅與語甚嚴正既退客謂公宜少霽顔色公曰吾大臣不可失中國體御史張君公門士也初按郡乘夜先詣公公問曰御史未謁廟何先枉臨張君屏左右曰恐有所賜教耳公正色曰疑老夫以事相干豈待我意耶遂黙不答張君惶恐而去嘗與郡守褚公從兄康簡公出送屠太宰行康簡曰特具小羔奉餞褚守笑謂公曰若老先生當直言小羊耳公怫然曰先兄初發解予忝繼之人皆呼余小解元及俱為學士人亦呼小學士後俱為吏部侍郎人復稱小侍郎未聞直以小楊見呼公何從得此語褚守至謝罪乃已正徳七年公年七十七其生辰七月七日公命諸子置酒陳鼓樂盡召同族數百人歡飲竟日别去公徐曰此會後未可期也衆茫然至中秋先生無疾而逝所著詩文集及他撰述十餘種初楊氏里中花木往往有連理雙瓣者里人竊異之不知其何祥也既而公與兄守陳皆舉鄉試第一皆甲科髙等官翰林對掌兩京學士位並少宰方知其兆余嘗按公家乘三世大父栖芸先生範贈吏部右侍郎生三子長自懲公父贈吏部侍郎子守陳進士禮部尚書諡文懿次即公進士太子少保吏部尚書次自悆公仲父贈大理寺卿子守隨進士太子少保工部尚書諡康簡少自忞公季父贈兵部員外郎子守隅進士廣西布政使文懿公二子茂元進士刑部右侍郎茂仁進士四川按察使而公壻陸偁進士按察副使三外孫長鈳進士副都御史次銓進士廣東布政使少釴一甲第二山東按察副使次壻李堂進士工部侍郎蓋公少傳文懿之學一門次授七業俱成並為國家名臣及陸氏諸外孫俱經指授能世外大父科名蓋東南文獻於斯為極盛矣古詩焚書有禁令博士書不焚蕭何收圖籍不知收典墳項氏火秦宫博士書始燔殘編出孔壁天未喪斯文修𥙷漢儒手亦各尊所聞寥寥千載下先後亂其真全經乆已失其罪非一秦范蠡大夫種同謀終霸越蠡去思全身種留欲全節楚人仕越中翩然誰能遏種居父母邦何忍便永訣蠡以尺書招種病不朝謁烏喙信讒言屬鏤賜之決哀哉大夫死尺書為之孽上天徒蒼蒼千載猶憤結歸思鵬摶萬里餘不如沙上鳬鳯翔千仞表不如屋上烏鳬雛能傍母慈烏能反哺鵬鳯雖高舉二鳥之不如我為浮名累别母來京都定省一以曠音問亦云疎不勝孺慕情淚下沾衣裾如何天性恩乃為名利渝拂衣便東歸慰我堂上慈懷哉鳬與烏吾與爾為徒贈别王原常西北有高樓逶迤上千仞廻欄俯綠水阿閣凌青雲中有絃歌曲知者識其真自云良家子選擇趨嚴宸佩玉曵羅裳欲以充下陳朱顔俗不薄燕趙多美人無鹽逐鄉里毛施亦逡巡容華恐消歇撫心一以矉明德茍不虧燕婉終相親芙蓉湛秋水桃李熙陽春隨時愛容輝無為長苦辛賦得洞庭湖送侯公矩僉憲我聞洞庭湖逺在巴陵道含山復呑谷洪波際天杪古來題咏人無如杜陵老朝陽一鳯鳴千古喑百鳥如彼黄鶴樓李白不復道吾才非謫仙下筆為壓倒況未臨此湖狂唫何草草所志不在詩因之寄懷抱願君胸次間與湖同大小百川盡傾輸萬象皆明瞭秋濤動山岳春波潤枯稿浩氣蒸作雲為霖施八表喜雨次沈侍郎韻方春苦恒暘衝風起浮􅅽田疇拆龜紋洿澤枯蚶蛤鬱攸復為灾熛忽不可㷈曲突朝徙薪防虞夜移榻縱隂北門開閉陽南門闔仲舒今秩宗問之笑不答但云人意誠自與天心合糾衆各致齋端居在深閤獸錦易素衣馬銜脱金匼分祀徧雩壇俯躬伏蒲蓋索神靡不舉占天敢容襍垤蟻移新封巢鸛鳴古塔一雨初未厭三日竟已帀麥苖潤囘青藤花溼挂衲農樂呼烏烏女紅歌踏踏畢方杳無踪飛亷亦衰颯南都百萬家歡笑聲襍遝東作自此興省耕重相拉行厨有宿煤代薪寧用蠟當呼田父來喜雨共傾榼喜雨之作人各二篇因再次前韻旱久雨乍晴街衢走囂􅅽花殘失蝶蜂草潤鳴蛙蛤皇州春正深燕寢香未㷈題封山公啓對坐陳蕃榻詩筒時往來尺牘互開闔司空歌陽春寡和誰能答平生館閣儔高興符節合太宰李杜壇好賢公孫閤矢口唾成珠筆史漢流匼宗伯今董狐瀛洲舊推蓋登瀛學士有蓋文達才華老愈新志慮純不襍翰長有馬融同年登雁塔長城擅五言破敵圍三帀嗟予韈線才無足綴短衲詩人有冠冕能不棄革踏志喜慕歐陽牧民思衞颯催耕布穀鳴勸課輪蹄遝麥秀綠方滋桑柔青可拉賓從皆蘭金貎言匪梔蠟莫誤尚書期還傾侍郎榼喜雨之作承教再三重以上已詩見賜復次前韻奉答我觀古韻書字無土從盍壒字于蓋翻協音不同蛤蒼頡九方臯眼電誰能㷈牝驪報牡黄偏倚誤臨榻得精或忘粗開口音反闔沈約譜四聲天子親問答平仄毫髮分清濁宮商合豈若蛙黽鳴無謂祗閤閤水木有本源衣裳有冠匼誰知百世後車葢混茅葢司空休文裔家學精不襍聲律永明體字書多寳塔用韻公豈訛閲書吾未帀坡仙非鈍根玉帶博禪衲韓詩逸旁韻飛黄恣騰踏羣疑宿霧消兩腋清風颯喜雨賡未休上已吟復遝無煩問舌存豈慮傷齒拉欣然觴咏間刻燭銷紅蠟吟成一字安直抵千金榼大兄和東坡龍鍾三十九詩見寄次韻奉答先世本儒宗環堵圖書半傳家嶧陽桐一唱而三歎吾兄博羣書禮樂勤服玩開口韶鈞鳴下筆雲霧散一舉冠同鄉結交青雲伴制䇿對天人名聲騰月旦朝趨金馬門日食青玉案汗簡手編摩一一書治亂詩文馳四方應酬失櫛盥先後十年餘一階遷陟緩節操氷霜同忠誠日月貫行年未四旬志強力不愞胡為詫龍鍾置我腸中炭願保千金軀逍遥在三館夏宜葛苧涼冬宜狐貉煗重為皇家珍饔飱加白粲奉賀家大人署德化縣瓦礫創殘地春來土不毛士風忘俎豆民俗競錐刀文廟檐穿棘公㕔柱結蒿于焉施政教朝暮不辭勞撫綏纔兩月犬足已生毛有地皆牽犢無人更佩刀閒栽庭外柳漸見獄中蒿從此居官逸都忘案牘勞陳方伯邀觀惠山泉古廟三賢在方塘一鑑開水流螭吻出源發鷲峯來樹影波心見茶香雲外栽竹爐有風味醒却紫霞杯甲子元日去年正月候朝叅此日瞻天北斗南新喜歲華逢甲子早傳家事付丁男避賢未許六旬九祝聖惟呼萬歲三重祿坐叨無以報伐檀每誦不勝慙和武靖侯趙公賞花詩韻花蕚堂前鵲噪檐怡怡情興為誰添朱門急遞書函到白絹斜封印色黏入眼新詩皆似錦驚心險韻莫如鹽吾兄信口天然妙愧我詩才撚斷髯與大兄同和傘蓋三檐兼兩檐輪蹄偏為賞花添鳥啼深樹千聲轉蜂掇花英兩股黏玉液醉人甘似蜜粉花當靣白如鹽興來就此題詩句龍劑流香兎秃髯宿霧初收雨過檐侯門池館綠隂添波間香餌金鱗出葉下黐竿翠羽黏謾遣易牙調異饌不教符朗識生鹽酒闌夜色清如水露滴松梢濕老髯嶺南荒醜擾窮檐仗銊遥征竈日添横石剗開無復阻大藤劃斷不教黏首功何但三千級軍石曽資十萬鹽共説圖麟充國胄軼倫重比漢家髯戎衣重甲鎧重檐曽向沙塲鋭氣添刁斗夜鳴霜氣逼牙旗凍裂雪花黏赤霑轡上龍流血白蘸盤中虎作鹽聞道當時宣露布天顔一笑動龍髯五色祥雲擁殿檐太平祥瑞近來添牙旗玉帳閒無事紫氣黄塵逈不黏振旅何嘗忘俎豆籌邊已免税茶鹽詞林正遂天倫樂忽漫相招展笑髯數仞門墻百尺檐登龍聲價幾人添詩書元帥身将老竹帛功名墨尚黏對酒還教停鼓吹烹茶不許入薑鹽承歡侍宴羣公子白面腰黄頰未髯春深滿耳鳥鳴檐景物撩人興趣添柳外貂蟬金翠閃花間毬馬紫紅黏龍綃細舞垂垂手象板輕歌昔昔鹽主客情親歡宴久一簾風色動蝦髯南坡高臥北窻檐眄睞庭柯晚翠添斂翮來歸知鳥倦升高不返見蝸黏醉吟詩句敲銅鉢病檢醫方鍊石鹽却憶壯年提一劍功名如摘頷間髯燕罷歸來向晚檐一門和氣笑聲添竹林涼月琴尊待棠棣春風蕚蔕黏賡詠盡諧音與律妍􅑦無論絮和鹽諸孫問事誰嗔喝膝下嬌兒也挽髯與楊廷俊同齋同官同姓又同階同作宮僚共宿齋四壁寒聲風刮户一簾清影月侵堦奚童秉燭燒香篆侍史收衣護祭牌坐久話闌心似水塵氛無路入襟懷别墅廛市西頭别有天芋區桃圃近相連繞城春水魚浮沼負郭秋風鶴在田書幔影飄荷葉外酒爐香入稻花邊主人高步瀛洲上猶自哦詩憶輞川飲大理家兄宅時駕部弟秋官姪及君美御史時升府丞兩壻皆在席醉吟一首幾年離索重相逢笑語哄堂意氣濃薛氏弟兄三附鳯桓家女壻兩乗龍竹林更有青雲器棘寺新開綠蟻封家慶合歡䝉帝德勉圖勲業佐時雍上元後一日前客再次童太常韻座擁紅爐雪未消清卿詩就倡諸寮狂吟筆訝長虹短劇飲杯嫌太白么六出花明天作月九華燈逈夜如朝酒闌客散長安道萬井瑶光映玉貂上元後與維新維貞二兄小酌時維貞以應天府丞入覲聨騎珂聲疊里閭紫荆花底解金魚蘇家宣政同朝久謝客東嘉述職初酒啓黄封中禁出燭銷紅蠟上元餘良宵漫叙天倫樂月轉觚稜映綺疏到家喜入新第新居門瞰日湖邊一脈南來自碧川爽塏更新齊相宅清寒依舊廣文氊無何文字五千卷有此辛勤三十年歌咏落成貽後世能師吾儉是為賢次韻寄姪茂仁郎中南國移居有竹衙平安消息報京華傍籬已見新生笋穿徑還侵舊種麻每對此君思小阮無繇縮地與陵霞重懷文懿歸遊處啼鳥驚心泪濺花壽直菴黄君七十納涼夜對老人星兒輩前趍適過庭言説貢生家有父年過萊子鬢猶青孟春初度三蓂莢清世高風一草亭我為題詩遥上壽鶴飛南去入滄溟凍筆章臺頴脱出羣倫日染龍香劑潤身涉署氷銜頭欲秃題封山啓蹟還新中心正直端應壯小字模糊大轉神莫話秦人少恩事不遺黎老咏皇仁閒居漫興公署抽毫每隔旬私居終日樂閒身滿床黄卷為師友排闥青山作主賓一任漫天風絮亂祗憐匝地雨苔新日高卧聽鶯聲巧不喚雞鳴待漏人壽史母一百一歲峩峩珠翟翠雲稠堂北高居壽最優大衍再周重挂一平壺百刻又添籌賢孫及第傳金帖令子懸車尚白頭屈指古今能有幾題詩更祝八千秋竹茶罏次吳原博諭德韻渭濱蒼翠隔雲泉誰取編排事茗煎鳯閣舍人工創物秋靈公子巧模前火紅松葉湯初沸月白桃花客未眠飲罷雪香三弄笛閒中清趣幾人全視篆後二日得孿子日出東城啼乳烏檐前乾鵲又相呼判花公署方投筆坐草私門又挂弧自笑秋𤓰生並蔕休嘲老蚌出雙珠多男且得寛懷抱未計将來賢與愚紙帳楮生平素懶談𤣥只學垂帷到暮年午蝶有時同寤寐秋蚊無路得夤緣虚中唯見室生白覆下何愁屋有天自笑夢中翻識路月明曽到故人邊得請喜復原韻去歲蜩鳴入覲來今年鶯囀出金臺四時有序成功退六十猶癡了事囘鍾阜曉山青抹黛秦淮春水綠于苔濯纓還向江東去免得風吹撲面埃園亭家宴次大兄韻風吹香徑晚菲菲落盡紅芳蝶過稀卻是蔓青花獨秀春深猶解駐清暉應制賦苔禁苑初收宿雨天玉階輦道碧苔鮮君王自是稀遊幸一任飛花㸃翠錢工部右侍郎堇山李先生堂公生時父夢人抱兒從日湖陸司冦家來及生果異八嵗日記數千言每出語輒驚坐客及冠先輩洪石田先生字曰時升為説以勵之舉于鄉坐南太學與麻城李文祥俱以詩名時稱為二李中進士授工部主事監稅蕪湖中官宋昻指取御木困商人其勢張甚公至力尼之寛商課嚴立籍記昻蟊獵無所深銜之自後中官遂不踵差遷營繕郎中值清寧宫灾為太皇太后寢所上手詔營建公請發内帑無徴民以答天戒衆議工費既定公請減十之五及告成尚贏其十之三詔進公二階公三疏力辭謂營繕乃臣本職錢穀出入尤士類名檢所闗不敢膺殊典以招物議次年重建禮部脩闕里俱取給前積益為司空倚重復奏省元宵燈火縻費取囘燒造窑器内臣痛抑寧藩濫請及罷吉鄭諸府非時造作公私賴之遷應天府丞㑹嵗饑盜賊蠭起相聚公單騎諭以禍福惟斬其首亂者餘盡解散當軸俱謂公可屬大事應天鄉試有賄通得舉者公提調為奏黜三人歴遷工部右侍郎督修徐汴河鎮守河南太監廖堂與逆瑾表裏深嫉公竟為所中因力請疾歸里詔許公乘傳痊日有司勸駕乾清宫灾朝議起之不果公歸里十餘年築堇山草堂著書其中每云吾自十五至三十學為仕也皆皮膚自三十至五十仕而學也皆土苴四十乞身五十得請冀由史而經即事求道辯疑衍義以待後之人所著有正學類編四明文獻志堇山全集學者稱堇山先生擬古謫龍乖雨令洊雷失帝威蟇藏月乃食蜃毒星掩輝顛風坤噎氣擊雹物遭痱獸驚嶽揺震鯨奔海沸飛觸山天維缺射日陽光㣲誰為咎沴氣感召隨化機王禎百靈順咸若彛典徽憂懐嘆杞國何事獨沾衣蝜蝂亦㣲蟲貪心若不足金䭾欲聚陵黍登願彌谷寜知稊米軀一芥巳盈腹不鑒海賈愚腰纒竟沉覆亦如紫峯駝脊負馳岡陸千金輸阿誰終為翠釡肉吁嗟激水鵬海運風雲逐扶揺九萬程翼巨不容粟擬古送儀部楊君謙致仕歸東吳朔風吹華髮驅車出都門雪消原野潤爽肅無塵昏行行望吳㑹白雲依逺村俯憐丘壑姿仰銜海嶽恩身完道乃立志適理斯存達人㑹有見耿耿胡具論南行歌勸君莫唱南行歌幽夕聞歌更嗚咽潞河錦䌫指天津載滿魚鹽沽海竭田畝樵蘇屋宇薪千里帆檣宮府列所司貢獻立程規器皿厨珍懲莽裂觸禁愆期條例新入金贖罪可即雪乗時行令玩物華弋獵遨嬉忘歲月守衞鞕驅撫按趨齊魯淮陽勢如􅅡長江天塹布龍舟平履金山登􅏭嵲𤓰步千官戎服鮮駕近留都咸伏謁六軍萬騎塞閭閻隨處觀風矜瑣屑劇戯搶攘法從先入城百技喧舊闕宣傳苖狩起鍾山麋鹿潜踪鳥避節龍江彩綺鬬划船角撼金鉦鼓撾羯網罟星羅𤣥武湖浪説吞舟魚可截甲胄躋攀牛首遊士馬輿屍觸炎熱長干兵器動哀鳴晉石訛言自消滅皇朝景命比天齊杞國何須泪垂血翠華歸馭忽倦勤導俑羣姦膏斧鉞山陵北拱眼成枯貞白臣心何處揭題家藏堇山莊小景圖歌四明四面山列屏佛頭螺髻咸獻形直與扶桑接天盡逺粧近抹千里青堇山居士眼何小甘倚一拳藏拙老赤堇原分烏喙名豈不慙芝愧瑶草拙翁聞笑但低頭腐朽未許汙岡丘秦漢因兹起封邑敢與岩壑論春秋適然先世遺薄田結屋可望山之顛課農乗興即長往安流五里歸放船半生京宦淹南北曽假丹青寓心目賜還骸骨又幾年今日山莊懸此幅看來不辨山與圖晴峯潤墨争模糊溪籟松簧送繁奏此身如在氷玉壺烹鮮開釀香滿屋醉眼呈書信口讀心期粒飽秋日黄更願桑垂春雨綠莊前曉霽嵐霧消堇山橋去不斷橋直向天童躋太白東尋玉几攀金鰲沙溪菴弔深寧墓史相大墳僧闖户採得靈峯方竹笻趙陵幾塚榛迷路探奇欲再力不勝闔門坐聽山鳥鳴欲示兒童假圖景囘江逺泝溟渤清武基道中野館夾通津看花駐馬頻暖風廻宿麥甘雨及殘春雀乳羣相咏鶯雛語未真亦知歸路晚詩景苦留人堇山莊雜咏嬾步出柴扉心情與世違偶逢樵父語漸覺故人稀牕啓流螢亂梁空乳燕歸遊仙空有夢骸骨本來非紅葉亂紛紛秋光到小村莫憐蒲柳脆幸與菊松存猿狖饕山果牛羊戀蓽門石牀涼不寐流水激籬根歩覺行雲緩人驚白髮新水聲宜入夜樹老不禁春欲與山為主還留月送賓終南非㨗徑何處不容身薜荔隱山家層巒入徑斜著書人未老習静思無涯雨意收黄霧雲容暖白沙課耕詢税額欲免吏如麻甬江出郭偶乗風天終吾道東醒心還愧影謝事每書空水鳥依人白江花信意紅餘年詩譜在寂莫酒杯中江柳愧先秋風光即柳州潮聲疑舊雨暝色弄新愁獨喜天青眼人驚浪白頭微陽方布暖莫遣瘴雲浮登天封塔瑶空露玉簪試脚上危尖日近光揺幌嵐清翠入檐天風涼颯颯花雨晚纎纎笑指雲霄逼星辰手可拈風暖正雲閒危欄怯近攀眼中分世界鳥外列江山南斗雲霄上東溟浩渺間乗槎餘逸興高處不愁寒病起久静成枯石栽松記鶴年舊遺非草芥時輩見曽𤣥井泥泉乖雨風高爵避鸇椰榆人鬼夢凡骨本非仙春夜聽雨志喜為悉灌園情挑燈聽雨聲四郊春雨足一枕夜堂清紅憶花如染青憐樹欲晴明朝南郭外沙軟馬蹄輕夏日遊翠山寺尋張即之秘閣遺事五月桃源路山深不見花綠肥梅薦玉黄實蔓垂𤓰磴伏雲根斷溪長鳥道賖梵宮天設險僧飯熟胡麻正德丁卯冬以府丞應召寓德州永慶寺奉寄仁仲家兄商決去就之懷用蘇集韻二首江湖踪跡嘆參商夢入明光覓舊行自笑天涯身未穩何如林下日還長三間白屋書充棟十畝紅粳業在鄉獨坐客牕風雨急無由縮地卜行藏客中懷抱幾囘開心事都憑雁往來當路有岐應惜往畏途知止合憐才正愁門外塵封睫且覓床頭酒暈腮千里鄮江晴漲綠幾時蕩槳亦奇哉山莊謾興輕風吹袂步晴堤曉樹拖嵐路欲迷茅屋可容溪月小釣船不礙石橋低原田布糓催春草籬落炊烟報午雞寂莫逋仙千載後何人真隱上新題重游天童和同行王侍御韻長風十里散雲圍登盡危峯思欲飛路夾青山天有障林飄紅葉鳥無衣玲瓏石應千巖響太白岡通一線微幽谷驚傳驄馬使不妨老稚款柴扉秋江漫興涼風一夜發東溟庭葉聲催客鬢星露重更憐秋月白烟輕倍見海天青喬松積歲期成珀老鶴長鳴忽墮翎過眼風華何足問謾臨池靣數浮萍溪山春暮呈魏雲松先生閒坐溪頭看落霞飛來片片㸃晴沙春歸不了鶯花夢節去還留燕子家稚女攀桑收野繭老人燒竹焙山茶小堂靣靣流寒玉風景依稀似若耶東錢湖絶句東湖風景過西湖史相祠宮列畫圖不用舟人頻指㸃留詩欲弔岳墳孤相公囊括宋山河鑿石穿雲作補陀若見厓山還好景慈元宮殿碧嵯峨游補陀洞天深山何物仆穹碑石穴金丸禍已隨莫歎師王空一槨穆陵遺事更堪悲僕碑梵王宫殿七浮圖殿趾層層漫綠蕪幸有老松人不剪滿林落日正啼烏大慈寺太子太保兵部尚書張文定公邦竒公字常甫母沈太夫人方姙夢神人奉玉笈寳籖相授及生公有雲如蓋降于庭少資性絶人于書無所不讀精思善學期造為聖賢年十四即能著作十七舉以明經計偕中進士改庶吉士内閣劉文靖公李文正公每稱公不容口由是名重館閣問正徳初年進簡討時逆閹劉瑾擅政朝士多附其門公居常憤憤著張騫乘槎賦以見意蓋以瑾喻西域以騫喻附瑾者也竟力請補外以便迎養出為湖廣提學副使公至楚修岳麓明山二書院身為諸生説經且下令曰學不師孔顔行不希曾閔即有文如雄褒吾且斥之世廟時在安陸藩欲就學告試公為别設一臺課文送入學至今張提學名重楚中未幾竟致仕嘉靖改元冄起為四川福建提學歴國子祭酒南京吏部侍郎居父憂帝嘗奉章聖皇太后過天夀山謁諸陵言及擇相太后曰先王嘗言提學張邦竒器識他日必為太平宰相其人安在帝謝曰尚未用也即不竢公服闋召為吏部侍郎帝每閲公章奏輒稱善以指書公名衣帶間宫監數望見以白公公答曰上用我當以堯舜之道進舍我亦有田可耕此非吾所闗心也諸璫為色沮帝常與翊國郭公内閣李文康公論及人才二公謂公學行文章當世第一帝欣然曰朕意亦然時公遷左侍郎攝太宰故事選部除擢率先白政府公曰黜陟自有至公今乃覘當軸為用舍豈國家設銓衡意耶遂不往白李公心不平適主斷詔獄翊國夜舁金四萬詣公第請寛其家人罪公不受曰法者天下所共即天子亦不得私之況我曹耶卒入其罪翊國更深銜之及帝欲遷公太宰此二人竟尼之且别使人攝公不為動帝數欲相公都尉崔公秉一陶真人俱帝所最幸聞其語因各遣人道意但一枉臨即可得相公謝終不往裕景二王冊封朝議謂秦晉齊楚建國甚多今宜營浙閩以均民力公獨不可曰江南財賦所出且接壤留都國初封吳王即改於周二百年來誰敢復建此議事遂寢帝慕道於無逸殿改稱永光宫欲令内直大臣簪冠如道家内閣夏公謀之公答曰使我等背聖人不能從也母老乆思故鄉今日乞歸有名矣諸公任為之帝聞乃止同里部郎豐坊坐廢家居數從公求復用公不可乃輯世統謂聖祖系出文王宜建明堂封禪以示萬世為圖説成帙獻之帝惑其言心動召所幸諸大臣與語俱請退諮於公公曰其人少有文學行多不檢聖朝豈乏此一人今郊廟土木大興疆場不靖若復有此舉海内何堪諸大臣以復帝更召公賜問公答如初帝乃止坊候乆冄上卿雲頌以伺意帝終念公言但宣付史館而已坊竟不用太后將合𦵏獻陵帝召諸大臣曰廷臣惟張邦竒至孝可授禮部尚書兼都御史以行翊國奏曰張某雖誠謹然其才不足大用且年淺嚴相嵩乆嫉公亦奏曰國家禮卿無兼憲職例帝黙然而罷公復以母年踰九十力請改南乃出為南京兵部尚書然帝常念公輒曰張某何在數欲召公入相嵩更具宻劄謂公性至孝母老不樂北來即強之必不為用也帝頗信之㑹熒惑入南斗留都雷震中夜星殞於江公謂天變異常宜嚴武備占者曰應在徳望重臣次日公不能冠櫛卒年六十有一是日鄞江潮赤涌起髙丈餘帝聞訃驚悼數曰可惜張某可惜張某即面諭輔臣遣恤俱謂例應自請乃止後閣中擬謚以文恪文敏進帝於疏右御書云人謂張邦竒真道學抹去原擬四字大書定字於後贈太子太保苦雨孟夏乃淫雨朱光轉凄其出門泥淖深平疇漫成池雨龍一離窟癡雲挾遨嬉淫淫翳空下滔滔無厭期靈湫至大頂蛭螾鳴其涯風波倘失據卼臲當告誰梭懸雖復奮魚腹終堪疑吁嗟望歲心閔閔誰能知迎春二曜遞升降隂陽互推移隂陽各異致平均乃其歸君看至賾裏象數無偏奇凝寒既已極冉冉生光暉庻形自終始誰能測其機蒼天不自言知天一何希去冬大江南積雪平茅屋經年理絲者褐短不掩腹惟見貂裘子環爐向􅌬醁一飲千黄金棄置紈與縠沉思終永夜感嘆淚盈掬青春獲我心暖氣先窮谷閉門終日坐不知天地春鴻鈞一以動百物相鮮新憶昨彫落時梅李各有仁如今發生氣亦復資絪緼太和絶渣滓太虛無私親達人均四海愚者分比隣嗟予二三友歡㑹當及辰我有一尊酒可以陶吾真惑興明主錄忠良鼎餗酬明德世運一以遷有時榮藿食藿食非所榮清修表孤特如何眯目子勢利紛相射緹䌌空十重卞璞委荆棘矯矯皇甫規超然分玉石呼卿問雁門倒屣迎縫掖送王宜學編修謫官三河驛二首悠悠天地間萬里亦人世人世無險夷所貴展心意況子抗忠言投荒本非愧何事當别離使我心如醉豈為兒女情徒滋生别泪收淚發狂歌傍人鮮能㑹明月懸高秋照我心中事若華照四海靄靄凝浮隂揮之不可得憂心日欽欽嶺南多佳樹隆冬見青林去去逺垢氛聊以澄煩襟綠衣無怨言白華多苦心願子崇明德永言終令音次惟静叔韻茅堂對東壁逺天明黛額渺然思丹砂何勞歌白石岸柳生微風池荷弄圓碧中庭閴無人明月暫嘉客招邀未成眠對酒忽心惕焉得假流光乗之登太液吾廬傍東溟萬里一片月羣仙或來過散風如飛雪長空杳靄中到處笙歌發盧敖于下界悵望清影没輕駕思暫停長風吹未歇北海與南山瞬息一飛越崔嵬閬風顛恣意覧奇絶遊方廣寺簡嚴太史寺在衡岳足宋朱張二先生嘗遊咏于此勝㑹臻名流奇探極幽藪但覓方廣真不問崕蹊隄越險倩松喬躋危病賁黝巘絶疑天低阬深詫坤厚隂風潑地寒清溪挂崖吼燕石晴復飛虬藤凍還走羣峰角低昻亂石相牝牡獲勝古所歡行疲君莫咎君看廢寺中釡塵僧骨朽朱張獨何人智勇名斯久祝融峯危峯踰萬仭衆峯不敢並到此得大觀超然稱心境捫星或低頭望日不引領分明見圓儀怳惚凌倒景時月當坤隂霜林肅而静雷池日夜乾雲雷殊未醒我欲囘陽春叩此祝融頂送張䝉泉上舍還天台寒林曉色静遊子信南征紋峯漾晴彩疎松暢鴻聲别家既二載歸笥惟一經瞻雲北都思倚門南郭情知子不可留執手心怦怦天台控三島石脈通四明況復雁宕山峥嶸連赤城将呼赤松子并拉安期生大宇月為燭天衢雲作軿相期弄瀑布周游下蓬瀛雨後過東鄉即事盆浦收夜雷老龍仍卧矣雨色生夏寒晨風薄羅綺携舟向逺山村店類廛市波恬若鋪席倚篷如隱几濯濯江柳長森森冡松穉新苖刺平疇麥秀曠盈視樹覆川更幽鳥呼雲欲起鳬鷖自浮沉岡巒漫推倚憶昨游全荆歲馳千萬里衡山五方嶽洞庭天下水吾鄉此山川大小非倫擬幽事亦不稀觸目總元理滄溟在東南茫洋大無比有興欲乗桴誰為由也喜樓外鵲巢始成當樓烏桕樹高可五丈餘乾鵲來經營晨夕看拮据不待施斧鑿又不事杗樞驚飈萬木撼孤懸常晏如歸栖何彊彊戢左右復舒豈徒睦中冓亦以防外虞宇宙萬夥類物物各有居蕩子行不返使我淚盈裾下峽乗桴下三峽山水分峥嶸支危攫虎豹逐駛奔蛟鯨灘聲混晴雨峯影淆晦明不見星月光但聞猿狖聲迢迢甬東路凄凄湘水情庭闈屬遥想魚雁久沉㝠緬懷易播人古道今誰并蟠龍山登蟠龍兮高絶塵十轉百轉囘囘新小橋巖壑迸流水中有石室居仙人斜陽在樹白鶴鳴長峯短峯殊晦明須􅁷洞口隂風起吹作瑶空飛練聲題畵内書館為中監走筆垂楊拂水波粼粼清秋意象何鮮新翠禽一個立危杪雎鳩兩兩鳴相親鷺絲雖好心匪仁腥我滄洲之綠蘋幽林落日爾飛去慎勿重來窺紫鱗鷹逐鷺圖我觀羣鳥中除却蒼鷹盡凡羽君不
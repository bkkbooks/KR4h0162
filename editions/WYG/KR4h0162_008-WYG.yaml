巳北狩風散諸嵐聞虎歗天清孤壘照霜明將軍下馬經營地千里黃塵咫尺情陽武道中漠漠郊原物色稀田家秋後彘雞肥長風馬驟塵如海落日僧眠寺不扉一月逾旬塗力困百年强半宦情微從今此路須回首千仞岡頭早振衣二漁負罾圖夜飯未得熟風濤不可繪柴門桑竹雨妻子候寒燈聞鳩臺署沈沈晚色多春鳩一送雨聲過有如寄我江南信花栁園林雨正和夜行至塘栖遇風雨出闗彌望凍雲低畫鷁迎春未試題四十五程燈火夜一川風雨泊塘栖題畫白石橋西緑竹林青松亭外白雲岑何人閒睡三千日鳬鴨碧波江水深副都御史王定齋先生應鵬太淑人金氏附先生字天宇少為諸生即學古論經濟以豪傑自負中進士知嘉定縣居官㢘白未嘗妄取一紙魏國弟徐淮以豪横行州縣間先生執其黨治之吳郡通判縣丞索長税金先生發其贓巨萬徴拜御史武宗喜㣲行先生以死爭之詔取烏思藏佛復力諌直聲大著出按山東持大體决疑獄數十剔蠧剷邪所過長史悚息帝南行公從容籌應無不辦徙督學畿内力以正士風為已任常面誡諸生曰學莫先立志近來士習但見儕輩中有尚學好古或以修身名世輒指摘非議必欲於無過中求其有過其尅忌私小庸劣無志徒自絶於君子耳又曰國初氣化渾厚士有實學故發而為文論事析理足禆世教近時文體衰薄動以古書句字相模擬求其中則索然無有不惟文不成體學不成章往往居官任職乖理僨事俱學術之禍也畿内士習為一變冄遷大理少卿嘉靖改元進僉都御史撫畿内以討平王朝相賜金綺先生疏辭曰願陛下留以待有功適晉冦起官軍數敗帝震怒特改命巡撫山西賊久聞先生名即解散先生至斬其首亂者聲震晉陽遷副都御史攝憲臺上條陳時務疏謂當今國事未定人心未一譬若大病初解元氣尚㣲正宜休養生息以俟其充議者昧此徒知事機可乘而不知求治不可太速徒知積弊宜革而不知荒穢不可不包一時異議紛然綜覈之嚴翻成刻核傷渾厚之體失悠逺之圖使陛下頻年望治曽不得享一日安靜和平之福内閣方公獻夫見其疏嘆曰此真當今藥石王業之基也未幾以臺愆下獄免歸里居名益重御史張君為起定齋書院於江東以風示學者臺省舉天下耆逸忠賢數以先生名薦將召用㑹卒於家所著詩文集行世定齋先生詩渾涵髙脱即置諸開元之際可謂大家及觀其眎學畿内所告誡諸生以為學先立志不得輕議正人長者自絶於名敎文章無徒仿摹句字其中索然致貽學術之禍一何深中後來學者之病痛切其言之也今日里中諸君子皆知束身學古文章取法大家浙河東西彬彬並作余故為詳叙先生之言使學者益知自勵先民遺訓誠所謂髙曽之規矩百世不祧者也和淵明雜詩有小序嵗甲戍余應召北征舟次讀淵明雜詩十二篇雜詩咏懐也淵明之懐曠而且真余將齪齪然日趨於偽也感而和此空江飛木葉秋水濯炎塵起坐明月光娟娟照此身盈盈河漢水邈邈不可親放勲乆徂落遺響悲臣隣欲因長風發獨往懐良晨我生百世下誰為千載人兩牛鳴東臯白日匿西嶺崕草揺秋風睠焉惜光景夜深天象髙露下衣裳冷盛年不重來令名未能永澄江止不流可以鑒吾影所貴斯道存焉用紛馳騁遑遑尼父心動中逾得靜草木已變衰青山獨不老營營逐世子榮名以為寳天命非可移人心徒急躁至理闕講求見之未能早秋江揚素波玉宇傾煩抱夜半發孤吟西風吹長道神京四千里遥途今已逼楊柳何蕭蕭秋風吹長陌雲深塞草黄露重秋江白仰視天宇寛俯覺微軀窄對景斯悵神當秋頻作客忽憶四明山山中有舊宅藹藹王朝士謀國如苞桑良糓非不多焉用存粃糠愾昔宣尼子栖栖亦絶糧鼎烹不足致時運有隂陽義命倘如此飢來非所傷白雲思故都皎月明東方安得夙心人共此今夜觴客子不能寐起坐秋風涼明星燦牛渚欲濟河無梁依依涉長道望望懷故鄉盈盈堤上柳冉冉驚秋霜時節不待人感慨何其長翳昔冇靈均曰惟楚公子平生秉忠節同列不足倚覺君賦離騷哀怨皆至理靈巖寺次鮮于公韻書感東方使者乗朱轂使事不理胡碌碌憶昔青山臥已堅誰遣鳴騶出空谷封書曽達九重天巨浸滿盼無秋田假令誅求猶未巳不如短壑還清烟靈巖老僧訴且揖雲遊法子俱無跡自言生長八十年今年飢饉原非前椒田千頃亦不熟惟飲山中甘露泉聞之惻惻雙淚下古人惠政誰其亞悠然獨上兩高峯但敞岩扉坐清夜兹遊本欲暫怡神須知逸樂在閒身峯頭白鶴存高志不肯來依巖畔人東方篇贈某公東方盜起顔神鎮鑿山偷鑛争相奮官兵動地下濟城流入河南掠州郡河南州郡無夙備卒然有警俱奔潰長吏只圖得倖免豈敢勒兵與之對賊勢長驅日以張揭竿蜂起全無畏羽書中夜報未央天子震怒矜居氓詔令司馬選将士立殄此賊無周章将軍魯某衆所舉低頭受策謁烏府老兄首言當截屠慎勿驅之變王土事在沉舟并破釡舊時劉家兩兄弟殺人流血日滿地後來雖云湛海中凡其所經何酷凶余也此時亦在座聞之不覺興愚懦将軍能不負所言頃刻便将賊鋒挫人知将軍走狗功豈知定策為老兄昨朝萊蕪盜復起云是王堂之舊旅公然刦庫復攻城縣令束手民無倚朝臣聞之俱蹙悸又恐流入河南去余獨軒然發一笑老兄既在何足慮事無左騐信者稀從頭又説将軍事未幾三日有㨗音乃聞此賊都成擒若非老兄霹靂手依違之輩其能任縱賊出境有時令老兄申誡人心定中丞建節更東來把截正喜諸道並釡魚尚欲歸故巢伏兵已據䝉山高是時王常窮萬巘督戰況為呂與蕭諸公經畧皆人豪協謀何足袪纎妖設使此賊袪不力民之向背猶未的我昔攬轡曽東巡年飢眼見民相食況是武皇駕南征遂使公私無寸積賑文乞帝帝曰可白金賜出三千顆六郡何民不腹枵勺水豈救方然火只今旱勞又頻年横征暴索還依然固知此賊當早戮不知此賊亦可憐此賊亦是吾赤子吾何使其至于此老兄自咎巡無狀謙光益盛誰不諒若論弊政所由來如我無狀真當譲重貽危事今已安更賴圖危遺保障君不見治國如治病東方之病懸微命渙邪不若元氣勝次𤓰州有述鑾輿将出狩邏騎已先征淮北三年水江西六月兵已應經睿覽未許括蒼生直北天王地星河永夜横元夕懷上都皎皎月如水遥天入斗微火雲三殿合清禁六鼇飛樂事何妨盛民風到處非夜來雙玉佩明白夢垂衣易州察院書壁旅食京華久嗟嗟始願違早時思補衮今日望垂衣北極天長拱東都事已非桑田無一寸何以奠郊畿次栗齋道長細雨長江急青燈入夜深静看三尺劍深負百年心響落雲中鴈愁添夢後碪扁舟依古岸蟋蟀正秋吟送沈元啓之善化聞説湘江水蘭舠春可乗波揺紅日出山霽碧雲層庭樹添新植官租減舊徵誰言崔少尹能不負兹丞送周天德旅館重逢日悽然感歲年酒從燕市醉書到洛陽傳位薄逢時泰民淳與政便鶯花簇官路騎馬􅃩陽天擇陽寺仄徑穿雲上名山此地尋偶因六月暑來坐萬松隂樹杪飛晴瀑林間起夕禽平生勞役念争似野人心元日元日晴湖春事微水雲沙鶩兩依依新交南國知仍少舊約青山意轉非獨客有人吟楚怨北書無鴈向南飛王師見説收洪郡又欲長江耀武威曉發淮口春江歴歴水悠悠一夜東風五兩收花信不知何地早鄉書猶憶故園秋年來國是誰能定病起詩懷祗自愁昨日六飛巡幸後已将寛法遍南州次灤江先生迎聖母之作武皇當日詔南征手執元黄我亦曽滿地秋風成舊感一時遺老喜同升慈恩似海真難報江水如人亦自騰中使夜來傳詔語聖心常為白雲凝次李空同學署對菊之作即看寒菊枝枝秀寧畏嚴風剪剪來幽徑汝當為小隱上林誰不是高才花無豔質偏宜賞地有靈根豈待栽尊酒正逢陶令節月明須倒接䍦廻送方先生還棠陵東風楊柳潞河潯料理扁舟載短琴良月便從今夜得好詩還到故山吟峯頭白鶴赤松樹雲裏黄茅翠竹林臨别教兒供苦節太平丘壑是吾心沙河道中次灤江先生韻船頭白浪打西風萬里長江逆短篷獨倚飛鴻悲落日漫将新句和秋蟲人情意外多翻覆國是年來頗異同極目楚天無限思片雲縹緲出高峯栖真山懷古舊誌梅福藏修之處元始年來漢欲東曽于青史仰高風不知舊日藏修處可在雲峯想像中日擁湖光長瀲灧雨來山色更朦朧清時久負蒼生願試與漁人乞釣篷西曹燕集風日晴和稱小春菊尊常負賞心人郤嗟湖海經年别始得官齋半日親尺五有天同注目兩間無地可逃身夜來東井星躔異封事連篇上紫宸送王廷直一别青山二十年白雲長在草堂前曉辭雙闕東風裏夜見繁星北斗邊花鳥夾堤春似織江湖一艇水如天詩成為送王摩詰烟雨深桑入輞川除夕美人相見不相忘為惜年華感嘆長百物豈皆金作鑄一冠原以鐵為梁人于竹葉情無極月到梅花夜未央雲外忽聞雙鴈度正疑消息過衡陽偕朱奉化遊雪竇山色模糊雨欲飛入山心事出山非秋風絶頂何人到明月雙松待寉歸羡爾之官還對萄與師言别更留衣他時尚有重來約錦鏡桃花樹樹緋天童寺十里青松接翠微梵王遥見白雲霏鐘聲出岫客初到月色滿庭僧未歸偶有閒情依静土竟無塵念瀆天機他時尚有登高興千仞岡頭一振衣武夷夜半仙人吹玉簫羽衣何處獨飄飄風從絶澗來高樹月抱孤峯上碧霄多病欲辭長路險昔年曽説此山遥若為黄鵠迢迢志一舉終能不受招寫懷苒苒流光負十春舊丘今見夏苖新雙溪水石原無主一雨柴門為洗塵道往未能興絶學客來猶喜及良辰古今勝槩江山在登賞還須屬幾人重遊雪竇懷陳明府不至萬峯迢逓碧雲深松徑香清滿石林白鶴未歸僧已定名山不改我重臨即看翠壁飛蒼雪更轉花臺憇夕隂元亮欲來來未得舊時蓮社與誰尋登育王上塔病眼年來慵未開强持筋力上高臺野花正在林間發海鶴初從何處囘天際兩峯飛白日雲中萬壑起晴雷無端一霎㝠㝠雨疑是雙龍聽法來送周鍊師謁選歸長洲秋風草閣天平寺别後停雲幾咏思昨夜萬山飄雪處是誰雙屐到門時兩梁未脱顔何厚五粒深餐骨尚奇歸去洞中尋舊侶月明還抱玉簫吹題翎毛迢迢清夜夢應到集靈臺翠羽涼風發還從水殿來好是遷喬日春風集羽儀柳塘西面樹不是萬年枝春日過王汝文宅江州三月是花天日泊門前載酒船朝雨忽聞啼布糓獨開桑牖課春田張白齋席上次韻竹里先生竹作扉白雲長傍小山飛江雷忽送㝠㝠雨又有新涼生翠微久知名筆重南金白首相看即此心竹院已高亭午日又移書榻過槐隂龍馬自從龍馬出人間不説君王十二閑昨日玉闗深閉後却携弓矢過隂山太淑人金氏附名文貞少嗜學工詩教其子應鵬成大名歴封太淑人享年八十有二自浙東推閨範母儀必首稱焉所著有蘭莊集余常怪從來錄閨秀詩每與方外同集且雜收女娼所作有志者恥之余此集獨定以三從之義若王太淑人附應鵬是以母從子也陳恭人附后岡先生則以婦從夫也屠瑶瑟附儀部以女從父也于義為甚正然後閨中之音仍足列于國風矣送鵬兒應試槐生秋意雨生涼庭下叢蘭有國香觴泛北堂催越櫂宿開東壁照錢塘携書一卷青箱舊仗劍千金紫氣長臨别更無多囑付㑹知人有倚門望春日旅館偶成陌上原頭楊柳纎東風消息在江南故園門徑曽栽五明日時光更起三春盛杜鵑空自怨枝深鸚鵡許誰談晝長公館清如水坐聽鳴琴久欲酣夏日送大卿君赴任武岡麥秋春去客程初逺逐湖南萬里餘人静夜鵑啼有韻道偏秋鴈唳無書簷蛛網就絲難盡梅豆丸成苦未除伯樂自來何處覓錯将良驥駕鹽車宦邸寒食細細催花雨若絲異鄉寒食故鄉思采蘋士女榆烟暮鬬草兒童杏酪遲兩岸綠楊當古道一羣白鷺㸃晴漪東風昨夜還家夢泣向仙姑酌酒巵夏夜雲斂星稀碧漢髙清風涼席思偏饒蚊雷避榻人初靜螢火燒籬草不焦竹院新詩題午夜松亭明月挂良霄幾重香氣穿珠箔風送蓮塘隔岸遥兵部右侍郎屠公大山公字國望生時適從大父襄惠公以泰山摩厓碑遺其家因名曰大山為兒即絶異襄惠公常摩其頂曰兒他日復大吾門稍長美風儀好魁磊之節倜儻自喜中進士出知合州為治尚寛持大體喜與士大夫父老常言民所疾苦以故一州事無不聞有巫以其術為奸擾州民公以計取之掠數百不中公悔曰吾適以智獲彼故彼能禦我次日公盛威嚴繫巫至正色叱之有書從巫腋墜出立杖殺之歴刑部郎出知吉安府鄉薦紳尚書王公在朝諸公子稍横里中公取其蒼頭助虐者治之諸公子因折節稱儒生王公嘗謂人曰使我諸子得比於人數不覆吾宗俱屠使君教也世兩賢之遷按察副使備兵徐州值流賊大發掠州縣千里為墟公身督兵與戰賊敗走歴遷副都御史撫湖廣酉陽蠻界思州自新建王公蕩平後稍竄伏不出至是苗民吳黒輩更擁衆破城郭數殺官軍逺近戒嚴公出竒兵設伏左右翼盡殱之楚中平人謂功不在新建下遷工部右侍郎冄撫湖廣奉詔修太嶽太和宫成璽書慰勞討斬妖賊馬三兒晉兵部右侍郎總督湖廣川貴軍苖首亂者龍氏潭氏歗結共擾楚公以計間之使相攻各滅其族因以大兵乘之苗悉平時公在楚乆宣力行間朝議方召公為兵部右侍郎而嚴相子世蕃數有覬於公人或諷公少賂入即得内召公曰吾老矣復鉛粉為容無乃違三十年素耶卒不為通世蕃大銜之欲置公死㑹倭賊大舉入犯所過積屍骨如山乃降授公巡撫應天公適病奮曰國家不幸有事臣不愛死甫至官而援勦叅將許國與倭戰大敗世蕃遂嗾言官并劾公繫問上知公舊勞赦其罪公歸里門翛然為布衣耕東海田凡二十餘年朝廷既復公官致仕當事薦公可大用竟不復出卒年八十公初登泰山遇異人青羊橋遂若有得及埀殁自贊曰斷念斷意混天合炁外縁蕩滌内景宻閟寂照煌煌無隙可覷天地勿違鬼神盡避人謂公既得道矣長卿先生序公集曰公少天才豪逸自命作者既起家為大吏經營天下三十餘年卒為世蕃所中幸脱虎脗歸田後與里中故人縱飲酒酣以往時援筆為曼歌了不求工而往往神來是為雄豪大人之章固非隅曲詞人所嘔心枮影而得之者也可謂善言公詩矣秋日雜詩晷運迅推斥零露凝前庭木葉半銷落感嘆何時平年往莫可追白髪皓已盈事業耿夙念中道輈輪傾紫蘭秀幽谿風雨常晦㝠采掇忍朝飢馨香竟何成蟋蟀爾何知唧唧來悲鳴秋日慘晴暉志士多苦情草莽可安居咄嗟復奚營庭中有綠竹翛然厲清響雖非絲竹音天律謝人奨喧濁既已袪涼隂始云長衣食寡所嗜蝸居自潛養横琴奏古調華月復東上世界入瑶空瞻玩足幽賞安問烏與兎追逐迅飛鞅襍咏古路有蒺藜行者戒經過新路富桃李過者肩相摩桃李不可攀蒺藜不可羅古路日已微新路日已多江河東悠悠嘆息将如何從宦踰三紀恬澹罕所求既闕經世用秉廉期寡尤棲遲郎署間偃蹇郡與州漸陪臺部端恒負軍旅憂才微積愆釁褫袚還山丘恭承先世慶田廬謝營謀志願既已足動息常優游藝圃不盈畝鑿池非容舟花木競敷榮魚鳥亦相投時有親舊人桑麻話田疇或枉賢達顧歌咏既淹留園蔬充几案尊酒歡勸酬逸興凌九霄偃臥忘三秋衆惡永消釋獨樂良有由自非皇澤寛何以免竄流草莽竊稽首萬歲長垂旒鷹鸇凌雲漢六翮一何勁營營圖所食時與鳥鵲競取物良已宏志願曷云竟星月交相馳毛羽有衰盛慎爾摶攫才勿謂黄雀哀偶然吟櫛沐啓衡門中心甚悦懌不知所悦何春暘蕩林澤綠苔布青原脱幘枕溪石麋鹿引其麑禽鳥鳴不息樂意無相闗幽情兩相適白髮映綠水僊僊一何妍有屨不踏塵有巾不負天三春足餘樂萬事無拘牽自笑山澤癯竊比羲皇前富貴不如願退身非養高凍餒茍不憂輕肥安足饕弋釣非所喜耕鑿誰能勞時時縱逺目悵然步江臯倦來返林廬尊酒聊自陶閒來闢幽園近傍江城側卑棲發高吟貧居富春色不種無實花不筵遁情客人去事已遲白髮覆爾額吾意非至言但求情性適衰壯不甚遥安用大分析少年自相譏野老自相憶所好且從吾世態任翻易春日襍詩連歲海揚波兹秋息烽燧畎畝餘稻粱農夫亦憔悴借問胡乃爾共言苦徭税額外當征需丁壯死無罪晨夕冒霜露奔馳靡賤貴閭巷何蕭條雞犬亦顛沛四序互推遷數口寡所慰白日乃高懸霾霧黙茫昧風威徒怒號安取驚聾瞶秋深室如磬何以能卒歲藿食懷隱憂遥夜寢無寐星漢一何高風飈正凌厲水旱帀多方盜賊起如蝟黔黎靡安居樵蘇恐無計處世事有闗誰云忌出位逸馬失園葵漆室非無謂青州瀑布泉歌山神愛奇天帝憐倒捲海水懸山顛海神欲爭不敢言怒觸山頂通黝淵白龍騰攫挂紫烟疑挽神河瀉九天力微路逈絶夤緣迸落萬丈鳴濺濺化為晴空碧玉鞭飛聲兩道雲光鮮山神受䀨忘晏眠徙置十里蒼崖肩坐令林麓偉麗捐頗費探討添煩寃我來聞此心冷然斂裳欲訪塵霧牽望中彷彿璚幕褰氷肌玉骨争清妍誰能移還大道邊報爾萬鎰黄金錢早春漫興辭臘梅全放迎春柳半榮雲寒猶住鴈風煖欲流鶯烟靄岩前碧波流沙際清幽尋無不可聊復得吾生欲識遊雲屐稀逢媚眼花泮氷穿稚藻踈木集雛鴉露葉抽初短風絲捲乍斜幸餘筋力在何憚歴烟霞中秋東明招遊月湖華堂遲初月蘭槳泛秋光城角湖偏朗波心夜轉涼水深星可摘荷老氣猶香俯仰愁天曙誰言更漏長秋月初昏白湖光四望多杯行天上酒人坐鏡中波岸語驚仙棹空音響醉歌非君謀徙席良夜柰愁何和張司馬戯簡全司空避客阿育王寺聞道招提客投閒未得閒賓朋隨杖履觴榼滿秋山冒雨荒涼外逢僧醉夢間談禪何所悟徒見鬢毛斑歲暮數日餘寒歲又新江山長許著閒人但令濁酒堪娛客不用輕裘此稱身草閣晝眠生物色霜郊徐步斷風塵却嫌交際曽多事里巷猶知讓逐臣渡江晴望北望雲程憶屢遊幾囘風雨暗江流退身此日閒臨水訪舊晴村數泛舟野店魚鹽分海市官橋車馬映城樓烟波到處皆堪玩不願乗槎見斗牛和東沙秋穫憶昔腰䥥出五更愛聽山鳥自呼名村居世久渾無厭農事家貧始盡明司馬書來同意味老夫讀罷報親朋田間未足供行樂湖上真堪共此生知君不厭入山深督稼還應出近林秋隴餉餘人肅肅小車行處樹隂隂香分溪水清荷蓋花折山茅白玉簪阡陌功成須賀喜壺觴晨候碧江潯答東沙采苓秋谷晚雲蒼白柄長鑱身自将身計雖能全不顧人生那得一無長喜令麋鹿為朝侣畏使金銀宿夜囊疎放容予惟故舊年來心迹兩相忘喜晴映日吟詩喜不微濕雲片片盡歸飛由來天地原難蔽囘首江山忽已輝從此送秋吹笛好錯教連夜見星稀錦溪繡陌酧人願布襪芒鞵與世違和東沙春日風熙芳甸不生塵矚目山川處處新晴日林香花勸酒幽溪苔輭鹿隨人閒來自聽桑間曲老去長逢海上春藜杖豈能尋鳯闕蘭舟只合艤江濱昭君怨入宮幾載閉宮門夜月春光黙斷魂非惜黄金輕畵筆從來天賜未沾㤙副都御史戴公鱀公字時重號東石少有文名中進士為刑曹督獄見滯囚惻然使櫛沐以蘇癘他給卹有方遷四川按察僉事備兵安綿前龍州土官多以賕結監司恣行不法至與同餐燕公以法束之俱貼服涪江當孔道風浪洶厲民苦渡公適至見覆十餘艘急命赴救得活者百四十二人出屍三十公嘆曰此有司之過也即戒工造舟三十二為梁四十餘丈横其上立法守之公初南下有以議大禮驟貴者道遇公欲挽與語公解維直去其人深銜之及為相乃以事奪公職家居八年時宰死乃復起歴河南江西藩臬備兵饒州復以事忤後相坐罷四年冄起副使備廣西府江兵值猺獞嘯亂幕府謀大舉討之公畫䇿曰此不足煩大兵也為選將提鋭卒數百授以方畧使深入仙迴馬尾諸山繞出賊腹猝攻大破之斬首百餘級俘其豪磔之於市江道遂平幕府欲上公功力却之遷山西按察使有閹豎殺人匿宗室家吏莫敢問公捕得即付獄巨商持當軸書來告宿逋公怒曰豈有朝廷監司乃為賈豎責劵耶焚書杖而遣之歴遷副都御史巡撫四川為治盡革煩苛凡所𨽻諸部雖極杳險必輕車駐節勞問民所疾苦故老謂撫軍旌節二百年僅一見也而㑹有舊僚嫉公者中以飛語公遂歸三年一日端坐而逝年六十七公少擅經世才負氣髙亢居官四十餘年闗節不至其門權貴俱心憚之竟坐此三起三黜不得盡其用論者惜焉中丞遺詩僅一百五十一首時稱其老健蒼涼可當詩壇大將余謂讀中丞集只覽其詩題便知是一作手詞家俱以為然感興梧桐有良質斲為雙綺琴疏絃映金徽泠泠發佳音一彈薫風至更彈江月沉大雅久以寂志士寄幽吟坐令衆喧息洞見太古心田父晨驅牛叱耕還自喟力作雖苦勤不能救憔悴去年田事登僅以了租税昨夜縣帖來徵派動如蝟哀哉石上茆鉏刈日尋綴茍免憂目前何用計卒歲蘭蕙種不長荆棘日以滋青青野中蔓引身百尺枝春風一吹拂垂垂得其宜夭桃開上苑苦李道傍遺賦命固如此物情胡不怡托根各有所聊用以自持離離庭樹花風日正妍好翻翻辭枝葉忽已及秋杪君子百年心小人計昏曉道謀俗不諧事業滿懷抱行當屬吾徒究竟見稍稍請君平生志慎勿事温飽過萬善驛登太行山晚至星軺雷雨暴至衣盡濕朝躋太行巔暮宿太行麓層巒入青㝠百里立蒼玉凌風一停車冀豫俱在目茫茫平野開直見黄河曲維南有崧高賓對稱仲叔秀色分天中神功奠坤軸石徑緣岧嶤顛崖俯蒼木古來重設險三城接雲矗因之千載懷壯志非轅跼誰能静邊塵再覩堯風俗斜陽隂雲興急雨過傾覆沾濡不足云震雷動予屋光山道中見挿秧者但少蓄水午渡淮河至息縣雷雨俄作三日阻宿漫記其事我行淮水濱赤日正停午農事喧近村炎氛轉林莽挿秧夏已深氣候異南土少婦乃力田老翁紛擊鼓決渠清泚遥荷鉏復舉戽田高半拆龜塘小幾涸鮒斜陽隱聞雷一雨忻入莫人方慰有年予亦藉袪暑信宿隂雲垂溝漲成溆浦安知羇旅愁但煩爾地主佳邑自息名封圻尚連楚淹留天如何高歌更懷古息縣阻雨二日方趨真陽十一日達汝寧道中低下處便成巨浸肩輿渡水得十二韻紀所見酷暑如吏苛驅除雨之德涼氣幸有餘暫霽見山色拂衣晨出門懸知埃氛釋得失理莫齊淖濘乃行惻望望還欲晴中夜轉蕭瑟淮汝增濁波良疇頗衝射乃知周道旁倐忽成陂澤瀉澗鳴急湍壞橋驚轉石老農聚室愁下處害秋穡因思聖王理勤民事溝洫百川各有歸萬井安利食云胡遂人亡經畫固無策我生一何愚奔走空役役索途屢倉皇即事聊太息龍洞側身上高岡俯視寒水碧連峯截浮雲有洞呀石壁林疎澹晨光却立屢廻策僕夫指顧予云兹龍所宅喧闐萬壑趨溟滓入地脈潛流逗前山波翻洪濤拆含𢎞恣虚受慘澹懼幽塞焉知泛濫虞應識神明力臨河結長思知是禹遺跡融奇自乾坤通氣實山澤崖傾古木樛路絶隂霧積蒼茫問征途旌斾照日色茅廬隔塵沙微泉注阡陌逺憐朱夏時旱甚千里赤靈物豈無意雲雨竟莫測欲往不可得臨風一嘆息滎澤渡河大河走中原神物難名狀混混自古今朝宗只東放烈風況不休日夜波蕩漾涇渭疇能分砥柱翻激壯并吞衆流盡勢若争伯王有時失隄防涯涘安可量滎澤行問津張帆日初上俄驚山半摧仍喜沙平漲憶昨渡九江奔瀾未應讓候人鼓角喧北首瞻太行叶去聲秋旱雩禱仲月五日雲雷垂垂微雨即霽有感二十韻秋旱走羣望炎蒸逼周廬萬心鬱胥焚伐鼓紛朝雩中宵雲物改輕雷殷城隅晨風碧海立簸蕩騰天吳商聲入庭樹朔氣傳郊墟垂垂𤣥隂合洒洒鳴檻疎新涼稍快意一雨甘所須狼籍見黍秫讙呼劇童愚終然涸溝澮忽已明桑榆遂令黄道間驕行三足烏祝融侵軼後風伯刑誅逋鹵汐變清泚分流決汚渠農事競涓滴神功諒荒蕪直恐藿食病豈得糟牀濡明明精誠聚上帝仍高居四時孰迴斡九闗多睢盱感嘆激衷懦即事思良圖行水有蓄泄作俑将罪湖隄防哲人計餘潤還膏腴吾歌自永夕執熱誰能除道中漫述二首夙志本怡曠浮踪困羈拘首春覩象魏末歲從簡書僕夫起嚴駕相顧何躊躇投荒信萬里行當向炎墟風襜中夜息霜郭凌晨趨役役未能已緇塵盈素裾久客困彈鋏長安常曳裾平明跨羸馬欲出焉所如裘葛各已敝日月還居諸一朝䝉逺徙飄泊萬里餘持憲非言薄奉詔恩猶殊但自媿虛謬何能靖邊隅魯姝亦有念杞人固應愚抗手謝親友孤心終不渝東阿汶上屢值大風效昌黎聊訟風伯薫風動地歊暑浮小牕入夜聲颼颼黄石祠前榖城下揚沙攪樹何時休我行徐郊及齊魯平原莽莽無來牟僕夫相顧色憔悴為言不雨生煩憂𤣥冬涉今夏且半杲杲日御挾赤虬粟田豆隴盡蕪没乾死安得翻鉏耰況乃頻年旱驅虐辛苦逋欠多瘡疣使君請視野如赭逃屋十九頽道周我聞停車重感嘆端思此咎将誰尤昨夜滕陽望鄒嶧巄嵷騰曉雲油油褰帷深擬待飄洒要令清泚瀰芳洲俄驚旭高雨不作號噫萬竅羣隂收雲蒸霧溽忍吹薄嗟爾風伯良汝由皇天分時授百職長養庶物功均侔五風十雨兆豐稔霈以德澤奚其優汝獨憑陵煽朱焰屯膏縱魃為民仇雲輜潜厓靡觸石雷電熻赫更拘囚南箕簸揚實汝好暵燥下土成焦丘天高任汝持號令致兹恒亢非嘉謀古來汶泗通地脈飛泉匯濟馳波流却聞泌沸縮沙礫漕渠那復移檣舟呂梁之水縣百仞石出齒齒同潢溝縣官發民塞渦口道河開鑿連數州水衡大僚困籌䇿神都轉運需千艘汝猶鳴條愈震掉排閶請帝應度劉何如少輯醖甘澍坐消灾沴還懽謳自軍山舖中趨龍陽道中風雨甚苦用夏桂洲壁間韻荒山盤迴幾千疉没脛深泥滿阡陌朔風凄雨更昏昏僕夫相顧無顔色隔林雨歇聞鳴雞夾輿青青桃竹齊日午破亭炊野飯天寒古渡走荒藜誰家茆屋雲深處不識隂晴掩闗住石兒背夷陵江前石兒背連江石壁緣江臯蒼雲劃開幾千尺沙石大小相粘包下有激湍聲怒號舟子攀躡輕猿猱徑微磴絶不可度寒風颯颯吹霜濤半壁流泉濕裊裊隂崖孤樹青高高忽然突轉疑墮裂洞門蘚合荇薇毛岩頭亦有數樷竹歲晚江空猶自綠滹沱河行曉行恒山道復渡滹沱水滹沱兩岸平沙黄寒日射波朔風起輿梁如砥中流清來輪去轂穏不驚川浮晴野孤城逈斾拂霜枝雙戟明憶昔乗秋嘗鼓枻魚龍駕濤無涯涘舟子常依楊柳堤居人盡失桑麻地十年迴首夢寐間遲囘只覺増衰顔乃知夷險詎能計所以古人太息再歌行路難行路難何偪側衆呴能漂山貞心殊轉石君不見三峽奔濤崖石墮方舟撇漩猶㨗過又不見太行九折盤巑岏驅車直上青雲端人間畏途豈在他誰令同室還操戈從來善宦固有術吾聞流行坎止如命何題枯木雙鷹圖商飈夜捲萬木空蒼鷹雙飛來海東悲臺黄雲色悽慘是誰呼墮寒枝叢平蕪狡走三窟志行萬里立突兀何不翻倒摩高秋並向層霄見毫忽畫師有意憐雄姿寫入鵞溪時一披廣庭風清晝欲静對此猛氣掀霜髭吾聞疾鳥猶疾諛寧知梟鳯從來殊嗟爾毒爪莫漫驅天際恐有圖南雛為陳德洪題山海圖長安逢君今幾年綠袍𤣥鬢如神仙横山萬里歸朝天更話夙昔驚華顛歲寒忽憶故園樹春風已買江南船四明城東山水窟赤洞滴乳丹砂泉仄岩噴瀑芝薇長老檜傍壑藤蘿懸峯頭躡屩看海日谷口散杖衝溪烟有時相呼白鶴下到夜索笑梅花前翻思宦轍苦馳逐而祖道術期相傳大兒能讀石室篇青眼往往聞時賢歲晚歸來開壽筵霞觴映酒顔酡然閒中歲月寧有幾盛世擊壤謳歌喧望瀛只尺是蓬島坐見斥鹵成桑田弔長平風吹山霧日杲杲驛吏候我長平道長平千年愁不掃殺降坑上生青草暴有若秦愚若趙四十萬人骨齊槁古來謀國士誠寳當時但説廉頗老至今君臣愧嫗媪相如引車料已早嗟彼暴秦毒何剿皇皇今古歴可考不嗜殺人天所保内丘道中隂隂高柳静宿雨忽驚秋沙日晴初散風塵澹欲收山青連上黨堞隱辨中丘無奈思鄉念蟬聲傍驛樓至徐洪分司愴然悲感余八弟水衡主事分司徐洪卒于署數峯青弟所題軒額水部開山署泉臺隔歲華河流失故道槐杪結新花舊吏愁相問深庭静不譁數峯青尚在搔首對天涯新嘉驛草亭和沈鳯峯壁間韻古驛歊塵裏幽然著此亭四簷山盡碧一眺眼為青高䕃閒移日芳尊或聚星振衣成小憇促駕喟勞形大龍驛曉發喜晴用夏桂洲壁間韻風檐發古驛寒潦没征車徑轉憐行惻山明喜霧除香傳郵卒茗青見野人蔬萬里歲華晚掀髯午食餘酆都除日即事携家巴子國守歲楚人舟爆竹還通俗椒花對逺遊情親童穉語節換雪霜留萬里憐初志聞雞更攬裘戊戍歲二月廿三日餘干江上聞報解官二首用拙難諧俗行年近覺非此心原自信吾道不相違海曙雲霞動江清水石依無勞致投杼正得返初衣滄江問歸路春事及芳菲柳浦漁歌出桃谿燕子飛鄉山雲漸白蕨笋雨應肥吾汝皆鷗鷺休煩詰是非送陳掌教遷太學助教道重宜矜國官閒不計程秋清為客壯江濶載書輕山色連吳地星光動越城獨歸寒雨暗愁帶夜潮生自鄢城過麗陽中途午飯見楊后江壁間句細讀后江句歸心到海涯江鄉雖洵美歲月但驚賖野樹聊停馬山雲不礙鴉蒼梧竟何處吾欲問重華丙午五月廿六日自建昌趨德安少憇東林寺十年夢作廬山遊五月星駕東林留青嶂遥開石耳出白雲近傍香爐浮向午峯隂連小閣落溪巖瀑入平疇㑹招五老天池上手擷芙蓉倚素秋宣風公館作家書後用壁間陽明先生韻明日冬至雲外微紅見燒㾗道邊寒水入溪渾此時日落楚山館後夜月明何處村已近閉闗猶道路偶逢傳札念晨昏獨燒官燭看妻子臥聽郵更驚夢魂宿清化驛澧水城頭短髪蓬靈均應笑此萍踪每從落日驅羸馬更指層霄接大龍古驛小窻頻刻燭逺山何寺忽鳴鐘不慙虚薄猶縻祿欲向清時强奮庸過湯隂武穆祠雲樹蕭森武穆祠晴沙秋日尚含悲中臺一德初開閣内殿精忠漫賜旗河北不聞經畧計江南已草受書儀廿年洒泣看遺傳式里重吟板蕩詩再過武穆祠再拜重瞻武穆祠凄雲衰柳不勝悲瓣香幸致經行日雙淚嘗懸讀史時主已忘讐安可責天如棄宋亦何為最憐一曲西湖地英爽能忘故里思六月既望同時化弟謁甬川太宰還舟中述懷放舸城南觸熱新濯纓欲傍滄江蘋濕雲挾雨時過水晴鷺将雛翻趂人偶向竹洲緣窈窕徑須松壑上嶙峋秪今多病兼樗散浩蕩輕鷗覺汝親湘潭渡江後遇雪至黄茅館已一更矣用禁體蘭橈渡湘水層雲散朝隂沙明馬首路霽愜行人心俄然集飛霰忽已迷高岑纎纎漸依竹密密仍穿林輕同敗葉隕急赴寒塘沉暫止似羞縮少縱還浸滛履破幾没淖衣霑遂盈襟每踰籬落入故向茅簷侵因石巧増突隨風或填坑原疇失横縱崖谷無嶇􅋂枝垂懼遭折啼寂疑盡喑遥墟草笠斷晚市炊烟深映瓦如欲曙飄牕静聞音貧臥怨衾鐵豐徵欣雨金矚曠愁晃眩徑幽氣蕭森扶輿下泥坂反斾循溪潯黄茅近可辨敝館寒難禁爐紅聊兀坐酒綠還時斟羇懷憶所歴襆被猶豪吟行臺雨後紅葵盡開但蛙蟬頗聒耳園葵吐高紅庭蟬噪深綠客意忽驚時故鄉新稻熟自界河至光山一水廻環經涉凡四十八渡逺山近山無數青四十八渡水迴瀠侵晨杖策歇停午叱馭還從九折行楚山盡處水分雙北入淮流南入江觸石抱村沙岸斷曉來新雨過漁矼兵部尚書東沙張先生時徹先生字維静幼時就外𫝊俱以常兒畜之從子文定公年長顧獨竒先生先生師事之遂成名而先生亦年十七為人師弟子數十曹俱年在先生上二十舉於鄉中進士歴官南曹郎以副使督學江西簡才汰不肖甚嚴闗説無所入㑹宫廟灾嫉公者遂謂副使苛諸生所致左遷備兵臨清歴河南左布政使晉都御史巡撫四川討白草番平之㑹中蜚語罷歸冄起撫江西召為兵部右侍郎時聶公豹為尚書值楊公繼盛劾相嵩十惡内有子孫冒邊功事下兵部覆聶公謂諸司曰功俱實不虛可具以覆諸司俱曰公今日當為萬世持公論未易覆也聶公怫然起先生入謂聶公曰諸司殊藉藉公激之則恐事生禍且復延縉紳公何不説嚴公使自辭軍賞則部曹可無覆即公論亦得不廢也聶公悟卒如公言時謂公善處事也大將軍仇鸞怗寵焰如火先生獨持不下及鸞死疏訟都御史商公大節寃上怒下詔切責奪二俸先生以此名益重居憂㑹倭犯留都召先生墨衰為南京兵部尚書到官甫踰月冦突至遣將禦之不克相嵩從中批之遂歸老時年五十五尚茂齒既不為世用乃益精思著撰為詩古文詞及他説林家言凡數十卷輯洪建以來大家名文為文範别為文苑撰郡誌續四明風雅既以標格自持益好士數寵薦後輩諸君凡經其門後俱為名士大夫所執友義重死生始為進士時有騎馬來定交者曰王激子揚快士也子揚死為刻鶴山集豐人翁以落魄死為刻考功集陳后岡先生早歿既刻其集復為勒石墓門家有别墅在東臯曰茂嶼草堂在西臯曰武陵莊時引上客共觴咏其間即單門年少一經品目俱藉以揚聲至先生殁後數十年士有鬱弗無所見者尚愾然曰吾恨不與張大司馬同時耳蓋吾鄉士大夫壇墠於斯極盛自後欲少衰矣余嘗觀諸家論先生詩當時若沈鳯峰謂名家易大家難惟先生足當大家皇甫百泉謂以蘇李為宗而綜括三唐體大兼美楊升菴謂沖淡穠粹沈鬱雄壯匠意鑄詞色具體備近時若陳大樽謂樂府意調古質近體宛倩麗佚如層臺佚女意帶烟霞合諸公之論可定其詩使先生當軸甄陶風雅當是李文正一流惜乎三黜而中止也然吾鄉最稱東沙先生焉獨漉篇獨漉獨漉上陵入谷谷深無底陵高無躅玉在璞中孰别純疵鳥在林莽孰辨雄雌閉門養蜂自求其螫出門種桂翻樹之棘集菀者驕集枯者恥纆牽纍纍何由千里豎兒無知握策馳驅馬驚車敗叫天號呼蜋能捕蟬蚌則伺鷸懐機使詐水清石出梁父吟朝上泰山鬱何盤盤崩崖嶭嵥石齒斕斑虺蛇横樹虎豺當闗憭哉慄慄曷以盤桓一解暮上泰山白日西匿前有榛莽後有鬼蜮道險天寒饑不得食欲見雲君何由可得二解泰山巍巍魯邦所宗智矣齊相七國之雄二桃何甘以殺三士惟其忍心嗟嗟晏子三解虞羅藏機蜂蠆致毒爾口雖微慘慘戈㦸屈公問天賈生弔水嗟嗟晏嬰實為禍始四解采葛篇種葛南山下春風吹葛長二月吹葛綠八月吹葛黄腰䥥逝采掇織作君衣裳經以長相憶緯以思不忘出入君篋笥長得近輝光層氷布河水中野皓凝霜吳羅五文采蜀錦雙鴛鴦君恩當㫁絶歎息摧中腸中腸日以摧葛葉日以衰願留枯根株化作萱草枝長安道曙動開長樂鸎鳴遶建章龍媒馳道出鳯吹彩旌揚繡陌生朱霧銅溝映綠楊渭橋春水漲日日汎鴛鴦古别離春思已無那如何又早秋偏将一片葉飛作萬重愁鳯枕蘭香細瑶階霜杵柔暗揮雙淚眼一望大刀頭子夜四時歌朝朝聽鵲報日日掩重闈莫踏門前柳留踪待郎歸春日出望車塵徘徊至日曛拾得紅蒨草歸染石榴裙夏凄凄復凄凄月出光尚微郎衣猶未綻何得理儂衣秋河水結層氷疾風吹曠埜嗟爾衣裳單獨宿在車下冬隴頭流水歌三疊隴水下隴頭東西南北流浮萍逐隴水一去不復收隴版廻九折七日乃得越如何下隴水瞬息成決絶殘月寳刀白微霜隴樹黄笛中聞折柳那得不思鄉俠客行登君堂把君酒生從衛霍遊復與金張友主讐尚不報肝膽向誰剖脱下鷫鸘裘换得新豐酒千錢作使邯鄲倡北斗䦨干挂朱牖平明走馬長安市翻身戲折章臺柳結襪子岳不言高海不言深周公下白屋天下乃歸心月之從星不損其明龍之蟄淵斯耀其靈王侯雖云貴貧賤未可陵士易詘名難成嗟爾漢庭之人慎莫驚漢庭何有爾公爾卿得則九鼎重失則鴻毛輕皇皇黼黻奕奕華纓彼駕車而馳馬譬若朝菌之揚英結襪子禮王生張廷尉名乃成漢廷之人慎莫驚陌上柳陌上柳陌上柳春風拔拂短長條攀條不識誰人手為問去年折柳人今年柳發歸來否雉朝飛車轔轔柳花飛飛愁殺人原上歌虎電電狼狺狺帶刀彀弩行逡巡械爾虎阱爾狼原上草青牧牛羊幽澗泉幽澗泉飛珠玉道傍白花細如粟繩樞小户架山麓翁折薪母煑粥小兒敲氷㫁青竹風吹草屋寒肅肅舟人嘆予自北旋阻于荆門目擊運舟之苦大風折樹河乾見底五步十宿一夕九起河塞不開水乾不來自顧無羽翼安得東西南北飛裂篷且為薪賣櫓且為糜什九不得歸得歸官府相鞕箠噫嗟嗟羊腸之險猶可越人無遭際那可活逃民歌來逋逃來逋逃茹藿烹藜腹顑頷以枵出門豪家打縛入門妻子煎熬昔飢官府賑我今飢官府禁我來逋來逋率彼曠野野死飫鴟鳶獄死飫蟲䑕野死僥倖尚可脱獄死則死誰貰汝空城雀空城索索䑕穴狐栖白骨不葬悲風凄凄嗟爾黄雀何不去此逃朝鳴啾啾夕呼嗷嗷慊慊長苦飢爾生一何勞雀聞心中苦口噤不能語大澤饒風波其上鴟鳶多東人挾彈西家張羅各自懷機智愛惜田中禾覆車之粟人尚收官倉之儲寧汝由何如闒蹋空城裏草根木實無人主經年不見有行踪蓬蒿跳踉誰禁汝蚩蚩爾黄口慎莫生咨嗟待得毛羽成努力自為家留郎曲三月以來無一晴郎今欲行猶未行日日鳥啼行不得郎心不定妾心驚芳華盡被雲雨妬出門只尺迷毒霧風吹白浪立如山勸郎莫問江頭渡哀猿呌月不可聞妖蜮含沙詎知數深林魑魅巧弄人百尺長蛇㫁行路黄金之印大如斗數奇不得縣君肘有時錯悮犯刑書咄嗟那復保身首此時遊魂何處歸此時空房難獨守不如炊黍且蒸藜相對繩樞與甕牖宛轉歌明星燦露華泫宛轉歌歌宛轉月白烏夜啼絃長曲何短綠水芙蓉夜夜開芭蕉落葉心常卷有糓有糓志貽謀也章氏子起家進士追念先人之訓爰名其堂田有嘉糓后皇所殖心之糓矣時維懿德易我疆畝其耕澤澤既曰耕只曷遂播只其實纍纍施于孫子古我先民遵皇之極遵皇之極以燕以翼不菑胡畬不稼胡穡凡爾君子夙興是力其力云何荼蓼是除載蕃載滋百千其儲無逸斯逸匪哲伊愚敬念不替茀祿是俱秋懷虎兕狎曠野鱒魴懷廣池如何遊客子飄蕩無返期朝發扶桑阿夕息望崦嵫山谷屢阻遷寒暑互推移艱難經百務鬒髮變成絲腰帶不盈束中心惄如饑木落尚可榮水涸尚可盈如何蓬蒿士抱藝竟無成神龍制螻蟻斥鷃嗤鵾鵬小大各有遇得失安可憑達将連駟騁窮即蓬虆行北征雜咏客寢不能寐舊慮雜新思申且雞初鳴呼童理裳衣初日照疎牖倉皇臨路岐風塵塞四野車馬若雲馳去者未云息來者復如斯鼎鼎百年内形神空爾疲顧彼蓬蒿士旦暮掩荆扉蒸藜以為食編茅以為衣不知有朝市豈復辨雄雌芳餌非所羨網羅安得施養鳥莫養鸞藝麻莫藝蘭芳香難為用過美多憂患田甲賤死灰白日摧氷山時運有來去禍福無定端周道蕩如砥朱門競彈冠咳唾生風波誅奪在一言二曜不常盈人生豈得安棲棲巖穴士無為恥泥蟠白日麗高天萬古鈞炤臨但能炤人影不及炤人心人影有時離人心終不移如何申椒芳化為菉與葹感此長歎息淚下忽沾臆願将白日光來炤金與石犁牛不為麟西施不負薪貴賤各有尚知者察其真周公下白屋天下乃歸仁田竇相傾奪玉石俱見焚大雅秉明哲富貴成浮雲昨日趨蹌地今為灰與塵濟濟鴻都士何者結交親我欲竟此曲此曲難具陳東澗結層氷西澗涵清泠北枝方委葉南枝已含榮本是一氣物炎涼不同形何況雲間翼翻飛豈能并朝客孟嘗門日夕投信陵得意膠漆歡失意尋戈兵仇多終自賊豈獨喪其朋不念王貢交千載揚芳名相逢行貽甬川祭酒與子同根樹枝幹夙所依東西互飄泊寒燠歴遷移交遊盛宇内何如我所思長風戾羽翰夢想覯容儀豈期薊門駕改轍復來兹水深秦淮氾草長鍾山陂相逢擥衣帶歡極難為辭盛衰鑑毛髮人代多參差金罍酌旨酒列席薦芳粢中庭擷萱草庻以飫周飢君房下第歸在在有芳草處處有青山君去與之去君還與之還燕臺空駿骨漢宮擯朱顔自古有如此沉㝠且閉闗積雨簡嘉則隂風吹宿雨隂霧羃庭墀畏寒花委砌避濕鳥分枝天暝非因夜泥深不辨谿親朋㫁來徃孤負黄流巵兀坐悄無聊一賦愁霖詩詩成再三嘆四顧将寄誰為語雲栖者啓户當知之郊居朝出野田遊暮向林臯宿策杖入蓬門溪雲猶在足頳霞鳥背翔皓月江心浴樵釣共為徒庶幾鄭子谷幽居屏煩喧觸目恣遐眺烟霞茁屢奇峰巒互騰踔宿鳥競陽枝寒泉迸隂竅欣兹十畝宮托跡亦䆗窱村居何所有歴歴多修竹明星閣樹頭白雲飽溪腹釣月引鱒魴樵霞臥山麓枯槁固所耽飲啄亦自足籬菊欲辭榮林楓亦隕赤芳醑湛盈尊園果繁以碩隣里相勸酬酣歌擊白石俯視池中魚仰睇雲間翼寄遯匪云遠清溪即故栖崇樓邀月近列岫泄雲齊鳥至自相悦人來乍欲迷言訪蓬瀛客丹丘尚可梯積禾已堪炊種蔬已堪摘梧竹儼成行信是幽人宅鳥篆文苔階雲衣罥蘭澤翹首望長空青山浄如拭伏枕不成寐側聽司晨嘷嚴霜切重衾疾風梳敗蕉寒燠固有常龍蛇由所遭集菀本非羡白首甘蓬蒿江上行東風乍雨還乍晴十里百里聞流鶯春波淼淼浄素練春山簇簇行畫屏江上飛花已如霰澤中蒲柳何青青五陵俠客金騕褭瀟湘美人瓊玉筝珊瑚寳玦炤碧草飛絲急管喧層城繡服凌雲翡翠動香輪壓霧鴛鴦驚日中鬭雞馳道塞日暮撾鼓紛吹笙金陵美人鸚鵡斝桂櫂蘭舟不計傾相看莫放赤日落白石沙清無限情鳯凰臺上烏初下白鷺洲前笛一鳴歸途況值明月出囘首猶聞白苧聲城南閭将軍宅同萬民望屠國望訪楊維仁分韻江苑莓苔夕春風玉漏長異鄉今日㑹明月故人觴甸樹圍山郭溪雲帶草堂來朝與君别兩地莫相忘飛來峯疉石圍青壁澄湖映赤城峯迴雲盡入洞轉日初明窈窕丹丘秘逍遥玉女行山中有真隱長坐説無生春日舟行四首出郭便如意春光盡眼中雲衣浮石淡樹杪著霞紅野渡新添水村禽各占叢桃源在何許宛轉未能窮為愛春流好初晴即放船林臯青帶雨江路淡生烟漁唱因風亂鶯花鬭日妍瀛洲應不逺凝望轉堪憐空聞𤣥圃勝何似碧溪行積雪千峯白斜陽一鏡平艣移頻墨藻岸轉只聞鶯信是滄浪好中流試濯纓青雲将畫舫步步可憐春野草風吹綠山峯雨洗新花枝初綴蝶燕語故招人村叟亦何意逍遥傍水濱答顧子病中見訊伊昔盟心久那堪握手稀白雲繁作舍黄葉静䝉扉齒髮先時落芳華復爾違眷兹林際鳥晨出暮同歸省中雨興何處多芳草春江日爾思高臺雲出没雙燕雨差池水絡清溪宅花飛白石堤長安三月盡車馬至何遲夏日吟積雨連昏旦隂雲被日隄柴門芳草合新水綠蒲齊野竹藏青鳥藤蘿引碧雞著書經歲月來往小齋栖村中即事數畝柴桑宅依然白水涯雲深不礙路秋老尚餘花翠壁簷端出青霓樹杪斜村中無酒價客至便教賖十二至戊嶼莊作用樓字只愛青山好添成百尺樓青泉梳石髮紫霧羃松頭刻燭賡新句持杯憶舊遊中庭明月至遽起上簾鈎題候濤山和豐大浩淼疑無地何年此落星洪濤舂日白逺樹貼天青暘谷收漁舶崦嵫列畫屏山僧有真悟對客説元經十六至茂嶼莊作迷却桃源路千章夏木稠青峯排漢出白浪挾雲流樵唱風前亂桐花雨後收最憐河畔柳慣繫木蘭舟白鹿洞平臺開絶壁西望五峯高暝樹栖山燕春臺繡石臯魚遊吹淺浪龍臥起驚濤莫學任公子垂綸釣巨鼇次南禺見新月有懷衡門緣徑啓花榭倚雲成照水月初出近人蟲自鳴疎鐘風外落碧漢樹頭平無限傷秋意同誰次第評簡敖子發朝搴石上英遺子白門亭作吏知時最著書何日寧土花雲助碧山木鳥分青猶共南宮柳時時迓客星戊午元日山中更甲子海上卜星躔漫道新添算翻悲漸減年風舒彭澤柳日暖鹿門田泉石應如舊朝來頓可憐鳯凰臺春江白雲起俄與鳯臺連雙燕肘間出百花杯下然炊烟多度水雉堞已窺天昔日吹簫客清歌誰為傳九仙山高臺凌紫極靣靣出烟霞寺古松生甲林深石繡花朱䦨懸海蜃玉笛動雲牙自是神仙宅蓬瀛未足誇訊余君房讀書大慈山房豈是逃禪客棲遲湖上峯看書親佛火旅食借僧舂夜坐頻邀月晨興每候鐘自便塵市逺日日斷過逢楊蔡二子至留酌有酒一斟酌相看即故人清溪落日静輕燕蹴花頻薄餉新炊霧高懷得借春誰憐仲蔚第碧草細生塵曉起晨星開曙色風鐸響檐端白髮綈袍敝青山病骨寒畦蔬雞啄亂園果鳥銜殘竹裏收遺籜新裁處士冠春日舟行次韻春郊芳草色步步引扁舟未試登山興先為載酒遊輕雲籠過鳥斜日趁歸牛最喜天初霽羣峯翠欲流廣陵曉發征夫逐草露夜夜月中眠霧擁𤣥猿嘯風吹白鴈旋有江能繪樹無路不生烟初日秋光澹芙蕖亦可憐竹墟宅誰下陳蕃榻青山有逸民來從芳草引坐與碧山隣中酒無虚日尋花及好春相看莫相笑同是竹林人隱居島嶼春常在桃源路不迷山禽衝霧落野鹿抱霞栖蔓引青松弱崖懸碧草齊逍遥堪避世從此覓丹梯清平道中山城拂曙動行韉古樹䝉茸襍瘴烟野鳥向人名不辨僕夫無譯語難傳青霞漫簡高賢傳落日長歌古劍篇芳草不須懷故土壟雲溪月亦堪憐潯陽歌九江江水九流盤彩鷁朱旗霄漢間七十二峯今夜月龍門相對駱駝山錦雲堆樹浪花長桃李飛來片片香打鼓鳴鐃何處客怪來驚散兩鴛鴦初秋一聲漁唱海天秋素練初飛白鷺洲亦有芙蓉自開落何人解識漢宮愁甬上耆舊詩卷八

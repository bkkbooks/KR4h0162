body:
  text: 甬上耆舊詩卷二十五監察御史胡文學編少保兼太子太保刑部尚書趙端簡公參魯字宗傳號心堂父龍積學尚篤行人稱為趙夫子以歳薦官懐寧訓導公少從父受經盡得其學先世無他趙于鄞凡家祭畢享餘惟侍父一席公性篤孝朝夕奉父教甚謹年二十二舉于鄉以進士授庶吉士風格為館閣所推重時江陵枋國嫌公無私謁改户科給事中益擅直節敢言如論王文成當從祀蘆溝橋佛寺不當建及請甄别吏治釐刷馬房諸疏俱其大者閹人張進毆給事中于留都臺省交章劾進僅薄罰公抗言進乃守備中官申信之黨不併治信無以服人且朝廷紀綱因此曹大壊漸不可長時信方與司禮馮保比譖于上得旨切責公使回奏公立草上有云臣但知有道之世可以危言不顧君父之前所當忌諱此則臣之罪也朝野俱𫝊誦其語即江陵讀之亦心悔語客曰如此蘊藉不得居詞林是吾過也然竟坐謫髙安典史到官勤修尉職不自知從諫閣來當事檄使主白鹿書院公日勵諸生務先實造從榛蘚中得古文行忠信四字碑為牋而行之詞義剴篤讀者感動諸傍郡外藩士俱來就學一時稱極盛稍遷饒州推官尋擢福建督學僉事時學使者阿執政意待士過嚴常汰多而錄少公曰閩才藪也豈得爾一切以寛行之其于衡鑒為更精所錄士後多為名臣乙夘秋方大校士適得父手書忽心動疑其有疾立投牒竟去當事苦留不可得及抵家父果臥疾不可起公日侍五藥夜則擁父雙足天暑伏牀下進䙝器手濯中裙近衣未嘗一入私室如此復歳餘父始殁公竟得心疾里中無不稱公至孝服除仍起督閩學兩歳五遷南太常寺卿故事百官賀萬壽畢更衣謁孝陵長至先賀冬後陵祀公謂祝釐所以尊君而有事寢園則歡忻之情不暢陵祀所以格祖而反後朝賀則奠獻之禮未䖍具疏正其誤俱報可擢右副都御史撫閩公至大閱兵海上壁壘盡新下教有司立行鄉約保甲境内無盜即盜發亦輒得有陳申者以倭報至言其勢甚張人情震動公察其狀曰是將勾倭以自為功耳立械繫之謂倭來即斬汝巳而倭竟不至漳卒譁有司懼其為變欲勿問公曰廢法以養驕亂之道也縛其魁斬之一軍讋不敢動任閩二年未嘗取一銖一縷幕府市租悉裁以養士及遷大理卿尚贏六萬餘金藉付有司去再遷刑部左侍郎值封倭議起公上疏力爭之改兵部旋改吏部與尚書陳公有年選郎顧憲成共持衡不撓適同里沈公一貫拜麻公遂欲乞歸因出為南刑部尚書陛辭又言封倭非計立枷非法語俱切至南中三尺久弛人易犯公堅持國法即勲貴中官無不斂跡身雖在南每聞國家大事輒憂見眉睫常云大臣誼同休戚豈謂南曹即去天萬里遂可漠不相闗因屢疏請早行皇儲冠昏禮補諫官罷祖陵開採及他礦稅釋纍繫諸臣每公疏出朝野為倚重上亦方大用公㑹在廷推吏部尚書因以公名上沈公一貫疏言參魯才品誠堪大用但與臣同鄉誰肯信臣無私參魯因臣在亦必不至勢必兩相求去惟上免用參魯幸甚公由是在南中九年滿三考遂東歸遣人以狀聞上即家晉公太子太保逾四年而卒前一夕大星隕于㕔事得年七十三公生平學問以主敬為宗為人溫謙有蘊藉而見義直赴未嘗少迴常誦自反不縮四句以明志故能光明歴落為當世所儀若此所著疏草文集藏于家祗役昭陵風霾陡異道中自占祗役趨王事清襟即勝遊可逢風伯怒翻作杞人憂飛鳥一不度恒沙似欲浮應知九陵意掃蕩見松楸雪行即事前驅渺渺度雲微白屋家家盡掩扉驚兎欲歸尋窟走飢烏似乞傍人飛平原車騎無行跡絶壑亭臺只釣磯幸有東風偏送我不妨雪色照征衣遊折桂寺躡磴捫蘿上五峯寺開峰下隠深松小橋横澗人稀度殘刻空臺蘚密封天外長江慿客俯雲中數畝足僧供此來莫訝凌危巘猶有天池隔幾重過桃源縣桃源不是武陵溪白日黄河路不迷莫向河邊問花事綠楊深處只長堤少保兼太子太傅工部尚書王莊簡公佐字翼卿號太蒙生而異五歳輒能解書學儒步不受羣兒狎年十五為諸生家貧授經里中歳所得脡脯悉奉二兄共給朝夕置一大布衣與兄遞衣而出未幾舉于鄉罷㑹試歸其授經如故巳而中進士髙第授工部營繕主事督毓徳宫壽宫及皇城工出入纖微悉經手畫同曹俱無從乾没心嫉之遂隂嗾給事韓某奏公侵費疏下太宰陸公光祖知公名因盡為公㑹計不苐無所侵其節存翻以萬計覆言王主事才且亷給事所言俱無狀公名由是益著出知南昌府公治郡其用法嚴吏俱側足立毋敢出聲郡中諸廢畢舉奏治行第一至所日給俱出自月俸此外絶無溢取及入覲將歸槖巳盡車馬不得發當事為給驛傳符以行歴遷本省督學副使參政按察使右布政使聲名俱如治郡時轉廣東左布政使粤中地阜而法寛屬吏謁上官非奉筐篚不敢見公一切禁之庭中肅然諸上賦例有加耗至十之三之四公命盡準部行權量十不至一庫有羨金十萬可私悉取充餉以南韶旱灾疏免太平橋稅銀三萬念全粤輸賦重再奏免加派丁糧銀四萬有奇粤人至今誦之尋擢右副都御史撫江西江右民自黑頭見公髮且􅀢􅀢白而公復來驩聲溢道上公至申明保甲境内盜漸息稅奄潘相居省㑹横甚猶稍憚公公密以利害開諭之使自請減稅五千民少甦湖口奄李道肆行不法公悉按治其黨因奏革奄稅得歸有司且微使民盡燬其官舎商困亦蘇時江右積大水四年民飢公設法拯救苦不給乃奏改折南安漕糧留以貸民四歳凡四請义請停牲口厨料漕折宗祿留兩院贖鍰及課鈔苧布兩地稅銀免閏月加派及各鎮諸重徵並得報可前後所省不翅數十萬故四載中雖半菽無登而三十郡生命俱藉不死又謂有糧道則監兌可裁有幕府帶徵則稅課大使可革漕糧民運當改為官運弓箭絃條本色當改為折色凡公所建議為朝廷謀節省以恤養民生使䝉實利俱出自大臣憂國苦心足為後世法巳擢工部侍郎理河道時值有狼矢口之決河西務棉花諸口之衝山陽新挑溝之陷邳州直河及脾沙􅀈西月堤之大溢公東西驛走疏濬合期于是皇陵無侵嚙憂運艘得有程抵灣獨早旋召入為工部尚書奉璽書督定慶二陵皇極門殿工公長工部于事固無不辦未幾二陵告成論功三加為太子太傅倚眷方重然時逆黨魏忠賢初用事其勢漸張公知國事將壊遂力請骸骨歸里家居屏跡一小樓下刺謁不通自言大臣老體當如是一日忽見冥吏持牒具車馬迎次日公無疾而卒得年七十有三蓋公官内自主事歴員外郎郎中侍郎至尚書俱在工部官外自知府歴按察布政二司巡撫都御史俱在江右唯一遷廣東故其仕蹟唯在工部與江右論者惜未盡其用公内行修事二兄甚謹眎兄子如其子與人交居厚不居薄生平以潔方自葆至老不渝未嘗干請人亦不受人干請所居先人廬數楹食無重簋終身不畜媵妾之官惟從蒼頭三二人給竈養為大司空時嘗以事笞吏見其内衣俱輕貂公大怒出席解其衣示左右曰吾歴官内外為國大臣尚衣褐汝何等小吏敢服此與杖數十曳之出部門余少時嘗見里中一先輩自粤東罷官歸客笑問曰君歸自粤中槖金幾何此先輩顣額曰粤東本善地但自王太蒙李茂嶼二先生官此地不取人一錢一縑至今十餘年兩臺藩臬尚無敢受人苞苴者某不幸身承其後遂使金銀穴中盡銷為氷雪尚何所有蓋二公亷節其餘風所被尚如此游齊雲笑挾西風登白鶴尋真踏盡紫雲端行看日月横天柱坐對烟霞鎖石壇展誥峯髙人語細沈香洞古水痕殘醉來獨立銀河下忽聽簫聲墮玉鸞守豫章入覲十月霜髙木葉飛計臣將次理征衣官齋惟有琴書在訟閣由來鳥鵲稀垂慣一簾忘吏去載歸片石較人肥不須父老遥攜酒月色千峯送客輝先太保忠毅公諱橒字長孺號茂嶼先曾大父太保公有孫七人公為長先儀部公最少公少負奇質有威重讀書數行下七歳時自其所居室過聽事出就書舎毎日進止不失一步門中有長者目識之嘆曰此兒酷似聞莊簡未可量也中進士以行人授監察御史在臺守直節無所附麗同里某公初罷相亢章論之竟以忤時出為廣東治鹽僉事時粤中鹽法大壊公至慨然曰朝廷名此官非立法鹽終不理然法惟在均在覈因博訪前後大釐剔諸宿弊去吏之姦及豪大猾為螙者法初嚴而適得其平凡歳増額至三萬遂得捐商家積負汰其浮贖復請免屬郡他苛稅以所羨三千三百充之商與民並大蘇因條所行著為鹽政考自後監司雖才必善守其法小變通之此書遂為畫一改山東海右參議值登萊大水公晨夕籌策命有司停征止訟獄招集流亡盡捐郡縣輸贖三千以轉粟濟民民藉不死遷副使督學陜西在濟南李攀龍京山李維禎後一時文衡稱闗中三李適山東復大祲以士民之請再徙守濟南參政公採酌荒政以次畢舉凡守令所不能行公俱身任之大中丞直指所久不決公立遣之撰有公宣記事即擢本省按察使蓋公在監司起僉事為外臺長其舉卓異俱第一萬厯四十七年遂以僉都御史巡撫貴州黔既無額餉歳飢數用兵衛所至十年無俸戍卒三四年無糧㑹征調土兵苗仲㺜􅀈交煽動為亂土司隂與相結更挾以自重其患巳成公再瀝血請餉為預防計而當事忌公威名逺臣號呼漠置不理公因六疏力請疾得許方候代忽永寧宣撫奢寅反重慶報至貴陽震動公念封疆受寄義不敢辭遂復出視事而黔所屬水西安氏與奢賊世姻本同謀其同知安邦彥最狡難制水西去貴陽僅七日公雖日發兵守湄瓮戰老君闗復遵義郡縣聲言推藺賊衝而所憂惟在肘腋圖厚為之備然貴陽奇正兵止三千糧匱守無具公乃佯許邦彥使討藺先給少餉冀稍緩其謀而急從滇中借餉二萬募鎮筸兵三千義勇一千合奇正兵得七千市硝磺一萬七千斤鉛鐵萬斤聚米一萬七千石俱畢集得恃有備而奢賊詭傳巳破成都邦彥遂反僭稱羅甸王合苗仲龍蔡兵數十萬直趨貴陽初水藺合謀奢寅欲取成都作家安邦彥欲取貴州作家因結烏䝉烏撒從霑益取雲南作家事成蜀兵下荆襄滇黔合兵出偏沅遂窺江南其謀不小公諜知其詳謂我惟堅守貴陽斯其勢足控制滇蜀此國家所開一綫官道係西南安危甚重公乃登陴灑血與吏士共申大義分諸營列城八里部署甫定賊步騎奄至公身當賊衝賊望公旗鼓所在盡銳攻之公命將士禦賊奮氣百倍賊據西城外石坡其髙踰月樓數尺賊自上投矢石如雨城幾陷公急命集大銃夾强弩擊之火燄中見人屍若羣鴉攫摶從空中飛墜數百賊俱下坡走復造廂樓髙三丈中可伏數十人外複布枋革用婦人雞狗作厭勝火鏃不能入下推轆轤臨城城中哭聲震天地公命烹一彘雜以斗米飯投城外作遥飼雞犬狀再取虎豹皮張城樓以祓不祥銃石遂中賊廂殺數人賊尚堅持不動公乗黒縋健兒三人持火藥油草從廂下燒之廂立燼賊俱驚墜死者半又編竹籠數萬中盛土為臺乗城出壀堄一丈公立撤大寺鐘樓建城上賊翹望氣奪盡棄籠去公曰玀賊謂我徒能塞門自守耳非出兵大殺賊賊不畏我乃突發壘土開門使銳卒驟前砍賊賊驚敗斬首甚多自後每戰賊必敗其氣大沮安賊更定謀謂惟四面重圍絶其餉道可坐困貴陽遂不復苦攻㑹都督張彥方都司黄運清率兵來援與賊戰于龍里兵敗賊知援兵怯而城中食易盡乃陽追二將尾其後縱使入城次日笑謂城上人曰吾放二將來食盡汝米旦夕俱作餓屍尚能出戰耶時二將兵八千冒稱一萬四千日支米一百四十石至改月尚不決一戰公謂監軍劉錫𤣥曰中賊計矣古人去兵去食正在此時乃使將率兵九千出各硐就食城中尚留主客兵六千初人給米一升漸減為五合至一合遂噉死人肉未幾遂烹活人初米值漸騰至五百錢一升以至二萬錢一升馬肉值二千五百錢一斤舊鞍甲靴帶皮煑爛一千六百錢一斤公力既竭豫以刀繯授家人使各自為計公身扶疾登敵樓城上惟輪疲卒數十人枕甲卧然賊每窺城梯而上公奮臂一呼吏士俱强起砍賊賊跳􅏓自死者無算城終得全自二月七日被圍至十二月七日新撫軍王三善率援兵轉戰至城下賊潰毒圍始解亢守三百日大小凡七十餘戰殺賊萬人得賊仗數千陣亡兵七百餘俱餓死城中人十萬僅存男女小弱二百餘人遺民感公忠義相率就刀俎竟無一人叛者朝廷奬守黔諸臣進公兵部右侍郎公仍稱疾歸里是時逆璫魏忠賢方擅命慕公望重數遣人致意使公重上一疏自敘即召公戎政尚書盡屬兵柄公由是益謝病口不及黔事崇禎改元三年上召對廷臣給事某以宿憾奏公嘗受安氏金盆致生釁幾陷公罪御史毛羽健出與辨甚力且謂貴陽功苦實過睢陽公事遂大白再加一級賜金後數年公竟病卒于家年七十二公擅風儀體長疎眉目如畫望若天神性亷介持操甚厲自起家身與厮養同糲食韲一盂在官凡屬吏庭見使一小史侍立取視所持謁具出身即置席上若中列所饋輒手謁俟其白事畢復使持出蓋公歴官至開府不受人一物亦未嘗知其所饋何物也既出貴陽圍城名震天下然終老泉石不復用即誣口所云安氏金盆本有受之者公亦不斥其人自辯論者謂公初陳徙薪之策既不信于朝廷終有爛額之勞復受謗于門户子公伏波結憤千載及公殁未久兩京繼陷行朝始追錄公以風厲天下乃下詔曰李先生橒貴陽之守可方古烈足媿今人贈太子太保兵部尚書諡忠毅官其一子文緝大理寺副使兼中書舎人公下筆老健生平經濟得盡發于文章撫黔疏草人以比陸忠宣嘗使客作書畧為裁定數字輒煥然意出它詩文集並行世夜郎生還途中感懷二十八韻解褐二十年茫然牛馬走廩祿糜大官涓埃曾効否吾儕際生平誕慢日巳久騰議半違心奉公多掣肘悠悠富貴人草木同腐朽嗟余抱微忠不敢負君友勞怨安足辭七尺非所有馳驅不餘力老大逐郊棷燕越齊秦間差不愧升斗薄劣受三旌士民亦有口嗟哉夜郎遊極目豺狼藪將畧非所長況復厄陽九羽書日旁午物力窮小醜籲閽不見憐下穽徒自吼經年受毒圍勉効墨翟守䑕雀亦巳空慘遭屠膾手人肉以當粟人血以當酒寃魂日夜號白骨成陵阜隂風凄以惡蠻雲黑如黝環刃屬妻孥骨肉等塵垢昭兹神鑒垂援師督戎部雪帳啓城隅賊騎逐河後開門相抱持全疆答天后藉手卜歸轅知罪任功咎困鳥初適林生魚還脫笱有弟在鴒原親老倚閭牖舊業瞻東疇承歡將辰酉揺揺車斾間騁望遍衰栁餘此松柏姿寒溪映清瀏追念千古期榮名何足壽賦得重輪依紫極出震浮金暈重離射斗芒翻空成羽翼生色剖𤣥黄自是天無二還于日有光不須雲物繞早巳浴扶桑述懐少主籌邊日孤臣去國秋恩波骸骨在㷭火夢魂留當宁虚前箸巖闗想壯猷平生酬主意時動杞人憂餘生甘大隠城市亦山林長日容疎帶幽懐託短吟埜花渾率意倦鳥似知心寄語張弧者鴻飛幾萬尋全城天有幸戰伐我何勞張許寧論報甘陳且見撓喜開張仲逕豈續屈公騷欲問升沈理雲深白日髙有生同覆載何事鬬𤣥黄鉤黨仍東漢清流及晩唐倚氷謀巳拙延木事堪傷自惜褰裳晚餘名被吕囊紫塞狼風急滄溟蜃氣連督師煩柱國専閫寄樓船讋服知誰日翺翔既有年昇平何以答茹彚巳翩翩樂事農家得涼風埜老存秫田供伏臘茅屋長兒孫客至驚奇服人來對瓦盆此間堪小築傍水啓柴門送仲韋弟之武林瀟灑憐余季奚囊一卷書淡雲秋色暮小雨晩涼初湖白涵無際楓丹錦不如籃輿應佩筆名勝莫教虛黔陽回途感懐次陽明先生二首行行又復過山塘兵火餘生出貴陽短髪星星戎馬上初衣冉冉水雲鄉空傳干羽綏荒甸坐惜貔貅逞鬼方西顧正煩宵旰計微臣何以答君王過雨千溪漲水痕迢迢原隰望來渾荒城辛苦留孤劍殘驛蕭條飯小村芹曝有懐天路邈風塵回首夜郎昏沙塲白骨無涯恨時有烽烟入夢魂甬上耆舊詩卷二十五

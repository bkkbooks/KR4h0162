body:
  text: 甬上耆舊詩卷十七監察御史胡文學編兵部右侍郎范公欽字堯卿號東明以進士出知隨州有治行遷工部員外郎時大工頻起武定侯郭勛為督其勢張甚公以事忤之勛譖于上下公獄杖之闕下出知袁州相嵩其郡人也嵩子世蕃欲取宣化公宇公不可世蕃怒欲斥之嵩曰是抗郭武定者踣之適髙其名遂得寢稍遷按察副使備兵九江歴廣西福建雲南陜西諸藩臬進副都御史廵撫南贑諸郡擒劇賊李文彪平其穴疏請築城程鄉之濠居村設一通判以消豫章閩粤之奸復攻大盜馮天爵斬之遷兵部右侍郎解組歸時郡中東沙張公竹墟屠公亦以事廢與公並里居投閒嘯咏主一時文柄人稱為東海三司馬而公築居在兩湖深處舎逕窅曲林木翳然不知在城市中性喜藏書于舍中起天一閣盡購海内異本列為四部尤善收說經諸書及先輩詩文集未傳世者與吳門王鳳洲家歲以書目取較各鈔所未見相易故浙東藏書家以范氏天一閣為第一卒年八十三所著天一閣集撫掌集公天一閣所藏書最有法至今百餘年卷帙完善適余選里中耆舊詩公曾孫光燮為余掃閣盡開四部書使縱觀因得鄭滎陽黄南山謝廷蘭魏松雲諸先生集詩錄入選中俱前此選家所未見者其有功吾鄉文獻為甚大矣七夕曲波瀰瀰天蒼蒼牽牛織女停七襄不道停時樂祇恨别時長倐忽日御薄扶桑駕牛服軛心内傷百媚郎千花女爭來乞巧巧不與一曲霓裳淚如縷服箱弄杼殊未央明年此夜渡河梁中秋對月宛宛天上月流影照中堂迅飇屏夙翳四野莽蒼蒼灝氣汎崇蘭玉露凝為霜仰視河漢畔星斗互低昻林鳥無定棲羣起競南翔顧念平生親音塵何渺茫昔為月下娛今為穴中藏穴中無返日涕泗霑衣裳漢宫盛嘉麗曲房森鉤連燕趙徴佳人粉黛盈三千冶容傾春葩被服霓裳鮮日夕紛奏御承恩誰得前我欲望昭陽昭陽髙造天秋風捐團扇流塵掩朱絃羲和促六轡容華難乆妍還顧望明月孤魄行中天悽惻佇永夜君恩儻未旋賦得長安道送孫槐溪郡伯入覲長安大道羅雲烟五城九陌森相連隠隠玉關標北斗迢迢銀闕直中天飛塵百道空中起香車寶馬紛流水引鞚俄過五柞前鳴鞘却向長楊裏長楊五柞並峥嶸雲臺遙接建章宫寶鼎香銷輕拂霧珠簾影動暗生風金貂玉佩來無數輸心競博千金顧子建新成白馬篇相如更進長門賦别有飛詔徴才英潁川渤海皆知名受爵巳沾關内貴佩刀兼許殿中行此意凄涼邈千古濠上龍興㝡神武纁帛煌煌下百川布衣往往登四輔盛事流傳到我皇中興八葉稱重光造語膝前推上相程功闕下多名邦使君五馬來非晏一代循良誰不羨待詔先趨金馬門承恩獨上麒麟殿是時千官奉翠華長安道上春無涯珠鞭幾拂金河栁絳筆重題御苑花男兒立身豈草草乘時致主應須早執㦸揚雄苦不遷上書馮唐嗟巳老憐君意氣薄紫微明良遘㑹古所稀雙旌縹緲破沈霧目送遙天鴻鵠飛汎東湖澄波四望空畫舸泝泠風野寺輕鷗外人家細雨中菰蒲臨水映洞壑與天通即擬尋真去花源杳未窮懷汪長文時居城寺乆訂看雲約西來悵不逢溪猶通一水人似隔千峯露浥中林草風飄逺寺鐘何因乘逸興從爾采芙蓉懷吕中父上黨長年依帝子何似漢枚乘結客惟三晉遊人半五陵月中催授簡雪裏罷呼鷹㑹念林遊者風前思不勝清明汶上春風駘蕩春日晴千村萬村花鳥鳴沿溪鬬草此鄉俗隔岸賣花何市聲不向天涯愁寂莫祗須馬上度清明勞歌日暮流飇發映燭吟詩興轉生和東沙八至茂嶼莊韻盛朝未老即抽身猶向青山自結隣醉後江湖雙短棹嘯中天地一閒人月來鶴破花階夢雨罷龍消水霧塵一自劉郎仙隠去碧溪無路覓芳新明妃曲詔下龍荒去隂山雪作花君恩深似海臨發賜琵琶曠望蜚狐塞黄雲黯不開祗應天上月還似漢宮來送吳山人遊太末江門三月試春衣片鷁風輕去若飛來往富春應不少幾人還上釣魚磯少年行千金調笑不言奢貰酒新豐過落花十二街頭春似海馬蹄今夜落誰家工部右侍郎全公元立字汝徳號九山以進士充庶吉士歴官修撰出册封魯藩前此册使俱厚有饋貽公却不受王重公為手題九山圖相贈曰此可無玷太史裝也時相嵩方當軸傾首相夏公及楊沈諸君相繼赴西市舉朝寃之莫敢言公憤然曰使吾職臺諌當以言爭職廷尉當以法爭吾職史獨有董氏筆在耳因作告天文極陳諸公寃狀詞義慷慨相嵩聞之怒甚使人伺公隙無有乃出為南學士公抗疏乞歸不許改南太常寺卿時京營衞士多穿郊壇堧垣為徑道公驚曰此何地敢若是耶遂限以崇垣有犯者治諸衞士以道紆不便相聚出横語撼公公不為動有樂舞生某坐罪事連勛貴人貴人為居間欲寢其獄公曰勛貴人得自免俱坐幸矣尚欲撓吾法耶再遷南工部右侍郎㑹歲旱兩都大臣俱自劾相嵩從中持之遂聽公乞歸公性至孝歸時髪且斑白益嚴事太夫人出必告反必面屬母病自秋涉春不緩帶居喪柴立竟以積毁卒年六十八生平無他嗜好庳屋數椽與伯仲皓首同居性耿直負節槩不撓初在史館嘗典教内侍有過輒撻之後公之孫天叙入館復教内侍有老璫來語知為公孫搖首曰當日全先生太嚴其見憚若此靈之祥帝受命應天機資坤元定二儀懿母后承令基徳婉婉容祁祁扶天綱植地維翊聖躬式民彝隂陽和庶物熙皇業昌萬國愉軌周姒湛𤣥禧伸西遊驂雲螭徽音垂百世師臣稽首揚珉詞擬古相思欲斷腸香魂渺相隔落月如有情清光下瑤席郎唱采蓮歌妾鼔木蘭楫同行不同歸西風亂霜葉湖邊晚泊落日荒城外棲烏匝樹隂江空浮月早山暝薄嵐深逺火驚村吠歸舟咽櫓音鄉心正愁絶飄泊動孤吟歲暮述懷為客經殘臘歸家夢未成西風一夜雨白髮滿頭生世路空勞役鄉園乆係情江梅多意態相向竹籬横中秋桂白河光浄琳宫景物新尊前同醉客笛裏未歸人塞迥流天籟山髙控月輪有懷渾不寐玉露欲沾巾邸中聞鴈短髪𤣥書病自裁清霜白鴈幾行迴一年歸夢驚風起此夜邊聲帯月來淮海片雲秋共薄江城殘角暮同哀瀟湘千里家何處凍雨西窗首重回送章㕘軍之任麗江燕臺十月霜林曉話到滇南入路岐舟帯西風帆勢飽衣沾落葉鴈聲遲沙江流水斜侵郭漢服居民半襍夷君去幕中勤佐理從來徭俗更澆漓客至問字相過饌草亭呼兒看笋覓魚腥農家自笑無供給止有南山萬仞青禮部尚書汪公鏜字振宗號逺峯以進士選為庶吉士遷編脩教内書堂内書堂者諸少閹所業也公每為談小雅巷伯以下勵其專良之志歴遷諭徳主南京鄉試有當軸以書屬其子公正色曰國家得人重典此事容可干請邪卒不許遷祭酒頒五倫條約禁止超驀及清餼廪之乾沒者以給諸生尋擢南工部侍郎三遷為禮部尚書兼學士遂引年歸里公為人謹重持體前後如畫一蓋前輩詞林之度率如此而公持之益毖性不善干要路值江陵當軸倨甚公與之無欵曲直柔而巳所著餘清堂集典則不詭無汎剽之義如其人焉送郭仲亭還睢秋風忽蕭瑟露寒木葉蒼客子滯京邑倦游思故鄉攬轡循脩途日夕以徬徨川原信繚繞欲渡河無梁回首望薊丘君恩詎可忘荏苒風塵暮驅馳道路長歸來視閭里田園日就荒耆舊存者誰相與叙温涼人心不可測世事總茫茫願以盈尊酒時時沃寸腸題畫叢桂植深林芳蘭彌空谷時有幽栖人獨坐山之曲龎公隠鹿門子雲在西蜀巒光如結黛水流如噴玉野田半荒蕪草木多芬郁對境却忘言洗心逺塵俗願解朝市喧從吾意所欲送詹生還歙主人寄跡雲門山藤蘿石磴任躋攀閉户著書人不識狂歌對酒心常閒邇來為客長安道落葉空庭秋不掃一夕思歸尋舊盟故園景物依然好殷勤為我理芸編他日看君步芳草送關静山之贊皇匹馬西征路秋風木葉催鴈從雲外落人自日邊回覽勝時行縣乘閒數舉杯不嫌疆邑少珍重濟川才送黄子野之南都金陵自昔稱佳麗水綠蘋香别有情雲起江城堪眺望官閒詩社易知名題江南圖渺渺鄉關隔何處栁堤風起花如絮孤帆搖曳人未歸獨立斜陽無一語布政使張公淵字維本號纓泉少孤依其族人在陳州者遂以河南鄉舉中進士授興化府推官甫到官目攝道旁有作睨眎狀者即收訊之果逸囚坐如律一郡大驚攝仙游令值瀕海塘壞漂廬舎而歲方大祲主者難之公請用范資政䇿發粟廩飢民計日使授役塘成民賴以活百萬計以與時忤平遷工部主事出知武昌府時徴殿木于楚故事官募居賈及旅商資厚者充役人皆皇駭公定議遣官市木第召商集事者為計值上下始帖然然運木乆不下當事懼後期得罪計不知所出公知楚藩所積大木無算乃多出金購之王利貲重且畏公不敢匿木遂數足較采運費三而贏一當事俱嘆服以異等遷按察副使備兵紫荆關㑹有妖賊染大林者乘旱蝗嘯聚與大盜安盈輩相掎角依山為寨捜牢無虚日公至設方略分其軍為三鑛卒善緣險使先路麻陽兵甚銳為中堅官兵持重居後且命俱勒兵以待公善風角夜起仰視天密令諸將乘月明並發破其寨盡斬賊首諸竄匿者俱使詣首自贖發廪粟給餘黨盡平當事議上共功公謝曰此俱飢民為亂者郡縣不能撫定又不早茀除使至此若今以為功恐渤海朝歌笑人議遂止歴遷貴州布政使以積忤時遂投劾歸里公持守廉介罷官槖中無長物里居復十餘年多盛徳事余君房先生贈詩有曰平生作事都無過今日論貧總不如人以為實錄焉公少精象數老而不釋所著有革象新書萬物數注較六壬天文圖說諸書行世公所著一舫齋集為吾家子年先生所定故其詩絶工王季孺太史叙其後曰先生烟水情深風塵氣少郊居以萬竹成塢家園以一舫名齋枕白石而潄清泉植青桐而欄紫葯桂楫泛月湖之上籃輿躋雪竇之巔公家居風流略見之矣花朝逺道春相待天疑為客晴看花難記色聽鳥不知名羸馬何年息肥牛幾處耕農家那解意翻為有逢迎大栁樹驛旅抱愁相伴村醪不擇嘉長途還策騎古堞欲投鴉蕉灑三更雨燈抛半壁花如何有歸路依舊在天涯宿華容寺春深纔出郭山寺暫停韀月伴僧歸舍雲迎鶴下田鳥聲閒入耳塔影巧當筵浄室渾無事清心一篆烟病起郊行船放郭門西花深鳥亂啼病餘方厭酒愁絶强分題老鵠徒雙鬢童牛僅一犂小橋歸路晩芳草正萋萋夏日山房即事林園敦宿好息偃水雲居捲幔常通燕垂綸豈在魚一林刪就竹幾卷讀殘書投老因多病殷勤灌藥畬靈巖寺多少登山夢乘春始扣關引泉雙鶴舞覓果一猿還著寺山偏好逢僧致自閒歸輿仍緩步巖外即塵寰途中口占此行不必問淒其麗景偏宜得句竒乆不知春憑草木原非識路向旌旗野溪渺渺寒風度逺樹微微夕照移暫借郵亭今夜宿栩然髙枕且無疑徳化坐雨獨臥江城歸夢頻征鞍暫且息芳塵猿啼烟樹三更雨花落風林一片春題不盡詩因景麗耕無遺地為民貧溪山到處牽余思不但年來苦憶蓴漁舟菰蒲深處見漁家燈火昏昏傍小沙夜半雨晴洲上白不知是月是蘆花秋日山房紅帘斜倚竹枝枯知是前村賣酒墟獨有隣翁相問訊今秋種得菊花無光祿寺卿管公大勲字世臣號慕雲以進士授庶吉士遷給事中在省忼慨敢直言適宦官滕祥輩奏請復故太監黄錦姪浦都督銜授其族人保等錦衣官使守錦墓家人黄斌等與充御馬監勇士以示存恤上許之公同御史陳聫芳等交章言浦前以不職罷不當復叙而保等欲藉口守墓冒官職斌等以厮卒希充勇士名縻廪祿皆不宜聽事遂寢有師宗紀者以黄冠厠名太常寺卿盜庫金錢千計多犯法公復與鄒應龍交發其奸得論如律直聲震朝野竟積以亢直忤時出知臨江府擢為四川提學副使復降知延平府再以副使督湖廣學政遷福建布政使加光祿寺卿致仕公少篤于問學嘗取䝉引存疑淺說折衷之著四書三說學者宗之為詩長于五言力追顔謝閩中曹能始先生為刻其集雙燕曲雙燕復雙燕雌雄夾自飛娓娓入簾幙翩翩繞庭闈宴息文杏梁往來白板扉乘風理毛羽當春趁芳菲雛生八九子顧息同珠璣花間時啄食堂上還哺飢啾啾自黄口習習成烏衣秋風一夜發辭巢向東歸主徳稱無量大厦藉光輝願主壽千秋千秋來相依登江安北巖僻志懷山水行行捜芳勝悠哉江安道澶涎兩江併北巖疊峻嶒古寺迥孤另主人雅好客殷勤足芳興遵途發山麓懸厓陟危磴壁峭排蒼空樹交容一逕𢎞濟駕長橋禪林響清磬拂石烟霞凝虚空猿豹聽坐看峯巒盤俯視林泉瑩迴岡白玉池瓊液下叢徑仙源實𤣥逖凊流自清㵾匪徙愜幽賞惟以滌吾性曠懷既以怡長嘯天地定髙步有同心兹山亦善應望九華山振翮西天來迢迢一萬里乘風下青陽山形削成指翠華結層霄芙蓉列九子江南萃佳氣靈異自兹始玉壺隠仙踪金丹含𤣥理乾坤為我爐日月翼兩耳真詮茍不迷逍遥逸凡軌願言憩蓬壺吾道亦時止渡沙溪碧水自南來恰與西溪㑹陵谷無古今川流自襟帯山形盤地維灘聲響天籟石溜沙不飛樹杪雲如蓋酒旗挂竹隂逸興在天外前村好風日徘徊發清嘅黄氏園亭看山興不極道逢緇衣叟指㸃出空門名園在其右荆扉雙塔縣竹徑不設帚林薄鬱以榮盤迴廣十畝方塘蔽赤鱗悠然自忘笱華閣凌紫霄雲霞結户牖路轉千松闢水從九曲走憩息臨髙臺徘徊崇隂乆落葉方盈庭寒英大如莠兹境信佳麗寰中更何有故園日夜荒荆檜曾未剖清賞轉凄其初服慙自負經行湘南遇雨驅車度南岡五峯宛相對上干蔽青冥下連亘空翠藤蘿蔓不分檜柏紛如隊前旌嵐霧迷四山風雨晦傾崖勢嵲嵲飛瀑聲潰潰褰帷喜沾濡覽景疑障礙晴隂態殊别心賞無憎愛生平汗漫遊適趣良有在阿育王山錫山標靈傑迢逓東南來鄮峯聳崒嵂太白障崔嵬金湖滙澄鑑玉几鋪平臺雲氣嶺頭分陽光谷口開中嵓隠古刹髙亭盼蓬萊梵音啟天籟塔影凌上台舍利藏精光佛跡印蒼苔神龍蟄沙井變化騰九垓烟嵐晴亦雨松風晝起雷山花空色相林鳥自喧豗蓮堂白日静竹徑𤣥鹿猜以兹愜勝賞車蓋常徘徊名巖無今昔塵劫有時災洞房幾荒廢孤雲自去回此中堪招隠前山有大梅王臺驛候館山雞唱雲門峭壁堆萬家依谷静獨鳥下溪迴仄路披荆棘殘碑沒草萊空傳有王氣無處覓荒臺安慶渡李陽客路荆舒盡江帆海國賒天風蔽晴日烟雨漲平沙水闊疑無岸春深不見花暮潮泊南浦指㸃驛樓斜赤壁巉巖赤壁倚天横不盡蕭蕭落木聲莫向周郎論破竹却憐諸葛說分荆百年霸業隨流逝千古詞人弔月明感慨興亡倍寥落北雲南樹不勝情風俗海國春城十萬家交童越女媚年華歌樓估客三更月燈市遊人五夜花布政使沈公九疇字箕仲號東霍中進士授刑部主事稍遷至郎中出以按察副使督江西學校下車先為約學使者按部即臺使者移不得入故終其任無得干得人為最盛先是公迎父就養邸中既遷四川參政乃奉父還里門上書曰臣有父春秋九十有二無入蜀理臣心不忍絶裾願終養帝惻然命以左參政仍領江西於是再奉父往及執父喪服除改山東值歲積飢平度州民聚為盜甚横公聞憮然曰是崛强兒不肻受一簞者耳即先布檄身單騎馳而往衆大驚俱匐伏請命公唯治首亂者數人餘盡釋之復條為食飢法上臺使者時帝巳念齊魯災許發帑賑未至公曰若必待此民十死八矣虚上恩益吏罪請貸所在應内輸錢急散之民藉以蘇歴遷江西布政使有中使以𣙜至先檄藩臬諸長吏俱迎勅公揚言曰是勅中使非勅所守土者也例不得迎中使為氣沮其所移公書自稱予公叱其使曰若中貴人何敢自稱予往髙皇帝起吳時常稱予若欲何為耶中使聞之大懼立造謝死罪又一日移書稱詔視藩藏公苐以籍視之終不為屈以入覲得寒疾卒年六十有八公居官所歴好視其形勢考其沿革每有所咨詢爛若披掌性樂易于功名之際更為澹然自其族父嘉則先生以布衣起東海髙論文章一時諸從如肩吾大若門風甚盛然公尤自許朗鑒每見人持行卷謁肩吾輒笑曰家弟豈知文奚不就我嘉則先生初以豐對樓詩屬余君房論定君房報書曰吾于詩雖得窺其藩未入其室此事終當屬君家箕仲公竟為嘉則刪敘其集其為一時推重若此所著曲轅居集行世善哉行今日樂胥來日可虞天迴地游人莫之知一解彼絃我歌㑹少離多明星可掇肅駕經過二解三十六輻輪輪相復但惜馬蹄不惜車軸三解西門行出西門望金天東方欲出日方今入虞淵纍纍誰家墳松柏始齊肩昨日車馬咽道路行人逼側不敢干一解盎有儲酒囊有儲錢適來故所歡何不酣歌明燭前醉時不見嗔醒後還相憐二解哀哉灌仲子杯酒生戈鋋豈不勞斟酌作色矜一言今日樂相樂毋為鬱抑坐相煎三解贈程公結髮營世業落落青雲姿十上不見收掉臂辭當時㝠觀但一壑中有千年期丹溜一斟酌出入乘青霓期榮無晦朔决起日東西安知特達士綿邈心所晞白髮垂垂生不受清霜欺袖中有黄石偏令孺子知嘯臺歴亂登崇岡荒臺闞虚壑緬懷嘉遯士㝠栖欣所托長流挂葱蒨羣峯縕叢薄初期巳邈然是否失今昨不識行者勞安知彼所度牽率非吾真迤􅆔乖誠諾龍章既摧殘鳳響亦淪沒陶然命杯斚箕踞憑寥廓宿蘇門懷四十二從父伊昔稱尚事適來果心賞喬木翳坡陀清湍激下上道在迹不陳知希物彌奬言願滌邪飾還因跂末響幽躋竟誰諧蕭條賴吾黨吾黨洵特達叔氏驅前往栖遲眷中林鳳鸞亦朗朗寄壽四十二從父文章叔氏登壇早雄心未銷雙鬢老日月長懸短布寒山川自向衡門老衡門何處中散林芙蓉江邊綠雨深青棠孤館纔十尺髙臺面面羅雲岑兒昔與父同出處骨肉相師亦相許大人落落營千秋小兒卑卑干一舉不然提攜起末行豈令當世徒張皇我思𢎞正之間迄今日紛紛諸子誰升堂祗笑前人忘已拙作色相矜開别轍可憐風雅直至今父起布衣光烈烈懷中挾得三千首都門賢達争馳驟未許名山副本藏相如寧困臨卭否賦得大江送周使君大江茫茫割吳楚九派千山恣吞吐英雄力盡波上銷老蛟不怒真龍怒真龍一起江水清東南靈氣開帝京六朝霸業何瑣瑣生死自保江頭城雄圖不但天所授氣壓萬古驅羣英至今精爽駐城闕夜夜照見江波明崔嵬閶闔天邊啟中使宣傳拜天子不見天衣宫裏來徒聞仙仗雲中起使君行矣隨鵷鸞聖人經營特可觀兩都並設存舊貫拖朱曳紫皆王官我將江水送君去白鷺之洲落何處夜半月出江風生一片相思綠楊樹送王懋欽守開封王郎落落風塵裏青天無雲孤鶴起文章能事口不言經綸老手心自喜偃蹇西曹閱歲時沈吟此身論進取一朝被命守汴都五馬驅人渡漳水今日中原正腰腹古來大梁說朝市晨起判事腕欲脫日暮千人膝生胝當路與君號知已何乃勞人太無禮知君才大心中閒臥而治之有餘理夷門古道秋草黄脩竹遺墟暮烟紫雪花片片到搴帷嶽色横天決雙眥蚤涉揚子緒風江水惡凍日海門生人馬慘行色山川奪故形緬焉懷逺道老矣愧微名何處無波浪誰言不可行送四十二從叔之海上收朱邦憲遺草歎息論交日重悲過友生黄壚知朽骨白日挂空名後死身能報遺文手自評千秋良有待莫道世人驚錢唐道中西發錢唐路錢家舊路多氣暄依密樹村盡見平波石骨潮能食山腰浪始過秦王看汝泣東度復如何雨中柬吳山人汝震時寄居鐵柱觀倚柱看黄鳥窺檐拂翠條吾衰春亦去汝病興還饒山色樓中雨江聲郭下潮何如平楚外烟栁赤欄橋初至茂嶼呈張大司馬清溪窈窕覓仙踪臨水看雲面面重山過雨聲侵薜荔風吹秋色滿芙蓉湖天浩渺懸孤嶼海日東南引萬峰豈是桃源無路到扁舟今日使人逢贈吳元美七十百年居第共烟村生長相看世道存父老毎同春賽社人家多自水臨門但愁狂態尊前減巳判浮名物外論最喜西來千丈鏡不慙華髮照乾坤發松林懷仙尋紫柏問道出青松鳥唤風前韻山開雨後容王郎灘東家黄犢健西家騂角彎兩兒賽歌曲但向王郎灘探丸早時走馬夜探丸新血模糊著錦鞍背地殺人酬郭解當場說劍笑燕丹采蓮曲千媚郎君百媚娘大堤相望水中央盈盈度槳難傷藕細細尋絲易斷腸布政使沈公一中字長孺號大若少與從兄一貫族兄九疇同研席知名人方之三謝初中進士值江陵當軸其二子亦以是科第上等使交同榜名士公所最注目者然公澹然弗顧也授都水主事議罷神嶺山采石民得不擾稍遷儀制郎中多與藩邸關時瀋藩負大力有所干請俞㫖每從中出公争甚强事得寢出以按察副使備兵上荆荆多庶宗貧無賴不受有司約公為曲貸其困巳稍整齊之遂循循奉法擢山東參政以病致仕起補福建參政稅璫髙寀與紅毛番通許其貢市為疏請而番舶已泊漳門公亢言疆臣無延寇入門理宜以死守下令集舟師逼使去璫無以奪其疏入亦遂不行進按察使遷河南布政使徙貴州其地無成賦一切車軨之備仰給隣壤適徵發巨材人多受值而逋隣值因不至公下令先輸木者受鏹立得材三千金筑安撫其民頗馴數苦豪右侵公具請使内比為州拓地千里遂力請骸骨歸里逾年卒方公初釋褐從兄文恭公已在史館及文恭枋國深以家門貴盛為嫌不肻引兄弟使同列公亦逺自引避毎與客語終日未嘗一及相君人或徴起居唯唯而巳嘗言吾輩堅立脚根庶晩節不至秋蓬轉雖有智巧豈能益吾命所無其自守若此所著有書禮二經補註梅園集雜興選木積幽翠田田被清池柯問遺扶疎日月潛投輝遊鱗競瀺灂浮藻何紛離散步樾下隂兀坐池上磯日暮霞彩發水際雲光披熠熠林間螢綴目如珠璣朝夕饒應接俯仰無危機對客烹蓴羮呼童理藥畦兹境洵可懷容與無窮期明月篇空庭流素影忽見秋滿地舉頭羞明月低頭暗流淚仕宦牽微祿行商徇髙貲不商又不仕長日留天涯天涯在何方水上到維揚維楊客幾許七日到錢唐長日不宜閒清宵且勿眠眠時離夢到閒處别愁牽再登天門洞不果昨日黑探天門洞兩人緩歩三人扶石龕半嵌春屋古青壁倒浸江天孤焚香跏趺一僧瞑引路出沒雙童呼三年不見徒縹緲獨望頗欲吞江湖歸夢乍醒輒欲往兩脚已倦氣力無嗚呼上山已歎氣力無何以躍馬遊京都春分日日展春寒薄風恬霽景流四陽初大壯百刻正鴻溝食案前雛鵲漁磯下野鷗讀書有餘暇時對撒秧舟邊城麗譙初報夜刁斗正鳴秋徙節隂風急開弓凍月愁羝來青海角馬飲黑山頭劍尾流光動妖星炤戍樓梅湖山房夜宿霜露驚時變庭除隐月光茫茫烟樹闊靄靄岫雲涼虎嘯山疑裂雞鳴夜轉長有懷愁不寐明發舉秋嘗旅館旅館江湖晩孤臣疾病真洩雲霑夕幔歸夢壓重茵不寐懷千載無端滯一身淚流占髀肉吾愧據鞍人泛舟芙蓉苑桃李三春夜芙蓉百尺臺青山載酒去明月刺船回細荇魚羣入青叢鹿自來舊時題石處餘興尚悠哉送别酒逢春暮别驅馬不勝情喙自長三尺須今白幾莖青山猶故色江燕已新聲豫恐悲殊調終當見獨行馬當蚤發鱘魚觜西風過馬當日連波皛皛天入樹荒荒逺岫能相遲歸鴻不記行禹功疏㵸苦今古戒垂堂髙唐城外徑小添沙面渠奔踞石梁好山青不盡疎栁綠無行鳥過春聲換村留雨氣涼兒童炊旅飯城郭認髙堂同謝丈夜尋天門洞三載曾游洞孤笻此共尋哀湍猶谷口新月况波心犬吠疑深寺人扶見逺岑維舟不自意草草得登臨渺渺迴林壑迢迢上石梯屢逢春樹歇漸與暮天齊雲䕶松杉古烟沈虎豹迷中峯結茅屋記得有人栖蓴湖烟水最幽絶遙空晚氣涼潛虬弄波濶去鳥曳雲長艇進參差浦花生逺近香蕭疎丘壑意獨立萬山蒼三月三日滁州古堂七日容髙臥上巳春隂眼乍開納納乾坤誰主客冥冥風雨自樓臺颭牆銀杏可三丈闚户黄鸝能百迴韋澗歐亭俱不惡登臨空羨掌中杯滁州道中雨滁州城郭接天還髙下肩輿春雨間古坂長橋泥滑滑蒼林幽谷水潺潺溪要半渡遲回馬樹頂時摩出沒山行路苦難真自哂題詩聊復破愁顔晴舟中時雨復時晴雲豁江空事事清晃日山川多氣色入春天地得開明輝輝吐蕊花相學冉冉摩霄鴈不驚南馬北驅知漸得一尊聊與客同傾秋宫怨桂殿重重鎖碧雲離宫歌鼓夜深聞乆拚衰鬢從秋草只夢家山不夢君甬上耆舊詩卷十七

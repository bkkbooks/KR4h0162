body:
  text: 甬上耆舊詩卷四監察御史胡文學編吾鄉自南宋詩人篇什散失其後而此道益蕪矣至洪建以來薦紳則有鄭教授而下九人布衣則有至孝李先生而下六人及章宋五先生後先崛起倡雅此鄉于是翳霧漸開蔘棘斯闢後來大家蔚然盡出矣天作斯文諸公荒之于俎豆安可忘也今録其遺詩合為一卷至所稱章宋五先生見耆舊初集中教授鄭先生真字千之别號滎陽外史父以道先生見前傳先生少承家學通諸經尤長于春秋他研博極古今吳草廬先生嘗發䇿十二事對者十不得一先生年甚少為盡答之由是有重名中浙江鄉試第一授臨淮教諭值晉王之國過臨淮王聞先生名延說春秋先生為開陳大義王大喜稱為鄭先生秩滿入京賜燕命賦菊綻西風露脂楓葉詩稱㫖升廣信教授以引年歸里先生嘗取諸家格言著為集傳集說集論復採托鄉先生言行文章撰四明文獻録後學稱之初國子典簿裴中嘗請先生作著存堂記亦求潛溪宋學士文潛溪見先生記歎曰君徒羡我名使我執筆不能過之後數年裴復與潛溪言潛溪曰前見鄭先生記發明洞徹使之獨步可也其為宿老推重若此公無渡河公無渡河公竟渡河吁嗟奈公何長風掀天濤浪急蛟龍垂涎待人食公乎渡河甘墜溺慟哭河水湄公乎不返將安之憶妾嫁公時窀穸矢同歸如何中道乖百年負深期河流湯湯猝未乾妾欲見公良巳難嗚呼命兮公所安公所安吾誰寃愁來只取箜篌彈商聲凄切淚橫臆化身欲填精衛石河伯深宮閟勿聞公乎渡河嗟莫及中心慘慘思愔愔請公來聽箜篌音相從願向重淵深公乎公乎知妾心搖搖花虞美人草也搖搖花花開向天涯花搖搖花如金步嬌憶昔美人年正少青春共覩花容貌金叉聘入楚王宫嫣然一笑胭脂紅獨夫叱咤空四海恩寵惟憐一身在戲馬臺前宫闕深當筵歌舞娛君心君心漸荒霸氣銷淮南却望烏江遙漢兵十萬紛于蟻帳底美人淚如水八千軍散楚聲中獨身請為君王死陰陵古道行人來傾城之色真堪哀金劒霜飛猩暈落夭魂化作春花開花開花謝何曽改春秋浩蕩愁如海愁如海將奈何虞姬墓前春草多花靈寂莫欲歸去杜宇夜啼三月暮平陵東漢東郡太守翟公門人作平陵東翟義死東海翻波寃莫洗新室巳成漢室已傾一朝北面誰為臣噫乎大義甘殺身欃槍光芒射天闕立髮萬指劒雙折碧草叢叢一泓血漢家神靈杳涳濛欲排閶闔訴黈聰吁嗟平陵東奚獨死義公龍舟戲水曲千里晴波汴河鑿萬丈虹橋依樓閣龍船錦纜駕風來五色騰驤駭鯨鰐河伯深宮執玊朝鮫人震懾停織綃三千粉黛出歌舞星裙霞帔風飄飄大業官家擁鑾輅香爇沉檀藹烟霧吹簫擊鼓向中流倚空笑指江都路瓊花三月春晝閒髙臺照鏡憐空顔回首長安歸不得風濤洶湧愁人間君不見昨日燕都誇海子五爪盤拏綵雲起天魔舞罷翠華奔高栁斜陽映秋水送胡廷幹歸松江謫鄉壠畝慰幽栖物外游塵不上衣自有阮生青眼顧也如江總黑頭歸秋風東海蓴鱸熟晚日西園柿栗肥自此不須談作客白鷗應許共忘機寄烏繼善先生紅心驛外望家山颯颯西園兩鬢斑繫雁書成霜滿地飯牛歌罷月臨關漫傳海外蘇仙死終許羌村杜老還客舍不知身健否何時訪我白雲間題五河安淮驛逺碧亭淮山逺送一螺青悄悄雲烟入杳冥檐外竹風醒鶴夢坐中花雨雜龍腥佩聲雜遝天仙下笛韻咿嗚水若聽使者船稀官事少石牀孤坐夜觀星寒夜絶句簡丹徒縣丞竹屋寒燒榾柮烟先生髙卧腹便便淮南為問江南客何似山中夜雪天司稅薛先生敬字原禮宋進士朋龜九世孫也博學有重名至正中嘗典教象山隨謝歸以行藥自晦時稱退菴先生洪武初舉茂才授龍泉司稅即引年致仕先生詩淡朴之中更饒高韻所著江天集子孫傳其業世有作者元日望闕叩頭作青帝更時序郊園泰運開覲親明主賜經國大臣才晴色人都喜貧家客不來恩寬唯海似延首望蓬萊與范宣之何約之重遊隱學寺薄言山寺去兩度出東郊湖草添新漲山禽改舊巢烟霞野衲路鹿豕故人交鐘磬雲深處來聽幾夜敲秋夜江上作舟次大江干推篷水氣寒鴈從今夜度月似故鄉看客久逢衣破家貧得祿安誤人頭白早猶是進賢冠容以重陽無酒詩見投戲答和韻野館蕭然掩暮鴉幸將愁思破鄰家不知誰有登臨地却怪君看寂寞花京國歲時淹海客江村風雨夢天涯何妨明日觴重舉屋後秋園萬樹霞小忩梅花初放見之而喜茫茫凍色暗江天忽見春歸古樹邊素質獨教高士賞幽香不藉世人憐放來薄帶山忩雨看去輕霑水國烟何必羅浮千萬樹儘堪對酒送殘年題高士圖烟栁垂垂壓草亭千峰樹杪向人青是誰髙坐飛泉下木榻翛然似管寧參政王公敬中字子同初中吳伯宗榜進士甲乙科並為吾鄉舉首歷官參政子同有詩名遺草失傳今所存七律三首亦略見音格云送友人赴亷州烏府才華羡獨賢北風又上孝亷船篋書尚有陳琳檄行李都無子敬氊帆影曉分湘浦月珮聲晴拂隱山烟壯游萬里須乘興好著聲名到日邊贈周𤣥初尊師𤣥都道士身如鶴長傍青松寄此生夢破九霄風雨急神遊八表雪霜清吹笙每應秋聲起披羽微連夜色明我欲相從拾瑶草漫山落葉斷人行南湖齊居寄友人山寒夜透青綾被海日朝明白玊珂隱几不知春色晚停杯驚見落花多㫋檀香裏來僧梵楊柳橋邊起棹歌咫尺湖光不相見竹床琴調近如何紀善錢公安字靜能以字行少有詩名辟授臨安訓導遷韓府紀善王深相敬禮嘗召見其子手書具慶堂三字賜之永樂改元聞公名召至京師將大用之公義有不可固以老辭得放還且賜敕曰遂爾優游勸鄉子弟為善亦異數也公既家居日以觴詠為事所著有畦東集老卒于家公逺孫亷嘗輯公遺詩屬余序之有曰當靖難初方以刀鑕鼎鑊處士大夫不屈者公諸藩舊臣義堪去就而能從容乞身不撓不亢以視劉程二長史周紀善或死或去其仁一也蓋錢氏世門實啓于此紀善詩健朴有蒼然之色其佳句如發車廏驛曰寒輕初試酒風好不停橈朝天宫習儀曰火存千歲藥雲擁萬年松三塔堰曰野田低接渚春嶂逺連空過佛壠曰花嶼雨晴椒實麗竹居風暖藥苖肥逺眺曰巖樹有情憐我老溪雲無意逐人流贈陸柳州曰當世人倫歸月旦故鄉父老問寒溫東方彥修曰粗有田園須養犢更無筋力可乘驂人至今稱之舟中遣懷朝發浙江頭暮宿越城下寒月照船忩清霜肅原野豈不念别離吾道有用舍衰蘭在中洲採之不盈把方春桃李花紛紛爭豔冶俯仰宇宙間孤懷浩難寫强取囊中琴起彈仍復罷悠悠世上人誰是知心者泊梁湖􅾞曹娥廟前雲霧積曹娥江上風雨急停舟五日猶未行舉頭問娥譍不得憶年十八初度江昨日年少今頭白開篷忽見江上山山色仍如舊時碧我思今日山中人地爐竹火齊促膝山中我亦有敝廬嗟我胡為逺行役讀書求名乃身纍辛勤用盡三冬力微祿何曽得養親到今負米公家喫憂來正擁布被眠破篷漏滴船中濕岸上敲門借酒家瑟瑟寒風吹四壁夜長展轉不成寐但是思家便沾臆來遲又恐長官嗔西望吳山日東出楓橋感興野水添新雨春帆帶逺暉君誠不世出臣得及時歸大甕開陳釀髙堂著贈衣入關鄉路熟夢繞故山飛喜晴秋風忽起捲重陰日色微茫照樹林野老扶藜看白石山人伐木度青岑門前溪水深三尺墻外竹梢高十尋明日罋頭新酒熟且依松下一開襟紹興越王臺下憶曽游舊褐頻經易白頭上國盛時叨侍從老年今日許歸休魚供春版橋邊飯鳬逐晴川柳畔舟私喜季真千載後鑑湖猶得接風流紀善薛公服耘字濟美舉于鄉歷官趙府紀善所著曵裾録十卷濟善集三卷洛陽上已篇示座上酒客羽觴浮曲水景物麗中天繁花紅照面弱柳碧拖烟繁花弱栁東風裡一年一度何時巳惟有北邙青春深黃鶯喚人人不起誰家年少玉勒輕朝朝來往洛陽城日出河邊修禊罷日斜陌上鬪雞贏楚漢雌雄亦如此徒使人間留上巳請將笑口向春開不到沉酣不知止渡滹沱欲覽千秋跡因為萬里游氷從昔人合水似往時流北土寒應厲東風急亦柔幾回陵谷改不去有沙鷗延慶寺夜坐几淨僧燒燭床空客解衣披心各不倦快意竟忘歸夜雨涼松舍秋蟲慘竹扉十年寥落久已與世情違送上郡太守徐子開赴任士林聲價舊峩峩風采初看似太阿月裏蓮花經華嶽天邊栁色渡黃河雙旌去日中原擁五袴他時上郡歌願以農耕易鋒鏑使君卧閣意如何望銅雀臺舞罷歌殘人不來遙看漳水浸層臺昔時上食今能否何處埋身未許開夜靜月明聞急管秋深露白見荒苔河邊芳樹年年緑空使高情想鄴才立秋日作髙樓獨倚思何窮涼雨西來萬㸃風不覺三時遷病裏復驚一葉落愁中早年涉世游方倦即日歸田貌已翁更恐秋聲容易至明朝聞杵又聞蟲按察使謝先生瑾字廷蘭本蜀人徙家于鄞為人魁岸性倜儻嗜學以進士出使粵中經庾嶺見大木委道傍因作悼木賦以見志尚書夏公原吉覽而竒之薦于朝授刑部員外郎遷郎中持法平出知平陽府平陽俗尚武悍先生戒其屬吏曰治民在順其常性而已能順之則俗不擾而易安由是所部帖然尋丁外艱方治歸部民俱走闕下請留上特報可秩滿遷廣西按察使數辨寃獄軍吏俱畏服之年五十七卒于官先生所在奏治行第一尤以詩文擅名所著蝸濡集行世郡守沈鳯峯先生愷序吾鄉詩曰四明詩源起自唐賀祕監當時巳與李杜並馳循至宋元攻尚互異篇什不傳及洪建以來作者輩出倡雅中朝則有鄭千之繼以張白齊金本清楊文懿諸賢後先凌競彬彬以興先輩戴南江序曰四明詩人萌芽秦漢鳴盛于開元宋元而下其詩失傳至洪建中吾鄉詩學始盛盡歸雅馴嘗得名家數十人若謝廷蘭章文重金本清張白齊魏雲松其傑然者風雅之體于是為偹余按兩家所述吾鄉詩源一以鄭千之為舉首一以謝廷蘭為舉首鄭先生家學淵源蔚然作者余巳選其全集録冠此卷及讀謝先生傳意其負才氣歷落自許詞賦流傳為當代巨公所重而諸選家僅録詩一首意殊不滿近始從范氏天一閣得讀其蝸濡集于腐題爛句中時作驚人語老氣橫厲方稱其人若非先輩藏書則風流盡矣余既録其七言七首他若吉州曰亂山過雨迷髙下斜路穿雲入有無秋雲曰晨度空林迷馬鬛晚拖疏雨帶龍腥樵唱曰數聲去疾雲生屨一曲歸遲月在薪金山寺曰月轉天心山壓卵塔橫燈影水吞虹沙浦曰青裙移櫂腳雙赤金鯉出波鱗半紅幽居曰新聲歌罷春生榻老瓦盆乾月滿樓並竒句也金山寺潮汐難磨萬古塵老龍無地斫浮根戴鼇水弱低三島補石天開露一㾗浪湧兔沈瓜步月雨腥蛟送秣陵雲時聽梵剎傳僧唄柏子香飄半塔熏長淮千里淮流勢若奔咆哮西下地平吞天吳激浪來江口鬼伯推潮出海門疏雨數聲雲入浦逺林一抹水連村泝流有客登瀛去路入青河日又曛梧江漁家生計少經營暖飽時供不慕名撒網唱歌郎首白鳴榔和曲婦裙青鸕鷀小雨灘頭夢鷗鷺輕風世外情行客獨為車馬纍重聽蠻唱有餘聲汾西縣幾家荒冡伴荆榛半里孤城帶夕曛穿穴作廬人類鼠鑿山供爨石為薪雞豚醉樂村祠社桃杏紅香客夢春最是農夫耕絶頂一犁觳觫入寒雲歸牧石橋流水月娟娟自放紅林不記年六七里村黃犢雨兩三牧豎緑莎烟秋雲半濕衣垂骭野曲橫吹笛在肩鬱鬱墓門遙指處可還重上一丘眠羅江神祠土祠祈福慶年豐歌嘯巫陽薦祀同一奠神惟迎社日半竿旗不飽靈風雞豚頌裡爐烟碧簫鼓聲中燭影紅拜祝此時須應感莫嫌門徑有苔封黃陵廟黃陵帝子泣嬪虞絃斷南薰鳯影孤紅盡淚㾗傳翠竹青來魂氣隔蒼梧秋風衡嶽沉鴻鴈暮雨湘江怨鷓鴣明月三千年後夜九疑雲冷夢應無按察僉事黃先生潤玉字孟清五歲侍母病夜不敢就寢六歲讀書所覽輒成誦坐立屹然未嘗與羣兒伍十歲行道上見遺金不拾年十二聞太守王公璡行鄉飲酒禮造學中觀之因默識其儀歸書于册人見所記大竒之永樂改元詔徙江南閭右實北京父當行先生年十三傷父老行萬里詣官涕泣請代官謂其少先生曰父去日益老兒去日益長官善所對許之行踰年至京受㕓都城外十里沙漠寒沍無人烟先生與同役築室成比閭墾圃粥蔬以為生兼應徭賦人不堪其瘁先生安之稍隙輒肆力于學北方無良師友先生以心為師以古聖賢為模楷擇然後言確守不可易都中有富人與一女居招先生寓其家同賈先生辭不往或問之先生曰古人不處嫌疑間此即是也里中高其篤行多使子弟從之因斆其學舉于鄉官南昌教授用薦拜交趾道御史奏彈權貴無所顧出按湖廣斥藩臬郡縣不職者至百二十人俱解綬去威名赫然用少師楊公士竒薦遷廣西提學僉事力屏浮薄篤士風時值寇起用兵都指揮吳某橫掠子女萬餘口劾而歸之副使李立入民罪數百人力為辨出南丹衛在萬山中瘴甚戍卒歲半死為奏徙平野凡先生所施行萬口交誦調湖廣僉事持憲益嚴巡撫都御史李實張甚藩臬俱曲事之先生獨無加禮更黜墨吏二人俱其所私也實大怒劾之降知含山縣盡除諸宿弊閲蘆場重浚麻湖復所逋租與民均徭平訟民大悅竟引年致仕先生好學自少至老未嘗懈其言曰明理只在讀書制行惟當愼獨性剛介寡交所稱許四方名士若李文毅公時勉薛文清公瑄不過數人與客言惟講道論文不少及時事歸居東皋草堂閉門簡出日研索經義謂聖學莫先于五禮因取儀禮析為四卷以禮記比類附之其不類者載諸卷首末各有意義又以軍禮獨闕取周官大田禮補之及禮記載田事者别作一卷通為箋釋曰儀禮戴記附注復考定深衣衰服古制補諸經四書注撰寧波簡要志四明文獻録雜注道德陰符二經因安逺矦栁溥從問古兵法更為孫子注其他備論理事曰南山録詩文曰南山藁里居二十年夀八十有九卒子隆歷官副使是為南谷先生别有傳孫溥字存吾官蕪湖訓導纂續大父所著書是為南崖先生曽孫㢲字啓亨歷官知嶽州府有治行四世俱為名臣祭酒頤菴先生寄讀杜詩一章因奉和先生觀杜詩洞曉其中趣顧兹藜藿腸焉識菽粟味乾坤初未交風雲本難際自匪假聲詩烏能吐忠義髙歌動千言曲庇非一類區區稷契心綽綽廊廟器胡為月下烏却繞風前樹魚龍方混爭鴻雁若相避雖致杜鵑詞曷驅野狐媚間關蜀道行悽惻巫峽淚纍然喪家厖困若伏櫪驥康衢本平夷大雅惜顛墜斯文既云亡吾道安所寄浩浩三百篇寥寥千萬世惟公得其傳作者奚足繼公詩天寶間落日山橫翠詠牛落日散郊野牯牸分後先春風忽相尾老鼻時一掀物情妙造化蠕動無不然傷哉怨曠者世道何其偏奉和頤菴先生秋興秋宵羣動息風景有餘清暗露梧邊墮流泉竹下鳴興來忘宿疾詩就總閒情此際襟如洗憂思何處生自歎白髮釀衰容那堪氣不充眼花時見燐耳聵日聞蛩忽忽如醒夢行行似踏空達人雖識早爭奈太龍鍾書所見楚郊閒縱目城郭見應稀雲過峯掀帽苔荒石褪衣燕穿沙岸蟄鷹亂燒烟飛景物尋常裏誰能悟化機山路遇雨萬里南行愧不才旅懷那得暫時開青天夾路重重去白雨傾盆陳陳來油傘紙穿連我濕竹兜泥滑怕人擡悠悠世味都看徹惟有心期未肯灰入松行心謁衡宫久已齊天靈為我掃陰霾傾翻榖節三朝雨洗淨松行草里街更喜沙堤緣白石何妨布襪曵青鞋行行看到南峯頂一蕩胸中萬古懷和大理卿蔡公錫採蓮舟梭拋葉泛不辭頻界破西湖十里春蘭槳魚浮微借力箬篷鱉覆半遮身折荷作蓋還尋藕製芰為衣肯厭蘋日莫歌聲歸一路路人只看採蓮人冬夜地爐剝栗飲酒周圍盡把紙忩糊六角攢磚作地爐拾得樹錐乾似脯埋來灰火爇如酥連糟頓暖茅柴酒帶殼煨開刺栗蒱長夜老年渾不寐拚教一餉醉模糊鄞城草堂古鄞三面海通潮地局西來雉堞髙日月兩湖環作島坎離雙港抱成濠百花潭上渾如杜五栁門前總似陶擬卜歸休寄長嘯草堂先自號東皋薛亞卿耕樂卷人間名利任紛紛剩買田園遺子孫春雨一犁閒犍犢秋風數頃飽雞豚條桑巳喜蠶盈箔釀秫何妨酒滿尊了郤官租無個事吏胥那得夜敲門題畫青山合勢水分流溪上人家緑栁洲路入溪橋人跡少扁舟常自繫槎頭題家藏山水畫風雪初冬致政還一童一騎到家山短藜力弱土橋滑老我放歌行路難御史董公琳字廷瑞號木石以進士除南京監察御史時户刑兵工四部尚書國子祭酒俱不職公抗疏論之掌錦衣都指揮劉敬父子怙勢橫虐言官為結舌公獨疏其下法遂逮敬奪官子論戍一時風裁凜然出為山東按察僉事在職勞瘁遂以疾請老卒于家子鑰亦為名御史見後傳從子鰲官户科都給事中余近選此集於諸世家遺文最所加意萬允誠更走訪不遺力一日余謂允誠曰城西董氏其先有父子名御史而里中諸詩選絶不及豈兩公俱無文辭耶復念董工部德鏞吾家壻也為公後因遣姪輩往從問其家頗有所藏先世遺集否次日董甥從舊簏中覔得一册來前後剝落數紙喜中尚完好發視即工部所刻先世兩御史集也詩各一卷數十首俱華健有竒氣不愧作者余讀之嗟賞竟日若工部誠所謂賢子孫也工部刻此集在崇禎癸未九月不及半年國難作工部亦下世詩板俱毁今僅存一二册即御史子孫俱未得見若失此一時前輩風雅竟不可復問矣余因簡與公同時若薛司稅敬紀善服耘詩則從薛氏所刻世風録之陳太守本深詩則吾友陳同亮持示其家乘所抄副使張公昺詩亦得諸張氏家乘中錢布政奐詩則余為吾友錢稚廉序定其家集選此數首董氏兩御史詩則得工部所刻本也前此七公俱自二百年後始登作者之堂為桑梓增重夫諸公久以名位顯聞于世家有遺文而諸選家草草且絶無問之者何况布衣草野金石之聲不出蓬户更誰為發潜德之輝耶梨洲先生曰坐視先輩佳文字埋沒是為忍人三復斯言能無感歎秋日早行露濕青鞋澀行行天大白山腰亂鳥聲樹頂紅日色豈苗青以繁池景靜涵碧隔竹新雞啼村烟互如織凉風欺薄衫寒入行人腋念彼風沙陲能無苦行役漁翁小景刺船岸腳秋雨惡蓑襞挂草笠撑篛漁翁歸去沙上頭兩腳競僵帶泥縮寒林枯削落葉黃高山嵂崒江溟茫烟深路黑若衝虎呼妻便舀床頭缸窮冬即事昨夜雨斷風不歇就床吹却書燈滅欲寐未寐展轉間厭聽簷樹聲獵獵嗐喇一響拍小忩莫是寒梅枝怪折侵晨拭眼開破門忽自當門一山雪鰓硉矹詩酒中古來惟有昌黎翁孟郊張籍在何許我欲聨句誰能同把杯手戰衣裳濕茅柴碎火難為烘漸縮如蝟不足惜雙親半百無裘重山中書事分得禪宫雲半間下方難買上方閒忩經小雨桃花盡徑帶餘春苔蘚斑竒篆出香薰古壁亂鐘催月過青山山深盡日無人到坐卧看書門不關咏菴前小塘曉來狂雨過書堂山水分流半小塘栁葉倒垂青鑑影楝花輕漾縠紋香夜寒蟲呌千聲月日暖魚翻一尺霜忽看千山奔不住碧天髙處㵼嵐光出門出自城闉逺望通淡烟晴色曉光融湖山似帶前宵雨花栁猶存舊日風但得常隨芒屨健須教不放酒杯空憑髙且縱山頭眼一片人家淡靄中暮春即事逺山雲出千重岫流水聲歸半掩柴我法于今輸我拙人情非古任人乖午風栁絮輕飄雪夜雨苔花斜上階燒筍煮茶澆睡癖青烟細細揚幽齊庭前晚步一眉新月天西白兩眼舊山溪上青月白山青原自若壯夫頭上已星星訓導周先生序字文彛號味墨有詩名以辟薦授本郡訓導詞家謂先生詩氣體髙妙在當時能超然自出起夜來迢迢中夜長明月流素光如何不能寐徘徊坐惆悵四望閴無人對影臨空牀忽聞孤雁征零淚沾衣裳凉風亦蕭蕭露下凝為霜思君既不來㷀㷀守閨房宫怨羅幌動微風沉沉永巷中鳥啼朱户掩花謝玉蘭空妾意春長在君恩水自東獨悲明月夜歌吹動深宫城西别墅答諸友見訪治生在菑畬結廬向西陌窮巷寂且深荒磎被榛棘晨興荷鋤倦日入復歸息常恐負所懷黽勉在兹役深感父老情出門逺相索觴酌欣時豐即事良可惜于焉罄交歡既醉忘終夕野田行萋萋芳草白楊路落日平原聚狐兔斷碑蝕土巳無文旁人言是將軍墓將軍未死竭忠良將軍既死多感傷萬年千載一壞土石表仆地今荒凉子孫漸逺人莫識亦有栽桑與栽麥雍門引琴為誰悲能不欷歔嘆陳跡月夜憶鄭維乾門前湖水清坐愛月臨城月在不能寐水流空復情芳蘭寒露重衰草候蟲鳴斷絶凄凉夜深慙夢未成至孝李先生本字孝謙父仕開操履嚴正里中比之王彥方生三子長即先生次悌謙次忠謙當元末仕開杜門為子弟擇賢師友不妄交游一時金華戴良永嘉髙明豫章揭伯防武林楊彛陸德暘慈湖胡舜咨諸先生俱以齒德文章來游四明仕開為掃席館舍使諸子俱師事之故李氏造學淵源最為有本先生甫十歲即能綴文二弟俱明鋭嗜學兄弟相友愛有事兄必先弟而弟常代兄行父卧疾先生兄弟日更侍牀下父食乃敢食父至斷食旬日亦飲水充腹而已終勿執箸洪武初郡國例造戰艦吏以仕開饒財使任督既成使者驗艦材不良坐法送秋官論獄先生甫弱冠請代父囚曰父老我壯宜往悌謙甫十八巳為人後亦曰兄多疾且親所愛宜留我當往使者以為非情兩繫之徐偵其兄弟終無易詞竟遣長者往先生至都門輸作日涉氷雪負土石手足痠瘃流血經一歲得赦免歸十年仕開又以冨室主料量米耗罪當死忠謙年十九即荷械詣官曰盜米者囚身當坐幸釋老父官韙其氣貌許之得免死黥而戍竟死遼東仕開卒先生執喪盡禮守令重先生相繼論薦固辭不出郡博士鄭深道常造其家先生閉門不見深道曰所以來求一識先生耳非有它也乃出與語甚歡深道為止宿去㑹詔天下纂修圖志太守汪馗起先生總裁郡乘書成而卒後七年悌謙亦卒先生宿有隱德鄰人寢疾晨候之密以錢十緡置席下去繞宅種竹夜遇人盜笋縱之去次夕為采笋置籬外其行事多類此嘗憫郡中文獻失徵因撰四明文獻録四明先賢記學者宗之他所著有經書問難通鑑考證急就章注長律英華藁中林集諸書蟲言翁翁復翁翁汝儔誰與同此翁不解世間事世問賤老少為貴恨不鑷白還蒼童何用自口稱翁翁蜂遮了遮了主人破屋忙不補只愁秋來長苦雨南岡黃茅亦易求何不剪取遮牀頭城中盡是樓上樓誰念中宵沾濕愁蟬題畫青天際逺水落日明遙岑奮袖拂蒼石憩此長松陰凉飈灑露頂正可絃吾琴古調詎自祕坐惜無知音美人隔秋水望望烟波深何當一相晤曠焉諧素心踏雪犬歌踏雪復踏雪汝身胡不純鑄鐵四蹄截肪行蹩躠前年雪壓溪南橋相隨看梅長尾搖足間銀杯凍不脫至今未向春風消盡日荒村無客至月砌風林有時吠貧居盜逺難為功好了當年黃耳事五郎戍遼今五年緘筒應肯為我傳灤河十月氷連川雪花平鋪如踏氊快足不假東萊船歸期盼爾春鴻前飽飼肉飯花隂眠伐氷行堪輿凝沍陽春蟄滕六飛花黑風急五更漏月添重霜大澤腹堅三尺強六丁力奮寒似熱腳踏手撾齒欲嚙范增玉斗付一揮滿奮屏風紛百裂水仙宫闕隳嵯峨凍蛟如鱔寧敢呵驚將孝子雙魚出截斷將軍數騎過刓圭敗璧瓦礫積轉壑奔崖金鐵劃雪宫爽意逼人寒月窟晶光照人白南江窨子平如坻年年千斯與萬斯兩潮鮮船錦鱗活六月渴吻瓊漿滋吾聞開藏非細事燮理調和寓深意獻羔祭韭並得修沉李浮瓜盡霑賜千年舊禮今失傳官家稅盡私家利題柴昆陵越山春曉圖君莫著謝公登山屐更莫問子猷泛雪舟請君試看髙堂壁倣佛李白天姥之神遊於越山川甲天下秦關蜀道皆土苴柴侯晚年天機精酒酣潑墨為豫寫天姥髙出東南天天台四明相蟬聨影落平湖一鑑淨正對賀老山莊前近山青青逺山小烟霧溟濛漲春曉雲門日出似聞鐘耶溪樹緑應啼鳥鳥啼不可聞林深不見雲只疑空青四山合倐訝飛瀑雙崖奔極知妙手奪天造真宰上訴天為悄獨腳山魈作鬼精偷向靈巖拾竒草水竹江花何處灘漁郎翠縗露未乾青帘酒家石橋右艤舟却憶姚江干長松之下一片石竹杖芒鞋二三客脫巾高挂白雲邊醉倚青天翠如滴送徐允迪還城中寒梅照虛牖嚴霜凋敝裘故人動歸興歲宴不可留徐卿立身何坦蕩行年五十猶偃仰不思唾手取公卿却甘低頭在草莾市中賣藥能逃名杖頭挑錢還解酲悲來不作窮途哭時復有詩鳴不平忘年之交古來有臭味相同即為偶來遲去疾奈爾何無限離情付杯酒北風吹雨凝作花船頭敲氷船尾划道傍行人指歸路城上栖烏還到家城市塵埃易更改還念山林青眼在看花有約明年來教我村童掃門待孤雁篇秋高八月風力狂吹斷長空征雁行分飛漢月去影隻呌入楚雲幽怨長獨夜愁迷荻浦雨五更夢斷蘆田霜苦吻連朝不飲啄側身萬里遙相望相望萬里關塞隔却憶平生長作客隨陽未飽稻粱謀遵渚常虞網羅厄薊北江南三五羣秋涼春燠往來頻曽將捷書報邊使更聨筝柱親佳人誰知中道兩相失漂泊天涯歸未得開口敢出號天聲畏人且塌摶風翼錦衣鴛鴦相並栖畫梁燕子雙將雛誰憐獨有孤飛雁歲歲江湖别離歎送季溫內兄從軍四月五月南風狂大麥小麥相亞黃吳蠶成繭不成繅慈毋又縫遊子裳遊子從軍上京國賣犢買刀助行色西亭出祖栁正長駿馬驕嘶羈不得丈夫弧矢志四方豈效兒女戀故鄉酒酣慷慨拔劒舞青天白日飛秋霜聖主開邊固無戰地盡西南置州縣獨憐殘寇喘息存逺竄窮荒不知變君今名𨽻行伍中不用自誇兩石弓胸中籌畫足制勝好居幃幄參元戎馬銜山前刁斗月龍居河上旌旗風呼邪日逐爭內附凱歌入奏明光宫從此朔南聲教同大開明堂議東封君則長揖辭成功歸來聽我擊壤歌年豐次沈克恭郊行君家櫟社市一徑過橋斜架束新收畫盆移舊種花茶香留客語釀熟許人賖佳句時能寄髙情老未涯送鬱林司征周仲班復任便道還家暫解鞍承恩南上敢辭難七千嶺表重來路十一關征舊任官墟日鳥言夷出洞秋天人面果登盤料知公事多清暇好覔仙翁句漏丹山居為柯定安賦四面青山障俗氛數家雞犬自相聞茆檐低礙巖前石木榻髙栖雨後雲晚徑樵歸憑鹿引秋林果熟與猿分從來懶入桃源市自釀松花日半曛送㢲上人還台州挂錫遙憐野寺鐘赤城何處問芙蓉歸心千里月千里行色一重山一重霞洞春深多藥味石橋雲斷少人踪秋風紅葉桃花似此日相期谷口逢新秋寄德鄰一雨兼旬水沒塍江村凉思陡然增鴻來雁去非迎送扇故衣新豈愛憎逺戍有書終可到小樓無賦且須登不知明日還晴否船過湖南聽采菱謝戴江父惠江瑶柱異味分甘及病叨令人斷酒不能牢𤣥胎剖出雲閒月細殼熬翻海上濤春雨河豚忘下筯曉霜郭索罷持螯東坡尚未知名字嫓美空將荔子褒寄林好謙青青滿座競唔咿坐穩烏皮候日西墻裏竹生虛室暗門前水長大橋低故園風雨今宵夢别館烟霞舊日題相憶尚憐餘病惱無由蠟屐走深泥遊天童寺青松草里萬松關小白前瞻太白山度嶺路迷黃葉裏隔溪人語白雲間海龍護法聽金磬野鹿參禪獻玉環老衲相留成信宿浮生幸得此偷閒示德鄰風雨春寒起讀遲傷心門外落花飛裁詩總拙猶排悶識字徒多不救饑今日山林容我在舊時城郭歎人非年來苦憶鴟夷子散髮扁舟久未歸寄題黃巖張氏隱居天台佳氣鬱蘢葱中有留侯慕赤松繞屋溪聲長落水對門雲氣悉成峰果林秋熟猿將子藥圃春肥鹿長茸幽討莫辭行路逺穿雲巳辦竹枝笻雨後登樓寄舒仲權獨憑危樓雨後忩孤村一曲繞春江白雲低壓青山半緑水交飛紫燕雙落日船歸桃葉渡晚風人唱竹枝腔抱琴有憶能相過猶及殘紅撲酒缸題畫馬曉向天門立仗歸驕嘶誰與脫金鞿鑾輿近日稀巡幸閒放春隄苜蓿肥題宋徽宗畫竹宣和殿下碧琅玕月影風聲豈耐寒一自江南栽老檜誰將消息報平安題畫溪頭春水碧粼粼溪上春山絶㸃塵不信白雲都占盡也應茒屋有閒人至孝李先生悌謙以字行生平孝友見前傳李氏一門至行並擅文章惟少弟忠謙客死遼左幼安不返德言失傳誠可歎也因并志之東門行朝入東門城試作東門行東門小吏打道開馬前髙喝將軍來將軍馬上錦繡袍妙年三十才向髙自信勳勞邁頗牧常將意氣凌蕭曹紫騮一匹天子賜新鞲金鞍搖玉轡腰下長懸兩石弓腹中豈貯三千字清時較獵城南隅旌旗蔽野人塞塗一時蒼皇爪牙奮百里飛走影響無歸來升堂設綺席列坐擊鼓吹笙竽金鳯叉橫翠翹起嬌娥一雙顔色都藏鬮呼取銀錯落按節舞踏紅氍毺蠟炬髙燒白于晝樂事巳遍清夜徂君不見窮巷書生讀書苦一生身被儒冠誤不思學劒求出身閉門猶擬長楊賦春社今日報春社風光處處同社公三日雨花信幾畨風野老還祈榖村醪可治聾醉歸茆屋卧花月淡朦朧八月草夕起東軒步月今夕何夕耿無眠攬衣起聽更漏傳中秋能隔幾夜逺明月已減三分圓雲開數雁影帖地露冷獨鶴聲徹天心情未覺坐來倦燒燈更讀離騷篇夏日雨中風雨蕭蕭水滿村迥無人跡過柴門重來海燕經年客漸長庭篁幾世孫已分生涯甘淡泊却憐交友絶寒暄白鷗日日江頭見心事相忘不復論至行謝先生矩字元規父思恭生二子長員字友規次即先生兄弟俱有文名先生少奉父命為人後而員以諸生充臬掾赴京師後改四川謫戍臨洮調凉州播遷有年且道里絶梗逺非日月可至先生嘗裹糧走萬里資送終其身不輟後以例籍父及妻子俱赴戍所獨先生以别籍免喟然曰吾忍使父與嫂姪獨困苦耶力請與偕至吳門父死先生哀毁幾絶或勸之火輒號哭曰此末俗事雖倉卒吾容忍乎乃以父柩厝客舍相嫂姪至京師遇例家人得放還遂復至吳門迎柩歸葬次年兄沒戍所又間關數千里負其骨歸撫諸姪益至先人田廬悉畀之諸公俱高其孝友篤至名所居曰孝義堂兄友規初調臨洮時解公大紳方謫河川衛吏翰林待詔潘若水亦黜為西寧行太僕寺吏解公名重若水能詩著退菴集友規工文著鳴窮集關中因有吏中三傑之稱友規所傳二文其口毒答一篇詞義最善詳水東日記余嘗讀元規傳輒歎曰先生斯可為至行矣與同時李孝謙兄弟孝友篤相類兩家復擅文章為吾里光華誠所謂有德之言也或曰元規為兄友規為弟元規曽孫汝儀字國正以進士官雲南參政事大母篤孝能世其家賦望郎回山望郎回望郎回望郎不回心欲摧化作山頭一拳石質堅不朽心不灰花開花落秋復春㷀然獨立誰與鄰夜深惟見皎皎月雨晴只有英英雲將心誓比雲與月雲有卷舒月圓缺百年夫婦終古心豈辨新離與故别此心炯炯天地知山髙水深終相期郎君應有歸來時溪雲堂為陸進士作卜築依林澗雲深若洞天無心來逺岫有𣲖自深泉鶴舞添晴影松鳴動壑絃道人名利淡對此足忘年次錢廣文感懷茆齊清味自來甘飲半吟哦日醉酣為問洛陽賢令尹閉門風雨幾人諳栖藝楊先生範字九疇浩卿子也體長美風儀進止有尺寸生平操行誠確雖燕居常盛服端坐讀書至丙夜通易詩書三經潜心聖學視當世毁譽榮辱漠然也楊氏初饒財至先生家益落常授經里中諸生凡在先生門俱能學古尚氣節自立人望之知為楊氏門人也郡守鄭珞鄞令張鐸每歲時嘗造其門聘修實録者三郡乘者一俱為總裁晚年造履彌篤卒之歲自銘其墓曰少而慕古壯而學古老而益好古吾之行也所著道統言行集栖藝槀諸書于詩咏物最多洪武初先生嘗任轉輸至京同郡桂公彥良一見竒之曰君豈此中人耶先生遂益自勵時郡中宿學有洪先生敬道周先生禮黃先生潤玉諸人先生師事洪氏與瞶菴南山稱執友故其學最為有本時稱栖藝先生九月旦湖上偶興凉氣蕭蕭菊月初暫休講席過罌湖芙蓉露濕連枝錦䆉稏風搖滿穗珠水面魚游人可數沙頭鳥跡我能摹此時野興渾無極回首俄驚日已晡鏡川斜日一輪山上頭輕霞片片漾波流平蕪野岸碧千畝喬木人家紅半樓沙鳥頻翔將下宿田夫晚濯欲歸休漁舟各巳收緡去漸有燈明蘆荻洲春菊即蒿菜花東風園裏菜花開却做秋英一樣猜此際正經紅雨落于今未見白衣來圓裁金葉錢無貫高吐檀心粟作堆待看南薰成實後栽苗依舊薦香醅耕隱軒為胡拱辰作年來力穡是生涯任爾蕭蕭髮半華負郭有田都種稻繞門無地不栽花一犂雨足春無耒數葉烟生曉煮茶驥子讀書功益進未應終作老田家松醪五鬛蒼龍釀緑醅槽頭注雨色如苔大夫遷治酒泉郡髯叟重為麴秀才味自茯苓浮瓦甕光從琥珀泛霞杯歲寒一醉同椒柏能使春風生滿腮先長清處士諱迪字睿迪更號長清處士嗣之五世祖也家自二世祖成連先生四世祖肅齊先生始以經學世其家處士少讀先世藏書能傳其學工于詩性篤孝友為人溫恭有藴藉行善里中常衣寒食饑病者為具五藥死而無歸者衾棺之身敦禮讓以教法子孫行于鄉黨人慕其德比于太丘平原晚年閉門教授所從受業俱一時名士每暇日則負琴載酒招儒林士大夫與登崇丘坐茂林觴咏相答以共樂太平年七十二卒于家里中耆舊哭之哀其行事具詳錢方伯奐兵部洪公常叙傳中吾鄉以詩學世其家若楊氏自浩卿栖藝復之諸先生四世而後顯張氏自東皋洞雲諸先生三世而後顯吾家自長清櫟軒楝塘諸先生四世而後顯至今三百年子孫尚能傳其業不衰蓋吾鄉論詩至諸先生始見風格不第家學發源即在里中亦殊有闢草昧之功也吾家既世授經所從交遊復俱里中宿老故所傳哭長清處士詩每得名作其見此選者已數家以外佳句如金騰曰烏几陳千載龎眉守六經齊政曰靜氣衣巾古閒心魚鳥熙倪光曰柴車已斷山庭路劒草空深墓碣烟臧琚曰雲偃雙扉蒼竹徑月寒一棹白鷗汀金溥曰葉落洞門秋寂寂花踈菊岸雨冥冥范麟曰興來蔽竹常開甕老去看山不下樓俱足傳也對雪虛堂披氅坐來輕暮雪紛紛落漸盈人過灞橋來有跡鳥歸梁苑下無聲閉門只合終朝卧放櫂應須半夜行自起捲簾閒縱目橫塘水白路分明答友人紫崖丹壑遍烟嵐惆悵無人駐鶴驂讀罷小山招隱賦欲將消息問淮南郊遊步屧隨風處處扶林花掩映尚前途兒童也喜尋春客說與東村賣酒壚東皋張先生愖字汝誠風儀修整好讀書坐一小閣每竟日不下嘗署其壁曰不同于今人我之樂不同于古人我之憂俯仰自得淡如也生平多篤行姻族有佃先生田者歲不輸穀乃并其田與之鄰人盜先生囷粟多或以告先生曰吾初無所亡也天旱家人括河魚以歸先生惻然曰枯魚方泣奈何盡其族耶為擇水深處放之既絶意仕進所居草堂未嘗有車馬跡唯里中故人梁衡數輩日造酒坐賦詩時相招買犢入市遣僕乞蔬苗作小簡往來俱有風味堂邑穆孔暉叙其東皋集曰先生詩其㫖和平其音格古雅其事不出事親求友田畝圖籍間有山川之樂而意不狂處布衣而能得幽人之吉其風流可倣佛也即事南園夏日長清陰蔽亭臯虛簷鳥雀噪隔水𤣥蟬號眷彼兩文禽振浴回塘坳修翎激晴波和鳴聲交交我欲弄此鳥惜哉無輕橈戃恍發長歎展翮巳翀霄盼盼形影絶徙倚徒煩勞高桐倚崇岡托根金井西交柯結層陰上與浮雲齊儀鳯久不至衆鳥安敢栖烈烈爨下聲惜哉知音稀春日有感桐琴橫床鶴劍立人對青山春寂寂素衣獨舞東風前古絃重張彈未得罷援惆悵起悲歌美人皎皎凌江波梅花欲開隔忩語雨聲一夜春寒多上日立春吾皇臨御始正朔喜逢春霏雪占豐歲調元荷聖神符桃隨意換盤菜逐年新獻夀衡門下熙然太古民九月一日懷梁友蘭不至兩日春風話清秋喜更陪好詩方滿壁佳節復登臺燈火宵堪續軒車雨不來惟應對搖落東望亦裴回四月三日未盡傷春酒一杯微風吹雨又南來浮雲心事何曽定逝水年華更不回數尺粉梢添稚竹一簾香葉長高槐博山無火清薰度何處薔薇昨夜開贈天童詩僧讓公自聞方外說天童夢繞青山草里松珍重能詩老支遁尋常結社勝爐峰傳書度海朝憑鶴擊鉢臨江夜擾龍今日東風花縣裏解衣留偈得從容病中共言人事能催老一病催人老亦成已信百年如轉燭肯教方寸若懸旌青燈夜雨頭新白黃菊秋風眼暫明寂寂草堂誰慰遣坐看山鳥下階行東臯詩川澤冲融土厚渾幾家耕織共晨昏地連源上桃花水門對城南櫟樹村暇日引兒歌百榖良時留客宴朋尊分明古舍田園興安得陶公與細論清明日感懷自入春來不肯晴幾番風雨逼清明病餘蓬巷又花落人靜茆堂惟燕聲川路久無舟可涉石田方歎犢難耕松楸望望何時掃滿眼新烟空淚橫和梁士平江北見寄先生碧眼慣看天最愛江湖景豁然佳句逺尋流水外短笻閒拄白鷗邊夕陽茅屋誰沽酒明月蘆花好放船二十年前舊遊路因君悵望立寒烟寄靜者種得園成鬢已華葛巾風致勝烏紗坐來半月層城雨吟遍今春幾徑花野外漁樵閒作客雲中雞犬自為家紅塵隔水多遊騎應指垂楊羡釣查南園莊瀟灑南園一畝莊頻年種藝學柴桑閉門花雨鶯啼過捲幔薰風燕入忙紅葉但書酤酒劵白雲長護采蔬筐秋成頗為山田薄餐過東籬菊數行甬上耆舊詩卷四

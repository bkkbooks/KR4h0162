body:
  text: 甬上耆舊詩卷十四監察御史胡文學編胡訓導庚字文剛少孤性明粹從鄉先生胡世佐授毛氏詩後與里中單仲友討論益造淵博為文沖雅工律詩同時名士過從無虛日洪武中薦授本縣訓導後調四川安嶽縣在官歷二十餘年歸里逍游山川間寓物寫興自目為乾坤一腐儒所著雲屋集馮灣古井銀牀字勒宋朝年源自它山湧冽泉八角有形攢碧甃一泓無底浸青天隂藏威鳳梧桐老影動蟠龍薜荔懸聞說厲家多好事也須投轄重名賢張知縣得中字大本少孤事母孝以茂才徴奉敕往山西教民樹藝即試其鄉中式尋舉進士歷刑工二部主事以才改知江寧公治赤縣性勤于吏事每至丙夜寢丁夜即起為治不求赫赫名而民安之以薦修永樂大典書成還職未幾以疾終公性嗜書史自起家至歷官無日不親筆硯所著有思牧集贈自然老人姓張名紹宗晚年更號自然老人里中雍睦張氏其後人也二曜迭來往四序互推遷川流山則峙獸走禽斯鶱浮者由其窾轉者因其圓鳬脛短自可鶴脛長亦妍悠悠列萬象連合歸自然若人和天倪白髮垂滿肩行藏踐實地窮達信蒼天扶犂或耕壟抱甕還灌園寧知秋葉落不問春華妍牀頭釀麯糵架上堆簡編興來呼酒飲醉後枕書眠既不慕富貴亦不求神仙自然以自寓髙識斯稱賢我亦忘機者為續逍遙篇臧御史性字孟庠以善書徴寫永樂大典中進士出知成縣用薦授監察御史再改知宜興所著鄞陽柏臺二稿海外放歸渡江感懷萬里秋風意獨長渡江方喜見吾鄉一時功業歸年少故里親朋悉老蒼千柄藕花新過雨半天栁葉未經霜持杯且自澆胸臆况有青山秀兩行莊落自剪溪茅覆小廬半耕荒畝半看書藤花落枕睡初起燕子入簾情未疏籬畔藥苗分類種山深蕨粉帶根鉏披蓑閒釣滄江雨趣在投竿不在魚袁尚寶忠徹號靜思宋忠臣袁鏞之後父珙以相術干成祖舉靖難兵拜太常寺丞遂以父䕃官鴻臚歷事三朝受眷數進讜言位至尚寶少卿尚寶少傳父術然性好學喜吟咏意不僅以藝名所著符臺外集鳳池吟稿和實郎中冏笠菴見贈夕雲斂餘暉稍稍歸鳥集清磬林際浮樵歌峯外急懷人南斗邊露下雲漢濕瑶草春復生深山共誰拾題張秋蟾畫龍張公畫龍人不識筆法逺自僧繇得挂向髙堂神鬼驚恍曶電光飛霹靂想當渤海開筆力元氣霖霪浸無極吐吞霧雨川澤昏摩蕩雷霆太隂黑江翻石轉窈莫測雪濤卷空銅柱仄洞庭扶桑非爾誰顛倒滄溟為窟宅乃知兹圖只數尺坐令萬里起竒色何當置我君山湖上之髙峯聽此老翁吹鐵笛鄭訓導自强失其字參政阜義子也舉于鄉官上杭訓導時稱其詩沖淡有生意留别章二珍祖道大江西春風黃鳥啼石危山路轉地險海城低浦樹夕陽盡人家隂霧迷孤舟今夜泊回首復淒淒戴知縣栗字敬之號純齊舉于鄉官知安福縣桐川道中向晚入桐川迢迢思惘然塵沙溪口路烟雨渡頭船野寺明還沒村家斷復連行囊詩卷重何處息吟肩黃知縣騏字仲良號竹坡官知宜興縣有詩名古意髙梧下踈雨滴瀝在銀牀美人捲簾坐金鴨自焚香風吹緑荷葉望見雙鴛鴦送别為客偏憐客逢君又送君如何在行役常是惜離羣渺渺江頭樹悠悠壠上雲物情將别意相與兩氤氲汪訓導綸字師古由明經官南豐訓導丹霞洞溪上栽桃滿洞花洞門石壁掩丹霞茫茫流水空仙逝寂寂青山自嵗華古木垂蘿還拂地野猿生子亦成家乾坤巳入升平久莫為秦人理釣槎何訓導湘字楚源以明經官古田教諭小景蒼蒼晚樹隂㺯舟晴未巳日落江上山浮雲淡流水即事野曠黑風急天低寒日斜征途不可極何處是人家陳知縣鋭字克進舉于鄉官知泰寧縣題青山寺鍾秀閣手開樓閣羅諸象面對湖山衛百靈玉鏡夜寒通沆瀣翠屏秋淨倒空青避烟鶴起檐間樹行雨龍歸几上瓶我亦逃禪雲水客便應蕭散共松扃袁禮部孟悌字本仁號葺齊以進士授禮部主事為人亢直不能與世浮沈因早引年歸里為詩與堇山李先生齊名送𧦬上人還雞鳴山尋禮叢林罷歸心越嶠邊山迎投寺錫月照渡江船一鉢隨身具雙趺到處禪松房依舊好長與白雲便周知縣致字維逺父以明經貢于鄉早卒維逺少孤出依延慶寺為僧工于詩律方伯楊公守隅見而奇之時楊公方為職方因命養髮攜之入京師使從學于堇山李公李公館之得授徒自給業日益進因與寄籍牧馬千户所補諸生中順天鄉試時都下巳知維逺嘗為僧爭傳其事次年中進士大學士西涯李公聞而撫掌曰此和尚竟得甲科矣出知臨淄縣有異政卒官民為立祠初李公既館維逺復與議婚梁氏女維逺上李公詩曰一從斂袂侍公門復我衣冠助我婚此後有人傳故事即今無地報深恩一時俱誦之和臧博士夏晚園居結廬投老欲忘年物外幽栖地益偏誰與牽蘿遮短户向曾續竹引遙泉枝頭風暖鳩雙坐階下雲深鶴自眠細語兒童休拍手恐驚一樹有髙蟬戴知府鰲字時鎮號靜山七嵗能解書義弱冠舉于鄉中進士出知太和縣改知興化適大祲民至相食公請粟三萬餘石賑民二萬六千有奇瘞道莩二千三百有竒收遺棄小兒官為哺養病者與藥田者給種逋者緩其征荒政為時所法稍遷刑部出知尋甸府罷歸公同母弟鯨鱀䲀皆由甲科起家兄弟相友愛海內談以為盛公里居以敦讓教宗族謹祠事凡先廟祭器俱經重造人以是重之卒年八十八白蓮池避暑茅亭下清香隔水聞白蓮棲白鷺獨坐到黃昏叢碧亭翠微深處一幽亭晝寢衰翁酒半醒窺户雲來牀石潤拂簾風過壁蘿馨髙桐葉下鳥齊立垂栁塘邊馬暫停已見小山初上月清光肻照老人星馮通判應奎字景神號松坡以進士官漳州府通判余初見詩括選别駕詩僅二首及讀其松坡集亦以為然巳而其後人鼎豐出别駕晚年所和陸放翁詩二卷喜劉松坡與同號和其詩亦一卷俱老筆蕭疏擺落宿氣殊為可喜始知讀先輩詩文必盡得本末方為定論而能藏先世遺書不失真賢子孫事也春望下二首和劉松坡遲日臨郊望東風花桞妍髙吟依竹杖狂飲泛樓船草色通幽徑鶯聲入午天無端歸思急春暮欲耕田三月山莊春盡游情倦幽居傍水村草腥多鶴跡地僻少人言雨過天逾碧雲生石有痕山中何所事麋鹿共朝昏山行贈野叟以下俱次放翁韻日日花邊復栁邊更看晴靄帶青烟數椽茅屋依山起一座衡門向水連適意不知春有盡忘憂反覺酒無權老來得遇升平世蕭散人間獨灑然舟至識女潭晴光漾水濯琉璃縹眇烟峯傍日西古寺殘碑微有字貧家頺屋半無泥千重樹色遙遮嶺十里山容盡向溪莫怪兼程行處速一帆風迅似相攜初冬從父老飲村酒有作父老歡歌共舉觴田功已畢蚤輸糧野花開處冬無雪山果紅時夜有霜世際太平人重禮時將寒沍水成梁年來巳入桑榆境扶醉何妨到夕陽冬夜讀書聞雞潦倒無能愧此生讀書翻覺負農耕山家酒熟聊三杓野店雞醒肯再鳴童子得時爭射利老夫失意浪成名試看荒塜繁華盡衰草寒烟亦可驚書懷風塵今巳脫征衣無復登車問路岐一領青袍慙客久滿簪白髮嘆歸遲鳬鷗溪上閒成侣雞犬山中愛畜雌老我多情隨杖履小囊收拾百篇詩小軒野屋蕭蕭逺市城此中應得寄閒情髙低林木元無數來往溪禽各有聲玩易餘功惟卜筮濟時殘算到棋枰山窗不閉常留月獨坐超然詩思生靜院靜院深秋覺夜凉小罏殘燼尚留香園蔬欲刈根初老家釀方開色正黃習懶却嫌人事擾貪眠獨喜夜更長功名巳見浮雲過任我求閒意未央屠吏部徑字直卿襄惠公滽子也少有異才能詩善書翰正德中進士歷官吏部郎中夜聞笛夢破寒猶重更長客正愁何人吹短笛今夜在南樓脈脈難為聽凄凄未肯收含情雙掩耳悲激淚先流太常寺卿吳公惠字仁甫號北川少孤性頴異絶人初作文章學蘇氏年十七歲為三吳人師中正德辛未進士授庶吉士再遷國子司業日㑹六館生說經闡所未有六館生無不喜得師者嘉靖改元上方向用文學公在經筵日講進學士嘗講畢勸上省無益之費停得巳之役以惠生民次日上令輔臣問㫖公一一具上大見開納遷太常寺卿掌國子祭酒卒于官所著北川集漁父行東風二月楊栁青栁塘水滑魚梁平魚行水面㺯日色雙雙吸浪風還腥湖山景屬漁父久生涯日棹扁舟輕中流布網不空舉黃金白雪輝日明得魚亦足免家纍逢人何必論滿籯瓦盆盛酒命妻酌霜刀落膾呼兒烹我歌爾勸且相樂江湖老大終餘生君不見江下漁户苦差役買田粥網紓官徴安得一日如吾醉復醒張長史懋賢字汝隆號覃湖中正德甲戍進士歷官長史遊上塔舍利光存不回巒試一登捫蘿雲在襪汲井月隨繩直拂烏巖坐狂呼玉几慿十年遊覽興今日為君乘徐舉人漸字德逵號與泉白齊先生之甥也有異才為白齊所喜授以詩法正德中舉于鄉遊隱學寺書壁病骨逢僧健藤牀聽佛經有雞方覺旦無鼓不知更樹作門墻立山呈几案清昨宵松竹近頻問雨聲鳴與前山夜酌故人小坐闌干外亂有飛蟲觸醉顏白鶴欲鳴還待月黑雲不動漸疑山夜深星火搖天際露冷霜華宿樹間欲打僧門問茶信竹枝深護老禪關遊西峰寺雨後青山四面齊馬蹄帶過隔溪泥花間有鳥因鐘起飛向遊人不住啼副都御史陸公鈳字容之號石樓按察副使稱之長子也與弟銓釴並有名中正德甲戍進士授南車駕主事稍遷郎中出知安慶府自逆濠之變毒于兵燹公至務以安靜拊循之郡中大治遷按察副使備兵龍里時龍猴二場軍蠻以貿易亂公往治之故挾死囚數人同行初至先視事即斬以徇衆望膽落遂縶首亂者殺之俱懾服復有王景羅者集黑苖入寇公馳至檄論大義衆憚公威名盡解去遷廣西按察使歷江西福建布政使擢副都御史巡撫保定時帝南巡公經畫百務立辦而中貴人與都護橫索賂公亢不與遂共擠之坐落職歸卒于家遊仙巖寺寺在鬼谷巖絶頂危磴風髙欲振衣從來此地到人稀身隨孤鶴青天近寺壓千峯碧靄飛階下峭岩斜種竹崖前深洞倒懸扉禪堂一夜無生話回首風塵事事非暮歸遊遍春山不盡情石林回首翠烟生禽喧暮道還歸客樹暝繁花不辨名村徑小橋來市逺野塘羸馬趁沙平塵纓未許湖山老長樂來朝聽漏聲副都御史柴公經字季常號松洲少有文名中正德丁丑進士授刑部主事㑹帝巡游公與同曹伏闕諫詔跪五日杖三十嘉靖改元遷雲南按察僉事改湖廣有鄭生者有司以怨坐之死監司知鄭氏富自嫌莫為雪公獨條其寃狀鄭生得免沅州判官某與當軸姻橫酷公立按其罪一道栗然歷遷廣東按察使四川左布政使擢副都御史提督留都操江公法律詳整江防改觀以攝大理治獄法曹有為言官修故怨文致人死罪公力持不可竟出之言官銜公約同列交章論之竟坐落職公天性孝友居官門無私謁在蜀除內臺諸所餽贐一不受生平口不道人過喜寵薦後輩時稱長者所著柴中丞集西野西野草堂冬髙風此卧龍敵寒時仗酒踏雪更扶笻書素相賔主梅花作汝儂山隂多夜訪乘興喜能從豐人翁坊初名坊字存禮坐法竄吳中更名道生字人翁以書法名人稱豐考功書亦稱南禺外史人翁少負異才中嘉靖癸未進士授禮部主事值世廟議崇興獻禮人翁與父學士熙同哭諫受杖闕下改南考功主事坐事謫同知通州罷歸學士既沒戍所人翁復言其父前諫大禮非出本意因走京師上書請崇獻皇宜稱宗祀太廟相嵩主其議上從之然人翁竟不得録用歸益自誕放晚年卒于僧舍所著經學諸書持議詭僻學者莫宗之蓋人翁生平大略若此石倉歷代詩選於人翁傳後復載張大司馬考功集序曰公質禀靈竒才彰卓詭論事則談鋒橫出摛詞則藻撰立成士林擬之鳳毛藝苑方諸逸駟然而性不諧俗行或盩中片語合意輒出肺肝相啖睚眦䝉瞋立援戈矛相刺亦或譽嫫母為嬋娟斥蘭荃為薋菉旁若無人罕所顧忌知者以為詭激不知者以為窮竒也由是雌黃間作轉相詆諆出有爭席之夫居無式閭之敬鶉衣藍縷濕突不炊僮僕絶粒而逋亡賔客過門而不入顑頷㷀獨以終其身不亦悲天曹氏曰人翁負俗多纍䝉謗下流司馬持論瑕瑜不掩使後人猶有撫卷歎息者人翁可以無憾于九京矣弇州謂考功詩如沙苑馬恣情馳驟中多敗蹶亦就其人定之耳其實人翁詩于步驟極閒深合古法雖時寫牢騷殊未盡其狂也獨漉篇上天隂隂雲多風疾風疾尚可雲多蔽日野狐哀鳴求匹于藪我欲殪之念其無友文彪徽縶爪牙無施我心懷憤與之同悲魚潛在淵不見其形悲歌躑躅孰知我情黃鳥翩翩在彼江涯凌風一舉燕雀安知效步兵昔偕東里子經過栗陸門先皇俄晏駕嗣君讐醳言乃遇蒲衣輩相將遁荒原石泉辟嘉榖鶉縷負朝暄千秋閲旦暮一竇窺乾坤形骸委大化毁譽復奚言離詩孤松挺穹壁下臨萬里波激湍嚙其根驚飈撼其柯紛紛穴赤蟻裊裊纒青蘿羣攻未云已生意當如何嚴霜一夕墜髙標復嵯峩君子固窮節感慨成悲歌十月十一日作去國已逾紀𤣥節及兹臨修晷何電逝壯懷終陸沈纍纍寒露結戚戚悲風吟芳草委遙澤驚鳥翔空林朝薨尚蠅羽夕寐唯蟲音疲精有斷簡卒嵗無重衾餘悰奚足陳雲海馳余心孤燈未忍滅凄然對露襟余羇秣陵乞休纍疏而格于新令鬱鬱之懷伏枕增劇遂效杜子美同谷體為秣陵七歌時丙戌九月既望也悲哉蒼天胡有知遙遙瘴海無還期丈夫生男不如女人間安用吾生為黃金橫腰矜氣焰猩猩笑人唇未斂狂歌九關死不開痛極慷慨思伏劍鳴呼一歌兮誰忍歌秋風號動沅湘波吾家鄮邑之城西百椽破屋餘竹籬前年倭奴苦殺戮祖母垂白走且啼幸存餘生膽已裂昨日書來驚病發别時衣線猶在身菽水山中仗誰設嗚呼二歌兮涕泗流白日慘慘為我愁我祖全歸鄮山穴青山如簪水如玦時殊世失民共欺宰木千章爭斬伐憶初射䇿酬祖願願得幽泉開笑面那知一别五六年冢上無人澆麥飯嗚呼三歌兮情更苦隂雲四塞飛秋雨側身西望岷山長長天隱隱白玉堂人言士為知已死干旌一去愁茫茫憶昔吳越幾千士青眸偏矚真父子言猶在耳孝與忠悠悠此生堪愧死嗚呼四歌兮調轉急欲贈瑶華將何及有友有友來界塘溫其如玉白面方步出西青日未午握手談笑神揚揚彗搖東壁館飛鵩君身甫出鄒陽獄嗟我生餘行路難何似當年同鬼録嗚呼五歌兮懷管鮑落花紛紛滿庭草天下窮民我最苦弟兄三四皆黃土兀然獨留多病身退不能得進何補自從辭家空罄懸古田春草自年年北山移文誰與勒萬古復心棠棣篇嗚呼六歌兮祗自知欲往訴之人共疑少年攻文恥為吏羣公謬許青雲器陸機詞賦何足奇徒令四海知名字黃鵠鎩翼無雄飛邯鄲才人厮養妻况復夫子有美子折腰垂首端為誰鳴呼七歌兮歌且住春來拔劍還山去清明日驟雨清明日繁花半欲飛流年兼病長客舍獨春歸東海稀魚雁西山富蕨薇何當出游衍長此謝隂菲晚秋遣懷身世真相棄清貧久自忘蒼苔緣破屋黃葉滿空牀飯借僧厨米燈分佛殿光猶餘五經笥一任鬢為霜和東沙春日言志夢廽初隱几黃鳥忽關關靜日無人到春風共我閒幽花迷曲徑修竹滿東山稚子慰岑寂提壺貰酒還除夕白髮烟江戍丹心白日懸安危付僮僕骨肉限山川有恨思填海無言可問天蕭條愁病裏况復值窮年李六峯侍御鄮峯草堂落日浮窗白凌霄入院香酒醒初覺暑天曉細生涼䇿蹇陪驄馬談𤣥叩石桑豈無家可念身世兩相忘己巳人日即事春霧䝉花桞春禽語屋檐絶糧長獨榻避世只空簾藥餌貧難致文章老更耽亦知𤣥覆瓿千載俟桓談衰病慙增嵗兒童喜遇春故交驚漸少後進畏相親先壟參天樹賔堂積寸塵豈無登覽興其奈楊中身春日金陵懷南泉太守借得揚雄宅春來賸物華清流魚作隊髙樹鵲成家岸幘風初暖題詩日未斜故人不可見回首望天涯春日早朝玉漏初殘曙欲生千官端笏候華清烟消碧瓦參差見月晃金門上下明仙仗乍移雙扇合侍臣徐退萬花迎孤忠自許酬真主况復簪纓際太平春游南風吹雨落緋桃曉岸春光栁絮飄水漏苖田青萬頃雲生松嶺白千條鳴榔漸喜湖莊近垂釣寧辭海國遙二紀養成麋鹿性此行非為北山招春日登司天臺簡張惟靜芳春邂逅一登臺逸興渾疑跨九垓江繞皇州千嶂合天行白日二儀開暖風吹面將舒栁霽雪飄襟半落梅欲賦兩都時閣筆年來慙愧孟堅才答俞子木見問東海山人枉尺書問余宦况近何如青山屋上雲常起緑栁門前葉半疏遣使花間調小馬看兒蓮下養生魚秋光日日催詩興只是幽憂病未除畫松青天如羅幃明月大于掌田夫荷稻歸相見東臯上山居郭外桞新暗湖邊草欲齊彈琴罷庭鶴分食到山雞屠副使倬字文卿號東崖簡肅公僑弟中嘉靖癸未進士官至按察副使寓常山贈陳令尹艤舟溪上夕陽斜候吏相看鼓疊撾百雉山城今有色半村桑柘自成家月移松影臨飛幌風送泉聲雜暮笳海國瞻天春信杳還慿驛使寄梅花副都御史周公相字大卿號梅崖中嘉靖癸未進士知臨川縣有治行徴為監察御史嘉靖六年靈寶縣奏黃河清五十里上命太常往祀以答神貺公上疏諫請罷祭告稱賀上怒下公獄杖之六十謫韶州經歷歷遷至參政致仕公初家居時慈人袁文榮公煒尚為諸生公一見奇之稱以國士及袁公入相遂以遺才薦起原官遷副都御史巡撫江西再致仕歸卒年七十六公生平通脫有晉人風味初罷官里居郡縣長吏造門多不得見嘗有所交某過公公款之飯其人曰縣主簿適召飲當往公送之不即别及近縣門直入主簿廨造其酒坐主簿倉皇修具公遂與痛飲至夜分次日太守令俱謂主簿曰若與周公何交得延上客主簿曰實不識周公面也其風流多如此信州遇陳雨泉憶昔三巴别于今十七年聞猿同白帝放鶴各青天每入寒山夢奇逢信水船臨岐相笑約後㑹十須全明妃村秋風吹草萬林黃青冢遙連漠北荒烟鎖山眉顰翠黛月臨村口照宫妝天邊沙磧氷霜苦馬上琵琶道路長總為漢宫深似海千門寒日怨昭陽張舉人鋐字叔治號鳳山正德乙卯舉人詩與倪畏菴齊名惜志𤣥天運無停白日照中野一朝受我形萬變隨陶冶御形固有司執心良不化願從古真人浮遊跨天馬出入無窮門宇宙盈一把俯瞰八紘中促縮胡為者衆竅號未休因聲寄瀟灑撥悶武皇南巡時作寂莫悲秋客徘徊去國心青天懸樹杪白日下城隂瀚海雲初積虞淵水更深萬方瞻造父何處八鸞音讀史汾河簫鼓集樓船萬里巡游瀚海邊但慕蓬山連弱水豈知㷭火達甘泉侍臣只奏凌雲賦詞客虛傳出塞篇日暮五陵原上草古今回首一澘然七夕詞憶昔明皇清夜游曾誇長樂笑牽牛合歡宫裏金蓮燭不照驪山草樹秋析木橋邊月欲斜鳴笳疉鼓送仙查銀河水濶思歸晚金鳳樓中燭幾花包同知梧字子木號白崖少有異才以舉人授判蘇州時中貴人督織造凡郡屬俱庭謁子木獨長揖不屈且數裁之遂為所誣奏謫同知無為州遷同知漳州府罷歸為詩文奇軼自喜余覔其白崖集未得俟異日補之簡少華山人上林探石髓誤劚蒼龍耳入海登𤣥龜折彼珊瑚枝蒼龍不醒夜流血破玉山前飄絳雪紺珠入手鬱嵳峩移種瑶圃生微波少年公子天都客骯髒風塵髯似㦸朝從青海泛青槎暮宿商山餐紫霞枕中鴻祕琳琅篆丹砂白石成九轉山經水譜那得知赤龍鞭日回夕曦回首天淵路未極返君初服瑶池側包知縣桐字子同號同谷嘉靖戊子舉人官知縣送屠秋官國望復任留都寒江渺渺烟霞開揚舲西指鳳凰臺大夫十年不得調風塵千里胡為哉銜杯日薄離亭暮拂劍霜明落木哀璧水貫城原只尺相逢還許坐莓苔俞知縣友行字信甫號越崖嘉靖壬午舉人授知某縣次孫太白幽居雜興地僻寡生事春深漸輟耕句從雙屐得雲自一笻生茆棟營將落瓜田種欲成何時逢石髓脫屣棄浮名張知縣謙字子益舉于鄉知懷寧縣雨後看山雨餘農務急先整舊畬田散漫初生草蒼茫欲霽天風微髙乳燕水漲急歸船更喜山頭色青葱勝舊年舒工部纓字振伯以進士官工部郎中有詩名石倉選其集春興江郭散初陽空齊曄有光草容爭出砌苔意欲連墻應候鴻登塞依人燕在梁無嗟身落莫蘭谷自多芳山齊小作茅齊倚翠屏林隂浦色總移形天連楚岸平冝眺潮過吳門逺可聽淡愛禪心僧許近靜無人跡鶴來停更憐竹户斜臨水為納春風夜不扃山行事去身如夢愁來酒見勳棲遲依江側漁牧喜同羣戴工部䲀字時化號少山以進士官工部主事四戴中惟工部早折論者惜之玉臺觀次蔡白石韻赤日五雲外危樓四望晴石門通虎豹崖寺剝丹青芒碭黃河伏崑崙北極橫上方鐘磬發車馬下平明江夜海甸悲笳切愁仍倚柁樓沙清懸月白崕合湧江流客淚魚龍夕邊塵鴻雁秋如逢采蓮者悽惻蕩虛舟戎通判來賔字孔塘以舉人判南昌府郊居即事作吏才偏拙為園意頗深風塵元畏路山水是知音徑曲叢篁密堂虛淡月侵平生甘放浪自合蚤抽簪李筠州循道字遵行號篛谷以太學生為筠州判官漂母祠雲黯磯頭日未紅人間誰是惜英雄伊家尚識千金報漢主都忘百戰功一片斷碑荒草合數間古殿舊城東自憐飄泊天涯去何處相看進食中楊少卿美益字以謙進士歷官太僕少卿伯翼先生其子也四月草八日遲朐岡憲副邀至教場魚池亭小集嶂烟蒼堞曉泉響翠微空弱燕迎人語鮮榴趂席紅雲迷天末路麥盡隴頭風倐忽更寒燠驚心鬢已翁黃嶽州元忠字資睦號整菴以明經判嶽州黃氏兄弟俱工詩整菴更為獨步宫山萬石之英百藥之精埋雲浴露仙壇效靈石蓋如張石帆如揚䝉花冒卉千古文章獨秀峯徂徠四十峯獨秀凌髙絶雲霄上暗靄兒孫下羅列秀色迥不羣以是名孑孑常抱出世姿似畏交遊缺時從氣氤氲俯首引卑劣清風忽飛蕩萬物仍嶻嵲優哉浮與沈終當從故轍三陽好道晚逾切幽懷在崦棲異鄉逢一勝停馬便相依獨樹當門起千山入户低到壇參羽客掃榻啖青薺未晚疏鐘動𤣥宫早自扃蟬鳴松月暗鴉散栁風輕露坐才終餉髙談已二更誰知浮世外馴鶴有餘生祖關畏炎真擬入山深出郭平堤桑柘隂野寺荷開池水碧空堂禪定夜風侵一燈明滅傳昏旦萬竹平安到古今人世是非殊未定幾聲清磬思難禁丙寅季春過陳道夫看海棠栁拂青梢一幹斜轆轤臺畔數歸鴉夜來紅雨春深路記得江南有落花黃僉事元恭字資理號省菴致齊先生從子也以進士授工部營繕主事所司職與內監相關公未嘗稍為屈一日司禮大璫以諸曹疏下公當入領故事領疏曹官既受疏北面揖大璫南面報揖公謂疏在若手猶可既授我而南面報揖何也且左順門上所常御豈而南面地竟出弗顧諸璫俱以强項郎呼之庚戌京師戒嚴廷臣舉公將才公內修守具奉命行視南郛址築盧溝橋俱立辦後竟無名其功者時相嵩方擅命公疏其狀罪乞早竄僇以謝天下疏巳入銀臺矣尚書文公明愛其才密從司禮取公疏毁之然相嵩已稍聞之遂坐公他事謫判漳州稍遷南兵部郎出為河南兵備復以忤撫軍李遂罷歸卒于家所著有漫遊集同張大司馬至茂嶼莊作品山亭下品山人日日山中不記春一自白雲邀鶴駕但從緑野狎鷗鄰春風秋月蘇門嘯翠竹明沙錦里巾借問巖巒誰第一欲分方丈迭為賔袁僉事大誠字宗正以進士歷官僉事興化感懷十三韻封疆嚴徼塞法紀肅天門聖世欣安壤夷風忽剖藩逢辰山堞亂入戍郡樓喧煨燼偏憐冢瘡痍莫辨村江聲疑辟易地勢欲狂奔毒憤嗟開闢祲氛漫吐吞瀨溪朝唳鶴島石夜啼猿遠客空投主殘僧獨倚垣芹宫多寂莫桑户幾生存路繞青春麗愁看白日昏莊生奚足嘆賈誼豈堪論共仰烹倭烈誰成推轂恩但今風雨夕千里賦招魂毛副使為光字龍伯以進士官副使秋懷榆莢空庭改秋光似去年林鳴風裏葉雲靜水中天涼意還誰語幽思只自懸緘書時未寄鴻雁肻輕傳柴布政淶字季東以進士歷官左布政使有柴方伯詩略余未見之和胡小渠包瑞溪署中春日聞鶯晝靜鳩鳴深院關春光一别幾時還素心自許淡如水青鬢誰能長似山雲漢却思馴鶴舞風波不動野鷗閒從容退食渾無事須是身兼吏隱間黃鴻臚元肅字資安以太學生官鴻臚序班題雪漠漠空無跡飄飄似有情但看林壑變誰識羽毛輕連嵗長安歉扁舟剡曲行酒村遙不到淨掃入茶鐺傅知事文淵字宗靜以太學生官按察知事江樓晚眺野色逢山斷江流抱屋斜牛羊歸落日鳬雁立平沙逺樹將生暝寒梅未著花孤烟叢薄外隱約有漁家知府髙公萃號南麓為諸生已有名浙中登進士就教延平稍遷國子博士宗伯唐公文獻方滯于成均困甚公力加奬拔期以國士果大魁天下人服其識歷官刑部山東司郎中日本封貢議起司馬石星力主之遣臨淮小侯李宗城往封事敗宗城逃歸上怒下之獄司馬懼罪欲委于遼督撫公語宗城曰汝罪應死第實言無妄及他人吾當生汝宗城具伏㑹廷鞫公慮有變復嚴誡之宗城如公語得無連坐宗城亦援八議從輕典陳太后梓宫至陵所故事一中官偕四指揮馳報適中官馬蹶指揮直馳至宫門被劾罪死公曰指揮固有罪然自皇城至宫門皆有守者罪宜并坐為檄取守者姓名羣奄恐因共緩之四人得無死其善處獄多若此出守肇慶方鉏强疏困為民興永利㑹與監司忤遂解組歸以名德為里中模楷家學世傳大中丞斗樞其長孫也答冒伯麟寂寂似僧居朝朝賦遂初貧因思辟榖病或至捐書麯糵非吾事蒲團定不虛以兹甘削跡終日任頺如因依當嵗杪違濶自春初以我嘗耽寂逢君亦著書蓬蒿生任滿花鳥性全虛忽爾投珠玉清風咏穆如柯孝亷茂夏字㑹通舉嘉靖甲子鄉薦居家以孝友聞春日有懷日映紗窗紅雞啼茅店曉倚杖踏春郊春光入面好桞條曳輕烟鶯聲轉新巧關河遊子心依依視瑶草甬上耆舊詩卷十四

body:
  text: 甬上耆舊詩卷十九監察御史胡文學編禮部屠長卿先生隆先生别字緯真亦號赤水少時其家少司馬竹墟公數稱為異才司馬嘗夜夢蒼龍入室及旦起先生適至心益竒之日與大司馬東沙張公共相延譽名益重中進士除潁上知縣調青浦在官建二陸祠延接吳越間名士沈嘉則馮開之諸公泛舟置酒青簾白舫縱浪泖浦間以仙令自許然于吏事不廢嘗有部使者入縣言霪雨乆苦令日行水啟閉得田苗無恙先生對曰公所見負郭者耳他汙邪渰沒甚多今何敢隠民疾苦以此欺公使者絶嘆服稍遷禮部主客司主事進郎中其在曹好客益甚而槖中屢空時解帶付酒家稍取供客王季夏太史為作銷帶行紀之西寧宋小侯少年好聲詩相得懽甚兩家為曲宴杯䦨燭滅每極子夜遂中白簡解組歸過吳中由拳父老為斂田千畝奉故侯請從泖浦卜居先生但與飲數日謝歸自束髮名髙睥睨當世為詩文任心縱口以此自豪嘗集詞人四座戯為葉虞叔咏松齋李之文咏芙蓉池各限數百字言笑中須臾巵酒二詩並成又與客對奕口誦詩文我誦彼書書不逮誦自叙其所作以為姿敏而意疏姿敏故多疾給意疏故少精堅今所傳由拳白榆采真南游諸集皆未嘗具草之筆也既不仕乃遨遊吳越間歗咏山川自矜出世已而溯旴江登武夷窮八閩之勝阮堅之為晉安司理以癸夘中秋大㑹詞客于烏石山之隣霄臺名士宴㑹者七十餘人而先生為祭酒棃園數部觀者如堵酒中樂止先生幅巾白衲奮袖作漁陽摻鼓聲一作廣場無人山雲怒飛海水起立林茂之年少下坐先生起執其手曰子當作撾鼓歌贈我快哉此夕千古矣已稍倦游歸里門客益輻輳每置酒不過一更輒更然燭坐齋中塡樂府詞十餘紙命善歌者王子長為定㸃拍唱之隨去其繁者自脫手至上口時所存率十之四有御史行部遣吏白旦日早臨家人請脩具然先生實無一錢且偃卧榻上家人不敢復請日向昃適西陵某公遣使者來購文以白金具札為壽先生即起召使者入問發緘立撰文併作報書遣使出門日景未盡即以金盡付家人不啟視及晩年家益貧更出游人間阻凍金閶作歌從李叔𤣥乞米自嘲自戱讀者憐之復留連虞山狼五間判年始還未幾遂寢疾先是吳人孫榮祖挾乩仙稱慧虚子先生篤信之及疾革猶扶牀凝望幾慧虚飇輪迎我悵怏而卒得年六十三其未行世詩文名絳雪樓集尚數十卷藏于家先生異才天縱横視古今里中父老傳其飲中下筆杯影尚搖歌聲初轉一揮已滿四座盡傾莫問得傳千載只言取快一朝亦既極詞人之豪矣先生論詩謂杜陵自有髙妙獨立處今人徒尚其麤樸豈為知杜陵者可稱篤論生平北面沈嘉則先生推其七言古詩海内獨步故先生于此體步驟亦適相近當其意得處山奔海立斯亦一奇也余嘗謂錄古人詩要當于彼法取其獨擅者耳近家選長卿僅存一律復非其所意得使前人才氣于何得伸竟陵錄溫李詩欲全以我法掩彼風華然溫李亦何可掩也余既定屠先生集合于虞山所選讀之始一快時謂李供奉而後先生一人而已正以其才略同也短歌喬木多隂曠士多懷憂來無端西風鳴哀一解無登髙臺以望絶逺浮雲紛馳白日何短二解晨登崑崙以臨具茨四海雖廣不容鬚眉三解太行可登海水難測裋褐行歌若出金石四解善哉行來日大難地耄天荒花開不飲葉墮空傷一解秦望三山以臨洪波金棺之下白骨峩峩二解富貴無常霏雲流霞時移運謝王侯布𤓰三解人有美酒天有良宵何以為驩打鼔吹簫四解暢適豈誕沈㝠不昏客來笑歌客去偃門五解世人無稽盛言八公起眎茫茫白雲在空六解震旦篇寄吕充符吾聞九州外别自有神庭二曜未曾到四照花常明瑤臺萬玉户玉户開峥嶸蒼虎守階戺桂樹夾兩楹靈藥無不有瑤草冬夏青神人何曠朗幡幢光爛盈容顔氷雪皎衣裳雲霧輕所語非世事恍忽而噌吰口不設毁譽心不藏愛憎吻距靡傷害澹然寡攖營但感滄海變不問人代更昧者謂迂誕曲局安足傾此土本穢濁傷哉朝菌榮何當煉金骨白日翔太清臨淮曉發行邁一何早驅馬出郭門馬足踐嚴霜北風厲寒原時方屬青陽褐衣苦不溫側身望四際烟沙莽相屯落月白無色天星麗以繁山川曠蕭條霜露空草根何人驅馬來疾如流星奔但各東西馳不復交一言傷哉行路難逖矣勞心魂聞沈嘉則先生與汪長文游四明山作四明迥竒絶獨立東南州上與元氣合下見滄海浮烟霞日莽互何人窮其幽二君䇿髙足能為十日游白雲度千嶺青天開雙眸捫星帝座近得句山靈愁倦來臥蘿月海風吹蕭颼洞天閟瑤草何時尋丹丘南滁大雪歌昨日何日故人一尊虎丘月今日何日馬頭十丈南滁雪昨日何日金陵管絃喧酒家今日何日闗山石裂穿寒沙從來雨雪多江北囘首江南淚沾臆所以古人憶河梁昨日之尊那可得西風太有權濁酒都無力冷如鬼手捉馬鞭狐裘蒙茸亦何益寒山日落牛羊眠往往茅屋見人烟茅屋人家絶可憐黄茅颭出青松顛自住山上屋還耕山下田童子撈魚溪氷邊女兒賣酒工數錢三家五家自來往年深不問城市遷門前雪花大如手萬片瓊瑤寫枯栁火煨榾柮啖蹲鴟藜羮麥飯地黄酒生游死葬寒山下一生不向長安走而我胡為氷雪中馬蹄踏破行千峯繁華富貴轉眼空山中之人笑殺儂沛縣登歌風臺弔漢髙祖彭城沛邑漢帝宫山川峭拔風土雄三月驅車猶烈風髙天捲沙白日蒙牛羊散野城郭空我來不見隆準公但見平原草綠寒花紅隆準公英雄哉亭長去帝王來去時蕭蕭提一劍來時千騎萬乘驅雲雷椎牛置酒燕湯沐黄屋左纛虹霓開前殿歌風氣逾猛後宫擊筑聲復哀百官歡呼父老醉酒酣日落登髙臺當時王氣收豪傑霍然起他人裂土握重兵公也倉皇奔迫不得止須㬰劍光奮義旗指函谷一破子嬰死鴻門不能驚巴蜀不能喜黄石為之用白帝當之靡韓彭如狙項如豕往來大業五載耳世上英雄有如此吁嗟乎咸陽宫殿空蒼烟彭城故都無墓田神州赤縣掌上懸公也歸來奏管絃管絃歡娛歡不足急雨飄風一何速沛上山河巳非漢邑中父老死相續故宫曾無片瓦覆藤蘿倒挂野人屋歌風之碑烟霞磨滅不可讀遙望芒碭鬱乎髙丘青天不動黄河流大雲垂垂幕其上龍蛇虎豹紛蚩尤千秋萬歲後魂氣當來遊山中吟我家海上之青山山頭白雲時往還藤捎細月行花裏水濺空巖洒竹間仙源有路春常入石屋無門夜不關踏花只共野人語蕩槳真如沙鳥閒自從奔走江南道馬蹄半入紅塵老生平耳目非我有俯仰眉嫵向人好歲月其如石火何却逐浮名喪至寶昨夢丘中人題書寄深省既報青山空復言白雲冷山空雲冷胡不歸荒猿呌破秋天暝四明迴合無風塵八窗髙敞開星辰洞簫泠泠響空碧凌雲一喚樊夫人樊夫人偕雲華不知何年栖紫霞十洲三島俱為家粲然忽啟玉齒笑笑我不歸寂寞羞桃花桃花爛熳紅映天垂楊婀娜春風前野麋亂飲幽澗水仙䑕倒挂洞門烟偶因騎馬衝泥去憶得鋪花掃石眠劉御史歌丞相怒烈士戍驄馬來烈士灾隂風蕭蕭神靈哭不止黄沙荒荒烈士死吁嗟乎劉御史遼陽天黑白日沒下有猰㺄上有鶻磨牙鑿齒據其窟山鬼不敢弔河伯不敢出妻子那及收骸骨嗚呼噫嘻何人殺孔融何人殺臧洪男兒出身報天子俯首屈死蓬蒿中雲旗獵獵紅滿空天兵下來衝烟虹將軍十道開寶弓誰當迎御史上帝特遣關龍逢關龍逢握公手釀天河挹北斗拂公塵埃飲公酒人間䧙巇天上否遊戲白玉堂逍遙黄金牖椒山青霞亦公友自公去矣廓氛霾天清地朗雲霧開墓前銅雀化為灰塞外金雞謫戍回公不在矣使心哀我哀何為公不答仰視髙空寒颯颯白雲蒼茫九關合乾坤轉轂人事遷天子下詔褒忠賢鬼蜮射人虹霓障天殲我烈士古路邊榮以大官寵大篇子孫仍賜緜上田蕙殽桂醴焚紙錢年年寒食墓門烟青谿道士吟留别京邑諸避好青谿道士餐白石掃地焚香坐空碧月映蒹葭秋水寛雪覆栟櫚暮雲坼山深路僻無人烟沙冷天空留虎跡可惜一朝不自堅來作朝中蘭省客烈日騎馬堀堁中搔首乾坤嗟迫迮下筆連蜷雌霓氣吐舌夭矯丹霞色雄心不除俠骨存十年學道亦何益何物美器横相加藉藉聲滿長安陌長安大道連平沙王侯戚里紛豪華銀臺畫閣三千尺繡箔珠樓十萬家省郎卜居窮巷裏車馬趨之若流水争設瓊筵借彩毫朝入西園莫東邸摛詞盡道李王孫執轡皆稱魏公子主人轟飲醉向天淋漓紅燭落花前銀漢半斜沈夜柝繁霜歌罷彈哀弦有客醒然不御酒獨擁香爐對暝烟吁嗟乎美服人所指器盈神理殃為歡尚未畢含沙已在旁匹夫睚眦脩匕箸惡聲狺狺安可量子蘭讒屈平登徒毁宋玉請奏相如琴未滅淳于燭禰生鼓吏慙未能幼輿丘壑無不足青天何髙髙白日去莽莽出門眼看北邙山令人萬事抛漭瀁玉柙珠襦寒雨中金罍寶瑟髙堂上不聞黄鵠遊洿池豈有神龍挂魚網我欲掩口笑古人古人英雄亦不達子房赤松待興漢范蠡五湖須霸越即如䝉莊與灌園安用雲臺懸日月馬蹄雞肋空有無欲休即休何所圖亦不用百官祖道集征鹵亦不用君王詔書賜鑑湖一騎蕭然下風雪空壕斜日啼城烏恥為執虎子寧待車生耳懶視張儀舌不問待詔齒是非野鶴鶱孤霞恩怨金鳷擘海水脫我今日之黄塵還我舊時之白雲王績罷官因坐酒介推身隠詎須文風雷不能為之驅隂陽不能為之鑄竒鷹翻然掣金鎖碧落茫茫墮秋霧銅馬當年悔陸沈自憐黑髮早抽簪當年楊栁黏天碧繞屋松杉滿地隂故人他日如相訪萬樹桃花何處尋韓蘄王花園老卒歌和吳淵頴中原煙塵漲天起汴城日落大旗靡翠華北去泥馬南坐擁西湖衣帶水蘄王徒步起行間百戰馳驅劍光駛金牌晝分玉塞昏三字獄成岳飛死王也搤腕氣衝冠鳥盡弓藏痛脣齒飄然角巾歸西湖自號清涼老居士湖邊花園春色妍亭亭百卉紅燒天守園老卒鬢髮短白首閒就花隂眠蕉鹿呦呦蝶栩栩石頭為枕苔為氊黑甜正熟履綦響王來蹴起始矍然頭顱若此隙駒過長日如何只髙卧相公勿輕灌園人渭濵垂釣淮隂餓龍泉補履鎌刈葵閒却英雄無事做王歎此叟氣何豪與爾十萬金錯刀青雀樓船貫月上紅牙歌吹遏雲髙少女如花雜賔從鬅鬙白髮炤錦袍口銜叵羅海霧捲手揮如意江風颾酒酣指㸃挂帆去鳴笳疊鼓凌波濤夷王倒屣迎上客帀地氍毺布瑤席光生珠貝蛟人探寒透氷綃龍女織趙氏璧玉連十城石家珊瑚髙數尺歸來大艑韓王欣豪傑計倪少伯倫胷中之竒聊一見游戲仍臥花隂春吁嗟乎古來英雄何可測駿骨往往埋埃塵尉遲微時曾鍜鐵王猛不遇行負薪為龍為蛇古所嘆從此不敢輕相人重過桃江别業當時落拓不足論挾書醉眠桃花村黄鸝呌斷春雨色白鷺窺破新水痕身世溟涬游太上風物依稀似陸渾何人喚我出門去匹馬蕭蕭南北路兩足皸皺涉氷沙雙鬢凋殘櫛烟霧燕臺駿骨雖見收漢宫蛾眉易生妬幻泡浮雲擲一官親䝉天子賜黄冠入山面壁終有日對酒逢花且盡懽此地重來恣笑謔十載羇栖宛如昨悽愴似隔武陵雞須㬰亦是令威鶴紅桃碧栁風正柔野浦迴塘水亂流輕橈鐵笛吹欲裂錦罽銀筝彈不休伯倫生著酒徳頌無功自署醉鄉侯古人多好託此物但言澆愁吾不愁汪長文芰荷亭歌同吳茂倩董陽明葉虞叔山家樓閣沿溪入複道層階上千級青崖寒嵌丹房深栖鶻巢鷹手可拾夜臥不知雲霧多朝來但見衣裳濕排空一步一崔嵬陡然絶頂孤亭開金沙細湧花源出玉蝀横穿樹杪來亭前日午桐陰墮解衣烹茗焚香坐山花蹢躅紅半殘野谷篔簹綠萬个濺濺響水到池平池上田田荷芰生斜光冷浸玻瓈濶倒影晴窺鬚髪明一時同游總廖廓𤣥超名理兼清謔腥風挾雨聞虎羆絶磴將雛下猿玃談宜松外麈尾懸碁愛花間子聲落此時散髪夢羲皇世界不知何處著布袍方冠意蕭野主人恐是避秦者樊榭人歸霞自青葛𤣥沙冷泉猶赭舊是仙都好卜隣把杯共酌松杉下與爾將營采藥乎為余先種桃花也神鉤篇贈李子年吳人鑄劍天下無二子精靈雙可呼雷鳴電擊勢飛動夜深妖血猶模糊水犀十萬壓羅刹光閃吳鉤白如雪提攜在手鬼夜愁横行東南摧越絶仰抉浮雲六合昏俯斫海水蛟龍奔李生才氣有如此無乃古鐵之精魂君不見荆卿匕首往不回終作秦王柱下灰子房偃蹇遇黄石滅楚興劉起三尺古來英雄真不同意氣横天貫白虹阻凍金閶從李叔𤣥乞米歌金閶城邊暮飛雪朔風如刀凍欲割靈胥無靈怒濤死沙頭黄狐弔黑獺鴐鵞僵仆秃鶩愁層氷膠舟不得發長年膚粟生寒瘡舟中布衾冷于鐵都城豪華萬户連朱樓紅罽霜滿天公子貂裘匼匝外佳人寶袜氍毺前繡閤温温二三月飛觥行炙紛流泉興到輕身便走馬醉來纖指猶調絃黄冠道人獨蕭瑟孤舟十日斷火烟此時趺坐政暝寂内餐元和嚥金液隣船翁媼無歡聲顧我僮奴有飢色僮奴啞然向我笑終年蒲團詎得力浪說成丹丹不成空談辟穀穀未辟道旁揶揄多鬼市天上逍遥幾仙籍棄世何羨丁令威誤人大是浮丘伯滿口沆瀣腹枵虚秦皇漢武飽可圖瘦得形骸已骨立乘鸞控鶴何時乎寧為執鞭厮養卒不願拂蓋神仙奴大官巨舫泊河滸日日吹笙復撾鼔道人轉受僕輩瞋汝亦為官竟何補昔恐侏儒良以卑今向監河更自苦前身無乃若敖鬼此日誰為翳桑主滿城盡是陶壺奴何處得有謝仁祖夏日懷友人松風消大暑長日坐髙林路斷千峯合天垂萬木隂偶然成客夢一半是鄉心得句無人賞年來欲廢吟春日懷桃花别業緩步踏江村沙晴晩日暄偶然逢野老相送出柴門曲岸隠漁吹平橋落水痕歸來坐長薄星月飯黄昏潞河晩泊迴浦落帆盡長堤帶郭斜暮烟平吐樹春雨薄沈沙白艇藏漁市黄茅覆酒家一瓢雲水外不復問年華同胡明府登佛塔寺風急髙天迥孤亭落日閒松聲疑卷壑雲氣欲沈山古佛疎藤合層城獨鶴還馮兹問寥廓吾意薄塵寰幽栖獨愛無人處幽栖不用名竹雞啼午寂松鼠落枝輕芳草初平路春溪欲上城蕭然吾亦得擾擾自勞生游澱山湖扁舟凌紫氛蕭洒絶人羣浦暗遙吞樹湖空不碍雲浪推沙鳥出風挾寺鐘聞故有滄洲癖徘徊眷夕曛彭城渡黄河彭城臨廣岸俯仰霸圖空白日照殘雪黄河多烈風所嗟人向北不似水流東回首滄溟曲山山雲霧中元夕集司馬公宅同是春宵醉今宵樂未央花明天不夜塵煗月生香人語朱樓細簫聲碧海長絳河低欲没猶進九霞觴鳬園信是歸來好江東舊布衣池成蛙自聚金盡客應稀家以栽花冗身因食蕨肥野鷗飛不去吾性本忘機自知官况薄何以鬢毛斑才退名兼損家貧身轉閒禁方留石室副本托名山詎有飇車降翛翛天壤間再送龍君起結屋傍漁家春溪浮落花雲中漢雞犬野外晉桑麻但使心無累寧憂生有涯遊仙事非誕真見棗如𤓰送張君明入楚楚國亦千里君行入郢烟僧廬衡嶽雨騷客洞庭船雁氣初沈日鷗容盡寫天江蘺應可擷把酒聽哀弦旅懷蹤跡寄浮萍江湖老客星吾懷猶莽蕩天意使飄零閱世頭堪白看山眼獨青故園丘壑在歸去學沈冥正好乘涼坐胡為觸熱行一瓢成浪跡五嶽亦虚名赤日林間出黄埃馬首迎有身真大患七尺役吾生足下九州屐囊中五岳圖生平負意氣不必問頭顱陵寢周秦道衣冠梁宋都故園朋舊在飽飯對妻孥野曠紫叱撥山深黄栗留本為乞食去兼作采真遊汗漫凥乘馬逍遙杖剜鳩乾坤容放達何處不莵裘聞田叔罷官薄宦二千石危途三十年猶嫌歸巳晩誰道罷堪憐亟問栽花徑先尋種秫田吏廉聞似水行李定蕭然羽書西事急烽火達郊關牢落悲行役艱虞想故山無煩嘆宦拙且喜得身閒生計團蕉在憐君鬢髮斑重熙洞古洞千年閟靈山一夕開入門嵐作霧擊石鼓如雷地脈窮難盡天光照却迴孤亭當澗戸徙倚坐寒苔潤州懷古潮滿空濠集暮檣雁衝寒樹下迴塘清霜畫㦸新屯壘碧血妖燐古戰場地肺三茅通白下江心一葦限朱方山川無恙英靈盡讀罷殘碑又夕陽哭張大司馬江海凄涼易夕曛東南靈氣走氤氳門前馬散留青樹湖上尊空弔白雲雙涕可能酬鮑叔寸心原自許徐君欲揮赤電捫羣帝閶闔門深哭不聞賦得烏衣巷送周使君之金陵春風深巷舊豪奢駿馬銀鞍日未斜朱第空梁曾海燕白門垂栁自宮鴉草香輦路銷金粉花發江城問酒家君去定尋王謝宅大帆明月向天涯嵩澤弔袁將軍黄霧春天海浪驚斜陽江上哭殘兵野禽飛上將軍樹田父來耕滬瀆城劍蝕土花秋後老血侵鬼火夜深明羊曇清唱桓伊笛并入蕭蕭暮雨聲永明寺與伯貞先生坐語寺門瓦落挂霜藤閒與君侯說廢興秋老紫苔生卧佛日斜黄葉映殘僧蠧魚古壁銷千藏風雨空堂暗一燈解識此中須悟後昆明劫火向無憑酬鄔汝翼見贈之作婆娑吴越問前朝來往空江送落潮佳句全從僧舍得雄心半向酒家銷寒山到處容雙屐野艇無人挂一瓢不為西風傷歲暮亂雲歸去卧金焦新鸎初來閣外弄春暉上下花間試學飛小語未全調玉管薄寒深自䕶金衣龍池萬栁栖應怯紫殿千門見總稀九十韶華愁易老啼殘紅藥綠應肥慈㑹寺贈于恱海支二上人九月鹽官客思增偶來蕭寺得髙僧寒潮滿郭喧秋梵老樹當門照夜燈萬頃鷗鳬連海筏千家烟雨散漁罾閒房一宿清如水夢踏蓬萊第幾層贈李本寧廉訪生平恥附夜郎名斗大東方堇子城楚澤于今真浩蕩越兵自古號縱横分予一半龍門客讓汝千年牛耳盟况已泛舟香水浦避公近或在蓬瀛石渠虎觀舊師儒共說今官非故吾人望文星髙北斗天教仙吏長西湖六橋松栢埋弓劍十里荷花泛舳艫名重李邕丰采異出門士女看傾都送長吉諸孫東還年來何日不思鄉却送君歸欲斷腸聞道小園剛半畝不愁無地種垂楊女瑤瑟附瑤瑟字湘靈長卿先生二男長金樞次玉衡女即湘靈俱能詩金樞娶宛陵沈氏天孫亦有才先生每詩成輒競相寫和所填樂府詞立唱之兼被絲竹人謂先生可方謝太傅家庭笑樂亦古今佳事也湘靈嫁為黄生𤣥覽婦早卒先生誌其墓刻詩曰留香草採蓮曲六橋垂栁兩邊分日暮吳歌隔岸聞祇解蓮花如粉面不知荷葉是蓮裠澄湖日暮芰荷風白面郎君寶玦逢野水夜搖青雀舫却迷歸櫂水雲中聞大人自潁上抵金陵作靈跡從來擅建康才髙多愛水雲鄉石頭城下蘆花白燕子磯前江月涼夜露未寒當七夕秋葵初發候朝陽登樓極目關山渺腸斷蝦蟆金粉場秋思寄𤣥覽澄光涼露白商節氣蕭森愁逐朝雲亂思因夜雨沈春羅沾别淚秋練搗寒碪鳥宿人烟暝螢飛松影深閨帷懷逺夢關塞憶歸心賦就長門怨歌成團扇吟蒼茫河漢邈迢遞客星臨縱有髙山調徒懸綠綺琴太常少卿余漢城先生寅先生本字君房晩年謂古君房盡非人改字僧杲學者稱漢城先生自兒時即異里師授句讀每為所屈及壯益喜讀秦漢以前書倡為古文凡為名諸生二十餘年孝廉十二年始舉進士官水曹督製賜俺荅妃三孃子袍𥜗及犒邊士錦衣日有支發未嘗干一錢凡省縑及金俱貯所司人謂余水部真如水也方檢校六科廊廊故有庋閣上貯絲綿先生嘗假息其下忽聞閣上大聲云余主事遷去可惜然閣上實無人次日命下遷禮部員外郎先生嘗謂國家一銖一粟俱有神明䕶之守者蔑視必不祥蓋指此也進郎中上正風俗十事疏出以按察副使視學陜西請謁一無得入即御史所首錄士考居下下最慎鄉賢名宦二祠謂鄉先生非國中大賢豈得冒祭于社循吏尤不易得必若所祀郿令諸葛京斯不愧召杜矣京蓋諸葛丞相次孫也稍遷左㕘政改山東居官所信者心所謹守者法宿講求國朝典故灼有定畫及臨事更問憲章若何持操廉白期為國家節用監司俱以費不給請先生獨否人雖陽服之而心齟齬不堪也遂以積忤時上疏乞骸骨再起福建再乞休故事凡以病賜告病巳得召用若進官即不更出時遂加先生太常少卿致仕意尼使不復用也先生性亢厲受不黨之氣狷然獨行與同鄉顔御史鯨孫觀察光祖並以氣伏一時家衣食裁足性顧慕義倡置田百畝奉社祭酒沈嘉則先生養其老既里居身擅文章之事然恥以其筆札資身樹交養聲名所從交游甚寡歲時往來惟老諸生朱一誠及羣從子弟數輩與沈文恭公少同研席及文恭枋國先生意漠如也至垂死乃以一劍一書贈文恭曰别我老友初先生夢人與語君命若孔子至七十三竟無恙後二年奉川産一麟持獻郡中太守使吏來白先生曰吾其死矣未幾遂卒文恭銘其墓曰君持此道游于世宜偃蹇能巻猶可不卷辱將大故吾不悲其不合而幸其能巻雖然先生之不合天也非盡天也其善卷而去之果幸耶抑不幸耶悲夫余嘗讀農丈人集論其文既詳言之矣至先生之詩癯而堅質而峭介然之色絶似其人足自成一家而先生顧欿然自謂于詩涉其藩未能窺其奥意專以其古文詞上追千載然則先生所欿然自謂不必傳者正其所必可傳者也木州嶺謠為某嫠婦作莫登木州嶺嶺髙天地迥悲風日夜深豺虎紛來騁豈無一心人上帝不曾省一解上帝不省妾有夫上帝不省妾有姑有夫不作庭上人有姑不作旦暮身一呼上帝怒再呼上帝嗔上帝聰明妾不辰二解知汝雖飡花知汝雖茹草不飡並蒂花不茹合歡草嶺脚水粼粼嶺頭石皓皓一死表吾真區區焉足道三解木州嶺下無名村中有石闕悲黄昏不願紅顔當日存但留白骨今人論風雨為汝寃葛藟為汝尊誰家婦滿人口木州嶺一何厚四解獨鵠篇為馬節婦作吾聞女荀郎四鐙挂空壁衣帶柔自纒粉書不成畫文姬蓬跣何殷勤酸詞片片落髙雲彈出笳聲對笳語莫遣河東夫壻聞白骨寧有知妾心良不欺使君慎勿前致詞獨鵠獨鵠使我危心不忍哭自西渡至姚江作夕發西關津薄烟羃洄渚安漫延其波無冒剛濤怒遙光忽暝滅歸翮亞相旅輕帆信雨飛坐乆失煩暑山椒襍野燐夜深照石虎歴歴貴者封名卿入荒土去者集灌木來者藝叢楚齷齪自有徒幽憂不如鼠贈别黄說仲長安陌上人如螘不辨風霾日常紫男兒無賴七尺强白晝相看昏黑似天台黄君泃且美赤城霞氣差可擬一經何足了吾生獨挈昻藏走燕市騶衍不作劇辛死碣石空宫入流水孤塾經年没野蒿絶大鱏魚尺有咫由來倒屣都漫語英雄欺人那有此丈夫何處不伸眉何必侯門躡朱履况君正是青年紀萬事俱從雙鬢起行矣黄君善自喜太息行送姜太符黄門北上謁補太符嘗以言謫廣昌邊尉既服闕乃北太息復太息霜風疾如織急霰墮隂崖涕下不可拭英雄流浪若漂梗神采不發空項領憂來匕箸忽欲墮且爾進前呼舴艋我自揶揄人人亦睚眦我何能剖向渠許大真礧砢往年曾問昭餘祈可憐無水照鬚眉飛狐關外黄鼠肥朝餔夕餔徒自嘻量移忽經具區澤皇天降割真太迫草土微臣祗皮骨扶向人前欲誰藉長安道上多倥偬不似當時行步工湛盧黯慘色屏營天子正坐飛廉宫飛廉可望不可即羇旅傷心看列㦸狂霾終歲沈薊丘易得蹉跎在京陌丈夫如海任流澌安能窮守妻與兒雙眸浩蕩有如此得意雲霄竟是誰傅侍御行有叙傅御史言事得罪詔杖謫戍定海徐給事喬李二御史俱以奔救貶官三等徐信州人與余厚善傅御史纍綬都官正自此何獨東來泛江氾澤國荒唐泣泰隂絶與周廬不相似山川呵䕶縱有靈巳走風塵四千里今人皆言御史好君為御史官不保信州給事我友人急難疾于風雨蚤喬君李君真丈夫憂來萬事青天孤乃知富貴不足有昨日内召今泥塗禺􅝠之神黄帝子掌我東海萬年祀歲歲馮夷供肅將𤣥幢出沒波濤駛蛟螭充巨割黿鼉當小鮮江豚紛百拜窫窳贊大賢焦釜漏無極柱在洪荒前綠字大于斗髙頌三山鐫驟爾聞之魂直灑君來對之何不可爾時溟漲倍往日天吳横决崩雷疾水府茫寒未易尋咫尺吁嗟風又失燭龍之事毋爾為又況不在東南陲崑崙使者傳雙翼今年未訊扶桑枝勸君且飲東海水勸君且飱東海米朝廷恩數良巳多放君白日來蹉跎送戴仲徳游秣陵得髙字烟雨積江臯江聲日夜勞春方開浩蕩客自美遊遨六代存黄鳥千山上白袍古人都寂莫轉使酒杯髙贈陳處士古道已嶙峋鴻濛信有真樂貧甘一世守拙讓千人有酒堪彝鼎無名自鳳麟因憐抱罋者終日漢江濵浦口别周國雍户曹卒卒竟何情靡靡自不平亂山髙執手孤樹逺吞聲精爽邀鴻鵠芳香托杜蘅那能輕此日不與重吾生少司馬范公邀遊谿隠二首杳杳知何處飄飄不自持精神知地别耳目恨來遲莽蕩千峯出虚空萬象披晩來嵐氣合不辨有推移窟宅儼仙真雲霞亦是塵山川勞起伏日月借嶙岣大海遙光起髙空爽氣新薄寒猶户牖清夢滿松筠魯橋村半景臨墟塢雙榆闢里門秋風吹巷陌落日散雞豚野外桑麻濶山中父老尊喧喧村釀集賽鼓正黄昏沈嘉則李賔父攜尊枉餞賦别再用涯字君意尊罍近吾心道路賖暫時燒短燭一醉失天涯烏桕全無葉款冬正著花更欣篇翰好多贈不為奢雨後灘行雲帆未可賒雨外更天涯日日緜蠻鳥山山蹢躅花松根青艓子溪水綠人家見說灘頭濁朝來幾尺沙從張大司馬湖上雨歸冒雨憐于邁從公又雨還萬山知汝健雙屐笑人閒窮海𤣥隂積空堂朔氣班登樓髙自遣猶得俯塵寰輓楊憲長前路明如畫如公未可歸山川紛雨泣天地忽霜飛博碩皇家榦丰稜海國威無端雙白鬢坐使萬情違癡絶一首示文融霜影無端白烟叢有意青漫將閒歲月强作老娉婷苦縣人難遇雍門淚易零生來癡絶甚肻使一朝醒汪長文治具湖堂對菊逸興大湖飛蒼茫上白衣地行人共老霜與菊同肥逺氣通秋壑幽暉散夕扉杯行天漢轉直犯啟明歸聞祝曼期客燕都寄贈九霄空濶若為諧漫說長安十二街醉後只曾談古俠飢來絶不吿吾儕有時偏袒金襴衸何地狂呼繡纈鞵曩日諸豪都莫問夕烟衰草自荒厓九日沈徵父周國雍二選部邀遊清涼山寺指㸃禪關處處清偶因佳節作山行無端秋滿祇陀樹有漏人投舍衞城白草不知殘照合青山忽放大江平此中舊事君休問我輩今來足主盟七旬生日䝉諸君詩贈奉答兼有追慨寂寂寒灰故不然星星宿火絶無端齒牙未必真相借髀肉何須苦自歎皦日行空都莽蕩閒雲在水自汎瀾故人真是天留住不記田間舊竹冠愁來何事好開襟微雨初收正薄隂百道詔書山海使萬年天步野人心黄河命脈安如昨紫塞風烟浄到今太祝祠官俱望幸幾時清蹕翠華臨世事何曾賴木强俗情端不羨疎狂從來一節堪天壤未必千秋在廟廊海谷投竿雲總綠江壖披襫雨初黄看來不是神仙相琥珀空勞發夜光送包明臣之任潮陽簿閩甌南並古明州莽蕩風烟漲海頭溪洞水腥常作霧桄榔葉暗不知秋琵琶洲畔蛟為窟甲子門前蜃是樓只有羅浮山色好蕭齋長得破孤愁送定于柴公觀察江右曠度長才總總殊早從茂齒握專符雲深廬嶽飛長瀑天盡鄱陽出大孤青帝元神開首路蒼生大命在前驅殷勤更切平生淚未敢臨風洒白毹舒倩入閩懷贈翠水蒼厓鬱未開君從何處訪蓬萊桓伊得意唯三弄畢卓埋聲祗一杯荳蔲有香閩土在鷓鴣無夢越王回有人地下都相恨何日封泥到夜臺沈嘉則見過賦贈園林初霽較精神扶杖來過滿地春故作烟霞供鳥語急收風雨為花嗔踈篁入户閒相得片石當軒狎幾巡慣著緋袍憐白髮尊前更比絳桃新侍司馬公發疃畮至茂嶼十六韻遵渚有餘清看人白鳥明遙分平野色乍入大江聲旋旋空濛失嶷嶷積翠生短檉當岸立老鸛逐陂行進艇枯河澀扶笻絶巘輕危巒驂别榭神瀵墮前楹日月頻揮擲山川暫合并雙眸凝不極一嘯意難平壮志聽鶗鴂髙懷訊杜蘅交情多􅀈巇世事太縱横珍重鰣魚膾尋常竹笋羮奕過天再旦卧至日西傾有地恣幽討無時解宿酲乾雲栖老石苦霧罩荒坪萬慮緣于俗千年好是名滄洲鷗鷺在敢愒舊時盟遊四明山二十四韻澤國髙寒氣秋旻廓落情山經標特勝仙籍侈多旌凌厲眇三島遵循隘九瀛剛風鼔蓬勃朗宿錯經營窈窕谿初發趦趄嶺欲驚翠濤儲萬斛紫霧羃千楹瀑迅昨宵雨雲乾此日晴牂羊愁䠥躠俊鶻快縱横珞琭開屏勢琮琤引吹聲八紘真汗漫五岳浪鏗鍧自作擔簦去難論戴釜征葛洪原有約禽慶獨何名孤嘯神霄半雙眸大海平華旛通太乙藜杖倚長庚鳷鵲遥相劈鵾雞午乍鳴青菁炊作餉白襪裹為程喜劇歊氛絶驕多袷袂輕紆行蛇出谷小坐雁分坪矯首徇靈塔緣袪聳化城芝童紛出瞷毛女怳來迎許寂劍何往劉綱榭巳傾荒荒都信足黙黙但盱衡猶隘寰中在何時海外盟偓豐應咫尺薦我以雙瓊哭思質王中丞絶句漲海連天無盡期子胥日夜泛鴟夷西風作浪鯨鯢泣潮去潮來總自知曾提一劍大荒西落日旗翻太白低石馬墓前髙幾尺蕭蕭風雨夜聞嘶渡滹沱一片桑乾水氣昏白雲空磧大河吞馬頭帯得衝星劍夜夜回看古薊門沈肩吾太史屠田叔比部餞别郊外時余下第東歸劇人最是艷陽天何地春光不可憐君自慨慷吾自醉忽無言語只揮鞭沈嘉則客海陵于髙生之往也作絶句寄焉白髮毿毿映水遥一生長寄木蘭橈蓬萊山下深無極聞道年來只及腰後夜長虹下燭溪寒江不動萬峯齊楚天只在繁星外一望同君一倍低送李亷甫節推鳳陽海薄峯迥龍虎扶古塗山國是中都此間父老今何似定憶髙皇舊賜酺甬上耆舊詩卷十九

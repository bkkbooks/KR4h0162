body:
  text: 甬上耆舊詩卷十二監察御史胡文學編大理寺卿蔡公錫字廷宇永樂中舉于鄉在太學仁宗詔擇國子生有學行者吳信等六十人命翰林院嚴試之拔其尤者二十人充近侍官公與焉授兵科給事中彈奏不避權貴中朝憚之出知泉州府性勤于吏事剷剔宿弊日為民樹長畫修起學舍均徭役奏除洛陽中山大橋三戍公私便之尤善摘伏郡中盜賊無迹時洛陽橋壞發故石有刻文云石頭若開蔡公重來橋故宋太守蔡襄所建公來守郡適同姓遂議修之然橋本跨海無所施工公患之乃自為文檄海神募能賫往者忽一醉卒踉蹡而前曰公但飲我善酒我能賫檄往遂益飲大醉卧于岸上放􅜜若出沒海中遂持檄還上判一醋字公意曰是期我八月草一日也即以是日舉工潮旬餘不至工遂成郡人為立祠配享端明遷山東副使參贊宣府軍務以功晉順天府丞再遷大理寺卿湖廣大飢公奉敕往撫設法賑恤所全活數萬家俱肖公像祀之尋乞骸骨歸蕭然圖書無長物至不給饘粥有草堂在小白河干去城五十里公欣然日吟嘯其中晏如也所著鄮山稿重修洛陽橋事後傳奇家併屬之蔡端明人不知有四明蔡公也幸張大司馬一正之周櫟園再正之即事驅石重看駕海成天吳踏浪不須驚夜來新月山頭落有客醉從橋上行太子少保刑部尚書陸康僖公瑜字廷玉號省菴年十四為名諸生弱冠中進士授刑曹奉命出録兩淮江南北十七郡獄參錯訊鞫務得平所釋繫囚三百餘人改從輕比者千餘人歷遷郎中以才望擢為山東布政使齊魯大飢民相聚鬨取富人粟監司坐強劫當死公曰民苦飢攘粟以免道殣耳奚更殺之改從搶奪例俱得免死英廟初復辟李文達公賢時為上言公才及刑部尚書闕朝議數擬以進俱不許遂徵拜公及陛謝上語左右曰國家持刑得人矣公先在刑曹于格律輕重盡若披掌凡有大獄諸曹不能決先質于公公曰某年某所獄類此可比擬曹吏發故牒視之不少差時門達治錦衣獄用法酷𢎞農衛卒誣指揮李斌謀反事下達煅煉具獄會廷議公獨言其寃達怒語侵公公曰瑜所執者祖宗法耳奈何枉人至族耶達奏公庇反者上不聽為赦斌妻子未幾達敗言者俱欲置之死李文達以質公公曰達典制獄任情輕重是其罪然視紀綱馬順則有間矣達卒得不死曹欽夜為亂公被執巳知為公遂釋不害或執欽佃人數千俱為逆黨公以欽謀逆倉卒諸佃相去各數百里豈得與謀盡釋之上素重公名凡遊上苑出獵俱召公從行禮遇甚渥憲廟初年公歷九載乞致仕上曰國家方倚任老成卿安得去每遇小疾上遣御醫往視中使臨問賜飲饌相望疾少間特免公朝參復六年堅乞骸骨歸老上特賜寶鈔治行進公階榮祿大夫公初在曹年少有重名故以郎擢長外藩以外藩特召為尚書俱異數也方官主事時郎中仲閔為之長仲君心知公大器每舉太祖太宗朝法比沿革告公且曰陸君他日必大用此國家舊典當先盡心故公于律例條格無不精晰既入掌邦憲每舉仲君所言教其屬吏見諸曹賢者禮之若賓友其用法酷者輒嚴責之務使持平乃已都御史寇深暴戾自用凡會鞫強斷衆莫敢抗公徐發一言執理定罪深不覺自詘前後在刑曹十八年尚書十五年倚任既久遂為國家名法臣第一公家在鑑湖晚年鶴髮曳杖逍遙十洲間為詩弔賀季真里居復十七年卒年八十一諡康僖其族人世有顯者賀監祠春水微茫春草新廟亭花發鳥聲頻黃冠一曲瞻遺像明月三洲仰昔人故宅巳憐為傳舍敝廬猶喜托芳鄰年來幸遂歸湖願為向先生一薦蘋遊雲門雲門杳杳白雲間石磴重重不可攀河影倒流回北斗朝光初動見南山一匡起霸遺封在四載分州此地還乘興遠來登絶頂望中三島隔塵寰副都御史陳公濂字德清宋文介公禾之後也少有才以進士授南刑部主事善斷獄一如宿吏有鎮海戍卒故無賴誣衛指揮以下數十輩不法事同獄者又代為偽帖以證之所連繫甚衆以屬公治公盡得其情坐告卒及為偽帖者法餘盡釋之以員外郎出為廣東按察僉事轉副使巡視海道海故多大盜倚風濤出沒復阻山其勢熾甚公身冒矢石出奇兵與戰值天雷電大作公奮擊之賊迷潰自相殺所俘斬無算海南遂平遷布政使未幾擢右副都御史即撫其地時薦歲軍興供億師旅閭左蕭然公深加撫恤民藉得蘇巳奉命總督漕運兼撫鳳陽公治漕晝夜勤事嚴立法輸運無後期淮故南北孔道諸豪家率俱大猾橫行公悉裁以法又奏留守穆盛害人事盛竟坐罪淮人快之以丁內艱去適河南缺巡撫上謂非公不可者詔起復公上疏力辭謂臣母服尚有一年一月餘二日未滿臣歷官嶺外母老生不得迎養病不及醫死不及殮今又不得終服不孝之罪負痛入地詞義哀切上不許公始灑泣赴官未幾改巡撫畿內上又以漕運事重再命公往卒于道公為人風儀秀整美髭髯中懷坦易不為嶄絶之行在嶺南最久政平事簡上下安之詔賜祭葬録其子蘖為國子生遊雪竇寺青山面面削芙蓉只尺猶疑千萬峯野草逢春都是藥碧潭和雨半藏龍池開錦鏡晴波濶路入珠林暖翠重試采新茶尋澗水一雙玄鶴下髙松刑部侍郎鱗洲楊公茂元字志仁生能視烈日久不眩六歲所讀書一過即誦客或指銅爐使作破題應聲曰範金以為體然火以為用及長䇿名俱髙等授刑部曹善執法尚書林公聰倚以為重凡事關會鞫俱使兼理人稱為掌三法司同曹主事楊仕偉以事忤汪直誣坐受賄徵其贓仕偉廉不能輸同曹斂手莫敢顧公獨為代輸且手署曰刑部主事楊茂元俸銀十兩直見之詫曰此人大好膽氣仕偉遂得白出慮江南囚多釋寃獄後曹録其論奏為式由郎中遷湖廣副使𢎞治二年改山東適河決張秋公乃陳三事各一疏合上其一言天下事任専則功成官多則民擾今河決張秋事誠至急皇上既命都御史劉大夏來治復遣太監李興總兵平江伯陳鋭同治之以張秋方掌地而三大臣羣聚于此費用萬億此可寒心臣聞各官初至祭大河之神天氣陰晦帛久不然及將焚忽結為人形面目畢具萬人驚駭此神明特垂警戒乞朝廷將太監總兵取回獨用大夏蓋大夏不妄費財不攜妻子不憚勞苦若朝廷專其任重其權自可責以成功且水陰象也欲消其變宜嚴宫禁重邊防近聞后戚家威權太盛其假名號橫行河道間不可勝數乞稍裁抑況運道未通外敵不知國家有十年之積恐生覬覦宜嚴加隄備庶使地變可消後又陳治河諸䇿乞命廷臣會議其二言近聞明旨訪求天下畫工赴京供奉臣謂自皇上御極收用名賢罷傳奉之官塞寶石之門絶四方貢獻出奇禽異獸于外時俱謂堯舜復生今甫七八年而明詔及此使人得窺聖心所向此魏徵所以獻十漸于太宗也乞皇上挽初心却小僻收渙汗于既頒天下幸甚其三言山東連年旱潦相仍差科繁童民至不能堪近又差都知監右監丞李全前來鎮守加𣲖供給將何所出況朝廷設官可謂極備不知此鎮守復理何事乞皇上即將李全取回以蘇民困三事前後數千言后家憤甚興鋭亦指疏中焚帛數語斥為妖言詔遣錦衣百户胡節檻繫如京所至民遮路哭節馬至不前及陛見公挺身跪不伏上大怒命繫錦衣獄而胡節獨入與諸中官泣白公寃且具言遮道狀諸中官俱心動為之解上亦察其忠謫同知長沙其後河治一如公所䇿論者謂公三事疏與文懿講學聽政疏義相表裏而剴切過之若公可謂不負君父者也公在官數以疾乞身不許歷遷廣西參政時逆瑾擅命使御史出查盤取賂人謂公若以千金饋御史可免禍公曰千金非盜官帑則下剝民脂以此自救是畏無妄之災而顯犯有名之律某誓死不為也瑾遂勒公致仕公以書寄子曰昔求之不得今不求而得之喜可知矣即日買舟歸里瑾誅起遷副都御史撫貴州討平篁子坪諸苗再晉南刑部侍郎卒于官公為人強介獨立見義輒赴毅然不可回性孝友天至志成文懿所未行拓始祖及五世祖墓地樹碑益田從弟二人早孤以文懿所授田分給之撫恤終其身值大父母父母諱辰必齋素盡日往弔有喪者之家雖數十里不煩其飲食諸嘉言行不能盡載所著有麟洲稿題清風徑節圖司空史公舊姓張少年便作青瑣郎公餘每為竹寫照須臾素楮森琳琅自言我畫宜速購他日欲求不屑就前輩惟推夏仲昭時人只重楊廷秀我聞此語信未真今見此圖良可人奇石稜層帶莓蘚孤標灑落超風塵我生愛竹真成癖隙地無多亦移植皇天知我嗜好清一官故向瀟湘謫瀟湘兩岸千萬竿開軒洗盞時時看清風亦許夷齊合徑節不知天地寒公從何年索此幅恍然坐我瀟湘側司空位重懶揮毫此畫尋常豈能得禮部右侍郎豐白菴先生熙字原禮少志趣非常嘗署讀書精舍壁曰立志當以聖人為的讓第一等事于人即非夫也十六遭母喪水漿不入口者數日倚廬三年郡太守薑公昻目之曰此吾郡顏子也弱冠師事同郡姚公鏌授毛鄭詩舉于鄉巳未廷對孝廟親閲卷大奇之置第一已而易置第二然上心重公特同賜狀元袍帶嘉寵之由翰林編修遷侍講修孝宗實録再遷右諭德時逆瑾用事朝士多趨其門公獨不往瑾銜之出掌南院事歸省適父沒喪之一如母既服除乞終養繼母不報復原職時公望重中外莫不傾心謂當握持鈞軸而忌者中沮久不調嘉靖改元進學士三年上主張璁之説欲考興獻帝舉朝爭之不得公乃與同里翰林王公相陸公釴等招舉朝大小諸臣二百餘人同跪文華門外哭諫聲聞大內上大怒命繫為首者八人于獄次日即拷訊所繫八人編伍俱以公為舉首杖殺翰林王公相等十九人公所戍鎮海衛上以公為黨魁怒終不解前後廷臣論薦及請釋放者數十上終不許公在戍惟杜門著書絶口不言時事凡十三年竟卒于戍所先是彗星見文昌卒之日天鼓鳴浙省榜眼石坊忽崩壞公性嚴重慎交意所不合即當軸未嘗通刺其門少潛心六經尤精于禮文詞髙雅至金石之作更其所長所著一齋白菴二集嘉靖三年諸臣諌大禮者二百二十餘人其謫戍者八人以豐學士熙舉首杖殺者十九人以王翰林相舉首大節俱出吾鄉然豐氏尤為世家自宋學士清敏公稷以直諫名至洪武中國子司業寅初以諫觀燈謫德化教諭靖難師入即日棄官歸子給事慶景泰中以諌易儲繫獄歷官布政至學士即布政孫也誠可為世家矣遊江心寺榛檜破嵒幽蕭寺臨滄流宋皇愛行幸此地昔曾遊階草承金輦堤松維藻舟裁詩刻翠壁龍光滿淵丘彤雲麗行在綵鳳翼宸遊憑軒玩魚鳥命爵娛歌謳嗤彼越勾踐局促懷國讐卧薪不出户何以銷百憂題大武山仙人迹一山髙出萬山顛絶頂相傳舊有仙朱草紫芝雲外地碧桃紅杏洞中天石盤棋散留殘子藥竈丹成起斷煙借問王喬真甲子尋常七日是千年少保兼太子太保吏部尚書聞莊簡公淵字靜中號石塘生而莊不疾趨不茍笑弱冠為諸生時太宰屠襄惠公居里中部使者為之樹表屠公夢一偉文夫立表下自釋所服授之旦日遇公與夢合中進士授刑部主事時逆瑾擅國嘗折辱諸曹不以禮適部中失囚同舍郎俱詣瑾請罪蒲伏公獨無所謝瑾曰此郎貌似夫子遇辱不驚固賢者卒謝罷公以是諸曹俱稱為聞夫子及瑾敗對簿尚不服公執筆數之曰瑾造偽符璽私蓄甲兵當大逆瑾遂語塞伏誅楊文襄公一清心重公改公吏部郎中值上計有墨吏二人賂上所幸朱寧冀免斥尚書陸公完畏寧意猶豫公執不可竟斥之歷南通政應天府尹故事守備中官受民詞率下府屬治吏奉行惟恐後公曰中貴人安得受民詞幕吏安得為中貴人議獄此非奉詔不可悉罷之嘉靖初張璁桂蕚俱以南部郎議大禮合上意召入京兩君從公請舟往公謝曰君命召不俟駕安得舟行兩君為色沮尋改尹順天遷太常卿上齋宿南郊適有譁者命太常奏治衆大恐公入曰百執事俱在昏夜莫可主名乞寬之事得寢進南兵部侍郎薦武臣馬永等十餘曹後多為名將再進南刑部尚書公知中官侵部權時受告密民間顧以細事爭持牒控部乃諭諸曹曰官有常紀中官固不得侵部即部亦不得侵有司自今有大事必由通政司達部小者悉付有司庭中為肅然公視爰書嘗至丙夜不寢家人以為請公歎曰此疑獄也少年吏深文入之吾思為求生忽不自知其疲耳九廟災公上疏自陳璁擬旨令致仕去上曰朕方用淵淵非老非病奚使致仕卒留之由南吏部召為刑部尚書從上意也刑部諸郎曹多暇時聚飲偃息不赴部公至則以籍付門者使記諸郎入舍先後于是諸曹俱折節勤事公為身先之日論報上十餘章無留獄五年晉吏部尚書公竊歎曰使臣得先十年居此官尚可自效今事權去矣臣何能為初夏公言方受眷公數與抵牾及夏坐法而嚴嵩獨當軸益橫公遂乞身去位卒于家得年八十四訃聞上輟朝三日贈少保諡莊簡祭葬有加公天性儉素退食尚書署十年著一敝冠位置有常不失尺寸朝食及日中無加豆夕則飲水一杯自為郎位至太宰海內望其風節翕然推重初遷南刑部時張璁已入閣屬公曰僕往在南刑部嘗題詩郎舍公至願為我勒石樹之後堂公不答後僚屬遞至俱為張致殷勤公從容曰此部尚書堂也紀法在焉某待罪尚書安敢以相君今日故為郎官勒石卒不許及遷吏部尚書一日問諸郎曰本朝太宰孰優對曰無如蹇忠定王忠肅公曰固也耿文恪方可否事少宰從左右贊一辭文恪宣言曰天子建天官一人耳安得兩天官耶宰正百僚文恪近之矣時徐公階為侍郎以才名見重前尚書時頗專事故公言及之諸曹退相語謂公不讓三君子也至一時臺省俱推公憂君忠國可寄股肱為廷臣第一史官亦稱其凝重深沈毅然有守歷官四十年始終一節有古大臣風而晚年未得盡其用天下猶惜焉奉送贊樞白因夫赴留都上林春苑賦初成且復銜恩向舊京錦斾光搖千嶂曉牙檣影泛九河清風生幕府間過墅月滿營門細論兵況是謝家森玉樹江東今羡舊簮纓通政余南湖先生本字子華號南湖少不治制舉文字常終日正席讀五經及史傳諸家言以至天文地理鐘律象數諸書盡能通其義解早思夜索若有神授之者里中諸生多執經其門人俱以余夫子稱之先生雖名髙未嘗為有司所物色至年三十學使者楊旦試以僻事大異之謂余生當名冠天下是歲舉于鄉次年廷對擢第二授翰林編修時逆璫亂政史官職久廢無所事公愾然具疏請尚經學舉史職指切無所忌至再上不報遂乞補近地儒學官便祿養當事難之乃出為副使督廣東學校先生至力以釐正士俗為已任振䇿風勵性骯髒視同官有作卑陬呫囁狀避之若腐臭語有不合輒義形于色時面折不少容與巡按毛鳳積不平劾其不法數事毛亦肆詆誣未幾毛坐落職先生亦遂家居閉門益撰述數年前後所著有讀易備忘禮記拾遺春秋傳疑孝經刋誤周禮考誤家禮考異綱目備忘律吕新書解皇極釋義正蒙集解諸書嘉靖改元起督山東學政得士最盛遷南右通政先生于文牒事無大小一一訊辨務擇可否罷行之曰此官所以遏讒説距殄行非若是即曠官也時先生名益重為通政二年卒于官年僅四十有八先生性篤孝友初娶遭母喪終其制不入私寢從兄弟早孤以父命撫之為置室且給之田家居食貧親族有急叩門輒傾槖中使持去或稱貸與之自為償生平負正氣逴厲常讀史見古人奇偉事意踊躍期必為之至姦臣傳輒拍几唾詈不釋口其臨義必赴于死生禍福得喪一不置于懷故能無所瞻顧若鷹攫瀾趨莫可牽掣然先生平生學識所得于師友甚多與相死生少在倪畏菴先生之門盡傳其學侍御張公昺介操絶俗先生時奉教在左右及張公垂殁張目謂先生曰善努力方今人才肯自重者少若能樹立一日即為國家扶正氣一日也先生以此益自勵初為郡學生嘗詣文廟候有司諸生多相聚談箕踞中惟兩生各正襟默坐先生異之因就問姓名一為聞莊簡公淵一為中丞汪先生玉三人遂相定交及先生執喪至哀聞公時就讀其廬與卧起具述其事晚年復與張文定公邦奇中丞王先生應鵬友善王嘗曰吾每有舉措意尚沈吟思子華之風即沛然矣在南都一日過張文定公署適人傳汪中丞訃至先生嗟悼流涕為追敘雷峰行事亹亹忽頭目暈眩體僵喘啜啜漸絶張公扶其首哭呼不應竟卒于客座題張仲明先生髙齋齋居何肅肅門掩秋風裏誰拂牀上塵為拜顏夫子僉都御史汪公玉字汝成世居大雷山下故號雷峰少沈毅重厚髫齔如成人年十六七讀五經諸儒家言潛思默發愾然以古聖賢自期人望之稱為龍駒鳳雛年二十一舉于鄉在太學時章楓山先生為祭酒羅整菴先生為司業深相器重召語必移時録其文為學中諸生法舉進士授刑部主事稍遷員外郎善執法出為湖廣按察僉事再攝辰沅兵備永順宣慰司故驍悍數侵保靖地相控又以重賄納權貴多為其左右公獨力持之卒正其罪初永順以黃金器數百來獻尚未入公聞之立命捕其使使者軼去至是更使刺客伺公公起居常岸然客望公手顫不能舉因歎曰汪公神人也竟不能害在沅再期力鉏姦祛弊漸無事乃起書院于明山之麓日聚諸生説經時御史周公廣以言事謫沅之竹寨驛丞公延登講席率諸生北面聽之巳遷巡武昌黃州會逆濠反陷九江地與黃蘄接壤吏民豕駭分守者稱病不敢出公遽沿流入蘄宣示大義立修城埤集兵為禦賊計時有粟萬餘石在黃梅距賊僅一水俱謂罥虎牙間公使别將載入城吏民為益定事平御史毛伯溫薦公才擢副使治郴桂兵大盜王廷鑑為患公率兵搗其窠窟盡殱之不以捷聞當事亦無白其功者以卓異再遷山東按察使踰八月即擢僉都御史撫順天公見西北邊凋耗已極俱坐將吏掊克使士氣日衰公至申明約束嚴賞罰奏黜諸將中尤不法者二人邊境悚震壁壘為一新公性儉常衣羊裘諸將或以貂裘進公亦不卻至次春返之曰已藉禦寒矣然未嘗一日服也畿內賊楊恭作亂公授參將郝通方略斬其首京軍後至即冒為已功公亦勿之辨也竟以積瘁成疾乞骸骨不許卒于官得年四十九公少才髙氣剛岸然獨立為學務造其實身或有過雖纎毫不自蔽議論人物則必極其心術邪正見柔佞人疾之痛于仇敵與里中太宰聞莊簡公淵張文定公邦奇余南湖先生本相友善各勵名節時稱為甬上四君子復與王陽明先生交至其論學意不能盡同陽明曲相辨折終不答其自信若此所著書藏于家薊州道中劍斾南來寄一方北門鎖鑰愧非長山河雄壯真皇輔人物蕭條非故鄉三島風煙連朔漠九州封域盛虞唐巳聞款塞尋常事賴有訏謨在廟廊甬上耆舊詩卷十二

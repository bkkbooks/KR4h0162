body:
  text: 甬上耆舊詩卷七監察御史胡文學編參政張白齊先生琦先生字君王少負異才年十二即能賦詩常手古人詩一卷其父見之投諸雪淖中先生徐徐取出暴日下夜讀之家貧為諸生時出游吳楚間授經以所上束修歸養親能備甘膬每讀書至夜分稍倦則與其徒取水交噀面使神氣復立乃更讀其勵志若此年及艾始中進士授南大理評事歷寺正副前後所治獄凡二萬七千餘人論駁務得其平有三人以造僞章論死無所置辨先生視其章乃以篾布四邊中畫字遂判曰篾作與私鑄不同减死一等司獄官落職貧甚將鬻其女歸先生以月俸為治行得免在南都九年吏部再薦為督學使不報出知福建興化府為政尚簡易務正風俗與諸生說經喜以儒術飾治有古良二千石風郡中林見素先生海內宿望日與先生以文義往來每共登臨輒題名山壁人稱為文章太守奏治行第一然先生性嗜林壑數乞骸骨歸老辭義確苦乃進本省左參政致仕先生操行廉白家無遺財人號曰白齊先生里居十六年惟以撰述為事于詩律益工彌造髙妙日怡神于林泉雲鳥間嘗自贊曰辭讓太早似乎失利木石無虞何謂不智末年遺教曰抱病懷殘喘寄身屬杪秋愛山一輿樂水一舟未死微軀巳卜荒丘永謝之日不煩飾修生也既順死復何求卒年八十有一子嘉慶亦奇士為詩殊有父風余常讀先生集其自述曰豫生平好學詩志慕古人然多從實地生變化不敢為望空語今所梓行僅十之三四耳自顛髮黑且蒼且白四方知音相遭如皮陸固不可得晚遇見素林先生相知為獨深嘗曰夢魂相接多在雪蒼雨碧之下谷答風響相和應亦微哉續藁出耄言覺尤有味未知獲入梓否文字亦有可取回首顧之度不能舉矣人以為實録又論詩曰自髙楊張徐諸人學唐儘有好者後李西涯謝方石張亨父及沈石田律詩甚多生意循唐人繩墨自能傑然今盛世必有妙手不能盡知行且求之先生官南大理在𢎞正之間時北地信陽名巳極盛先生仍盛推西涯而置李何于不論之列且云必更求妙手此其立意卓犖不回能自異于流俗隱然可見今所傳白齊集即梓行之十三四者也竹里館集則其耄言也合一千餘首余為選三百二十八首序之序曰余少從家乘讀諸先輩贈先楝塘先生詩惟喜張白齊先生琦一絶句復從戴氏書肆見白齊集四本詩極可喜時方習制舉業未即購以歸且意謂先輩詩文如此類必多異時當得讀之未幾余學為詩求向所見白齊集巳絶不可得偶見王鳳洲詩評于張琦下曰如夜蛙鳴露不離泥中架上舊有李騰鵬詩統所選白齊詩亦注曰王鳳洲云云並欲唾之及讀諸先輩選里中詩俱甚推重先生其論良是然南江所録凡二十八首東沙所録二十二首與余向所喜頗不類後之論詩者有稱先生嘔心刻腎務去陳言品目甚當而所録又只二首使就諸家所選即鳳洲所言尚非甚過意中不平久之至前歲始從釋悟留所得所謂白齊集四本如身客萬里外遇故鄉良友驚喜交集釋于石又示其竹里館詩二本贈先人絶句亦在其中而後先生之詩盡出矣余適在患氣中且喘且讀手録三百餘首竊謂先生詩發源忠孝俱本于性情之正無愧風雅至其為興為比吐咀山川驅使雲鳥草木與一時詞人絶不同間嘗于諸體盡相題目樂府最為髙手惜不多作古詩歌行别有蒼然之色可方山陰徐文長而徐稍不及若五七言律詩則妙矣至于五七言絶句則神矣今先生自編其詩先絶句次律詩次樂府古詩即一詮次間甲乙已定此可謂寸心自知者且先生歷官大理時北地信陽方樹赤幟一時靡然風偃而先生髙唱單行不阡不陌是誠不可無一者也余因念先生生平為詩惟晚遇林見素先生一人耳身殁以後久應論定然其不知我者既橫相訾詬其知我者亦使與衆人為伍略無髙下其蔽反甚于毁之今先生二集遺板俱壞遍詢里中所藏僅存三四册事固有不可知儻更數十年此三四册亦復散去將使世間第一種文字遂化為脈望蕩為飄風野火忽焉盡滅天下寧有是理耶此後起者所以不得辭其責也余既録成日為里中諸君誦之必盡一卷方已適梨洲黃先生過訪草堂急取共讀相與狂呼大呌聲聲相接余更起浮白一斗謂黃先生曰請于數百年中取一詞家足當我白齊者鄴嗣願盡此斗先生亦笑謂余言不狂次日黃先生歸舟中語萬生允誠曰白齊詩誠不易得但袁中郎以士大夫身負海內之望表章一山陰布衣世始知有徐渭今杲堂乃以東海老布衣思表章士大夫不益難耶余聞其語為悵然久之夫余既杜門漸老不與海內詞人一通名紙况悠悠千載亦誰為知我者乃獨此愛異賞奇若不容口遂頓忘其身之老且廢也雖然余不足傳而倘以傳白齊之詩遂得并傳是終以士大夫身後之力引一布衣也余固藉白齊先生矣東樓山勢彰坤厚天光薄太清臣家書萬卷換得此樓成包氏東園理蔓牽新緑疏泉放落紅敲門春午寂有客夏黃公東山飛鳥遺好音千峰不知處日出扶桑枝照見薔薇樹杜甫逰春萬里橋西路騎驢三十年較量春厚薄不及開元前老子出關圖道大無傳受騎牛西出關剛留五千字遺智滿人間鵪鶉朝飢下平田飽啄還飛去蒼鷹日附人肉食損髙志林下窅谷千年樹深山五寸苔休官非絶響今見一人來陶公小像五馬俱何在孤雲得所哉山光悅人面豐勝未歸來言志得句霜鐘後怡神雪盎前莫將容易看比作藁心禪竹雀獨行入春竹路出鳥鳴澗長風吹豫懷仰見伯夷面海居水窮草木稀雲間但髙岫人家無寒暑海潮以為候秋事山邊賨布地湖外石田莊今年秋較熟大艦送官糧省爨省爨時推濟牽牛或助耕再須三五稔早晚義莊成西軒雷聽西江近簾觀太華低斜陽恰春意來照種花泥溪船家業計多少茶鐺及釣鈎橫行烟月裏誰敢犯虛舟雨中緑蘚寒逾碧山雞濕不文江檣三十丈穿上屋頭雲貧家吟夕陽照泥垣雞飛欲上屋爨下無束薪夜飯炊不熟飲酒戒飲長防病停杯愁不禁計量輕與重愁比病還深久旱得雨偶題畫牛已謂秋無望今成大有年山中三尺雨騎犢上平田清橋夜月月隱崆峒峰世人俱未看獨憐得句客照橋三四欄見負薪者舉世皆新事逢人非舊顔析薪趨夜火隨鹿下秋山桞塘風靜回合春塘水無風一鑑平垂楊自天境多個是蟬聲入村偶成出郭動舟楫入村趨草樓雨來江色暗呼子鳴白牛藥壠地仙不愛穀種藥方橋右久雨不出門猪苓大如手鸂鶒不共山雞啄雌雄自作陪寒山相對在春水幾時來農耕牛脊春陰惡溪風布褲單南人解占候還有種田寒五日蛙天五月五新水濫屋腳中有不眠人髙燈聽蛙酌題畫雨片臨汀住斜陽赴暝收跳魚劃水面壞我一天秋泛舟人事山兼寂江清酒亦清晚來多少興獨槳月中鳴西樓啼鴉作人語孝子獨關心仰見隴頭月斜飛烏臼林出城東郊漸微緑騎馬欣獨往梅繁野渡晴水落春山響山水圖山俗尚古野五家同一村何曽苦謝客人自薄閒門雲裏秋風候新蒸薯蕷香我客期不至潮水到寒塘南山轉秋日歷歷忩户裏留之不可得忽照前溪水流水隨雲去宛然山共移乾坤安置好猶自作閒疑聞道旌招至寒林亦或然虛聲原自起風葉走牀前太白山太白三千丈廬峰上與爭道人閒管事終日作山評水邊叟水居不業漁秋深賣柚橘睡美不知晚船頭海日出醉俠賖酒不論價强中奪馬騎千鐘酬死士五斗醉胡姬橫石橋地覺秋來瘦舟宜雨外晴野橋將浦樹扶得夕陽橫偶書翠管如吾影百年長繞身北鄰纒十萬夜夜賽錢神聽止窩彚征生不競艮止夢尤安黃屋深天寵青雲儘蓋棺偶題藏弓安宿鳥移燭逺潜魚滿案閒居賦都無封禪書旌陽山晚翠橫過水晴雲倒落窗得渠明分野為我截秋江曉起雨晴凉風入庭樹曉日飛霜鳶墮髮如白雪强欲隨青烟秋日雨中貧舍珠如穀荒村雨似塵日來官府峭莫怪索租人春早牛膝寒嶔嶔野日收蠻霧鵓鳩溪南來催人脫布袴畫景一棹便為家清江又白沙魚筐寒不重大半是蘆花雪屋書生圖世上倚氷險山中讀雪安西風鑄剛骨更送一番寒鶻擊鷺不守螳蟬戒俄成議後灾魚蝦足新浦飢隼自天來菊花醉眠屋廬下開眼菊花黃多置三百篋與花收散香風竹圖寫竹如草書歷亂不成行只疑風霧裏爛醉過瀟湘偶成微月人生影輕風船弄波明朝還夜直凉愛北湖多春懷老夫饒白髮背立桃花樹寄書匡廬僧春山共來去拾薪女風葉狂飛面霜藤短刺衣勿傷楊桞眼留取望郎歸畫景斜日黃公嶴清江翟子門東京塵有翼飛不到深村西山西山正可悅薄暮作鴉青吟苦人初瘦斜陽上竹屏醉眠竹下作四虛吟衣以藕絲作扇將鸞尾編酒應槽碧海人是簟青天徐指揮畫梅根是梁州鐵花如洛水神剛柔兩般性定我道中人湖頭開欲過墻角一枝斜賴有長生筆為天留幾花聞泉心膽當年大龍門聽萬雷細泉今日志聲到竹間來不寐幽鼠響穿覆瓦白月寒帶初霜詩成枕上人瘦海入壺中夜長矮墻微照螢火𤣥狖入偷柿霜刓印去腰已久老懷挂世空長殘燭三更黑蕊白齊四壁𤣥霜口論庾廩虛實腳揣襟稠短長答俊上人惠竹靈根過江三里淺碧遮山一重風靜幽藏孔翠雨來寒翳僧鐘四時雜咏蝶入梨花無色鶯過青山較黃老眼不宜繁富新詩刪去齊梁林邊偶饁田父池上閒呼鶩雛十日閉門坐雨荷錢大似盤盂黃粱作飯秋熟緑橘搓香野歸對月穎頭神健下天鵲頂毛稀夢魂杜陵詩史嵗月黃公酒壚舊厯才看大雪髙桃又換新符悅茶􅐽汁雪中無此美悅茶孤夢繞鐺飛直尋陽羡山頭路春月生時負擔歸盛水採菱舟閶闔門前水半城采菱船去月如燈禾飄黍爛無消息明歲農夫學種菱竹枝詞桃花零落桞花飛從此烏雲入鬢稀舟楫無情天淡薄載君東去未曽歸朱端山水長圖有感已把東山作急圖水飛雲動與神俱千峯萬壑啼黃鳥待我歸來借一隅題畫屏人間舟楫舳銜艫晝販魚鹽夜采珠只有小家生意少載船秋色過南湖煎茄絶無滋味假油煎慚愧三公匕筯邉到得何曽無肉食雨厨烟屋始論錢四皓風裏飛花未帖然靜中棋子動機權在山泉水青天色流出人間不似前書蘭亭記後髙竹深溪春事幽文章千古說風流我今猶恨當時筆缺寫新亭一段愁竹林圖疏眉短髮開生靣此是嵇公彼是劉竹外斜陽髙幾許讓他塞馬飲春流壯遊天涯雲月動飛旌劍逐龍駒出戶騰二十二條時務說馬生何處拜昭陵南寺游手攀幽棧上青天惠逺前身定有緣斜日光中三丈石大書太守寺游年郡中休暇一探𤣥萬事關心未了然行上髙臺試明目吾民何處少炊烟月峰山意何太古百柞千松挾雙廡歸時巷犬無警聲長竹篝燈送明府大雪千峰雪片大如盂爛煮羊肪滿地罏誰肯朱門開一板野橋西望有僵夫雪蕉天寒白屋竈烟遲兒女燈前夜不嬉十日賣薪三日飯雪中誰訴縣官知過子陵祠漁竿不重手難持來者何人往者誰獨有西山孤竹廟與公前殿博毫釐搗衣婦氷霜入糨不柔勻萬杵邊頭聞不聞二十年來辛苦手定無春笋得還君贈李先生楝塘楝塘仙几在人間野氣春陰水一灣小艇不量輕與重晚來撑出載青山秋景圖雨洗青天風掃塵秋來山水淡于人誰家鵝鸛鳴雙槳直過江南採白蘋過淮河朔風鳴鼓下寒川西指淮流即是天十萬人家楊桞樹半開青眼望新年直河白草寒烟沒燒痕鸕鷀飛處有柴門直河莫道無關束一曲河流抱幾村梨園教曲畫梨花千樹雨初收大內春風不盡頭新製樂章音調别教他依舊唱伊州晚次太湖口落日扁舟似夢中江南人在五湖東靜聽沙客行相語明日開帆有好風竹鄉卷子太行山髙揚子深一分平地直千金便須種竹三百個中起詩樓卧晚陰琴士圖風聲水聲十指閒天地龜兹在此間留我一條携鶴路格開黃葉問青山唐子畏山水圖蠻天梅雨雜江潮五月青林未可樵泥白草深歸舊隱一支山路入中條小仙曉色圖曉色初分畫者稀吳生醉墨入元微千村萬落月猶在習習雙鳩出樹飛墓樹作花莫作墳前樹三月清明便化泥猶道春來愁尚淺黃昏添上子規啼題王從事南游卷德公鄉里亦升堂鼓篋雲山問道忙浦雨梅風南國路萬蛙聲裏到襄陽陳司徒與弟對牀圖夜合燈花相映紅尚書兄弟一尊同雨風蘇鬢渾相似白者長公斑次公偶成半醒半醉倚繩牀枕石江樓水氣凉豆莢筯長瓜杵大滿天秋興到南莊山堂馬前一鶴伴豫還萬卷圖經又未閒獨喜年來堪自大曲肱無禮對秋山㕔事後觀雨胃强餐飲偶一盆雨勢入屋不閉門手肱曲䦨眼力正水靣已沒芙蓉根秋光數行白鷺雪為衣雲葉蘆花作陳飛添個秋光迷物色夕陽無處喚鵝歸魏堂郵亭偶書秋米纍纍㪷十錢醉顴飽腹似堯天依山小戶無禾忝舂蔗成漿也有年濠梁驛書事雞鳴湖白此沙邉斜日山光忽濫川回坐壁間閒論量半生長是逆風船病起言志草野歸心日夜謀青鞋布襪上扁舟蓼花東岸人西浦相對芙蓉各㸃頭閒居不爭碁道懶彈琴臨帖觀書偶用心新水鵝黃三百個門東流過是山隂門前小雨罨輕埃江上晴山帶薄雷我鶴比凡髙一格茶烟生處却飛來山乘木屐水乘􅊑緑桞門前略似陶客亦可來無大嚼黃雞秋壯一拳髙好酒三杯粥一盂數莖頭髮下千梳明燈矮屋松油氣看到人間未見書山客敲門不肯應青藤倚壁坐橫肱秋懷萬里誰知我天目孤雲鴈宕僧閒看舊史爭閒氣身約幽人負好期寂處有喧渾不覺竹邊牛馬齕枯萁一飲還堪盡一升酒邊萬事不相能春來但覺詩神减夜半烹雞祭少陵草堂寥落川流舊草堂開門正對杜陵莊江村早晚無占候只試風簾影短長雪舟湖夜簫管紅粧擁下船風流猶記十年前老來骨硬無人愛一篛孤篷看雪眠秋成五月今年不糶新土場秋穀大如塵夕陽待月藤蘿外歸路村村有醉人杏花巢鵲三日營巢聚蒺藜烏鳶便欲奪髙棲東風早晚來相管吹上飛花補牖泥扇景勝事自知長獨往白雲無意偶同遊飛來花片尋常物十里溪山挂杖頭題畫有感千秋觀下水入田木落秋晴山近天賀監宅前鸂鶒路酒船歸去夕陽邊有懷南枝驚鵲北枝飛碧海青天有夢歸人在畫樓方獨坐滿天明月白雲衣夜夢㑹夏德樹同作二月新林花滿枝攀山踏閣逺相隨老來氣候尋常凖海上潮生正有詩雲莊何君山水畫門裏芙蓉浪裏沙輞川風色似君家只將畫筆當官府閒納秋雲一百車春日曲髙枕傷春睡未蘇半醒殘夢繞南湖鳥無聲處妨人見花欲低時要我扶曉起獨立山前半是僧數莖詩骨峭如氷忽看乳燕初飛出觸落薔薇露一升春詞酒堪剛制不禁詩燕惑鶯狂未靜時老筆年來愛莊整荼䕷影裏畫烏絲美目青江春出行白雲承襪曉常生閉門要學木居士黃鳥相呼坐不成愁結髙城酒作兵相持三月未能平不如兩物都忘却散漫春窗鳥一聲獨語流鶯春樂章梨花葉底酒洸洸百年已割半生去一歲無如二月長乳鶯啼過桞枝低江雨晴來草葉齊九十日中無好醉落花如夢到棠梨得氣春蟲篆壁遊感時黃鳥說新愁我將定性書當枕飛過楊花不下樓石田畫幽人無事山中倦眼摩起來江上踏寒莎月從十五秋光滿今夜梧桐影又多舒嘯草堂杜陵新樣草堂低堂下江春碧蔣齊歌嘯有懷誰我識一鶯相對主人啼江神公塗海水一般情未可安然掉臂行十日江行無鴨賽惡風吹浪入山城六月二十八日陸行至彭城病暑改從舟妄以千金重此生出門無蒂一身輕南風不動江流靜緑樹扁舟煮藥行一真已隨抱朴子同歸漸覺雕龍世事非打坐溪邊照真影年來啖菜也豐肥合和驛南望彌望皆白土當時戰血有餘腥白土經年草不青留得遺民幾家在夕陽村裏掘蕪菁題畫絶巘猶堪安古寺閒居定不著忙人胡僧一隻西來腳冡嶺山頭正出神鉤勒竹雖無大嚼飽公卿終是西山餓骨清昨日醉眠秋影下小風吹得紫須橫春野齊題郁君館春風隨人出東城貴客曵踵不肯行有人短褐無羈管腳踏飛花聽鳥聲郡齊述懷繁梅晴日畫屏前薄餅新菘錯進筵糲飯龎公野人性騎牛只記隴頭天一松不隨桃李墮蕪萊五百年長亦壯哉聞道未央興土木寒流石上有人來魚畫斷港楊花落作萍遊魚水面唼花行新抽獨繭絲多少將下吳門釣晚晴欹枕面山小圖樹卧溪流人偃石野亭凉雨入脾清手橫一部南華子山轉斜陽字字明七峰圖七峰尖峭似陳兵江外諸山合與爭天地年來愛藏用淡雲微雨不分明吳偉畫秋水天長一色如小仙分割借吾廬斜陽紅葉閒留坐推過儒書讀道書不寐裹衲孤眠何處村夜深吠犬若黃昏吟懷欲出尋僧去寒月斜光未過門悼孫允廉萬里蒼天尺五墳天不收子地容君西風數陳南飛鴈似學文章寫碧雲古亭寒潮風退磯頭白髙樹紅欺葉上青飄瓦敗簷秋影老路人題作斷腸亭雨中出郊魚龍江上正飛騰竹裏歸來笑不能别有好緣生眼底水明雲白一船僧鶴山鶴繞青山何潔白青山近鶴轉分明不知鶴外山多少亂數芙蓉不記名憶山鶴沙舊路春江上暮雨泥橋緑樹間加我草年閒腳版直須行遍水東山松月圖膝當木几耳當松夜色新生秋海東千古今宵有聲月道人不坐寂寥中感遇青山花外旖旎日秋水橋邊寂歷僧眼勘百年天地裏閒來此處幾人曽溪家紫絮茅花飛入門淺溪幽響出籬根當家老婦無他事落日呼歸白鼻豚飲舟中虎丘山烟晚作紫虎丘山花矯起舞措笙落簫都不鳴坐上微聞白雲語過建灘當年開設事難慿水裏乾坤又一層莫是女媧安不固補天墜石亂稜稜歸田雜興子隨郎罷孫追翁髙帽巡檐楊桞風門前泥深犢蹄白船面日出魚尾紅靜聽秋聲卷秋聲先到翠山堂六尺孤幃未受凉我愛靜時天不靜半天飄雨掠斜陽文徵明山水畫天外羣峰入紫青中間有路少人行江深草閣潮如客早晚相過不世情一默為林本聰鶯啼座石燕窗東居士無言木石同最有吟詩禁不住逺携聲響到山中南莊偶成與嘉遇夜探魚罾朝出耕耕漁兩事是平生阿翁樓上休呼醒方與白雲眠有情鄮州歌山入關門海入州海中白蜃吐髙樓公家政簡民安作細雨斜陽歸飯牛扁舟白髮芰荷香共指前頭賀監鄉西去洞天還有路人家兩岸種昌陽斥鹵青陽滄海濵扶桑隔水是文身江城新市無風雪畫鼓朱幡迎早春瓜鼠食瓜食實勿傷根生意微微復爾存一鼠作灾猶小耗人間草竊正紛紛送嚴惟中當日髙吟白鴈天寒流萬里雨燈船别來楊桞青今幾相對鍾山說往年二月二日江上輕雲覆戶低杏花開好未黏泥伯勞猶更嫌春淺背坐東風不肯啼贈康鵬何戡一别動經年不在梨園在賈船今夜曲中無越調江南人怕鷓鴣天送許習之黃山閣外竹雞啼舴艋風前白浪齊今夜勸君多酌酒陽關只在燭光西雪夜齊居聞朝用吟詩西舍寒宵有警風敲户凍鼓無聲雪滿堂便欲乘舟下溪去詩家只在竹西房靜齊此中動靜互為根四壁虛齊萬象存茶竈不烟春火伏鳥鳴竹響正開門枕上作山中飽飯廢三餘老眼無光懶讀書夜半不眠非有約滿天風雨響棕櫚楊光祿致仕歸鄉平生付公論履道有神明世感朝雲滅心歸春草生走沙迎故吏啼樹候殘鶯試問餘年事湖山無盡情贈杭東鄉白璧名方重黃金用未舒欲將南去舸收載北遊書碧草莎雞候青山豆莢初家僮得來信長篲帚烟墟京師送沈署丞還宜興别酒不成酣停杯放劇談雖依星斗近終念水雲堪野漲通朝扈春山結早蠶故鄉無限興非是戀江南有感題雲山圖謾說歸來好蘧然一繫匏我離天漸逺秋與寺爭髙澗底雲長懶人間夢亦勞畫圖飛不入餔餟近蠐嘈出門何處問西東乾坤亦醉中浦雲晴帶濕秋樹暖生蟲案上行飢鼠墻頭飲絳虹期期不出口斗酒對鄰翁自述歲月有今數乾坤多此身惡懷時避客夢語夜驚人淺道難還古陳粳不繼新誰憐伏莽下白首病詞臣許君春山圖卷子山客春長醉日髙呼乃醒抱沙溪鳥白飼葉野蠶青小雨瘢晴石閒雲幕晝亭黜聰今久矣誰且詰忘形寄徐東隱我性耽迂僻公今亦憚煩地偏如隔壤溪曲愈深村桑扈春前枕蜣螂雨後門更求人境外山水謝公墩雪隱題顧郎中卷子芒履去無痕何人割曉昏只疑吾夢寐别在一乾坤五石深缸酒千峰獨板門退藏猶未密花發暗香村送王朝器致仕還閩劉向今身老疏公志未迂甲科三戍後勞伐兩朝餘海物懷鮮錯川流送小車對門彭澤宰髙興近何如挽葉司訓父人世去千載泉臺歸幾重青山埋病骨落月夢衰容屋老來新燕田蕪剩晚菘誰將寄涕泪風雨水西鐘飲陳氏竹林刻詩竹上竹瘦立詩骨苔圓獻酒錢水光搖地上天影到書前老景無千歲殘題又十年稚兒如解意伴我筍根眠寄李誠之淮南君尚卧吾亦到江東細札閒中寫新詩别後工晚懷江竹雨秋髮渚蓮風莫負黃雞月山牀一醉同氷崖對面髙崖立盤回石幾層近天多得雪帶雨或成氷夜皎疑游鹿溪明雜亂藤時將山腳水淅米飯鄰僧山居即事髙齊獨眠起雲午坐來虛林近憎啼鳥溪清見伏魚果登留客喜箕踞揖人疏多少耽山癖年來覺漸除石亭我愛崆峒下幽亭傍石宜晝檐溪影動秋榻蘚花移聽竹留僧久看山得句遲悄然天境裏未有世人知石峰莫道愛廉隅天然骨立殊不雲秋共老得月夜非孤此腳曽登不當頭頗礙無百年吾隱几為汝有詩逋為余君題保竹卷豈不護枝葉深培在此根皇天應有意人竹兩多孫饞腹空千畝清陰蓋一門興來不暇問腳眼到君園黃翁壽日竹祖垂垂老而翁或共庚夜書燈下眼春杖陌頭聲綺里初歸漢龎公未入城糯田三百㪷為酒樂長生自述腳少扶持力東山未及登野眠孤似鶩衰鬢短于僧盎盡愁空室星䦨算故朋日抄書百紙眊眼不宜燈西山游廬嶽有良期登臨老恨遲索竒尋漢雋行李帶唐詩淺澗雲流雪深山鼠學麋不須問仙訣小隱是吾師希齊晚逸納納上羲皇原非學楚狂罋雞天易老海鳥日髙翔篾席秋光濕瓜田雨氣凉微吟伴閒步好景在斜陽納履何所往青天不問程割雞留客雨賣藥出門晴彭澤偶同飯長沮非獨耕鶯花久無夢只怪近春城送陳君還蒲陽南閩鄒魯俗曽未薄江東覽勝橫秋鶴歸程入暮鴻緑蒲新歲事老守舊山公問信慿君寄揮毫似夢中聞新鶯樓角一聲知風邪雨爛時爾來長有信我老本無期越藻青相待吳糧白恐飢南人習仁善繒弋上蛛絲朱仲德金陵别意卷子新安佳孫子長揖陌塵中書記春江濶詩聨上客同馬鳴雙樹緑花蒂幾州紅離思何曽惡青山行未窮陳復新挽詩湖海聞髙譽風神若見之化從觀物後清似在山時曉鼓沈河樹秋塵生研池凄凉携鹿路來者復為誰挽徐心齊江水夢來急飛花不返魂醉鄉王績酒飯顆杜陵村格筆橫詞苑飄衣到里門故人多少泪雲月寄黃昏送駱經幕離思隨春色人行花亦紅帝廷趨斗北鄉里過山東天道崇居抑雲司論有功鳥鳴杯酒裏萬里鴈毛風菜蟲圖閒門通翠圃野意頗芳菲土菜何青白春蟲亦走飛誰家桃李盛此地綺羅稀合㑹東園老茹芝言是非夢遊雪竇寺木杪上丹梯何人手共携緑江飛白鸛陰洞出晴霓落葉隨僧散浮雲入院棲疑應夢中事聽到午鐘迷感事二首古昔聖賢國今為鬼魅場事權投寂寞父子見凄凉地出廉泉細天流濁渭長誰收首陽骨雪白照斜陽感事秋雲變憂時夜雨䦨到門交富客稅畝及王官屋破雞聲晚江虛桞影寒遙聞太平信起舞夜漫漫贈鄭崇善定海千年真長令忠孝倚平生穀熟塗歌起官清縣鼓明禮堤防海浪天監矚山城暫借鳴琴隙飛杯送我行寄余潤之直以遭時拙而深筆研功思君
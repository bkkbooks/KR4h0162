來齊茗瓷取水妨龍毒革履穿花得麝臍侍御頗知吾碧眼昨來長紙送新題泊淮陽驛訪李郡判成之不遇依微帆影斂江干粉堞青城岸幘看山向北來多古色路從西去有春寒陳茅野屋相連破髙桞風鴉不自安今夜使君何處在鹽城遙憶去漫漫與孫允防司訓别久操舟夜過飲中作枯潮不到古城邊努力篙師夜進船白髮青衫見君處風簾細燭醉人天麒麟官舍增三子蝌蚪殘經又十年正好相逢不相别數聲昏鼓送寒川寄杭東卿秋官眉采清風定如舊思君不見夕流深燕駒北赴當年市越鳥南飛何處林客夢夜寒常懶作詩家春老亦髙吟芭蕉葉短青還在細寫悠悠别後心寄孫吏部同年馬前同看陌塵紅一十年來似夢中鳴鶴天聲揚日下小桃風瓣落江東詞鋩讓鬼殊難送詩癖為城未易攻欲問佳期天近否絳河終夜挂梧桐送愚隱劉先生還廬陵留都下馬能幾日才入秋風歸思濃老去心情傍鳬鶩晚來詩句上芙蓉盛時雲日開文繡何處烟洲信短篷乍别仙郎定惆悵不勝江月坐初鐘越中盛水感事短髮扁舟越水濵斜風亂雨夢中身四更水白先疑曉二月山寒未受春新燕舊巢來有所孤村獨樹住無鄰城隅零落殘僧影猶似吳兵過後人竹屋甘棠館下地如今方廣優涵竹屋深千畝笑人耽逐逐百年著我寄陰陰溪流響至通幽籟風拂枝開見遠岑安得與公分榻坐夕陽聨句答春禽出郭一部新詩一部蛙夕陽出郭路幽斜水邊地冷苔生髮山外民貧竹有花厖犬上墻嗔過客牛羊下坂逐歸鴉誰歌白石南山岸不是陶家是寧家宏路驛早發赤瓦黃茅數百間居民多事早開關濕螢熖竹火依火疲馬出郊山復山照路野花應自笑上天雲鳥幾時還手中秋扇難遮得梧葉風前客鬢斑質菴為黃用芳賦犧尊不飾似迂愚人到真純事始無酒醵鄰翁期盡飲手摩孫子教相呼虛文上薄顓孫氏知已平交棘大夫聞說東村耕事近手拖方竹耳提壺送周茂中還鄉寒氣江山濫不收青螺蝟縮紫髯虬殘年滯雪傳新歲五日敲氷過一州水底龍泉能照夜雲中鵬翮要逢秋也知鄠杜天非逺王掾年來尚黑頭送王侍御父歸烏程一見先生一灑然神儀如鶴在秋田袖中健筆風兼雨身外芳尊日似年曲磴飛梯游了寺紅菱白藕夢歸天苕東漁伴尋常有第幾灣頭洗釣船之平海青天欲盡海雲東遙見孤城浩蕩中紗帽白浮行地土布輿青捲下沙風漳河盜滅憂仍在越國秋深信未通薦黍莫愁常作客水邊來去有漁篷天雨雪七十日偶晴得葬先妻雨雪雲頭散積陰微晴如下葬棺金垂楊終古今朝始芳草平田此路深老去枯骸難獨立春來寒夢日相尋剪茅欲結思亭子與雉同飛不出林自遣門堂塵土不秋毫五尺新苕喜自勞緑野日中僧笠小青天雲靜鴿鈴髙偶成佳句狂幾杜自漉新䤇略似陶舉土作山才一丈對風仄枕聽松濤將西遊訪舊感懷扁舟昨夜雨如塵今日微晴上緑蘋路入林低潮裹樹山行月黑虎窺人道逢知者詩增價身到衰年酒是親震澤白雲無恙否相思千里一勞神古意井中有水通天河井性何曽通浪波不知誰作轆轤綆亂我心緒當奈何井底泉義士志昨夜東風怒捲地井上太行吹不去誤馬曲郎騎白馬若練帶青絨作韁玉為轡别時馬前細屬目郎心或改馬色在太行山頭烟霧深馬色亦似遊人心終日出門望白馬浮雲細草何陰陰占雞卜響皆不定鬼神那識楊花性思君白髮千丈生蘭花無香藕花病人生不如燕子飛朝銜青蟲傍壘歸儂家花落葉滿樹郎騎白馬西家去吳娃曲鴛鴦始雛羽未黃吳娃十四依母傍畫眉令作新月格著粉教學荷花妝娃年雖少能自惜母言似良意甚慝俟妾十五身漸長賣妾奉侍青樓客東家阿母盎無米幼女窗前相笑喜養鳩嫁鳩禮所宜零落甘隨草木死黃金雖多何足誇妾視黃金如土沙寧令五十無夫家短歌行有翁野望泪滿眼掇衣涉水水過腕時飢野雀鳴喧啾隨翁入屋如有求物性無過得一粟翁雖三餐百憂足東鄰鳦鳦割生鵝享賔樂客酒滂沱鳥性只求無網羅朱門雖髙不相過寄楊名父先生偶出國南門秋風動吳沼佳人隔扶桑日出方杲杲照見玉雪膚德音日三澡飄飄白霞裾覆以青桂葆南北不可忘星辰隔昏曉彼媸不自陋鉛華以為巧豈不傷遲暮那復事妍好夜理機上絲千端縈積抱達旦始成章一寄萬里道奉答德樹童子來雪中遺我髙士牘悠悠牘中語新葅咀寒緑令人發浩興臨流取桃竹削竹勿傷手尋君曲江曲喜雨後篇士申祈得豐續熟望癸酉以為官府職漸舉百廢後去冬孟仲月逺入是嵗首百日不一霖天漢淨如帚民曰吾小人立計春最厚牀頭種子白撤土日巳久滋潤不相濟田容白􅀈剖豫乃召民言罪在豫德醜我民不吾釋如纊挾之肘吾亦矜吾民如身卧在疚南衢畚草壤北巷辟雞狗入山顙龍湫拜道麈楊桞林公謂見素真宰心恭敬尤不茍湯餅慰飢渴士吏遍入口舁龍入雩庭感應捷桴缶續日便得雨人稍事南畝寮屬益精䖍誓公各勿負終然動帝衷􅗈霈喜大授河流無髙平牛馬失來走縹縹馳雲師曳曳鳴電母千村樂新作百農應歌吼㑹當起倉積且毋辨筲斗隔雨聞農談亹亹及太守我今老且慵于汝力何有望雲思親卷子浮雲興大陂悠揚忽斷續遊子感時序升髙振芒檋親舍隔秋海逺入千里目我願雲有神結為雙車輻朝發暮及庭安事騎黃鵠錢廷節母挽詩君昔速觀化神依獨木主辛苦四紀餘死復與君伍手持白玉璫納君懷袖畢璫有貞節文上不愧秋日秋日復秋日射見江水深江寒蓮葉死生子多苦心畫蘭為朝用賦風絮何悠揚下雜塵土飛澤蘭無情思流水淡容輝此草久不見重我長相思客有水墨技為汝傳芳蕤一本數百葉中花藏幽竒置君隔疏綺相對無一詞但知守貞性焉能明素懷畫蘭不畫意蘭花不如草至今蘭與草無人辨惡好傷親詩凉風起中堂蹶我骨肉親蛛絲度空幕月光照流塵雞亦不肯鳴天亦不肯晨悠悠漆園夢千載蟪蛄春安得東窗日重照白頭人慈烏失其母咽喉無好音落日雪片急低飛下丘岑隨身幸有影與雪兩沈沈天無十日雪烏懷百年心來朝雪自晞烏啼只荒林金風既戒秋城空月出早砧杵西江鳴寒聲發孤小賤子不願聽誰肯為輟搗萬户一片月何以分惡好仰昐石楠樹中夜落飛鳥哲人日巳逺誰謂天有德隴樹日已長誰謂春無力春能發樹枝樹無怨春色暖風不作花零雨下清滴啾啾樹間鳥喚我拜寒食由也昔未貴日負五升米為親煮饘粥親悅由起舞親死南遊荆廩粟多如土開襟視肩痍皮色潤如乳更使米上肩日光向西吐糗粻才糊口云胡道三牲五日不一肉鬵釜無腥烹所期在末晚親豈解長生親死兒有肉唼囁如鼯鼪孝哉潁大夫猶泣生前羮晨雞號如故夜燈豈無光天地一昏曉悲歡異人腸往時雞與燈聞見在髙堂今日雞與燈颯如丘壠旁俯仰百年內誰能無感傷蕙帳吹晚風慈幃死秋竹猿鶴如有懷噭噭鳴山曲我聞猿鶴啼猿鶴應我哭風起月色暗江流影如墨虛堂誰與言中夜起燒燭遊長山偶偕羣從遊騎馬秋山冷笑語應谷聲揚鞭亂江影入山尚未深而有山栖境紅子落長藤蒼苔覆眢井短棘刺我衣朔風吹我領飢腹覓蕨根健步出松頂樵人四五家炊烟忽生暝問樵何處山云是丹霞嶺黽勉越崇岡豁然見髙景飛鳥蕩胸至浮雲暗生脛遙瞻泰華蓮俯睇彌明鼎萬象紛來奔一一授公等陟髙原自平可以發深省海漁何物此老人殺竹南山青維以雙繭絲赤腳踏滄溟滄溟有黿魚尾甲搖烟星長竿不易觸經年失飪烹咄咄世間人潢汙事鱨鯖朝取或盈車暮引足充羮室以驕婦子堂上媚賔朋老人在海上豈無羡魚情重理珊瑚竿黃金以為繩河伯恐戒嚴無使神龍驚吾今大下手鸞刀伐鯢鯨廣平太守蝗出境瑞蓮生卷子諸侯為政無大難禦灾致祥才兩端廣平太守有神力手回化機如轉盤先是農夫繞田泣飛蝗下田無子粒太守威德如馳霆一蟲不得留彊隰先是汙沼草無芽沼中渴裂啼蝦蟆太守恩澤如雨至一蓮再出雙頭花蝗飛出境民有飯瑞蓮花開水欲爛江北于今千百州安得無蝗有蓮看山人鼓琴圖歌山中日月不論數野客何曽識去住君持琴來知為誰我亦適然來此處一彈一奏巧相同君則為徵我為宫風泉松葉發天聽十指不動智技空乃知萬事難自足師襄成連俱漠漠回首溪堂夕靄髙問童炊黍猶未熟壽郭典簿父分題得魚山魚山之色亦太古盡日晴天飛霧雨只疑方丈臨前楹無乃終南屏深戶正月四日春一分魚山花開真為君餘慶能無念若祖再拜東風酌白雲送翁長官分韻得樹字江寒鳬鴨方念羣江頭艇子不肯住衆客臨江動愁色雲邊直指象州路願君為我立斯須髙歌一曲白日暮海邦居人曽未知東風巳動桄榔樹風雪圖歌晚家西山傍老姥十月作雪天惡苦斗新剪茅成小屋只開東窗關北戶樹梢撲地落凍螭啾啾瓦雀吟朝飢禽蟲此時若不利山客髙齊今獨宜五斗秫米作酒釅阿婦來言勿酤店鮮魚出氷黃玉光松火入突碧烟焰我笑袁公誠老迂雪中僵卧如小夫復笑子猷好生事夜半擊槳依風蒲不如坐對家人面酒酣髙歌一曲還敲壺山中歌深山古苔滿地碧淺山流泉走白石深山不接淺山雲今人還尋古人迹漆園先生竹皮冠芙蓉衣薄秋風寒秋風寒欲歸去昏鴉栖滿溪頭樹郭節婦古人見善必疾書常恐遺落無收拾况于守令司民風重此一事更汲汲豐蔀幽茅有隱賢青天杲日何由及且如林氏女郭家婦天性堅貞世希有初笄入門方少年桃葉桃花才十九姮娥在天常獨居倐忽神明敓其偶時猶女腹無遺娠如梅未實杏未仁一心槀寒百不動形骸已作全亡人與姑依依日相慰無女無男從寡身嫁時叉頭發玉采今日笥底栖浮塵荼苦薺甘不自覺視蘗如飴亦可嚼行年三十六春秋更老百齡終婦郭天生直絶識得明夫家尊重父家輕寧父終歲不一往往見伯叔心怦怦節婦無言非寡情井水何曽答風聲叔氏當朝老中丞忠貞道氣九垓橫有姪女質酷相能為女談事天為清賈充馮道日改面嗟爾男子之為生叔父謂見素公浴鳬軒為封君林太守小江曲湖莊門幽白石硜藤來不休有鳬飄然倦雲遊下與魚鱉爭春流先生野情適相求鳬亦不去同沈浮汝羽青青吾白頭人間日月如馳騮萬錢為買木蘭舟千丈深淵下直鉤海翁前生曽狎鷗與物並育吾誰仇天隨鬬鴨尚機謀還讓先生居上游環溪歌環溪天開三萬春六丁鑿蜀不鑿閩不雪自白山藏怪無雷作聲龍有神溪勢若往洊又復大環縣置天地腹西堪䇿杖東種竹水無驚波地有穀太丘孫子溪上仙昔與海翁爭釣船事權今日難輕謝猶寫溪山放目前贈王廷直山水歌我詩未工不如畫王君工畫過我詩幽谷水逺草木際詩意未到畫盡之十年懷才近禁御天光映筆生神氣五日一日得偃沐門中清客揮不去如我老迂無所長愛君之畫不能寐眼中有我常十分為我用筆如用軍黑逼太陰晴作曛白橫草樹青聨雲尚恨窄幅如短裙未足展運游無垠昔時韓幹名善畫伯時老格真其亞當年交游最有人少陵山谷相聲價千秋萬歲作者稀我詩頓覺無光輝何當生綃一片裏致我詩句登元微黃子和黃灣行樂圖笠澤深赤壁壯遊人蘇公陸魯望兩生出處稍不同筆勢相持豈相讓黃子志騎黃鵠豪時為蘇放為陸誤落塵網二十秋時時有夢飛黃木黃木灣扶胥口驅風行船月載酒醉中被髮晞不乾腳踏秋江寒入肘有客東來雙白襦身乘白雲掌有書為言太乙蓬萊住問子世上今何如公卿紛紛多列土手執事權如執虎平生但知虎養威為虎反噬今無數黃木灣中今可來百年灣上無虎灾青蘭碧竹滿天地幽鳥輕雲日快哉夢中微言猶在耳山川便覺生眼裏故鄉豈無賢者徒前輩還招白沙子喜雨第三篇去年八月喜無雲我從北來憂頗殷時冬刈禾得半實又有稗子插其真城中井泉到底竭百家出汲江之濵我志去官箭在彀如笋謝籜未離身棄置百責無一可倚毗一老有餘親十月寒風吹捲地魚龍結蟄無經濟千山明峭多霽色四澤空縣斷陰氣以首觸石求石知大冬禱雨無乃似豈期誠信無陰陽舉手加額雨驟至海郊磊砢十丈强壼山東南土愈剛麥子下地一旬發野人期作三月糧造化膏澤重傷惠樽櫛未肯來泱泱春晴又復成亢烈癸酉之憂未能忘郡前父老滿道白謂今䃫穀錢兩百黃睛富民有紅腐翕縮不糶窺我逼眼前飢瘡聊自捫後若更飢易子食天聽為聞作雲霧靉靆如商雨分數終見雷霆擊東海雨㸃驟白無行路野婦赤腳走逺塍歸牛翹鼻浮荒渡舍南舍北飛屬玊禾如青油潑農目今年賈楚定不施秋米上倉敢虧斛淮關行北門淮關多雨霧濁流廣野不可住風鑽破板索舟瑕烏啄枯蘆窺水蛀雲沙茫茫日易暮絳蠟華燈在何處黃昏緼被雨暫止半夜再作喧兩耳巴蜀漏天置我床杜陵破屋無過此舵工疾起少良算久晴無備只長嘆兩番織葦粗掩濕五鼓譙樓寒達旦雨細作雪如吹塵對靣相語不見人十錢一束换青薪市酒亦覺生精神陰晴變化不可必人生遭遇理亦一事當風雨且努力豈得前途無白日海鷹歌海風西來天作蒼胡鷹爪吻如劍鋩長飛萬里不見雪回依草木觀四方妖狐黠頗無數或時人立直當路鷹也側目若有思世人那得知其故鷹乎鷹乎飢乃爾水衡珍禽飽欲死衛公使鶴鶴不行方信鷹揚當上卿林良戲墨圖林君寫意不寫形筆鋒賦物真天成水墨一斗沛生氣乾坤萬類皆含情水則有聲石有影百禽爭鳴日不靜短脛長吭辨族殊髙飛下逐雌雄並水無射弓山無梟弱能自立强不驕爾我相忘齒角利觸之不怒皆囂囂我願區中開廣域晝行夜宿無戕毒千門萬户置此幅風木慈烏圖昔年堂前樹好時清陰為蓋臨軒池深根不撼地維定夜夜慈烏來哺兒颶風一夕捲土至吹得堂前樹憔悴樹葉落地烏以飛烏雛啞啞啼不去雛欲為烏報含食長天茫茫海雲黑安得扶桑千丈枝風吹不動烏寧翼黃昏步溪上見烟月可愛明月在天烟在溪烟中看月無光輝沙禽熟眠潮未響野火歷亂船初歸天邊楊桞誰家樹烟月相含不知數此時幽景寄不真莫是江南夢歸路次夜又步溪上月夜不減昨夜好秋霽家家夜飯早蔓青芋子白酒香土門竹舍黃花老農談悠悠靜可聽皆說官家今太平斗斛上倉不過概差船㸃馬無兼丁翁哺弱孫婦抱子依依相對桑麻裏我願明月長此光不照離愁照歡喜甬上耆舊詩卷七

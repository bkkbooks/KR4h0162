body:
  text: 甬上耆舊詩卷五監察御史胡文學編序曰甬上古耆舊之國也方秦末博士大里黃先生邈然避世時天下有四皓先生其一也至盛唐開元間賔客賀季真先生為詞家舉首歸賜一曲四明逸老名重本朝及宋慶厯朝鄞江桃源二王先生淳熙朝禮部侍郎袁正獻公與同郡諸賢後先並著稱為四明九先生而後吾鄉風節文章理學遂並著于天下自洪建以來鄭李諸先生始作斯文復歸雅馴循至成𢎞之際海內久治平氣淳俗厚人風益髙于時名薦紳若兵部洪公常給事盧公瑀太僕金公湜六七人俱解組歸田因得從髙士宋𢎞之恢張景心憬先櫟軒諱端諸先生相結為髙年詩會每值風日佳時輒剪蔬供蔌歡共為集逍遊散帶里人望之若仙嘗追遡諸公生平洪兵部與于忠肅公為左右手有安社稷勳晚脫虎吻益倡雅里中盧公名諫臣直聲廉操重于一時兵部嚴公端至行軼倫復以古文名家刑部宗公佑循吏之後于集中齒最少正術周先生祜髙士章先生珍並詞家名宿宋先生集先輩遺詩有功文獻張先生以詩法傳其從孫琦為吾鄉詞人之冠倪先生光善言易名比京焦金太僕與先櫟軒先生風格更上詞賦之妙傳于朝鮮日本為中朝增重諸公詩各擅風人之致要皆解外膠略世事身當太平之日從容吟唱以鏗鏘盛朝四方望甬上擬于唐履道里焉此俱本東沙張公所述再詳于郡乘而堇山李先生更别載宋章諸髙士俱裒然人師不愧真隱凡屬會中唱酬遍傳于逺近合二公所記十有八人俱歷然可考余因得于暇日輯諸公詩惟金太僕倪高士俱有遺集可録其餘諸家散見于他選雖單章片律亦必隨鈔復慎擇其可傳者人各數首且彚為一卷特相詮次意使太丘朗陵重聚于一堂漢陰主客歡情更接然後諸先生音咳相聞無復契闊即開卷讀之亦若身為其門人弟子恂恂然相從于杖履之後也獨是堇山先生去諸公才二十餘年節奏可尋流風放􅜜而即謂社詩漸逸無從彚録望得如謝方石先生為赤城詩選以著一鄉之論此懷闕然余乃更從二百年後圖相採綴于當時會中詩豈可復得唯録其平生遺草光響略存庶學者得自今日仰溯西漢而下世有老成足發恭敬亦稍補堇山先生闕然之懷云爾及余選先輩遺集上下千百年因盡名曰甬上耆舊詩益使後人識此邦二千年人文熾盛惟藉大里黃公後數人至此集諸先生身後餘音幸附金石得列為四明文獻之邦也集成録詩凡十一人俱有傳餘七人詩失傳亦附姓名于後通判鄒誾髙士王政余賔理問周頌袁德麟周愷陳渭兵部郎中洪公常公字子經號石田性高邁強記博通家貧常從人借書一覽輒盡中進士觀政兵部時于忠肅公為侍郎一見竒之即薦公有經濟才特授本部主事會土木之變忠肅進尚書一時軍事棼錯盡以相屬忠肅每入朝公輒具筆札以從事至且語且疏即不具草立上忠肅既幹略絶人復仗公為左右手遂得指揮定難稍遷至郎中上皇復辟吏指公為忠肅黨上知其名特原之陳汝言代忠肅復以事誣公欲致之死上竟置不問後馬恭襄公昻為尚書值西陲多事馬公嘗面陳部曹乏人上顧問洪常安在以憂去對即命起復公至部久之馬公疏薦公為本部侍郎忌者知其事先劾馬公私所屬公遂力請疾歸里進階朝列大夫公時年甫四十自念與忠肅同事特蒙上知得不死再脫虎吻俱上所賜餘年因日與里中耆舊相聚雅歌鼓缶以頌太平歸田歷三十餘年非歲時鄉飲不至公所蕭然一室以文章自命晚年得所未見書必手鈔始讀所著有勉學録石田稿隨筆考文業考及選定韓栁歐蘇王曽六先生集公生平履操亷白尚義在兵部時出入常無馬武平伯陳公重其名奉八十金為市馬至再却不受同里李主事山如清操絶俗歿後公身為經其喪諸高義率此類懷鄭汝誠端居鬱無聊引領懷三益相違念一朝况兹歲屢易雲樹渺關河之情安所適歡娛日以踈憂愁日以積緘題寄便鴻相期崇令德宿美古韶方丈何處堪尋物外交羅雲丈室絶紛淆老僧掃榻應相候童子開門不待敲花外雨腥龍出鉢松間雲暖鶴歸巢滿懷清思渾無寐卧看流螢度竹梢都給事中盧公瑀公字希玉號益齋以進士授刑科給事中即劾巨璫梁芳等竊柄引用姦僧繼曉以邪術罔上直聲大振嘗疏罷淮陽貢賦十餘萬緡陳西北市馬積弊人俱德之有溫州衛指揮戴勳以遺孤為庶長所孽庶長賕結當路多為其地公知狀言于尚書馬公文升事竟得直勳後知公言奉二百金賻公母之喪公力拒不受服闋遷工科都給事中論天變忤旨廷杖置于獄謫判長沙稍遷同知真定府為治善撫良詰暴吏民愛畏之尚書王端毅公恕見所上治行旌異之遷知廣平府廣平故牧馬地豪家數侵匿委其徵于貧户公至剗洗宿蠧盡反所侵地民困大起乃命起學舍養士授以經義三輔間翕然嚮學有張參將者以髙資甲郡中為讐家所誣繫獄前守意避嫌置不理公按牘出之比公引年歸參將使其母密懷千金為夀致榻上公堅謝不受其亷白始終不渝若此公為人不輕言笑口未嘗論人過少美風儀有鄰婦製一紈袴遺之公斥去默然終身不至其門有知者重之閨情錦帳徹流蘇寒燈對影孤其如天上月千里照征夫題竹幽人愛竹看不足更剪生綃寫雙玉瀟灑何如渭水姿扶疏略似淇園緑初垂露葉朝毶毶乍拂雲枝春漠漠竹根竒石一拳小共抱堅貞永相保兵部員外郎嚴公端公字克正號謙齋以進士稍遷南京兵部車駕員外郎所職黃馬快船公為監凡巨璫有冒請公輒持不許遂為積忤所中解組以歸公性至孝自歸田母年六十公奉養歷四十餘年母年百四歲朝夕不敢離左右母齒豁不能飱公手屑良米粥操匕箸以進問母有所欲輒力致之少疾即束帶至旦身嘗五藥至母體復始就寢方母百歲時公率孫曽長跪上夀烏紗鵠髮相照庭除間公自視若兒孺子也見者稱為盛事及居喪哀毁彌至公為人性樂易然持操甚嚴家無餘財周人之急意常若不足其學貫串百氏為詩古文詞髙軼超麗自成一家凡里中有欲考議古今多造門辨問公為隨事畫對歷歷有徵學者俱宗之所著謙齋集藏于家公起里中以古文名家居官為健吏處林下奉母至四十餘年母夀歷百餘歲尚作孺子歡身列孝友傳中此誠世所謂吉人也時稱公為詩竒俊脫俗更妙于體物而今傳者甚少幸録其一詩稍見風概吉人之詞雖少而彌重也遊福德菴湖海當年已倦遊風波無地可藏舟何如今日城西寺半醉花茵卧石頭太僕寺丞金先生湜先生字本清為人氣體甚髙自童時輒能詩長益漁獵史籍舉于鄉以善書法授中書舍人待詔文華殿遷太僕寺丞督山東河南馬政初監牧者多以墨敗士林畏居之公笑曰誰謂必亷泉方可飲耶即日乘傳詣部盡釐剔宿姦風節大著時俱曰此公誠金鑄人也因薦敕賜一品服宣詔朝鮮其國雅尚文學陪臣聞公有詩名請留詞翰公即席草答數十首文義溢發自王以下盡驚曰前天使所未有也因請公使節所歷文章鐫諸國中名曰皇華集復選美人侍夜公贈以小詩笑遣之諸餽貽盡却不受還朝遂請致仕屢徵不起家居三十年足不一迹公府即族黨慶唁亦謝不往唯里中耆舊觴咏為集居嘗坐卧一小樓嗜學至老不衰嘗曰吾平生喜讀易窺造化之微適有所得即渙然有餘樂他書則未然也為詩多逸韻篆𨽻行草俱有漢晉人風性嗜竹因善寫竹每命筆姿態橫生率題小詩于上人稱為三絶喜杖策過禪舍所交多髙逸沙門一日口占一律示僧有謝世語後數日果卒公事親至孝執喪盡禮待詔時以書法薦其弟溥併入直與諸弟姪分田宅多讓肥美人以是益髙之太僕居里門蕭然四壁風格最髙每畫竹輒有一詩楊文懿公每稱太僕先生重其筆墨謂在子瞻與可之間晚年嘗過湖南延慶寺為老僧畫竹一紙懸諸寺壁後時過之輒加題一絶積至十首及垂老復至寺中見尚有素處一方即欣然命筆曰草堂南北路髙低林下相逢日又西只為詩多不礙竹幾番題過又重題以後遂不復過今此畫為好事家所得尚傳在人間先輩人風良足愛重也河間府瀛海驛寫竹遂成長句我本東南瀛海客乘興來登瀛海堂堂中開簾分廣席四壁拂拭如秋霜老夫見此發長嘯便覺清風滿穹昊呼童捉筆破水墨胸中恍忽窺天造何須巧作鐵鉤鎖何須苦效金錯刀大竿小挺恣揮灑千枝萬葉分秋毫雲氣淋漓墨初濕隔忩似聽湘妃泣兔翻鶻落魅愁一夜轟雷破春蟄蟄龍振起風怒號蒼煙翠霧翻波濤鯨鯢帶雨走平陸靈鼉跋浪聲嗷嗷從來造化不可測呼吸陰陽在頃刻篔簹谷口冥煙開白日龍來作人立黃堂太守人中英殷勤置酒當前庭大觥小觥迭相舉賔僚進退如諸生我亦平生好竒絶為作長歌歌一闋樓頭羌管落天風筆底驚蛇走氷雪歌罷出門呼驛吏叮嚀户牖須常閉只恐天工有使來一朝捲入空中去題唐明皇吹玉簫圖昭陽殿髙清晝長珊瑚枕壓七寶牀珍簟平鋪碧雲冷珠簾半捲秋風涼此時諫疏非無補君王自喜教歌舞舞曲翻成阿濫堆别調新傳玉簫譜玉簫一曲度薰風宫商十指何玲瓏碧沼遊魚窺菡蓞丹霄彩鳯鳴梧桐梨園弟子多白髮承宣獨喜黃幡綽手提玉板不停敲足踏青蒲恣歡謔雙雙粉黛誰家女霓裳細拂鮫綃縷斂袖低眉不動塵似解烏烏曲中語從來聲色移人心人生樂極悲亦深豈料簫聲入雲去化作漁陽鼙鼓音過劍水有述此地重經雨後過其如風物悵人何水忘舊澗橋梁少路啓深山草樹多行客有懷頻問迹土音無字易傳訛新攜一劍千金值欲向巖前試一磨觀劉廷美秋官草書二王消息渺飛鴻今代劉生筆最工戲解都盧身似縮舞看渾脫劍成風一池春水鵝羣白數屋秋霜柿葉紅况復才兼詩畫好高名愁殺米家翁寄大嵩舊遊孤城如斗倚岩阿匹馬曽經此地過行盡青山無虎迹望窮滄海息鯨波雞豚里社間田少斥鹵疆場野竈多獨記南樓同醉日落花如舞鳥如歌遊天童寺過中峰行盡青松始見山暖風微雨露班班欲尋開士栖禪處直到中峰疊翠間滿地竹陰人迹少四簷花氣鳥聲間素瓷傳後悠然别不許袈裟送出關過丁家嶺嶺頭松樹插天青嶺下人家舊姓丁沽酒且須尋地主將詩不必弔山靈問誰别有神仙骨顧我真成老鶴形回首遼陽三百里落花啼鳥晝冥冥楊栁美人圖簫管聲沉午夜春六宫誰尚步香塵垂楊影裏濛濛月獨照長門失意人題多景樓滚滚江流動地來重重樓閣倚天開行當草罷平羌詔乞取青山作釣臺題延慶寺畫竹咫尺南湖幾度過頻將詩興付清波詩成欲寄林深客間放春風出薜蘿行到山門似到家相逢不必具袈裟誰知七月秋風裏香茗新烹薦筍茶一竿瀟灑玉玲瓏湘圃淇園在眼中過客莫嫌枝葉少才多枝葉便多風湖上禪房對竹開雨餘新水緑生苔入門聽得茶童語昨日題詩客又來題竹雜咏偶騎黃鵠到人間除却吟詩只自間兩翼清風收不住又隨寒雨過溪山四明山下一綸巾把筆曽為竹寫神莫笑老夫輕自許湖州太守是前身漠漠春風淡淡煙瀟湘江上最堪憐十年不寄平安字一夜秋聲到枕前卧起書忩酒未消呼兒磨墨我揮毫須臾一片湘江雨亂逐秋風灑鬢毛北地天寒少竹栽客居終日苦黃埃昨宵適有還家夢直向江南貌得來昨日投間列竹林已看林下筍抽簪題詩為報三春雨莫遣長梢易作陰雨後雙鈎寫未成幾番閣筆聽秋聲琅玕本是無心物移到詩家便有情每見長安好事家年年栽竹似栽花誰知一過江南去看盡山巔與水涯城市園林多種花山中老竹自欹斜時人只解看花好看到秋來有幾家刑部員外郎宗公佑字元吉父顯初知宜興有惠德時尚未有子民為聚禱于神遂生子因名曰佑少即有文名中進士歷官刑部員外郎以守制歸卒于家士論惜之寫懷無端世事幾曽諳寂寞何從問指南排户祗應知已過披矜未有俗人談松堪獨對髯方老菊未全開瓣尚含漫擊鉢聲佐長嘯一天風雨暗煙嵐陰陽正術周先生祜字立德以辟薦授陰陽正術少有詩名為一時所重人稱栗軒先生嘗與魏雲松相倡和所聨句工力悉敵而栗軒集竟失傳同時若薛元禮先生以司稅楊梅讀先生以倉副使先生以正術俱小官名重今城南有周正術墓梨花纍土行人過之猶知為詩人藏骨處吾鄉前此公侯卿相甚多以此一壞較彼墓亭翁仲誠不與易也送金進士德潤與魏雲松稱作聨句昭代産佳士祜立行卓先覺登崇願方殷稱追逺誠獨確出系幸未刋祜征途敢辭邈華騎緑駸駸稱錦衣晝濯濯冥賁徹重泉祜家歡罄一握爭知才特竒稱總羡貌純朴康藪出麒麟祜文岐來鸑鷟語正出咿嚘稱行危齊犖嶨量容渤海深祜清脫沮洳濁文藉嶽崿攢稱玄微繭絲𣙜詞藻或紛敷祜天葩靡雕斫李驚超爾神稱栁見嶄然角彪文孰能加祜龍變不可捉允矣德言恭稱久而交致慤囊槖周寠宜祜蒸嘗餕賔數葭莩獲相因稱枝葉藉無剝跋涉延歲元祜逶蛇逗秋朔我私濟遑究稱我公勞罔逴仳離心若攣祜岐分手仍搦檻檻聲更和稱騑騑色不駁君器自軒皇祜我疵誰礱琢廷猶需補裳稱國不遺雕璞惡芟楚畹薋祜芳擷香濆藥士類易淳龎稱土風捐齷齪化宣放勳仁祜和贊鈞天樂既哲居鼎台稱匪彭侍帷幄瀆詞致瀕行祜明達豈孤學稱送章黃門元益待漏與魏雲松稱作聨句宵寤念朝趨蒼茫遲晨漏祜低橫默屏營直簡端宿留稱天北杓乍旋極東光未逗祜通工鵠翥繁夾掖鵷行簉稱兢爾嚲絲紘肅然襜綺綬祜王郎記遐懷杜老詩遄懋稱儤馬靜攢蹄司雞竦動咮祜樂部駐旌􅓚羽林羅介胄稱花露零以瀼栁煙羃而秀祜遲遲箭刻深浸浸壺聲驟稱捫衷荷錫榮委質須匡佑祜昧爽鼓鐘希簪亳入祗候稱哭長清李處士長清李處士鄉國足稱賢舊德崔門重遺經伏氏傳韭蔬四座客煙草兩湖仙今日嗟何在山庭宿雨寒送金子還滇南戍所西風把酒贈驪歌駐馬含愀意若何書劍又從關外去年華半是客中過楚江樹色經寒早巫峽猿聲向晚多到日轅門應有問為言東海靖無波章先生珍字文重自天順成化以來文重與張景心宋𢎞之先櫟軒諸先生俱以布衣宿望為里中五經師啓後鳴時不愧真隱先生少為文學胡平仲書法仿宋克而變自成一家詩溯漢魏以至盛唐諸大家能造其妙生平喜讀易有易注若干卷孤舟夜讀一卷它所著勾章小家言二十卷並藏于家先生卒後魏雲松先生哭之曰九原詩癖應如昨月白花開對墓門是足使人追味也古意結髮遊三輔垂老守一城月皎天漢流厭聽橫吹聲來時家平安于今竟何如中心徒倣徨路逺不得書長河無波濤日暮遊子歸草深山雉鳴水滿野鴨飛丘隴多新墳其誰主蒸嘗折葵循野籬煮飯解行囊豔歌行和風散晴靄冷露晞春陽步出閨中姝採將陌上桑冶容事窈窕穠豔飄芬芳髻擁黃金叉耳垂明月璫湘綺以為衣紫羅以為裳使君愛青年下馬揖紅粧為言孤鳯鳥欲效雙鴛鴦妾身名家女夫壻侍中郎豪氣萬人上美軀七尺長朱門白玉階錦鞍青絲韁爾今在長坂妻亦守空房遊俠恐相繼能忍容為娼劉生不事魯儒文談兵動主君開弓學明月射鴈落黃雲桃葉迷歌扇榴花醉舞裙遨遊五陵地結納李將軍良人良人越河關歲月忽已久灼灼庭中花菀彼庭前栁陽春被萬物芳草亦含歡如何逺别離長江路漫漫漫漫江河長迢遞不可逾相思發長歎視我明月珠贈所知效陶體峩峩青山下小屋十餘間禾黍滿東臯桑麻翳後園日出讀我書日入髙枕眠相知無心曲惟此門前山好鳥歸深林白雲宿層巔陶然得真趣悠悠樂吾年擬曉發五溪舟發川中路孤吟背夕曛秋聲巫峽水冥色夜郎雲野店青山繞溪橋緑樹分採菱歌棹逺風靜有時聞送張二貢士煙靄散春晴亂鴉深樹鳴千山懸落日一騎出孤城急管催離宴飛花亂旅情殷勤懷上䇿謁帝向承明東湖别業老年厭城郭湖上最相親疏雨斫山蕨東風采澗蘋鳥啼林樹晚鹿下野塘春當路多竒士誰能訪隱淪無題溪橋春水生新蒲緑堪把茆屋掩松雲斜陽鳥飛下題鄭汝誠所藏山水圖南山春雨晴西溪春水滿孤舟釣夕陽沙明緑蒲短宋先生恢字𢎞之以經術授里中子弟及門最盛陸康僖公瑜其最著者也先生嘗憫郡中文獻失徵因選天順成化以來諸名士詩合為一集冡宰碧川楊公見之深善其意因從鈔一本以授子茂清即知州芝山君也其後參議南江戴公更從芝山處得此集因為增輯序之曰余嘗慨想鄉賢篇什思搜訪而不可得一日從芝山楊君所見四明雅集一編乃詩人宋𢎞之先已纂輯因取諸家近詩增所未備總得六十人集成四卷不惟吾名山之助其文獻亦有足徵者故樂為邦人道之吾鄉有選詩本于此教授鄭千之先生家學淵源最久其為四明文獻録所集宋元先輩詩僅四家自其大父蒙隱先生父以道先生外一為奉川董秉彛一為吾鄉蔣敬之然則所録里中詩只一人而已余復盡讀宋元志乘所載詩亦絶少太守沈公愷序吾郡詩曰宋元間攻尚互異篇什不傳在當時固巳如此然亦由纂述無人致傳者益少也至宋𢎞之先生始録天順成化間名士詩二十人曰四明雅集于是南江戴先生因所選為廣之得五十五人仍其名東沙張先生益廣之得一百五十一人更名曰四明風雅至崇禎中陳太僕陸中翰諸君復專録吾鄞詩得四百四十七人名曰甬東詩括蓋此邦文獻之傳數百年間得世有所徵俱宋先生祖構之功也南江謂先生詩格逼盛唐其柏梁體最妙調髙而意逺今所傳者絶少余為録存數章使後來學者追述先民得知其世系焉寄洪郎中瓊林有鳴鶴皎皎霜雪姿飄飄自遐舉雲中揚羽儀朝飲玉池水夕啄玄圃芝發音起千仞逸響聞天衢靈雛善相和知為心所縻安得晨風翼萬里常相隨訪楊維立進士留贈虛齋坐岑間幽懷曠難任美人久不諧紆鬱傷我心出門愛春熙濯木栖鳴禽輕舟溯長川弭棹楓江潯高扉俯流水竹樹蔭成陰升堂欣良晤載聆金玉音韋布分樗散幸兹挹華簪燃燈照行觴嘯詠鏗璆琳遂忘夜漸中天低舍後參餘興屬枕藉晨雞徹雲林分攜聊贈言庶以酬南金送戴使君之任雷州有美吾鄉彥丰姿氷雪涵鴻文歸藻鑑髙譽動華簪題駕方齊右分符遂粵南朋儕分祖席徒御擁征驂騄駬初當道青萍已拂鐔寒雲凝楚峽春樹滿湘潭執轡登岩曲褰帷轉石龕亂山遙入桂巨海渺連儋萬井依蠻市孤城倚瘴嵐漢儀應共仰蠻俗自徐諳設匭求新政還珠異昔貪檳榔非足嗜魚膾亦忘甘户集民無訟庭間吏罷參清時將注用玄髮未為淹哭長清李處士垂白傳經鄮水東曽聞人譽重和雍天衢終嘆蒲輪杳雲壑長哀繐帳空耆舊一時堪補傳老成百世自流風獨憐帳下諸生在徒對髙堂哭馬融張先生憬字景心少有詩名更善于書法時謂其詩音律沖妙超然有復古之功同郡都御史張公楷雅以詩法自許唯于先生最相引重晚年學道居吳山之紫陽宫遂不復出以詩法及書傳從孫琦盡得其妙即所稱白齋先生為吾鄉詞人之冠者也故推其家學所本特書之聽鶯曲默坐湘簾垂啼鶯在髙枝初啼君已去再啼君不知挽宋龍川先生栗栗北風徑百草腓且僵白日失中舍慘淡寒無光漫漫愁思多激烈歌聲長浮雲結重陰俯仰內自傷揮劍出長坂我馬玄以黃川流移東溟葵藿傾太陽端居顧安適誰能履周行崔崔玉山岡孤墳鬱蒼蒼猗猗蕙蘭花千古含芬芳送友之京金氣應髙秋憐君復逺遊天涯冠蓋士雲裏帝王州鴈下孤煙斷帆行落日收吾兄淹宦久為報别離愁秋日宴海昌硤石東山東山此日會詞英霜落天髙秋氣清風度鐘聲諸剎近雲開日色兩峰晴葛洪井上煙霞老顧况臺前草樹平臨眺不須懷往事故鄉回首獨生情倪先生光字應奎少有文名會感土木之變復學孫吳書講劍術既久無所合乃更杜門學易忽意思朗徹若有神授遂盡棄世事曽一客京師名動諸公卿間大學士萬公安將論薦于朝即日謝歸先生自讀易有得輒能前知嘗在楊文懿公所有中貴使至先生見一雀自庭樹集于地已還集樹即謂其使曰頃來得非失馬耶六日當復使大驚楊公質之先生曰雀踊躍物也去樹而集于地舍所依也還集樹復其所矣初集自北而南水數六故曰六日當復又問馬色曰以水色尅火當黃而近于黑語畢驗都御史王公應鵬童子時至先生所甚竒之王適作一莊字先生曰蒙莊書開卷輒云鵬翔童子與名合不可量也以其甥妻之客有問婦將産者傘忽裂其人失色先生曰傘外裂則小人見君喜得子矣其前知類如此人因以小康節呼之學者稱味易先生唯與金太僕魏雲松先櫟軒三先生交最深翛然人外髙企羲皇年八十生而舉殯擬陶公自祭杜牧之志墓事懸像設奠延慶寺為詩自挽羣公俱屬和太僕先生别畫竹題一詩相寄曰先生舉殯吾為寫生其詩有言舉世稱髙士窺天合少微先生得之大喜其作達如此前輩謂先生古詩最工七言效初唐音格流麗近體不減王右丞其味易詩集凡十二卷不知為何傖所刪僅存律詩二卷余往問其家前集亦不存矣因即所選録存二十餘首復採其佳句如秣陵道中曰路栁官橋晚山花野店春寄金文用曰萍開魚弄日花落蝶愁人泊瓜州曰平林藏宿霧踈雨帶春潮隱居曰岸風落藤子晴雪上梅花宿山家曰水清溪近户楓老葉歸林間居懷鄭蘭谷曰燕窺花徑暖鶴護草堂清病起有懷知已曰海濶成鷗夢風髙斷雁心幽居曰野雲當户過青草閉門間送李公子還鄉曰江風催去棹戍鼓接行裝過七里灘曰白石依樵㸑青山隱釣臺遊崇法寺曰青山應作主黃鳥自留人遊東林菴避暑曰殿涼雲氣入池午藕花開屏迹曰逺山隨水下細雨帶雲流早春遊虎丘曰萬水浮光去諸峰積翠來遊上天竺曰萬竹岩前雙鹿卧百花林外一鶯啼育王寺曰天垂紫氣籠雙塔路引青松入兩廊奉寄尹天官曰陰崖短竹含霜老幽谷薌蘭背日生題蜀中山水曰路繞山川通漢畤花明樓閣入唐風客中書懷曰蘿偃破籬花自老門生新竹燕還飛弔嶽墳曰宋樹參天無北向吳江抱地盡東流雨後間行曰新水短蒲魚戲日暖風新巷蝶尋花俱氣溫詞麗真不亞盛唐也送日本副使梵苖公東渡海潮起瓊筵别上人帆開行漏盡香逐賜衣新月白元無夜花明别有春雲山千萬里天遣幾相親西陵夜宿衝岸夜潮響客居愁自生逺汀漁火起隔岸寺鐘鳴簾破流螢入雲移睡犬驚山螿又啼近盡夕夢何成遊紫霄觀臺殿層霄近煙霞一徑連懸崖生古樹小洞出寒泉果落黃猿笑花深白鹿眠玉簫吹向客鶴舞月娟娟宿清村地濶江流險天空山勢髙望鄉雙淚落為客一身勞斜日飛沙鳥西風動野蒿獨舟依岸宿深竹夜騷騷老狂浮生自落魄非復晉風流雲卧借僧榻雪行問釣舟青山入孤興緑酒散間愁老去任頭白乾坤一野鷗懷金太僕每憶金居士交遊獨見憐清風落疏竹白首問寒泉詩社幾人在湖山空月圓此生不復見風雨泣長年訪茅山張鍊師不遇客中曽有約孤騎入茅山一水落天上亂雲生竹間花深溪路逺松老洞門間採藥不知處月髙猶未還擬唐人得日觀韻曉入蓬萊境看門鶴一雙老松欹澗石垂蔓護山忩林響風生島亭虛月湧江投壺人去逺煙冷酒空缸訪靈隱寺栁暗蘇堤路行行二月春草香隨蠟屐松影落羅巾野鳥近啼竹山蜂逺趂人老僧相見好留宿話前因半村為毛廷輔賦郡曉聞鐘漏門前人賣花郭田留野鶴庭樹宿城鴉園徑通漁市河橋近酒家栁塘橫客棹風月賦桑麻夏日園林即事洗竹搖雲斷看山坐日斜趁晴收野艾臨晚摘園瓜行蟻沿枯栁羣蜂戀落花夏鶯啼不斷于此惜年華訪仙遊觀遙入仙源路碧雲深處幽洞門雙白鶴花徑一青牛别境天無外長生草不秋偶逢樵者問元曰會蓬丘上雪竇寺垂老尋山寺山林别有春路花迎笑客野鳥自呼人斜日催行騎西風落醉巾到來圖畫裏天上一間身雨後有懷蘭谷三畝南湖宅林香雨過時短籬邊筍早深徑出花遲問字人攜酒尋幽客對碁野鷗共無事相近不相疑客中寄李明府旅館多岑寂孤燈對此身青年愁裏過華髮客中新小雨甘黃菊西風老白蘋交遊滿京國明府獨相親病中白頭林下病久與世相違深巷客稀到間門雲自飛春寒蘭葉短雨細藥苗肥若問吟邊意勞生總是非錢塘懷古運啓錢塘駐紫微奉天文武直金扉南來宫闕鳯初舞北去山河龍不飛殉骨孤臣埋宿草前朝衰栁對斜暉客行欲問葫蘆井今日西陵故老稀石澗何年鑿玉水潺湲倚石穿雲出栁灣雙澗夾流村北雨一溪通滙屋前山平分月色浮簾淨相影天光入座間短岸桃花吟坐晚白鷗相對欲忘還江村讀隱茅屋深村江水流讀書長日坐江頭柴門織妾晨敲火栁浦漁公夜寄舟籬菊淨開三徑雨渚蓮欲老半池秋孫康未得其中趣釣月蘆花狎海鷗看菊東村對菊東村天氣清微吟半醉鶴隨行少年最恨花無語白髮方知酒有情夜卧小忩寒雨過曉看深徑緑苔生青山只在秋江上何事通宵夢不成九日登龍門寺塔玉堂山下龍門寺寶塔丹梯九日登歌起宿簷雙野鶴笑看掃葉一間僧雲邊垂白飛巖水江上搖紅小殿燈欲采茱萸望鄉國一行征鴈樹層層登北髙峯訪僧不遇短衣小轎入湖村漸上髙峰步步䀶經閣竹邊斜有路僧房雲裏半開門花深洞口啼山鬼日晚巖前見世尊欲問老禪方丈去火溫茶竈一瓢存先櫟軒先生先生諱端字文正嗣六世祖也先生少授大父父遺經益博學善詩古文詞為人風儀修整進止有尺寸郡太守重其名請為鄉校五經師從學日衆諸大人邑子俱嚴事之前此凡以儒士試于鄉即不中式亦得歸補學生從讀書齋舍先生以身為人師不得北面更居弟子之列每試于鄉其歸輒謝不赴學里中謂以傳經啓後為任若宋𢎞之章文重諸先生俱是也然學者至今稱師道甚尊必首李先生焉先生既為布衣祭酒日從里中耆舊觴詠相集更與金太僕先生倪髙士學博魏先生交最深方是時國家盛平島外諸國率由海道入貢先至鄞鄞起嘉賔館接諸貢使諸使至則聞先生名重俱購其文歸時得先生所言贈行其國中以為重先生天性髙淡無所嗜間居著書怡然俯仰然其處家益嚴足為士族法與二弟同爨至長子孫四子諸孫各命以耕讀朝夕奉教誨左右家居城東砌街别有草堂在東臯佳山水處舍外善田百餘畝每春日先生至草堂輒身束帶課耕嘗自題于壁曰四子之資有宜耕有宜讀五畝之宅半在邑半在田誦其遺言風流猶可見也先櫟軒先生詩有重名而家乘及諸詩選所録僅此越世二百年再經喪亂即後人亦無從綴拾遺文深可嘆也家乘載里中諸公挽先生詩如范公麟曰一笻花塢斷三雅日湖空屠公滽曰鏡中華髮無來往庭外青山謝主賔周公相曰渡海詩傳百濟去及門業盛五經分陳處士鵬霄曰浮白何人開韭席踏青無地試芒鞋楊公叔通曰髙舉已傳從鶴御冥心早見製荷衣俱一時名作可傳也即事呈倪味易居士結廬回衆水憑几坐來頻花嶼有餘樂草庭無限春初煙侵壁細小鳥出林新幽興誰相洽還知愧隱淪送日本使僧歸國鬬場曽得識髙顔杖鉢蕭然世外間已向檀林修白業更攜瓢史歷青山肩挑雲影江頭别衣帶天香海上還到日賢王如有問八方職貢列朝班題壁敝廬不逺徑紆斜門巷蕭然處士家老圃雨中生韭葉小庭風過發桐花扶身只合攜鳩杖過客何妨駐鹿車日暮新詩吟未定月光似比昨來加甬上耆舊詩卷五

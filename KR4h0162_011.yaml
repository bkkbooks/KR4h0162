body:
  text: 甬上耆舊詩卷十一監察御史胡文學編薛灤州穰字有年宋知衡州朋龜十一世孫也少資性過人好問學舉於鄉授涿州知州涿俗素強悍兼歲大祲盜賊多公至發廩粟賑飢親問民所疾苦力為療之盜賊漸息民得復蘇三年用薦改知灤州灤當孔道徵發旁午公輸供得冝不煩而事集州歲苦河決築長堤以捍之遂為永利以請老歸里所載槖中裝不入私室置産與昆弟共之散其餘資于鄉族身力為善日以白簡記其所行事博學能文詩崇唐人書法學鍾王劉方伯李僉憲李司空陳鹺使姚郡博同過郊居騷壇總俊豪乘興訪同袍霜重馬蹄滑日來山影髙野青蕪染路江白雪鋪濤雞黍應堪共寧辭命駕勞答楊質夫秋官見寄歸老家人舊窮居地亦偏愁多需酒散病久枕書眠兩鬢霜中鏡孤舟江上天耆英如可會洛社在何年晚過揚子江舟移京口暮潮生楓葉蘆花動客情千嶂雨收羣鳥下一江風縱片帆輕中流樹隱金山寺隔岸雲連鐵甕城東望鄉園倍惆悵誰家砧杵亂秋聲丁酉秋日懷歸郡事相羈復幾春苦為鄉夢夜來頻陶潛晚節間門柳張翰秋風故國蓴洛社交遊難待客漁陽景物易悲人蕭條歸計看書劍何日江臯一問津遊洞山寺傍山斜徑路難前俯瞰長流一線泉茒屋無鄰雲往復石巖有洞草盤旋行春官騎臨花外唱晚漁舟到水邊方丈蓬來何必問人間信自有神仙洪稼翁先生貫字唯卿父處士性宿擅文章有重名先生少從父受易舉于鄉除教鄧州益肆力為古文詞詩法盛唐騷賊有楚漢人風格常自著易説以教諸生檄主江閩省試多得名士如汪俊輩遷知從化縣復改政和政和有紫陽西山遺迹先生為發揮以經學風勵一時俱彬彬起然仕竟不進得下考歸因擬杜陵秋興八首以見志傳至京師李文正公大加賞嘆為别作春興八首蓋遙和之也晚歲結廬東臯自號稼翁日歌嘯其中每一詩成好事者輒競傳吳會間得先生文為志墓敘牒一時增重海寧新城江隂靖江四縣志俱出其手年至九十尚不忘摛翰單章尺牘流布江左有周易解疑卧遊清嘯録太白山人稿五十餘卷宫詞花萼遙連務本樓五王文采盡風流不知凝碧池頭宴落盡宫槐一樹秋雙飛金鳯緑雲翹舞袖三千盡綘綃一自鑾輿西幸後白頭如夢説前朝露滴梧桐月滿樓天心大火已西流君門且莫愁紈扇更有琵琶馬上愁風雨歸舟圖長江一夜西風作颶母翻騰勢何惡船頭白浪大如山船尾驚濤小于屋艨艟巨艦渾欲傾長年三老神魂驚瞿塘灧澦不可道揚瀾左蠡今身經黑雲壓山樹欲折百尺斜牽釘樁橛破笠風飄去似萍亂蓑不掩鶉衣缺去船得意笑娭娭七尺蒲帆如鳥飛來船逆浪不可住打頭風急真難為風顛不息雨加驟篷底歸心如馬走今古興亡利與名苦雨西風吊衰柳昨日東風今日西世情翻覆亦如斯若使東風鎮長好人生那有失時悲春耕春膏流土脈桑扈正鳴時谷口雲千頃村邊雨一犁帶經聊爾爾荷钁自熙熙禾黍真天祿何煩帝聘為樵息肩雲谷裏世事久忘機石枕梅花夢山風槲葉衣行歌驚野鹿歸擔荷斜暉欲問吳門路于今世已非送白齋張廷評還南省早從研席接輝光晚讓青雲道路長故里衣冠重對酒異鄉燈火昔聨床官居執法星辰近詩變元和骨性強老我雙眸還似舊時看天路有翺翔京中九日寄親舊百年京國盛豪華四海無塵靖鼓笳黃菊紅萸三市酒錦筝銀甲五侯家登山眺處常悲古作吏貧來且閉衙良會重期殘臘後碧天明月看梅花秋興録一劍閣西連鳥道斜上皇今喜到中華題情詩寄溝中葉賣卜人歸海上槎霜冷玉樓思舊帳月明邊騎泣寒笳秋來懷抱偏難遣城上芙蓉又著花布政李公麟字仁仲自為童子時作古文詞輒竒偉長益嗜學尚論古作者兼擅風騷舉進士高第授水曹與從弟堂同在郎署相倡和時稱為二李稍遷兵部郎中出為江西參議奏治行最高入賀至京時逆瑾當軸賂遺成市外吏率斂民財入獻或勸公貸資賂瑾當得美除且取償于民可也公正色謝曰進退有命吾不能黷貨獵榮且取諸細民何為也時瑾所遣旗校四布得公語以聞瑾大怒罰公米八百石瑾敗乃釋寧藩恃勢凌倨自鎮巡以下俱折節公獨不為屈稍遷四川參政有劉太監者奉詔迎佛還自滇中勢張甚所至科斂無算公禁無餽貽省費巨萬遷貴州布政使請老歸里杜門掩迹以著作自怡士大夫上謁者與抗論今古品目一時人物略無所私鄉論盡宗之時有所感遇逸興駿發輒一寄之于詩人謂其風格比諸堇山無慚伯仲有心齋集行世栁枝詞淡煙籠日影婆娑露葉曽經步輦過只尺宫牆看不見年年長是别離多簾捲青青水殿涼曉妝隨手鬭眉長含顰待與君王折一月看花到上陽擬古逺客遺素書三復襟顔開上言長相思永矢金石懷許身比稷契不謂行當乖南飛烏繞樹明月照我栖别君久離索蹤迹同雲泥感兹雙鯉贈竽瑟何時諧名世會有合營營道終迷勞歌停雲篇白日聲西回客授晉陵漫興遊子鞲上鷹低頭待人食何如山梁雉飲啄隨所適棄捐勿復道負此乘興翮隴蜀有文禽唯恐鴟梟得況聞終南山狐兔正狼藉惜哉不得往倣徨竟日夕庭前一琪樹閲歷成潦倒南枝氣已鮮北枝尚枯稿承暉有向背發榮自遲早青陽本無私豈足縈懷抱雨露感相培嵗寒以為保訪倪應奎徵君不遇老去詩壇衆所尊百年髙興許誰論孤城坐聽寒吹角匹馬行吟夜到門索笑梅花雙白眼忘情鷗鳥自黃昏不堪回首山隂雪上下天光逺近村湖南書屋為太宰李公作别業湖南門反關功成早已挂冠還五株緑栁遷黃鳥十里青山放白鷳長劍倚天人境寂絶絃流水夜窗間傳家唯有圖書在燈火西齋手自刪春日京師旅懷滿地梨花細雨天心旌搖曳落風前十年塵土真成夢一夜霜華欲上顛燕子尋泥營舊壘燧人鑽火起新煙白雲故繞江南路遮莫東籬種秫田御史董公鑰字啓之以進士授上海令有聲召為監察御史在臺數上封事論救副使楊茂元為時所重出按雲南鎮監孫景與參將盧和交搆纍按鞫莫敢決公承旨一訊輒得其情並論死巨豪震懾劉瑾竊政除不附已者乃矯詔逮公勒致仕瑾誅復徵竟以疾不起春霜吟夜氣升春空為霜不為露幽蘭植庭隅桃李置當户戶暖霜不入散作庭中素巧笑衆所惑蛾眉易生妬桃李恃芳顔幽蘭抱貞固托根茍得所奚用傷遲暮白日中天行霜消復誰顧疑冢驅馬鄴城北遙見古疑冢纍纍七十二出地若丘甬草荒翁仲滅穴崩鼠貍竦築此竟何為令人發哀恐美人悲西陵芳心雜怨寵遊魂化行雲日暮迷真壟銅雀安在哉瓦落漳水湧汴州元夕歌繁星下天為火城遊人沓沓如蟻行城頭雲破月半吐光向髙樓照歌舞歌舞入雲雲不凍佳氣暖煙結春夢戚畹香車油壁明王孫寶馬連錢動千尺遊繩束九逵紙毬化作紅鴛飛紅鴛拂面金鈿落深閨兒女啼春歸銀河欲沒巨風起萬户千門涼色裏絃管已銷信陵宅月明猶照侯嬴里懶雲篇為賈節判賦阿香抗輪輪欲折老龍噴雨涎帶血滄江有雲卧不動瑟瑟蘆花亂驚夢江風吹起鷗共飛片片挂作松樹衣山昏穿入樵叟洞沙晴鋪上漁人磯螮蝀吸泉妖蜃啼阿香老龍次第歸世間水暵幾如意獨有此雲無是非出汴城斷雲橫鐵塔殘雨落金池春淺沙猶凍年更鳥未知牛羊登翠嶽城郭枕荒陂古迹漂零盡蕭蕭動所思蓮池阻風黃河夜半馮夷舞未曉爭傳白浪雄水國春殘空望雨沙田麥細可禁風緣堤偶坐津樓上攜榼誰來野寺中極目平原渺何際驚塵飛霧晚濛濛內丘道中晴原草樹弄春暉候吏重迎侯駕歸西望隔年無雁到北行三月未花飛磧田風起沙塵滿山縣煙消井竈稀車馬紛紛遍芳陌幾人曾不愧輕肥禮部侍郎黃致齋先生宗明先生字誠甫中進士官兵部曹時王文成公方論學先生在其門稱髙弟宸濠初反先生上江防三策為大司馬喬公所重復上諫南巡疏武宗幸南都百官服罩甲衣以朝先生約言官共奏不冝服褻不果即移疾歸尋起刑部會張桂諸臣方議大禮舉朝譁之先生持論獨與合至署丞何淵請睿宗入太廟即具疏力言不可出守吉安下車首建白鷺洲書院以學道教諸生宸濠遺孽朱祥阻隘嘯衆白日乘肩輿橫行城市中吏不敢問先生潛發兵布賊舍左右候除夜牒郡從事他出猝至其所賊方聚飲酣伏發立縛祥父子及其黨無一人得脫盡斬之人謂先生計略足方文成也巨冦既平次治姦吏次決健訟次行清里法次行團甲法次修義倉行備荒法俱有條緒稍遷福建鹽運使召修明倫大典晉光祿卿輯光祿須知為疏以進略曰帝王謹德于供御飲食至為切近防奢止欲養德養身不可不慎唯宗廟薦食所在必虔乞定制使祀有常式薦有常品膳有常味賔賜有常格多寡有常數使貪饞無所干利上納之著為令遷兵部侍郎編修楊名以論權貴下獄詔窮治主者時在議禮大獄後黨議漸生先生疏言楊名罪不罪宜有定法然罪一楊名而必求主使之人延及善類將盡於一網其關國家元氣不小乞得寬名罪無窮其事上為霽威然坐是竟出為福建參政召補禮部侍郎莊肅皇后崩廷議欲從殺禮先生力爭之廣寧兵變復疏請擒治渠魁以昭國體論者韙之未幾卒先生為人溫恭亷靜然風節最著未嘗為貴勢所詘至其應變成務沈幾默運每確有定力時以為傳文武之學而能見諸用當以先生舉首焉吕梁二首天地有屯艱河流此扼會峽束嘶蛟鼉萬石轟崩潰奔衝勢益雄流沫成車蓋河流無時休怒嘶何時收旁觀未噎氣丈夫掉臂遊我來屬水縮洪濤益澎湃叱吒嗔風雷喑嗚助兵愾平生好竒心顔魄頗驚悸俄頃出其間安流歸下瀨水靜意亦間寂寞收震籟獨坐自頌思沈吟發長喟向來喜懼情逐物俱吾害駕出郊省牲帝德一無雜純毛亦尚牲妖鼷逃鬼護氛氣闢天晴萬馬通宵出千官夾道迎追陪惟勉勉臨照自明明延平别誠齋盛中丞每懷清節自當年此日相依不偶然宿霧盡時千嶂月萬山深處一溪船幽蘭香芷迎歸斾白鷺芳洲媚逺天獨立江南望江北不堪吳楚暮雲連王蘖谷中丞以詩憫余南遷守凍時王亦緣事南遷次韻奉答芧屋行歸葺短垣滄江無慕大鯨翻誰甘清世同魚服自愧微班隔獸樽鼓枻已知違帝里緘書應許到家門幾年來往風波險畏見黃河濁水奔甬上歌二首不知何地是瀛洲日月湖光淨不流秋到萬家黃葉亂玉簫人倚月明樓越王宫館上青天棟宇參差宿斷煙水漫湖西洲島沒踏歌人聽打魚船知府華石窗先生愛字仁卿少慕四明山更號石窗自童子時輒嗜學以儒士舉于鄉中進士授官刑曹善決獄取平歷遷郎中改兵部出守桂林桂林俗獷民喜訟擊獄多久不決先生至日為論報決遣月中獄一空田州岑氏作亂發兵郡中苦轉輸民負租積百萬先生盡心區畫與民相緩急報課得最入覲命復原郡先生意不欲更赴官強之行數遷延不上竟坐劾即解組歸性篤孝友與人交溫恭有藴藉意味蕭然常置勢分于度外人望之癯然一布衣也既歸田日以著述為事歲不一入城市有所請謁每杖策所之見雲蒸霞起草木向榮輒欣然自喜間與二三故人遊于日嶺雪竇之間攀蘿拊石吟嘯相酬自謂得騷人逐客之樂無與同者為詩學杜工部王右丞二家幾入其室書法尤重一時每下筆斐亹得者寶之竟以感微疾不藥而死年甫四十三名士大夫聞之俱哭失聲所著石窗集墨妙傳世甚多寄題信州南巖我聞南巖勝憑髙紆曲磴山深不見人松飈滿清聽洞壑裊煙霞幽花繞蹊徑古寺雲中開泠然發孤磬層臺俯石澗坐使心神瑩遊子疲道途攬衣起遐興山水江南竒碣石此猶剩上有仙子居因憶瑶華贈下灘江路厭灘流潺飛雪花白我來戒疾行水中紛亂石或俯若蹲鴟或峭如列戟或攢若蓮開或散如葉淅波流迷淺深衝激互漰湱歷亂愁無因放舟乘竇隙回幹捷有神長年豈用力幸無覆溺憂終然奪人魄我本湖海儔十年踏鯨脊縱浪恱鳬鷗扶危仗忠赤一尊強自斟庶慰風雨夕葦航卷亭名駐馬試幽尋煙霞接亭隧細竹浮疏隂空泉滴秋泌結搆借城埤孤撑偶因地編葦一任真聊作湖海寄虛訝郢州船中可植荷芰松壑翻秋濤褰裳染濕翠涼月委金波開窗漾晴媚藴真失所遭滄浪動遐思千古激遺音芳筵裊清吹心賞知幾人一飲復霑醉山簡數過從荆州足髙誼舟中望廬山望望廬山髙矗上青雲杪下醮彭蠡波蒼龍出溟沼羣峯勢若趨九水故縈繞嵐光隱約間雲霞分窈裊南北望不殊青蒼邈未了昔有藏修人千秋儼師表我行不及登仰止空懷抱孤舟莽風煙迸目飛雙鳥與泉卷為徐德安題絶壑駛驚濤窮探不可及遺迹嗟茫茫天根任敷翕垂空鳥度愁落澗雲飛濕觸石乃作聲靜定固所執長趨渺江海百折期歸集清比在山同潤及羣生濈淡交既以神道器本相入千古濯纓心褰裳試新汲長相思長相思路阻艱美人一去何時還移燈夕聽窗前雨卷幔朝看湖上山蘭房秋靜金刀歇懶把紈繒為君裂縫紉未得上君身絲欲斷時心已絶蓮塘碧水翻鴛鴦花開並蒂芙蓉香香風如挹美人面露冷泥深空自傷宿南渡出郭離塵事相將仙子槎晴帆南渡港晚飯野人家風至鳴溪篠潮回吐岸沙好山看漸近應共爾餐霞隱潭峭壁欹誰鑿谽谺小有天下探翻仄石仰睇落飛泉坐久衣裳冷窺虛雲日偏詩成不敢吐生恐觸龍眠日嶺硉矹中天出孤虛兀拄撑石魚緣罅入雲幔拂崖生歸鶴岩扉暝先雞海曙明仙靈頻倚望佩濕露華輕值雨黑雲將雨至晚去宿誰家逺溜奔崖白驚飈逗竹斜主人初具榻稚子旋烹茶自愛身霑濕猶看帶紫霞東溪卷乾坤佳致本依然寫出江南一輞川天與水光相上下鳥隨山勢共周旋四時風景長如此百折清流却似前有客乘舟學髙隱幾回酣墨落風煙送楝塘李先生遊杭東歸百丈煙霞作伴行更于湖海乞芳盟暖風猶訝千人醉梅雨曽無半日晴攜鶴上船詩欲就載琴歸路夢還清山靈有意重招引水月梅花幾度生憂旱六月江南絶雨痕轆轤聲斷此溪村却緣病渴頻回首只合憂時早閉門百里風塵空白晝千家雞犬共黃昏無勞史氏書民隱郡邑今朝有杜君磚河夜遲洛原舟不至本同行坐向江天驀越孤舟却汝憐如此月明那可住更兼風正不須牽室家翻詫為行纍書劍應知與客便今夜一尊期共醉滄洲城郭莽寒煙初入挂林憩觀音閣梵王樓閣俯江隈門外諸峯罨畫開滿徑煙霞僧獨往隔溪風雨我初來香消石鼎寒光逗茶熟山房午夢回暫弭旌麾聊問俗可堪搖落望鄉臺全州道中郊坰栁外問長亭吹面東風減宿酲雊雉平原芳草沒浴鳬新水暮煙生欲嫌俗客山花笑又見村童竹馬迎茅屋幾家春正暖即從南畝看深耕春日書懷簡張東沙碧溪新水繞柴荆逺餉聊為隴上耕地僻不聞時黜陟身間兼廢日將迎煙籠曉徑蘼蕪合雨過春山麋鹿行花落只防漁父見桃源本是不知名雪竇寺路入崇山草樹薰半空佳氣碧氤氲隂崖尚積千山雪絶坂猶耕百畝雲鳥度深林啼落日僧歸幽澗煮香芹恐驚猿隺悲來晚幸喜煙霞得共分武城道中武城縣前沙渚平草衰霜落蟪蛄鳴片帆欲下江南路卧聽風聲雜水聲題畫卧隱松林懶出山洞門長鎖白雲間杖藜曉起山前望秋在翠微黃葉間花柳晴光處處春天涯芳草轉愁人畫船載酒歸何晚家在江南湖水濵都督萬鹿園公表公字民望别號鹿園居士先世定逺人以開國勳世為寧波衛指揮僉事因家於鄞性篤孝友稟絶異讀書目數行下體中文弱被服固儒者而其氣自蓋一世年十七襲職即屏居西臯外每晝出騎射夜歸則燒燭讀書慕諸葛武侯為人志在經營天下中武舉第一會試對策論任將曰將係于相天下未嘗無將特患無相耳主者欲置第一以所言多忤時改十八擢都指揮督浙運所立法盡為轉漕畫一至淮值歲大飢千里無炊煙公愾然曰民呼吸垂盡豈能待請吾何惜此一身易萬姓之命即發所督運米賑之已竟得免以浙江司閫稍遷漕運參將再起為左軍都督漕運總兵前後歷漕于河漕利害洞若披掌初二洪水涸議者謂黃河改流公著論折之又有議欲由渦河鑿陽武以通衛河為便者公復力言其不可他如論海運論輕齎議本折通融議召開荒田及奏處異常水害漂流糧米諸奏議前後凡數千萬言俱係國本至論詳在會典及經濟文録中已由南京都督僉書請病歸常居武林寄迹西溪山水間適倭亂起東南日騷然公念國家承平久士不識戰平生喜從方外遊惟少林釋徒最善格鬭精悍可備緩急用因盡與相結納至是賊猝犯赭山當事倉皇無可禦俱問策於公公乃精選所識僧得二百人使少林釋孤舟統以出薄賊營縱火前擊之賊敗走復乘勝破之省下解嚴由是公所部名著逺近賊犯太倉操江蔡公遣使從公乞師浙中當事方恃為長城不肯發公别募月空等十八僧往且屬蔡公使以公書聘少林釋天員為將當可破賊時天員方登曲座説經及得公手牘為罷講先報書曰此非山僧事但須為知已一出遂集所教僧八十餘人蛇山十人併月空為一軍各精治兵械下山與賊遇于翁家港諸僧俱歸袈裟持杖口含澱藍及見賊各誦佛號伏地即盡卸其衣以藍塗面及四體奮起前擊賊初賊遙望諸僧狀貌衣爛爛已大疑之及自地上躍起俱裸鬼前搏大驚以為有神而僧結陳使兵器相間先用長矛衝前隨夾以弩矢下持鈎槍掣其足仆則以杖掊之刀割其首賊遂大敗餘走嘉興之白沙灘追及盡殺之自倭深入我兵望風未嘗敢與鬭至是始知賊可殺士氣為一奮俱用公所結客也然倭數為患由姦人王直導之公策其粗莽可用間得直除之則倭自去而里中有蔣洲其人辨士多計略且能得直要領可使因日與當事謀遣直俱逡巡未果其後胡少保竟用公言使洲誘直至斬以徇東南遂晏然一時竒功亦出公所畫策也朝論共推公復起都督僉書南京中府道經蘇州猝遇賊楊涇橋所從惟帳下健兒孤軍與力戰得出身中流矢義兒一人戰殁至南都下血數斗即具陳固守京畿之策上大司馬以書報家人曰家世死戰惟吾持文墨議論未嘗身將今晚年增一箭瘢可不恨矣竟以病劇請歸再推浙直海防總兵不起公留心天下大計凡有建畫俱垂為定制其論邉事益詳嘗謂古今二大患內河外邉公籌之歷歷皆如目中聞家國有急輒思以身赴之為死傳一時事即為精思其後而卒未竟所用所著書凡十餘種文章敷陳條暢為詩有孟韋風味一時王汝中唐應德羅逹夫三先生以理學名于世公議論與相上下分晰秋芒各相悱發先輩謂古名將以文學飾勳名亦間有之然未有研精道學與儒林宿老相顔行則屈指古今不易見也卒年五十有九是夕大星霣于庭公殁後人時見公採藥名山中至前歲有客入閩山漸造深巖遇一叟風貌非常留客與語三日夜客發其几上書俱署鹿園居士作客親與余言之公生有異相玉色方頤額上有三文相者以為劉青田一流初先忠毅公最擅風儀疏眉目體長玉立里中有故老望見曰李司馬真天人也自吾所識先輩風貌總戎萬公而後此復一人矣其足追慕如此萬氏以開國勳有四忠三節一義至公更由對策起家再綰將印子孫相繼為大將至曽孫泰乃以治易舉于鄉為名孝亷二十餘年天下和雍盡歸品目即江南所稱履安先生者也先生有子八人俱傳其學長孫言更擅文章蓋勳門之盛于斯極矣江南曲客從潮陽來夜泊秦淮口鄉語人不知兒童聞拍手錢塘八月時潮來髙百尺三五弄潮兒戲舟若梭織絡緯夜夜吟吟時驚妾心征衣猶未寄只恐曉寒侵君比天邊月妾比江中水願月上鍾山照江清徹底除夕宴鄰宅弱冠辭鄉早并州久滯身乍歸翻作客欲别更相親臘向宵分盡春隨曉霽新寒暄君莫問千里尚為鄰初夏自姑蘇返棹過嘉禾宿萬夀山作遊興隨緣變歸帆信晚風樹隂沈水碧霞彩散波紅落日城初背前村寺忽逢吾心忘厭悅莫訝屢西東重宴楊水部容間閣涼暄雖異序煙月共斯樓又覺一年謝空憐兩度遊行雲仍駐曲密栁更移舟留客何須醉忘情但狎鷗元夕後宿應嶴山莊幾宵燈下醉暫向隴頭醒隔嵗梅猶白經春竹更青就雲移石榻迎日啓山扃入郭非吾好塵勞鬢易星宿應嶴山樓窈窕蒼霞裏登樓愛隱居水聲孤枕近山色四窗虛林靜朝看鹿心間夜對書獨將耽寂意覺與世情疏病中西溪山中漫述豈如陶令荒三徑幾見雲封滿薜蘿抱病却嫌辭祿晚入山猶厭識僧多蟬聲兩樹經年謝心緒千端奈老何安得盡排人世事白雲流水和樵歌燕子磯作燕子磯前風滿臺倦飛髙鳥識歸來波漂雲影江心渡帆帶山光寺外回病足倩扶將弱息衰顔難駐付金罍鄉關日暮猶堪指北極恩深首重回新正十日自善卷還吳興山中遇雨作夜宿玉潭逢客醉曉經川嶺共僧行深村未雨四山暝樵徑無人一鳥鳴節近元宵思故里心隨流水急歸程亦知聞道希形役沾濕那堪又暮征清道觀感懷緑樹隂隂石磴遙碧岑丹宇倚青霄草年不到歸何晚一月初晴雨復飄薜荔雲深窺洞府竹松風度訝仙韶客懷幽勝偏多感不盡江聲伴寂寥副使陸公釴公字舉之甫能言母楊太淑人命以字百試不爽稍長神智鋭發讀書數行下中進士廷試一甲授翰林編修益盡覽中祕書意馳騁古今館中宿老俱下之少勵名節自許古人不肯􅐅􅐅從俗時議禮諸臣驟貴俱傾心于公欲引為重公漠然卒不應其人以為少已深銜之會大禮告成議禮者已當軸遂出公為湖廣按察僉事治江防其官新設凡簿書文牒盡屬草創公定制俱足為後法外臺諸君相顧曰陸君自史館來其治才即老吏莫及也稍遷江西參議治糧儲其于轉輸能酌諸郡贏縮驗物産之登耗與時損益之人以為便再遷山東督學副使敦尚風俗易郡中所奉神祠崇祀先賢諸生有文而行篤者引之若肺腑士習為變山東舊無通志公慨然曰聖賢百世之師也泰山五嶽之宗也六經斯文之祖也此一方文獻而天下古今之事備焉志奚可廢也遂彚古採今補遺正陋窮日夜力不懈踰年書成而公病矣遂上書乞骸骨不報卒于官公性溫厚口未嘗言人短而正氣不撓卒與時忤位終于外臺天下惜之長兄都御史鈳號石樓次兄布政使銓號石溪公號少石時稱陸氏三石並擅文章所著少石子集十三卷公之前崑山陸釴字鼎儀中天順癸未進士一甲第二公姓名適同中正德庚辰進士一甲第二鼎儀自史館出為太常被疾乞歸公亦自史館出為外臺被疾乞歸兩公並有文名年位未稱俱適相合斯亦一竒也建昌道中赤阪揚塵霾朱飈轉炎熾下有修竹林清泉蔭涼翠行子苦鬱蒸居者自幽憩豈為躁靜分亦緣身世異東門瓜已疏南山豆堪藝回車理故岑願言遂髙致愛峯篇愛山愛孤峯峯髙不可即誅茅卧其旁憑軒看空碧裊裊金芙蓉海霞蕩日夕下有蛟龍盤波濤起淵宅我思天柱遙漢江渺竒迹亦有匡廬幽誰能奮羽翮對此聊自怡冥搜但只尺浮雲倐蔽虧白日慘無色蔽虧良有時我情自不易請看石上蘿綢繆永為適妙髙臺石徑入迂回髙臺出林杪逺岫迎歸雲層巒礙飛鳥崖崩樹交撑壇寂花誰掃凌風一振衣清曠絶塵抱仰接煙霞重俯視樓觀小安得鞭蒼虬翛然下蓬島魚臺歌魚臺縣前秋水髙洪濤拍天風怒號野外平原變江海城中萬户生蓬蒿崖崩岸坼疾如雨安得回潮射強弩黃河噴沫赤虬驕白晝閃日蒼龍舞可憐樹杪棲人家忍飢父老相悲嗟漂零已分葬魚鱉征科況復愁雞蛇府帖朝來促堤築築聲悽斷林猿哭千夫蟻聚空苦辛一夜鯨翻盡傾覆我來泊舟魚臺旁柁楫顛危魂魄傷然燈嘆息坐中夜觸目流離增感傷豐衣美食千萬厦天寒誰庇蒼茫野重閽日逺不得知歌罷秋風淚盈把申將軍歌申將軍氣橫八極吞滄溟金吾奕葉名帝京慷慨獨存燕趙種縱橫少學孫吳兵憶從射䇿明光殿腰縣斗金誰不羡東海牙旗建栁營北關鐵騎驅沙甸虎符再握來瀟湘樓船蔽日魚鳥張畫角寒吹漢口月寶刀夜閃荆門霜將軍才略兼文武紫髯白羽揮尊俎秋雨蕭鈴靜虎貔春風緩帶歌鸚鵡檄書昨夜到轅門禁中頗牧須召君漢騎材官本驍勇唐家神䇿號親軍君家甲第長安道十二龍樓春色早豹尾香隨玉輦塵貂裘翠染金坡草邇來西北愁備邊登壇誰為勒燕然紈袴衣冠盡驕脆氍毺歌舞空妖妍丈夫志氣要磈磊射雕飲馬思青海叵平終見玉關開薦勳先奏金門凱楚江落日風怒號羡君行色壯秋濤狂歌擊劍為起舞回首麟閣橫中宵哀朱生詞孰南祠堂鴛瓦碧孰南父老相嘆息嘆息朱郎誰復如二十書生已廟食憶昨前村喧鼓鼙天昏日落豺狼馳蒼茫野哭走兒女黯淡殺氣衝潢池朱郎此時挺身出憑陵大叫探虎窟酈生掉舌機已危杲卿罵賊死不屈古來壯士思解紛朱郎救焚翻自焚寶劍精光忽夜蝕乾坤誰與清妖氛湘水村童擊鼉鼓共采幽蘭薦芳醑英魂時駕黃隺來祠下松杉泣風雨酒亭歌贈盧子徐山蒼蒼入煙霧泗水滔滔日東注芒碭龍氣收紫雲雲去還留泗亭樹泗亭虛迹埋草萊土花秋碧歌風臺當年亭長提三尺疾呼百萬驅雲雷西走強秦南辱楚一日韓彭盡醢俎壯士何能守四方况復儒生棄如土山中老嫗猶夜啼沛上小兒歡擊鞞赤帝炎光倐如電西風木葉同悲悽使君懷古意慨慷駐馬尋碑泗亭上英雄塵土堪歎嗟登臺一眺散泱莽錢塘懷古黃屋南遷日蒼山結鳳樓可憐江海地曽是帝王州草樹沈宫怨笙歌喚客愁寒潮自來往難雪古今愁山寺桂楫聊停渚芒鞋上碧空谷深平見寺村午靜聞鐘篆迹殘碑蘚林香滿澗松王程不可住僧話未從容遣興逺水泛孤槎天寒戀物華片雲殘照雨衰菊半籬花野靜聞玄鶴江清麗碧沙飄然湖海興鳬鴈汝為家旅夜紀懷旅館寒宵坐春愁日自昏角聲三鼓月野哭數家村養拙韜龍劍含悽愧鹿門時艱諸老在好為定乾坤湖口湖口荒村渡人家落照邉逺看彭澤樹羞上洞庭船草色迷芳甸江聲起宿煙此身隨物役空羡白鷗眠立春登臺澤國春生早陽臺豈故丘攜壺聊引望秉燭幾同遊山色晴催栁江聲暖泛鷗漢宫傳彩勝無復殿東頭劉侍御謁陵還千嶂回臺殿諸陵紫翠間金銀浮王氣鼓角到重關驄馬溪雲度龍髯夜月攀萋萋宫草白愁絶侍臣顔獄與七兄同床棘墻鎖館暗青梧局蹐連床氣未蘇海內冠裳今並寄天涯手足自相扶枕邉風雨情交切夢裏池塘興不孤天外數聲鴻雁侣祗緣羅畢散江湖楚藩燈宴鳳館歌鐘春宴開虹城千炬繞星臺遙分漢苑青榆火長照梁王白雪杯七寶香塵花外結雙蛾舞袖月中回清光却憶金蓮送午夜何妨銀箭催芳洲草堂濠水寂寥千古興輞川今復見髙情泉花映檻自爭發沙鳥背人時一鳴石瀨雲搖書幌動木蘭波擁釣絲輕狂吟五夜魚龍駭枕畔如聞風雨聲入郭有感東風應識宦遊情剛入城門草不生歸袖尚含青嶂色到家還説碧雲名朱樓翠館春先醉赤日金羈路未平為語諸君一惆悵壯懷今夜舞雞聲春雨隂雲漠漠浮天際鳴雨垂垂度苑墻石燕沙鳩愁太劇岸花汀栁濕何妨霏微仙闕鯨鼉杳縹眇寒江舟楫長春色紛披不知處祗疑煙浦對瀟湘送范廷儀守廣州長憶南泉范司冦把麾湖海更愁豫攀崖拾蚌蠻方俗度嶺穿梅使者車陶侃功名惟運甓羊公心事在懸魚秋深瘴雨連衡嶽鴻雁能傳萬里書贈唐萬陽仙郎卜築秦人洞作令來看海甸花但使桃源流赤水何須句漏覓丹砂陸機草閣慙文賦賀老香祠近酒家不道春筵逢白雪醉歌庭樹落煙霞滕王閣晚眺樓上煙霞回浦照樓中簫鼓暮銜杯江光半隱漁燈亂木葉驟鳴山雨來萬井兵戈餘野哭千家帶礪倚荒臺古今帝子俱銷歇俯仰風前空爾哀謁文山祠丞相名髙宇宙垂螺江合有報恩祠運移諸葛身殱日義盡睢陽力竭時戎馬中原空北泪松林異代尚南枝彌天碧草傷春色楚賦招魂有所思出塞曲贈申將軍金闕星馳奏捷文玉關昨夜羽書聞將軍不畫麒麟閣沙漠誰空豺虎羣參議戴南江先生鯨字時鳴以進士知番禺縣有治行歷南京工刑二曺出為江西按察僉事與勢家忤謫判鄧州歷官福建左參議歸老于家先生持操亷白歷官三十年惟餘薄田一頃居家以孝友名自先世伏臘祭器俱為增修垂老好學日坐東白樓手一編不置自成化以後郡志闕然未修先生因續為搜補考諸先輩所言述而不斷名曰四明志徵又從芝山楊公所見髙士宋𢎞之所輯四明雅集因增所未備序而傳之又合為四明文獻録俱有功學者先生年八十七體尚健杖履所至里巷聚觀太守歲行鄉飲酒禮必首請先生在賔筵幾三十年鄉論謂涇泉陳公後先生一人而已所著閩廣集東白樓稿俱藏于家先生所續四明雅集郡守沈鳯峯先生序之曰少參南江戴公號博洽平居亢潔不輕許與故其所選甚精張大司馬曰吾友戴南江氏早謝塵鞅屏居寡營愾日月之易邁懼文獻之失徵爰取郡中諸文人學士所著篇什積歲月而詮次之先生於里中先賢亦已勤矣而其詩絶不傳諸家所選僅一二首又不稱意中深恨之近始從其家得所鈔雅集一編至卷末已附録先生遺草一卷俱雅健可喜為其姪光選者所載他本俱無之即戴氏子孫盡不知也余喜先生詩沒而幸傳故為詳記之江上行贈費子二首涼飈凛髙秋君子戒行役結髮事弓弩應絃猛獸剨萬里苦血戰論功每不馘綿蕞魯兩生天人二三策行當獻朝廷躍馬人辟易臨岐發浩歎金聲終一擲明發不可攀謁帝承明廬秋隼快霄漢玉花立庭除忠義良耿耿物極理當舒走也先著鞭君才更何如贈曽龍山大尹祈雨有應吁嗟甬東郡頻來苦多事狼烽夕照紅水腥白骨漬村氓苦軍需買刀輸老牸野屋聞哭聲苗青不堪蒔況復旱魃凶百里苦若熾七月南風髙原野幾憔悴倉皇走元黎何由祛災祟真宰憐赤子罷征勤撫字跣足拜龍湫精誠天挽視一雨清囂氛再雨蘇顛躓三雨江河流山光渥青翠野老盡歡騰庶免填溝澻上足供需求次得望委積感兹回天誠盡屬曽侯賜奚為霖雨才牛刀淹小試稽首陳山謡才薄未能繪笑彼暴尫人空捶土龍碎春遊微風桃李夕是處鬭春華湖海平三月邊城活萬家土肥秧得意日暖草能芽須識東皇意歸來一徑斜日出東山上相從郭外遊青青千頃麥泛泛一扁舟水鳥窺魚倦山花倩蝶留到來無限意猶許續風流哭壻吕舜臣消息非虛訝斯人忽杳茫天低空灑淚江近只枯腸素幔隨流水丹銘望故鄉爾家太荼毒何故問蒼蒼應鐘之月偶得盆菊五色並植漫吟一首郡齋無事日長生菊色空庭照眼明遂見遊蜂翻片片況聞小鳥立嚶嚶思將正色常留世肯使幽人獨擅名絶愛此花吟晚節霜黃露白更峥嶸出內鄉城登白雲峯寺眺望峩公啞女洞泉名峯髙積翠白雲寒健翮初登怯羽翰象外風光蒙澗道天邊星氣宿闌干峩公仙御應猶在啞女紅泉竟不還待月招雲意未了長留丹地與人看夀伯兄靜山先生二首歸向山中三十春自矜骨相最嶙峋青雲岐路非關我白鳥風光正戀人豈為後生瞻几杖須知吾道卷經綸于今珍重他年事共羡孤標也絶塵泬寥八月煙水平兩洲花發自分明主人開閣披圖見髙客過門載酒迎靜裏傳經心獨發雲邊積樹夢猶清此時歌嘯聞笙寉長對南山作舊盟題畫移家近住釣魚灣楚水南邊白石灘忽見桐風飄一葉半崖秋氣落新寒參議楊后江先生言先生字惟仁年十六為諸生即開門授弟子經中進士以行人使于代王故好學聞先生名重因從受易且疏留使授代諸生經其高弟後多為名臣先生甫復命而代亂王出奔上再使往安代王得歸國遷禮科給事中時議崇興獻禮既定復有進世室之説即抗疏言陛下考獻帝而祀之觀德殿明親親也不復躋于太廟以干正統明尊尊也斯協諸義而協者也獻帝雖有聖德非若周文武之興王創業也而欲襲世室名舛矣我太祖太宗既正祀世室而復參以獻帝可乎若以獻帝為所自出之帝是前無祖宗也以獻帝為禰而宗之是近無敬毅也諸所云云俱為不經陛下前既罪醫士劉惠之言而今乃納署丞何淵之言前既俞禮卿席書之議而今乃咈書之後議臣不知其何説也臣非不知陛下順旨則喜逆旨則怒不逢喜而逢怒豈臣之情但義有不可即殞首闕下臣必不敢奉詔未報凡三疏爭之會廷臣亦多諫者事得已他如諫張璁不可為兵部侍郎諫璁萼不可典兩都鄉試諫楊一清不可召還內閣因天變極陳六科失職致用人行政顛倒已又獨為楊公廷和訟寃曰先帝晏駕時江彬挾邉軍四萬圖為不軌內外洶洶元輔楊廷和不愛其死用密謀誅之頃刻間尋定大計以倫序迎立陛下此社稷之勳非止開國佐命者也即使有罪尚當十世宥之今以姦人之言既褫其爵矣又逮其子若壻矣乃又聽百戶王邦竒之誣而盡逮其鄉里誣為蜀黨聖明之朝何意忽有此舉臣謂若編修葉桂章輩唯有自憤無辜非縊則刎耳至言費宏石瑶之隂私曽無左證豈小人之言必可聽大臣之行必盡可疑耶唯陛下裁察不以無藉曖昧之詞辱陷社稷重臣為聖世大纍書奏上大怒刑鞫于午門至折指終不易詞謫判宿州以知溧陽三遷至吏部郎稍稍起矣而忌者傾之再謫知彛陵州三遷至湖廣參議又稍稍起矣而忌者復傾之竟落職歸先生所在有治行溧陽夷陵皆為生立祠初在蜀傳恩詔至有曰唯議禮諸臣不赦先生題詩驛亭志感讀者灑淚次宿一驛夢有客緑衣相迎曰忠良亦來此耶次日詢之即編修葉公桂章就逮自縊處蓋先生前疏所云其人必感憤自殺者也年七十五卒於家郡人稱其居曰忠諫里所著集行世讀先生疏草忠憤之氣塞於兩間而其詩宛秀明麗幾近子房之貌余既録詩十三首復採其佳句曰月落明漁火風輕穩釣舟曰短竹生幽響髙松落午隂曰沙寒稀荻雁木落露松虬水漲鷗移渚芹香燕獵泥曰孤舟虛白日雙鬢落青絲並足傳也言事被訊折指貫索有明星湘纍獨繫囹云何捐臂指率爾忤雷霆瘦骨憑誰惜貞心只自銘浮雲欣不蔽果日竟當庭當陽得李六峯侍御書嵗久憶湘魚欣逢只尺書封緘急自啓顔色儼同居岐路遙憐汝行藏獨愧余衡陽西峽近猶恨鴈來疏雲樹牽離思經秋似更催洪都三載别楚館一書來南嶽鳴驄馬西陵徙諫臺何時尊酒夜明月對君開泊宜城楚陌開新署東風媚逺遊山根懸細路石髮洗清流鶯出寒雲谷龍吟古洞湫飄零千里客無計伴浮鷗坐雨瀟瀟囱外雨寂寂客中秋芹渚眠鷗起花泥宿燕啾地偏誰載酒人逺獨登樓日落諸山暮能無動旅愁玉莊驛春仲一到此郊原入望遙沙浮山脈動溪曲漲痕髙車轂驅羸馬風塵暗敝袍乾坤嗟孟浪吾義更難逃途中感知物色饒三月郊原入望新馬回紅雨路舟泛白雲津事業憐知已江湖寄竄身二毛漸稀落遙憶故園春漢川劉家驛客路懸輕騎江雲暗國城直須憐去住未識理隂晴鶯語逢春滑花香入夜清行蹤慚物色無計結長纓訪湖中吕上人曉日問庚桑行行溪路長天髙浮野色山靜落松涼坐草分鷗席登崖取蜜房有僧疑惠逺徒倚咏滄浪行舟次朱雲岩迢迢山嶂月寂寂雁汀秋百丈垂三老千峯送一舟魚龍驚出沒鳬獺競沈浮不是巫山路空餘楚客愁楝塘詩為陳君江南春信花爭發雙楝塘回開獨遲流水小村飛白鷺細香醴酒語黃鸝東陵遺事瓜三畝彭澤歸心菊一籬寄傲君家更竒絶狎鷗深處緑隂堤江夏驛望江樓前西風顛寒雲江上窺無邊扁舟擬渡不得渡急雪報乾猶未乾江梅紅見三春信野嶠青開一處天莫嘆長途行腳險山深隨地有林泉塞北感懷秋風迢遞晉陽田遙望關河一鴈前西域未通元有地北門深鎖足扶天江梅夜落聞霜角塞草春稀感暮煙莫訝鐵衣寒到骨千金須記買龍泉先侍御六峯先生諱循義字時行鄴嗣高祖也以所居草堂面六峯學者因稱六峯先生年十四為名諸生聞里中大參劉君家有藏書多未行世者乃手刺造門欲借其書劉君視先生風器非常因詭曰吾家書不傳少年但能造觀當不惜先生如言每晨往裹糒及暮而歸劉君因款先生午餐數月遂謝去劉君曰失禮少年奚遽輟讀耶先生謝曰已誦之矣劉君驚為叩諸書大義盡答如響因大相嘆服嘉靖二年中進士對策已定第一當事忌其言切直置三甲出為池州推官郡中有王氏豪為讐所告前司理喜擊大姓遂盡按王氏死數人所繫尚十餘人罪俱重其後郡太守司理以前吏能鋤豪且恐冒受贓遂不覆案然其罪固有疑先生知其寃狀乃喟然曰為吏自避嫌此其宿行不信耳且治獄惟論罪重輕非謂陶朱公子日可殺也即召兩家集庭下好謂曰王氏固非無罪然其家破有死者罪巳足償今理官為兩家釋其怨各抆拭自新如何時告家訟久亦悔盡感泣先生即手書札子數千言立決遣十餘人傳書論報郡中歌之曰李公來晚使寃不遣李公旦來圜扉夜開司李三年凡攝旁郡二攝旁大縣三皆有績召入為御史首上議郊社禮疏奉命督倉陳便宜十餘事俱定為法又奏濬通惠河省挽費嵗以萬計上以故知先生先生素有威重在臺諸權貴盡側目人呼所館曰李御史胡同嘗以事繩中貴人益恨之思得陷先生會出按江右乃潛遣人乘夜焚先生船失印及精微批文具疏請罪上既知先生名即命更鐫御史印趣巡方竟無罪先生念上恩益厲氣所過百城震竦豫有豪曰趙公子本尚書家兒劫人妻某御史女為姦創其夫亡匿父宅俱不可得先生至並遣人破户出之治以法行部至高安其鄉吏部郎况氏宅近學宫日稍侵宫旁田耎地為其家園先生至展廟諸生數百人具牒訟之先生行視立判諸生詞尾千言即毁况氏垣反其侵地况氏終身不得與薦紳齒前後斫論薦豫章人才如熊浹歐陽鐸鄒守益詹泮諸公俱後為名臣天下所重時夏公言首當軸新治第欲茯第旁十餘家益大其宅乃私書屬任其事先生不可由是與夏公有郤時嚴相嵩方齮齕夏公聞之喜即遣人口約使論夏公啓邊釁罪當從中下之先生曰不幸見忤當軸然其復封疆議正某不敢毁大臣以媚大臣使者還報嵩意慙即出公守衡州奏治復最會以病告歸卒於家得年五十六先生無他嗜好獨喜積書遇典籍善本雖家有此編重副必得聞人工詩善書法逺購極千里在長安時日命諸小史曰若齎素一幅分乞某公某公詩索其自書若往上書即長跪面請使退則借手矣小史素畏公如約長安諸君戲相語曰行行且止避蘭臺小史畏面索書也所著鄮溪集行世當世宗朝夏公持國秉最幸已而嚴嵩進一時廷臣不左袒夏則右袒嚴耳或曰夏公固賢者嗟夫身為國諫臣持正議難惑以非即賢相國且不附况肯比大姦耶是可為人臣法矣過釣臺有懷嚴先生懷古平生説釣臺片帆過此暫徘徊山青七里公猶在雲白千年我復來友道直須輕萬乘客星應不讓三台可憐文叔英雄網觸手先遺天下才書陳氏孝感卷夜來新得銅官志殘蠟收光對雪看三子有心廬墓哭六年無語問家安野塘龜聽長驚蟄獨樹花開不避寒起望晴江天未曙欲馳封事向朝端奉挽張敬亭先生白髮中丞謝病歸法星黯已向南微精靈復作山河氣遺事猶爭星日輝憲寺不傳開府節蒼宫長護敬亭扉我來再拜先生墓肅肅寒風自拂衣送丁某之官粵幕曉日都門送逺行秋風滿眼喚愁生東藩雄衛應無敵後府參軍舊有聲歸鳥沙頭衝雨滑放舟江上受風輕羅浮荔子紅千樹一顆分甘萬里情同鄭沙村使君過阿育王寺鄮峯幽處青蓮剎寶樹珠林護紫霞刺史從容詢土俗老僧顛倒著袈裟山龍繞鉢歸深井野鹿聞經卧落花尚有前朝碑版在摩挲只愛宋諸家阿育王寺次髙瓦屋使君作逍遙幸得及秋晴靄靄遙瞻五舍精雲卧澗聲蕭閣冷月明山影客衣清佛珠炯炯諸天集梵鼓殷殷下界迎我復來朝塵市去誰能此地不忘情宿張鍊師卧雲居為識荆州過括蒼更從世外宿雲房疏簾捲雨諸天近髙樹生風六月涼為喜新蟬招客逺獨憐老鶴倚人長羽衣盡有翛然致坐論霞篇到夕陽題森森亭先人遺墓在城東二里至大父櫟軒先生附葬四世古柏鬱然墓傍丙舍題曰森森亭其柱聨曰匝地虬龍盤墓道百年豺獺在人心為續成一詩草亭郭外鬱森森華表遙瞻門世深匝地虬龍盤墓道百年豺獺在人心階前自映蒼苔色葉底頻傳好鳥音却憶沛中提劍日太平祖臘到于今墓為吳元年造歸田後作六峯盡日對開扉仍掃先生舊石磯仕路十年嫌馬瘦歸田百畝喜牛肥常來鷗鷺非爭席自種芙蓉可製衣稍待秋登新榖好草堂從此有光輝自題耕讀堂吾家世授有遺經五畝東田束帶耕盤谷新秋香稻熟墨莊深夜短檠明門回緑水懷先澤坐仰髙山得自名祖訓須知栽苦木人生勤業豈無成自注曰先君手植楝于門曰此苦木也吾以示子孫薛馬湖治號曲泉嘉靖辛卯舉于鄉歷官馬湖府同知公生平博古尤留心于經學所著五經發揮七十卷雜著八卷曲泉集十二卷在南中與揚升菴先生相倡和記所歷山川土物有杜陵風槩余僅從薛氏家乘録此一卷詩其餘著述苦索不可得洵足嘆也登鎮南關昭德臺頒交趾敕印山設重重險關門閣道開皇恩隨地到使節自天來逺眺窮蠻域高登擬鳯臺至今銅柱下猶有伏波才龍州江見瘴圗經隨處問往往見清川不入風波路安知瘴癘天有雲山作雨無火夜生煙村酒能袪毒徐斟萬壑前夜抵况村登舟火滿黃昏路山間不計程人從絶徼至舟趁順流行客日從今短歸心自此輕萬峯雲外逈何處是梧城曉發北流觀獨秀峯清曉天邊色竒峯一點寒獨尋西粵秀乍向北流看高使嵐常避青疑露不乾莫教呼片石霄漢儘容干曉行之馮祥髙旌拂秋露遙出嶺雲西不辨山中樹來聽雨後溪峯端知地迥木末見天低毒瘴蠻方路行行轉自迷答楊用修太史幽棲官閣靜鐘鼓動江濱風雨初長夜乾坤未老身思君千念起作客二毛新賦草煩常寄才華擬洛神過玀􅉰村抱病入層巒王臣敢避難毒風吹鬢白危路見心丹渴趂蠻溪飲飢從猓寨餐來朝仍裹藥天際去身單深入普歹覓山來秋氣入山清肩輿鳥道行去程難計里過地不知名雲到衣裳濕煙銷竹樹輕夕陽青似染復見萬峯迎蕉園對月寄用修萬里懷歸客三年薄宦情瘴雲秋樹白煙月夜溪清愁益羈人瘦嘶聽倦鳥驚寒暄八行字先達錦官城謝家坪厰中除夕時苦大水難徙役夫多死者車蓋駐村墟臣心鹿豕知一年終此夕萬里對諸夷雨雪人銷後杯盤吏散時愁如燈下影行處不曽離王令至得張仲玉光祿見寄詩懷之輕舉王喬兩片鳬碧雲此日下蒼梧故人不見藍田玉新句還傳滄海珠露重草痕秋點點風髙樹杪暑蘇蘇安知于役關南客萬里懷君踏緑蕪過馮祥最髙山思蒼梧秋風萬里動南荒夢裏蒼梧若故鄉深入髙崖當虎穴下看徑路繞羊腸樹枝半熟無名果花氣徐來有異香獨喜此身嘗險熟不愁毒霧灑衣裳紀行漠漠天南烽燧清三千幕府教精兵猿啼忽下新秋淚虎嘯頻聞白日聲深樹夾山通使路重嵐入户濕行旌浮生蹤迹浮名裏滿目風塵損宦情曉坐太平寺絶頂山房答楊用修太史危岑八月曉來天山日髙升尚黯然鳥識樹頭安似夜嵐過簷底重于煙頻思舊契人形夢忽得新詩意在篇薄宦苦為王事役不知秋色到君邊自藺州寨入嚮堡伐棘鉏茅徑始開客衣輕露灑珠來雲中細入仙人境天際遙看白帝臺樹果垂垂秋色老山猿攘攘暮聲哀行窮浮世難行路故國滄洲未得回江行即事八韻銅標猶未覩水道指關南有地皆垂蔓無林不是柟秋波千里縠曉氣萬重嵐去處將風採行囊盡藥擔猿啼山下棹蛇挂樹邊菴許國寧辭苦思親欲進甘客悰迷徼路歸夢趂江潭一卷離騷晚掀簾頌再三月夜過漁埠口霜風吹鬢急王程野水寒宵度月明不及蘆中老漁父扁舟長笛傍江城止山寨地無五榖與桑麻欲覓人煙未有家夜半月明山鬼嘯風吹竹戶滅燈花山行聞鳥鳴哥哥仔細秋山曉上露華清有鳥雙雙深樹鳴不是為人愁路險肯教仔細向髙行羿村日午行旌過羿村羿蠻稽首引兒孫不知何處多喬木指點雲頭是劍門雨後山行雨後山程困僕夫即看晚日送啼烏隔溪欲就人家宿子然芻引去途甬上耆舊詩卷十一

body:
  text: 甬上耆舊詩卷二十八監察御史胡文學編明威將軍萬公武字世忠先定逺人大父武略將軍斌從髙皇帝起兵守滁州充義兵萬户後從大將軍征沙漠大戰于阿魯完河死之父鍾襲以戰功授寧波衛指揮僉事因家于鄞靖難兵起戰死于花園公少慷愾尚氣節力能超距喜讀書時與郡中先輩相辨問知聖賢之學嘗夜坐見月出當心皎然如白日欣然曰人心不當如是耶因名其坐處曰秋月軒既襲官以亷直名自念大父父俱身死國事飄魂萬里因作望雲亭愾然北嚮公餘每與客論古今成敗見前世亂臣姦賊輒厲齒髮上立如竿客或曰論人易身蹈難公但直視之不答永樂中黃巖大盜金躔起閫檄公往賊方據險狐鼠伏公曰母急攻徒寡人妻子為也因勒兵密以計縳躔致幕中黃巖帖然士大夫俱賦詩紀其功竟以事忤監司謫戍交趾公慷愾裹一劍出門道中回書婦恭人陳使善養曺太恭人奉家訓肅清閨閣不放尼媪入門又曰家中無錢可賣小馬作支費俟大馬下駒亦隨賣用雖有數家親戚即死不可改志求人致辱上祖惟有文書併手卷為先公所遺手澤不可被人將去文弟須送至鄭先生處讀書不可悮渠吾今一路作詩題畫相敬紛紛豈不知文章直錢末附口號一首萬氏藏其書以為世寶會征交趾公從黔國公進兵次于檀舍江時公巳病尚披甲誦唐人詩曰裹瘡猶出戰遂陷陳而死弟文倜儻善騎射少讀孫吳書性至孝後襲兄爵其為將亷明而有威嘗率舟師禦倭海上大戰于蓮花洋海門諸處所斬賊無算獲其巨艦復移守桃渚適有桂門龍夜戲潮浮海面將軍乘月遙望兩炬光爍爍以為賊火即引強弩射之應弦落其一炬不知為龍目也龍負痛翻海水數十里將軍亦船沒時乘潮上下為神人稱曰射龍將軍蓋萬氏自萬户公至將軍三世四人相繼以身報國或死沙場或死絶徼外或死巨海浪中俱不得裹片骨歸葬自勳臣之門所未有也子孫為招魂葬于西山人稱曰萬氏四忠冠劍墓余嘗觀公姪宣威將軍全藏公二家書裝潢為卷先輩黃南山先生題其後曰公雖在患難中而忠篤之道始終不渝可謂毅然大丈夫矣戴南江先生亦曰讀二書知萬氏賢子孫必有大其後者是以餘風所被三百年中名臣髙賢蔚起為吾鄉勳門第一是豈偶然哉交址道中口占昔騎五花馬今跨一黃牛嶺上猿聲呌焉能止淚流指揮魏公安字允恭少讀書長于吟咏襲寧波衛指揮僉事以其詩法傳子稱是為雲松先生吾鄉將門萬氏有悔菴先生魏氏有雲松先生儒將之後篤生名賢亦一時之盛也竹枝詞瞿塘峽口放輕舟兩岸猿啼亂竹秋儂意祗如山下石千年不逐水俱流途中逢故人入蜀巴陵千里外處處足離愁棧道猿聲晚關山槲葉秋卜雞臨水鎮沽酒向溪樓我亦驅馳客憐君更逺遊貢縣口號示朱冕容窮谷除殘孽孤軍令愈嚴瘴煙防有藥蠻井苦無鹽險處兹多歷生還未可占侍僮今日問又白幾莖髯咏健跳郭千戶家紅梅誰分異種在侯家半畝庭中照落霞海國清時人醉後酒香吹老嵗寒花四皓圖芝草蒼蒼照石泉深山晦迹似神仙不知硎谷寒瓜熟幾局碁終入漢年明威將軍萬公禧字天祥別號蘭窗少孤為祖姑祖心所養長襲職為將嚴而有法開府知其才使出守定海關任以重地時方大用之會卒公嘗有家訓十則里中傳為名言又于便面題詩戒子意謂世事不可以一時得失遂生休戚誠有道之言也戒子詩不得魚鮮收網歸何須惆悵立斜暉來朝網得魚成簍換酒無勞典舊衣遊擊將軍張公應麟字伯厚本慈溪人徙家于鄞都御史楷之子也以遊擊將軍從石亨出戰大同有功世襲鎮撫公家居教子昺有法昺中進士出知鉛山縣公貽詩戒昺昺次父韻以答里中傳之昺即所謂神明御史張公也寄子昺阿昺為官出宰鉛蕭然信息喜真傳官清亦飲齋中水俸薄休分堂上錢苦志但能全汝節怡情自解樂吾天先公德業三朝重幸有遺安百畝田都督萬鹿園公表詩見十二名家第十一卷鎮國將軍萬公達甫字仲章鹿園公表之子也少有異稟與兄謙甫讀書溪橋之上每盡一卷輒投諸溪流及覆誦不失一字稍長補諸生鹿園公使從羅念菴王龍溪錢緒山諸先生遊復受業于唐荆川先生之門傳其詩學後襲官督漕歷遷廣東參將時濲陽趙公志皋以忤當軸自翰林出為外臺講道于浮丘寺同官俱莫敢往公獨角巾造講席辨難交甚歡會有蛋賊剽海上當事兾張其勢報首功公毅然曰若輩鼠竊遣一校縛致麾下耳何煩出兵當事意拂然公遂解組歸里後海上出師所殺鹵多無辜人言藉藉始共歎服公公既歸湖上讀書西溪墓舍一時名士如焦公竑馮公夢禎屠公隆共推公為芙蓉池社長常相從言理詩律往來然公雖間居未嘗一日忘國每接邸信視令下便否為憂喜動于顔色自礦稅議起中貴人呌囂四出公語子邦孚曰天下從此多事矣顧中外久弛兵汝曺身為將詰戎待變是其職也未幾而賊起卒年七十有三公性至孝居父母喪斷酒肉廬墓三年每諱日設祭思先人所嗜輒泣下鹿園公有遺妾事之如母事庶兄謙甫如父待親族俱有恩非祭祀燕賓客不傷一物命即僮僕未嘗詈為奴叱吒不及犬馬生平于文史外他無所嗜好口不言財即衡量會計俱所不解以是歷官二十年薄田僅足給饘粥世所稱仁人長者唯公足當之及在病中夢啖柏葉松果五內俱香次日以詩寄諸故人復作答武林黃翼菴書其詞纍牘至三日招禪人數輩誦梵經徹夜及東方漸白公遂逝所著曰皆非集代籠鳥語我本無羈物勞君愛念頻飛鳴聊自適飲啄每相親緑樹無知己朱闌是故人何時成羽翰花塢望來輪過鎮鼇山小菴偶從幽巷裏松下得荆扉種藥秋初熟緣籬豈正肥不知茅屋外更有海雲飛林葉風聲細歸來雨灑衣贈玄默人生短夢裏只合老禪關汲水同雲出攜蔬共鹿還留燈夜讀易推戶曉看山盡日無人到間吟竹嶼間過海上普寺丹閣藏山翠深林獨步餘鳥喧侵佛座蜃吐捧禪居蓑脫朝耕罷魚敲夜梵初山扉誰為守麋鹿卧前除遊萬山觀壁間有純陽親筆像及遺藥尚存肅然瞻企因成一詩遨遊不自適亦復見仙容半壁雲生袖千峰月照松留丹猶濟世厭俗尚遺蹤夜半聞長嘯還疑劍化龍訪公羣弟山中書舍小窗書數帙禁足似禪關讀罷聽啼鳥文成看逺山桂隂侵几碧流水到門間余亦尋幽者徘回不欲還過仙芝山房溪上成幽隱踰山景更清超然絶塵想靜裡只空明月落鐘聲逺蛩喧夜氣生明晨攜一衲窈窕又山行遊江心寺古剎開竒勝羣峰四望遙帆檣浮浩蕩塵閣起岧嶤清磬龍聽法空階月送潮衰年還浪迹猶得一停橈入山采槲葉作笠采槲兼攜藥名山一笠來穿雲還倚杖步雪可尋梅仰聽懸崖葉徐隨緑徑苔羲農今復見吟罷紫煙開與伯兄憩仙芝山房山居環半畝幽賞得吾真藥澗飛松影梅花隔世塵短簷飛乳燕深樹度行人共有丹丘約栖栖笑此身遊它山古殿江村上長林帶晚暉艇隨巖樹出鳬趂浦雲歸苔淨春波緑山深野市稀更看農事好隴穗拂羅衣金陵送錢養微還浙遊子悲衰暮離懷嵗欲更月明車迹穩霜重褐衣輕魚雁他鄉淚雲山故國情歸人寒樹裏樹外幾人行過山中僧舍竹裏桃花盛開重門竹院環深緑一樹繁紅向日舒芳意自怡山蝶性春光亦到野人居間階影落翻經處小徑香飄散社餘不問秦源堪住客且將蹤迹混樵漁馬都司斯臧字駿伯先世以開國勳襲寧波指揮駿伯少有才善詩古文詞工書法為諸生數試于鄉不第始襲世職督漕遷揚州都司以忤時宰罷歸駿伯嘗作南北兩都賦屠長卿先生序之又作中都越都闔廬城賦及他賦四卷七起七放二卷演連珠數十首自撰無名公傳髙自誇許人以其豪可方湯公讓要亦勳門中一異才也小言劈糖為筏恣逍遙摘髮牽車越垤嶢寸竹檀欒居七子尺臺縹眇鎖雙喬雲橫蟻岫雨將暗風過蹄涔浪欲驕穴處青天剛半丈夜行燈火有螢翹陳都司民俊字公籲本名諸生恃才豪放為忌者所中學使至郡録其文在髙等而更以行黜遂棄家入長安中武進士官陜西都司復以忤事罷歸所著有木阜寶尊二集吾鄉有湖在城中曰日月湖湖上七橋栁汀花嶼諸大家樓榭俱在其中公籲嘗作湖上竹枝詞為里中所傳今亂後風景遂不可復見每讀其詩輒低徊久之山行晚宿廢剎層巒已度未黃昏信馬垂鞭歷幾村十里松聲沈野寺萬峰寒色薄山門斷碑文字苔全蝕破廡丹青畫半存鐘鼓香鐙俱不事可憐間殺白頭髠憩蓮花菴訪周涵海僻徑荒苔石磴賒北樓遙對北忩斜池蓮霜早無全葉籬菊秋殘有剩花鐘起隔林鄰佛宇舟橫斷岸識漁家午齋未便來香積間坐湖干數落霞日月湖竹枝詞郭裏天開日月湖樓臺島嶼儼仙都近聞點綴堪圗畫一曲能如舊鑑無湖在城中以有賀公祠亦題曰鑑湖一曲尚書橋畔祕書祠中有玄宗御製詩嵗嵗仲秋明月夜湖亭羣集唱新詞賀祠在陸康僖公橋畔踏青醵解杖頭錢細草新堤可醉眠嶴底漁家間晒網不知何處有湖鮮栁江煙嶼一帶水雲亭子四宜樓樓外煙波亭外舟官府宴賓遊不得輕橈移泛蓼花洲驛後四宜樓下瞰湖光郡縣宴客處春山銜日半城隈寒食家家掃墓回遊屐但聞簫鼓近合羣爭向水門來湖堤盡處為長春水門拗花名處自何年陸渾山莊勝輞川隔岸垂楊堪坐釣水忩長繫孝亷船陸孝亷別業面桃花堤湖邉負郭水田多春雨農家一笠蓑夜靜試慿髙處聽最銷魂是唱山歌湖南大坂田湖中碧沚水粼粼司馬當年此肅賓近日園林蕭瑟甚雙扉深闔謝遊人司馬范東明先生園名園遙接日湖頭飛蓋曽隨公子遊會説內祠先相國不知太傅本風流余文敏公祠揚雄泛賞栁依亭岸圯亭荒栁不青遺墨至今人競寶翛園無復草玄經楊伯翼先生園都督萬公邦孚詩見林泉雅集第二十六卷劉都司祖衡字漢平官福建都司雨中懷友旅泊寒汀暗朝來雨氣消風回潮逐舫山靜夜聞刁白墮容頻酌王孫不可招蛟關應咫尺莫漫歎蓬飄龍山寺伏龍潭龍山龍隱伏龍潭龍德濳修大壑南海氣飛時山障白蜃煙消處水光藍漁人撒網然松火賈客收帆近草菴我亦倦遊聊寄迹夜來鐘鼓禮瞿曇神機營都督施公翰字季鷹家世傳經公少倜儻有大志家貧喜讀書博通文史亦能詩兼善行書勢如春山遙翠妙冠一時嘗遊長安為寧逺伯李成梁客更習騎射中武進士授萬安守備時鄒公元標以直言被放講學里中公至執贄行弟子禮士論俱推之嘗作見參樓江上每治兵暇輒引諸名士觴咏其間遷四川都司身葺錦官故城擢雲南參將善控御苗蠻境內肅然黔國沐公廳事前有滇茶一株左右橫覆二廳值花盛開沐公置酒大召文武將吏燕集賦詩復請公為題一額公即席大書一片紅雲四字書法斐亹沐公命酒為夀四座盡傾擢領神機營都督僉事引疾歸公家居垂二十年于宅後更起竹中精舍栖息其中山人梵客時相過從每上客至郡必先造其園亭公作倉卒主人布席奏樂童僕無聲其風流若此卒年八十一子仲茂死于國事所著遺集行于世贈孝子胡體師亦鮮終身慕君能築夜臺青烏含土集白鶴束芻來淚及重泉徹名推百行該哀哀憔悴色垂老向誰開嚴就卿廣文過飲江樓兼柬周筠沖水郭冬殘木巳零孝亷官舫自離亭一尊酒散猶銜照百里人歸總戴星橘柚霜懸荒圃赤鸕鷀風度晚溪腥能詩此日慙知巳漠漠江雲暗栁汀酬朱躍如彥成二王孫別後柴門夢屢驚蹉跎戎馬又餐英書來迢遞緘秋色劍憶慿陵入夜鳴浦口暮雲愁未絶樓頭新月喜重生只慙宦拙官難調未卜梁園賦雪行都司李公遂字嗣良武進士官漕運都司苦寒和李七木韻悲風兼日夜落木戰繁聲午爨看無色宵籌咽不鳴氷條依􅋼注炭結趂爐生猶有寒機淚凄凄憶踐更題滿扶翼芳園和葉六桐明府韻回合林塘仄徑迤名園隨地足幽思城隅掩映疑無路水曲周遭別有籬轉轉庭臺都是畫疏疏花木盡成詩披帷雅見人為嶽明月清尊對玉蕤甬上耆舊詩卷二十八

枯藝香翠雲暗結方花箱手將白玉書細字珊瑚碧樹枝交相古燕上界仙人府翠駁銀蹄踏煙霧殿中曽見雉飛來插花笑對仙人語海風栗栗句章邑老蛟飛舞神鼉立我侯擊劍生銅聲三尺妖狐望山泣古堤栁花噴香雪雀啄花行看人别侯今去去不可留青鸞逺破春雲熱右效李長吉鄮山袁先生士元字彥章德祐忠臣鏞之孫也性至孝父澤民嘗患背疽先生吮之立愈少嗜學講誦至廢寢食既長益沉博以御史薦授本縣學教諭調鄮山書院長危素薦為翰林國史院檢閲官力引年不赴晚年築城西别墅種菊數百本自號菊村學者所著書林外集七卷和大章雪裏送詩山翁卧雪寒且飢敲門有客來送詩詩中一字煮不得妻兒爭怒吾獨竒間粘素壁時一見恍若此老來茅茨洛陽賢令久難覯剡溪故人多别離寒窗得此真自慰絶勝贈我珠與璣呼童索筆追和欲走謝天隂地逺出入愁無驢題慈隱菴髙僧以慈隱逺在石橋西地接支郎寺門臨孝子溪松隂斜落徑竹影亂侵畦不見中岩老荒村獨杖藜和松石齋寒食客中王孫歸未得芳草接平蕪邊報不時有鄉書絶迹無馬憐橋外洗猿憶洞中呼客底又寒食故園天一隅編修馬易之本郭囉洛氏譯言馬也名乃賢以字行世居唐回鶻部後為南陽人至易之兄塔海仲良始登進士易之少篤學志尚髙潔不屑作制舉文字尤長于詩力能追步古人嘗持其行卷謁貢御史曰此心泊然無他好所好而得之者盡在是矣其標格若此既從兄宦遊江浙間吾鄉鄭以道先生師法甚嚴乃齎糧從遊門下得傳其學遂卜居於鄞巳復與會稽韓與玉金華王子充同至京師與玉能書子充善古文易之以詩名時稱為江南三絶而易之詩名尤重每作一篇即傳誦士大夫間久之歸鄞聘為東湖書院山長以薦授翰林編修出參僧格實哩軍卒于官余嘗讀金臺集輒歎易之産自金臺數萬里外身獨以詩名既雅慕四明山水家于吾鄉其詩遂日工誠崛生異人也既而讀鄭以道先生集有贈門人馬易之二序黃溍宇文公諒書其後謂四明鄭先生所贈弟子序以規不以譽師道足重而易之持其師説遍示諸賢士大夫意在不負所教始知易之詩法有深得于鄭先生者也豈僅四明山川之助哉劉蕡祠入郭日巳暝慘淡楓葉赤鞠躬荒祠下低徊想遺直劉君素忠憤伏闕論邦國痛陳腹心禍竟罹考功斥餘子盡騫騰鬱鬱負慙色鄉人仰髙誼千載崇廟食悲歌風蕭蕭感慨情惻惻出門無行人涼月照東壁居庸關疊嶂緣青冥峭絶兩崖束盤盤龍虎踞岑巘互回伏重關設天險王氣輿坤軸皇靈廣覆被四海同軌躅至今豪俠人危眺屢驚縮﨑嶇棧閣峻縈紆岡澗曲環村列虛市鑿翠構廬屋溪舂激岩溜山田雜稌菽絶頂得幽勝人煙稍聫屬浮圖壓廣路臺殿出層麓白雲隱踈鐘落日帶喬木豈須歎蜀道政可夸函谷居人逺念我叩馬苦留宿恐辜殷勤情解鞍看山瀑李老谷谷中多杜鵑髙秋逺行邁入谷雲氣暝稍稍微雨來漸怯衣裳冷縈紆青崦窄杳窱煙林迥峯回稍開豁夕陽散微影霜葉落清澗寒花媚秋嶺途窮見土屋人煙雜虛井平生愛山癖愒此愜幽靜月落聞子規懷歸心耿耿簷子窪朝發牛羣頭夕憩簷子窪髙秋得清曠野蔓多幽花黃雲翳日腳草色浮天涯山荒樹寂寞寒陂落昏雅頗喜盜賊平塞田盡禾麻至今將軍壘日落聞清笳我生久羇旅﨑嶇涉風沙天寒道路逺曛黑投山家羽林行羽林將軍年十五盤螭玉帶縣金虎黃鷹白犬朝出遊翠管銀筝夜歌舞珠衣繡帽花滿身鳴騶斧鉞驚路人東園擊毬誇意氣西街走馬揚飛塵湖南昨夜羽書急詔趣將軍逺迎敵寶刀繡澀金甲寒馬上倣徨苦無力美人牽衣哭向天將軍執别淚如泉安得天河洗兵甲坐令浣海無塵煙君不見關西老將多戰謀數竒白髮不封侯據鞍矍鑠尚可用誰憐射虎南山頭北邙山歌白樂天賜第履道坊既葬北邙敕命遊人至墳所者必酹酒至今墓前隙地泥潦北邙山髙雲嵯峩山前日日聞挽歌千金買穴望卿相不道洛陽人葬多長安歸來錦衣客昨日城南起新宅雕欄華礎滿前楹盡是當年墓邊石墓邊野老鬢如絲自言曽見築墳時轉頭石馬卧荆棘白楊蕭颯秋風悲白日西流水東逝眼見君家葬三世舊時隧道盡為田新墳苦作千年計寄語洛陽諸少年對酒莫惜黃金錢縱有穹碑勒勛業文章誇靡誰能傳君不見履道坊中白太傅留客髙堂醉歌舞至今三月看花人載酒去澆墳上土劉舍人桃花馬歌青絲駿馬桃花色翠鞍玉轡黃金勒奚奴牽出不敢騎道上行人爭愛惜往時曽遇李將軍汗流赤血氣如雲朝刷黃河暮南粵沙場百戰成竒勛歸來無心伏槽櫪頓轡長鳴思奮力東家白面繡衣郎千金買去遊南陌昨朝校獵向南隅萬人爭説天下無夜歸不怕灞陵尉玉鞭醉打蒼頭奴畫燭銀屏歡徹曙一朝金盡賔朋去可憐驕馬屬誰家斷韁猶繫階前樹君不見西家款段三十年青芻滿櫪菽滿田老翁不識城下路騎看射獵南山邉贈空谷山人徐君歸武當五更鐘鳴天未曙六街馬蹄聲如雨露華滿屨霜滿衣束帶爭趨丞相府千鍾之祿萬户侯幾人空負平生愁鏡中緑髮漸垂素窗間白日如奔流誰念幽人在空谷癭木為冠草為服小甕春風紫术香長鑱落日黃精熟行歌偶到黃金臺坐看世事如浮埃長衢甲第換新主舊時燕子愁歸來忽憶紫霄峯下路倒跨青鸞獨歸去松華釀酒一千石結廬招我南山住田家留客圖為四明劉師向先生賦客來田家當六月主人相留樹邊歇呼兒牽馬飲清泉厨裏新漿解君熱郎君出城幾日前城中米價今幾錢昨夜南村三尺雨不知還到城壕邊勿厭儂家茅屋小棘門新編土墻繞來朝蚤飯莫匆匆雞鳴送君出官道送王公子歸揚州玉雪王公子歸鞍向竹西水清淮白上天濶海青低瓊樹春前發烏絲醉後題何須問勛業名與爾翁齊送楊復吉之遼陽學正八月松亭萬木空著鞭又向黑河東穹廬頓宿供羊胛部落晨炊爨馬通行看築臺招郭隗豈教執戟老揚雄門生衣袂多狐貉來聽談經絳帳中次段吉甫助教春日懷江南韻華底開尊待月圓羅衫半酒痕鮮一年湖上春如夢二月江南水似天修禊每懷王逸少聽歌却憶李龜年卜鄰擬住吳山下楊栁橋邊艤畫船羅稚川山水圖十韻為甬東應可立題平生丘壑趣偶向畫中傳雨氣千峯外江流落日邊䕷蕪青滿渚芳樹緑參天渺渺溪雲淨娟娟石溜縣崖顛何處閣谷口小家煙漁唱來秋浦僧鐘落夜船瞥驚飛鳥過疑有蟄龍眠竹徑能留客桃源竟得仙丹青跨絶代賦咏藉名賢千古滄洲意含情憶稚川次韻趙祭酒城東宴集碧草纎纎藉翠茵酴醿釀熟十分春移尊更近池邊樹漉酒先生待挂巾十騎聫鑣入郭遲從教斜日過棠梨候門稚子牽衣笑今日先生有好詩國子監散學候日影到堂後梨樹薛提舉明道失其字官至提舉有瑞堂藁七卷浮淮千里風催棹三春客度淮却憐鄉國異祗與僕夫偕芻豈防河貴魚應入饌佳不堪舒病目杼軸轉傷懷挂席挂席春風任我之鬢毛雖白氣猶竒欲將碧落開成路遂取黃河瀉作辭槎到漢津須幾日桴乘滄海竟何時鷺身本有髙飛具也立汀洲有所思竹隱風日蕭然掩蓽門竹深幾輩長兒孫間中拾籜冠堪製寬處行根筍易繁解帶水邊棲緑影科頭林下倒清尊為園自喜初衣遂遮斷塵情不用論徐處士本原失其字本奉化人後徙家於鄞隱居不仕與陳子翬髙壘鄭奕夫諸君相倡和所著有思剡集隱學寺訪古叩襌關招提盡日間鳥啼青嶂裏僧語翠微間今日棲真地前朝隱學山石壇芳草碧墓道落花殷德洽民心服身罹國步艱代周知遜位命楚反羞顔鳳去彭城路龍潛越水灣惟留翁仲在不見令威還碑蘚應難認煙蘿巳倦攀隴雲同杳杳澗水自潺潺暝合千峯紫香殘一徑斑夕陽歸興緩清磬隔塵寰文質字學古為詩學長吉體客于婁江與楊鐵崖顧仲英諸賢相倡和和韻奉寄顧仲瑛二首我愛虎頭公子賢髙懷歷歷瀉長川酒尊花底分秋露茶竈竹間生白煙日落漁莊聽雨坐風微草閣看雲眠西涼進士曽留别應説相逢十日前玉山之堂風日好髙居共喜值清時紫簫曲度頻行酒綵扇分題即賦詩溪樹積隂疑雨過水花留影若雲移白頭有約漁磯上我亦歸來理釣絲甬上耆舊詩卷三

body:
  text: 甬上耆舊詩卷二十九監察御史胡文學編胡處士一桂字百藥萬厯中詩人隱居不仕余初見甬東詩括載百藥詩九首風華髙綺自然可愛為録存八首意中欿然思得盡百藥詩徧覓久之復從友人聞惢泉所得其四言詩一卷竒文奥義識學兼造當是焦延夀一流為後來詞人所絶無者讀之驚賞彌日其思得盡百藥詩文益甚旣而知百藥死久矣有子曰傳字麟翼亦能詩周貞靖先生束茅山中麟翼常往來其間佛燈魚鼔時與共之麟翼來則負一槖中藏百藥遺草及所輯三百年典章四方文獻凡二十餘帙麟翼時與人誦其父詩及它所著作欲去即負其槖去山中人無為録存副本者今麟翼亦死矣求其槖中書絶不可得余每屬人入山覓百藥遺草至跪請之近乃知麟翼有女嫁為農家婦在山中往問其家云前四五年尚有殘藁數本在織筐中今澌裂盡矣惟鈔得麟翼詩數首嗟夫百藥竟巳矣夫以百藥之才格義理通古今使盡出其一生所作當有可觀而奄然散佚使名氏亦并不傳能無惋惜雖然自數十年以來斯文板蕩海内著述家盈篇巨䇿固有為天呉所沈為祝融所虐為長恩所不守為鐵脛銅馬人所衊其刀血遂巳過如列缺棄如野燼飄如飛亷蒼狗無復落在人間此正不知多少今百藥猶得存此一卷詩使後世與焦贛易辭並讀人風仿彿愾想其餘斯猶百藥之幸也且余于百藥力亦盡矣四言詩殷仁殷喪辛不庸棄漢傑漢興季能展使騰蛇游霧神龍難次騏驥阨車駑馬何異游霧傑稱阨車仁被日出于夘兎屬兎宅斯惟兎宅月中聚積月出于酉雞屬雞宅斯唯雞宅日中聚積隂陽之精互藏其宅雖有玉壺必求盛擲雖有干將必求斷劃無盛之壺何貴砥阸不斷之劍何有合伯龜之刳腸非殻靈為麝之決腹非臍香異靈自去靈保其殻易香自去香固其臍至藏用則宜去賢乃智五運六氣乾坤終始于月之初五運皆起天氣先至乾知大始于月之終六氣皆出地氣後應坤作成物水波風激心欲物觸風息波止水性靜淥物化欲留心不靜浴未來覬覦巳往繫束不風而波譬猶酖毒迫而後動過而不局善治心者如水斯足鳥不甲龜于其羽足魚不趾獸于其鬛足人曷自足自足者足易道扶陽隂乃是抑卦位貴中賤彼乃極陽過于極雖剛吉匿隂得其中雖柔凶熄闇然之章非暴使著精斂乃吐光弢則露顧鹿戴玉而角斑素即魚懷珠而鱗紫聚誰云小物可以大喻睎驥而驥非以力別晞聖而聖非以迹説迹睎放伐天下心熱力睎絶景鳴鸞不節湯武焉為騕褭焉列睎驥以徳睎聖必哲心猶明鏡昧者塵宿鑄形之初焉有塵蓄聖人洗心其初也獨君子治心其初也復庶民任心其初也戮𤣥龜食蟒餼䭘時坐飛鼠斷猿亄嗇膽破狼蝨嚙鶴䭢􅀈折剉青要食虎利遴不貨在氣非形以小制大䣯酒乳潄天乳哺侑亡殷牛飲敗楚虎酧成禮將徳百拜三授賞為歡伯懲則禍首徱㣱勝賊捕賊能迄強圉勝虎捕虎不屈克巳成巳勝物成物文至周末爛汗雲列羣言之勝微言之絶師師道道争筆戰舌物極必銷秦火乃爇蝦蟹離象外堅内妎離中含隂隂中生害故其育也子綴腹外問消搖游消如陽動而氷乃消揺如舟行而水自揺消也本固動也内饒游世若是體道其昭狗伍突卒吠狺息歇一投以骨張牙噬齕利小人骨平居耦厥剖心瀝䘏錙銖唐突反目争勃狠戾危卼逺小人羣逺以利蠍前惟孔融氣維漢厯奚與建安七子並列後有駱丞扶唐一檄奚與垂拱並稱四傑誰為品目昧其優劣文章藝小倬彼大節火在井中不能燎原目在足下不可視褌國之治亂日之明昏居髙則明燭逺斯尊虎嘯風生風生籟號虎伏風息風息籟逃止樂以敔聲音不慅四絃一徳勇以氣鼓聖人正色賢以義鼓暴君意激勇義曷分神結氣即鼓者不知鼓鼓不識心手與瑟精行其側風生于無而歸于無竅受不同人聞亦殊衆竅之鳴風鳴之夫衆形之役化役之于風不能鳴衆竅畢逋化不能役衆形息吁地上陽窒客隂來脅和為雨溢地下隂宻客陽來脅散為風疾雨從天降風從地出飛鳥為陽食也果粱天陽氣嘗走獸為隂食也芻糧地隂氣將呉興九里石塘即事路出桑隂盡澄湖野望賒菱歌依岸栁舟影入蘆花烟起迷邨白雲移見日斜異鄉風景在羈客倍思家隱淪白鶴山前住居然一隱淪豆苗分別圃槲葉䕶南隣榮啟良多樂原思不厭貧牀頭春酒熟一醉月華新從固陵江氏訪碩父于來氏塾中幾不得路南風吹暑拂牆花一望葱菁麥隴斜江路有雲連別島野田無路到山家徘徊欲問前途馬得宿慙非後至鴉相見不嫌談夜半翻嫌此日咏蒹葭桃源齋居比隣喜得攜琴好笑語何愁行路難天為山人開子墨客言幽谷是王官霜飛已失千林翠寒重猶存一葉丹緑酒漸深詩漸老好風吹月墮䦨干寓里中何氏折而南縁崖水竹青翠交加平生最喜尋幽勝卻羨村居近緑波水鳥每從蔬徑落荷香偏傍竹林多小樓罨畫溪還静中夜山隂棹欲過更喜灌園人自老家家𤓰蓏翳烟蘿秋日西行至下壩作參差原隰短長隄蕭瑟蘆花野望迷大樹夕陽潮落半布帆流水客來齊風塵涉歴朱顔改家計荒涼白屋低纔一出門歸思起滿懷孤悶入新題壬戌十二月二日即事落魄徒然老鶡冠一宵鐘鼔坐來殘薄雲欲雨花谿暝新月初生子夜䦨客思紓迴波九曲新詩題徧竹千竿湖邉磐石能容我且對鳬鷖盡客懽兒寓西隣華氏先君寓華之西陸氏中限一水時復縁涯而語野水平橋外烟光亂鳥啼迴塘相對語只是隔東西胡傳附字麟翼百藥子也見前傳江行濛濛疎雨霽隔樹見人家白水侵茅屋青山隱菜花侍童撿押韻漁火試新茶入夜孤燈夢先知到若耶春江可憐色况復栁條青風定櫓聲細潮歸水氣腥忩中望東海雲裏辨南屏詩思朝霞變風塵眼一醒秋夜欹枕獨不寐秋生明月階候蟲欺久客飢鼠怨空齋故國渺鴻雁邉聲愁虎豺倦游輕薄子今夜苦為懷呉山人士瑋字濳玉號曰笨子為諸生數試有司不利遂挾其詩客都下足跡徧呉粤豫楚間笨子負才氣喜與竒人魁士交人亦翕然稱呉生過文江時鄒南臯先生方歸里門笨子上詩有曰到來天地傷多事歸去江湖尚有人一時誦之鄒先生為叙其游草曰文江詩選笨子老客温陵食荔支酣甚數日中作詩百首名曰荔品百咏余所見笨子詩此二種而巳聞其他著作甚多苦覓不得見客有過余論詩者曰先生甚喜笨子詩何句最佳余謂笨子詩如曰身老喚人看國色此語意極佳亦極可歎余近來看年少中竒文字自顧衰老不能為揚聲輒呼諸名士讀之坐上有名酒以病欲飲不得使吾友盡觴望髙崖峭壁患氣不能上促同游健者造其勝俱與笨子同此懷也笨子又曰寶刀出土懸空壁老馬隨人看種田詞義亦極慷愾余録笨子荔品詩至十首其餘竒句甚多更為標出如曰繡閣分香烏鵲腦𤣥房劈斧玉蟾蜍曰落日呼童收末利晚風岸幘把琅玕曰清過葡萄應更逺味超橄欖不須回曰眼見春花鶗鴂雨口甜秋實鷓鴣天曰白擎龍女將珠獻紅戴雞人賽幘來曰美過豹胎難等量香于雞舌没中邉曰軍持並解甘泉浸華葢重懸佛頂珠曰誇道留人多海錯還將落句劃江烟曰南面湖中看晝夜東頭巷底語行藏曰黄颶乍驚雷海笑紅毛未到電村虚曰燭龍照夜分珠綴天馬行空駕火流曰髪秃桂花開後見手香橙子剖前知曰閒情一㸃松燈照塵念三杯米汁移曰穿河貯水雲為帶壘石成山霧作巾此等不可盡舉笨子時年巳六十餘尚竒麗涌出若此聞其有品菊百咏惜未見之除夕時寓雲間守嵗為團圎曰余獨逺客酌酒至三更兩嵗分一夕庭燒榾柮紅地畫平安白雞鳴帶雨聲愁絶文章伯聞錢孝直陳情俞旨將父歸里志喜寄贈二首江上雙青眼因風到掖垣誰知返戈力方遂舞衣懽雲散江樓迥春生水國寛皇恩終可恃披腹盡琅玕地偏留朗月林響屬飛泉老去聞竒事歡來可盡年雁行看競爽魚素識沈緜星緯原無秘曽為海客傳嵗暮思家偶滯天之涯窮愁忘嵗華三年惟有淚五十反無家旅食同秋雁歸心愧暮鴉不禁千里夢夜夜到梅花懷友我輩原無事何難四逺尋布衾垂宇宙芒屩下山林出世惟多髪憂時但有心邉關烽堠急直恐廢髙吟寄子忍別思何處臨平下第辰兩湖容面熱獨樹守家貧場屋無文字衣冠即鬼神可寧念衰老嵗晏在風塵憶孫念汝兄弟好別來誰解頥應門相喚客逢食各呼伊是出牽衣問今歸擲果遲太平仍可待老少定歡隨苦雨沈沈山縣雨霢霢熟梅天對食心先飽攤書坐屢遷蟻簷皆見垤蝸壁半塗涎不出池塘蛤殷勤伴獨眠端午向來真寂歴誰復報佳辰苜蓿空留客菖蒲不醉人環山梅熟雨滿室地生鱗憶昔逢迎者于今白髪新過景福菴旅中嫌久病行藥到禪關日落常歸鳥雲閒不蔽山塵勞無念了般若即時還兀坐忘身世青天度白鷴墮牙衰徴巳中嵗齒落豈相期多智慚于馬貪心待至齯醉花吟未穩問月嘯還竒壯志何曽改從人笑老癡嵗暮雜咏穆穆嵗將晏栖栖歸未期短衣乘日補破牖任風吹防世應如病全生莫過癡百年鼎鼎在醒者欲何為為客只如此時時畏出門林聲寒鳥集山影宿雲屯世味存雞肋生涯問犢褌終朝惟静坐大雪照黄昏謾説他鄉苦他鄉也自便忘形黄閣老得意白雲篇茗汁山中雨罏香海外烟出門狎隣叟鶴嘴就衣牽憶自登髙後仙人若我招從龍雲不斷伏鵠氣難銷仙橘藏封蔕江魚賣縳腰安安好風景唱唱小歌謠下榻苕溪上芙容滿戸庭憂時天欲墮説劍日為停古誼看凌漢髙譚喜建瓴還君天禄去藜火幾時青名園時入想家釀幾回傾鳥下枝頭重花開醉眼晴憐才皆古意悦客度新聲㑹得千秋事風流起後生乘月望婁江因風命小艭斯人居北郭寄傲在南忩諾重黄金百名齊白璧雙元龍雖豪氣一見巳心降此夕獨愁予王孫亦索居春歸先嵗底臘盡稍更餘淑氣隨開鑰辛盤見雜菹來朝應鬢改壯志復何如陸侍御湖上涵虚閣落成空明無處不宜人柱史樓臺喜更新能事漫酬千載願閒情且傍十洲親山來座右時為主月到湖頭亦作賓莫惜倚䦨同嘯傲題詩王翰在南隣元旦試筆今朝隨俗寫宜春未便商歌動四隣浪説補天多煉石空傳濳地有神人漁陽守戍師真老蜀道招魂鬼又新正恐江湖髙枕處夜深雞犬亦踆踆張韶州遺端硯答詩筆花五采夢頻頻再拜髙情贈結隣南海片雲分豹尾西偏剩水割龍鱗風迴篠簜閒逾止雨過芭蕉静絶塵拂拭細書江海賦誰言一字賣堪貧初夏柬友人滿庭青草訝簷齊倚杖同誰病眼迷象渚分龍雲自合鼇溪無蟹月空低攢眉老子寧關酒驚骨羇人重問驪久擅南山從不借君來別掃鑑湖西遣懷摩空獨鵠渾如葢出岫孤雲更似輪米汁巳防涓滴醉水精相戒齒牙嗔情知舊雨非新雨病過初春及末春藥石千金猶不貴向來地主屬何人過文江謁少保鄒南皐先生賦贈四十餘年社稷身東山雲物獨教親到來天地傷多事歸去江湖尚有人一疏曽聞摧虎豹千秋已見上麒麟為園深谷無他好但種葵花就日新贈龍華寺𤣥宗住持郭外招提古木林山門一嘯遇知音題詩青竹皆無語拄杖蒼苔各有心夜送神燈常北炤江縣螺髻獨南臨閒來幽賞殊難徧他日猶慿夢裏尋荔品開門倚杖日曈曨香送千巖萬壑風抱膝樹根情巳適枕流石上趣誰同輕翻酒帽棃花白遙見簾衣杮蒂紅不怕四聞簫鼓沸前身領過蘂珠宫龍目晶熒且漫題蚌胎的皪滿筐攜逺人錯認呼盧橘詞客因之賦病棃撇卻持螯金琥珀想來捫蝨水玻璃夜深常得催詩候月落初聲兩岸雞呼來竹裏喫時新果識清香白蜜真願得幾回飽欲死儘將百萬買堪貧初鮮味合江瑤柱久窨尊傾石凍春笑謂居停金玉道蔡家圗譜欠精神紅顔朱果醉酕醄虎視鯨吞興更豪顆落火雲排孔雀核堆繡字作蠐螬盲風酸雨留華屋短榻長牋放弱毫卻笑杜陵饞未得蜀人舉贈只櫻桃交嘉朱紫爛盈筐愛喫何如細品嘗要識味全須帶露無疑色好似經霜破除遷客隂陽火轂轆詞人錦繡腸日到朗園吟數過聲名為感齒牙香荷墅松風最可憐小池片石任髙眠靈山倒接青棠影丹荔平燒緑野烟櫂轉湖心波灩灩魚游浦面葉田田倐逢僊子霞墩上喜過洪厓左拍肩名果分嘗及二毛未曽下嚥豫揮毫明霞照水盤中玉甘露翻為舌上濤姊妹嬌花憐並蒂弟兄幽鳥有同袍奇情賦了無人㑹除是蘭陵賣酒豪樂土炎方別有天不惟百果荔争先三收蔗課糖贏米萬頃魚秧海作田蠔柱波􅀈愁鬼臉桐城日鑄霸王鞭五陵游俠皆年少慣使通番吕宋錢五六皆閩中土語攢食争先興未䦨大家評跋質青山白嗔薝蔔連唇澀紅笑檳榔著齒殷促膝雅尊盤席飲辟人深户映花欄懷中不律空閒過草木春秋刪又刪翠微麗矚此新亭醉客時傾碧玉瓶河鳥一雙眠渚白海螺數㸃接天青泉通屋脊晴疑雨月到巖頭醉又醒廿載重來圖畫裏亂吞丹荔不曽停賦得蕭郎南山日暖北山涼兩岸花開一岸香卻怪有情梁上燕教人好語到蕭郎雨中懷孝亷楊元章蕭齋有客思無涯雨浸梅根雪壓花忽記玉山頺未得美人作意試琵琶纖手雙鬟拍拍成佳人催到不呼名天邉鴻雁如相助調轉瀟湘又幾聲竹枝詞溪上鴛鴦太煞騃三三五五濯波來沙摶龜蟹欺雞冠溜急魚蝦夾蚌胎題畫梅送毛君之武林磅礴無人興自豪香風為我拂霜毫幾回細寫孤山影絶似西陵第一橋全公子大震字二何𤣥洲學士次子也少負異才治詩古文詞精書法身既貴公子性任誕復為呉中勢人壻婦裝數萬二何隨手而盡里中陸文虎先生最持標格獨心折二何與通婚姻旣七試不利家日貧落托因作客長安中久無所遇益放浪自廢其後竟客死故人家識者哀之余少時嘗見二何樂府七言律十餘首詞甚横絶可喜及余客白下寓太常莊漢曉先生官舍中見二何數造門莊先生必為設食將徹出袖中一油楮裹其殘炙去率如是其客窮至此相去三十年余始選甬上耆舊詩因憶二何諸作從里中徧索其遺草所録示率皆俳謔漫語與余向所喜絶不類久之乃自其從弟完白所得二何存集十帙之四急發而讀之見其詩文襍鈔畧無去取即訟詞耍曲詈僕罵鬼涕唾夾慁無不録其中二何手題卷首謂萬不許示人使後生輩得入其室窺見老生生平其語良是余因念二何平日詩文旣不能自慎擇所僅傳者又俱其晚年謔浪幾使老氣盡掩將來風雅豈尚有二何一坐心竊傷之乃特為洗硯正席取四帙中詩審定之唯存其本色蒼健者三十首其餘刪抹至盡然後此老身後精響始大白于天下若自今日始得一詩人焉憶初冬梨洲黄先生相過見余選里中詩輒問所録全二何多少葢黄先生猶記文虎之言也余時尚未得二何一詩黙無以應今日始可以答黄先生矣至余少所見二何詩終無一在者乃知所亡六帙正有妙絶處行苦覓之苐余于二何詩即未得盡存其可傳者而已得力去其必不可傳者此則余愛二何宿心也即二何而在當許以此卷示人矣四言詩飲食之精草木之華集我丹田我丹所家我丹伊何鉛汞丹砂客主相守如巢養鵶培以戊巳耕以赤蛇化以丙丁滋以河車乃根乃株乃實乃華書煉于日赫然丹霞夜浴于月皓焉素葩金丹自成曰思無邪采蓮曲大把荷花細把挐不愁船小日西斜香風吹得郎心轉夢也應須一到家菱花秀出葉丫丫翠葢過頭戴到家葉葉裁為儂袖子只餘儂面作荷花送萬履安下第歸明州鯤魚起海水瞬息千萬里偶然意不得良亦嗒然巳鈞弩在我手摧撞胡遽靡達人營實腹志士拊空髀咄咄深源生終焉資笑耳雲間每欒欒始平比寥寥余最負世僇凶閔亦薦交踸踔京邑塵𤣥亭莫解嘲仗子小吐氣秋空摩健鵰相與望浮雲遂可屏牢騷復賴兹弦器為君中夜操二三弟兄情庸得昧久要昔聞髙賢心登用乃滋懼張羅網四海章滿公車路逆旅占掃人荷甑有不顧何至企同時起家但詞賦逺大論樂生榮名宜少慕禮稱重其死余生殊味寡内虧罔極義外負金石雅自獻七見則飲泣輦轂下君來頗復同報罷惜董賈起舞春風顛侘傺空自寫區區將母情爾我一致也水西丈室地㑹有比肩者酒壜峰歌䖍州客舍面一峰甚竒土人呼為酒壜峰余日與坐對歌以記之山峰隗俄矗一个我受其朝如受賀太常修齋殊少日麯部新拜尚書大將無其下即糟丘安置風流酒人座峰下㑹起黄公壚峰前試喚劉白墮嗟我中年苦酣放那能咄咄書空坐隱几醄酕萬古醺横忩酩酊千春過不妨自作醯雞目取便亦宜葛巾涴砭耳雙柑逐衆攜埋身一鍤隨方荷卧銷遊絲並白日醉嚮湘靈同楚些卻笑吚吾閉戸生尚無隣眼來窺破京口訪王翼明遂辱三山之約金沙舳艫千萬艘孤舟夜驚江怒號朝登浮圗觸鼇背神仙不來為我曺城西故人有王大散步尋之正愁坐指天畫地感慨同相憐不異淮隂餓汝家亦有三山乎若醉莫怪全生麤登臨原是丈夫事還期努力麒麟圗古意相逢牛飲去夜見斗􅉭寒釣叟虹為綫屠家鐵作肝千金酬死易一擲報恩拚世上螬蜍輩何曽挂舌端舟中作極想支機石時乘破浪帆精強虚竹杖瀟洒換春衫鸛雀髙忘倦鸕鷀急帶饞驚心惟一劍終夜不安函加飱每慕安貧語何人與論安狂來能捫蝨愁絶即加飱貂毳嗟寒計風霜弔旅翰四方非靖日生事未宜完苦憶久作無家夢何堪兩地身小駒絲繫命兒子阿駒祖母鬢吹銀霜氣催歸興燈花紿喜神故園當菜熟堂上是何人有家荒荒擲嵗華三載蕩天涯狼藉移雙鬢間關散五蛇碪催南浦怨風送北堂嗟夢轉雞鳴候猶知是有家京邸步侯汝戡見留小酌韻静榻寒尤下閒門晝亦扃烘春延襍卉聚海饌羣腥蔣詡容開徑揚雄獨勘經片時成古道端不愧沈冥故西川提舉玉海李府君輓章吏隱何工拙馳驅蜀道難錦江迴大篆鹽井燭餘寒鞾舄寧留犢巾車幾到官茂陵有遺草好付所忠看欵客中山瓿先教主不醒斯文誰後死大雅竟沈冥肅見元龍禮愁占太白星六峰凭几處便作異常青歸懷蘭亭禹穴濶音徽萬壑千巖幾振衣四海虚名原誤世十年醜婦解忘機幾聞白石歌來爛巳惜朱顔鏡裏非不厭避人幽意在何時管領釣魚磯竹邉開牖復誅茅夜夜蟠虬雜怒蛟客到寒雲圍蠟燭酒深明月照山肴何人強欲馴龍性有主還須識燕巢容易陸沈驚嵗晩新詩加意作推敲春日集陸伯奮東樓委巷層城瞰玉樓登臨春色共銷憂髙來呼噏應須賦濶處湖天別有洲投轄肯教虚座上捉刀若個在牀頭欲拚十日平原飲酒力來朝未可謀報國寺雙松神人移植自徂徠豈是秦廷受爵材秃頂卧篩涼夜月低柯舞襯碧堦苔風霜多日隨身飽鱗甲從人對面猜萬壑寒濤鳴謖謖雙龍長䕶帝城隈謝侯十二汝容秘書屢見招尋兼于尊公中憲追國士之感附見末韻尊酒招尋夜似年夷門主道倒還顛春依榾柮爐邉煖霜爛芙容匣底鮮楚調章章逢世難浮生日日為人憐竹林曽歎山河邈知巳悲鳴倍惘然家信至有浪傳余已應吏牒者率此感示蛾眉羞學漢宫彎骨相寧參鵷鷺班未得捧輿先改鬢倘教受檄或開顔那能手版論西爽似有移文累北山夙昔扊扅殘火在月明還佇大刀環陟屺殘編泪眼零空傳家學是韋經犠牛未悉登何廟丘壑應須置此形白玉堂中違故簡石忩峰頂憶青櫺可憐未報君親意只許江湖號客星李克振新葺書樓喜贈莫問仙源幾處花花枝豔處即君家樓檐獵獵支風軟橋板低低趁水斜來去一年新社燕榮枯五色故侯𤓰登髙須仗興公賦雉堞時容睨海霞南閣成志喜齋閣新成逸興長倦游心事合商量屋梢明月低還見樹頂危巢逼不妨乞巧未堪陳几簟窺林已足管牛羊誰嫌四壁無餘物猶喜髙懸一鷫鸘擬皖城賊遯奏捷志喜同留部諸公作不常憂喜態言捷便欣然北上音何緩南來膝屢前駿功馳赫濯文徳協重𤣥草澤終麋駭山河自礪鐫桐陂張勝壘皖口壓雄川斷後曽臨操堅中故騁權股肱分要輔湯沐枕駢肩羣醜俄成歗諸城乍警弦久縣帷幄劍數假便宜牋仍有王師戰寧論國鉞䖍搗巢停石畫間黨沮鉤連出没渾難測來迴杳莫牽神機貴尊俎妙筭後戈鋋直賴鐘簴福還惟社稷縁稍防蹂晉豫復截闖秦汧窮蹙那知地狂奔永逆天游魂迷凇霧野燒等飄烟王氣原留楚歡聲徑達燕宵衣需泮獻露布走星傳横賜傾周寶崇酺狹漢錢願㐮彛鼎業磐石鞏巖邉贈汝戡鏌耶一片向誰明擊筑聲中見不平匹馬斜陽殊作俠過從長是問侯生天家大事萬年籌龜坎蝸廬足自謀解道安危諸老在如今杞國費誰憂汝戡杞人狂馳直任百年中燕市流行氣作虹草莽文章終孟浪防將時事忤三公呉先生應雷字鼔和號曰青寰為諸生家貧授經世居甬上凡甬上諸生無不出呉先生門者先生雖日為諸生論説治經生業然几上獨置杜工部集每嵗以反故紙立一冊凡有所作輒書冊中有事則藏諸巾箱方去即其家子弟亦不知先生日何所作也久之先生故人子及諸生與其子謀俟先生出竊發其巾箱視之則其所作詩草也紙背中淡墨秃穎幾不可讀因各取一冊疾書之仍置箱中此後見先生裴回户庭間口吟手畫始知為作詩也然終不以示人聞人論詩輒不答唯見人以詩書扇上贈人輒蹙額曰奚自苦但持一素扇相贈亦得生風奚重廢筆墨為竟藏其詩至老且死終不自言嗟夫呉先生生不得與葉鄭朗楊伯翼同時其目中所見鹿鹿誰足與語故寧抱其詩井枯壁壞蠧魚飽死篋中終不肯使單章隻句輕上俗人口此其力堅其志矯寧身後千百年待一人知己始出亦可謂介之甚果之甚矣去先生二十餘年余始録甬上耆舊詩適允誠出宿錢氏錢氏賢者二咸戒三即先生故人子因出向所鈔詩數本夜讀之中有經吾友錢退山㸃定者允誠為驚喜録百餘首來賞歎彌日即余門中向與先生往來者聞其能詩俱大詫不信嗟夫呉先生誠異人也雖然先生身後甫二十餘年侯芭尚在巳有能讀太𤣥如桓君山張河間者吾知先生更喜過望矣感懷惢惢山中桂乃與庶草殖螻蟻穴其根生意頗跼脊一朝遭運㑹移置宫苑側敷榮日以鮮馨香當坐發風霜亦何勁枝幹終自及君子秉本性小人量纊息美葛枯于野嘉稷委于澤抱質豈不臧賦性任所適得失原茫茫舉杯對明月感興蕩蕩仰天宇白雲横野亭人生如孤蟬須當及時鳴薄翼領微風髙樹揚清聲一旦入秋節白露肅泠泠垂緌豈能長抱葉為乾蠳神龍有奮蟄時花一枯榮造物移人意無然命獨醒感懷嚴冬天雨雪寒氣薄人體方朝尚偃卧帀蔽忩户裏自分衣裳單白頭忘櫛洗飢叩誰家門愁憶何王醴萬慮一身併鬱若魚亾水天子御北辰安知窮邨士溝壑日為隣嵗莫亦云巳游目寫中懷躋攀俯城郭江流半夕陽夕陽多野哭逺望令我愁天風振瓦屋嵗敗人烟少村寒啼鳥獨妖狐銜髑髏白鷺起叢薄安得懷葛世忘情順里俗感喟非一端昏歸意煩促居恒不得志曠然興遐思遐思在三山仙侣與追隨或跨白鹿行或挾胎禽嬉沆瀣可供飯紫芝以充飢洞壑何閒閒彷彿雲霞栖學道恨太晚全真方自兹安能靡塵蹤熬蟻無休期堂上考鼔鐘行樂當及時達者信其説徒為愚者嗤蘿蔓蘿蔓縁桑樹樹髙蔓亦長傾柯滴涼雨罥葉晞夕陽柔勁豈偏妒枯菀相與常所嗟物候改促節入清商百卉落顔色微質何足臧桑脱尚有枝蘿謝根亦傷儵忽棄捐早結軫摧中腸願言駐陽和永永媚年光天意故叵測撫事授斯章醉哉行呉生好飲席天地手搦寸管皆五帝帝曰怪哉敢侮予勅使窮村閉門去閉門十日那肯静撥上南城目更騁東窺溟渤鼇出波西極崑崙鶴翻影仙人八九彷彿記腰繫胡蘆授丹餌食之不老百嵗生風蕩入雲窅然際年來種菊芳可餐亦聞益夀好人顔千枝萬朶惜不得方朝采采商飇寒寒吹老鬢巳衰朽潦倒生平惟有酒陶濳本是解音人屈平豈稱知味口爐頭時價每苦貴眼底貧交難數對但願沈酣吸百川客滿杯浮檀板碎撥悶秋村蟬急槐欲黄家家刈稻早登場白首下帷誰者子田無二頃搜枯腸大兒織屨腰力傷次兒佐織眼茫茫更憐黄口哺糜湯顛倒學步號新孃街頭沽酒酒價貴年年種𤓰遭亢暘天葢逺地葢長䲭晝見龍壑藏人生不用多歎恨且把絲竿釣晩江多難王國正多難書生亦解兵不堪埋虎氣一擬射狼星萬里將軍目三杯出餞情棄繻關吏識慎爾繼榮名送季鷹向夕江雲起遙天帆影飛故人多意氣此別有光輝土酒隨官驛山花上客衣前程須努力休恨鬢毛稀誅逋國難誅逋急年飢倒槖難爨烟風斷續愁眼雨潺湲巳覺豳詩苦何當漢詔寛質衣兼出貸不敢怒新官吟似太目貧使交情濶閒看物態新白雲方閉戸紅蓼正宜人不厭南山色相攜小甕春竹林猶有伴畢卓夜過隣不寐不寐伺晨發披衣月易西寒雞疑失候獨雁豈安栖壯志成今老新詩失故題村村𢷬衣急又是暮秋期遣懷熟睡非吾事迴迴此寸腸秋蛩聲太切北斗柄空長祗自愁衣褐誰堪挹酒漿百年牢落裏菊又幾枝黄登天封塔突兀出層空明州盡眼中下方疑作雨上界只生風西日沈紅樹東流接海宫仰髙應咫尺吾欲愬蒼穹月蝕誰干天道忌惜此一輪盈得序恒光發非時沴氣乘蝦蟇何偪側桂樹本長生呼救煩愚俗終然炳夜靈皎皎初猶見團團倐巳非雲留太隂節地閉小寒輝薄蝕灾時有分杪數豈微臺郎如許奏警闕在垂衣小圃病裏過殘暑涼深小圃荒絶根除蔓草作意怒螳螂遲豆猶無莢秋茄不滿筐暵乾能抱甕底事使人忙起早不寐晨興早驅兒且賃舂雨聲初歇砌日色未臨忩水際螢三㸃空中鷺一雙飯匙巳飽噉且得實空缸啜粥飢年嗟食玉新稼喜登場薄用為糜粥貧宜惜稻粱老夫兼煖胃黄口亦充腸一七松忩下應知意味長寫懷投老中懷惡長宵輾轉頻村深荒漏刻雞小學司晨秋氣彫髙栁寒聲滿四隣側身忩户裏何事不愁人鉏園園功久不理蚤起把鉏時力倦應知廢年衰無可為白花零細草赤棘拒疎籬朋舊何人到斜陽又已西負米負米憐兒子家貧藉舌耕頻年減研糓何塾踐師盟嵗熟門為倚秋乾場可登雲山望迢遞歸及慰衰齡遣愁天豈私貧我其如傲采薇風騷千古業藤蔓百年扉藉暖吹新火防寒綻舊衣曽聞力命辨無是亦無非雨夜犇林風作勢徹夜雨傾盆鐘響欲沈寺雞啼如隔村將無傷晚稼何以聚秋屯墻圯生多盜應違席掩門撥悶窮冬畏雨雪邨舍况頽然鳥入窺空廩人來責欠錢上書無一字作賦有三千祗羨龎公隱兒孫覺汝賢不肯不肯徼鄉曲其如衆所嗔須眉看巳老要脅折何人原憲無辭憊黔婁實可貧百年一具骨山石對嶙峋度龍山投宿田家躋險當龍碣穿幽狎虎隣天風驚萬樹野日側孤輪橘柚溪邉寺雞豚邨裏人白雲秋片片半落暮江津雨懷冥冥江上雨風起不成乾柱礎春蒸濕炊烟曉醸寒忍殘花片了擬放酒杯寛門外何人到飢烏立樹看閲耕東作家家急扶犂及早春水田新足雨山鳥慣催人未課三年積先勞百畆身杏花邨舍近婦餉㑹如賓江上落落南山曲孤琴寄一家白雲長在戸幽鳥自啼花懷望人俱逺登臨日每斜暮年無稱意何處問胡麻秋夜落木秋風夜嚴城漏㸃長詩篇通酒性山鬼避燈光放筆人無老行歌道在狂不能攖俗慮天地信蒼茫過人野居騁望松林暮沿河到野居樓間落照裏人卧絶交餘祖徳墓門表婦賢斗酒需竹欄花事訖送客步徐徐夕落落寄人境夕烟生野扉竹聲風棄籜松影月留衣貧不休詩句閒惟占釣磯所忻塵跡絶吟嘯晚成歸山行訪人秋草平郊路蒼茫引望迷數家依絶巘一寺隔迴溪土俗沙田芋人烟籬落雞欲尋髙隱宿斜日石門西山中訪人山秋來碧色步逺更前溪隨意雲孤出無人鳥亂啼石橋臨壑起茅屋入邨低擬訪幽居處松行竹个迷自遣白首人間世豪雄異往年酒酣猶起舞金盡只愁眠訪舊門多閉干時馬不前祗餘衣食累數口正蕭然曉望霜清野甸悄無人幾處楓林丹業新客棹倚村修晚爨漁罾歴岸守濳鱗閒來嘯詠經初臘老去栖遲惜小春節序漸窮朋舊隔曉天何處不沾巾江館撥悶江雲欲暮不歸山倒映斜陽雨半殘野水亂侵沙徑出人家多掩竹扉閒辭春燕侣空泥壘近老儒生敝鶡冠嵗月似流心似醉何因忼慨一開顔苦飢數口蕭然窘殺人此生迂拙只安貧汶陽聞道蹲鴟熟一擬移居送老身孫山人儀字象可世家三茅象可自田間起年十七為諸生時櫟社長嘉則先生郡中名薦紳余君房屠長卿沈箕仲諸公尚無恙象可徧造其門歸益精治經史學馳騁古今習國家典故旁及禆官星緯二氏家言無不蒐獵數試有司不利客于京師當事欲論薦其才竟謝歸象可性㢘介自持初學為詩不肯摹唐人音格見當世所稱前七子後七子輒唾之喜在佳山水間每所過酒家梵舍常作詩題壁不署姓名時周貞靖先生方為孝㢘偶過某寺中見壁上句一讀驚喜起拜因日誦其詩初不知所作何人也後周先生中進士出官嶺外聞象可名因延與同往兩人舟行相論詩甚驩一日象可出所攜借竹樓集周先生發卷見有題某寺壁詩即舊所誦句也更大驚喜重起拜由是兩人恨相見晚其論詩益驩凡所唱酬有一語稍近世人輒動色相告務力去之至于三濯髓方已周先生方刻象可詩粤中謂我費民間數片木傳孫先生詩亦不損㢘㑹以事忤勢家解官遂不果象可歸卒于家年八十餘聞所著借竹樓集甚多不得見唯得其清海吟二本為周先生所㸃定余録其不甚抝僻者得二十首雜詩女大不憐母花開不戀枝蠶老上山坐燕長出巢飛阿媪勿懊惱不憶嫁爺時至前七日即事仲冬粤候暄衣袷身稀適放骸藤榻間静黙羣機釋爵馴飲頮水鼠横傷巾幘牖敞入微風鼽嚏妨眠食偶聽讀朝報時事更堪啞涉人乘破舟争坐恣搏擊澒洞波濤中望岸殊懸隔羣懵奚足矜為此沈舟惻昌黎曽有言所憂非我力杏溪道中蘭隂郭北路砂礫埡急湍白波跳垂日峭峰推碧天是時梅雨數集澮彌原田道迷篙力窘密縴砅水牽衆艇亂流濟排擠相屯邅盤旋滯晷刻跌足號長年須㬰人語寂始覺舟去便往來緑樹裏抵夕霞靄鮮徙倚船艙中且玩林薄妍白頭湖海客忍性成柔綿逺途甫發軔遑較延與遄海口思家今日天晴明川路浄如洗舟子撥波輕進程過所擬漸迎甌海潮舟楫勩有底頓覺客腸紓眺原數窺倚入春彌月餘百卉色俱起暄餘斜照曛菜麥被之喜梗蒼翠葉妍杉松歴可指雖云習習風拂面若撥水掀篷炙老衰緜服殊適巳因感昨在家暴陽春未巳將身就夕暉遷坐牆東幾亂離向二載城野傳搬徙苦罹敗卒殃兒信驚滿紙刑斂釀緑林猝變咄嗟爾老稚寡良籌奔攜亦情理未卜破竹樓安完免抛圯屋角含桃花向誰復旖旎春熈縱溥公人命各亨否途艱汔尾將家慮從頭始切近切揣量坐呆飯失匕餽爵野田稻未熟林爵窺官厨唧啾久檐端似妨爨僕居雖飢不茍下孰謂禽鳥愚嗟為微軀役靈蠢同飢劬固知物性在法施規豈虚案頭有白飯適值黏書餘取之撒庭宇聊用寛須㬰雨晨早起署樓寡酬答宴息停繁思有空性量廓静存營衞滋宵眠得美睡放體形氣舒夢稀嘗早寤坦襟得神怡微鐘移枕候薄雨綏雞時旱久雖霂霢物情已自私搴帷覽庭曙榕葉生新姿舟次賀正風俗他方別年華此日同異鄉朋舊合聯艇火烟通酬酢常移酒過從只啟篷雖更新嵗月猶抱畏途忡嚴灘江山樷建徳幾許不通名一日曽垂釣千秋屬子陵亭臺長肅穆比附亦峥嶸借問買山隱兒孫幾代更隔岸有方干墓秋日縣齋即事二首無人嘗獨坐得句且微吟到處忘蕉箑行時揀樹隂怕登頻望閣小卧必牽衾以此當康濟嵫光緩夕沈一室户嘗啟孤眠榻半賖鼠昏偷硯瀋蟻晝上瓶花數飲防侵瘴徐飡畏嚼砂朋儕忘我老為挿素馨斜詠邑治之勝龍巖仙吏宅丘壑簿書兼虧蔽樹垂䕃輪流果薦甜鳥聲嘗到枕山翠日浮簾行路村村去花香匝帷幨穗城氣候孰云函載渺清海候全偏衆蝡何曽蟄羣芳不改年難明松栢節另闢雁鴻天文字存䝉氣光華敓貝淵晚步庭際看歸鳥落照射榕腹羣飛歸鳥情鷹翔殊意氣爵伺善疑驚覓食嘗窮日投棲自逺程獨懷鷗泛適浩蕩易為生固村而上再值惡灘石瀧傾窄湍溜怒奔幾經危栗始獲離險水石自相噱艱危人巧投跕鳶溪失毒戒象峽方愁百感生殘夜孤心折漏舟詩囊慶無恙且未顧衾裯初入郡齋呈基仲翩翩五馬渡江城花信風吹天復晴夾道争看新太守到官只是舊書生兒童守舍供烹茗妻子留家待耦耕抗志欲追千古事扁舟記得發錢清自琴水度砦頭嶺至禾口次唯一韻筍輿登頓擦􅚱砑晷短偏遭峻嶺賒澗度蚓形橋數丈山分人字路三又鑿崖徑偪猱縁厠捲草蘆荒鳥作家一度藍田原野闢陽坡霜後發穠花恨老思家壯遊濟勝暢平生羸老何論儕輩輕鼠伺卧堅公鬭嚙蝨欺眼暗肆縱横冬青變白方初授臘酒迴和醸且傾得返竹樓仍穩卧百年養拙縳柴荆舟行口號赫曦齎老赴南洲擬外形骸忘鬱攸入楚去呉頻計日脱章度嶺復乘流草明屈曲山腰路樹欵逢迎水面舟鳴鳥向人猶故國卧艙只作少文游懷青壁山居老來畏俗企丹丘買得雲巒幾叠幽奥壁經年惟半日潠田十嵗少全收自生竹栢樵逾茂不斷山泉熯更流巳卜一丘繁宿草微軀瞥眼任歸休夕望墜日餘曛綣逺峰秋空晻靄定無風粤雲照海黒赤半歸鳥滅没來其中戎文學玠字孟常為諸生工詩常與家兄戒菴同入西川舟行所歴奇山水俱有詩晨夕唱酬工力悉敵其文足照蜀中今相去數十年孟常墓栢已老戒菴亦為八十公矣因出其蜀游草一卷余為録存之得十一首雨中度相見嶺和工部龍門鎮韻鳴泉散珠沫翠霏衣裝濕風霆怒未休暴雨來何急静聽松籟喧仰覩山雲集兩峰不相見路阻藤蘿澀滑磴試屢危笻扶亦難及淚浥幽巖花似對勞人泣涉溪和杜清溪驛深山驟雨後瀑落無乾渚溪溪吼怒濤急流漲幾許石窄豈容舟相持戒徒侣欹側足未定齒嗑不得語生平慎垂堂何當此險阻辛苦達荒崕隔嶠猿聲楚登桑洲嶺和法鏡寺冒暑陟崇岡登降倍艱苦篠籜翳行跡石徑莓苔古盤迴鳥道賒颯㳫羊腸聚流汗濕衣襟似沐晴霄兩捫蘿喘復蘇風葉相吞吐屐齒笑羣岫一一低可數絶巘費躋攀自晨已及午倉皇飲松澗投笻竟忘取曉度桐巖嶺和鐡堂峽嶺勢如旋螺仄徑故斗絶昧爽戒前途下馬卸銜鐵蹩􅍷撑崖間兩山突而裂松風振鬛來沃我隂山雪翳雲洩曙光飛鳴衆鳥悦層巔在按膝碎石蹶九折前峰擬暫俯攫天猶未滅何當快雨至一洗千山熱由桐巖晚行至朱嶴和石櫃閣嶂迴日欲沈霞氣幻紫赤峰尊層雲上徒行踐水石遙睇樹杪光返照蕩層壁村農望烟歸嗟我逺行客衆鳥飛相先烟嵐愕行跡路荒不容趾萬嶺紛相迫明滅見逺火野店傍渚澤怖魂暫以定呼醪聊自適曲溪村烟生晚翠野水聚空潭雞犬逢人倨桑麻著雨甘漁歸燈破暝僧定衲棲嵐得近前溪泊泉聲答夜談晚霽與客登浩然樓眺錢塘江晴色開村樹危樓俯大江潮聲翻絶岸帆影落虚忩水與遙天合人同夕鳥雙茫茫百端集形影若為降新月和杜少陵韻江月多新意舟人厭屢看孤螢新破暝驚鵲暫偷安逗水疑殘照窺忩醸薄寒鄉程慿夢到頻聽葉聲乾泊巴東昔行指川北今始詣巴東山縣無重郭江天有斷虹亂峰雲欲暝官渡火初紅剪燭供清話蕭蕭暮雨中大竹道中半嶺雲封屋千家竹作扉幽泉和石語空翠帶烟飛緑轉常侵面隂濃欲濕衣山行疲應接涼月續斜暉度九盤嶺間説蠶叢險今知鳥道長人傳雲外響馬濕霧中韁秋暑蒸蠻雨山花竄異香經營男子事回馭笑王陽董公子應震字百里父光宏官少司馬百里有逸才工詩體中文弱雖為貴公子不喜盛車騎往來閉門掃坐所過從未嘗有雜客性嗜佳山水嘗與詩人泛桓溪飲它山泉訪賀監黄冠谷髙咏傳一時百里年少猶及從汪長文聞隱鱗諸先生杖屨卒年不滿三十所傳遺詩厪五七言律一卷遲汪長文先生不至草閣遥憐夕徘徊步緑莎空堦木葉下疑是足音過山鳥時窺席低雲闇拂蘿寧知天外客不肯離巖阿固鎮道上懷聞居士隱鱗北風吹斷雁搖落對寒暉野曠無人跡林空絶鳥飛清霜欺短鬢朔氣薄征衣獨羨聞居士津梁巳息機宿㑹亭驛有懷旅泊傷千里嗟余馬欲瘏河魚腥晚市村雨洗寒蕪室冷雲栖榻庭虚夜走狐美人何處在惆悵客情孤同周斗文陳士服游溪下春色看將晩遙岑帶夕暉青帘斜酒市白鳥掠魚磯烟樹暝暝合風花片片飛到來思白社晏坐淡忘歸度關山人從盤石上身與亂峰齊卑響舂雲碓髙寒怯馬蹄林疎全見日野曠不聞雞辛苦嗟行役黄塵滿鸊鵜贈呉養台明府龍節何來暮謳歌徧草萊氷霜隨地嚼霖雨接天迥澤雉依人雊山花帶郭開璽書旌異績不負佩刀才薛千仞湖樓髙閣澄湖畔悠然思獨清看雲舒巻態聽鳥有無聲隨意臨書幌尋常對友生更饒真興在時與白鷗盟尋巖菴看山意不淺扶屐且同攀樹色潺湲裏禽聲窈窕間磴懸千尺迥僧占一峰閒歸路無愁失樵人許伴還過孤山萬松立寒翠一水澄湖碧年年車馬來不改孤山色徐文學陽輝字元暉為諸生工詩喜學張司業李義山自稱麗手亦善填詞所著樂府數種唯青雀舫獨傳屠長卿先生有言名妓翻經老僧醸酒將軍擅翰墨之府文士馳戎馬之場雖非本色亦有別致元暉愛其語遂演為全本其老僧醸酒一篇更為時所賞過臺城春草茫無際春禽若有情披荆問往跡知是古臺城埜花惨不發愁雲四際平鴇鴨唼廢沼老檜作鬼聲離宫三十六一一巢鼯鼪臺前古寺暮施食坐老僧呉翁死不餓受粒先衆生興亡古所有有泪莫同傾山居喜晴積雨曉來霽便若物候好碧霑山觜嵐翠潤溪脚草無心乍卷雲有時忽啼鳥蠶眠桑子肥麥熟雉兒飽舂響烟外村漁唱蘆中島扶笻偶出門遙光澹渺渺空田行空田十月浄如掃牛背斜陽立孤鳥緑竹籬邉白板扉一道炊烟出林杪寒鴉陣陣風蓬蓬崦西村頭霜葉紅隔溪嘎軋水禽起漁歌聲靄暮山紫托宿鵞鴨村家泥沙滿面塵撲首兩日路作一日走地冥天長暝色催亂山缺處是村口村翁見我偶停鞭便著延至茅堂前四壁雖貧無大厦猶勝潦倒窮途邉更命家人欵逺客網得鯉魚長一尺老瓦盆浮雪蟻香折脚鐺煮霜蠏赤敬客還恐擾客眠教兒今夜莫打麥明發飯罷送出村為言直北過竹墩沿江再覓便船渡頃刻可到縣西路蘇小墓數聲花豸垂楊外水聲決決鳴幽瀨春深花落迷孤墳蔓草猶疑拂裠帶橋南橋北竹如烟小魂卧處亦千年十三呉姬蕩輕楫愛向西陵唱桃葉唱入重臺應動心心心化作孤飛蝶漫興三首髹几香殘蓬户閒坐來無事且看山但逢石丈隨羅拜每對桑郎一破顔雲縷擁花愁態斂雨絲灑竹淚枝斑翛然倚杖踈林下興在飛鴻杳靄間紅塵喜不到林中寂寂幽居小澗東莎岸雲深栖斷雁柴門雨歇落踈桐傷情句為窮來巧失意愁因病後空欲覓武陵一片地閒從洞口拾霜紅小庭獨坐學跏趺恰稱蕭條山澤癯開帙校完訛字眼倚䦨撚斷苦吟鬚聞看曲沼盈魚婢醉聽幽忩落鼠姑筆硯近來都廢盡笑人作論學濳夫此集所選止于萬厯末年惟録布衣文學之詩有稍後之者正以諸君遺草散亡恐後人不得其本末宜急表揚使見于世然即如孫象可晚嵗及與周貞靖先生論詩而其為諸生尚得在沈嘉則余君房諸公之門固猶然萬厯中人也甬上耆舊詩卷二十九

body:
  text: 甬上耆舊詩卷十三監察御史胡文學編教授鄭先生本忠字本忠少篤學從鄉先生舒卓受尚書時方氏據浙東三郡擅爵祿人惟先生與里中方遁庵義不受僞署益杜門讀書多識古今為文章必中矩度同時胡世佐林清叔楊彥常鍾士懋諸人竝見重儒林先生常與相資益洪武中舉明經不起以薦為昌國訓導改秦府保安王教授卒于官有遺集行世題李白匡山圖瀑布吹花落翠微石林風露淨秋衣若為結得雲松屋頭白匡山不用歸袁給事圭字廷圭父士元見前傳公少善讀書工詞翰洪武中以禮聘至京授髙州茂名主簿出繫囚均縣中賦役民甚德之嘗從勦粉壁寨猺賊運儋州餉至軍卒破賊坐違式事奪職戍大寧以詩文自娛傳于燕邸召為府紀善靖難後賜銀幣官禮科給事中稱為敢言三年出判岢嵐州七年東宫監國舊都公入賀優以閒曹改浙江布政司照磨九年仍判和州復兩見舊都賜賚益厚以秩滿乞老終于家公為人長厚事父篤孝厯官家無餘財自號清白生所著清白集題青山白雲圖山色秋光何所似烟涵紫翠連千里半山雲斷山欲摧落落長松扶不起松根茅屋山人居竹窗蘿徑環鳴渠我欲訪之不可得且來獨坐披新圖臨清軒為儋州宜倫縣丞李公載作花縣東傍屋似舟曲䦨芳檻總臨流桄榔雨滌一天暑菡萏風生五月秋紫燕掠泥粘畫軸金魚吹浪動簾鈎公餘清事應如許民庶何妨九載留周翰林翰字維翰永樂三年舉于鄉次年㑹車駕臨太學獻賦稱旨入翰林預修永樂大典除翰林典籍先是文淵閣所儲古今書籍歲久多失詮次維翰為理葺歷二載甲乙秩然諸書要㫖輒能記憶遷簡討預修兩潮實録簡牘繁衍維翰窮殫心力書垂咸而病垂殁帷問史成若何語不及家事維翰為文務宗班馬出入唐宋諸大家下筆千百言須臾而成有文集藏于家遊阿育王山款款籃輿駐嶺隈參差樓閣淨浮埃曇華香落諸峯寂舍利光分萬鑑開雲暖金沙龍躍出月明玉几鶴歸來平生幾兩登山屐覽勝應須步石苔訓導戴先生安仲字仲莊為人耿介有氣節先是里俗治喪多尚浮屠先生家獨禁不行用小宗法立祠堂行朱子家禮復延里中耆宿率羣從子弟日從講學以耕讀𫝊家行義為鄉邦所重太守王進髙其名薦授郡學訓導模楷一時秩滿入覲敕賜致仕歸自號樵國老人所著歸田集得年八十有四橋上誰能閒兩屐日訪竹橋西緇社才分偈奚囊任失題水生魚欲上烟定鳥初栖却憶東臯路新荒秋草畦司諌周公冕字汝服聵菴從弟也六歲讀書日誦數千言十三補諸生訓導徐和仲見而器之授以琴輒善鼓琴尤精于法書自秦漢而後碑版藏帖務盡其妙兼善墨戲名籍然一日父敕之曰若非玩物喪志耶公奉教惕然自悔遂盡棄所習專精問學永樂中貢于鄉㑹徵天下文士纂修大典郡中以公應詔至京從事史館十年太宗北狩凱聞公獻頌春宫除正字十二年大駕還京遷春坊司諌在講筵善于啓導受禮遇殊等公名日重益自謙慎每朝退坐一室讀書非召見公事不出客至寒暄外未嘗稍及朝廷因更號訥庵未幾竟中人言論死年三十八一時寃之仁宗即位首念舊臣遣使驛召公長子庭授鴻臚署丞給俸讀書題雙鳩枝頭拂雨弄朝陰時送鳴聲出遠林對立遠峰春意早一簾疏雨畫堂深鄭少卿雍言以字行與兄復言俱鄭先生本忠子也以進士改庶吉士授中書舍人仁宗監國每見命賦詩率立就尋命署禮部尚寶司及六科事上嘉曰卿不獨文詞典雅書法亦甚莊楷類卿為人遷河南按察僉事宣宗即位雅重其名留直文華殿日備顧問特賜給事牙牌以便出入遷太常少卿兄復言亦由庶吉士歷官太僕少卿引年歸兄弟友恭竝能承其家學位至名卿人以二難稱之次胡學士廣從游萬歲山韻朝野霑仁化扶桑送日紅詔頒丹鳳闕駕出紫微宫文武回千騎旌旗繞半空山川供勝覽咫尺五雲中駕馭青山窟雲連白玉臺一春花自發千載鳳還來水殿珠簾捲瑶階雉扇開風和日初麗天意故徘回知吉安府陳公本深字有源别號涇泉年十三補諸生第一永樂中舉于鄉適詔選新進士舉人有學問者入祕閣纂修公即被選歷四年擢刑部主事畿內有韓廣者為盜殺人有司不能得繫及無罪十八人置獄公以計獲之十八人俱得免擢員外郎㑹居二親憂廬墓舍刑曹需公辦事詔起復公上疏乞終制詞義哀宛上許之宣德初以雄劇九郡闕守上特命大臣慎舉才吏出守郡少師楊公士竒以公應詔守吉安命乘傳赴郡賜敕書自藩臬以下不職俱得劾奏所屬吏及郡中豪大家有罪即繫治雖敕太守如御史臺行事時吉有巨猾彭搏等十九人自號十人為龍九人為虎橫行里中前守不敢治公至郡陽為寬大若不聞復密遣人與諸豪相結久之為具酒召至後堂與飲公已潛伏壯士于座上盡拉殺之曳十九尸出府門一郡大驚逺近盡相賀樂安大盜曾子良據太盤山為亂有衆萬餘公以地逼永豐使將先率兵伏于界上賊果至伏發大破之斬子良初公為政務舉大綱略苛小及大猾既殱乃大起學舍立忠節祠築堤捍水復諸廢郡中無事益疏闊法網與民休息每晨起鼓而坐堂吏無所白輒解衣卧閣中間有訴事即呼至榻前與辨曲直立遣之亦不受狀郡中大治九年以秩滿入覲當遷吏民相率先入京奏留之少師楊公復為請上嘉之召宴內庭賜御製上林春色詩及招隱歌晉中議大夫贊治尹使還治郡恩寵甚至楊公亦贈詩有曰螺川城外人千萬爭候神明太守歸公再治郡九年益無事凡士人有嘉慶肅之燕輒往燕罷使左右互攜果餌遇坊市小兒則投而啖之往往擁其輿蓋廨前民有舉女者漸見其長一日聞其家鼓樂迎娶聲公笑曰吾初來是乳下兒今可作人婦吾豈得復留此是嵗當再入覲吏民知公有去志遮馬首哭不得前公好謂曰吾即歸當復至郡中得相見也公入京遂力請老上特敕賜公還鄉公念與吏民約復至吉與郡中人日飲叙别流連踰一年始行行時送舟聨數十里帆櫓相接適有御史持節過遣吏問之為太息而去公歸田復十二年燾八十一終于家吉民至今奉嘗公不絶凡所治九縣人為浙中大吏如蕭都御史廪陳御史德鳴李御史邦華俱遣官修公墓祠致祭百十年後尚有之其去後餘思若此先六峯先生以御史按江右至吉安特修祭拜公祠下為文具述公治狀故嗣傳公得較詳公既歸田供所賜還鄉敕亭中以示子孫為郡十八年家無餘財與請老薦紳五人時從觴咏倣徉山水間人稱為五老陳氏世居東皋族人數千公為族之長十二年時鄉論甚嚴凡嵗再行飲射讀法士大夫非告年歸里不得為大賔唯公以名德之重在賔位二十有四鄉邦榮之余既作公傳近更從陳氏家乘録得公詩二首文翁召父復有文章真竹帛之光也戊辰余告致仕廬陵士大夫分題賦詩為贈余亦答一章少酬其意忝守忠節郡蹉跎二十春及兹成白首優詔許乞身仰荷羣公餞崇觴出城闉維時凍初解祖道無纎塵分題郊亭寺賦者凡七人寸心愧難報千里長相親贈孫某宦遊賢勞王事獨驅馳歷盡風霜嵗月時路上有山隨去馬舟中無月聽晨雞雲飛鄉國懷情逺水繞江村覺意遲莫道宦遊多寂莫㑹看鳴珮到丹墀知府戴公浩字彥廣號默菴永樂庚子舉于鄉初判東昌治河有麥商舟覆溺死公為收殯貯所遺金數百鎰召給其家浚臨清閘得金玉竒貸甚夥封寄縣藏尋有中貴人自言所遺閲其數果驗立還之九載遷守雷州適苦海鹵傷稼公至為築堤禦水民歌其功適㕔事梁上産芝三莖人俱為公頌改永州又改鞏昌嵗飢矯發邊儲粟三萬七千餘石以賑民監司曰太守豈不知法耶公謝曰法固在如民飢何若以守一身得活十萬人命固將甘之乃上疏自請罪詔特原之天亦雨是嵗大熟開山道上盜每白晝出闌取客財公設計殱之以年近七十上疏力請老致仕初在東昌秩滿民歌曰于别駕公實惠吾儂亷慎忘躬能使年豐及在鞏昌除盜諸商集庭下呼曰君侯守邊惠政無前我道我行蕩蕩平平公笑遣之每去官民無不遮道哭塞馬首至走闕下請留所在俱為生立祠公家居齒長羣宗立義孰義冢生教死瘞身持篤行以為宗族法郡太守行鄉飲禮公在賔位者四十有八修眉皓首進退甚詳巋然為里中之望夀至九十三體尚不衰性喜吟咏善書亦工畫謂魚遊可樂諸花惟梅格清絶因獨畫此二種隨題一小詩援筆而成天然可愛張東皋先生嘗有觀戴太守畫魚詩為時所傳公既喜寫魚及生諸孫遂盡以魚命名其曰鰲鯨鱀䲀俱通顯有名里人稱為同胞四進士並見後傳春曉聞鶯東風微度果留聲羌笛輕調百囀清喚起春光無覔處栁汀花嶼霧冥冥咏春九十春光似酒濃隔簾香暖小桃紅杖藜緩步尋芳草間逐黃鸝過水東倉副使梅讀楊先生自懲字復之栖藝先生子也性篤孝友能傳其家學宣德中以易應鄉舉罷歸有司强辟為吏六年上京師再應順天鄉試不第已巳之變先生痛時事作咏史詩二十章識者謂過于慟哭以積功補泉州倉副使監司知其賢使署德化縣到官勞心撫字民甚德之監司方論薦㑹以疾卒先生教二子守陳守址並為國名臣歷贈吏部侍郎學者稱梅讀先生遺集行世皂河至邳州河中新水足空外片帆飛沙鳥聲何碎江蘺緑正肥行舟隨處泊遊子幾時歸呼取蘭陵酒微吟對夕暉自和驊騮逺騁鳳髙飛奈我于今出處非太守謾竒王子贛功曹誰重尹翁歸業勤經史從人笑分守虀鹽與世違常想拂衣歸隱處閒雲流水舊柴扉䝉洲人家人道䝉洲好住居停舟試問近何如幾家烟火秋風裏數里丘墟野燒餘月夜驚烏猶繞樹夕陽歸犬暫依廬于今狐兔皆殱滅幸免城殃及子魚郊行雨餘村路浥塵沙風信初終紫楝花雞犬聲聞在何處緑隂林麓野人家布政使余公洵字允清布政麟子也少嗜學以父任充國子生舉順天鄉試授刑部主事歷郎中出為福建按察副使改湖廣復改陜西奉敕撫治荆襄漢中時都御史項忠都督李震收捕山賊小王洪濫殺流民就食者三千餘人誣楊太等十一尸為黨俘之公亷其狀即引同官力爭太等得不死監軍張寬復謀發兵搜捕入山流民公抗言曰流民計避死入山前所殺已過當奈何復益之以要功耶寬等懼得止因大銜之既而論功各進秩有差公獨無所叙遂以右布政力請年致仕公由刑曹出為三省藩臬凡三十餘年修整如一時論以有守稱之東山寺烟水東湖閲幾灣維舟散步又東山鶴歸古殿鐘初歇僧指髙墳草未删落日峯低侵眼碧踈林雲淡比心閒翻嫌丞相施金重時有催租吏叩關哭長清李處士先生德學巳經年此日人傳地下仙細草春風虛講席孤燈夜雨罷吟氊門傳通德推前輩家有藏書啓後賢惆悵諸生齊灑淚太𤣥墳舍在寒烟布政使錢公奐字文奐紀善公安之曾孫也以進士授户科給事中出為廣西參政公狀貌魁岸善方略為治多赫赫名吏民有寧欺翁不可欺錢公語在官常詢民所疾苦期必療之柱節所經雖隤崖急洑地極荒側亦無不至時義寧賊起衆議轉輸為憂公請以銀給兵使因糧于賊議者為詘潯洲老藍賊起公身馳入其寨以片言定之土官岑豹羅文愈相搆訟並與宣布德威遂帖然諸蠻性悍不可化或更猘突為亂公即立率所部卷甲趨之諸將多却顧不前公獨出竒奮擊卒破賊其後廣東有變督府知公善用兵檄使督陳公隨提兵赴召朝廷旌其功再錫文綺一增祿擢湖廣布政使值大旱公疏請暫停造紙以蘇民困詔可其奏服闋再補廣西民相賀曰不圖復見錢公也都御史韓公雍征大藤峽適嵗祲軍需不得應公至措置得宜上下充給賊平決遣所俘獲無罪甚衆公自諫垣歷長二大藩踰三十年所在有竒節生平監于知足遂力乞骸骨歸里日著詩文自娛凡里中世家叙傳多出公手垂老慕攝生之術以髙年終于家蕪湖登漢妃廟性癖貪竒暫泊舟坐披片石瞰中流雷鳴浪底擎鰲骨雨過江心見佛頭萬頃奔濤翻日月一杯薦食老春秋至今遺事傳昭烈蜀水吳山共結愁九日帶雨零沽酒半觴西風蕭瑟動宫商籬前對菊醒醒坐竹下煎茶款款嘗髙興獨嫌山不近閒情猶喜日偏長明年此際開懷抱移傍雲崖結草堂工部張公愷字德和以大學生選知江陵縣遷工部主事出知常州府命下而卒公始知江陵王府校卒見令常坐不起即啓王杖而遣之王所為不法公白守曰吏不得繩王以法宜密聞于朝請上治之遂與守列上其事朝廷察其言審遂廢王終身民快之太守未嘗以屬吏待公常呼曰大令時朝命督府征交趾兵過守令無不遭譴者道江陵公以鼎肉餉軍一軍盡喜督府奇之欲試公倉卒日晡時以令牌立取火爐及架數百公即命木工以方漆桌鋸半腳刳其中置鑊然火又取竹束火燎數千即盡收民家􅓗簾立應之又取馬槽千餘公即命匠併各户婦人用綿布縫成槽綴槽口以繩繫木樁張其四角飼馬良便卷收軍中遂足用三事俱取辦倉卒督府嘆曰此真應變才也即奏為參謀寢不下比去官江陵民為立生祠遷工部主事周文襄公撫南都常以户曹從督運特奏公同行每至州縣輒以張户曹不可犯告之松江守以美綾三百匹置舟中來迎比公登舟見之悉以綾封庫欲舉劾太守肉袒謝得免由是守令俱自重犯法公性精于吏治臨事機張鍵閉即有伏姦目指取必盡得其隱雖豪大猾俱斂手莫敢犯治獄無繫囚稍積數人即立決遣之從子參政琦所論著公事最詳昭君曲出關篳篥更頻催隴水千年去不來若作從軍一蕩子猶能生向玉門回都給事中毛公𢎞字士廣少禀至性每讀書至古忠臣烈士輒抵掌自喜中進士授刑科給事中歷九年進都給事中公在諫垣時言論激昻天下望其風采凡關時政得失廷臣有邪正輒直言無所避上每見公疏輒曰昨日毛𢎞今日毛𢎞然終用其言翰林章懋黃仲昭莊昶以諫鰲山忤㫖廷杖謫外公抗言三臣出自草茅初居史院能不顧其身敢言直諫此真盛世事乞復三臣原官先是翰林羅倫亦以論李賢起復被貶公言之益力謂倫不足惜恐天下將以言為諱遂得㫖四人俱改官南京㑹慈懿皇太后崩上命議祔葬禮公首具疏曰慈懿皇太后為先帝配為皇上之母慈愛兼至今燾終後自應合葬裕陵居左皇太后萬嵗後居右一體祔廟誠合天下萬世公論今上諭謂于聖母有礙當在裕陵相近擇地安葬臣等肉顫心驚不勝鳴咽皇上奉兩宫生事如一不應于其身後别而二之皇太后即不從當再三幾諫無陷聖母于有過之地且深恐天下或有竊發以正名為詞則禍將不可言臣等敢以死諫由是太后亦開悟上即批答曰所言俱合朕意遂得祔葬如禮公直聲益震太后欲識其面垂簾見之宫人俱呼為毛秀才時有上所幸臣望一見公數使客致意公但答以將往竟不與通前後執諌十餘年上方大用公㑹中疾暴卒天下惜之揚子寒潮送陳都閫文渺渺來京口蒼茫接逺汀寒聲隨落月流影帶疏星楚樹遙村暝吳山隔岸青夜深舟泊處欹枕若為聽參政章公鋭字元德章氏世為德門公少受致和先生家訓以進士官刑部主事進郎中公善持律過老吏嘗審録河南陜西山東江西諸大省獄多所平反有中貴人橫甚欲奪煮鹽利因搆諸商家罪所連數百人公直其枉盡遣之出守鳳陽㑹宿人有聚為巫者吏捕當以反送所繫甚衆請械逆京師公獨曰是罪在左道惑衆郡縣所應治即日誅其首餘盡杖而釋之孝宗即位公應詔陳十八事其論天下時政所關八條鳳陽軍民利病七條多議行㑹修皇陵公裁損冗費一不擾民嵗旱蝗復疏蠲常稅三之二遷湖廣參政至官革私鹺節諸靡用撫恤流亡禁岐府官校不得强攫市物數拒中貴人橫請衡州新建雍府公為程督省工費巨萬值錦田苗獞反地最瘴癘當事俱憚不行公獨提軍將發衆泣止不聽遂設方略以單師深入平之公竟身冒霧露尚力疾行至臨武顧謂從吏曰某事某事猶未行即絶至死不忘國事聞者惜之送友人之任聊城聊攝層臺古江山接上都君行陳六職民樂佐雙鳬春雨花明茯東風酒滿壚相看歌别調日落照平蕪題畫洶洶驚濤拍上流荻蘆深處暫維舟若翁非是忘魚者直待風恬自上鉤都給事中章公鎰字元益以進士選為翰林庶吉士遷兵科給事中彈劾無所避時妖僧繼曉以術得幸常迎至宫中妃嬪以下俱膜拜受戒王公勳戚趨候其門公憤然曰此國家大蠧也吾當以死諌即極言其邪教亂俗乞正法以肅朝廷疏入繼曉寵遂衰公直聲震于朝遷都給事中論列益力權貴俱為斂手時同里毛𢎞與公同在諫垣並有重名京師為之謠曰毛黃門口章黃門手毛章在朝神驚鬼走其風裁若此後威寧伯王越鎮邊多殺麾下首級邀賞公摘發其奸及越在京營虧耗卒伍復連章論之竟為所搆遂挂冠歸里唯以詩歌自怡遺集藏于家癸卯嵗抵寓崇文門平曠猶郊外清深即瀼西亂蟬鳴樹急佳果壓枝低靜坐時捫腹閒吟或杖藜知心有良友枉駕路多迷御史金公洪字惟深中進士出知靖江縣嵗餘縣大治以才徙知吳江靖民為生立祠吳江號為難治有勢家橫行賦役繁閭左罷于奔命每占一役不破碎其家不止公嘆曰虐政有甚于此耶乃痛抑豪大家為民分其役與裁濶狹節冗費嵗所減米緡數十萬民力幸蘇其輸租更以最吳人德之生子多以金命名當道為請于朝頒其法通行州縣每六察至吳江獨無平反怪問之太守曰吳江令故善教民也適嵗屢飢吳民留公至七年擢監察御史出按陜西行邊條上地方便宜奏免大小文武官數百人墨吏俱望風解組去時有以車載冠之謠公名大震再按山東適有二巨璫出選婚勢焰張甚所至索饋獻動千計公乃先發一檄盛稱二使亷正有司宜遵奉不許妄有科率損使者亷名所在張之探璫所向輒行部按其後竟不得肆又勢閹多以家人冒充勇士侵月糧公奏請嚴革月省糧數千石前後亢抑閹豎逆瑾不能堪為揭其名于壁先使人諷之兾以賂謝公不答瑾怒益甚㑹公出知松江府乃誣公在官所解布惡械至京然公實無可罪得釋遂卒于家父亮官武庫郎中子朴亦以進士官職方主事三世並由甲科起家有名題便面釣魚圖楊栁沿堤緑帶舒小舟趁月泊江墟遊人莫誤垂竿意不釣浮名自釣魚林長史桂字士英以明經訓導舒城金溪二學遷遼府紀善右長史致仕性篤孝友善色養嘗構小亭以娛父植槐為䕃其樹槁而復生人俱頌之兄華得危疾為涕淚求醫果得異人授方一劑即愈其為人淡泊少欲得年八十八南旺湖即事遙望南湖浪拍狂曉烟迎日半蒼涼帆前水草疑無路䄂底風花别有香繞舍初逢蠶上箔隔村又賀麥登場郊原頗洽清和意醉倚髙歌似故鄉錢副使瓚字延佑以進士出知潛山縣改知青陽俱有治績歷遷至廣西副使嘗行部至梧夜夢婦衣裂麻持牒哭訴于前心異之梧有王姓者以毆死初謂其兄殺之妻刁氏更訴其姪罪未定而刁死公適鞫繫囚至王獄按牘兄年六十長于弟二十年公謂六十人力衰不能毆壯者至死是必姪殺之一訊輒伏乃悟夢中婦即刁也公論疑獄率如此及解官槖中無長物家居四壁淡然也嘗自號恬菴所著恬菴集藏于家古木直幹無枝葉凄涼古道邊忽疑人獨立遙謂劍孤懸風過無松韻春回失柳烟止堪吟作料助我筆如椽宿羅舊驛刳桐小小渡溪船溪繞山程半野田清濁鳥聲叢翠裏髙低茅屋亂峯前尋芳眼底無窮蘂聎逺林梢一抹烟自是寸心圖報重敢言勞勩未安眠知縣張公伯祥初名瑞以字行號西畦元末其先人避地髙麗還里人遂稱為髙麗張氏公少嗜學有大志嘗上書太傅屠公少宰楊碧川先生論科場之弊為時所傳已舉于鄉謁選授知蕪湖縣有巨商犯法夜餽千金公却之曰為吏若得人一錢即不值一錢矣竟按其罪尋改知靖安公作省民條約與相清淨縣中大治乃築喜幽亭當衆石佳處引賔佐觴咏其間自作亭記在官六年將入覲聞逆瑾擅命遂悵然解組歸里公天性孝友事父色養備至兄弟四人雖一果片脯必與同味食指約五十餘門無異烟既而故宅漸不能容乃别于宅南築室與諸弟奉父以居名曰雍睦堂里人遂更稱雍睦張氏父卒年八十八公哀禮兼盡晚年惟與堇山李先生堂葺齊袁先生孟悌常相唱酬所居齊曰西畦書屋因稱西畦先生張氏至今多賢者公後人曰汝翼與余交最善雍睦堂成次陶公田園居解組迅歸棹翛然抵家山兄弟喜無故嚴親樂髙年未堪逼市栖非徒比顔淵幸兹長川隈負郭原上田經始結吾廬樹扉古陌間種菊成籬落芙容照簾前初釀已可漉厨炊發新烟但得豫親色華髮任在顛心遙地與俱松鳬共閒閒俯仰終宇宙勞生信徒然泰州道中烟波迢遞獨乘槎風景蕭條一望賖楚語逢人千百種茅檐到處兩三家蕪荒漠漠緣崕路菊照離離夾岸花記得文山曾此過西風回首意無涯按察使陳公槐字公輔生有異質體文弱然善方略喜身任天下事慷慨由進士知松溪縣入為刑曹出知武昌府奏治行第一以患痞乞休歸里居二年再用薦起知撫州疾復作力請告得許而宸濠反報至郡東鄙盜王浩八先受濠金及馬約為內應是日即嘯聚人情益訩訩公已在告五十日丞久攝事家人趣公曰可以行矣公奮然起曰國家有急若以解官為辭臣罪當死即出縛濠使斬之手焚僞檄于通衢是夜發兵襲殺浩八濠游兵遂不敢復南時郡縣意懷觀望尚稱寧王公移檄斥言逆濠倡亂神人共憤凡知人臣大義宜共戮力即請都御史王公節制願為犄角㑹王公巳檄㑹諸道兵討賊公遂更募義勇四百人率所部馳赴軍門而王公已破南昌城次日方發兵迎擊宸濠湖上而公適至即用公為領哨官復密授方略使潛分所部之半設伏黃家渡八字腦諸處及前鋒既交伏兵呼譟並起賊遂大潰公陳擒首賊瑞昌王拱枅將軍覲鋌等七人斬首三百餘級又遣公提兵轉戰沿湖諸處遮截宸濠所俘斬千餘復九江郡撫其民事平王公身獻俘至浙時公巳遷江西按察副使尚留在軍而王公更奉命還撫江西謂惟公可任事使押發宸濠詣行在公至留都獻俘面奏目前急務宜表死節録遺功寬脅從恤民困上嘉納之時公泊舟江上太監張永夜遣少監王文招公過其舟密語曰上欲得內外官交通宸濠姓名吾已得其籍猶未上事當若何公力陳其不可謂史載光武燒吏人交關王郎書使反側子自安近日李文達公奏請內外官與曹欽通者不問此俱聖主賢相事上宜逺法光武公宜近學李文達為萬世所頌若此事竟行非但禍延天下即公亦身為怨藪將悔無及矣次日永再招公軌手曰夜來思先生言誠大愛我即盡取篋中交通書籍對公焚之惟以錢寧陸完六人名上公復進與永言羣小導上至欲航海觀普陀且聞聖體違和嘔血者三此誠可寒心太皇太后命公扈駕正在今日公宜力勸上回蹕此萬世勳也永乃以危言脅江彬輩上遂班師值辰州苖反改公湖廣兵備上念公勞使扈從至京將用之未果㑹上崩大學士楊公延公至室中曰久知公才煩為議遺詔所當行公為條列八事楊公復不果用公亦疾作引歸而御史楊材者初為公武昌屬吏有宿憾乃論公前在郡觀望坐落職嘉靖初録平濠功僅得賜金綺胡公世寧伍公文定前後力宣其功于朝王公再辭封爵疏亦極言其事有曰諸臣聞臣檄召提兵而來甘粉虀之禍蹈必死之地忠義顯然可見今平難以來羣憎衆疾或虛受升職之名而因使退閒或冒䝉不忠之號而隨以廢斥曾無鳴其不平者公即其一也已而王公亦被人言事竟不直公里居復二十年以宿疾作卒于家年八十有一初公起知撫州道遇章楓山先生曰公此行恐功名損于平日公曰先生意謂寧藩耶但彼今挾天子交結中朝脅人誠難與亢若一朝犯順則豫章怨民俱其敵可不煩四方兵也公至郡知宸濠待開府大臣漸不以禮即密啓勸孫公出巡旁郡集糧厲士馬以防變孫公不能從及公起兵大學士費公致書奬公倡義尚以時事為憂公答言撫軍王公才略絶世天遺此老以拯社稷之難公無憂也後俱服其卓識公居鄉數為里中興利里中人為公生立祠奉嘗不絶咏蛙井甃秋水清不論公私鳴坎窞未平處還須聽爾聲知沔陽州楊公茂清字志澄號芝山父碧川先生年四十五始舉公自兒時即嗜學步履如老成以父任為鴻臚丞大鴻臚劉公數稱公曰任子自有奇此唐裴李宋范韓後人也公在散曹歷九年祿入甚少乃以月奉所積計口畫日而食之不溢用一錢秩滿出知貴池縣池濵江使傳驛絡民好訟最號難治公至相土俗所宜稽故牒為去民所不便期月間上信下服遂大治時涇縣有王瓚者負青陽富家周鑑錢欲陷之乃養一丐婦于家及鑑索錢婦死遂誣鑑殺之守令俱以周富家避嫌莫為白御史檄公往治公亷知其情乃瓚門有溝隂易朽椽為橋俟鑑至驅婦出與爭墮橋死即婦不知也遂定瓚罪鑑得免石埭一楊翁生二子長子有子曰標次子死而其婦與僕奸翁逐之僕復潛至其家翁指為盜撲殺之是日標在青陽為所親夀置酒而僕家控謂標所殺繫獄翁歷訴標在外身當伏罪俱不聽復檄公治公復偵得乃使標具言青陽酒坐客姓名盡逮至入訊使各在一所每一人入輒使言客何人若出一口乃斷翁出錢收埋釋標出後三年公道經其家盡室男女出羅拜且攜一小兒告曰此標出後所生也非公楊氏斬矣縣中王武與劉廷璋相結為奸一日廷璋懷僞金過武家武謂其果金也醉以烈酒殺之使其妻共舁而沈于江公訪得坐武死吏謂其妻應從坐公曰婦人惟夫所使且吾憐其兩兒俱褓也銅陵諸生胡𢎞緒有才試輒髙等㑹其僕挈家走潛跡所往縛詣縣而僕巳得疾死獄中其家人控胡生遂被繫不得白御史亦下公治公詳鞫之謂生縛其僕以詣令非私治也僕背主應得罪且巳先有病遂原胡生公念鄉試期迫即夕具獄牒以上胡生隨出是歲舉于鄉其辨寃獄釋滯多類此由是御史臺監司檄委無虛日在縣未常得暖席旌舉凡十數六年遷知沂州諸部使者聞之嘆曰豈有美如貴池僅得薄遷耶去之日惟敗橐數事圖書蕭然傾一縣人出送無不泣下者在沂一年以才徙知沔陽復三年其奏治俱如貴池時公性淡于進取遂力請老歸家居恂恂然身敦至行比于萬石君與戴南江諸老為耆㑹日相唱酬年至九十猶手抄古今野史叢談里中先輩詩嵗必滿篋諸楊推為祭酒焉河間道中遇童用中口占一律客思悠悠未得除金陵翹首二旬餘沙飛古道馳羸馬水溢低田捕小魚休向驛亭貪駐節早趨殿陛聼鳴琚前驅忽報童司僕喜得臨岐一寄書參議聞公澤字美中以進士授兵部職方主事武宗欲南巡與同官黃鞏陸震等泣諫罰跪午門五日杖三十人俱為公惋嘆公曰人臣為君父死其分也惟聖主感悟是望餘何言宸濠反贊大司馬區畫功居多嘉靖改元進諫南巡者官一級再遷車駕郎中掌畿內武選杜絶請託名赫然出為江西參議便道歸里卒于家公性篤孝友待族黨俱有恩性沈靜平時恂恂然遇事立斷不可奪居官志在仗節死職下朝論深器重之寓寶巖寺答張常甫先生暫將踪跡寄招提碧水青山意與齊讀易不知枉駕至開簾已見夕陽西鷓鴣聲滿前門栁松火烟浮隔澗磎坐頃先天論未盡重期相過與然藜知府葉公應驄字肅卿生而丰骨堅峙卓然若山立步履俱中尺寸為人尚氣節不肻齪齪與世俗相依阿少讀書潛觀默解務求合于注疏之外正德中舉進士官刑部主事善執法㑹上將南巡公與同曹伏闕諫罰跪五日杖之朝瀕死嘉靖初稍遷郎中有相國子用勢為大姦中罪繫付公論論如法無避甲申議大禮公復與廷臣伏闕諍下詔獄又杖之朝又瀕死給事中陳洸者潮州人素鴟張無狀橫虐其鄉御史戴金張日韜藍田奏發其奸六科十三道復合疏盡列其慆酷敗倫納叛諸大不法詔遣刑官往按時洸方以議禮媚附張璁桂蕚諸人相朋結諸曹俱顧縮不敢前共以屬公公即應詔而南牒御史臺藩臬共論鞫凡七訊而獄成遂具上置當大辟其鄉人有手搏猛虎潮民得所之謡秩滿出知吉安以內艱里居而洸覆出反詆奏訊官桂蕚力從中為辨遂逮公問公荷械言笑就道及廷鞫諸權貴俱相折辱至不堪公不稍為屈大聲曰驄故法吏也所持國三尺耳諸公必欲直洸枉驄任為之其如國法何如鬼神何是日黃霧四塞次日大風拔巨木有詔從輕擬竟坐公按獄不實罪落職為民無何洸復橫詆奏意必殺公霍韜益力主之乃竟謫戍鐵嶺衛得命即挾室而行衛故絶邊控弦時出入無常開府諸君聞公名每延致上坐問䇿公輒為籌畫決勝其遼左諸生亦執經日集門下公欣然忘其為萬里戍也㑹以赦放還再值覃恩復其官卒于家公生平執大義撫掌論天下事慷愾值大變猝驚才智人不敢吐氣公獨毅然任之指揮可辦自身瀕死者數矣而不撓不悔為國直臣然竟終老里門未竟其用論者惜焉遊天童寺賞心隨處物吾偕上已登臨景更佳猶喜山僧能雅淡不妨詩客共詼諧杯盤狼藉三更月詩墨淋漓萬仞崖擾擾風塵渾脫擺相將身世到無懷翰林王介塘先生相字懋賢生資性絶人復嗜學博綜古今嘗授徒髙錢山中每夜灼一燈誦不輟飢即拾蹲鴟火而啖之或竟夜不寢鄰人俱厭苦之不為止中進士選為庶吉士讀中祕書愈自勵茹苦若寒士遷編修以議大禮逮詔獄竟死杖下年止三十七公豪少尚氣節然處家庭間更為和易性篤孝諸生所上束修盡以奉親無私毫入私室家貧屢空怡如也為文原本六經而才更橫溢時馳騁莊列間每下筆盈紙雖宿儒先生望之無不辟易學者稱為介塘先生題松崖書屋圖崖松何蒼蒼下護幽人屋夜寒不作聲為讓幽人讀知縣史公元中號鹿泉家貧少牧牛田間喜讀書長益慕任俠善射酒酣橫長矟賦詩人皆以為狂先輩或勸之曰以子之才但稍治經生業得由甲乙科起家異日立功萬里未晚也公乃出應諸生試舉于鄉再上公車即謁選靖江學教諭兩應湖廣四川聘典鄉試稱得人遷知魚臺縣縣故瘠瀕河嵗復大祲盜賊多有簡瑞者為盜魁善運矟馳劣馬出沒方輿道上莫可踪跡公亷得其親信授以計縱之一日遂縛簡以獻簡卧庭下張目曰吾左手持矟右短兵橫行千里間今為書生掩取天也公笑曰汝輕書生耶即起著短衣持其所用矟運之左右廽旋如舞匹練庭中忽􅒂然矟斷為三擲示簡曰汝矟豈足用耶簡扣頭稱萬死公繫之獄至冬月將論決簡求見公曰身亦山東男子不敢負公乞假十日一生别老母公即縱之去衆皆懼及期先一日簡就獄離魚臺三十里為獨山大盜劉儀久嘯聚其中有衆數千開府曾公銑議進剿以公才屬為前鋒既擇日陳兵禡祭畢公知獨山有諜者在軍乃命植一竿百步外公手張矢誓曰某以書生任將兵若一舉滅賊當三矢中此竿時萬目齊注監司諸將俱色變公從容三發三中呼譟震地是日公即察得諜者三人釋其縛賜以美酒食笑謂曰汝來觀吾射耶諜者鼓栗盡吐賊虛實及所入獨山徑道公立提兵襲其寨擒劉儀還曾公大喜手書平寇第一功相贈方論薦公㑹曾公遷制三邊奏復河套即檄公同事監司以大盜初平留公不果行三年入覲值曾公為相嵩所害赴市公喟然曰事尚可為耶即日挂冠歸里當軸曲留之不得因盛供張共祖之都門時年四十二家居復四十年性喜奇山水每極游竟月忘返守令思一造見公不可得老益貧惟賣文以自給所著青蓮集三十卷尚鈔本聞盡為吳中某薦紳所得刻為已集唯余家藏公詩一卷適史氏修家乘就余家寫之秋思世事吟邊改流光醉裏過嵗收頻下下公賦益多多有乃窮漁獵無憂隱荔蘿康衢終及見擊壤續堯歌幽懷無可寄何處起𤣥暉試問驅華轂曾如入翠微霜清山有骨雲薄石無衣盡日風搖棘誰家白板扉出東新關十年兩度水雲東三徑非無舊菊松客夢入秋驚落葉交情計日候晨鐘扁舟暗識曾來路短劍長隨未定蹤試問尚平家事了幾時杖笠許相從午次楊湖豁目烟波氣乍蘇舟人指㸃出揚湖風無力處櫓聲細日到中時帆影孤碧落知晴多鸛寉滄浪入逺只菰蒲蕭然一葉浮空闊不獨波瀾是畏途農舍布穀聲聲呌脫裩一犂春雨緑楊村年來底事催租吏未到秋成夜打門太子太保先少峯先生諱生威字亷甫鄴嗣曾大父也年八嵗時從侍御公過淮上客有訪舟中言及河工公侍側即論治河本末歷歷畫几如見客大驚稍長益讀六經諸子唐宋大家集各數百過至二十一史古今典故諸書俱覆覽數四所學博而更精一時宿儒盡出其下以太學生中應天鄉試謁授鳳陽推官郡故湯沐地城中有五髙墻所𨽻州縣凡十八最為劇難治公至申條教約束法在平而必行前此理曹有胥史五十餘人公曰滋禽傷稼滋吏傷民即盡罷其猾舞文者裁留重訥十餘人足給事居郡一年中都人愛之若父母故事御史出按部必使理官巡前屬耳目理官入謁御史屏左右出懷中劾耳語移時出以故州縣視理官常側目望風迎餽恐後公心惡之獨盡卻不受即有所彈治對御史顯白其短不肻作呫囁語以此所在稱李公不置公為人簡默飲酒不勝杯杓與郡太守張君齊雲同官交最深張君年少美言詞日召客燕集酒行百觴然每置酒非公至輒不歡常曰李公雖不言不飲酒然客有李公遂若真氣滿四座未幾張君以遷去别公留連不巳代到日董君其人毛摯深刻用法酷公數持不可反其獄董君積憤憤不平日夜詗公隙無有乃造為蜚語謗公公嘆曰蝮遇手則螫手遇足則螫足吾家有薄田可耕乃與若曹角勝負毋為也公有弟曰生文為鳳陽衛參軍即日兄弟並移病乘柴車行郡中爭出祖道騎轂數十里賢大夫為賦鹿門二隱詩公家居亷約每種瓜則食瓜種豆則食豆未嘗重味一葛冠褐袍十餘年時里中張大司馬操文柄嘗大集郡中名士客俱盛被服雍容公攬敝衣直上坐既罷門外車從交錯獨公從一髯奴屩而别張公目送久之曰此真長者客也卒年七十五以孫橒守貴陽功追贈太子太保兵部尚書奉挽大宗伯逺峯汪公大星昨夜霣三台黯黯重雲翳不開罷市尚聞行道哭輟朝深動至尊哀千年已託山阿體一代今論燕許才惟有感恩門下士重披劍草為登臺贈葉栁沙司理昔聞楚郡歌神父今見明州效楚歌日出丹山開麗照月明鑑水靜微波決平張尉無今古積德于公孰少多欲借侯君還一載黃扉久巳待鳴珂刑部邵公城號守齊隆慶中進士授興化府推官舉治行第一以與當事忤稍遷同知永州府值鄉試公為同考官時江陵相國子赴試主者遍屬諸考官録其子公獨執不可及公閲一卷心知為相國兒即大勒數行及他考官覔得見已被抹乃止出闈遷刑部郎至京而江陵巳聞抹卷事大怒將中公危法公度不可久居遂拂衣歸與同里屠緯真儀部日觴咏為樂緯真心重公為人其交甚歡晚年共栖心要道公竟老家居不出士論惜之歸里中自咏呈屠緯真儀部九衢不復上長安歸養湖南竹數竿色染檗絲栽野服香吹藤葉對僧餐閒尋入翠成私路幽夢隨花繞藥闌從此脫然辭世網故人相見有餘歡甬上耆舊詩卷十三

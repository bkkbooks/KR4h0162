body:
  text: 甬上耆舊詩卷十八監察御史胡文學編太保余文敏公有丁公字丙仲為諸生家貧然營葬其父地使前可列碑亭石馬植數萬松既得地在同谷因號同麓子嘉靖壬戌中進士與吳門申公婁江王公廷對俱一甲三人並入相前此所未有也在詞林每值制草曰奈何以王言佞人且私其賄辱國莫甚焉因謝客不納一物初公童時嘗遊崑山求執經于震川歸先生之門先生屏不許至是公充會試同考手一卷曰是必歸先生文也失吾不收歸先生老車上矣及發卷果歸先生海內文章為之一變歷遷吏部左侍郎掌詹事府江陵新歿以禮部尚書兼大學士入閣辦事公枋國在重臣當軸後意在休息之浙兵為亂少司馬張公出撫浙造公問計公曰此窮獸也不善處之且致死中州徐景星為人有機略舊領此軍今失職待事薊門但挾其人以往即指揮可定矣浙中竟平及江陵事敗論者猶搜剔不巳至有摘舜禹之事以搖上心太宰楊公持不可言者譁然閣臣亦俱引去公獨入直密疏曰言官可任孰與諸大臣今以一言官故而使諸大臣求罷非盛世事唯陛下降手札慰留以示殷勤使大臣得安庶人心定國事明也上即從公言人謂此回天力也未幾以疲卒于京邸入相不及三年公素達生有髙世之志喜訪故鄉佳山水所居一日必使亭館修整樹植蒔灌俱得其宜初以南學士乞假歸里買山東湖中剃草得一古洞口以杖叩之音鏗然為爇火入洞則谺然乳四垂千年伏翼觸煙而出乃披道抗丘為湖居更依洞門築一臺受湖光淡蕩時泛小舟往來起白鷗莊在水口每四方名士至輒相延接與極遊湖山佳處既載肴觴兼攜絲竹唱咏傳一時江左風流自許謝安王儉至今臺基榭址尚有存者追溯盛遊蓋不勝今昔之歎焉望岱岱山望不極望望雨中滅雲送近山來風吹微雨歇前村樹若薺逺溆洲如月林花紅欲然澗草香逾烈蝶翻間過幔鳥鳴偏近轍旁矚萬象妍遐視千里豁何異樂遊原矧乃清和節不憚衝泥行泠然清興發寄辭宦遊人隨地可怡悅偶述嗟余負幽癖思凌九州外一朝向中山風吹女蘿帶以此激孤懷喟然志彌邁况乃陽春滋韶光遍巖瀨湖波明樹間石色含煙媚開尊近魚鳥賞以崇深會拊化契冥詮孤往復奚礙抗手謝故交飄然脫塵籟五日曉霽山行早出驛東門仰見朝日暾曈曨初旭忽明滅四山尚帶雨餘痕草際煙浮濕不見亂雲巳散俄復屯堤邊弱栁低不舉沙上輕鷗飛乍翻劃然風回霽色開山勢回合來如奔繇來山靈為我邀芝駕故遣雨師灑潤清郊原不者昨晴今却雨倏忽之間變朝昏明晨日觀峯頭宿將披若木探天根豫在告李孝父枉顧半月疲朝謁深慙侍從年悔非知已少愚肻受人憐司馬貧為病嵇生懶自便歸家無不可猶喜及春前阻風黃河寄柴方伯黃河愁欲破落日亂啼鴉岸折疑無路春深不見花塵沙迷賈道草色沒人家北望長安處那堪老歲華兖州逢遊使君沫水接天平回舟兩日程茒茨周俗舊邑里禹王名天逺低垂野沙明曲抱城宦遊真足適到處有逢迎送張崌崍客行新霽後曙色啓城頭曉徑穿雲濕春塘帶雨流江蘺牽客思山鳥唤春愁底事新芳歇王孫不可留城南泛舟躡屩城南出人疑谷口耕川原隨坐得雲日並舟行世事看羅雀幽懷屬聽鶯會當投白社此地學無生途中春日褰衣問翠微春郊無地不芳菲梨花雪濕白欲碎草色雨餘青乍肥天末煙霞引前斾道傍蘿薜上初衣翛然頓愜區中賞此日抽簪願不違别湖莊年來屏迹大湖濵共説先生隱是真此日忽隨青雀舫逢人不製白綸巾煙霞應解牽行騎猿鶴終能遲主人無奈驪駒催物役野心仍自戀湖春舟中懷張李二山人歸山半載又辭山小桂茸茸不可攀欲伴漁樵今未得相從麋鹿爾何間天涯蹤迹飛蓬外歲暮隂陽過鳥間倚棹不言思往事傷心容易二毛斑即事夜分綾被春寒重曉際花磚日影無通籍未嘗關請謁上書何必乞江湖聖朝無闕堪焚草清署何妨獨據梧騎馬人誰題尺牘閉門吾欲著潛夫太師沈文恭公一貫公字肩吾别號蛟門隆慶戊辰進士選翰林庶吉士授編修歷官掌詹事府禮部尚書遂入直東閣纍加少師左柱國吏部尚書中極殿大學士凡入相十有二年為首相八年年七十賜老歸里家居復九年卒贈太傅諡文恭公建儲功諸相業俱載國史不具詳臧氏曰戊辰史館大拜者七人以詞章擅名者東阿鄞縣為最東阿之學殖優于鄞縣鄞縣之才筆秀于東阿余嘗讀公全集為溯其所本蓋公少與余君房同研席族父嘉則先生名最重公嚴事之稱為句章公嘗曰吾學文于君房學詩于句章公門中指授同學切劘俱深得其傳而公詩更為獨絶蓋公才實過于君房故不煩句模字索勞其意匠而蒼然作古遂直掩農丈人設以公之才解其詰曲導之蘇暢如良馬下峻坂而緩轡中衢一何樂也惜夫其僅于農丈人也若嘉則之詩渾涵博麗吐納古今公才既與相當而更能出奇于其間嘉則如大山長河而公益以崩崖飛瀑嘉則如茂林修竹而公益以竒松異草故其所造幾出于藍至公一生學問及歷年相業讀其詩輒放􅜜見之每當老氣橫厲顧盼自竒斯誠魁然一世之豪也前輩謂如幽燕老將氣味沈雄足冠詞家之首此可與論詩矣將進酒丈人解嚴顔四座且勿喧生不逢王子期一日難知何稱百年填胸磊落如丘山不飲安得遊神仙羅珍瀉玉聊自憐大罌小甒翻踏天天有酒旗地酒泉虛蒙其聲人尚傳桂精一月不兩圓白駒行地不可牽去歡居憂生實憐君馬黃君馬黃我馬蒼遊龍尚不顧飛鴻飛兔何言良神龍失雲如跛牂騰蛇委霧鱗角亡請從櫪下居無厭糟與粳有所思妾亦有所思君亦有所思妾思在地終不移君思如天安可知雁往燕來接栖江漘寄書零陵還謝主人誰能長仳􅍣誰能長鬱陶白日不回照焚心擲山椒長歌行肥豕不如瘠牛貴官不如富醔少病不如老健生勞不如死休悲歌乎斗酒不澆百憂短日不給長愁胡不歸來海頭東日正照蓬丘擬秋胡行物情無象物初懸可知物情無象物初懸可知賢人逢殃將德猶虧嵇公雖仙栁惠吾師人間難工天上易居歌以言之物初懸可知天地皆實人處空虛中天地皆實人處空虛中實下為土實上為風間風間土呼為壘空動而有神變化無窮歌以詠之人處空虛中謂柔非沈謂柔非昏昏謂柔非沈謂柔非昏昏非脂非韋莫然無魂不驚一羽不飛片塵欲平躁息渾渾沌沌歌以詠之謂柔非昏昏王可交餘杭母酒壺公藥賣藥買酒自斟酌四明山心去復來一往逍遙竟何託當年漾舟趙村好青玉案前栗如棗黃衣送我落青天瀑布當門坐秋草三月三日九月九一日辭家家在否今來又是幾春秋直得先生幾杯酒隴頭水秋風揚白沙夕露生寒芒鳴鳩化為鷹結束從軍行天地判區夏一水猶分張嗟我異域人何年共衣裳搗雪團作餈滿腹冰與霜巳對隴頭水誓言死異卿塞下曲長劒夜生光照耀兜鍪明鼓鼙一傳響上馬如流星萬人皆敗死一身何用生平時訣妻子此日殉弟兄嗟嗟幽并兒白髮難得盈閨思二首不省蘼蕪草惟看豆蔻花歡歸白門外猶自夢天涯四月梅子生莫打青丸碎五月雨中熟與歡共滋味古别離雙魚渡江來聞君在江都乃怨山川長能令歲月殊君處寒梅開妾處啼鷓鴣一語才相聞數月為須臾向來綺窗下一唾真一珠白頭吟兔絲附青松松髙絲亦長何意秋風來委蔓隨飛霜海行無信風春行無信時瑶軫曾誤人勿復欺新知事君以紅顔期我以白頭有夫莫令客客心不可柔相逢長安陌行少為園林主老作園林客積塵暗成丘積時暗成昔别君穆陵橋逢君長安陌星霜形貌苦陵谷姓名易故山虎牙紅世事烏頭白長鋏何所彈短歌竟誰得春耕不及南秋戍翻投北鄰女怨寒機健兒摧暮笛豈無他人憐終乏扶搖力積雨懸枯燈嚴霜踏穿屐貧交顔自冷賤語意空寂爐頭值羽人為余論雲石茙藿不得充何能待靈液貧女行三年成一葛五年成一絲絲比白玉纚葛比黃金緌何乃貴如此縷縷手自治服登君子堂六親競來窺不道新人醜盡道田家宜日入歸曲房拂拭架髙椸通宵爇藜火手疊成四規床頭文竹筐匙管常相離自非歲時屬不識陽春姿寧為篋中陳忍作身上緇室中復長女行當治歸資短線綻故縫顔色不改渝家貧無織絍持此申佩褵方領曳長袖濶略無所施須憐辛苦作勿嗔時樣非如母藏十載時來未可知嚴子陵漢帝思故人迢遙夢明月清晨題十行五道使車發卧邸呼不起攬車嗟咄咄偃蹇中宵足留連舊時舌客星猶在天肻為曹官屈至今七里灘潺湲足怡恱所以馬伏波一見真主決投彼交讓冠樂來就簡脫古道信濶達難為後人説雜詩吾聞軒轅帝膝行上空同一當廣成子與物遊無終至陽奮黃墟至隂出玄穹變化超象外睛天飛玉龍萬靈朝甘泉一往空後宫已無首山金但聞烏號弓精英不可扳髣佛如夢中止水鑑毫髮流水迷圓方稚齒讖幾先病骨知暄涼谷虛響乃滿天寒月有芒靜虛道之極至柔化為剛君平有明誡強人不為王晨凌地肺頂髙歌露晞曲人生有去來此曲無離續少殤人所憐老歸子亦哭老少既同哀修短亦齊促豈知蚿憐夔一足吾亦足太虛騰圓暉扶桑晰初目炘炘露海竇赤霄坐相燭九關忽啓籥衆星曠不屬是時稚春啓輕寒散中谷黃鵠何所挾雙翅兩寒玉萬靈朝昧爽駘蕩復何欲蒿目憂世資置身鼎鑊中鼎鑊未及然豈不膏微躬位髙衆所指一雀隨千弓不能早決起徘徊弄春風彈石巳在身啾啾哀鳴空達當威鳳翔窮當逝冥鴻粗糲足再餐人生樂巳豐此外皆其餘何用勤若翁渡江似春來十月鳥能巧雨收客帆起日出潮聲早釣絲浮曙煙樵歌落天表新花紅欲綴故葉青未稿何哉此方春去遲至偏早所以四海心獨夢江臯好卓哉揚王孫裸葬良不惡造化生我時安得袴襦著混沌為我衣青天為我幕誰非塊然生豈論毛與鞟誰非寐然死豈論溝與壑南山未為錮陳絮何用斫如彼唾與涕一落便永落湯湯濁河流空聞嘆銅雀出門上堂别父母下堂别昆季回首妻與女驀然拂征袂拙耕力不任巧求智所蔽持我獨用心何方不凝滯嚴霜被永野天秋朔風厲草稀候蟲蟄江夕哀鴻逝海上百愁積天邊一身細煙帆宿暮雨霜鐘發曉霽歷覽雖可樂不如守根蒂稻粱足吾謀匏瓜豈慙繫集卞茂卿園新雷動土脈熙陽恱草性池栁已解窺江梅巳堪贈畫舟蘸晴波文茵坐幽徑芳辰生逺思微雲淡孤興藥標新春奇竹藏隔年淨禽鳥初辭寒關關語相慶經時守太玄清齋一元命何來歲華情乃知春感盛酒闌送明月林臯自深靜成甫示遊西山詩奉酬幾人到西山不見西山趣車殆馬復煩但見西山樹道人廢機心舉足白雲鶩飛步送髙雁決眥破沈霧剎多境屢陳春去僧自住臨流照兩眸吾我忽焉遇顧見黃金人仰慙白日誤髙歌林樾表天籟非小賦靜者自有真豈須聾耳寤一室吾所專神往不在屨煙霞枕上得丘壑胸中故君遊洵云美吾觀幸忘諭京洛雖多塵終不染緇素偶作陶公偶然歌為求三徑資到官八十日輒賦歸來詞五斗尚不顧一物寧肻持種秫三百畝飲者知為誰田園有松菊桑麻雜然滋醉卧瓷甓間豾豾鹿與麋身將五栁隱心與孤雲期許由不買山巢父不鑿池到處即吾處故為隱者師但逢佳山水感荷主人貽能同逺公飲忍向王𢎞辭四明山余愛四明山遂忘千金誡靉靅與日往巉絶甘行憊大闌轡可騁箭廣僕無賴梨洲與丹山尚隔流猋外醉舞清冷天嘯歌白雲界疑無后土承獨有皇天戴驚峯激俯漚巨海縈近紒山院罷鐘磬時禽喧梵唄緬懷秋水人耿襲清風介戾止亦忘歸歸來愳難再遊它山南山暖氣偏九月猶積翠以我煙壑心觸目皆可意天清歸鳥肅溪白遊魚避雲根上枯水石衣蔽古寺危巖可捫井怪石每驚魅不緣前山歸偶與來徑值歡賞有羣彥情景信雙媚明月引歸槳煙霞尚生思雜詩凌晨趨嚴朝東日射馬首冠蓋滿道周相逢多執友君子䇿髙步小人亦顔厚奪我麋鹿心聊備牛馬走漢史蔡雍筆能慚微祿否嘗疑兹事外更須謀不朽贈别周民部元孚不厭朝與市誰能迸林藪不厭魚與肉誰能甘薤韭久病諳良藥長離憶初婦生無騰化術意勝雲山友吾觀蘧伯玉卷舒一何有寄迹周行間而心結巖阜莫莫古今道亭亭往來栁心傾車馬前目成金石後逡巡撫徒御顧瞻别我久蘭蓀藝深谷臨風閟馨不送范汝益雲鳥無違翼波魚無乖鱗一入臺沼間飛遊從主人莽莽白日髙悠悠風與塵駟車杳何許長鞭炎海漘海漘未云逺猶此籠中馴鼓翼觸四隅長鳴負三春洪覆回九州達生識其真勿言霜霰始日月無停輪何必胡與越然後為參辰結交十四年與子同一身飛鴻漸于干愊憶不可陳願子保明德萬里猶比鄰朱顔曲朱顔非自換良為篋鏡欺篋鏡終不發朱顔終不移歌罷月在梁影落闌干垂感君明月心不棄秋風姿猶記覆耳髮挂君飄纓髭宛轉結不解煩君立移時偶成催耕盛殷勤委黍特狼戾婦愚信無知鼠老亦當計有口不自營寧識謀年歲周鼎鑄馬履留以贍陽燧委黍鼠婦也訴寃大覺前笑破黃金口今昨無是非是非日生有養交獵浮名是名不能久息交謝浮名是名亦名否堯舜讓天下燕噲從之醜老子與韓非一傳相尾首杞人豈其愚天墜亦時有或言天無墜有墜墜當久或言數茍及死亡十而九相牽入黃壚誰復論好醜眼見女媧氏煉石補柱朽贈金伯庚問君何所挾喜氣常津津散帙理幽尚齋心含道真雲駛月華淡江空風色勻雖無朋知來亦有杯杓親少與鶴背期老得鷗性馴秦隋自來去長稱羲皇民神力朔方有神力潛與玄冥通小敵怯于雞大敵奔神龍繞身青赤蛇珥踐四白虹當其馬頭處開闢無秋蓬不見眼際雲但聞耳後風膽包七尺外精入三光中左右殪貙虎奔馳竟麼蟲萬方平一律四時銷五戎韜光淡流水苐稱寶劒功何必麒麟畫市廛喧兒童但慙圯上老逍遙遊無終新婦種禾取其穡種樹取其植一日為新婦入門耀容飾三日為主婦上堂撰飲食從此卷長襦當窗事機織貧富皆有營掃除亦乃職將諧舅姑心欲寬夫壻責六親乃來誇汝家得婦力寧論東西施淡然並無色歸歟詞三家不可仕九夷寧足居天意不在東聖圖將安如海桴馳逺情鳳哀想皇初載贄有濩落驅輪竟蕭疏暮春二三子一笑欣歸歟魯女居東鄰白髮不嫁人投以雙玉環淡如秋月新匪石安可轉貞心難緇磷不覩桃花源棄余如參辰風吹玉笛來萬籟髙青旻蓬萊亦不逺欲往無良因苦熱夏日空自長日長翻損功揮扇猶軟怯何云治倥偬夏夜亦豈短繞床行不窮瀉海入漏孔淵然潛燭龍畫既衆蠅蚋夜仍紛麼蟲共張利爪吻攢囓無瑕躬嗟爾最纖廉慘于虎豹雄揮之既不去薰之詎能空欲往訴帝宰閶闔屯金風將逃山澤深迢遙絶冥鴻是誰居爾徒據時氣如虹煽彼萬方赤烹人九鼎紅甘露何年漿水晶何處宮濕天委長淚寫恨增熱中惟藉一杯酒微吟以從容無題仙人吹斷紫璚竹黃鶴偏巢夜深宿銀漢無聲秋漏長寸寸心明剪紅燭青銅飛去孤鸞影化作冰輪兔心冷傳得嫦娥不死方應種人間桂千頃長安行乙丑嵗作長安九衢平似席甲第紛紛五侯宅繚繞香塵飛紫雲喧豗畫轂馳春色朱門繡户搖青槐翠幕紅絲揚舞臺鳷鵲觀前驚鵲起濯龍門外騎龍來韓嫣副車絶馳道張放單鞭逗歸鳥金吾擁衛巷無人丞相回軒迹如掃一生讀書不識丁只解吹簫與弄笙昨夜推開木門出今朝又向章臺行章臺栁色如青玉夜夜花前剪明燭臨淄麗女可憐聲鎮西歌童妙意曲并肩錦袖同心褵合歡寶扇連理杯杯中只嫌天地窄扇底直使神仙迷緑幘廬兒堪炙手青衣小郎慣使酒天寒海氣薄西山日短雲光銷北斗黃門鉤盾空邀遮御府金錢半在家鄧氏銅山賤越馬郭家金穴欺隋蛇自言奏有回天力又道功多絶地脈摧盡南山樂未央翻殘北海人如昔寧知天地一朝開寧知星漢還昭回麻紙半行變顔色藁街十步生塵埃賔客聞聲皆走匿妻孥相對唯號哀古來白鶴與黃犬專待豪奢公子來何如蓑笠紫泥坂獨舉青山蓮葉杯縱非上古蓂靈樹也是蒙莊樗櫟材楚宫曲楚山十二芙蓉開一山獨秀髙陽臺渚宫爛漫百花發誰向君王夢裏來君王樓閣藏青春一門一户一美人浣沙妖姬失顔色凌波仙子收光塵安能一一承歡恱好醜只與監宫説可憐柘枝細欲斷新裁舞袖郎當濶魚脂照夜不得明不論顔色但論聲聲聲亂入君王耳總付西風菰葉鳴苦寒行二首虬壺夜冰鼓吏死苦霧壓日日不起絳宫悔拜玄英侯蝸縮霓蟠滿床水窮竒守人無晦朔門外誰能間剝啄獨有袁家掩户深墮瓦飄廊渾不覺南方苦熱北苦寒燭龍近失天公歡瘃膚皸肌誰吝得后土迸裂百餘尺長風數陳刮地起一點青藜照書几誰將片言稍作溫獨有寸心寒似水君不見駝裘染火四角燔酒杯落手紅霞翻燕歌趙舞聲方喧從奴欲歸誰敢言嚴鞚四蹄立向門侏儒行身比侏儒長六尺俸粟一囊錢二百長飢短飽各欲死只合中庸老通籍君不見東籬槿朝日暉暉暮飛盡莫道羊珠可療飢若逢龍寤當虀粉雙燕離雙燕尾涏涏銜泥銜草雲中見百花潭上平蕪香絲絲剪破青天練何物春風不相守不及蘭塘一回首雄去飄飄雌獨還沙昏雲黑無青山長年結巢半不滿捲簾待月湘痕斑湘痕斑兮竹不萎燕雛呌閽鳳皇喜風木歌憂來中心不可除海乾河枯水失魚冠纓不足帶有餘耳目非故山川殊憂來中心不可絶蟾蜍食盡瓊華月取我衣冠而褚之杜鵑夜夜啼腥血夜夜復朝朝乾坤遙復遙氷澌電滅香缸炧慈母何人諡為妣走向空閨問前語不待吾生待吾死死如有知尚相持死如無知長巳矣卜居行冥冥深林不可居白日猛虎嘷山隅往來侁侁投人嬉胡不拂衣歸來乎涉江休誇舟楫牢涉世休誇方術髙鸞皇孔鳳日以逺畜梟鳴鵙爭喧囂白頭仙人玉鬟女分明共我南窗語空同路近行不難蓬瀛水淺堪輕舉三珠樹底紫鸞遊五色芝中白鹿呦玉堂金馬已可識何不歸來空白頭我謂仙人之語亦難信天上尊官安可近雲襟霧幄堪徘徊胡為謫向人問來桃子不因方叔結桃花豈為劉郎開最愁一釣六鼇盡圓方漂泊令人哀秋水篇秋水灌百川不辨牛與馬河伯欣然為大觀海若視之直土苴達人逍遙無不可何為為此栖栖者鴻鵠遵江湖志在青雲端鳳皇戢深林一舉天門寒魯連談笑褫秦帝棹歌不顧千金歡朱公一出吳王死扁舟五湖天地寬丈夫之性本骯髒一龍一蛇唯所向意氣若殷勤此心可贈君嘗思叩九閽不然死三軍蹉跎嵗月不稱意年來玩弄西山雲與塢汝翼勸酒歌青袍白馬登君堂盈盈美目誰家郎燈火如山夜色好試歌一曲柔人腸古人不飲今人酒酒到君前莫揮手朝來停車問姓名巳知君是人中英英雄不死即不窮生當謁帝明光宫不然羽翼凌天風安能沾沾守尺寸虛此少年之青銅髙門邃閣不可謁翠管朱絃此時發客舍蘼蕪若亂雲官湖菡萏如明月世間萬事轉燭來前年海棠今不開夷齊跖蹻皆巳矣何如共飲花前杯恐君一行去為吏僕夫在前馬在轡空教滿腹流饞涎欲飲不得下車醉茱萸灣薔薇溝到處月明船上樓清歌一曲碧雲盡歸去長江天際流送陸無從楚雲釀雨東風急瘦馬江城共愁入江南詞賦子山哀海上别離李陵泣天地生人貧賤多江頭落日如頽波一飛九萬乃虛語百年四十今蹉跎吾觀世人今瑣瑣似爾文章寧坎坷貧賤如海人如舟飄飄所之無不可君不見東鄰富兒耐把錢跬步不發雙户堅又不見西鄰孺子偶竊位纆索嬰身更憔悴不如貧賤坐自驕癢可得搔痺可搖興來五嶽恣遊遨飢來乞食亦逍遙無論伊尹困鼎調無論太公窮鼓刀即如伯鸞死吳市香名何損于二豪男兒貧賤何憂勞炎海行贈吳明卿還髙州祝融朝駕北户開湯池煮日天半摧緑煙朱􅦈平海出陽侯裸行迷相失蛇珠化雨翡翠雲天龍九首腰紫纁孤鳳呌月月不語妖䨹靉靅紛向君四時總是皇天氣平分不到炎荒地深院梧桐碧甃間不許長轅暫時繫髙涼主人笑拍手白雪題軒夢前牖氷絃續續三尺聲一片浮雲掌上生女貞樹為馮節婦女貞樹鬱哉何蔥青嚴霜墮地白日沒寒枝半抱秋風生雲黝黝石齲齲雲夜愁石朝語生與為墓上木死與為墓下土鬼車勿啼猛虎怒原上新條吾有主化為青虬帝閽去入帝閽縆繁絃一曲湘妃魂隨風落人間聞者嚱噓再三歎鬱哉女貞樹何如桃李顔晨行歌明星尚低天未明凍日潛從海底升夜如何其起蓐食開門車馬喧喧行人生貴賤皆有職蹇蹄請勿辭前征投簪未必玄髮生解綬未必肘腋輕不向山田事耦耕便從牧豎披榛荆陸沈吏隱亦不惡長飢短飽何須評天寒日駛晝難給不加夙暮誰其營君不見南箕北斗相縱橫東烏西兔日夜爭警露之鶴不停唳失晨之雞亦補鳴但無隂霾暗往路縱有氷雪皆夷平富平里第無鼉更城烏不敢朝墮聲侍兒密覆將寒錦儇子謹護初調鶯不向紗窗看曉色安知門外輪蹄情送吳山人之天台吳中年少今吳君睢盱不揖風塵人負圖擔簦常獨往布袍如雪時時新來窺禹穴藏書處又向蓬山望煙霧手持白筆搖青天貝闕瓊樓入詞賦海雲扶身身更輕海水洗眼眼更清聳身靈飇白日舉靈飇墮處霞為城霞城髙標天影空石梁秋色人如蓬山僧若肻乞人住為余灑掃雲中峯再遊上方寺與故人飲别我來上方十載前桃花嬌殺春風憐酒尊清于蜀井泉彈絲品竹集四筵我來上方十載後秋霜白盡門前栁當年故人不半席杯中白髮多于酒故人故人復故人何為日夜翻作新感此令人腸欲斷蕪城之賦增酸辛博山爐中爇沈水琪花片片微風起山花為我隨意緑山鳥從渠盡情語隋帝宫前酒斾多吳公臺下生寒波生憎紫燕辭條去尚有流鶯斷續歌長年且勿解維開再與諸君覆幾杯看余功成揖人主雙期赤松黃石來不學麻姑典仙職三淺海波方一回老鷂行相州浮屠滅素雲佛徒四散靈光分有狐綏綏窟其頂據危布巧張魔軍公然出入索祭賽移精屋底驚叉裙幾村月下捲眠席驅桃鞭棘喧相聞平原公子攬遊騎意氣西來照天地翩翩從者五陵豪手拍青松暫留憩聞兹肝腸裂秋色虎豹縱橫誰耐得回看鞲上老愁胡好去清霜試風力愁胡整束儘從容竦身三躍生剛風老狐負嵎正眼空老鷹深目復自雄不期側翅偶失便霜毛醉舞桃花紅道旁觀者色如土公子生蒙隴西恥難忘一戰雪曹柯詎惜千金求郭隗詰朝載取老鷂來金眸鐵脛非凡才一踠四天聲䎘䎘愁雲慘淡為之開心知敵手不易摧交綏便作旋風回長鳴飄然向空去狂魑笑破呼鷹臺不堪一辱還再辱三斷金鞭仰天哭江花片片自飛來江鳥不飛皆掩目忽聞羣鴉繞相輪如泣如弔聲唁唁老狐失驚小狐哭迷離欲竄無荒榛未解天公意何者萬人欲去仍旋馬東方一道如飛龍無數竒毛蔽天下橫排鵝鸛吹觱栗殺聲欲震長平瓦健翮當前索狐戰羣握飛沙爭撲面風塵入眼青天昏霹靂一聲滄海變自餘小怪無煩誅攢頭亂啄充朝脯但聞腥風萬縷汙遺腸儘足餐飢烏心感主人再三呼激烈綢繆當報珠吾觀此鷂智勇俱不數博浪沙中鎚似曾親授黃公符吁嗟鳥中之丈夫鳥有丈夫人則無放歌行古人貴清貧今人貴邪贏夜蛾赴烈火不悟飛鴻情飛鴻逝雲端一去如跳丸誰能攀其翼百鳥方心寒憂從中心來外物安能寬鶗鴂拾瑤草衆芳收其歡我今放歌君試聽天地為余總愁病東鄰瑶軫既有情西海明珠豈無脛何處修篁不受炎何處貞松自然徑繞朝敢謂秦無人樂毅遂稱臣不佞凄雲已墮中庭隂促織空為牀下吟穆生醴酒我當去季布髠鉗君自任願以不肖軀長托無為國生為白日光死作青山色清泉可以入叵羅紅蕖不劣于嬌娥竹葉飲時桃葉勸柘枝舞處栁枝歌白眼向天天不怒悠悠萬事如豫何送臨淮侯李惟寅守南都君侯岐陽王子孫家之哲嗣國寶臣黃符三略世所授素業一家心更親雙霓夜渡石頭渚佩刀躍出作人語試看逺近桑麻中盡是先王血駒所昔年組練留殘紅此日歌謠落照中分命保釐黃紙重古來周召並稱公金臺懷古燕臺昔日亡薊丘燕郊駿馬無人收一朝買得黃金骨臺前萬騎皆驊騮古來君臣不易得老死英雄難物色眼前忘却樂毅功後世安知郭生力九日易水蕭蕭寒行人褰裳欲渡難一時羽聲盡銷歇猶有怒髮能衝冠至今都人好竒節白日街心落紅雪可憐昭王墓上樹一輪光彩懸明月四明山歌我昔長歌天姥吟今來飛越江之深煙波浩蕩都在眼蒼崖白鹿紛可尋遊足未開意巳窘片雲隱約前村盡適來縱入丹山赤水之洞天果爾三百八十芙蓉之峰相鉤連沸如巨浪排九淵渴虬飢鱷崩奔泉驚魂褫魄悸不定乃知世間安得無神仙際天但有淺黛色到頂猶窮羽人翼謝公萬夫鑿不得支遁欲度空嘆息黃熊近人白虎怒杜鵑半染松花碧青鞋屢穿幾悔來眼前可即仍徘徊俄聞竹間響茶臼寺門正對雙眉開草根敲冰持滌釜纖隂近送靈秋雨劉綱臺榭收紫綃王交瀑布懸青組二韭三菁宛可拾東烏西兔紛來舞篆煙雕霧無時休一雙白鶴飛何苦吁嗟乎劉郎誤入青山圍不是忘歸不得歸薜荔滿墻皆可衣胡麻滿谷何愁飢赤雲層層團白日任他渡口桃花飛百年三萬六千日古今賢聖皆永畢何為容易别青山空教青山笑不還誅茒結屋弄流水溪雲與我長潺湲江頭春江南春風麗如綺十萬人家種桃李鶯聲巧弄管絃新燕子平行一江水當時喚汝作玉人悔不喚作江頭春江頭春會年年到玉人何處流光塵日出入金閶門行寄友日出入金閶門朝隨明星暮紫雲素食經秋亦何意素心空自生氤氳羣英繞轂不得前白髮蕭蕭蒙少年當關者誰奮怒言何以處我山之巔可憐神龍不見日滿身煙霧相隨出可憐堯舜不見人龍車遙遙度紫旻康衢之家難上聞土階三尺深重闉相如肺病猶著書子雲天祿寥寥居西山白雲謝逋客故園叢桂今何如日出入金門行昨暮日入我當出今朝日出我當入日出入兮無停輪我亦孤征向人急轔轔雙履翻數千天街磨成寶鏡鮮念欲且息不得息兩胥掖我髙于肩汝飢不能倩我飽汝亦劬勞堪自保世間到處有羊腸何必唏噓歌蜀道當時只恨隔重閽不道重閽尚有門玉皇髙拱蓬萊殿一水盈盈碧海尊楚宫詞可憐楚宫人空抱長飢老楊妃齒齬玉魚鮮衛娘鬢薄金鸞小不逢一日春風吹何似村中薺花好鴝鵒難為鳳皇舞夜深空灑霓裳雨悔不早嫁前村兒綵索牽牛打村鼓過故相長沙李公門長安城中多息壤九衢歲月紛來往當年髙門今矮屋石刻狻猊坐深谷幾回傴僂始到門幾樹公槐尚垂緑長沙公今安在海有滄田陸有海是時白龍常逺遊四海晏然朝委裘羣公方睦足嘯傲懷麓堂前操大浮我來寒色照晴光九衢積雪如羣羊盤旋路繞千回腸乃知太行之險不在逺如弦之直死道旁古來三讓原不易我今難于一辭去安得中山黃鵠舉繽翻下作空中絮採芝採苓須黑頭課耕課織足自謀如何靡費不資粟未解蒼生一日憂送金伯庚還山槭槭西風生栁條送君入山尋藥苗藥苗巳枯實正飽長鑱短钁憑君操山中人流光無情白日新白日不照臣心絶髙山嶻嶫石澗裂黃鳥髙舉青猿呼搔頭負痛看茱萸短歌行夜半欹枕夢不成寶劍半蝕無號聲牛斗之間藏至精斗酒送君君便行早秋送人北上蘆葉壯心驚凄涼似羽聲一尊遽北發萬里竟西行蓬梗人猶泛蓮花氣不平漸離髙館下無處有平生錢唐觀水漲客行無樂事一步不如歸數日河魚上千溪石燕飛濤青煙樹小風惡亂鴻微處處牛羊下天寒深墐扉鶯脰湖西風鶯脰湖積水曠東吳岸樹徽于點江天青欲無羇腸終日繞客計一舟孤買酒三家市蕭蕭夾岸蘆長安人日三年長作客七日又為人旅館浮雙塔殘燈作四鄰尚寒花事淺近塞雁聲頻莫騁乘春意徒增百感新挽盧九潤之潤之老始作客客而輒死白骨藏何地新詩付落暉一生初作客匹馬不同歸人世交遊少詞場物色稀獨憐機事盡應化野鷗飛陸氏莊二首出門何所往命酒即前期驅馬翩然至流鶯總未知水縈芳苑住天與豔陽私坐久更啼鳥清風習習吹軟草堪留藉流泉足洗杯春餘池館在吾戴接㒿來鳥倦羣鷗狎花遲細雨催故侯歌舞地歸騎總徘徊送陳清橋遵化司諭可能無尺寸虛此鬢頭花三輔試青簡諸生朝絳紗薊雲寒竹笈邊月靜年華長日談經處知君擅九家紫闥紫闥自生香聲華滿道傍百司方敬諾諸客又遊揚伊吕無前軌蕭曹竟末行三光凋不盡千載樂何央宿山家公等領丘壑四時開茂林竹風搖壁影松月墮窗隂野酌倨可恱病罷今巳深從來松桂裏盡是古人心送人之雷州庾嶺去猶賒居黎半雜華山藏椰子樹溪落蒟苗花望月應千嶂窺天自一涯微官是何物秋雨送征車太白山上方拂霧躋危磴披煙數亂山一松承日起羣鳥送雲還細溜經寒澀初苔得雨斑心馳縞衣使獨此伴僧間山家為王員外浚谷幽人宅中林處士家波濤上松樹歲月滿桃花童子調黃鶴仙人養白鴉客來何所事相對飲流霞野坐緑水行舟處青山命酒時片雲能載日落葉自題詩山賈朝攜婦溪漁夜就師薄言心賞洽數誤野人期送屠田叔還閩運司又送鹽官去南過閩海雲馬蹄上氷響鳬影及郊分候館踈寒柝行厨少暮葷惟應幔亭月遲爾白紛紛若士何來稱若士泛泛起清風詩卷留西派禪心近北宗花明丹似女松老秃如翁前日天台去辛勤折數笻苦雨二首非旱即為潦皇天應棄民鴻髙千里霧魚老一江蘋料得禾多耳能令巷有人窺門猶未霽何日可回春嘉穀報成西愁霖爛作泥山椒鳬影合木末荇花齊江暗頻驕鱷林昏屢悮雞菜根三尺水兼巳沒黃虀月湖秋泛秋入涵虛館天間衆樂亭湖含七橋月人聚一船星此地祠狂客吾今老洞庭獨憐雙鬢白點破數山青哭楊伯翼二首世人無達識此道只論聲獨好君家事堪髙我輩名江雲猶駐白湖水若含情今日翛園樹交交聞幾鶯翛園伯翼讀書處道異龍分席心同虎負荆楊生喜任俠末路彌縱橫死後詩當貴生時世莫名憐才自吾意天地亦何情泛舟蘆頭堰此日吾仍健諸君一小舟清風天上去落日鏡中留草色承裾緑荷香入座幽飛鳬散江白歸興滿蘆頭驛邸不寐村落不知更終宵亂鼓聲荒廚無鼠入逺樹有雞鳴鼾睡嗟僮僕歡言隔友生此時正愁絶窗月下縱橫送吳山人治歸黃山黃山迢遞白雲飛黃鶴仙人拍羽歸過雨千家榆火熟行春一路藥苗肥貧交落落分煙海小隱沈沈掩晝扉惟有當年漁獵伴時來灑掃緑苔磯甘露寺逢箕仲别江南古寺舊知名江上相逢把臂行白浪在天揚子渡緑隂如雨潤州城薜蘿寥落經年别黃鵠差池此日情悵望隔江帆影動海天無路雁無聲獄中劍寄徐文長寶劍蕭蕭風雨鳴摩挲水雪古今情不平最有人間事欲試曾無匣裏聲土蝕青蓮文五色人言赤堇價連城誰能掘厥寒光淨三尺猶堪萬里行七夕送王使君中庭坐見七襄移靈匹今宵感會離天上定言秋是夜人間自以歲為期東南遷次空回首西北流澌忽又馳使者不勞將石去年來杼軸更何其訪朱邦肅不值馬蹄無力過重闉䇿蹇前來問隱淪池水巳氷難受月梅花隔嶺不知春柴門倒鎖應髙卧草閣斜開豈避人酒禁近來尤甚緊從誰傾倒性情真李山人賔甫讀騷軒和韻梧隂片片落中庭無事間門盡日扃春水微風吹度緑曉山飛雨送來青從前大雅誰能作刪後離騷自一經對爾不能辭酩酊酒星原是李家星若邪溪獨往編竹為船任所之髙低白石上灘遲水波不待春生後山色偏多雪霽時到處溪邊憐謝客誰家村裏問西施小橋野店人爭席縹眇松煙入午炊章村道中雪霽雲開一徑明花香日暖笋輿輕野山歷歷皆人姓春鳥交交亦自名怪石滿溪驚駐馬柔風吹酒忽聞鶯種苓蒔术村村好谷口何知有漢卿扈從南郊紀事和朱于陳三館丈行殿鐘聲霽曉雲起居方罷日才曛貂蟬捧劍皆常侍貔虎周廬盡北軍絡繹中廚輸豹臠焜煌內帑出麟文近臣尤異蒙恩澤刺繡葳㽔五色分扈駕祀方澤呈同行朱陳二館丈天回北陸攬羲軒日應南薰闢舜門泰折祥雲承玉陛長安微雨待金根芙蓉丹闕鵷鸞麗楊栁青樓翡翠溫不是六龍紛氣象萬方誰識聖禧繁莊亭莊亭樹色曉生寒幾處扁舟欲渡難白鷺窺人雙眼碧倉庚呼雨一衣單東來鴟革浮天柱西去羊裘入釣竿惟有酒旗青不捲月明搖櫓隔江看揚州贈所知雙燕何曾歸漢苑數螢猶自照隋堤天空月近我今到笛短琴長人不迷砧杵頻年思塞北笙歌幾處憶關西欣然道故何客易莫厭臨風有滑稽塞上臘日臘日元戎出武威西風吹角塞雲微汗溝瀉凍膠金勒血淚凝丸打鐵衣明月乍逢孤雁去驚沙還逐片篷飛欲尋毳帳無人説且向南山射虎歸雜贈故人相見眼初明一架薔薇似水平花徑微聞風後狖草堂新聽雨餘鶯衰年久謝青藜役愁絶能無白雪聲把酒勸君君強飲天涯華髮不重生澄湖秋水練光開乞與詩人細剪裁小荇牽雲遊别渚新松扶日上髙臺南風習習蒲葵卧西月微微桂艇來歲去如馳青鬢老知君雙劍亦徘徊賦得當年憶箕仲擊水間歌海樹蒼東郊月吐值漁郎青山墮影過前堰白水回波入斷塘宿鷺洲邊江幾曲垂虹木杪雁三行當年勝事同誰説都付春風一慘傷山居贈客太平時節一間身朝出松間拾委薪漁去忽疑空大澤樵來還可當嘉賔野心蕩漾隨流水雲影差池落近鄰溪女能歌採蓮曲鋼刀如水劊雙鱗題鄞江先生廟先生王姓致名君一字吾鄉有慶厯五先生為楊先生適杜先生醇王先生説樓先生郁先生其一也樂道安貧以行誼文章為後進師王荆公為縣令表揚之徴祕書不赴老妻收秉稚子拾樵晏如也廟食于郡東南里人新之豫有是作無懷藪澤一間身有道妻兒不厭貧二仲頻來相爾汝諸生迎拜儼君臣名將太乙青藜共廟與東華老樹鄰坎坎擊鼉君至否紛紛椒糈玉為塵觀葬者素翣照青磷啾啾鬼哭新園前無限地何處未來人桃源雞犬三家夕桑麻一葉春安知天地外别有古今人送箕仲微雨來過楚水前半帆斜日挂疏煙他時明月應相憶丁卯橋邊丁卯年山中雜詠老樹橫溪穩作橋故人慣飲不須招白綸巾上青山好日遣松風緑酒瓢史相墓下作落日低垂丞相阡狐狸穿冢出平田大碑巳斷無文字惟有山僧説歲年余祭酒公五栁莊莊中臺榭皆以歸去來詞語命名故詩亦用陶事貴遊無事屢通書書滿牀頭只舊題惟有王𢎞粗解事一壺相見野亭西江湖風物醉還醒日日山行復水行縱是春來多腳疾藍輿二子一門生看潮曲千艫萬艦逆潮來鱉子為門鷺作堆堤下唱歌堤上醉看潮人待轉潮回漢唐宋三太宗禁裏妖星拂劍紅寢中積雪斧聲雄如何三讓為天子只有西京一太宗楊王孫王孫家迎樂遊原一食才須十萬錢不管北邙山下路白楊寒雨宿深煙釣臺落日扁舟訪釣臺青溪紅樹獨徘徊樵夫語我江天暗無可久留歸去來送逺送爾春江落照明西山遙指片雲生也知明日當為雨且盡今朝一日晴送客之蜀琵琶送酒為君彈劍葉生霜發曉寒似此出門猶不易堪知蜀道古今難送逺江鳥如煙亦送春江花似水逐時新雲光雨色無非客獨倚青山作主人哭句章公從此詩文失主盟海鷗飛去不留情可憐櫟社長橋月曾照詩翁散髮行僧院魂飛寄客哀門前白馬幾人來江村生計萊妻給海內封書驥子開富春江緑轉青回似若邪蘭橈終日亂荷花一江貯得春如海合把漁竿薄漢家題畫中原幾度見興亡有客登臺弔戰場不道漁撨亦多事坐移流水論斜陽甬上耆舊詩卷十八
